body:
  text: 王荆公詩注卷四十三宋李壁撰律詩與道原遊西莊過寶乘周顒宅作阿蘭若阿蘭若佛書或作阿練若釋云寂靜無事之處蘭若字樂天詩作爾者切押按上官儀酬薛舍人萬年宫晚景寓直懷友詩中四句云東望安仁省西連子雲閣長嘯求煙霞髙步尋蘭若此又作日灼切押婁約身歸窣堵波梵語窣堵波此云靈廟髙僧傳慧約姓婁二十達妙理周顒素所欽服乃於鍾山舊館造草堂寺以居之今寺左乃婁約置臺講經之地後即顒舊居也唐會昌中寺廢至宋朝復治平改賜寶乘額按梁武嘗與傅大士婁約法師昭明太子等論三諦法門真諦以明非有俗諦以明非無聖諦則真俗不二矣據此婁約猶及武帝時蕙帳銅瓶皆夢事蕙帳謂顒銅瓶指約楞嚴經却來觀世間猶如夢中事翛然陳迹翳松蘿一作今日隱侯孫亦老偶尋陳迹到煙蘿庚申遊齊安院水南水北重重柳山後山前處處梅未即此身隨物化莊子此之謂物化年年長趂此時來庚申正月遊齊安院有詩云水南水北重重栁壬戌正月再遊按建康志淨妙寺即齊安寺在城東門外前臨官路今徙置髙隴面秦淮南唐升元中建政和中改今額招提詩壁漫黃埃經音義云西方云招提梵云招鬬提奢此云四方即四方僧居止處忽忽籠紗雨過梅周處風土記夏至前雨名黃梅雨霑衣服皆敗埤雅云今江湘二浙四五月間梅欲黃落則水潤土溽柱礎皆汚蒸鬱成雨其霏如霧謂之梅雨自江以南三月雨謂之迎梅五月雨謂之送梅樂天故衫詩殘色過梅看向盡坡詩三三巳過黃梅雨王播詩三十年來塵撲面如今始得碧紗籠老值白雞能不死復隨春色破寒來白雞用謝安石事李文饒懷嵩記洎太和巳丑復接舊老同升台階或才歎止輿巳叶白雞之夢或未聞稅駕遽有黃犬之悲向之榮華可以悽愴李白詩白雞夢後五百嵗灑酒澆君同所歡壬戌正月晦與仲元自淮上復至齊安風暖柴荆處處開雪乾沙淨水洄洄意行却得前年路看盡梅花看竹來唐李羣玉詩緑隂十里灘聲裏間即王家看竹來同陳和叔遊齊安院壬戌五月和叔裕陵時再入翰林為學士時守江寧當元豐五年六年七年也繅成白雪桑重緑割盡黃雲稻正青他日玉堂揮翰手芳時同此賦林坰成字説後與曲江談掞丹陽蔡肇同遊齊安院據梧枝策事如毛莊子齊物篇昭文之鼓琴也師曠之枝策也惠子之據梧也三子之知幾乎注三子知盡慮窮形勞神倦世説范榮期見郤超俗情不淡戲之曰夷齊巢許一詣垂名必勞神苦形枝策據梧耶劉義詩日出扶桑一丈髙人間萬事細如毛久苦諸君共此勞唐李密兵敗謂王伯當曰兵敗矣久苦諸君我今自刎以謝衆遙望南山堪散釋故尋西路一登髙劉公幹詩沈迷簿領書回回自昏亂釋此出西城登髙且遊觀又李白詩送將三五少年輩登髙送逺形神開元豐二年僧修定林路成一作政公改路獨龍新路得平岡始免遊人屐齒妨言道路平治不妨屐齒也更有主林身半見與公隨轉作隂涼金光明經第四卷流水長者子見枯池魚生天悲心時有樹神示現半身作如是言此魚可愍汝可與水長者索水不可得顧見大樹尋取枝葉還到池上與作隂涼主林神按華嚴經妙嚴品復有不可思議數主林神所謂布葉如雲主林神擢幹舒光主林神生牙發曜主林神吉祥淨葉主林神垂布焰藏主林神清淨光明主林神可意雷音主林神光音普遍主林神妙光迥曜主林神華果光味主林神如是等而為上首不思議數皆有無量可愛光明書定林院窗竹雞呼我出華胥起滅篝燈擁撩爐試問道人何所夢但言渾忘不言無公自注云與安大師同宿既曉問昨夜有何夢師云有數夢皆忘記言夢覺也列子黃帝夢遊華胥之國有近臣問本淨此身何從而來百年之後復歸何處師云如人夢時從何而來夢覺時從何而去曰夢時不可言無既覺不可言有雖有有無來往無所師曰貧道此道亦如其夢又有偈曰視生如在夢夢裏實是間忽覺萬事休還同睡時悟智者會悟夢迷人信夢閙會夢如兩般一悟無别悟富貴與貧賤更亦無别路同熊伯通自定林過悟真二首建康續志云悟真庵在蔣山八功德水之南有梅摰悟真院記與客東來欲試茶倦投松石坐欹斜南史蕭思話傳相賞有松石間意暗香一陳連風起知有薔薇澗底花白詩知有澗底花貰得村中酒其二城郭紛紛老倦尋幅巾來寄北山岑長遭客子留連我未快穿雲涉水心穰侯語謁卿得無與客子俱來乎魏文詩客子常畏人悟真院續建康志云洪覺範有詩云水邊修竹才堪數林外蒼崖巳半頽野水縱橫潄屋除午窗殘夢鳥相呼白詩山歌猿獨叫野哭鳥相呼杜詩水宿鳥相呼春風日日吹香草山北山南路欲無王維詩不向春山去日令春草深孟郊詩春風朝夕起吹緑日日深唐薛存誠詩積草漸無徑殘花猶灑衣真讚我與丹青兩幻身世間流轉會成塵但知此物非他物莫問今人猶昔人圎覺經幻身滅故幻心亦滅維摩經是身無作風力所轉傳燈録此物非他物梵志出家白首而歸鄰人見之驚曰昔人尚存耶志曰吾猶昔人非昔人也鄰人皆愕然莊子吾猶昔人非昔人栁子厚詩坐來念念非昔人萬遍蓮花為誰用筠州洞山良價禪師問雲巖和尚百年後忽有人問還邈得師真如何抵對雲巖曰但向伊道即遮個是師良久雲巖曰承當遮個事大須審細師猶涉疑後因過水覩影大悟前旨因有一偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如他日因供飬雲巖真有僧問曰先師道只遮是莫便是否師曰是僧曰意旨如何師曰當時幾錯會先師語曰未審先師還知有也無師曰若不知有爭解恁麼道若知有爭肯恁麼道此即我與丹青兩幻身之意定林院昭文齋定林齋後鳴禽散祇有提壺繞屋簷苦勸道人沽美酒不應無意引陶潛用逺公沽酒與淵明事儲光羲詩蒙籠荆棘一鳥飛屢唱提壺沽酒喫古人不逢酒不足遺恨精靈傳此曲歐公詩獨有花上提壺蘆勸我沽酒花前傾經局感言自古能全巳不才不才之木終其天年妙處在巳字豈論騏驥與駑駘放歸就食情雖適絡首猶存亦可哀劉原甫撰六經小傳謂毛詩尚書公羊周禮儀禮禮記論語也元祐史官謂慶厯前學者尚文詞多守章句注疏之學至敞始異諸儒之説後王安石修經義蓋本倣敞如伊尹相湯伐桀升自陑之説之類經義多勦取之史官之言良不誣也此據楊時龜山説今附此熙寧七年四月公罷相知江寧依舊提舉修撰經義明年再相經義成拜左僕射九年十月以與吕惠卿交惡力乞罷政判江寧又力辭請宫觀乃以使相領集禧此詩言放歸自食蓋宫觀時作也時尚帶經局故云絡首猶存莊子絡馬首鍾山晚步小雨輕風落楝花東臯雜録云江南自初春至初夏有二十四畨風信梅花風最先楝花風最後唐詩云楝花開後風光老梅子黃時雨意濃晏元獻詩二十四畨花信風是也細紅如雪點平沙槿籬竹屋江村路沈休文詩槿籬疏復密荆扉新且故時見宜城賣酒家襄州宜城縣出美酒俗號宜城美酒為竹葉杯今賣酒家詩人多借用宜城亦猶世槩以酒為竹葉也後漢杜根逃竄為宜城山中酒家保積十五年酒家知其賢厚待之則宜城以酒名久矣陸韓卿詩宜城誰獻酬散策散策東岡亦巳勞杜詩羸老思散策散䇿不為勞久則倦矣橫塘西轉有亭臯離騷經路不周以左轉言散策既倦憩於亭臯不必言憩而意自在其中此詩人之妙絮飛度屋何許栁花落填溝無數桃倒用栁與桃字尤覺奇健韓詩栁巷還飛絮杜詩河陽縣裏雖無數濯錦江頭未滿園書靜照禪師塔傳燈録升州奉先寺淨照禪師慧同魏府人也姓張氏建康志載南唐葬照禪師於殊勝院院在城南門外簡老巳歸黃土陌淵師今作白頭翁百憂三十餘年事陳迹山林草野中因至此寺而念簡與淵却不及淨照也歐公詩蘇梅久作黃泉客我亦今為白髮翁卧讀楊蟠一千首乞渠秋月與春風記夢公自注云辛酉九月二十二夜夢髙郵土山道人赴蔣山北集雲峯為長老巳而坐化復出山南興國寺與豫同卧一榻探懷出片竹數寸上繞生絲屬豫藏之余棄弗取作詩與之月入千江體不分道人非復世間人鍾山南北安禪地香火他時供兩身東坡祭辨才文如二月水如萬竅風又遇物而應施則無窮亦千江體不分之意傳燈録千江同一月古尊宿語佛具遍智如月印海挹海得水月亦隨在勘會賀蘭溪主賀蘭溪洛京地名陳繹買地築居於此公從郵中寄此詩問之賀蘭溪山幾株松南北東西有幾峯買得往來今幾日尋常誰與坐從容書湖隂先生壁二首楊德逢也茅簷長掃靜無苔花木成畦手自栽栁詩石門長老身如夢旃檀成林手所種一水護田將緑繞漢西域傳序云自燉煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領護師古曰統領保護營田之事也又桑𢎞羊奏遣屯田卒詣故輪臺以東置校尉二人分護兩山排闥送青來樊噲乃排闥直入大臣隨之冷齋夜話云山谷嘗見荆公於金陵因問丞相近有何詩荆公指壁上所題兩句云一水護田云云此近所作也石林詩話云荆公詩用法甚嚴尤精於對偶嘗云用漢人語止可以漢人語對若參以異代語便不相類如此句護田排闥之類皆漢人語也此法惟公用之不覺拘窘如周顒宅作阿蘭若婁約身歸窣堵波皆以梵語對梵語亦類此其二桑條索漠栁花繁白詩桑條初緑即為别柿葉半紅猶未歸風斂餘香暗度垣首楞嚴如聲度垣不能為礙黃鳥數聲殘午夢尚疑身在一作屬半山園按建康志公有示蔡天啓詩今年鍾山南隨分作園圃是也又有次吳氏女子詩注云南朝九日臺在孫陵曲街傍去吾園只數百步今報寧禪院即其地過劉全美所居西崦晴天得強扶杜詩西崦人家宿法帖何氏書云投老殘年西崦巳迫出林知有故人居數能過我論奇字奇字出揚雄傳師古曰奇字古文之異者當復令公見異書袁山松書王充所作論衡中土未有傳者蔡雍入吳始得之常祕玩以為談助其後王朗為會稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉抱朴子曰時人嫌蔡雍得異書或搜求其帳中隱處果得論衡抱數卷持去雍丁寧之曰唯我與爾共之勿廣也書何氏宅壁有興提魚就公煮此言雖在巳三年皖灊終負幽人約空對湖山坐惘然世説衛君長為溫嶠長史溫甚善之每提酒脯就衛論書又桓沖在荆州張玄為侍中使至江陵路經陽岐村見一人持半籠生魚徑來造船云有魚寄作鱠張乃維舟納之問其姓字云是劉遺民張素聞其名大相欣待張甚欲話言劉了無停意既進鱠便去云向得此魚觀君船上當有鱠具是故來耳於是便去遺民劉驎之字杜詩知子松根長茯苓遲暮有意來同煮陸龜蒙詩今朝有客賣鱸魚手提見我長於尺題永慶壁有雱遺墨數行按建康志在城北門外烏龍潭北永慶招提墨數行嵗時風露每悽傷殘骸豈久人間世故有情鍾未可忘王夷甫哭子情之所鍾正在我輩江寧府園示元度畫船南北水遙通日暮幅巾篁竹中羊祜贊成功弗居幅巾窮巷落落焉其有風飇者也行過月臺逢翠碧背人飛過子城東杜詩雙雙瞻客上一一背人飛韋蘇州詩每到子城東路上憶君相逐入朝時金陵郡齋談經投老拚悠悠公經術晚益深而云拚悠悠者謙光之談也此詩作於熙寧七年秋時惠卿為政巳極力傾公雖經義亦多改定云蘇公子由云安石以宰相解經行之於世至春秋漫不能通則詆以為斷爛朝報余謂以宰相解經五字似譏公操權勢驅脅世俗以行其説然公諸經解妙實多韓持國輩終推之何可盡疵哉為吏文書了即休深炷爐香一作煙閉齋閣卧聽簷雨㵼髙秋杜詩雨㵼暮簷竹戲示蔣頴叔扶衰南陌望長楸曹子建詩鬬雞東郊道走馬長楸間燈火如星滿地流韓詩騎火萬星攢但怪傳呼殺風景豈知禪客夜相投西清詩話云義山雜纂品目數十蓋以文滑稽者其一曰殺風景謂清泉濯足花上曬褌背山起樓燒琴煮鶴對花啜茶松下喝道晏元獻慶厯中罷相守潁以惠山泉日注從容賦詩曰稽山新茗緑如煙靜挈都藍煮惠泉未向人間殺風景更持醪醑對花前王荆公元豐末居金陵大漕蔣之奇夜謁公于蔣山騶呼甚都公取松下喝道語作此詩戲之自此殺風景之語頗著于世頴叔好參禪故以禪客戲之公集有與蔣論禪一書今附於此阻闊未久豈勝思渴承手筆訪以所疑因得聞動止良以為慰如某所聞非神不能變而變以赴感特神足耳所謂性者若四大是也所謂無性者若如來藏是也雖無性而非斷絶故曰一性所謂無性曰一性所謂無性則其實非有非無此可以意通難以言了也惟無性故能變若有性則火不可以為水水不可以為地地不可以為風矣長來短對動來靜對此但令人勿著爾若了其語意則雖不著二邊而著中邊此亦是著故經曰不此岸不彼岸不中流長瓜梵志一切去不變而佛告之以受與不受亦不受皆爭論也若知應生旡所住心則但有所著皆在所訶雖不涉二邊亦未出三句若無此過即在所可三十六對無所施也妙法蓮華經説實相法然其所説亦行而巳故導師曰安立行淨行無邊行上行也其所以名芬陀利華取義甚多非但如今法師所釋也佛説有性無非第一義諦若第一義諦有即是無無即是有以無有像計度言語起而佛不二法離一切計度言説謂之不二法亦是方便説耳此可冥會難以言了也遊城東示深之德逢二首欲牽淮舸共尋源淮舸謂秦淮且踏青青繞杏園杏園未詳在何處憶我舊時光宅路依然桑栁映華繁其二一作麗澤門麗澤門西日未俄水明沙淨卷纎羅韓詩山淨江空水見沙又江作青羅帶緑瓊洲渚青瑶嶂瓊赤玉也今嫓緑而言豈謂草木紅碧相間乎付與詩工敢琢磨詩工謂二子也示公佐殘生傷性老耽書年少東來復起豫各據稿梧同不寐偶然聞雨落階除莊子天運篇儻然立於四虛之道倚乎稿梧而吟梁元帝讀書事曰憑几據梧栁詩髙樹臨清池風驚夜來雨余心適無事偶此成賓主示俞秀老二首不見故人天際舟謝玄暉詩天際識歸舟小亭殘日更回頭繅成白雪三千丈細草遊雲一片愁李白詩白髮三千丈緣愁似箇長别本片字作寸字言一寸愁能繅成白雪三千丈其二君詩何似解人愁初日紅蕖碧水流鮑昭言謝靈運五言如初發芙蓉自然可愛未怕元劉妨獨步白樂天集豫頃以元微之唱和頗多或在人口常戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨步於吳越間亦不幸也今垂老復遇夢得得非重不幸耶每思陶謝與同遊杜詩安得思如陶謝手令渠述作與同遊示李時叔二首知子鳴絃意在山一官聊復戲人間能為白下東南尉唐張容詩一尉東南逺誰知此夜歡白詩王夫子送君為一尉東南三千五百里藜杖緇巾得往還杜詩杖藜長松隂作尉窮谷辟其二千山訪我幾摧輈劉琨詩駭駟摧雙輈王維梵志體詩云何津不鼓棹何路不摧輈清坐來看十日留勢利白頭何足道古人傾蓋有綢繆鄒陽傳語曰白頭如新傾蓋如故何則知與不知也退之贈劉生詩乃獨遇之盡綢繆示寶覺二首火暖窗明粥一盂晨興相對寂無魚言寂然無魚鼓之聲非馮歡彈鋏事韓文子飯一孟子啜一觴翛然迥出山林外别有禪天好淨居佛書四禪有淨居天梁武帝有淨居殿其二重將壞色染衣裙東坡文璉禪師曰吾衣以壞色食以瓦鐵龍腦鉢非法四分律云著壞色衣有五利一順聖威儀二離傲慢三不受塵垢四不生蟣虱五觸時柔軟易將護故共卧鍾山一塢雲客舍黃粱今始熟黃粱事巳見遊土山注此略不同兩存之異聞集道者吕翁經邯鄲道上邸舍有少年盧生自款其貧困言訖思寐時主人方炊黃粱為饌翁乃探懷中枕以授生枕兩端有二竅生夢中自竅入其家見其身富貴五十年老病而卒欠伸而悟顧吕翁在傍主人炊黃粱尚未熟鳥殘紅柿昔曽分鳥􅋦紅柿落前溈山接與仰山仰山以水洗了却與溈山溈山曰子仆麼處得來仰山曰所是和尚道德所感溈山曰汝也不得空即分半與仰山事見傳燈録唐人詩松和巢鶴看果共野猿分仲元女孫雙鬟嬉戲我庭除爭挽新花比繡襦杜詩憶昔初小時小襦繡芳蓀韓詩嬌癡婢子無性靈競挽春衫來比並親結香纓知不久汝翁那更鑷髭鬚鑷鬚見遊土山注內則婦事舅姑襟纓注襟結也婦人有纓示繫屬也示永慶院秀老禪房借枕得重欹陳迹翛然尚有詩嗟我與公皆老矣拂天松柏見栽時太白胡僧歌此僧年紀那得知手種青松今十圍賈島詩飬雛成大鶴種子作髙松記劉長卿詩有松蘿長稚子風景逐新文亦此意示王鐸主簿君正忙時我正間盧綸詩花正濃時君正愁逢花只欲替花羞即此句法也如何同得到鍾山夷門二十年前事回首黃塵一夢間史記魏公子贊吾常過大梁之壚問其所謂夷門夷門者城之東門也今為汴都戲城中故人城郭山林路半分君家塵土我家雲莫吹塵土來汚我王導傳元規塵汚人我自有雲持寄君陶𢎞景詩見定林寺注戲贈段約之竹柏相望數十楹選詩峭蒨青蔥間竹柏得其真藕花多處復開亭如何更欲通南埭割我鍾山一半青建康志南康今上水閘也正對青溪閘段約之家有割青亭見建康志示俞處士魯山眉宇人不見借元魯山以比俞也魯山名德秀字紫芝嘗為魯山令房琯嘗云見紫芝眉宇使人名利之心都盡只有歌辭來向東杜詩清渭無情極愁時獨向東借問樓前踏于蒍何如雲卧唱松風玄宗在東都酺五鳳樓前命三百里縣令刺史各以聲樂集往往爭為瓌麗時元令魯山惟樂工十數人聨伏歌于蒍于于蒍于者德秀所為歌也帝聞異之歎曰賢人之言哉詩言元猶為縣令不及俞之自如也杜詩雲卧衣裳冷陶𢎞景喜松風懷張唐公直諒多為世所排唐公仕仁宗時能守其職數與俗忤如諡錢惟演為文墨帝諭易之辭愈直卒不能奪為淮南轉運使三司責諸道餘財淮南獨上金九錢三司使怒詆之甚瓌以賦數民貧為對草劉沆贈官制意言沆特鄉里豪舉以附會至將相沆子瑾訴於朝極其醜詆出知黃州後立為瑾發其判吏部時調其子不應法降一官公詩所稱為世排者指此類也有懷長向我前開暮年惆悵誰知此南陌東阡獨往來顔師古注漢書曰阡陌田間道也南北曰阡東西曰陌蓋秦商鞅所開也今云南陌東阡亦互言之耳懷金陵三首覆舟山下龍光寺玄武湖畔五龍堂想見舊時遊厯處煙雲渺渺水茫茫覆舟山在城北七里東際青溪北臨玄武湖狀如覆舟因以為名按輿地志在樂遊苑內宋元嘉中改名真武山以其臨玄武湖故也髙祖舉兵討桓玄玄使卞範之屯覆舟山西義軍進至山東髙祖躬先士卒以奔之範之諸軍大敗陳髙祖時齊兵踰鍾山髙祖衆軍分頓樂遊苑東及覆舟山北斷其衝要齊軍至玄武湖西北幕府山南將據北郊壇衆軍自覆舟東移郊壇北與齊人相對縱兵大戰即此地玄武湖周回四十里宋以𨽻舟師京都記云從北湖望鍾山似宫亭湖望廬嶽也沈約登覆舟山詩云南瞻儲胥館北眺昆明池即此湖也又建康志玄武湖亦曰後湖在城北二里東西有溝流入秦淮深七尺灌田一百頃按建康實録吳寶鼎二年開城北渠引後湖水流入新宫巡繞殿堂晉元帝太興三年始創北湖築長隄以壅北山之水東自覆舟山西至宣武城六里餘宋元嘉中有黑龍見因改玄武湖立三神山於湖中春秋祠之南史元嘉二十三年文帝築北隄立玄武湖樂遊苑欲起三山湖中何尚之固諫乃止豈當時諫止之後復立耶故李白詩亦云空餘後湖月波上對三山孝武大明中大閲水軍於湖因號昆明池而俗亦呼為飲馬塘又於湖側作大竇通水入華林園故臺中諸溝水常縈回不息建平王景素舉兵蕭道成出屯玄武湖梁嗣微等引齊兵至玄武湖侯景舉兵引玄武湖水以灌臺城是也宋朝天禧四年改曰放生池其後稍廢為田許堅詩一水茫茫豈有涯春風時節萬株花其二煙雲渺渺水茫茫繚繞蕪城一帶長宋鮑昭有蕪城賦指廣陵故城也城乃吳王濞所築蒿目黃塵憂世事追思陳迹故難忘莊子駢拇篇今世之仁人蒿目而憂世之患注以可尚之迹蒿今有患而遂憂之此為陷人於難而後拯之也嬰於世故而思舊遊也蘭亭序俯仰之間已為陳迹其三追思陳迹故難忘翠木蒼藤水一方詩彼汾一方劉禹錫詩一方明月可中庭聞説精廬今更好薑肱傳盜就精廬求見注精廬即精舍好隨殘汴理歸艎隋煬帝開汴渠達江都公時在京師故欲順流理歸艎唐李翺為來南録云自淮沿流至于髙郵乃泝至于江孟子所謂決汝漢排淮泗而注之江則淮泗固嘗入江矣此乃禹之舊迹熙寧中曽遣使按圗求之故道宛然終不能復據此則歸艎之句及淮而止耳不能徑出江也離升州作殘菊冥冥風更吹雨如梅子欲黃時杜詩四月熟黃梅相看握手總無語愁滿眼前心自知張籍詩失意還獨語多愁祗自知又樂天弔元相詩相看掩淚都無語别有傷心事豈知又多病多愁心自知望淮口白煙瀰漫接天涯黯黯長空一道斜陸龜蒙詩分明似個屏風上飛起鵁鶄一道斜有似錢塘江上望晚潮初落見平沙張籍宿江店詩間尋泊船處潮落見平沙唐昭度詩長憶錢塘江上望酒樓人散雨千絲入瓜步望揚州瓜步屬真州即魏太武入冦駐軍之地也落日平村一水邉蕪城掩映祗蒼然蕪城見上注白頭追想當年事幕府青衫最少年韓文送李礎序愈於太傅府年最少張籍哭孟寂詩曲江院裏題名處十九人中最少年按荆公慶厯二年楊置榜第四名及第授簽書淮南節度判官廳公事五年三月韓忠獻公罷樞副以資政殿出鎮維揚公時尚在簽幕年二十五故自云最少年又公作忠獻挽辭有云幕府少年今白髮傷心無路送靈輀時荆公召自江寧再居相位蓋熙寧八年也泊船瓜洲京口瓜洲一水間京口已見别注瓜洲在丹徒之對鍾山祇隔數重山春風自緑江南岸明月何時照我還李白宜春苑歌東風巳緑瀛洲草紫殿紅樓覺春好又香山詩春岸緑時連夢澤夕陽紅處近長安溫庭筠緑昏晴氣春風岸紅漾輕淪野水天又李白愁陽春賦天光青而妍和海氣緑而芳新重過余婆岡市按建康續志云余婆岡市在城東北二十里公詩刻市中今存憶我東遊未有鬚韓君頤始生鬚扶衰重此駐肩輿市中年少今誰在魯叟當街六十餘魯叟公自謂也陶詩汲汲魯中叟漢書臣里中有酈生年六十餘長八尺秦淮泛舟強扶衰病牽淮舸尚怯春風泝午潮花與新吾如有意山於何處不相招新吾見傳神自贊注杜詩百丈牽江色孤舟泛日斜中書即事投老翻為世網嬰低徊終恐負一作誤平生何時白石岡頭路度水穿雲取次行白石岡撫州建康皆有之觀公拜相日題西廡小閣窗間云霜筠雪竹鍾南寺投老歸來寄此身既得請金陵出東府寓定力院又題壁云溪北溪南水暗通隔溪遙見夕陽舂當時諸葛成何事只合終身作卧龍時熙寧九年十月大抵皆此詩之意萬事萬事黃粱欲熟時公詩屢用黃粱事而語意皆妙世間談笑漫追隨雞蟲得失何須算鵬鷃逍遙各自知杜詩縛雞行家中厭雞食蟲蟻不知雞賣還遭烹又云雞蟲得失無了時注目寒江倚山閣鵬鷃見莊子逍遙遊注各以得性為至自盡為極也或翺翔天池或畢志榆枋直各稱體而足不知所以然也寄金陵傳神者李士雲衰容一見便疑真李子揮毫妙入神一作故有神欲去鍾山終不忍謝渠分我死前身白詩衰容自覺冝間處贈外孫南山新長鳳凰雛眉目分明畫不如年小從他愛梨栗長成須讀五車書乃吳侔也其父安持充次子荆公壻侔得公此詩何止不克負荷後乃更坐惡逆誅纍及其親按國史舒州人張懷素本百姓自稱落魄野人以幻術遊公卿間於元祐六年説朝散郎吳儲云公福似姚興可為關中一國主儲云儲福弱豈能及姚興懷素云但説有志不説福紹聖四年懷素入京又與儲結約儲以語侔崇寧四年事敗獄成懷素吳儲吳侔邵稟並陵遲處斬楊公輔魏當郭秉德並特處死吳儲安持貸命免真決追毀出身以來文字除名勒亭送潭州編管吳侔母王氏係王安石女特免逺竄送太平州羈管侔弟僎道州羈管公此詩蓋為侔作也吕惠卿子淵坐曽聞妖言不以告削籍竄沙門島惠卿散官安置宣州蔡卞降職奉外祠鄧洵武妻吳侔之兄出知隨州安惇追貶散官初蔡京實與懷素往來書疏猥多余深林攄鞠制獄曲為京地故京獨免懷素之敗本潤州州學內舍生湯東野將錢十千與進士范寥入京告發獄竟東野除宣義郎寺監主簿賜袍帶并見錢一千貫盤纒錢一百貫范寥特除供備庫副使賜見錢一千貫金二十兩銀腰帶并公服靴笏與在京監當然東野用是積纍至從官晚年嘗見卧牀有人頭無數豈懷素之獄不能無濫耶淵明責子詩通子垂九齡但覓梨與栗杜詩庭前八月梨棗熟又男兒須讀五車書東流頓令罷官阻風示文有按風伯奏天閽之語答以四句令尹犀舟失去期張衡傳雖有犀舟徑楫猶人涉卬否有須者也憮然憑几占文移勸君慎莫讒風伯韓文古本杭本及文苑訟風伯皆作讒會有開帆破浪時宗慤曰願乘長風破萬里浪楊德逢送米與法雲二老作此詩盧同不出憎流俗我卜郊居避俗憎同有鄰僧來乞米我今送米乞音氣巳見上鄰僧韓公寄同詩先生結髮憎俗徒閉門不出動一紀至今鄰僧乞米送僕忝縣尹能不恥送黃吉父將赴南康官歸金溪三首柘岡西路白雲深唐詩宛陵三千里路指吳雲深想子東歸得重尋亦見舊時花躑躅為言春至每傷心公雖徙居金陵而念鄉里每切柘岡在臨川其二還家一笑即芳辰好與名山作主人邂逅五湖乘興往相邀錦繡谷中春廬山記谷中奇花異草不可殫述三四月間紅紫匝地如披錦繡故以為名其三嵗晚相逢喜且悲莫占風日恨歸遲我如逆旅當還客後會有無那得知陶詩家如逆旅舍我如當去客言再見未可知也王荆公詩注卷四十三
