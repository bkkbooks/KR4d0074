body:
  text: 王荆公詩注卷三十宋李壁撰律詩送直講吳殿丞宰鞏縣青嵩碧洛曾游地墨綬銅章忽在身擁馬尚多畿甸雪隨衣無復禁城塵古來學問須行已此去風流定慰人更憶少陵詩上語知君不負鞏梅春鞏縣屬西京郭緣生述征記云本周之鞏伯邑左氏晉師克鞏逐王子朝是也嵩山在縣西南六十里桑欽水經洛水出京兆上洛縣過散關厯河南洛陽偃師至鞏縣東北入河謂之洛汭劉長卿詩歸路空回首新章已在腰漢制縣令長皆銅印墨綬退之詩雪擁藍關馬不前吕讓詩髮改河陽鬢衣餘京洛塵杜詩秋風楚竹冷夜雪鞏梅春送吳仲純守儀真江上齊船駐彩橈鳴笳應滿緑楊橋久為漢吏知文法當使淮人服教條栱木延陵瞻故國叢祠瓜步認前朝登臨莫負山川好終欲東歸聽楚謡張湯傳好興事舞文法又龔遂為渤海太守奏曰治人猶治亂繩不可急願勑丞相御史且無拘臣以文法黃霸守潁川為條教務耕桑蓄養而巳又云歸告二千石毋得擅為條教陳勝傳間令廣之次所旁叢祠中夜篝火狐鳴師古曰叢謂草木岑蔚者祠神祠也鎮江有延陵縣熙寧五年廢為鎮有季札墓夫子十字碑存焉晉許邁傳懸霤山近延陵茅山茅山今屬江寧可見壤地相接瓜步有魏大武祠送質夫之陜府平世求才謾至公悠悠羇旅士多窮十年見子尚短褐千里隨人今北風户外屨貧虛自滿樽中酒賤亦嘗空共嫌此老無機械心事還能與我同南史宋武帝常曰羊徽蔡廓可平世三公言賔客雖衆皆清修之士無富兒也貢禹短褐不完莊子伯昏瞀人曰善哉觀乎汝處己人將保汝矣無幾何而往則户外之屨滿矣孔融傳坐上客常滿樽中酒不空言酒雖賤無錢不能得機械子貢事題致政孫學士歸來亭彭澤陶潛歸去來素風千載出塵埃明時雋老心無纍故里髙門子有才更築園林負城郭長留花月映池臺却尋五柳先生傳薪水區區但可哀莊子達生篇有張毅者髙門縣薄無不走也疏云髙門富貴之家也淵明為彭澤送一力給其子曰汝旦夕之費自給為難今遣一力助汝薪水之勞比亦人子也可善遇之李白詩䠎踀東籬下淵明不足羣亦此意次韻吳季野題嶽上人澄心亭梅聖俞亦有和韻空庭五月尚寒生回首塵沙自鬱蒸砌水亂流穿石砥野雲髙出蔽山層躋攀欲絶人間世締構應從物外僧腸胃坐來清似洗神竒未怪佛圖澄杜詩炎天避鬱蒸劉滄詩寒山半出白雲層又韋處厚詩緣崖踏石層佛圖澄傳腹傍有一孔常以絮塞之每夜讀書則拔絮孔中出光照一室又嘗齊時平旦至流水側腹傍孔中引出五臟六腑洗之還納腹中送彥珍挾策窮鄉滿鬢絲阪田荒盡豈常窺未應谷口終身隱正合菑川舉國推握手百憂空往事還家一笑即芳時柘岡定有辛夷發亦見東風使我知正月詩瞻彼阪田有菀其特注阪田﨑嶇墝埆之處谷口菑川二事並見别注吳彥珍所居在拓岡屬臨川寄張先郎中張子野也留連山水住多時年比馮唐未覺衰篝火尚能書細字郵筒還肯寄新詩胡床月下知誰對蠻榼花前想自隨投老主恩聊欲報每瞻髙躅恨歸遲陳勝傳叢祠中夜篝火注篝者籠也篝音溝韓詩夜書細字綴語言風俗通曰靈帝好胡床董卓擁胡兵之應也庾肩吾胡床詩曰傳名乃外域入用信中京足欹形已正文邪體自平魏略曰裴潛為兖州刺史嘗作一胡床及去留以挂樹晉庾亮傳亮在武昌佐史殷浩之徒乘秋夜往共登南樓俄而不覺亮至諸人皆起避之亮徐曰諸君少住老子於此興復不淺便據胡床與浩等談詠竟夕說文曰榼酒器也成公十五年晉欒針使行人執榼承飲造于子重唐人詩云莫歎青山拋皓月且傾蠻榼盡濃醪白詩蠻榼來方㵼䝉茶到始煎又小花蠻榼二三升僧文兆詩别來鋤久廢身老恨歸遲汜水寄和父虎牢關下水逶迤想汝飄然過此時灑血只添波浪起脫身難借羽翰追留連厚祿非朝隱乖隔殘年更土思已卜冶城三畝地寄聲知我有歸期鄭州唐有汜水縣本朝九域志無之莊二十一年自虎牢以東杜注在河南成臯縣寰宇志鄭地漢屬河南宋武帝立司州理虎牢東魏分滎陽置成臯郡理今之泛水杜詩灑血江漢身襄疾又脫身簿尉間始與捶楚辭又天涯春色催遲暮别淚遙添錦水波揚子淵騫篇或問柳下惠非朝隱者歟此言祿厚則責深不可言朝隱矣土思烏孫公主事公嘗有寄聲冶城人為我問一丘之句王維詩五湖三畝宅萬里一歸人唐人好使三畝地退之薦士詩使以歸期告寄吉甫朱顔去似朔風驚白髮多於野草生挾策讀書空有得求田問舍轉無成解鞍烏石岡邊路携手辛夷樹下行今日追思真樂事黃塵深處走雞鳴李翺云人之受命九長者不過七十八十至百年者則稀矣雖饗百年若風之飄而還也杜牧詩古人容易去白髮等閒生白傅草詩野火燒不盡春風吹又生挾策求田二事公屢使解鞍携手皆言撫州舊游雞鳴即於黃塵深處走此言趂朝時次韻平甫村墅春日昨日青青尚未齊忽看春色滿髙低陂梅弄影爭先舞葉鳥藏身自在啼樵蹻踏雲歸舊徑漁蓑背雨向前溪似知我欲逃軒冕談笑相過各有携退之詩南陽郭門外桑下麥青青少陵百舌詩花密藏難見又鳥呼藏其身王褒傳離疏釋蹻而享膏粱注蹻居略反以繩為之韓詩雪徑低樵叟韓渥詩須信閒人有忙事曉來衝雨覔漁師莊子繕性古之所謂得志者非軒冕之謂也軒冕在身非性命也物之倘來寄也杜詩手中各有携傾榼濁復清即席次韻微之泛舟畫舸幽尋北果園應將陳迹問桑門地隨墻塹行多曲天著岡巒望易昏故國時平空有木荒城人少半為村悠悠興廢皆如此賴付乾愁酒一樽北果園近半山杜詩果園坊裏為求來桑門見上注選詩故林衰木平荒池秋草偏白詩市井蕭條半似村韓詩乾愁漫解坐自纍與衆異趣寧相親宋范曄傳有乾愁字笑愁雖異乾義則同示長安君此詩恐是使北時作長安君公妹也少年離别意非輕老去相逢亦愴情草草杯盤供笑語昏昏燈火話平生自憐湖海三年隔又作塵沙萬里行欲問後期何日是寄書應見鴈南征退之送師服詩草草具盤饌不持酒勸酬張耳傳貫髙仰視泄公勞苦如平生歡成都記諸葛亮送費禕使吳别於江上禕曰萬里之行始於此矣樂天詩雲雨三年别風波萬里行劉長卿詩離亂要知君到處寄書須及鴈南飛和平甫招道光法師鍊師投老演真乘像劫空王瓜與肱於總持門通一路以光明藏續千燈從容發口酬摩詰邂逅持心契慧能新句得公還有賴古人詩字恥無僧升𤣥經若有沙門來聽經當置上座道士鍊師自在其下法華經唯有一佛乘餘二即非真神秀碑髙悟與真乘同徹曇無羅䜟曰釋迦佛正法住世五百年象法一千年末法一萬年華嚴經第十四卷有空王佛神秀碑有師而成即燃燈佛所無依而說是空王法門華嚴經成就總持三昧門此真佛子之住處楞嚴經頌十方薄伽梵一路涅槃門圓覺經入於神通大光明藏維摩詰與二千魔女說法云諸姊有法門名無盡燈汝等當學無盡燈者譬如一燈然百千燈冥者皆明明終不盡李白尊勝憧頌傳千燈於智種了萬法於真空維摩問三十二菩薩不二法門韶州法海禪師初見六祖問曰即心即佛願垂指喻祖曰前念不生即心後念不滅即佛成一切相即心離一切相即佛吾若具說窮劫不盡吾偈曰即心名慧即佛乃定定慧等待意中清淨悟此法門由汝習性用本無生雙修是正法海信受以偈贊曰即心元自佛不悟而自屈我知言慧因雙修離諸物詩字有僧如賈島僧敲月下門之類鄭谷雲臺集其詩用僧字凡三十五處故詩人云仲先筆苑多籠鶴鄭谷詩壇愛惹僧蓋谷詩好使僧字而魏野仲先詩好使鶴字二公以僧鶴格致清髙故句多及之和祖仁晚過集禧觀妍暖聊隨馬首東春衫猶未著方空煙霞送色歸瑶水山木分香繞閬風壯髮巳輸塵外緑衰顔漫到酒邊紅日斜歸去人間世却記前游似夢中欒黶曰余馬首欲東漢元紀罷齊三服官注春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三師古曰縰與纚同音山爾反即今之方目􅀢又後漢建初二年詔齊相省氷紈方空縠吹綸絮紈素也氷言色鮮潔如氷釋名曰縠綬也方空者紗薄如空也或曰空孔也即今之方目紗也綸似絮而細吹者言吹噓可成亦紗也王元長曲水序穆王八駿如舞瑶水之隂杜子美九成宫詩巡非瑶水逺三島記崑崙山有三角其一角正北千星辰之輝名曰閬風巔又十州記聚窟州在西海中北接崑崙二十六萬里山上專多大樹與楓木相類而林芳葉香聞數百里名曰反魂樹趙后傳我男也額上有壯髮似孝元皇帝師古曰壯髮當額前侵下生今俗呼為圭頭者是也言塵外人不與事接故髮常緑潘安仁金谷詩𤣥醴染朱顔東坡詩衰顔得酒尚能韶又兒童誤喜朱顔在一笑那知是酒紅送程公闢轉運江西公闢於嘉祐間嘗為洪州主治平三年為江西路轉運副使故公詩有不異重臨最慰漳濵之句江西一節鑄黃金最慰漳濵父老心直孺重來真强豫次公今不異重臨餘風尚有歡謡在陳迹非無勝事尋豫想新詩能寄我十年華省故情深周禮地官掌節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之汲黯字直孺拜淮陽太守伏謝不受印綬數强豫然後奉詔黃霸字次公為京兆尹坐乏軍興有詔歸潁川太守官以八百石居治如其前柳柳州再授連州酬别劉夢得詩重臨事異黃丞相三黜名慙柳士師次韻微之即席釀成吳米野油囊却愛清談氣味長閒日有僧來北阜平時無盜出南塘風亭對竹酬孤峭雪徑尋梅認暗香江上中泠應未變一杯終欲就君嘗仙人王方平傳沽酒餘杭姥得一油囊酒五㪷許樂天謝劉夢得寄糯米李浙東舞衫詩金屑䤃濃吳米釀銀泥衫穩越娃裁僧謂寶公之流北阜指鍾山南塘秦淮南岸塘也祖逖傳所從賔客義徒多為盜逖撫慰之曰比復南塘一出否盜為吏所繩逖輒擁護之又謝公時厮養逋亡多竄在南塘諸船中或欲一時搜索謝公不許曰不容置此輩何以為京師公梅詩又有風亭把酒酬孤艷雪徑回輿認暗香之句張又新水録代宗時李季卿刺湖州至維揚遇陸鴻漸謂曰陸君善茶天下所聞揚子南泠水又殊絶今者二妙千載一遇何可輕失乃命軍士信謹者挈瓶操舟深詣南泠陸潔器以候俄水至陸以杓揚水曰江則江矣非南冷者似臨岸者使稱不敢紿既而傾諸盆至半遽止又以杓揚之曰此南泠者矣使蹶然駭服曰某自南泠齊至岸舟蕩半懼其鮮挹岸水以增之處士之鑒神鑒也李大驚陸又曰楚水第一晉水最下因命吏占而次第之贊皇公李德裕博達士居廊廟日有親知奉使於京口李曰還日金山下揚子江中泠水與取一壺來其人舉棹日醉而忘之泛舟止石城下方憶乃汲一瓶於江中歸京獻之李公飲後歎訝非常曰江表水味有異於頃歲矣此水頗似建業石城下水其人謝過不隱杜牧之詩商歌如不顧歸棹越南泠自注某家在朱方揚子江界有南泠北泠據此則中泠之外又自有南泠北泠耶和王微之秋浦望齊山感李太白杜牧之齊山置酒菊花開秋浦聞猿江上哀此地流傳空筆墨昔人埋沒已蒿萊平生志業無髙論末世篇章有逸才尚得使君驅五馬與尋陳迹久裴回齊山在池州貴池縣南五里王晳齊山記云山有十餘峯其髙正等故曰齊山或謂齊刺史齊映有善政好此山因名焉按唐書載映為江西觀察使不作池州郡牧題名却有齊照當是以此得名也池陽記秋浦水源起石埭北帶郡城南走驛道為舟楫之路李景業始築大隄於南續長橋於北杜牧之齊山詩人世難逢開口笑菊花須插滿頭歸太白秋浦詩秋浦猿夜愁黃山堪白頭又君莫向秋浦猿聲碎客心張釋之傳卑之無甚髙論王褒傳有逸才荆公平生以三代自詭下視漢唐宜謂二公無髙論特以逸才許之耳次韻登微之髙齊有感臺殿荒墟辱井堙豪華不復見臨春北山漠漠雲垂地南埭悠悠水映人馳道蔽虧松半死射場埋沒雉多馴登髙一曲悲亡國想繞紅梁落暗塵辱井即景陽宫井建康志云井在臺城內陳末後主與張麗華孔貴嬪投其中以避隋兵其井有石欄多題字舊傳云欄有石胍以帛拭之作煙脂痕或云石胍色類煙脂故一名煙脂井歐陽公集古録跋尾云景陽樓下井記不著撰人名氏述隋滅陳叔寶與張麗華投井事其後有銘以為戒又有唐江寧縣丞王震井記云井在興嚴寺其石檻有序稱余者晉王廣也其文字磨滅僅可識其十一二今其文尚可讀處有云前車已傾負乘將沒也曾南豐集亦載井有篆文云辱井斯在可不戒乎并下文共十八字在井石檻上不知誰為之文臨春見和微之登髙齊注左氏井堙木刋子美賦云九天之雲下垂北山即鍾山建康實録於方山南截淮立埭即南埭賈山至言隱以金槌樹以青松為馳道之麗至此使其後世曾不得邪徑而託足焉李太白金陵懷古詩緑水絶馳道青松摧古丘齊武帝數幸琅琊城遊鍾山射雉至湖北埭雞始鳴射場蓋距埭不逺謝𤣥暉詩舞館識餘基歌梁想遺囀注妙歌者發聲聲繞梁而塵起故見梁則想其遺聲博物志昔韓娥東之齊糧匱過雍門鬻歌假食既去而響繞梁三日不絶隋薛道衡詩空梁落燕泥和微之重感南唐事叔寶傾陳衍弊梁可嗟曾不見興亡齊祠父子終身費酣詠君臣舉國荒南狩皖山非故地北師淮水失名王天移四海歸真主誰誘昏童肯用長陳書後主諱叔寶禎明三年隋師賀若弼韓擒虎進攻宫城自南掖門入執後主與王公百官入於長安梁書武帝諱衍太清三年侯景攻陷宫城縱兵大掠五月帝崩梁武帝天監十八年於無礙殿受戒大通元年幸同泰捨身中大通元年九月幸同泰寺設無遮大㑹釋御服披法衣行清淨大捨十月又設無遮會二年四月幸寺設平等㑹三年幸寺說涅槃經十一月又幸寺說般若經五年三月幸寺設四部大㑹大同元年三月幸寺設無遮㑹四月幸寺鑄十方銀像設無礙㑹二年三月幸寺設平等㑹九月幸寺設四部無礙㑹三年五月幸寺鑄十方金銅像設無礙法㑹八月幸阿育王寺設無礙法喜食十年於皇基寺設法㑹中大同元年幸同泰寺施身仍設法㑹皇太子以下奉贖太清元年三月幸寺設無遮大㑹行清淨大捨又升光嚴殿講經捨身御輦還宫幸太極殿如即位禮昭明太子傳髙祖大𢎞佛教親自講說太子亦崇信三寶遍覽衆經乃於宫內制立慧義殿專為法集之所招引名僧談論不絶太子自立三諦法身義並有新意普通元年甘露降於慧義殿咸以為至德所感焉南史江總傳總既當權任宰不持政務但日與後主遊宴後庭多為艷詩好事者相傳諷玩於今不絶又與陳暄孔範王瑳等十餘人當時謂之狎客由是國政日頽紀綱不立有言之者輒以罪斥之君臣昏亂以至於滅又建康志後主常使張貴妃孔貴人八人等夾坐江總孔範等十人預宴號曰狎客君臣酣飲從夕達旦以此為常又王轂詩君臣已在醉鄉中一面已無陳日月皖山屬舒州湘素雜記云江南伶人王感化口捷急滑稽無窮中主徙豫章至潯陽遇大風中主不悅命酒獨酌指北岸山間舟人云皖公山也愈不懌感化獨前獻詩曰龍舟萬里駕長風漢武潯陽事正同珍重皖公山色好影斜不入夀杯中中主大悅梁武帝普通六年五月壬子遣中護軍夏侯亶督壽陽諸軍侵魏六月庚辰豫章王綜奔魏魏復據彭城唐史穆宗等穆敬昏童不君鄧艾報蜀後主書龍戰虎爭終歸真主杜牧之詩集金陵懷古如今四海歸皇化兩岸蕭蕭蘆荻秋補注王逢原詩乾坤未發龍虎爭日月須歸仁義主江山本不為英雄英雄自負江山去李泰伯詩江左君臣筆力雄一為宫體便移風始知姬旦無才思秖把豳詩詠女功寄李君晜弟訪别長蘆至淮隂追寄怒水摶風雪壠髙亂流追我秪漁舠忽看淮月臨寒食想映江春聽伯勞道義終期麟一角文章已秃兔千毫後生可畏吾知子南北何時見兩髦韓詩怒水忽中裂又說楚波堆壟海中作金鼓聲土人謂之海怒當作風雨李白詩濤白雪山來豳詩七月鳴鵙注伯勞也又伯勞鳴將寒之候此詩乃云江春或稱伯勞為食母鳥非草木疏麟麕身牛尾馬足黃色圓蹄一角角端有肉音中鐘吕行中規矩毛萇詩傳云麟角所以表其德也北史學者無如牛毛成者如麟角王羲之傳贊雖秃千兔之翰聚一毫之筋李白詩書秃千兔毫詩裁兩牛腰詩柏舟髧彼兩髦注髦者髮至眉貴州虞部使君訪及道舊竊有感惻因成小詩韶山秀拔江清寫氣象還能出縉紳當我垂髫初識字看君揮翰獨驚人郵籖忽報旌麾入齊閣遙瞻組綬新握手更誰知往事同時諸彥略成塵郡國志韶州科斗勞水間有兩石對峙相去一里大小略均有似雙闕謂之韶石昔帝舜南游登此奏韶樂因以名之隋開皇九年取以名郡公詩所指韶山未知即此韶石乎或只泛言靈鷲山芙蓉岡之類也江即州之曲江舊有湞水楚公嘗守韶州公時尚幼李昉文正賞花感事詩云當時同醉花前客今日半為泉下人冲卿席上二年相值喜同聲並轡塵沙眼亦明新詔各從天上得殘樽同向月邊傾已嗟後會歡難必更想前官責尚輕黽勉敢忘君所朂古人憂樂有違行易同聲相應雖在塵沙中以得友故眼亦為之明李白詩何如月下傾金壘晉書載記石韜燕寮屬於東明觀酒酣長嘆曰人居世無常别易㑹難各付一杯開意為吾飲令必醉知後㑹復何期而不飲乎謝惠連雪賦傷後㑹之無因冲卿先得外故有後㑹之語憂則違之不以退為髙樂則行之不以進為泰示董伯懿穿橋度塹只閒行詠石嘲花亦漫成嚼蠟已能忘世味畫脂那更惜時名長千里北寒山紫白下門西野水明此地一㕓須卜築故人他日訪柴荆楞嚴經當橫陳之時味如嚼蠟元次公鹽鐵論曰無其質而外學其文若畫脂鏤氷費日損功滕王閣記煙光凝而暮山紫長干白下見上注揚雄有田一㕓思王逢原三首布衣阡陌動成羣卓犖髙才獨見君把梓豫章蟠絶壑騏驎騕裊跨浮雲行藏已許終身共生死那知半道分便恐世間無妙質鼻端從此罷揮斤莊子舉魯國而儒服然千轉萬變而不窮者獨有一儒耳荆公以令為古之天民杜詩胡人髙鼻動成羣豫章已見别注應劭曰騕裊古之良馬名赤喙𤣥身日行五千里又崔鴻十六國春秋吕光討平西域上疏曰龜兹據三十六國之中入其國城天驥龜麟騕裊丹髦萬計盈廄雖伯益更生衛賜復出不能辨也漢書天馬歌籋浮雲暗上馳逢原死時年二十八歲莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣揚雄傳􅚽人亡則匠石輟斤而不敢妄斫注古之善塗塈者也施廣領大袖以仰塗而袖不汚􅚽乃髙反又乃回反其二蓬蒿今日想紛披塜上秋風又一吹妙質不為平世得微言惟有故人知廬山南墮當書案湓水東來入酒巵陳迹可憐隨手盡欲歡無復似當時逢原嘉祐四年秋卒作此詩時死之明年衛玠傳嘗恐微言將絶今乃復聞於君陳師道懷魯直詩妙質不為平世用髙懷猶有故人知郡國志有人洗銅盆忽水中暴漲乃失盆遂投水求之即見一龍銜盆奪之而去故曰湓水又云源出青盆山因以為名韓信傳鍾離昧曰吾今死君隨手亡矣樓護傳爵祿賂遺所得亦緣手盡蘭亭記况修短隨化終期於盡杜詩可惜歡娛地都非少壯時退之祭張員外文中宵興歎無復昔時其三百年相望濟時功歲路何知向此窮鷹隼奮飛凰羽短騏驎埋沒馬羣空中郎舊業無兒付康子髙才有婦同想見江南原上墓樹枝零落紙錢風公作逢原墓志云始余愛其文章而得其所以言云云於是慨然歎以為可任世之重而有功於天下者將在於此歲路猶言年事也王褒書曰年事道盡容髮衰謝藝其黃矣零落無時陸士衡豫章行云前路既已多後塗隨年侵吕延濟注云前路謂日月李善曰前路後塗喻壽命也公代王魯公乞致仕表亦云徒以歲路之向窮不勝人言之甚衆亦是暗借阮籍塗窮字薛令之開元中為東宫侍講時官僚閒淡以詩自悼書於壁曰朝旭上團團照見先生盤盤中何所有苜蓿長闌干飯澀匙難綰羮稀箸易寬只可謀朝夕何由度歲寒上因幸東宫見焉索筆續之曰啄木觜距長鳳凰毛羽短若嫌松桂冷任遂桑榆暖令之因此謝病東歸肅宗即位詔徴之己卒出閩中名士傳埋沒如無鹽車之類又伯樂一過冀北之野而馬羣遂空韓詩中郎有女能傳業謂蔡雍也逢原妻吳氏有賢行皇甫謐髙士傳黔婁先生卒曾西來弔見尸牖下覆以布被手足不盡覆頭則足見覆足則頭見西曰斜其被則斂矣妻曰斜之有餘不若正之不足先生生而不斜死而斜之非先生意也西曰以何為諡妻曰先生以康為諡和吳御史臨淮感事柵鎖城扉曉一開柂牙車軸轉成雷黃塵欲礙龜山出白浪空分汴水來澄觀有材邀昧陋霽雲無力報姧回騷人此日追前事悲氣隨風動管灰王荆公詩注卷三十
