body:
  text: 王荆公詩注卷三宋李壁撰古詩再用前韻寄蔡天啓蔡侯東方來取友無所挾翛翛一囊衣偶以一書笈定林朝自炊有七或無策時時羮藜藿鑊大苦難燮驕須遂敢侮有甚觀駢脅左傳僖二十三年重耳及曹曹共公聞其駢脅欲觀之淡然山谷中變色未嘗輒始見類欺魄列子見南郭子果若欺魄焉而不可與接注欺魄土人也又欺魄神凝形喪外物不能窺之寒暄粗酬接從容與之語爛漫無不涉竒經可治疾祕呪可解魘漢文帝除祕呪巫醫之所知瞽史之所業載車必百兩獨以方寸攝微言歸易悟疾若髭赴鑷天機信卓越學等何足躐縱談及既往每與唐許協莊子列禦冦三命而名諸父孰協唐許注協同也唐堯許由揚雄尚漢儒韓愈真秦俠李翶答韓退之書還示云於賢者汲汲唯公與不材耳云云此秦漢間尚俠行義之一豪雋耳好大人謂狂知微乃如諜惟初造文字人惑鬼愁懾淮南子昔倉頡造書而天雨粟鬼夜哭髙誘曰自書契作詐偽萌生天知其將餓故為雨粟鬼恐為文所劾故哭也秦愚初改臯新眊仍易疊臯説文從辛從自罪人蹙鼻苦辛之狀秦以罪似皇字改為罪揚雄説以為古之理官決罪三日得其宜乃行之從晶從宜亡新以為疊字從三日大盛而改之為三田六書遂失指𨽻草矜敏捷前漢藝文志六體者古文竒字篆書𨽻書繆篆蟲書餘見吳長文新得顔公碑注晉衛常云漢興而有草書不知作者姓名至章帝時盛誰珍壇山刻共賞蘭亭帖東京一祭酒收拾偶豫愜歐公集古録有周穆王刻石跋語云右周穆王刻石曰吉日癸巳在今贊皇壇山上穆王登贊皇以望臨城置壇此山遂以為名退之作石鼓時在東都歌云濯冠沐浴告祭酒如此至寶存豈多又曰繼周八代戰爭罷無人收拾理則那少嘗妄思索老懶因退怯侯方習篆籀寸管靜嘗擪深原道德意助我耕且獵揚子耕道而得道獵德而得德又介甫字説序謂字聲形皆有義又云教必自此始能知此者則於道德之意巳十九矣天啓嘗助公檢閲修字説者昔功恐唐捐福不唐捐普門品經唐捐虛設也異味今得饁京師媚學子追師嘗劫劫陸贏淮汴糧水僦湖海艓莊子南榮趎贏糧杜詩貧窮取給行艓子逺求而近遺如目不見睫史記越世家齊使者説越王曰吾不貴用智見毫毛而不見其睫也偽鳳易恱楚真龍反驚葉尹文子楚人握山雉路人問何鳥欺之曰鳳凰也路人曰我聞鳯凰今始見矣請買千金弗與請加倍乃與之方欲獻之楚王經宿死路人不遑惜其千金惟恨不得獻王聞之感其欲獻已厚賜之家語葉公好龍壁皆畫龍形真龍為降葉公見而喪魄聞子再三歎往往心不厭或自逸而走或呿而不嗋或嗤元郎漫或訿白翁囁元結自稱浪士及有官人呼為漫郎李吉甫嘗謂白樂天為囁嚅翁鑠金徒欲銷韞玉豈愁浥鄒陽傳衆口鑠金積毀消骨浥醭也樂天詩廪粟生醭浥賢愚有定分咄汝無喋喋張釋之傳豈效嗇夫利口喋喋跨鞍隨我遊曵屣聫我跕莊子曵屣而歌商頌地理志趙地倡優女子彈絃跕屣注躡跟為跕照泉挹清泚跂石緣嵬嶪東陂數倏魚西崦追蛺蝶翳林窺摶黍藉草聽批頰爾雅注黃鳥亦名摶黍唐人詩娵咨批頰鳥壁剝扣頭蟲黃尋逺蓮鬚紅閲鄰杏靨荏苒光景流楊園忽無葉扶痾歸未久吾見喜寧帖褰裳告我去祿仕當隨牒隨牒謂補選之常牒不被超擢也蕭晨秣欵假歸騎得追躡謂言循東路復出西城堞行矣忍羇旅無魚勿彈鋏天間久索驥駿足方騰蹀周禮天子有十二間長驅忽驕矜小涴亦勿惵鵬飛九萬里勿借風一箑溟波浩難窮勉自養鱗鬛爵祿實天械天械出莊子功名為接摺寧能復與我搖漾秦淮楫附書勿辭頻隔嵗期滿篋用前韻戲贈葉致逺直講葉侯越著姓胄出實楚葉楚有葉公諸梁食采於葉僭稱公縉雲雖云逺冠蓋傳纍葉心大有所潛肩髙未嘗脅飄飄凌雲意強禦莫能懾辟雍海環流用汝作舟楫開胸出妙義可發矇起魘汲黯傳如發矇振落耳詞如太阿鋒誰敢觸其鋏慮藏用謂李雍如干將莫邪難與爭鋒聽之心凛然難者口因嗋摶飛欲峩峩鎩墮今跕跕選五君詠鸞翮有時鎩忘情塞上馬説苑塞上之人其馬亡入胡中人弔之則曰此安知不為福居數月馬歸而人賀之曰此何知不為禍適志夢中蹀若金靜無求在冶惟所挾載醪但彼惑饋漿非我諜陶詩時賴好事人載醪祛所惑莊子吾食於十漿而五漿先饋經綸安所施有寓聊自愜碁經看在手碁訣傳滿篋博物志堯造圍碁丹朱善之邯鄲淳撰碁經坐看碁勢打側寫碁圗貼擕持山林屐謝靈運登山步屐刺擲溝港艓一枰嘗自副當熱寧忘箑反嗤褦襶子但守一經笈初學記載程曉伏日詩云今世褦襶子觸熱向人家言嗤彼觸熱向人者而但自守一經笈也亡羊等殘生莊子臧與榖牧羊而俱亡其羊朽策何足摺歡然值手敵便與對匕策縱橫子墮局腷膞聲出堞樵夫弛逺擔牧奴停晏饁旁觀各技癢竊議兒女囁所矜在得喪聞此更心惵熟視籠兩手徐思撚長鬛微吟靜愔愔堅坐髙帖帖未快巖谷叟斧柯常爛浥晉王質入山斫木見二童圍棊坐觀之及起斧柯已爛矣趍邊耻局縮穿腹愁岌嶪棊經有邊腹關眼或撞關以攻或覷眼而擪或羸行伺擊或猛出追躡垂成忽破壞中斷俄連接或外示間暇伐事先和燮或冒突超越鼓行令震疊或粗見形勢驅除令逺蹀或開拓疆境欲并包總攝或僅殘尺寸如黑子著靨或橫潰解散如尸僵血喋或慙如告亡或喜如獻捷陷敵未甘虜報仇方借俠諱輸寧斷頭悔誤乃批頰遁齋間覽荆公碁品殊下每與人對局未嘗致思隨手疾應覺其勢將敗便斂之曰本圗適性忘慮反苦思勞神不如且已與葉致逺敵手嘗贈葉詩有垂成中斷之句是知公碁不甚髙詩又云諱輸悔誤是又未能忘情於一時之得喪也賈誼傳淮陽王之比大諸侯僅如黑子之著面襄公十四年告亡而已無告無罪莊公三十一年齊侯來獻戎捷遊俠傳郭解以軀藉友報仇注藉謂借助也蜀志嚴顔有斷頭將軍無降將軍五代優人敬新磨戲批莊宗頰終朝已罷精既夜未交睫翻然悟且歎此何宜劫劫孟軻惡妨行陶侃懲廢業揚雄有前言韋曜存往牒陶侃傳諸參佐談戲廢事命取博具投之江揚子焉事博乎吳韋曜傳時蔡穎亦在東宫性好博奕太子和以為旡益命曜論之晉臣抑帝手捘侯何啻涉冶城子爭道拒父乃如輒爭也實逆德豈如私鬬怯杜預傳晉武帝與中書令張華圍棋間預表適至華推枰斂手曰陛下聖明神武國富兵強吳之荒淫驕虛宜亟討之定公八年晉侯盟于剸澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將插涉他捘衛侯之手及腕衛侯怒注云捘擠也血至腕捘子對反王導常共子恱奕棋爭道衛出公輒拒其父莊公蒯聵事見哀公十五年越語范蠡云勇者逆德爭者事之末也商君傳民怯於私鬬藝成况窮苦此殆天所厭如今劉與李倫等安可躐試令取一毫亦乏寸金鑷比丘鼻毛被俗譏嫌白佛佛令蓄鑷以此待君子未與回參協操具投諸江道耕而德獵白鶴吟示覺海元公余於臨川得公此詩刻本有跋在後今附于此白鶴吟留鍾山覺海之詩也先是講僧行詳與公交舊公延居山中詳有經論每以善辨為名毁訾禪宗先師普覺奄化西菴而覺海孤立詳益驕傲師弗之爭屢求退菴席公固留不可寤詳譎妄遂逐詳而留師乃作是詩焉白鶴譬覺海也紅鶴行詳也長松普覺也覽是詩者即知公與二師方外之契不為不厚矣景齊久藏其本今命工刻石兼書其所以云白鶴聲可憐紅鶴聲可惡白鶴靜無匹紅鶴喧無數白鶴招不來紅鶴揮不去長松受穢死乃以紅鶴故北山道人曰美者自美吾何為而喜惡者自惡吾何為而怒去自去耳吾何闕而追來自來耳吾何妨而拒吾豈厭喧而求靜吾豈好丹而非素汝謂松死吾無依邪吾方捨隂而坐露江淹傳好丹而非素論文章也示安大師道人深北山為家宴坐白露眠蒼霞手扶梲杖雖老矣禰衡傳手持三尺梲杖以杖箠地大罵曹操梲他活切走險尚可追麏麚楚詞白鹿麏麚兮或騰或倚麕鹿屬麚牡鹿踞堂俯視何所有窈窕樛木垂榠楂樛木詩注木下曲曰樛廣志曰榠楂其子甚酢出西方內則云柤梨曰攢之榠楂一名蠻楂深尋石路仍有栗持以饋我因烹茶示寶覺宿雨轉歊煩朝雲擁清逈蕭蕭碧栁軟脈脈紅蕖靚默卧如有懷荒乘豈無興幽人適過我共取墻隂徑定林示道原昨登定林山俯視東南陔但見一方白莫知所從來濕銀注寒晶奩以青培堆迢迢暗靄中疑有白玉臺是夕清風興煩雲豁然開嫦娥攀桂枝顧景久徘徊杖藜忽髙秋陳迹與子陪壯觀非復昔平蕪夜莓苔我所思寄黃吉甫我所思兮在彭蠡一奩寒晶徑千里一奩言鏡奩也退之月蝕詩徑圎千里納汝腹此言湖之濶也天低紺􅉸風靜止月淡星渟尤可喜亦復可憐波浪起琉璃崩嵌湧巔絫萬斛之舟簸一葦超邑越都如歷指岸沙雪積山雲委雲半飛泉挂龍尾跳空散作平地水牛乳芳甘那得比蘿蔦冥冥蔭演迤稍上尋源出竒詭像圖釋迦祠老子釋迦佛名淨政王太子入雪山修道證果老子即周柱史老聃也臺殿暗靄相重纍石槽環除逗清泚松竹靚深無虎虺其徒翛然棄塵滓雖未應真終適巳天台賦應真飛錫以躡虛注謂得真道之人莊周傳其言汪洋自恣以適巳黃侯可與談妙理視棄榮官猶弊屣每採紫芝求石髓我欲從之倦遊徙榖城公孫能若此榖城公孫謂黃也五老聞之當啓齒寄聲五老吾念爾相見無時老將死郭璞遊仙詩粲然啓玉齒廬山有五老峯寄朱昌叔楚公有三女皆公女弟也次適朱明之仕至大理少卿昌叔其字也西安春風花幾樹花邊飲酒今何處一杯塞上看黃雲萬里寄聲無鴈去世事紛紛洗更新老來空得滿衣塵青山欲買江南宅歸去相招有此身李白晚嵗至姑孰恱謝家青山有終焉之志又劉鞏詩莫驚此度歸來晚買得西山正值春言晚應欲相依也下又有寄昌叔七言詩云買宅相招亦本謀指此句也與僧道升二首升也初見我膚腴仍潔白今何苦而老手腳皴以黑聞有道人者於今號禪伯嬲汝以一句西歸瘦如臘隋史志釋迦之苦行也諸外道邪人並來嬲惱以亂其心而不能得嬲奴了切惱也汝觀青青枝嵗寒好顔色此松亦有心豈問庭前柏庭前柏樹子趙州和尚禪話其二跋陀羅師能幻物跋陀婆羅此云賢守守護賢德復守護衆生幻穢為淨持幻佛佛幻諸天以戲之幢幡香果助設施茫然悔欲除所幻還為幻佛力所持佛天與汝本無間汝今何恭昔何慢十方世界本來空受記豈非遭佛幻佛幻維摩受記事又楞嚴經第五卷不取無非幻非幻尚不生幻法云何立是名妙蓮華贈彭器資器資名汝礪饒州鄱陽人治平二年進士第一公早所厚晚立朝風節彌邵無所左右贈詩時器資未入朝後以公薦而用鄱水滔天竟東注氣澤所鍾賢可慕文章浩渺足波瀾行義迢迢有歸處中江秋浸兩崖間遡洄與我相往還我挹其清久未竭復得縱觀於波瀾放言深入妙雲海示我仙聖本所寰楞伽我亦見髣佛嵗晚所悲行路難楞伽乃海上山下瞰大海佛説此經時指海為喻佛書言難行能行難忍能忍贈王居士武林王居士與子俱學佛以財供佛事不自費一物經言布施汝者不名福田供養汝者墮三惡道意謂以財作佛事止為有漏之因耳又疑財本身外之物取其了此理而不吝贈李士雲李子山水人而常寓城郭毫端出窈窕心手初不著我聞大梵天擎跨雞孔雀執鈴揚赤幡浩劫淨無作佳哉子能圗可以慰寂寞相與驗其真他年在寥廓洪昉禪師傳天中物皆自然化生若念食時七寶器盛食即至若念衣時寶衣亦至昉既覩竒異備言其所見乃畫為屏風凡二十四扇觀者驚駭王荆公詩注卷三
