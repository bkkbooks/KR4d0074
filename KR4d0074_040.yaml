body:
  text: 王荆公詩注卷四十宋李壁撰律詩聊行聊行弄芳草獨坐隱團蒲問客茅簷日君家有此無列子楊朱篇宋國田夫東作曝日顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞歐公文涼竹簟之暑風曝茅簷之暖日染雲染雲為栁葉剪水作梨花不是春風巧何緣有嵗華陸暢雪詩仙人寧底巧剪水作花飛溝港溝港重重柳山坡處處梅小輿穿麥過狹徑礙桑回李白詩碧草巳滿地與栁梅爭春唐人多以梅栁對言公詩舉此殆不止一聨也小輿狹徑曲盡農圃間適之趣霹靂溝建康志霹靂溝在城西五里霹靂溝西路柴荆四五家憶曾騎欵段隨意入桃花建康續志云蔣山寶公塔西北有宋興寺基基之左有桃花塢花甚盛今不復存杜詩隨意數花鬚午睡簷日隂隂轉牀風細細吹翛然殘午夢何許一黃鸝蘇子美詩樹隂滿地日卓午夢覺流鶯時一聲題齊安驛日淨山如染風暄草欲薰梅殘數點雪麥漲一川雲杜詩暄風暖景明年日許渾廣中詩未臘梅先實終冬草月自薰别賦閨中風暖陌上草薰曹松詩林殘數枝髮冷一梳風公句法類此昭文齋公自注云米芾題余定林所居因作我自山中客何緣有此名當緣琴不鼓人見有虧成蔣山有定林菴公嘗讀書於此米元章榜曰昭文齋李伯時畫公真於壁楊次公為之贊莊子齊物論有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也齋名亦取公嘗為首相之意臺上示吳願細書妨老讀長簟愜昏眠取簟且一息拋書還少年後漢循吏傳細書成文唐人詩大書文字隄防老之句韓詩抵暮但昏眠示道原久不在城市少留心悵然幽芳可攬結佇子飲雲泉攬結字見招約之職方注唐人詩别有野麋人不識一生長飲白雲泉傳神自讚此物非他物今吾即故吾今吾如可狀此物若為摹莊子田子方篇彼巳盡矣而汝求之以為有是求馬於唐肆也吾服汝也甚忘汝服吾也亦甚忘雖然汝奚患焉雖忘乎故吾吾有不忘者存注不忘者存謂繼之以日新也雖忘故吾而新吾巳至未始非吾吾何患焉故能離俗絶塵而與物無不冥也題何氏宅園亭荷葉參差卷榴花次第開但令心有賞嵗月任渠催杜牧詩舊事參差夢新程迤邐秋亦此句法草堂一山主一公持一鉢想復度遙岑地瘦無黃獨一作犢春來草更深傳燈録曾將一鉢度婆娑又僧那禪師唯一衣一鉢一坐一食奉頭陀行黃獨黃精也少陵詩黃獨無苖山雪盛題黃司理園為憶去年梅凌寒特地來閏前空臘盡渾未有花開元微之詩馬上同携今日杯湖邊新折去年梅杜詩梅蕊臘前破梅花年後多洊亭西崦水泠泠沿岡有洊亭自從春草長遙見秪青青洊亭見古詩注韓詩草色遙看近却無題永昭陵神闕淡朝暉蒼蒼露未晞龍車不可望投老涕沾衣公作永昭陵齋文云嵗隂逝矣陵闕超然永昭陵即仁宗陵旦表有云想龍駕於空衢莫知所稅瞻鳥耘於新壠但有至懷亦公作也詠穀可憐臺上穀轉目巳隂繁不解詩人意何為樂彼園鶴鳴詩樂彼之園爰有樹檀其下維穀注惡木也池上看金沙花數枝過酴醿架盛開故作酴醿架金沙秪漫栽似矜顔色好飛度雪前開髙齋詩話公薦進一二寒士位侍從初無意於大用公去位後遂參政柄因作此詩寄意雪謂酴醿劉長卿詩自矜嬌艷色不顧丹青人五栁五栁柴桑宅三楊白下亭往來無一事長得見青青五栁淵明事三楊見次韻酬龔深甫注白傅詩遙憶青青江岸上不知攀折是何人青青謂栁楊公以龔宅比陶廬移松皆死李白今何在桃紅巳索然君看赤松子猶自不長年山中隨月出山去尋雲相伴歸春晨花上露芳氣著人衣李白詩暮從碧山下山月隨人歸却顧所來徑蒼蒼橫翠微王昌齡詩朝飲花上露夜卧松下風王維詩澗芳襲人衣山月映石壁謝靈運詩花上露猶炫離騷芳菲兮襲豫送王補之行風忽作因題四句於舟中淮口西風急君行定幾時故應今夜月未便照相思戴叔倫詩未可動歸橈前程風浪急李白詩吳洲如見月千里幸相思杜牧之詩只應明月見千里兩相思再題南澗樓北山雲漠漠南澗水悠悠去此非吾願臨分更上樓建康志南澗樓在城南八里南史何求除永嘉守住南澗寺不肯詣臺乞於野外拜受見許忽一夜乘小船逃歸吳令狐楚詩適楚豈吾願思歸秋向深唐張喬詩一夜江潭風雨後九華晴望倚天秋重來此地知何日欲别殷勤更上樓被召作一本作北山題榮祿嗟何及明恩愧未酬欲尋西掖路更上北山頭此詩意兼君親言之鄭畋直禁苑詩暫來西掖路還整上清槎南浦南浦隨花去回舟路巳迷暗香無覓處日落畫橋西杜詩桃花客若至定似昔人迷韓詩欲知花島處水上覓紅雲題定林壁懷李叔時雲與淵明出風隨禦冦還燎爐無伏火蕙帳冷空山陶淵明歸去來辭雲無心而出岫列子御風而行旬有五日而後反秋興賦燎薰爐兮炳明燭江淹詩膏爐絶沈燎綺席生浮埃北山移文蕙帳空兮夜鶴怨離蔣山出谷頻回首逢人更斷腸桐鄉豈愛我我自愛桐鄉白公别草堂詩身出草堂心不出又詩眉低出鷲嶺腳重下蛇岡亦公此意桐鄉見上注江上江水漾西風江花脫晚紅離情被橫笛吹過亂山東謝希逸月賦洞庭始波木葉微脫春雨苦霧藏春色愁霖病物華幽期無可奈強嚼一杯霞鮑昭鶴賦嚴嚴苦霧皎皎悲泉選詩有愁霖唱一杯霞言酒也酒有流霞九醖歸燕馬上逢歸燕知從何處來貪尋舊巢去不帶錦書回或云此乃鄭毅夫所作杜子美詩寄書不至鴈無情文選江淹詩袖中有短詩願寄雙飛燕和惠思波上鷗翩翩白鳬鷗泛泛水中遊西來久不見夢想在滄洲晉樂志拂舞歌有白鳬鳩舞疑詩鳬字誤當作浮不然亦並二鳥也杜詩相趂鳬鷗入蔣芽屈原卜居章句將泛泛若水中之鳬兮與波上下秣陵道中口占二首經世才難就田園路欲迷殷勤將白髮下馬照清溪次句謂故廬在臨川杜牧詩弄溪終日到黃昏照數秋來白髮根其二嵗熟田家樂秋風客自悲茫茫曲城路歸馬日斜時曲城在秣陵次青陽十載九華邊歸期尚眇然秋風一乘傳更覺負林泉九華山在池州歸期謂歸江西漢書髙帝紀田橫懼乘傳詣洛陽如淳曰四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳代陳景初一作元書于太一宫道院壁官身有吏責觸事遇嫌猜野性豈堪此廬山歸去來景初黃冠師也據無為子集云碧虛子陳景元泰初入道為右街録賜號真靖主中太一宫屢請歸廬山朝廷不從大丞相舒公因真靖自言而題之云官身有吏責觸事遇嫌猜野性難堪此廬山歸去來無為子楊傑蓋碧虛子之友也聞而歎曰昔靖節先生賦歸去來以歸廬山之陽且八百年矣其辭未忘罕有繼其聲者今大丞相因子之言而及之愛子之深也夫靖節逺害於汚俗真靖引分於治朝雖其去不同而所歸則一乃追靖節遺韻而歌歸去來以貽之山雞山雞照渌水自愛一何愚文采為世用適足纍形軀李白詩秋浦錦駝鳥人間天上稀山雞羞渌水不敢照毛衣博物志山雞有美毛自愛其色終日映水目眩則溺死信乎其愚也雜詠四首故畦拋汝水新壟寄鍾山為問揚州月何時照我還列子天瑞篇拾遺穟於故畦杜詩霜中登故畦撫州城下臨水汝水合流此公言去撫而居江寧也楚公葬於江寧之牛首山今言揚州月則公意止在江寧不復回首故畦矣其二巳作湖隂客如何更逺遊漳江昨夜月送我到揚州韋應物詩嬋娟昨夜月還向波中見杜詩昨夜月同行湖隂在公金陵所居旁近其三證聖南朝寺證聖在今行宫北三年到百回不知墻下路今日幾花開杜牧詩三年得歸去知繞幾千曰許敬宗詩心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開其四桃李白一作石城塢餉田三月時柴荆常自閉花發少人知韓詩馬蹄無入朱門迹縱有春歸可得知卧聞卧聞黃栗留起見白符鳩坐引魚兒戲行將鹿女遊前兩語並見懷舒州山水呈昌叔注杜詩細雨魚兒出唐詩有時隨鹿上山行王維詩鳯王銜果獻鹿女踏花行秋興有感宿雨清畿甸朝陽麗帝城豐年人樂業隴上踏歌聲杜詩朝日謝芳甸踏歌見後元豐行注劉禹錫竹枝詞聞郎江上踏歌行題八功德水欲尋阿練若曵屐出東岡澗谷芳菲少春風著野桑法華經第五卷假名阿練若好出我等過口占示禪師去嵗别南嶽前年返泐潭臨機一句子今日遇同參南嶽屬衡州泐潭洪州皆大禪林傳燈録僧問延昭如何是臨機一句師曰因風吹火用力不多惠勤語今遵曰吾老倦於提誘汝可往謁翠微彼即吾同參也藥山上堂云我有一句子未曽説向人圓智師出云相隨來也僧問藥山一句子如何説藥山曰非言説圓智師曰早言説了也又惟儼禪師亦有一句子公案又船子和尚嘗謂同參道吾云云偶書一作雄聃題雄也營身足聃兮誤汝多捐書知聖巳絶學奈禽何桓談曰昔老聃著虛無之言兩篇薄仁義非禮樂然後世好之者尚以為過於五經自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人若使遭遇時君更閲賢知為所稱善則必度越諸子矣據談言如此則公有雄聃之目固宜莊子山木篇翔徉而歸絶學捐書揚子人而不學雖無憂如禽何捐書之弊至於可以無學故曰誤汝也送陳景初舉族貧兼病煩君藥石功長安何日到一一問歸鴻長安君也其女弟也時公在金陵持母喪包佶詩惟有貧兼病能令親愛疏泊姚江軋軋櫓聲急蒼蒼江日低吾行有定止潮汐自東西李涉詩櫓聲軋軋搖不前看他撩亂張帆走初學記潮汐有朝夕之期詳見别注張喬詩空門無去住行客自東西樓上蕩漾舟中客徘徊樓上人滄波浩無主兩槳邈難親唐人詩亂山無主鷓鴣啼又無主杏花春自紅滄波著一浩字尤佳春晴新春十日雨雨晴門始開靜看蒼苔紋莫上人衣來常建詩藥院滋苔緑雍陶詩錦文苔點點淨相寺俗呼為後籬寺在江寧縣西南六十里唐天祐十八年建國朝崇寧中改今額淨相前朝寺荒涼二十秋曾遭減劫壞今遇勝緣修錢起詩黃葉前朝寺無僧寒殿開維摩經若一劫若減一劫而供養之白樂天重修香山寺詩曽隨減劫壞今遇勝緣修減音陷將母將母𨝍溝上留家白紵隂月明聞杜宇南北總關心𨝍溝在山陽縣巳見上注白紵山在太平州桓溫領妓遊山好為白紵歌故以名之陸龜蒙詩一心如瑞麥惟作兩岐分朱朝議移法雲蘭幽蘭有佳氣千載閟山阿不出阿蘭若豈遭乾闥婆華嚴經阿蘭若名菩提場今槩以名寺乾闥婆城名也當是移蘭入城中故云晚歸岸迥重重栁川低渺渺河不愁南浦暗歸伴有嫦娥韓偓詩兩兩􅎇禽渺渺溪唐詩歸時不覺夜出浦月隨人又不愁歸路晚明月上前汀李白莫教明月去留著醉嫦娥題舫子愛此江邊好留連至日斜眠分黃犢草坐占白鷗沙杜詩軟沙欹坐穩冷石醉眠醒嚴武懶眠沙草愛風湍苕溪漁隱曰盧綸山中絶句云陽坡草軟厚如纎因與鹿麛相伴眠介甫只用五字道盡此兩句如云眠分黃犢草豈不簡而妙乎惠崇畫斷取滄洲趣移來六月天道人三昧力變化只和鉛斷取見純甫出惠崇畫注杜詩聞君掃却赤縣圖乘興遣畫滄洲趣退之詩文工畫妙各臻極異境倣佛移於斯蒲葉蒲葉清淺水杏花和暖風地偏緣底緑人老為誰紅杜牧詩蘿洞清淺水竹廊髙下風公格律倣此季文饒詠蘭蓀詩葉抽清淺水儲光羲詩蒲葉日巳長杏花日巳滋老農要看此貴不違天時韓致光詩橋下淺深水竹間紅白花隋薛道衡詩庭草無人隨意緑杜詩無人碧草芳劉夢得詩今日花前飲甘心醉數杯但愁花有語不為老人開芳草芳草知誰種緣階巳數叢無心與時競何苦緑匆匆李白詩長短春草緑緣階如有情又故交不過門秋草日上階張九齡與林甫海燕詩無心與物竸鷹隼莫相猜魯直詩黃鸝惟見緑匆匆與徐仲元自讀書臺上過定林按建康志境內讀書臺凡四處郭文舉書臺在冶城梁昭明書臺在蔣山定林寺後北髙峰上董永讀書臺在溧水縣西四十里蔡伯喈讀書臺亦在溧水縣太虛觀東北以此觀之則公所遊者必是昭明書臺蓋去定林不逺耳橫絶潺湲度深尋犖確行百年同逆旅一壑我平生河渠書河蕩蕩兮激潺湲退之詩山石犖確行徑微又搜尋得深行又炎潮度氛氲熱石行犖埆莊子世人直為物逆旅耳陶詩家如逆旅舍我如當去客晉明問謝鯤論者以君方庾亮自謂何如答曰端委廟堂使百僚凖則臣不如亮一丘一壑自謂過之病中睡起折杏花數枝二首獨卧南窗榻翛然五六旬巳聞鄰杏好故挽一枝春陸凱詩聊贈一枝春韓詩西鄰北郭古寺空杏花兩株能白紅亦此意也其二獨卧無心處一作起春風閉寂寥鳥聲誰喚汝屋角故相撩退之詩無心思嶺北猿鳥莫相撩山谷詩佳眠未知曉屋角聞晴哢送望之赴臨江黃雀有頭顱長行萬里餘想因君出守暫得免包苴袁尚傳君頭顱方行萬里魯直亦云頭顱雖復行萬里猶和傅説鹽梅羮兩公詠黃雀皆使袁尚事成湯六事包苴行歟送丁廓秀才歸汝陽風駃栁條乾駝裘未勝寒殷勤陌上日為客暖征鞍皎然詩春風潮水漫正月栁條寒歐公詩春寒漠漠侵駝褐長卿詩獨憐南浦月今夕送歸鞍送王彥魯北客憐同姓南流感似人相分豈相忘臨路更情親莊子徐無鬼篇子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者而喜及期年也見似人而喜矣不亦去人滋久而思人滋深乎送吕望之池散田田碧臺敷灼灼紅年華豈有盡心賞亦無窮古詩雖無田田葉及爾泛漣漣沈約詩山中咸可悅賞逐四時移歐公云四時之景不同而樂亦無窮東坡詩以彼無盡景寓我有限年别方邵祕校迢迢建業水中有武昌魚别後應相憶能忘數寄書言魚可寄書也古樂府呼兒烹魚中有素書武昌魚見吳志梅花墻角數枝梅凌寒獨自開遙知不是雪為有暗香來戎昱梅花詩應緣近水花先發疑是經春雪未消古樂府庭前一樹梅寒多未覺開秪言花似雪不悟有香來荆公略轉換耳或偶同也紅梅春半花才發多應不奈寒北人初未識渾作杏花看梅宛陵詩驛使前時走馬回北人初識越人梅西清詩話云紅梅清艷兩絶昔獨盛於姑蘇晏元獻始移植西岡第中特珍賞之一日貴遊賂園吏得一枝分接由是都下有二本公嘗與客飲花下賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳待北俗何淺也公笑曰顧傖父安得不然一坐絶倒王君玉聞盜花事以詩遺公云館娃宫北舊精神粉瘦瓊寒露蕊新園吏無端偷折去鳯城從此有雙身自爾名園爭培接遍都城矣苕溪漁隱曰介甫紅梅詩與元獻詩暗合然介甫句意視元獻為工病起過寶覺執手乍欣悵霜毛應更新依然舊童子却想夢前身善財童子入毗盧樓閣見諸境界種種裝嚴不可思議彌勒告言如上所見從何處來善財曰從諸佛智惠中來依諸佛智惠而住無有去處亦無住處如夢如幻不可思議爾時善財聞彈指聲從三昧起蓋善財末後證入法身見前來參訪五十二人知識皆是夢境以執手二字觀之知為善財不疑善財初參德雲比丘德雲執善財手云云楊巨源與劉評事過故證上人院詩階雪凌春積鐘煙向夕深依然舊童子相送出花隂戎昱春日遊僧院詩依然舊童子相送出花林書定林院窗道人今輟講卷裓寄松蘿夢説波羅蜜當如習氣何公自注云問逺大師師云夜來夢與説十波羅蜜淨土經各以衣裓盛衆妙花供養他方千億佛舍利佛問須菩提夢中説六波羅蜜與覺時是同是别須菩提云此義幽深吾不能説汝往問彌勒題徐浩書法華經一切法無差水牛生象牙莫將無量義欲覓妙蓮華華嚴經第二十是以法入一切法以一切法入一法而不壞其相者之所住處法華經云佛説大乘經名無量義教菩薩法佛所護念説是經巳即於大衆中結跏趺坐入於無量義處三昧春怨掃地待花落惜花輕著塵遊人少春戀踏去却尋春張籍詩不教人掃石恐損落來花離升州作相看不忍發滲淡暮潮平語罷更携手月明洲渚生建康舊名升州李白送殷溆詩相看不忍别更進手中杯回文四首碧蕪平野曠黃菊晚村深客倦留甘飲身間纍苦吟回文未審起於何時皮日休推體詩序晉溫嶠始有回文詩其二夢長隨永漏吟苦雜疏鐘動蓋荷風徑沾裳菊露濃其三迸月川魚躍開雲嶺鳥翻徑斜荒草惡臺廢冶花繁其四泊鴈鳴深渚收霞落晚川柝隨風斂陳樓映月低弦漠漠汀帆轉幽幽岸火然壑危通細路溝曲繞平田題西太一宫壁二首栁葉鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南一作草色連雲漠漠樹隂落日潭潭者非此篇歐蘇有和韻當據為正春水一作煙水神宗元豐二年導洛通汴引古索河為源注房家黃家孟王陂及三十六陂髙仰處瀦水為塘以備水不足則決以入河據此則京師亦有三十六陂未知公所指在何處詩疏曰鳴蜩蟬也又三十六陂在揚州天長縣故云想見江南蔣之竒傳可考其二三十年前此地一作路父兄持我東西今日重來白首欲尋陳迹都迷王播詩三十年前此院遊持我當作將我前漢紀欲將我安之乎西太一宫樓草際芙蕖零落水邊楊栁欹斜日暮炊煙孤起不知魚網誰家白樂天詩夏口煙孤起湘川雨半晴杜牧之詩角聲孤起夕陽樓宫詞六宅新粧促錦三宫巧仗叢花一片黃雲起處內人遙認官家此王建宫詞初非公作王荆公詩注卷四十
