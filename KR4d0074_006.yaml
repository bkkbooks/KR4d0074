body:
  text: 王荆公詩注巻六宋李壁撰古詩讀墨友人宜黄李郛嘗云介父讀墨詩終篇皆如散文但加押韻爾意以為詩益散古無此體然如韓公謝自然誰氏子詩巳如此誰為堯舜徒孔子而巳矣人皆是堯舜未必知孔子伯夷不辱身栁下援而止孔子尚有言我則異於是兼愛為無父排斥固其理孔墨必相用自古寜有此退之嘲魯連固一作顧未知之耳退之嘲魯連子詩獨稱唐虞賢顧未知之耳如何蔽於斯獨有見於彼如何蔽於斯言孔墨相用也獨有見於彼謂嘲魯連也凡人工自私翟也信竒偉漢志論諸子十家其可觀者九家而已其言雖殊譬猶水火相滅亦相生也使其遭明王聖主得其所折中皆股肱之材墨翟之竒偉亦此類也惜乎不見正遂與中庸詭退之讀荀子考其辭時有不醇粹要其歸與孔子異者鮮矣抑其猶在軻雄之間乎孔子刪詩書筆削春秋合于道者著之離于道者黜之故詩書春秋無疵又原道嗚呼其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也公詩意正類此儒者之道理一而分殊親親而仁民仁民而愛物老吾老以及人之老幼吾幼以及人之幼固自有等差之辨墨翟葢似是而非也退之醇孟軻而駮荀揚氏至其趣舎間亦又蔽於已化而不自知此語孰云俚詠言以自警吾詩非好詆退之言孟子醇乎醇者也荀與揚大醇而小疵言韓雖駮荀揚而巳乃自言孔墨必相為用是韓亦未免蔽而不自知也賈生過秦論仲尼墨翟之賢盖巳對孔子言之矣公詩詆墨葢本於孟子然孟子不云乎歸斯受之又云今之與楊墨辨者如追放豚然既入其苙又從而招之此足見聖人忠厚之至於異端未嘗終絶之也招如國武子好盡言以招人過之招言彼既歸於儒不應追咎其既徃也讀秦漢間事秦徴天下材入作阿房宫宫成非一木山谷為窮空子羽一炬火驪山三月紅能令掃地盡豈但焚人功杜牧阿房賦楚人一炬可憐焦土燒秦宫室火三月不滅幽谷引雲翳翳兮谷之幽天將雨兮田者之稠有繩于防兮有畚于溝我公不出兮誰省吾憂日暉暉兮山之下嵗則熟兮收者舞吾收滿車兮棄者滿筥誰吾與樂兮我公燕語山有木兮谷有泉公與客兮醉其間芳可搴兮甘可漱無壯無稺兮環公以笑公醉而歸兮人則喜公好我州兮殆其肯止公歸不醉兮我之憂豈其不懌兮將舎吾州公一朝兮去我我嵗嵗兮來游完公亭兮使勿毀以慰吾民兮嵗嵗之愁明妃曲二首明妃初出漢宫時淚濕春風鬢脚垂低徊顧影無顔色尚得君王不自持後漢南匈奴傳呼韓臨辭大㑹帝召五女以示之昭君豐容靚飾光明漢宫顧影徘徊竦動左右帝見大驚意使留之而難於失信歸來却怪丹青手入眼平生未曽有意態由來畫不成當時枉殺毛延壽南匈奴傳王昭君南郡人元帝以良家子選入掖庭時呼韓邪來朝帝敕以宫女五人賜之昭君入宫數嵗不得見御積悲怨乃請掖庭令求行與匈奴生二子據此乃無毛延壽事古今詞人相傳如此必别有據也又西京雜記曰元帝後宫既多不得常見乃使畫工圖其形按狀幸之諸宫人皆賂畫工多者十萬王嬙不肯遂不得見後匈奴求美女帝按圗以昭君行及召見貎為第一帝悔之而名籍巳去乃按其事畫工弃市一去心知更不歸可憐著盡漢宫衣寄聲欲問塞南事秖有年年鴻鴈飛家人萬里傳消息好在氊城莫相憶君不見咫尺長門閉阿嬌人生失意無南北阿嬌武帝陳皇后也以驕妒失寵退居長門宫山谷跋公此詩云荆公作此篇可與李翰林王右丞並驅争先矣往嵗道出潁隂得見王深父先生最承教愛因語及荆公此詩庭堅以為詞意深盡無遺恨矣深父獨曰不然孔子曰夷狄之有君不如諸夏之亡也人生失意無南北非是庭堅白先生發此徳言可謂極忠孝矣然孔子欲居九夷曰君子居之何陋之有恐王先生未為失也明日深父見舅氏李公擇曰黄生宜擇明師畏友與居年甚少而持論知古血脉未可量也其二明妃初嫁與胡兒氊車百兩皆胡姬含情欲語獨無處傳與琵琶心自知黄金捍撥春風手彈看飛鴻勸胡酒嵇叔夜送秀才入軍中詩目送飛鴻手揮五絃勸胡酒而目屬飛鴻言意不在胡也漢宫侍女暗垂淚沙上行人却回首漢恩自淺胡自深人生樂在相知心可憐青塚巳蕪没尚有哀絃留至今昭君死單于𦵏之胡中地多白草而此塜獨青范冲對高宗嘗云臣嘗於言語文字之間得安石之心然不敢與人言且如詩人多作明妃曲以失身單于為无窮之恨讀之者至於悲愴感傷安石為明妃曲則曰漢恩自淺胡自深人生樂在相知心然則劉豫不是罪過漢恩淺而虜恩深也今之背君父之恩投拜而為盜賊者皆合於安石之意此所謂壊天下人心術孟子曰无父无君是禽獸也以單于有恩而遂忘君父非禽獸而何公語意固非然詩人務一時為新竒求出前人所未道而不知其言之失也然范公傅致亦深矣桃源行髙齋詩話云荆公桃源行指鹿為馬乃二世事而長城之役乃始皇又指鹿事不在望夷宫中荆公詩追配古人惜乎用事失照管為可恨耳據公詩意槩言秦事實探禍亂之始末而互著之如詩話所言亦幾狹矣望夷宫中鹿為馬二世夢白虎齧其左驂馬殺之卜曰涇水為祟二世乃齋於望夷宫宫在長陵西北臨涇水作之以望北夷始趙髙欲為亂恐羣臣弗聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或黙或言馬以順高言鹿者高因隂中以法方髙設此驗時二世猶未至望夷宫也秦人半死長城下避世不獨商山翁亦有桃源種桃者此來種桃經幾春採花食實枝為薪兒孫生長與世隔雖有父子無君臣桃源記遂與外人間隔漁郎漾舟迷逺近花間相見驚相問世上那知古有秦山中豈料今為晉又問云今是何世乃不知有漢無論魏晉亦見陶記聞道長安吹戰塵春風回首一沾巾重華一去寜復得天下紛紛經幾秦食黍行周公兄弟相殺戮李斯父子夷三族書周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔於郭鄰史記李斯傳二世二年具斯五刑論腰斬咸陽市與其中子俱執夷三族富貴常多患禍嬰貧賤亦復難為情身隨衣食南與北至親安能常在側謂言黍熟同一炊歘見壠上黄離離遊人中道忽不返從此食黍還心悲歎息行官驅羣囚入市門妻子慟哭白日昏市人相與說囚事破家劫錢何處村朝廷法令亦寛大汝罪當死誰云寃路傍年少歎息汝貞觀元元之子孫末聮傷民俗之異於昔皆系上之化其詞微矣杜詩不過行儉徳盗賊本王臣此意尤佳送春武陵山下朝買船風吹宿霧山花鮮萬家笑語横青天綺窗羅幕舞嬋娟小鬟折花叩船舷玉琖寫酒醻金錢朱甍飛動浮雲巘天外筦簫來宛轉斷橋人行夕陽路樓觀瑠琉影中見酡顔未分驊騮催燭入坐客猶徘徊豈知閶闔門邊住春盡不見芳菲開日月紛紜車走坂少年意氣何由挽洞庭浪與天地白塵昬萬里東浮眼黒貂裘弊知幾時相見緑樹啼黄鸝榮華俯仰憂患隨命駕吾與髙人期詞氣疑非公詩又公未嘗至武陵然亦詩人之作也兼并蘇文定公云能使富民安其富而不横貧民安其貧而不匱貧富相恃以為長乆而天下定矣王介甫小丈夫也不忍貧民而深疾富民以惠貧民不知其不可也方其未得志也為兼并之詩及其得志専以此為事設青苖法以奪富民之利民无貧富兩稅之外皆出重息公私皆病矣吕惠卿繼之作手實之法私家一毫以上皆籍於官民知其有奪取之心至於賣田殺牛以避其禍朝廷覺其不可中止不行僅乃免於亂然其徒世守其學刻下媚上謂之饗上有一不饗上皆廢不用至於今日民遂大病源其禍出於此詩蓋昔之詩病未有若此酷者也三代子百姓公私無異財人主擅操柄如天持斗魁賦予皆自我兼并乃姦回姦回法有誅勢亦無自來後世始倒持黔首遂難裁秦王不知此更築懐清臺巴寡婦清其先得丹穴而擅其利數世清能守其業用財自衛人不敢犯始皇以為貞婦而客之築女懐清臺注以其行潔故號曰清禮義日已偷聖經久堙埃法尚有存者欲言時所咍俗吏不知方掊克乃為材俗儒不知變兼并可無摧利孔至百出小人私闔開有司與之争民愈可憐哉此公異日引國服為息之證以行青苖之張本也貨殖傳善者因之其次利道之其次教誨之其次整齊之最下者與之爭和吴御史汴渠詩水經大禹塞滎陽澤開渠以通淮泗名莨菪渠即汴渠也漢平帝時河汴決壊後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴曰自大梁之東引入泗連于淮至江都宫入于海亦謂之御河河畔築御道植栁煬帝巡幸乘龍舟而往江都自揚益湘南至交廣閩中公私漕運商旅軸轤相接鄭國欲弊秦渠成秦富强韓聞秦之好兵事欲罷之毋令東伐乃使水工鄭國間說秦令鑿涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間為韓延數嵗之命然渠成亦秦之利也秦以為然卒使就渠於是闗中為沃野无凶年秦以富强卒并諸侯本始意已陋末流功更長維汴亦如此浚源在滛荒歸作萬世利誰能弛其防夷門築天都横帶國之陽史記大梁城有十二門東門曰夷門侯嬴所隠處漕引天下半豈云獨荆揚貨入空外府租輸陳太倉東南一百年寡老無殘粻自宜富京師乃亦窘葢藏月令命百官謹葢藏注謂府庫囷倉所藏物此言雖竭東南之力京師亦不富也征求過夙昔機巧到莛芒說苑子路言孔子說七十君而無所通曰建天下之鐘而撞之以挺豈能發其聲乎哉東方朔客難以莛撞鐘則朔乃以挺為莛也莛音庭莖也集韻又音艇韓詩有如寸莛撞巨鐘又班固叙傳言律歴間不容翲忽翲字當作杪杪禾芒刺也御史閔其然志欲窮舟航此言信有激此水存何傷救世詎無術信傳自先王念非老經綸豈易識其方我懶不足數君材宜自强他日聽施設無乃棄篇章酬王詹叔奉使江東訪茶法利害見寄嘉祐三年九月初官既𣙜茶民私畜販者皆有禁又茶屢變嵗課日削至和中嵗市茶淮南江南兩浙荆南嵗售錢并本息計之纔百六十七萬三千餘緡官茶所在陳積縣官獲利無幾論者皆謂宜弛禁便景祐中葉清臣嘗議弛禁至是著作郎何鬲三班奉職王嘉麟上書請罷給茶本錢縱園户貿易而官收稅租錢與所在征筭歸𣙜貨務以償邊糴嘉祐四年二月三司言茶課緡錢嵗當二百四十四萬八千嘉祐二年才及二十八萬又募人入錢皆有虛數實為八十六萬而三十九萬有竒是為本錢才得子錢四十六萬九千而已其輦運縻費䘮失與官吏兵夫廩給雜費又不與焉至於園户輸納侵擾日甚小民趨利犯法刑辟益蕃獲利至小為弊甚大宜約至和之後一嵗之數以所得息錢均賦茶户恣其買賣所在收筭請遣官詢察利害以聞詔遣司封員外郎王靖等分行六路及還皆言如三司議便詔曰自唐建中始有茶禁民被誅求之困日惟咨嗟官受濫惡之入嵗以陳積歴嵗之弊一旦以除尚慮喜於立異之人縁而為奸之黨妄陳奏議以惑官司必寘明刑無或有貸初以三司嵗課均賦茶户凡為緡錢六十八萬有竒吏嵗輸縣官比輸茶時其出幾倍朝廷難之為損其半嵗輸緡錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以行邊糴自是惟臘茶禁如舊餘茶肆行天下矣此韓魏公相業君子謂此舉為然其時富公亦為相余聞古之人措法貽厥後命官惟賢材職事又習狃止能權輕重王府則多有豈嘗㩁其子而為民父母當時所經營今十已毁九漢宣紀畜産大耗什八九師古曰言十損其八九也其一雖幸在漂摇亦將朽公卿患難才州縣固多苟詔令雖數下紛紛誰與守官居甚傳舎位以聲勢受既不責施為安能辨賢不區區欲救弊萬謗不容口天下大安危誰當執其咎勞心適有罪養譽終天醜漢朱博傳齊部舒緩養名韓文送孟東野序將天醜其徳莫之顧耶何為乎不鳴其善鳴者也豈惟祖子孫教戒及朋友貴者大其領詩人歌四牡小雅節南山駕彼四牡四牡項領注項大也箋云四牡人君所乘駕今但養大其領不肯為用也至尊空獨憂不敢樂飲酒哿矣富阡陌哀哉此無糗鄉閭人所懐今或棄而走豈無濟時術使爾安畎畝故今二三公戮力思矯揉時富韓並為相王堯臣曽公亮為參知政事嘉祐四年也非仁宗在上四公之賢同處廟堂豈能有此盛舉乎永惟東南害茶法葢其首私藏與竊販犴獄常紛紏輸将一不足晁錯傳輸將之費益寡如淳注云将送也或曰資也往往死鞭杻敗陳被雜惡强賣曾非誘巳云困關市且復搔林藪將更百年弊謂民知可否出節付羣材元和聖徳詩出節少府詢謀欲經久朝廷每如此自可躋仁壽因知從今始漸欲人財阜吾宗恢竒士選使自朝右聰明諒多得為上歸析剖王程雖薄遽栁詩王程有餘暇嚴助傳事薄遽師古曰薄迫也遽速也邦法難鹵莽荘子則陽君為政勿鹵莽願君博諮諏無擇壯與耉詩皇皇者華周爰諮諏謂老若少者皆宜詢之余知茶山民不必生皆厚獨當征求任尚恐難措手孔稱均無貧此語今可取譬如輕萬鈞當令衆人負强言豈宜當聊用報瓊玖按公集有議茶法一篇與此詩意同酬王伯虎按公集有荅王伯虎書論聖人君子之行即此人也吾聞人之初好惡尚無朕帝與鑿耳目賢愚遂殊品莊子帝王篇體盡無窮而游無朕注兆也帝王篇人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死爾來百千年轉化薄愈甚父翁相販賣浮詐誰能審睢盱猴纓冠狼藉䑕穴寢滄海恐值到恐是到植莊子草木之到植者過半注植又音值立也賈誼賦聖賢逆曵兮方正到植亦音值誰念魚鼈淰鴞聲雖云惡革去在食葚魯頌翩彼飛鴞集于泮林食我桑黮懐我好音注鴞惡聲之鳥也謂食黮之故改其鳴就我以善音又張天錫謂晉公卿云桑葚甘甜鴟鴞革響乳酪養性人無妒心嗟誰職教化獨使此風稔恬觀不知救坐費大官廪予生少而戇好古乃天禀念此俗衰壊何嘗敢安枕有時不能平悲吒失食飲唯子同我病亦或涕沾衽謂予可告語密以詩來諗爛然辭滿紙秋水濯新錦窮觀何拳拳静念復􅏮􅏮賤貧欲救世無寜猶拾瀋哀公三年火富父槐至曰無備而官辦者猶拾瀋也注瀋汁也說窮且版築尹屈唯烹飪逢時豈遽廢避俗聊須噤徂年幸未暮此意可勤恁恁思也荅虞醇翁輟學以從仕仕非吾本謀欲歸諒不能非敢忘林丘臨餐恥苟得冀以盡心醻萬事等畫墁雖勤亦何收揚揚古之人彼職乃無憂感子撫我厚欲言秪慙羞送潮州吕使君韓君掲陽居戚嗟與死鄰吕使掲陽去笑談面生春當復進趙子詩書相討論退之别趙徳詩我遷於掲陽子先掲陽居廣州記云大庾始安臨賀桂陽掲陽為五嶺韓至潮州謝表戚戚嗟嗟與死日迫歐文忠坐責諌官貶夷陵令與尹師魯書云每見前世有名人當論事時感激不避誅死真若知義者及到貶所則戚戚怨嗟有不堪之窮愁形於文字其心懽戚无異庸人雖韓文公不免此累韓别趙德詩心平而行髙兩通詩與書不必移鱷魚詭怪以疑民有若大顛者材髙能動人亦勿與為禮聽之汩彛倫同朝叙朋友異姓接婚姻恩義乃獨厚懐哉余所陳韓與孟簡書潮州時有一老僧號大顛頗聰明識道理逺地無可語者故自山召至州郭留十數日實能外形骸以理自勝不為事物所侵亂與之語雖不盡解要自胷中無滯礙寄曾子固二首疑此詩公在館中時作也嚴嚴中天閣為指秘閣而言嚴嚴中天閣靄靄層雲樹為子望江南蔽虧無行路沈約詩蔽虧崑山樹平生湖海士心迹非無素老矣不自知低回如有慕傷懐西風起心與河漢注哀鴻相隨飛去我終不顧其二崔嵬天門山江水遶其下寒渠巳膠舟欲往豈無馬九域志明州東門山漢地理志所謂天門山也時恩繆拘綴私養難乞假子固以元豐元年十二月差知明州未幾改亳兼公時在鍾山此詩必子固未第游學至明時低回適為此含憂何時寫吾能好諒直世或非詭詐安得有一㕓相隨問耕者言時以諒直為詭詐如指正論為沽名買直之類也陸龜䝉詩奴顔婢膝直乞丐反以正直為狂癡王荆公詩注巻六
