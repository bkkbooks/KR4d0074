body:
  text: 王荆公詩注卷二十五宋李壁撰律詩夏夜舟中頗涼因有所感扁舟畏朝熱望夜倚危檣日共火雲退風兼水氣涼未秋輕病骨微曙浣愁腸堅我江湖意滔滔興不忘微曙浣愁腸言愁人苦夜長日將旦而稍紓言執熱得涼愈堅江湖之意杜詩詩罷聞吳詠扁舟意不忘劉長卿詩平生江海意惟共白鷗閒孤桐天質自森森孤髙幾百尋凌霄不屈巳得地本虛心嵗老根彌壯陽驕葉更隂明時思解愠願斫五絃琴枚乘七發龍門之桐髙百尺而無枝謝朓詩孤桐北窗外枝髙百丈餘書嶧陽孤桐注云特生也樂天詩亭亭五丈餘髙意猶未巳杜詩落落盤踞雖得地易緯曰桐枝濡毳而又空中難成易傷凌霄而不屈言桐身之條直公似自況云遲明欹枕浩無情蘧蘧獨遲明霜繁紅樹老雲淡素蟾清倦鵲猶三匝寒雞未一鳴故山何處所應有曉猿驚莊子蘧蘧然周也詩正月繁霜注繁多也唐詩紅樹醉秋色魏武帝詩月明星稀烏鵲南飛繞樹三匝無枝可依韓詩寒雞空在棲杜詩初鳴度三必陪友人中秋夕賞月海霧看如洗秋陽望却昏光明疑不夜清瑩欲無坤掃掠風前坐留連露下樽苦吟應到曉況有我思存解道康齊地記齊有不夜城蓋古者有日夜中照於東境故萊子立此城以不夜為名又道家亦有不夜城事庾開府舟中望月詩山明疑有雪岸白不關沙頗似此詩東門雖則如雲匪我思存慎縣修路者畚築今三嵗康莊始一修何言野人意能助令君憂勠力非無補論心豈有求十年空志食因汝起豫羞宣公十一年楚令尹蒍艾獵城沂使封人慮事平板幹稱畚築程土物注云畚盛土器爾雅一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵衢路治否君子所以觀政詩云職思其憂今野人能助邑長之憂豈不賢於竊位而曠官者哉言野人之心豈以利而為之哉特以為助上平治道路亦分所當然耳今人有毫髮勞效即希幸功賞曽野人之不若也河勢河勢浩難測禹功傳所聞今觀一川破復以二渠分國論終將塞民嗟亦已勤無災等難必從衆在吾君仁宗慶厯八年河自橫隴西徙趨德博決商胡掃後十餘年又自商胡西趨恩冀河北多被水患治平元年同判都水監張鞏奏商胡堙塞冀州界河淺房家武邑二掃由此浸潰恐一旦大決為害甚於商胡乞選官與本司相度條奏於是命鞏同三司副使張燾內侍押班張茂則乘驛與河北轉運使燕度都水監李立之行視地勢浚三股五股二河紓恩冀水災詩中所謂二渠蓋指此神宗熙寧二年七月張鞏等奏二股河上下約纍經大河泛漲無虞乞差近上知河事臣僚一兩員其講求閉塞北流利害詔遣司馬光張茂則相度以聞八月己亥光及茂則對于崇政殿光奏曰張鞏等欲塞二股河北流臣恐其費大而功不成若北流復則虛費財力其或可塞則東流淺狹必決是移恩冀深嬴之患於滄德也不若俟二三年後東流益深濶隄防稍固北流淤淺薪芻有備然後塞之為十全上曰若二三年河水分為二流何時有功光曰上約苟存東流必增北流必減借使河水常分為二於張鞏等雖無功於國家亦無害也禹時分九河漢世釃二渠河分則為患亦細臣在陛下前不隱其情時二股河東流已及六分鞏等因欲閉斷北流用為功效上意嚮之罷光不遣觀此詩公於回河之議初無所主左氏昭公元年天王使劉定公勞趙孟於雒汭劉子曰美哉禹功明德逺矣河渠書禹以為河所從來髙水湍悍難以行平地數為敗乃厮二渠以引其河注厮分也漢志諸渠往二股引取之送河間朝寺丞河間乃瀛州屬縣隸河北州亦為河間郡公孫富文墨名字世多知談笑取髙第弦歌當此時臨河薪石費近塞繭絲移緩急常愁此看君有所為漢武臨決河作歌河伯許兮薪不屬又云頽林竹兮楗石菑國語晉語趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉注云繭絲賦稅保障蔽捍修河之費備邊之費二者皆所憂也暮春春期行晼晚春意䞉芳菲曲水應修禊披香未試衣雨花紅半墮煙樹緑相依悵望夢中地王孫底不歸樂天詩一年今日最芳菲漢志三月上巳宫人並禊飲于東流水續齊諧記晉武帝問尚書摯虞曰三日曲水其義何指曰章帝時平原徐肇以三月初生三女至三日而亡一村以為怪乃相攜之水濵盥洗因水以泛觴曲水之義起於是也帝曰若如所談便非好事尚書郎束晢曰摯虞小生不足以知之臣請說其始昔周公城洛邑因流水以泛酒故逸詩曰羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劍曰令君制有西夏及秦伯諸侯乃因此處立為曲水二漢相緣皆為盛集漢宫閣名長安有披香殿合歡殿故西都賦云披香發越唐書蘇世長傳髙祖嘗宴於披香殿酒酣世長奏曰此隋煬帝所作耶何雕麗之若此髙祖曰卿諌似直其心實詐豈不知此殿是吾所造何須姦詭疑煬帝乎又江左亦有披香殿楊修詩注云在臺城後庾信詩宜春苑中春巳歸披香殿裏作春衣李白詩披香殿前花始紅樂天詩露杏紅初折煙楊緑未成句法絶相似遊北山攬轡出東城登臨目暫明煙雲藏古意猿鶴弄秋聲客坐苔紋滑僧眠䕃樾清賞心殊未已山日下西榮韓詩逺目增雙明米芾詩雲山養秋意松竹貢秋聲歐公詩盤石蒼苔留客歇淮南子曰鹽汗交流喘息薄喉當此之時得䕃樾下則脫然而喜矣禮記升自東榮降自西北榮李白淹留未盡興日落羣峰西甘泉賦列宿乃施于上榮上林賦偓佺之倫暴于南榮儀禮士冠禮篇夙興設洗直於東榮鄭氏注曰榮屋翼也唐賈公彥疏曰屋翼即今之摶風又云榮者屋棟兩頭與屋為翼若鳥之有翼故斯干詩美宣王之室云如鳥斯革如翬斯飛與屋為榮飾故曰榮吳正仲謫官得故人寄蟹以詩謝之余次其韻越客上荆舠秋風憶把螯故煩分巨跪持用佐清糟酒量寬滄海詩鋒捷孟勞甘飱飽觴詠餘事付鈞陶釋名曰二百斛曰舠三百斛曰艇畢茂世云左手持蟹螯右手持酒杯拍浮酒船中便足了一生荀子勸學篇蟹有六跪而二螯注跪足也韓子以刖足為刖跪螯首上如鉞者說文螯一作􅚺大業拾遺擁劍似蟹而小一螯偏大禮記內則篇飲重醴稻醴清糟黍醴清糟粱醴清糟注糟醇也清泲也今公以對巨跪蓋不用古注榖梁僖公元年公子友謂莒拿曰吾二人不相說士卒何罪屏左右而相搏公子友處下左右曰孟勞孟勞魯之寶刀也公子友以殺之劉義詩酒腸寬似海陳師道宰烏程縣嘗聞大丘長德不負公卿墟墓今千載昆雲亦一城本懷深閉蓄餘論略施行故自有仁政能傳家世賢烏程屬湖州見下注陳實傳實為太丘長修德清淨子紀為大鴻臚紀子羣為魏司空天下以為公慚卿卿慚長爾雅釋親云來孫之子為昆孫昆孫之子為仍孫仍孫之子為雲孫注云昆後也雲者言輕逺如浮雲城恐作成左氏有田一成冬至都城開博路佳節一陽生喜見兒童色歡傳市井聲幽閒亦聚集珍麗各攜擎却憶此年事關商閉不行博路未詳豈謂博易時節為樂乎易復卦先王以至日閉關商旅不行言復貴靜而今人事游燕與古不同湯泉寒泉詩所詠獨此沸如蒸一氣無冬夏諸陽有廢興人游不附火蟲出亦疑氷更憶驪山下歊然雪滿塍詩凱風爰有寒泉在浚之下言此泉四時皆熱不同諸陽有廢興消息之迭運朱泚反奉天危蹙嚴震遣大將張用成奉迎用成有反計㑹震牙將馬勛嗣知其謀隂令焚章館外士爭寒附火開元天寶人事云張九齡見朝士趨附國忠以求官語人曰此曹皆向火乞兒一旦火盡灰冷當凍裂肌體暴骨溝中矣祿山之亂果然向火言附炎也夏蟲不可以語氷孫綽天台賦哂夏蟲之疑氷歊以喻溫也唐溫泉在華清宫時移事改非復玉甃委於溝塍也讀鎮南邸報癸未四月作賜詔寬言路登賢壯陛廉相期正在治素定不煩占衆喜䕫龍盛豫虞絳灌憸太平詎可致天意慎猜嫌仁宗慶厯三年三月吕夷簡罷相上遂欲更天下弊事增諫官員以王素余靖歐陽修為之又除蔡襄知諫院風采傾天下四月甲辰韓琦范仲淹並自陜西召為樞密副使乙已罷夏竦令赴忠武本鎮以杜衍代之富范韓杜同居政府公詩謂癸未嵗四月作即此時也是月石介亦作慶厯聖德頌賈誼曰陛九級上廉逺地則堂髙陛亡級廉近地則堂卑髙者難攀卑者易陵師古注廉側隅也揚子君子在治若鳯文帝以賈誼任公卿之位絳灌東陽侯之屬盡害之乃毁誼出為長沙傅荆公於羣賢進用之初而深虞讒慝蓋當時有沮抑韓范之來者故於詩寄意云韓詩賢能日登御黜彼傲與憸韓范之召富公上言近降敕命韓琦范仲淹並授樞密副使仰認聖意不聽讒毁擢用孤逺太平不難致也議者云西冦未殄亦須藉才願一名召來使處於內一名就授樞副且令在邊以臣愚慮亦謂允當然近日忽聞有異議者謂樞密使副不可令帶出外任異時武官援此為例深不穩便是乃巧為其說惑君聽抑賢才奸邪用心一至於此又蔡襄亦有奏疏論異議者沮抑二公荆公此詩殆謂是也次韻張子野秋中久雨晚晴天沈四山黑池漲百泉黃苦濕欲千里願晴非一鄉掃除供晚色洗刷放秋光菊泣花猶重粳肥穗稍長積隂消户牖返照媚林塘想見陽臺路神歸髮彩涼杜詩日下四山隂百泉見自白土村入北寺注杜牧晚晴賦雨晴秋容新沐兮欣繞園而細履養生論徑刷理鬢江斆表左右整刷以疑寵見嫌李義山細雨詩楚女當時意蕭蕭髮彩涼射亭亭在撫州金溪縣即飲歸亭也曽南豐作記云金溪尉汪君名遘為尉之三月斥其四垣為射亭既成教士於其間而名之曰飲歸之亭以書走臨川請記於豫請數反不止豫之言何可取汪君徒深望豫也既不得辭乃記之曰射之用事巳逺其先之以禮樂以辨德記之所謂賔燕鄉射大射之射是也其貴力而尚技以立武記之所謂四時教士貫革之射是也古者海內洽和則先禮射而弓矢以立武亦不廢於有司及三代衰王政缺禮樂之事相屬而盡壞揖讓之射滋亦熄至其後天下嘗集國家嘗閒暇矣先王之禮其節文皆在其行之不難然自秦漢以來千有餘嵗衰微絀塞空見於六藝之文而莫有從者由世之苟簡者勝也爭奪興而戰擒攻取之黨奮則彊弓疾矢巧技之出不得而廢其不以勢哉今尉之教不比乎禮樂而貴技力其衆雖小然而旗旄鐲鼓五兵之器便習之利與夫行止步趍遲速之節皆宜有法則其所教亦非獨射也其幸而在乎無事之時則得以自休守境而填衛百姓其不幸殺越剽攻駭驚閭巷而相逐於大山長谷之間則將犯晨夜䝉霧露陷厄馳危不避矢石之患湯火之難出入千里而與之有事則士其可以不素教哉亭之作所以教士汪君又謂古者師還必飲至於廟以紀軍實今廟廢不設亦欲士勝而歸則飲之於此遂以名其亭汪君之志與其職可謂協矣或謂汪君儒生尉文吏以禮義禁盜宜可止顧乃習鬬而喜勝其是歟夫治固不可以不兼文武而施澤於堂廡之上服冕搢笏使士民化姦宄息固亦在彼而不在此也然而天下之事能大者固可以兼小未有小不治而能大也故汪君之汲汲於斯不忽乎任小其非所謂有志者耶因射搆兹亭序賢仍閲兵庶民觀禮教羣冦避威聲城壘前相壯溪山勢盡傾宜哉百里地桴鼓未嘗鳴詩行葦序賔以賢箋云謂以射中多少為次第尹賞傳城中薄暮塵起桴鼓不絶注桴鼓椎也寄王補之平居相值晚況復道塗留今我思揮麈逢君為艤舟人情方慕貴吾道合歸休吏責真難塞聊為泮水游孫安國與殷中軍語麈尾脫落見别注艤舟見上注莊子逍遙遊許由曰歸休乎君豫無所用天下為家語孔子曰匪兕匪虎率彼曠野吾道非乎奚為而至於此補之嘉祐二年進士嘗從公學時方以經術造士公言君可教國子命且下而補之死事見墓志此詩疑公再入相時道逢補之詩以泮水之游而實未到官也死於熙寧二年冬寄謝師直師直陽夏公之子景初師直之弟也范忠宣志師厚墓云師厚知越州餘杭縣有異政是時荆公王介甫宰明之斳縣知樞密院韓玉汝宰杭之錢塘公弟師直宰越之㑹稽環吳越之境皆以此四邑為法處士孫侔為文以紀之劉貢父載師直語云王介甫之知人也能知中人以上者自中人以下乃或不能知由其性韻獨髙而然乎觀此則師直與介甫分皆素結也湖海三年隔相逢塞路中黃金酌卯酒白髮對春風所願乖平日何知即老翁悠悠越溪水好在釣魚筒白詩午茶能破睡卯酒善消愁又麴神寅日合酒聖卯時歡又明日早花應更好心期同醉卯時杯陸龜䝉漁具詩十篇釣筒其一也詩云短短截筠筒悠悠卧江色篷差櫓相應雨慢煙交織須㬰中芳餌迅疾如飛翼彼竭我還浮君看不爭得次韻留題僧假山態足萬峰竒功才一簣微愚公誰助徙靈鷲却愁飛竇雪藏銀鎰簷曦散玉輝未應頽蟻壤方此鎮禪扉物理有真僞僧言無是非但知名盡假不必故山歸杜甫假山詩一簣功盈尺三峰意出羣列子湯問篇北山愚公懲出入之迂謀畢力平險鄰人有男始齕跳往助之臨安錢塘西十二里有靈鷲山晉咸和中有西乾梵僧登此山歎曰此武林山是中天竺國靈鷲山之小嶺不知何年飛來此乃創靈隱寺按靈鷲山在天竺國胡語曰耆闍崛山山是青石頭似鷲故名退之南山詩或翼若摶鷲張良傳賜金百鎰珠二斗服䖍曰二十兩曰鎰師古曰秦以鎰名金若漢之論斤也韓子曰鑠金百鎰盜跖不摶符子曰東海有鼇焉冠蓬萊而浮於滄海有蚳蟻聞而悅之欲觀鼇焉月餘日鼇潛不出羣蟻將反遇長風激浪海水沸地雷震羣蟻曰此將鼇之作也數日風止羣蟻曰彼之冠山河異我之戴粒逍遙封壤之顛伏乎窟穴之間也韓子曰千夫之堤以螻蟻之穴而潰淮南子曰千丈之隄以螻蟻之穴漏抱朴子曰千丈之陂潰於一蟻之穴詩意謂物無真假是非之辨一歸於空盡取僧說也擬和御製賞花釣魚雲暖蓬萊日風酣太液春水光承步輦花氣入鈎陳伏檻留清蹕傳觴屬從臣霏香連釣餌落葉亂游鱗鎬飲恩知厚衢樽賜願均更看追夏諺先此詠逢辰三秦記秦始皇作長池築土為蓬萊山刻石為鯨魚長二百丈漢武帝作建章宫為千門萬户有鳯凰闕髙二十餘丈中有蓬萊方丈瀛洲壺梁象海中神山南有玉堂壁門大鳥之屬立神明臺井幹樓度髙五十餘丈輦道相屬焉唐杜審言有蓬萊三殿侍宴應制詠南山詩太液池見七言律詩注班固傳周以鈎陳之位注云鈎陳紫宫外星也官衛之位亦象之大業雜記云隋大業三年二月內史令元夀奏進賜物百假先是何稠奏以為王者所在居停之處上取則於𤣥象紫微宫衛名曰鈎陳前代帝王雖行幸次舍未有製之者書史但有虛名而莫能傳其法請與巧思之人詳論今以木為之朱色綺文體勢雜合如百子帳骨鈎紐相牽周匝數重環繞行宫耳李義山詩渚蓮參法駕沙鳥犯鈎陳犯不佳伏檻見前注天子出警入蹕蓋鹵簿內犦弰捧也以黃金塗其末執之以扈蹕見漢注詩王在在鎬豈樂飲酒江總秋日侍宴詩鎬飲詎能方淮南子曰聖人之道猶中衢而設樽即過者斟酌多少不同各得其所宜張說應制詩侍酌衢樽滿夏諺曰吾王不游吾何以休昭陵賞花釣魚詩蘋風縈釣線碧沼躍游鱗鎬飲君臣洽恩光動搢紳時景祐三年和吳沖卿雪霽紫宸朝虎士開閶闔雞人唱九霄雲移銀闕角日轉玉廊腰帚動川收潦靴鳴海上潮舞袍沾宿潤拜笏擁殘飄賜飲人何樂歸嘶馬亦驕低徊但志食吟詠得逍遙周禮虎賁氏虎士八百人舍則守王門王在國則守王宫周禮雞人掌大祭祀夜呼旦以嘂百官嘂古弔反李賀詩雞人唱罷曉壠􅀈鴉啼金井下梧桐東坡手澤余來黃州聞光黃間人二三月皆羣聚謳歌其詞固不可分而音亦不中律吕但宛轉其聲髙下往返如雞唱耳與朝堂中所聞雞人傳漏微有相似而極鄙野漢官儀宫中不畜雞汝南出長鳴雞衛士候朱雀門外専傳雞鳴又應劭曰楚歌今雞鳴歌也晉太康地道記曰後漢固始鮦陽公安細陽四縣衛士習此曲於闕下今雞鳴歌是也顔師古不考本末妄破此說今余所聞豈亦雞鳴之遺聲乎今士人謂之山歌云孔平仲雪詩斜拖闕角龍千丈淡抹牆腰月半稜帚以掃雪言其多如潦之縮百官入賀者皆著靴至殿其聲如海潮之上杜甫驄馬行詩顧影嬌嘶似矜寵和吳沖卿集禧齊祠緘封祝辭密占寫御名真帝坐遙臨物星圖俯映人風含煙外節月㸃霧中茵沈藿升煙逺槐檀取燎新羽衣將一作歸寂寞金䤹立逡巡却想來時路還疑隔一塵左氏其祝史陳信於鬼神無愧辭退之南海廟碑冊有皇帝名乃上所自署晉天文志云云太微天子庭五帝之坐也黃帝坐在太微中其神曰含樞紐四帝星夾黃帝坐東方靈威仰南方赤熛怒西方白招矩北方叶光紀謂之五帝坐帝坐雖遙星圖實近蓋指齊壇也升煙即燔柴與蕭薌之義周禮夏官司爟掌行火政變國火以救時疾注云春取榆栁之火冬取槐檀之火漢郊祀志天子刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印盧拱觀醮詩羽衣凌縹眇瑤載輾虛空後漢輿服志乘輿建大旗十有二斿畫日月升龍駕六馬象鑣鏤錫金鑁方釳插翟尾注云蔡雍獨斷曰鑁者馬冠也如三華形在馬髦前方釳鐵也在馬騣後後有三孔插翟尾其中按說文鑁當作􅦒亡狗切釳許迄反又魚乞切别本一作盾異人丁約隱於卒伍韋子威師之丁謂韋曰郎君得道尚隔兩塵問其故約曰儒謂之世釋謂之劫道謂之塵姚合過僧院詩自想歸時路塵埃復幾重送周都官通判湖州淥水烏程地青山顧渚濵酒醪猶美好茶荈正芳新聚泛樽前月分班焙上春仁風已及俗樂事始關身橘柚供南貢楓槐望北宸知君白羽扇歸日未生塵烏程湖州屬縣吳孫皓嘗封烏程侯郡國志云古烏程氏居此能醞酒故以名縣張景陽七命荆南烏程豫北竹葉顧渚在長興縣西北三十里昔吳王夫槩顧其渚次原隰平衍為地邑之所今崖谷林薄之中多産茶茗以供嵗貢見寰宇志陸羽茶經云南方之嘉木一曰茶二曰檟三曰蔎四曰茗五曰荈唐制湖州造茶最多謂之顧渚貢焙嵗造一萬八千四百片大厯後始有進奉建中二年袁髙刺郡進三千六百串并詩一章刻石在焙大抵皆諷諫之辭也公詩言仁風樂事其意亦猶是爾謝𤣥暉酬晉安王詩南中榮橘柚景福殿賦云楓槐被宸晉顧榮傳廣陵相陳敏反榮說甘卓共起兵攻敏敏率萬餘人出榮麾軍以白羽扇其衆潰乃平之庾亮據上流擁強兵趍向者多歸之王導內不平常遇西風塵起舉扇自蔽曰元規塵汚人雙廟公自注云張巡許逺兩公天下駿無地與騰驤就死得處所至今猶耿光非死之難處死之難言二公死於忠義為得其處所也陳湯傳亡逃分竄死無處所漢贊欒布哭彭越田叔隨張敖赴死如歸彼誠知所處雖古烈士何以加哉干寶論姜維古之烈士見危授命投死如歸非不愛死也固知命之不長而懼不得其所也杜牧之詩和鼎顧余云我死有處所退之祭田橫墓文自古死者非一而夫子至今有耿光中原擅兵革昔日幾侯王此獨身如在誰令國不亡杜詩洗兵馬天下盡化為侯王曹操言設使國家無有孤不知當幾人稱帝幾人稱王言忠義死節之人為世髙仰終古如存北風吹樹急西日照窗涼志士千年淚泠然落奠觴苕溪漁隱曰半山老人雙廟北風西日之句細味之其託意深逺非止詠廟中景物而已蓋巡逺守睢陽時安慶緒遣突厥徑兵攻之日以危困所謂北風吹樹急也是時肅宗在靈武號令不行於江淮諸將觀望莫肯救之所謂西日照窗涼也此殊得老杜句法如老杜題蜀相廟詩云映階碧草自春色隔葉黃鸝空好音亦自别託意在其中矣和子瞻同王勝之游蔣山公自序云子瞻同王勝之游蔣山有詩余愛其峰多巧障日江逺欲浮天之句因次其韻金陵限南北形勢豈其然楚役六千里陳亡三百年魏帝臨江曰嗚呼固天所以限南北而分中外也魏雖有武騎千羣無所用之荀子仲尼篇善用之則百里之國足以獨立不善用之則楚六千里地而為讎人役隋師伐陳髙熲謂薛道衡曰今兹大舉江東必可克乎對曰克之嘗聞郭璞有言江東分王三百年復與中國合此數將周江山空幕府風月自􅘑船主送悲涼岸妃埋想故蓮建康有幕府山在郡西二十五里晉琅琊王初過江丞相王導建幕府因以為名杜牧之詩􅘑船一棹百分空建康圖經桃葉渡在秦淮口桃葉者王獻之愛妾也有妹曰桃根獻之詩曰桃葉復桃葉渡江不臨用楫但渡無所苦我自楫迎汝不用楫者橫波急也嘗此渡歌送之楊修有詩曰桃葉桃根栁岸頭獻之才調頗風流相看不語橫波急艇子翻成送莫愁此主翁送妾至秦淮岸頭耳齊東昏嬖潘淑妃刻金蓮花於石上令潘妃行之自言步步生蓮花臺傾鳯久去城踞虎爭偏司馬壖廟域獨龍塔層巔金陵有鳯臺山宋元嘉鳯凰集於此乃築臺於山以表嘉瑞李白鳯去臺空江自流諸葛亮云鍾山龍盤石城虎踞真帝者之都吳始築石頭城鼂錯為內史門東出不便更鑿一門南出南出者太上皇廟堧垣也司馬謂晉之故祠獨龍山名森疏五願木蹇淺一人泉梲杖窮諸嶺籃輿罷半天朱門園緑水碧瓦第青煙墨客真能賦留詩野竹娟輿地志鍾山少林木宋諸州刺史罷還者栽松三十株下至郡守各有差山之最髙峯北有五願樹乃柞木也建康志一人泉在蔣山北髙峯絶頂僅容一勺挹之不竭傳燈録云江南相馮延已與數僧游鍾山至一人泉問一人泉許多人爭得對曰不教缺少延已不肯乃别云誰人缺少法眼别云誰是不足者棁杖見示安大師注杜詩名園依緑水野竹上青霄公此聨句法甚新必有所本東方朔諫廣上林斥而營之垣而囿之揚雄傳雄上長楊賦因筆墨之成文章故藉翰林以為主人子墨為客卿以風送鄆州知府宋諫議名庠字公序景文之兄諡元憲寶元中以右諫議大夫參知政事出知揚州徙鄆州為相再判鄆州此言諫議則是作參時也言行録元憲初執政遇事輒分别是非可否用是斥退及再登用遂浮沈偷安云盛世千齡合宗工四海瞻天心初籲俊雲翼首離潛仁宗初即位詔禮部貢舉公序兄弟同試禮部祁初為第一章獻太后曰弟可先兄乎乃以庠為第一而祁為第十初除大理評事同判襄州籲俊出尚書易乾九二見龍在田王輔嗣注云出離隱故曰見龍德望完圭角儀形壯陛廉徐鳴蒼玉佩盡校碧牙籖韓文石鼎聨句磨礱去圭角陛廉見讀鎮南邸報注蔡雍釋誨曰當其無事也則舒紳緩佩鳴玉以步綽有餘裕玉藻大夫佩水蒼玉而純組綬注玉有水蒼者視其文色所似公序嘗為直史館修起居注唐六典四庫書共十二萬五千九百六十卷其經庫書緑鈿白牙軸黃帶紅牙籖史庫書白鈿青牙軸縹帶緑牙籖子庫書雕紫檀軸紫帶碧牙籖集庫書緑牙軸朱帶白牙籖以别之綸掖清光注鑾坡茂渥霑文明誠得主政瘼尚煩砭景祐元年公序擢知制誥五年召入翰林為學士綸掖謂西掖縯綸之地猶言綸闈綸閣之類唐制駕在大內則於明福門內置學士院駕在興慶宫則於金明門內置學士院德宗時移院於金鑾殿之坡上故世號鑾坡右府參機務東塗贊景炎廟謨資石畫兵略倚珠鈐坐鎮均勞逸齊居養智恬謳謠喧井邑惠化洽一作穆蒼黔右府謂樞府參機務者謂參機密之務也東京賦乃羡公侯卿士登自東除五臣作塗塗階也典引揚洪輝奮景炎注曰景明炎盛也前漢胸奴傳奇譎之士石畫之臣甚衆珠鈐猶玉鈐謂兵書也此聨言在中書及樞府時遇律朝章舊疏恩物議僉通班三殿邃徙部十城兼禮記王制有功德于民者加地進律注律法也寶元初或誣公與鄭戩等為朋黨遂罷政居外庠先忤夷簡以本官知揚州旋加資政殿學士改知鄆州兼京西安撫使申甫周之翰龜䝉魯所詹地靈奎宿照野沃汶河漸詩小雅嵩髙維申及甫維周之翰箋云申申伯甫甫侯也魯頌閟宫泰山巖巖魯邦所詹奄有龜䝉遂荒大東注詹望也龜山也䝉山也地志云鄆地連鄒魯境分青齊資學通儒無絶今古寰宇記兖鄆皆禹貢兖州之域星分皆屬奎婁汶河出於兖州乾封縣述征記曰泰山郡水皆名曰汶今凡五汶有北汶瀛汶牟汶柴汶浯汶源别而流同其流亦經鄆州首路龍旗盛提封虎節嚴賜衣纒錦一作紫艾衛甲綴朱綅韓信傳北首燕路注首趣向也音式救切又商頌𤣥鳥龍旗十乘大糦是承魯頌閟宫龍旗承祀六轡耳耳箋云交龍為旗也十乘者二王之後八州之大國晉書輿服志公旗八旒侯七旒卿五旒皆畫降龍又前漢刑法志提封萬井李竒曰提舉也舉四封之內也又周禮地官掌節凡邦國之使節山國用虎注云山多虎以金為節鑄象焉漢銅虎符亦其遺制也後漢張奐遺命曰吾前後仕進十腰銀艾注銀印緑綬也以艾草染之故曰艾也又獲嘉侯馮石安帝寵之賜紫艾綬注云艾即盩緑色也其色似艾魯頌閟宫貝胄朱綅注貝胄貝飾也朱綅以朱綅綴之說文云線也息廉反海谷移文省溪堂燕豆添班春回紺幰問俗卷彤襜鄆本齊地實表東海故云海谷鄆州有溪堂退之為馬總作溪堂詩前漢宣帝五鳯中分遣使者巡問風俗紺幰彤䄡皆諸侯之制又後漢輿服志注云舊典傳車驂駕垂赤帷裳惟郭賀為冀州敕去䄡帷使百姓見其容服以章有德又賈琮為冀州刺史傳車垂赤帷裳琮升車褰帷曰刺史當逺視廣聽糾察善惡何反自掩塞乎儀制今曰諸車一品青油纁道幰朱裏朱絲絡網三品以上青道幰朱裏五品以上青幰碧裏六品以下皆不得用幰通俗文曰張布曰幰舟楫商巖命熊羆渭水占治裝行入覲金鼎重調鹽渭水太公事曹參傳聞蕭何薨促舍人治裝曰吾且入相矣又詩韓奕以其介圭入覲于王書說命若作和羮爾為鹽梅元憲慶厯八年為樞密使皇祐元年拜兵部侍郎同中書門下平章事集賢殿大學士三年御史論公在政府無所建明罷為刑部尚書觀文殿大學士知河南府徙許州嘉祐三年復入拜樞密使封莒國公數求去位乃以河南二城節度使同平章也事判鄭州又徙相州公先二政後入相真所謂重調鹽見逺亭上王郎中此詩元有十韻舊本却作絶句刋今得全篇足之髙亭豁可望朝暮對溪山野色軒楹外霞光几席間樹侵蒼靄沒鳥背夕陽還草帶平沙濶煙籠别戍閒項斯詩逢人鳥背飛唐詩髙閣臨江上重陽古戍閒圃畦花氣合田徑燒痕斑樵笛吟晴塢漁帆出暝灣張祜詩山晴花氣逺劉長卿詩春入燒痕青登臨及芳節宴喜發朱顔夾砌陳旌旝褰簾進佩環漢淮陽王傳今大王結以朱顔詩魯侯宴喜杜牧詩絳帷環佩列神仙觀風南國最應宿紫宸班康樂詩名舊蕪音詎可攀後漢顯宗紀郎官上應列宿出宰百里王荆公詩注卷二十五
