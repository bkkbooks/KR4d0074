body:
  text: 王荆公詩注巻十七宋李壁撰古詩和平甫舟中望九華山四十韻楚越千萬山雄竒此山兼盤根雖巨壯其末乃修纎去縣尚百里側身勇前瞻蕭條煙嵐上縹緲浮青尖青尖峯也徐行稍復逼所矚亦巳添精神去亹亹氣象來漸漸詩漸漸之石注士衘反公必别有所據又楚詞涕漸漸其若屑卸席取近岸卸席謂落帆也移船傍蒼蒹窺觀坐窮晡未覺晷刻淹江空萬物息四面波瀾恬峩然九女鬟争出一鏡奩卧送秋月没起看朝陽暹暹日光升進也游氛蕩無餘瑣細得盡覘凌空翠纛舞照影寒鋩銛言山出在水中如劍鋩之寒且銛利也冢木立紺髪崖林張紫髯山釋名山頂爲冢非墳冢人冢李羣玉詩紺髪初簪玉葉冠孫權有紫髯將軍之號變態生倐忽雖神詎能占當留老吾身少駐誰云饜惜哉秦漢君黄屋上衡灊始皇三十七年行至雲夢望祀舜於九疑山紀不明言嘗登衡山也漢武元封五年冬南廵至於盛唐望祀虞舜於九疑登灊天柱山應劭曰灊音潛同南嶽霍山在灊灊縣名屬廬州等之事嬉遊捨此何其㢘我疑二后荒神物久已厭埋藏在雲霧不欲登昏憸秦之君臣上昏而下憸又疑避褒封蔽匿以爲謙或是古史書脫落簡與籖當時備廵游今不存緗縑終南秦之望太山魯所詹天王與秩祭俎豆羅醯鹽苟能澤下民維此遠亦沾方今東南旱土脉燥不黏尚無膚寸功豈免竊食嫌神莽吾難知士病吾能砭文章巧傅㑹漢袁盎贊盎雖不好學亦善傅㑹智術工飛箝鬼谷子有飛箝一篇飛箝謂縱横之學薦寶互珪璧論材自楩柟苟以飾婦妾謬云活蒼黔蒼生黔首合而言之豈如幽人樂兹山謝閭閻穴石作户牖垂泉當門簾尋竒出後徑覽勝倚前簷超然徃不返舉世徒呫呫竇嬰呫呫自喜耳髙興寄日月千秋伴烏蟾遐追商洛翁秦火不能炎近慕楚穆生竟脫楚人鉗楚王戊不設醴穆生云王之意怠不去楚人將鉗我於市吾意竊所尚人謀諒難僉重和誰謂九華遠吾身未嘗詹九華山録云此山竒秀髙出雲表峯巒異狀厥數有九故號九子山李白因游江漢睹其秀異遂更號九華山唱篇每起予予口安能箝憶在秋浦北空江上新蟾光潔瀉一鏡迴環兩隄奩一鏡奩曲堤萬瓦跳猛雨杜牧秋浦詩即池州也露坐引衣襋衣襋衣領也風行欹帽簷維舟當此時巨細得盡瞻試嘗論大略次乃述微纎此山廣以深包蓄萬物兼嘘雲吐霧雨生育靡不漸巍然如九皇德澤四海沾此山相後先各出羣峰尖毅然如九官羅立在堂亷挺身百辟上附麗無姦憸此山髙且寒五月不覺炎草樹凄已緑氷霜尚涵淹頽然如九老白髪連蒼髯白樂天嘗與胡杲狄兼謨等燕集皆髙年不仕者時人慕之繪爲九老圖此山當無雲秀色鬱以添姹然如九女靚飾出重簾靚飾及九女並見上注道書汞為姹女珮環與巾裾紺玉青紈縑遠之妍西施近或醜無鹽句踐所獻吳之美女為西施無鹽女齊之醜婦人也宣王召見拜為王后齊國大安變態不可窮詩者徒呫呫我初勇一徃役世難安恬浪荒不走職民瘼當誰砭乖離今數旬夢想欲窺覘自期得所如何啻釋囚鉗念昔太白巔下視海日暹公嘗宰鄞縣有太白嶺朅來天柱游屐齒尚苔黏猶之健飲食屢饗亦云饜胡為慕攀踏已憊且不嫌豈其仁智心山水固所潛男兒有所學進退不在占功名苟不諧廊廟等閭閻況乃掄椽杙其誰辨楩柟歸歟巖崖居料理帶與籖詩謂所取皆樸􅈪小才又何楩柟之辨籖帶書飾也得石坐兀兀逢泉飲厭厭取舎斷在獨豈必詢謀僉子語實慰我寧殊邑中黔左傳邑中之黔實慰我心玉枝將在山當倚以葭蒹世說蒹葭倚玉樹詩力我巳屈鋒鋩子猶銛扶傷更一戰語汝其無謙次韻和中甫兄春日有感雪釋沙輕馬蹄疾北城可游今暇日濺濺溪谷水亂流漠漠髙原草争出嬌梅過雨吹爛漫幽鳥迎陽語啾唧分香欲滿錦樹園剪綵休開寶刀室隋煬帝大業元年築西苑宫樹秋冬凋落則剪綵為葉綴於枝條色渝則易以新者常如陽春沼内亦剪綵為荷芰芡菱乘輿游幸則去水而布之刀室謂鞘也胡為我軰坐自苦不念兹時去如失飽聞髙徑動車輪甘卧空堂守經帙淮蝗蔽天農久餓越卒圍城盜少逸至尊深拱罷簫韶元老相看進刀筆賈誼傳俗吏所務在於刀筆箱篋注刀所以削書札公譏柄國者亦甚矣盲風生物尚有意盲風疾風也盲風而言生物未詳壯士憂民豈無術不成歡醉但悲歌回首功名古難必收鹽州家飛符來比櫛詩其比如櫛如櫛之相比廹也海中收鹽今復密窮囚破屋正嗟欷吏兵操舟去復出海中諸島古不毛島夷為生今獨勞不煎海水餓死耳誰肯坐守無亡逃爾來盜賊徃徃有劫殺賈客沉其艘一民之生重天下君子忍與争秋毫島夷之民不煎海何從得食而官又禁之其為盜固宜公嘗語東坡人須是知行一不義殺一不辜而得天下弗為乃可省兵有客語省兵兵省非所先方今將不擇獨以兵乘邊前攻巳破散後距方完堅以衆亢彼寡雖危猶幸全將既非其才議又不得専兵少敗孰繼言將不足賴猶恃多兵可以禦敵併兵省之兩者皆無矣盖公意非謂兵多為足恃苟能擇將則兵少亦何至遂敗乎敵騎飲秦川萬一雖不爾省兵當何縁驕惰習已久去歸豈能田不田亦不桑衣食猶兵然省兵豈無時施置有後前王功所由起古有七月篇百官勤儉慈勞者已息肩游民慕草野嵗熟不在天言民力於農天不能使之飢擇將付以職省兵果有年先儒嘗言徐禧奴才也善兵者有二萬人未必死彼雖十萬人亦未必能勝二萬人古者以少擊衆而取勝者多蓋兵多亦不足恃昔者袁紹以十萬阻官渡而曹操只以萬卒而取之王莽百萬之衆而光武昆陽之衆八萬仍有在城者然則只是數千人取之苻堅下淮百萬而謝𤣥才二萬人一麾而亂以此觀之兵衆則易老適足以資敵一敗不支則自相蹂踐至如聞風聲鶴唳皆以為晉軍之至則自相殘也譬之一人軀幹極大一人輕㨗兩人相當則擁腫者遲鈍爲輕㨗者出入左右之則必困矣自古師旅勝敗不能無之然今日邉事至號疎曠前古未之聞也其源在不任將帥將帥不謹任人閫外之事將軍處之一一申覆皆受廟算上下相徇安得不敗據此雖言兵以少勝而擇將之說畧與公同發廪先王有經制頒賚上所行周禮廪人掌九榖之數以待國之匪頒賙賜稍食以嵗之上下數邦用令民就榖後世不復古貧窮主兼并非民獨如此爲國賴以成築臺尊寡婦入粟至公卿我嘗不忍此願見井地平寡婦見兼并注入粟公卿如卜式黄霸之徒公意欲復井田使貧富均而無位以行也按井地之制張子曰程氏兄弟皆有意復古公後得志乃都不及此大意苦未就小官苟營營三年佐荒州市有棄餓嬰公以皇祐三年倅舒州至和元年除館閣駕言發富藏云以救鰥惸﨑嶇山谷間百室無一盈鄉豪巳云然罷弱安可生兹地昔豐實土沃人良耕他州或呰窊漢書地理志呰窳偷生而亡積聚如淳曰呰音紫窳音庾師古曰呰短也窳弱也貧富不難評豳詩出周公根本詎宜輕願書七月詩一寤上聰明感事賤子昔在野心哀此黔首豐年不飽食水旱尚何有雖無剽盜起萬一且不久特愁吏之為十室災八九原田敗粟麥欲訴嗟無賕一作􅦔民訴旱必以錢言吏之無狀也間闗幸見省鞭笞随其後況是交冬春老弱就僵仆州家閉倉庾縣吏鞭租負鄉隣銖兩徴坐逮空南畆取貲官一毫姦桀已云富取貲言官所得至微而姦猾並縁自豐彼昏方怡然自謂民父母朅來佐荒郡懔懔常慚疚昔之心所哀今也執其咎乘田聖所勉況乃余之陋内訟敢不勤同憂在僚友美玉美玉小瑕疵國工猶珍之大賢小玷缺良交豈其絶小缺可以補小瑕可以磨不補亦不磨人爲奈爾何寄曾子固公集有同學一首别子固子固作懐友一篇遺公可見其相愛也至晩年乃方相違爾吾少莫與合愛我君為最君名髙山嶽嵑櫱嵩與泰低心收憃友似不讓塵壒又如滄江水不逆溝畎澮君身揭日月遇輙破氛靄我材特窮空無用補倉廥謂宜從君久垢汚得洮汰李斯傳太山不讓土壤故能成其大河海不擇細流故能就其深洮徒刀反洮頮也人生不可必所願每顛沛乖離五年餘牢落千里外投身落俗穽薄宦自鉗鈦杜牧詩熱去解鉗鈦平居每自守髙論從誰丐摇摇西南心夢想與君㑹思君挾竒璞願售無良儈儈古外切合市也窮閻抱幽憂凶禍費禳禬州窮吉士少誰可壻諸妹按子固擇諸妹所歸皆得良士仍聞病連月醫藥誰可賴家貧奉飬狹誰與通貨貝詩人刺曹公賢者荷戈祋奈何遭平時德澤盛汪濊鸞鳯鳴上下萬羽來翽翽呦呦林間鹿争出噬苹藾方今髙世士動輙遭狼狽人事既難了天理尤茫昧聖賢多如此自古云無奈周人貴婦女扁鵲名醫㿃㿃字書下病也扁鵲傳鵲名滿天下旁游六國至邯鄲聞趙貴女病即為帶下醫過洛陽聞周人愛老人即為耳目痺醫入咸陽秦人愛小兒即為小兒醫随俗改變無所滯礙貴婦人乃趙人非周人今稱周或别有出處嗟今無常勢趨舎唯利害而君信斯道不問身窮泰棄捐人間樂濯耳受天籟諒知安肥甘未肯顧糠􅀈龍螭雖蟠屈不慕蛇蟬蛻令人重感奮意勇忘身蕞何由日親炙病體同砭艾功名未云合嵗月尤須愒懐思切劘効中夜淚霶霈君嘗許過我早晩治車軑說文軑車轄也從車大聲徒蓋反山蹊雖峻惡髙眺發蒙􅀈􅀈目不明也漢淮南王傳說丞相下之如發蒙耳峯巒碧參差木樹青晻藹桐江路尤駛桐江在舒公作此詩必在舒時也飛槳下鳴瀨魚村指暮火酒舎瞻晨斾清醪足消憂玉鯽行即膾行行願無留日夕佇傾蓋㑹將見顔色不復謀蓍蔡延陵古君子議樂恥言鄶蔡大龜也襄公二十九年季子觀周樂自鄶以下無譏焉細事豈足論故欲論其大披披發鞬櫜懔懔見戈銳探深犯嚴壁破惑翻强旝左氏桓公四年旝動而鼔杜注曰旝旃也通帛爲之盖今大將之麾執以爲號令離行歩荃蘭偶坐隂松檜宵牀連衾幬晝食共麄糲兹歡何時合清瘦見衣帶梁沈約傳約與徐勉書曰百日數旬革帶嘗應移孔以手握臂率計月减半分作詩寄微誠誠語無綵繪同杜史君飲城南山公游何處山簡傳山公徃何許徃至髙陽池白馬鳴翩翩檀欒十畝碧五月浮寒煙留客醉其間風吹江海縣出罇不見日竹外空青天焚蠟助月出酒光發金船狂客惜不去醉翁舞回旋何必吹簫人吹簫人弄玉秦王之女簫史教之吹簫乃作鳯臺居之一夕吹簫鳯集乘之仙去見劉向列女傳玉枝自嬋娟歸路借紅燭雨星低馬前左傳星隕如雨此詩以燭喻星也有感憶昨與胡子戲語西城幽放斥僕與馬獨身歩田疇牛䜿歌我旁聴之爲久留一接田父語歎之勝王侯追逐恨不恣暮歸輒懐愁顧常輕千乘秪願足一丘前漢班嗣報桓譚書曰棲遲於一丘則天下不能易其樂子時怪我少好此寂寞游笙簧不入耳又不甘醪羞那知抱孤傷罷頓不能遒世味已鮮久但餘野心稠乖離今十年斑髪滿我頭昔興亦畧盡言既衰野興亦盡況於世味食眠嘗百憂每逢佳山水欲徃輒復休方壯遂如此況乃髙春秋送孫叔康赴御史府梅宛陵送孫屯田召爲御史詩薦牘交車府恩書下建章又云祖酌方滋桂行威欲犯霜鳯毛仍襲慶雞舌更含香即叔康也古人喜經綸萬事慙强聒時來上青㝠俛仰但一節古人雖志經綸是亦有義命如劉向軰上變論事乃幾强聒知道者不然也故君子雖得時小不合輒去故云俛仰一節而下又云聲利盡毫末也危言回丘山聲利盡毫末由來治亂體宿昔心已逹莊子天運篇通昔不寐注昔夜也古樂府宿昔夢見之李善本宿一作夙肯随俗好惡議論輕自決遺風何寥寥夢寐待豪傑天書下東南趣召赴嚴闕嚴闕字未詳後漢冦榮傳有嚴朝字長材晦朝倫源乾曜詩鼓鐘崇享禮鴛鷺集朝倫髙行隠家闥新除醻聞望宿藴行施設念非吾忘形此理未易説别馬祕丞伯夷惡一世季也皆鄉人吾嘗論夫子有似季之倫人情路萬殊近世頗荆榛唯君游其間坦坦得所循意君誠愷悌慕向從宿昔奈何初相歡鷁首巳云北莓莓郊原青漠漠風雨黒冠蓋滿津亭君今去何適淮南子曰龍舟鷁首補注收鹽公爲鄞縣嘗上運使孫司諌書云伏見閣下令吏民出錢購人捕鹽切以爲過矣海旁之鹽雖日殺人而禁之勢不止也今重誘之使相捕告則縣之獄必蕃而民之陷刑者將衆無賴姦人將乘此勢於海旁漁業之地搔動艚户使不得成其業艚户失業則必有合而爲盜賊殺以相仇者此不可不以爲慮也公詩當作於此時也王荆公詩注巻十七
