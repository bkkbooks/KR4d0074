body:
  text: 王荆公詩注巻三十五宋李壁撰律詩法喜寺門前白道自縈回門下青莎間緑苔雜樹繞花鶯引去壞簷無幕燕歸來李義山詩白道榮回入暮霞丘希範書雜花生樹羣鶯亂飛左氏夫子之在此也猶燕之巢於幕上又杜詩震雷翻幕燕又李端詩歌歇雲初散簷空燕尚存寂寥誰共樽前酒牢落空留案上桮我憶故鄉誠不淺可憐鵜鴂重相催樂天詩放杯書案上枕臂火爐前朱博為人廉儉自微賤至富貴食不重味案上不過三杯鵜鴂一名子規故用催歸事見春寒注長干寺梁天監元年立長干寺在秣陵縣東長干里内有阿育王舍利塔見建康實録建康志今為天禧禪寺梵館清閒側布金小塘回曲翠文深中阿含經云給孤長者買袛陁太子園布黄金髙五寸遍地置之為造佛寺龍樹入龍宫見華嚴經側布五百里栁條不動千絲直荷葉相依萬葢隂漠漠岑雲相上下翩翩沙鳥自浮沉羇人樂此忘歸志一作思忍向西風學越吟義山詩日月淹秦甸江湖動越吟王仲宣賦莊舄顯而越吟落星寺崒雲臺殿起崔嵬萬里長江一酒盃坐見山川吞日月杳無車馬送塵埃鴈飛雲路聲低過客近天門夢易回天門用陶侃事勝槩唯詩可收拾不才羞作等閑來王直方詩話云落星寺在彭蠡湖中劉咸臨嘗親見寺僧言幼時目覩閩中章傳道作此詩其前六句皆同其末云勝㮣詩人盡收拾可怜蘇石不曾來蘇石謂子美曼卿也後人愛其詩者改末句作荆公詩傳之遂使一篇之意不完其體與荆公所作詩亦不類苕溪漁隱曰直方所言非也此詩句語體格真是荆公所作他人豈能道此識者必能辨之清風閣閣在臨川見臨汝志飛甍孤起下州墻勝勢崢嶸壓四方逺引江山來控帶平看鷹隼去飛翔髙蟬感耳何妨靜赤日焦心不廢涼梁王藉詩蟬噪林逾靜況是使君無一事日陪賔從此傾觴此字如韓公詩逢公復此著征衣之此留題微之廨中清輝閣故人名字在瀛洲邂逅低回向此留鷗鳥一雙隨坐嘯荷花十丈對冥搜水含樽俎清如洗山染衣巾翠欲流宣室應疑鬼神事知君能復幾來遊韓詩太華峯頭玉井蓮開花十丈藕如船王建詩日暮數峯青似染商人說是汝州山今言山染衣巾尤妙賈誼謫長沙嵗餘文帝思誼徵之至入見上方受釐坐宣室上因感鬼神而問鬼神之本誼具道所以然之故次韻和甫春日登臺按建康志如鳯凰臺等處甚多此臺在鍾山之西不知是何臺耳鍾山漠漠水洄洄西有陵雲百尺臺萬物巳隨和氣動一樽聊與故人來程明道㳺明月陂詩萬物已隨秋氣改一樽聊為晚涼開天邊幽鳥鳴相和地上晴煙掃不開愁眼看春長一作唯恐盡直須去取六龍回唐章八元詩天邊宿鳥生歸思關外晴山滿夕嵐李白詩吾欲攬六龍回車挂扶桑慶老堂陳繹和叔内翰也板輿去國宦三年華屋歸來地一偏種竹常疑出冬筍開池故合涌寒泉潘安仁閑居賦太夫人乃御板輿孟宗後母好筍令宗冬月求之宗入林慟哭筍為之出寒泉姜詩事身閒楚老猶能戲道勝鄒人不更遷老萊子年八十衣綵為嬰兒戲於母前孟母少與軻居近墓軻乃戲於墓母曰此非所居也去居市軻復戲為商賈又曰不可居也又居學館之傍遂為大儒嗟我强顔無所及想君為樂更焦然言巳不逮養見他人之親而悲感寄陳宣叔扁舟欲動更徘徊一笑相看病眼開事忤貴人今見節政行豪縣衆稱才陳平傳髙帝南過曲逆上其城望室屋甚大曰壯哉縣豪亦壯也未知出處忽驚嵗月侵雙鬢却喜山川共一盃落日亂流江北去離心猶與水東迴絶流曰亂流劉長卿詩離心與流水萬里共朝昏寄張劒州劍閣天梯萬里寒春風此日白衣冠公自注云時張以太夫人䘮自劒州歸荆軻傳太子及賓客知其事者皆白衣冠以送之烏辭反哺顛毛黑鳥引思歸口血丹公又有贈張詩云白頭反哺秦烏側流血思歸蜀鳥前行路想君今㾪瘦相逢添我老悲酸浮雲渺渺吹西去每到原頭勒馬看漢武悼李夫人賦嫶妍太息嘆稚子兮晉灼曰三輔謂憂愁面㾪瘦曰嫶冥嫶㝠猶嫶妍也王貞白望終南詩為問紅塵裏誰同勒馬看元珍以詩送緑石硯所謂玉堂新様者元珍即丁寳臣元珍嘗知端州玉堂新様世爭傳況以蠻溪緑石䥴嗟我長來無異物愧君持贈有佳篇公詩又有端溪作枕緑玉色王恭傳丈人不識恭作人無長物久埋瘴霧看猶濕一取春波洗更鮮此石端州所寄故有瘴霧之句江文通别賦春水緑波還與故人袍色似論心於此亦同堅袍色似謂緑也和微之林亭為有檀欒占雒陽憶歸杖策此徜徉枚乗兎園賦修竹檀欒觀魚得意還知樂入鳥忘機肯亂行隱五年公如棠觀魚又莊子儵魚出㳺從容是魚樂也莊子孔子曰辭其交㳺去其弟子入馬不亂羣入鳥不亂行未敢許君輕去國不應如我漫為郎中園日涉非無趣保此千鍾慰北堂元結傳人以為漫者亦漫為官乎呼為漫郎陶集園日渉以成趣言非无田園之可歸且資禄以養親酬微之梅暑新句江梅落盡雨昬昬去馬來牛漫不分杜詩去馬來牛不復辨濁涇清渭何當分當此沉隂無白日豈知炎旱有彤雲琴絃欲緩何妨促畫蠧微生故可熏回首涼秋知未逺㑹須重曝阮郎裩晉阮咸為兒時七夕諸阮盛陳錦綉咸獨以長竿挂大布犢鼻禈於庭中曰未能免俗杜詩明朝曬犢鼻方信阮郎貧平甫㳺金山同大覺見寄相見後次韻二首名一作寵參時宰道人琳氣葢諸公弟季心勝踐肯論山在險㝠搜欲與海爭深沙門慧琳元嘉中參權要朝廷大事皆與議勢傾一時權侔宰執孔覬嘗詣之遇賓客但寒温而巳覬慨然曰遂有黑衣宰相可謂冠屨失所又晉支遁字道林與殷浩王文度謝安諸人友善時論以遁有經濟才然公所用乃宋慧琳季布傳布弟季心氣葢關中遇人恭謹為任俠曾氏資暇録云平甫與一浮屠詩云北固山連三楚逺中酃水入九江深句法清逺荆公和此詩惟押弟季心字最妙不惟好語兼亦切實揺揺北下隨帆影踽踽東來想足音握手更知禪伯逺隔雲靈鷲碧千尋史記心揺揺如懸旌无所終薄踽踽涼涼有威儀而無所施之貎莊子聞人足音跫然而喜矣靈鷲山見次韻留題僧假山注其二漳南開士好叢林慧劒何年出水心開士見寄福公道人注又李文饒詩龍門有開士叢林猶禪林也維摩詰經云以智慧劒破煩惱網晉武問三日曲水之義束晢對秦昭王以三日置酒河曲見金人捧水心之劒曰令君制有西夏乃霸諸侯因此立為曲水詩言慧劒出水心葢借用此事獨往便應諸漏盡相逢未免故情深首楞嚴普告諸大菩薩及諸漏盡大阿羅漢法華經諸漏巳盡无復煩惱逮得巳利盡諸有結檻窺山鳥有真意窗聽海潮非世音一笑上方人事外不知衰境兩侵尋金山近海口故云聽海潮觀音普門品梵音海潮音又云勝彼世間音則梵貝之聲亦謂之潮音杜詩上方重閣晚金陵懷古四首霸祖孤身取二江子孫多以百城降二江謂江南東西道孫秀流涕曰昔討逆弱冠以一校尉創業今後主舉江南而弃之宗廟山陵於此為墟悠悠蒼天此何人哉此即孤身取百城降之明證李翺言昔神堯以一旅取天下後世子孫不能以天下取河北亦此意豪華盡出成功後逸樂安知與禍雙許渾金陵懷古詩英雄一去豪華盡東府舊基留佛刹後庭餘唱落船窗輿地志金陵有東府城晉安帝時築其城西本簡文為㑹稽時第其東則丞相㑹稽王道子府謝安石薨以道子代領揚州州在第西故時人號為東府西州夢得詩隔江猶唱後庭花時泊秦淮故言船窗黍離麥秀從來事且置興亡共一作近酒缸史記宋世家箕子諌紂不聽其後箕子朝周過故殷墟感宫室毁壞生禾黍箕子傷之乃作麥秀之詩以歌詠之其二天兵南下此橋江敵國當時指顧降山水雄豪空復在君王神武自難雙按王師渡江浮橋在采石葢近金陵公詩謂天子神武則英雄畢服理不容並也留連落日頻回首想像餘墟獨倚窗却恠夏陽纔一葦漢家何事費罌缸韓信擊魏陳船欲渡臨晉伏兵從夏陽以木罌缶度軍襲安邑韓詩傾樽與斟酌四壁堆罌缸其三地勢東回萬里江雲間天闕古來雙李白詩漢江迴萬里𤓰作九龍盤公用白語何其精切天闕建康山名詳見上注兵纒四海英雄得聖出中原次第降山水寂寥埋王氣風煙蕭颯滿僧窗廢陵壞冢空冠劒誰復沾纓酹一缸歐公豐樂亭記自唐失其政海内分裂豪傑並起而爭所在為敵國者何可勝數及宋受天命聖人出而四海一向之憑恃險阻剗削消磨百年之間漠然徒見山髙而水清欲問其事而遺老盡矣許渾詩玉樹歌殘王氣終髙僧詩帝業空城在民耕壞塜多其四憶昨天兵下蜀江將軍談笑士爭降黄旗巳盡年三百紫氣空收劒一雙江自蜀來故言蜀江非兵自蜀而下江表傳黄旗紫葢見於東南有天下者荆揚之君乎豐城雷煥占斗牛間常有紫氣既為令掘獄屋基入地四丈餘得一石圅有雙劒一曰龍泉一曰太阿使送一劒與張華留一自佩華報煥曰詳勸劒文乃干將也莫耶何復不至雖然天生神物終當合耳及華誅失劒所在後煥卒其子持劒行延平津忽於腰下躍出墮水使人入水見兩龍盤合破堞自生新草木廢宫誰識舊軒窗不須搔首尋遺事且倒花前白玉缸劉貢父集有和公此詩如稱王師破金陵兵自水牕入史所不載貢父洽聞必有所據今附貢父詩於此虎踞羣山帶繞江為誰興國為誰降髙臺麋鹿看无數廢沼鳬鷖去自雙萬事朝雲隨逝水百年西日過虛􅐼白門酒美東風快笑數英雄盡一缸樓船西下勢横江元帥旌旗就約降旋報前師覆張悌亟傳單騎馘王雙燕焚正自當煙突蟻潰何堪值水牎回首三軍歡奏凱萬牛行䏑酒千缸楚貢來遲詭問江漢收羣策士心降一言巳重黄金百再見仍䝉白壁雙票客脫身甘馬革老儒投筆謝書牎豈知三閣酣詩酒浩唱庭花倒玉缸頽垣落水半平江喬木呼風不易降耕出珠璣時得一道逢麟鳯不成雙潮聲半夜來寒渚月色深秋照舊牎惟有魚鹽城下市檣烏相望集瓶缸次韻舍弟遇子固憶少述時公弟在臨川少述孫侔也侔事巳見上注公少與侔善兄事侔洎為相道過真州侔待之如布衣時歸計何時就一㕓寒城回首意茫然野林細錯黄金日溪岸寛圍碧玉天林篩日影如金狀也秦少㳺詩門外天横數尺青又天轉江南碧玉寛飛兎巳聞追騕褭太阿猶恨失龍泉遥知更憶河濱友從事能忘我獨賢禰衡傳飛兎騕褭皆古駿馬也此言平甫與子固失龍泉謂少術獨逺耳越紀楚王召風胡子令之呉見歐子干將作劍二人鑿茨山洩其溪取鐵作劍三一曰龍泉二曰太阿三曰工市晉鄭求之不得興師圍楚楚王引太阿之劍登城而麾二軍破敗流血千里晉鄭之士頭畢白也又今西平縣有鉄官别鎮户即古鑄刀劍之地北山詩偕偕士子朝夕從事大夫不均我從事獨賢次韻昌叔詠塵塵土輕颺不自持紛紛生物更相吹翻成地上髙煙霧散在人間要路岐莊子野馬也塵埃也生物之以息相吹也言塵土狀如煙霧多在權要之地以人所奔趍故也一世競馳甘眯目㡬家清坐得軒眉超然秪有江湖上還見波濤恐我時莊子夫播糠眯目則天地四方易位矣北山移文眉軒席次注舉眉喜也石竹花退公詩酒樂華年欲取幽芳近綺筵李義山野菊詩紫雲新苑移花處不取霜栽近御筵種玉亂抽青節瘦刻繒輕染綘花圓風霜不放飄零早雨露應從愛惜偏巳向美人衣上繡更留佳客賦嬋娟陸龜䝉石竹詩云曽看南朝畫國娃古羅衣上碎明霞而今莫共金錢闔買却春風是此花李白詩山花挿寶髻石竹繡羅衣古松森森直幹百餘尋髙入青㝠不附林萬壑風生成夜響千山月照挂秋隂豈因糞壤栽培力自得乾坤造化心杜詩扶持自是神明力正直元因造化功廊廟乏材應見取世無良匠勿相侵玉晨大檜鶴廟古松最為佳樹按建康志玉晨觀在雷平山西北舊傳髙辛時展上公及周時郭真人太史之宅梁天監中為朱陽觀唐改為華陽觀又改為紫陽觀宋朝大中祥符元年改賜今額白鶴廟在朝山下玉晨觀属句容縣白鶴廟属漂陽縣山在縣西南二十里壇廟千年草不生幽真曾此䕃餘清左氏松柏之下其草不植段文昌古柏文下䕃芳苔凡草不生建康志云楊真人三許真人嘗降于此月枝地上流雲影風葉天寒過雨聲有月則枝影如雲流於地上唐人詩雲影亂鋪地濤聲寒在空材大賢於人有用節髙仙與世無情泰山泰一作秦陂下今遺處苦里宫中謾得名應劭漢官儀曰秦始皇封泰山逢疾風暴雨賴得抱樹因封為五大夫今泰山小天門猶有秦時五大夫松括地志苦縣在亳州老子所生之地宫謂大清宫陂字恐誤上句言松下句言檜次韻董伯懿松聲天機自動豈關情能作人間意外聲㝠聒一堂無客夢曉悲千嶂有猿驚莊子蚿曰今予動天機而不知其所以然韓詩猶疑在波濤怵惕夢成魘廟中奏瑟沉三歎堂下吹簫失九成俚耳紛紛多鄭衛直須聞此始心清樂記清廟之瑟朱絃而疎越一倡而三嘆簫堂下樂也韶舜樂名言簫見細器之備莊子大聲不入於里耳注云非委巷之所尚次韻荅平甫髙蟬抱殻悲聲切新鳥爭巢誶語忙誶音碎長樹老隂欺夏日晩花幽艷敵春陽雲歸山去當簷靜風過溪來滿坐涼唐人詩水自石間流出冷風從花裏過來香比公格為凡物物此時皆可賦悔予千里不相將相將猶相携也詩悔予不將兮次韻質夫兄使君同年樓堞相望一日程春風吹急似揺旌莫言樂國無愁夢賴把新詩有故情客舍五漿非所願私田三徑㑹須成青雲自致歸公等如我何縁得此聲五漿見遊土山注范雎傳不知公能自致青雲之上金明池太平興國鑿在瓊林苑北三年春引金水河水注之以教神衛虎翼水軍習舟楫因為水嬉詔京城士族占射園苑亭臺以觀宜秋西望碧參差憶看鄉人禊飲時東京記云京城西面二門南曰宜秋北曰閶闔宜秋在梁曰開明晉曰金義宋朝興國四年改今名杜牧詩滿江秋浪碧參差斜倚水開花有思緩隨風轉栁如癡青天白日春常好緑髮朱顏老自悲韓詩青天白日花草麗杜詩人情老易悲跋馬未堪塵滿眼夕陽偷理釣魚絲葛溪驛據信州弋陽縣有葛溪水源出上饒縣靈山又有葛𤣥仙翁冢焉因名葛溪缺月昏昏漏未央一燈明滅照秋床病身最覺風霜早歸夢不知山水長唐詩枕上片時春夢中行盡江南數千里坐感嵗時歌慷慨起看天地色淒涼鳴蟬更亂行人耳正抱疎桐葉半黄泛舟青溪入水門登髙齋奉呈叔康按建康志靑溪呉大帝赤烏四年鑿東渠名青溪通城北塹潮溝闊五丈深八尺以洩元武湖水發源鍾山西南流東出於青溪閘口接於秦淮及楊溥城金陵青溪始分為二在城外者自城濠合于淮在城内者湮塞僅存齊髙帝先有宅在青溪武帝即位以宅為青溪舊宫簿領紛紛惜此時起携佳客散沈迷劉公幹詩沈迷簿領書回回自昏亂釋此出西城登髙且游觀十圍但見諸營栁九曲難尋故國溪桓温經金城見少為琅琊時所種栁皆十圍慨然曰木猶如此人何以堪漢文帝勞周亞夫於細栁營九曲指青溪宫郄僧施嘗放舟青溪每溪一曲輒作詩一篇謝益夀聞之曰青溪中曲復何窮盡難尋言舊迹漸湮塞也牽埭欲隨流水逺放船終礙畫橋低子猷清興何曾盡想憶髙齋更一躋按建康志青溪舊有七橋一曰東門橋二曰尹橋三曰雞鳴橋四曰募士橋五曰菰首橋唐陸彦恭為江寜令廢此橋路而東渡青溪更名曰金華六曰中橋七曰大橋雞鳴埭正在募士橋西南過溝即其處故上句云牽埭庾肩吾五字疊韻詩載載每礙埭髙適詩因聲謝岑壑嵗暮一攀躋南史孝義傳郭原平每行來見人牽埭未過輒迅檝以助之為裴使君賦擬峴臺按臨川志使君名材嘉祐間來守臨川至之二年築臺于城東南隅名曰擬峴以其形擬峴山也乃臨川山水㑹處君作新臺擬峴山羊公千載得躋攀歌鐘殷地登臨處花木移春指顧間城似大隄來宛宛溪如清漢落潺潺時平不比征呉日緩帶猶疑向此閑寰宇志襄州大隄城今縣城也俗相傳呼為大隄城漢水在大隄下晉羊祜都督荆州諸軍事在軍常輕裘緩帶身不被甲性樂山水每風景必造峴山置酒言詠終日不倦送李才元校理知卭州才元名大臨成都人慶厯八年以潞公薦為校理旋以親老請知卭州朝廷孝治稱今日鄉郡榮歸及壯時關吏相呼迎印綬里兒爭出望旌麾漢終軍傳軍入關關吏與軍繻朱買臣傳買臣拜㑹稽太守衣故衣懷其印綬步歸郡邸直上計時㑹稽吏方相與羣飲不視買臣買臣入室中守邸與共食食且飽少見其綬守邸怪之前引其綬視其印㑹稽太守章也坐中驚駭白守丞相推排陳列中庭拜謁買臣徐出户有頃長安廐吏乗駟馬車來迎買臣遂乗傳去陳羽詩成名空羨里中兒北堂巳足誇三釡南畞嘗令識兩岐獨我尚留真有命天於人欲本無私後漢張堪守漁陽勸農桑人歌曰桑无附枝麥秀兩岐張君為政樂不可支梅聖俞嘗賦詩美之今公亦素知其賢為能致此兩岐也送張頡仲舉知奉新頡金陵人公所厚位至從官傳稱其所至以嚴治深文狡獪亦天性云本傳但言其嘗令廣東及漳之益陽不載知奉新故人為邑士多稱繇賦寛賒獄訟平老吏閉門無重稰荒山開隴有新粳寛賒言不刻韻略有糈字無稰字疑即糈也集韻音胥説文粮也又音所廣韻私吕切意謂吏不敢為奸利僅自給也史記貨殖傳醫方諸食技術之人焦神極能為重糈也注音所粮也方揮玉麈日邊坐又結銅章天外行去去料君歸不久挾材如此即名卿挾即負挾之挾晉劉頌見華譚策太息曰不悟鄉里乃有如此才也張劍州至劍一日以親憂罷劍州即公女弟之夫前巳有寄張詩與此意大略多同此當在前客舍飛塵尚滿韀却尋東路想茫然向頭反哺秦烏側流血思歸蜀鳥前古樂府秦氏庭烏八九子蜀鳥謂杜鵑也今日相逢知悵望㡬時能到與留連行看萬里雲西去倚馬春風不忍鞭今日相逢葢預期㑹面也知悵望者謂張尤望相見但不知何時得到而留連之耳見西去之雲猶竚立夷猶以望之況如張乎次韻子履逺寄之作子履陸經也飄然逐客出都門士論應悲玉石焚髙位紛紛誰得志窮塗往往始能文秦逐客李斯書玉石俱焚劉禹錫志詩髙位紛紛見䧟人此言雖富貴而實不行退之語懽愉之辭難工窮苦之言易好又虞卿窮愁始著書後來韓栁軰皆因遷謫文始髙也柴桑今日思元亮天禄何時召子雲直使聲名傳後世窮通何必較功勲陶淵明一字元亮潯陽柴桑人揚雄傳莽誅甄豐父子及劉棻等辭連及雄時雄校書天禄閣上治獄使者来収雄雄乃從閣上自投下㡬死莽問其故乃劉棻嘗從雄學竒字雄不知情詔勿問雄以病免復召為大夫送李太保知儀州九域志儀州属陜西路本後唐義州太平興國二年改儀州熙寧五年廢北平上谷當時守氣略人推李廣優還見子孫持漢節欲臨關塞撫羗酋李廣先為上谷太守數與匈奴戰公孫昆邪為上泣曰李廣才氣天下無雙數與虜角恐亡之乃徙廣上郡最後守右北平斬霸陵尉時也雲邊鼔吹應先喜日下旌旗更少留五字亦君家世事一吟何以稱來求五字用五陵事文選注五言詩自陵始送西京簽判王著作兒曹曽上洛城頭尚記清波遶驛流却想山川常在夢可憐顔髮巳驚秋辟書今日看君去著籍長年歎我留晉魏舒傳陳留周震累為諸府所辟辟書既下公輒䘮亡僉號震為殺公掾史記梁孝王世家梁之侍中郎謁者著籍引出入天子殿門與漢宦宫無異著竹略反籍謂名簿三十六峯應好在寄身多謝欲來游謂嵩少也李白贈焦練師序云予訪道少室盡登三十六峯按河南志河南府永安縣少室山在縣西南七十里有三十六峯具列其名王荆公詩注巻三十五
