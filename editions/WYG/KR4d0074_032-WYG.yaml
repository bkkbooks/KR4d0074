body:
  text: 王荆公詩注巻三十二宋李壁撰律詩陳君式大夫恭軒大夫名軾字君式居於撫州黄土橋曾子固亦為賦詩東坡名其園曰中隱堂曰老圃恭軒靜對北堂深新斸檀欒一畝隂膝下徃來前日事眼前封殖去年心每懐罇斚沾餘瀝獨喜弦歌有嗣音肯搆㑹須門閥大世資何用滿籝金枚乗賦修竹檀欒夾池水去年真迹作長年淳于髠傳侍酒於前時賜餘瀝文選霑玉斚之餘瀝公此詩撫州有石本陳之孫博古䟦云曾祖中散手植緑竹一叢於所居之側四時䓤蒨秀色可佳捐館之後祖朝奉大夫於竹之傍開一軒對之命曰恭蓋取桑梓必恭之義舒王曾公兄弟來歸里閈必游息賞玩而去云云作此詩時在相位詩石結銜平章事絃歌疑是春誦夏弦之絃言有子能世其學真迹閥字作更字漢于公髙大其門閭揚雄解嘲鄒衍以頡頏而取世資韋賢傳遺子黄金滿籝不如敎子一經注籝笭也揚雄方言陳楚間謂筲為籝然則筐篚之屬是也如淳注竹器受三四斗寄黄吉甫學兼文武在吾曹别後應看虎豹韜欲問廟堂誰鎮撫尚傳邊塞敢驚騷旌旗急引飛黄下烽火遥連太白髙聞說荆人亦憔悴家家還願獻春醪漢書尹翁歸文武兼備太公六韜有虎韜豹韜陳平傳外鎮撫四夷退之詩訏謨者誰子無乃太失宜即欲問廟堂之意也詩徐方繹騷震驚徐方舊注時發騎士南征漢禮樂志日出入歌曰訾黄其何不徠下注云訾歎辭也黄乗黄也飛黄馬名退之詩飛黄騰踏去淮南子黄帝治天下於是飛黄服皁漢天文志太白兵象也出而髙用兵深吉淺凶唐鮑容詩西方太白髙壯士羞病死韓退之詩春醪又千石髙魏留魏留十七助防邊埋没鹽州十八年衣屨窮空委胡婦糗糧辛苦待山田闗河舊路頻囘首腹背他時兩受鞭邂逅得歸爺戰死母隨人去亦蕭然鹽州在五原原上頭徳宗貞元中始詔之虜逺避不敢犯塞胡婦字出蘇武傳此恐謂虛内事外兩有害也或又謂樂天縛戎人詩涼原鄉井不得見胡地妻兒虛棄捐没蕃被囚思漢土歸漢被劫為蕃虜早知如此悔歸來兩地寜如一處苦疑此亦兩受鞭之意也史記呉起傳其父戰不旋踵亦死於敵丁年丁年結客盛游從宛洛氊車處處逢吟盡物華愁筆老醉消春色受醅濃壚間寂寞相如病鍜處荒涼叔夜慵早晚青雲須自致立談平取徹侯封文選李少卿答蘇武書丁年奉使皓首而歸注丁壯也漢祭遵為部吏所侵結客殺之古樂府有結客少年場言少年時結任俠之客為交㳺之場終而無成故作此曲也李白詩平明相馳逐結客洛門東摭言崔沆為主罰録事盧彖府近開宴請假往洛及同年宴於曲江亭上彖以雕幰載妓㣲服嚲鞚縱觀為團司所發沆判曰深攙席帽宻快氊車紫陌尋春已隔同年之面青雲得路可知異日之心相如傳相如與文君俱之臨卭盡賣車騎買酒舍令文君當壚師古曰壚以居酒瓮四邊隆起其一面髙形如鍜壚故名壚又相如常有消渴病稱病閒居不慕官爵嵇康鍜事屢使髙帝紀上曰通侯諸將無敢隱朕皆言其情注通侯舊曰徹侯避武帝諱曰通侯通亦徹也言其功得通於王室也後改曰列侯列者序列也揚雄解嘲曰或七十說而不遇或立談間而封侯服䖍注曰薛公也送王詹叔利州路運判王孫舊讀五車書手把山陽太守符未駕朱轓辭輦轂却分金節佐均輸人才自古常難得時論如君豈久孤去去便看歸奏計莫嗟行路有﨑嶇此詩頗不類公作山陽楚州周禮地官掌節凡邦國之使節皆金也以英蕩輔之桑𢎞羊請置大農部丞十人分部主郡國各往往置均輸鹽銕官令逺方各以其物如異時商賈所輸販者為賦間相灌輸據此蓋盡籠天下之貨與民爭利此卜式所欲烹𢎞羊者也然使臣顧以均輸同管氏之輕重李悝之平糴言之且謂古為之有數吏良而令行則均輸亦何可廢哉運判故言佐歸奏計一作歸奏事﨑嶇言蜀道梯棧之險送周仲章使君看君東下霅溪船囘首紛紛已五年簪筆少留吾所望剖符輕去此何縁髙麾行路穿秦樹駿馬歸時著蜀鞭子墨文章應滿篋承明宣室正詳延霅溪在湖州四水合為一溪徐陵碑云清霅瀰瀰涂窮地根字書霅者四水激射之聲也又有苕水以其兩岸多生蘆葦故曰苕溪梅聖俞送周仲章湖倅詩溪水日霅霅弁峯日峩峩趙充國傳中郎將卬家將軍以為張安世本持槖簪筆注從臣負槖簪筆從備顧問或有所紀漢髙祖紀剖符封功臣師古曰剖破也與其符合而分授之謝靈運詩剖竹守滄海杜詩兩行秦樹直顧況有蜀馬鞭歌謂章仇兼瓊采以獻上歌云亭亭筆直無皴節磨將形如一像鐵滋潤猶沾玉壘雪碧鮮似染萇𢎞血杜牧送冀處士贈以蜀馬箠副之胡罽裘蜀鞭疑本此子墨事見詳定試巻注揚雄傳召雄待詔承明金馬著作之庭賈誼傳上方受釐宣室蘇林曰宣室未央前正室淮南子武王殺紂於宣室漢亦承用古名乎送王䝉州請郡東南没一作促去程拍堤江水照紅旌仁聲已逐春風到使節猶占夜斗行箭落皁鵰毚兎避句傳炎海鱷魚驚麒麟不是人間物漢詔先應召賈生䝉州即蒼梧郡之茘浦縣屬廣西熙寜五年廢張萱送僧却泛滄波問去程王褒頌恩從祥風翺徳與和氣游韓詩仁風挾惠氣韓詩夜渡洞庭看斗柄國史斛律金人號落鵰都督杜牧之詩戈矛虓虎士弓箭落鵰兵杜詩皁鵰寒始急李廣傳上使中貴人從廣匈奴射殺其騎且盡中貴人走廣廣曰是必匈奴射鵰者師古曰鵰大鷙鳥也名鷲黒色翮可以為箭羽巧言詩躍躍毚兎遇犬獲之鵰已落兎猶避之指箭也投文逐鱷魚見送潮州吕使君注徐陵數歲家人携見寳誌誌以手摩其頂曰此兒天上石麒麟也南史顧歡傳猶未識辰緯而意斷南北然則古固以辰緯而占南北矣送龎參判北都兩去不辭勤仕路論才況出羣一相開藩嘗負弩三年通籍更從軍清談猶得當時事遺愛應從此日聞我憶荆溪山最樂看君摩翮上青雲北都太原府唐為魏州周為天雄軍慶厯二年升北京司馬相如至蜀縣令負弩矢先驅通籍見送復之赴成都注韓詩從軍古云樂曹子建詩從軍度函谷軍字從勹故對弩也荆溪在宜興縣山水絶佳張協七命酒則荆南烏程謂此荆溪之南也送潘景純東都曾以一當千場屋聲名十五年晚賜緑衣隨宦牒始操丹筆事戎旃明時正欲精蒐選榮路何當力薦延頼有史君能好士方看一鶚在秋天連昌宫詞賀老琵琶定場屋埸屋字見唐摭言據元詞則戲場亦謂屋場杜詩才名三十年武后時傅游藝一年内青緑緋紫皆遍時號為四時仕宦據唐制緑又在青上丹筆見送張仲容赴杭州辟注杜詩鵰鶚在秋天言將為郡將所舉送僧無惑歸鄱陽晚扶衰憊寄人間應接紛紛秪强顔挂席每諳東匯水採芝多夢舊游山故人獨往今為樂何日相隨我亦閒歸見江東諸父老為言飛鳥㑹知還孟郊詩挂席幾千里禹貢東匯澤為彭蠡彭蠡在鄱陽李商隱寄崔待御詩若向南臺見鸎友為言垂翅度春風送遜師歸舒州山川相對一悲翁往事紛紛夢寐中邂逅故人恩意在低囘今日笑言同看吹陌上楊花滿忽憶巖前蕙帳空亦見桐鄉諸父老為傳衰颯病春風公嘗通判舒州故云唐王昌齡詩雲髪不能梳楊花更吹滿以朱邑事自比劉沆詩若到鄉闗人見問為言歸思滿秋風寄育王大覺禪師單已安那示入禪草堂難望故依然山今歳暮終岑寂人更天寒最靜便隱蹟亦知甘自足憑心豈吝慰相憐所聞不到荆門耳人老禾新又一年杜詩多病如淹泊長吟阻靜便劉長卿詩不解謝公意翻令靜者便離騷經依前哲以節中兮喟慿心而厯兹爾雅年者取禾一熟也說文云秊秊榖熟也從禾千春秋曰大有年則年者禾人之名每歲一熟故以為歲名寄無為軍張居士南陽居士月城翁曾習禪那問色空卓犖想超文字外低囘却寄語言中真心妙道終無二末學殊方自不同此理世間多未悟因君徃徃歎西風圓覺經禪那寂觀佛經有問色空二義心經云色即是空古靈禪師語靈光獨耀㢠廻脫根塵體露真常不拘文字心性無染本自圓成此故云卓犖超文字之外維摩經有以聲音語言文字而作佛事黄蘖云但知學言語念向皮袋裏安著到處稱我㑹禪還替得生死麽禪宗以言語道斷為極則此猶寄語言故云低囘柳詩寂滅本非斷文字安可離聖黙寄言宣分别乃無知不二門見維摩經次韻鄧子儀二首青溪相值各青春老去臨流輒損神事事只隨波浪去年年空得鬢毛新論心未忍遺横目干世還憂近逆鱗嘉句感君邀我厚自嗟才不異常人韓詩浪波沄沄去松柏在山崗又云不離文字鬢毛新莊子天地篇苑風語諄芒曰夫子無意乎横目之民乎願聞聖治韓非傳龍之為蟲可擾狎而騎也然而喉下有逆鱗徑尺嬰之必殺人人主亦有逆鱗說之者能無嬰其逆鱗幾矣其二金陵邂逅府東偏手得新蒲每共編采石偶耕垂百日青溪並釣亦三年君才有用方求禄我志無成稍問田一笑欲論心迹二字恐誤事白頭相就且欹眠東偏借用奉許叔以居許東偏路温舒傳父為里監門使温舒牧羊温舒取澤中蒲截以為牒編用寫書師古注小簡曰牒編聨次之采石青溪皆地名亦暗對魏志呂布傳許汜與劉備並在劉表坐上汜曰昔過下邳見元龍元龍無客主之意久不相與語自上大床卧使客卧下床劉備謂許汜曰君求田問舍言無可采是元龍所諱也何縁當與君語如小人欲卧百尺樓上卧君於地何但上下床之間邪送李璋湖海聲名二十年尚隨鄉試一作賦已華顛却歸甫里無三徑擬傍胥山就一㕓朱轂風塵休悵望青鞋雲水且留連故人亦見如相問為道方尋木鴈篇元龍湖海之士甫里陸龜䝉所居胥山言㑹稽揚雄解嘲子徒欲朱丹吾轂不知一跌將走吾之族杜詩青鞋布襪從此始莊子外篇山木莊子曰此木以不材得終其天年夫子出於山舍故人之家故人喜命堅子殺鴈而烹之弟子問於莊子曰昨日山中之木以不材得終其天年主人之鴈以不材而死先生將何處莊子笑曰吾將處夫材與不材之間白詩寄皇甫郎之與君别有相知分同置身於木鴈間韓詩云我言莊周云木鴈各有喜送章宏道合由來不易謀豈無和氏識荆璆一川濁水浮文鷁千里輕帆落武丘身退豈嫌吾道進學成方悟衆人求西風乞得東南守杖策還能訪我不班孟堅賔戲賔又不聞和氏之璧韞於荆石隨侯之珠蔵於蚌蛤乎劉琨握中有𤣥璧本自荆山璆文鷁見送江寜彭給事赴闕注淮南子曰龍舟鷁首天子之乗然今舟無不稱鷁王濬傳畫鷁首怪獸於船首以懼江神唐髙祖諱改虎丘作武丘退之答侯繼書冀足下知吾之退未始不為進而衆人進未始不為退也下言學成行尊則不即人而人即之矣西施古曲貴來方悟稀别葛使君邑屋為儒知善政市門多粟見豐年追攀更覺相逢晚談笑難忘欲别前客幙雅游皆置榻令堂清坐亦鳴弦輕舟後夜滄江北囘首春城空黯然邑屋見登景徳塔注言俗皆興於儒也市門見歎息行注漢武卿等安在何相見之晚耶韓詩書寄相思處盃銜欲别前張耳傳項羽立諸侯雅游多為人所稱師古曰雅故也言其久故倦游結交英傑是以多為人稱譽之置榻用陳蕃事杜詩塵滿萊蕪甑堂横子賤琴送王龍圖壯志髙才偃一藩更嗟賢路此時難長幡欲動何妨屈老驥能行豈易閒沙市放船寒月白渚宫留御古苔斑知公未厭還隨詔歸看功名重太山謝靈運詩愉恱偃東扉杜詩直辭寜戮辱賢路不﨑嶇堅車大艎必少却而後進猶此意也王濬開門前路曰吾欲使客長㦸憣旗韓詩風幡肆逶迤王處仲傳老驥伏櫪志在千里杜詩尺馬老能行杜詩鴻鴈影來連峽内鶺鴒飛急到沙頭又落日放船好李渉詩萬里平沙連月白文公楚子西㳂漢泝江將入郢王在渚宫下見之注小洲曰渚章吕反今荆南號渚宫元和郡國志渚宫楚之别宫梁元帝即位於楚宫蓋取渚宫以名宫也髙從誨鑿成西南隅為地建渚宫亭鄭谷有渚宫亂後詩云白社已應無故老清江依舊遶空城史記退而讓頗名重太山次韻酬宋中散二首中散乃莒公丞相之子一充國次均國據公集有上宋相公書云某愚戅淺薄動多觸罪初叨一命則在幕府當此之時尤為無知自去吏屬之籍以至今日雖嘗獲侍燕語然不能自同衆人之數也閤下撫接顧待久而加親及以罪逆扶䘮歸葬閤下發使弔問特在諸公之先而所以顧恤之尤厚蓋仁人君子樂於以禮長育成就人材哀念一日之雅而忘終身不肖之醜顧在私心宜何以報觀此書則公於宋公受知非一日故下有舊恩思報之句與書意正同初見彤庭賜履雙便參東閤寄南邦時聞正論除疑網每讀髙辭折慢幢陳迹欲尋無復日舊恩思報有如江風流今見佳公子投老心旌一片降西都賦金戺玉階彤庭輝輝薛琮注曰彤赤也輝輝赤色貎賜履見次韻約之惠詩注充國嘗為都官郎中公孫𢎞開東閤以延賢人詩崧髙王命申伯式是南邦楞嚴經設令一切衆生悉來問難猶以一言决其疑網法達禪師七歲出家禮祖師頭不至地祖呵曰汝心必有一物藴習何事耶師曰念法華經已及三千部祖曰若至萬部得其經意不以為勝汝負此事業都不知過聴吾偈曰禮本折慢幢頭奚不至地有我罪即生忘功福無比王羲之帖吾惟辨便去無復日也諸懐不可言祖逖不能清中原而復濟者有如大江史記平原君翩翩濁世之佳公子也劉夢得詩一片降幡出石頭據庠傳初庠所在以謹靖為治晚愛信幼子幼子多與其屬小人游不謹御史吕誨請勑庠二子不得隨之亳州上不許曰庠老矣奈何不使其子隨乎據史言則二子者不得為賢而公稱之如此其二超然京洛諒難雙處在家庭譽在邦道義門中窺戸牖風騷壇上見麾幢素書欵欵誰憐杜彩筆遒遒獨勝江信美賢才有公子篤誠真復類尨降莒公開封雍丘人故言京洛易繫辭成性存存道義之門杜牧詩今代風騷將誰登李杜壇韓詩吾欲盈其氣不令見麾幢杜甫寄裴道州詩久客每枉友朋書素書一月凡一束楚辭吾寜悃悃欵欵朴以忠乎江淹嘗夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可見還淹乃探懐中得五色筆一枝以授之爾後為詩絶無美句昭公元年子晳信美矣抑子南夫也賢公謂莒公文公十八年髙陽氏有才子八人蒼舒隤凱云云尨降庭堅云云明允篤誠天下之民謂之八愷和宋大博服除還朝簡諸朋舊據莒公子均國嘗為國子博士景文子定國彦國靖國皆為博士不知此與誰莒公薨於治平三年四月五年外除是為熙寜元年公時為翰林學士又景文卒於嘉祐六年五月八年滿䘮公時知制誥呼門初起外庭臣秀氣稜稜動搢紳談論坐來能慰我篇章傳出亦驚人生芻一束他年闕伐木相求此地新便欲與君同樂處窮通餘事不闗身禮䘮者不呼其門今除䘮矣故云初起郭林宗親䘮㑹者甚多徐孺子不言姓名弔之置生芻一束於前公自言闕於致奠小雅伐木詩取朋友相須之意言窮通身之餘事不足計當相從餘事次韻酬宋玘六首曾景建言宋玘是金谿人公少所厚後篇言故交重趼當是宋自撫來訪公金陵洗雨吹風一月春山紅漫漫緑紛紛褰裳逺野誰從我散策空陂忽見君青眼坐傾新歲酒白頭追誦少年文因嗟涉世終無補久使髙材壅上聞皇甫曾詩古路無行客寒林獨見君韋莊詩豈知新歲酒猶作異鄉身張俞詩手持新歲酒還遶落梅行杜詩别來頭併白相對眼終青漢武元朔元年詔今或至闔郡而不薦一人是化不究而積行之君子雍於上聞也雍音壅歐公贈王安國詩自慚知子不能薦白首胡為侍從官其二東風𣺌渺客天涯病眼先春已見花逺欲報君羞强聒老知隨俗厭雄誇窮通往事真如夢得失秋毫豈更嗟邂逅故人惟有酒醉中衣幘任欹斜歐公峽州詩春風疑不到天涯二月山城未見花或謂眼昏花强聒謂非無報君之心顧身逺不在其位不敢瀆告韓詩開端要驚人雄誇吾厭矣東坡賦悟驚俗之來患杜詩把酒從衣濕吟詩信杖扶任猶從也其三城中燈火照青春逺引吾方避糾紛游衍水邊追野馬嘯歌林下應山君愁尋徑草無求仲喜對簷花有廣文邂逅一樽聊酩酊聲名身後豈須聞賈誼弔屈原賦鳳漂漂其髙逝兮固自引而逺去司馬遷書寜得自引深蔵於岩穴耶孔文舉論盛孝章嚮使郭隗倒懸而王不解臨溺而王不拯則士亦將髙翔逺引莫有北首燕路者矣注引去也孫子解雜亂紛糾者不控捲劉向傳傳授增加文書紛糾杜詩萬事紛糾猶絶粒一官覊絆實蔵身莊子野馬塵埃也退之雜記談生之為崔山君傳稱鶴言者豈不怪哉山君疑即鶴也如退之毛頴傳之類但不傳耳韓偓詩牕裏日光飛野馬案頭筠管長蒲盧不如介甫所對精切崔備詩山君水上印天女月中書蔣詡隱於杜陵開三逕惟故人求仲羊仲從之游耿韓詩慙非蔣生逕不敢望求羊子美醉時歌燈前細雨簷花落蓋贈廣文館學士鄭䖍也張翰使我有身後名不如生前一杯酒其四逺迹荒郊謝儁豪春風誰與駐干旄故交重趼恩何厚新句連篇韻更髙美似狂酲初噉蔗快如衰病得觀濤久知坯冶成天巧豈與人間共一陶漢賛逺迹羊豕之羣干旄大夫之旃注旄於干首此言閒居無有肯駐其車旄者亦謝朋遊之意重趼見送道光住靈岩注隋李諤論時文體尚輕薄連篇累牘不出月露之形前漢禮樂志景星歌泰尊柘漿析朝酲應劭注曰柘漿取甘柘汁以為飲酲酒病晉顧愷之每食甘蔗恒自尾至本人怪之愷之曰漸入佳境韓詩初味猶噉蔗遂通斯建瓴枚乘七發楚太子有疾呉客往問之曰將以八月之望與諸侯逺方交游兄弟並往觀濤乎廣陵之曲江至則未見濤之形也徒觀水力之所到則䘏然足駭矣後漢崔駰達㫖曰一天下之衆異齊品類之萬殊參差同量坯冶一陶其五無能私願只求田財一作時物安能學計然鑿井未成歌擊壤射熊猶得夢鈞天遥思故國歸來日留滯新恩已去年携手與君游最樂春風波上水濺濺史記越王困於會稽用范蠡計然計然曰知鬭則修備時用則知物二者形則萬貨之情可得而觀已徐廣曰計然者范蠡之師也名研崔駰曰計然者葵丘濮上人姓辛氏字文子其先晉國亡公子也嘗南游於越范蠡師事之公自言歸志未就猶在朝耳皇甫謐曰十七年與從姑子果柳等擊壤於路史記世家趙簡子我之帝所樂與百神游於鈞天廣樂九奏萬舞其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死又當道者云帝令主君滅二卿夫熊與羆皆其祖也不知介甫用此事何意劉夢得詩伊水濺濺相背流其六山陂疇昔從吾親諸父先生各佩紛零落長年誰語此遷囘故地却逢君衣冠偶坐論經術襁褓當時刺繡文更怪髙材終未遇有司何日選方聞内則左佩紛帨刀礪注紛帨拭物之巾備尊者使令杜詩客裏何遷次江邊政寂寥遷次猶遷囘曲禮偶坐不辭注偶配也一曰副貳貨殖傳刺繡文不如倚市門又襁褓小兒被言從少而壯日月易得漢武紀故詳延天下方聞之士咸薦諸朝注方道也聞博聞也言悉引有道博聞之士與進於朝寄呉正仲却䝉馬行之都官梅聖俞大博和寄依韻酬之山水𤣥暉去後空騷人還向此間窮小詩聊與論孤憤大句安能辱兩雄秦甲久愁荆劒利趙兵今窘漢旗紅背城不敢收餘燼馬首翩翩只欲東齊書謝朓字𤣥暉仕為尚書吏部郎為江祏等搆下獄死韓非說難孤憤漢書南越傳兩雄不俱立兩賢不並世秦昭王言楚之鉄劒利而倡優拙韓信破趙立漢赤幟紅字必别有出處成公二年賔媚人曰請收合餘燼背城借一襄公十四年余馬首欲東乃歸寄平父少時為學豈身謀欲老低囘各自羞乗馬從徒真擾擾求田問舍轉悠悠弦歌舊國平生樂鞍馬新年幾日留坐想摇鞭楊柳路春風先我入皇州韓愈進學解乗馬岑從徒安坐而食參詩摇鞭舉袂忽不見千樹萬樹空蟬鳴張祜詩嬋娟蹀躞春風裏揮手摇鞭楊柳隄謝𤣥暉詩宛洛佳遨遊春色滿皇州次韻舍弟常州官舍應客霜雪紛紛上鬢毛憂時自悔目空蒿桑麻只欲求三畝勢利誰能算一毫此地舊傳公子札吾心真慕伯成髙飄然更有乗桴興萬里寒江正復艚莊子駢拇篇今世之仁人蒿目而憂世之患三畝字屢用太平寰宇記云呉公子季札所居是為延陵之邑今常之晉陵即呉之延陵也公子札一作公子禮公子禮或謂公子春申君好禮士春申北地人莊子伯成髙辭諸侯而耕則髙字乃名也李固傳上梁商書誠令道行忠立明公踵伯成之髙豈與外戚凡軰同哉此髙字又謂髙節水衡記三月水名桃花水四月水名麥黄水五月水名𤓰蔓水十月水為復艚水言水落復故道舟還江南阻風有懐伯兄幾時重接汝南評兩槳留連不計程白浪黏天無限斷𤣥雲垂野少晴明平臯望望欲何向薄宦嗟嗟空此行會有開樽相勸日脊令隨處共飛鳴後漢許劭與兄靖俱有髙名共覈論鄉黨人物每月更題品由是汝南俗有月旦評公寄兄詩故用兄弟事杜詩功曹幾月程韓文洞庭汗漫黏天无壁杜詩星垂平野闊詩小宛題彼脊令載飛載鳴同陳伯通錢材翁遊山二君有詩因依元韻秋來閒興每登臨因叩精藍望碧岑强策羸驂尋水石忽驚幽鳥下煙林經一作同時覽物悲歡異自古忘名趣向深安得湖山歸我手靜看雲意學無心精藍亦猶伽藍精舍伽藍皆梵語寺名白詩散職無覊束羸驂夕送迎莊子嗜欲深者天機淺既忘名則天機深矣陶辭雲無心而出岫杜詩扁舟落吾手又雲在意俱遲夢張劒州萬里憐君蜀道歸相逢似喜語還悲江淮别業依前處日月新阡卜幾時自說曲阿留未穩即尋湓水去猶疑茫然知一作却是陳橋夢昨日春風馬上思檀弓下公叔戍曰日月有時將葬矣曲阿丹徒屬吳郡太康地記曲阿本名雲陽始皇以其地有王氣鑿地煙山以敗其勢截其直道使之阿曲故名曲阿皮日休記張祜以曲阿地古樸有南朝遺風遂築室種樹而家焉詩前六句皆叙夢事第七句始言是夢第八句又言思蓋因思而得之也其結體之精如此王荆公詩注巻三十二
