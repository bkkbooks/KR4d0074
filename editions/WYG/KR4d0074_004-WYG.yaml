body:
  text: 王荆公詩注巻四宋李壁撰古詩題半山寺壁二首半山報寜禪寺公故宅也由東門至蔣山此為半道故以半山為名其地亦名白塘舊以地卑積水為患公卜居乃鑿渠決水以通城河元豐七年公以病聞神宗遣國醫診視既愈乃請以宅為寺因賜額為報寜禪寺寺西有培塿乃荆公决渠積土之地又按續建康志半山寺即公故宅也再罷政以使相判金陵到任即納節固辭同平章事改左僕射未幾又懇求宫觀累表得㑹靈觀使築第於白下門外去城七里去蔣山亦七里平日乘一驢從數僮游諸寺欲入城則乘小舫泛湖溝以行盖未嘗乘馬與肩輿所居之地四無人家其宅僅蔽風雨又不設垣牆望之若逆旅之舎有勸築垣輙不荅元豐之末公被疾奏捨此宅為寺有㫖賜名報寜既而疾愈稅城中屋以居不復造宅父老曰今江寜縣治後廢惠民藥局其地即公城中所稅之宅也我行天即雨我止雨還住雨豈為我行邂逅與相遇其二寒時暖處坐熱時涼處行衆生不異佛佛即是衆生華嚴經心佛與衆生是三無差别定林寺按定林有上下二寺上定林寺舊基在蔣山應潮井後按建康實録上定林寺宋元嘉十六年禪師竺法秀造在下定林之後乾道間僧善鑑重建下定林寺在蒋山寶公塔西北按塔寺記宋元嘉元年又置下定林寺東去縣一十五里南史何嗣入鍾山定林寺閱内典齊東昏侯嘗至定林寺有沙門老病不能去命左右射之百箭俱發二事但云定林寺不分上下衆木凛交覆孤泉静横分楚老一枝笻於此傲人羣城市少美蔬想今困惔焚且凴東南風南一作北持寄嶺頭雲談藪陶𢎞景隠居華陽髙祖問之曰山中何所有𢎞景賦詩荅之曰山中何所有嶺上多白雲但可自怡恱不堪持贈君題定林壁定林又有菴公嘗讀書於此此詩必題菴壁也定林自有主我為林下客客主各有心還能共岑寂移桃花示俞秀老潘子真詩話云俞紫芝字秀老喜作詩人未知之荆公愛焉手冩其一聫有時俗事不稱意無限好山都上心於所持扇衆始異焉弟清老亦脩潔可喜俱從山谷游舎南舎北皆種桃東風一吹數尺髙枝柯蔫綿花爛漫美錦千兩敷亭臯閔公二年重錦三十兩注以二丈䨇行故曰兩三十兩三十匹也晴溝漲春緑周遭俯視紅影移漁舠山前邂逅武陵客水際髣髴秦人逃淵明桃花源記武陵人捕魚忽逢桃花林夾岸繽紛山有小口彷彿若有光便捨船從口入男女衣着悉如外人自云先世世避秦時亂來此遂與外人間隔問今是何攀條弄芳畏晼晚已見黍雪盤中毛家語孔子侍宴於魯哀公賜之桃與黍仲尼先飯黍而後噉桃哀公曰黍以雪桃也對曰丘知之矣夫黍五榖之長而桃為下君子以賤雪貴不聞以貴雪賤也仙人愛杏令虎守百年終屬樵蘇手葛洪神仙傳董奉居廬山治人疾不取貲使愈者人植杏五株數年成林奉乃作倉宣言人買杏者不湏來報但一器杏償一器稲人有欺者猛獸輙逐之所積稲復以施人余嘗至杏林故地即今太一觀是也樵取木也蘇取草也我衰此果復易朽蟲來食根那復久瑶池紺絶誰見有瑶池謂蟠桃言其說荒唐也更值花時且追酒君能酩酊相隨否古詩言服藥求神仙多為藥所誤不如飲美酒被服紈與素亦此意也對棊與道源至草堂寺北風吹人不可出清坐且可與君棊明朝投局日未晚從此亦復不吟詩書八功德水菴詳見八功德水注幽獨若可厭真實為可喜見山不礙目聞水不逆耳翛然無所為自得而巳矣言見山聞水黙與意㑹豈復有礙哉放魚捉魚淺水中投置最深處當暑脫煎熬翛然泳而去豈無良庖者可使供匕箸物我皆畏苦捨之寜啖茹陸璣草木蟲魚疏遼東梁水魴特肥美語曰居就粮梁水魴鱮似魴而頭大魚之不美者故里諺曰網魚得鱮不如啖茹霾風霾風摧萬物暴雨膏九州卉花何其多天闕亦巳稠天闕建康山名即牛首山白日不照見乾坤莽悲愁時也獨奈何我歌無有求偶書惠施說萬物槃特忘一句寄語讀書人呶呶非勝處莊子惠施多方其書五車楞嚴經周利槃特迦此云蛇奴善見律又翻為路傍生有長者女滛奔他國思唁父母中路生子因以為名或云過去世曽生蛇中其身隠然有文如蛇或云禱扵蛇神而生故云蛇奴曽為大法師有五百弟子祕吝佛法不肯教人得暗鈍報以宿善故遇佛出家五百比丘同授一偈經九十日不記隻字又說其兄盤伽先巳得度而槃特賦性愚鈍為兄所逐出門涕泣如來知其根熟付與掃箒日使掃地教誦掃箒二字得前忘後得後忘前思惟日久因有發明曰掃除喻八正道塵糞喻三毒垢掃箒義者正謂是矣乃令住閴静處端坐正意調出入息由心散亂一句伽佗不能記憶且數鼻中出入息風入息為首曰入息一出息二從一至十周而復始先入後出順生數先出後入順死數一生一滅循環無端微細窮盡生滅無從息風亦空心亡分别豁然開悟見息實相本一妙明圎常之性乃成無學即事二首雲從鍾山起却入鍾山去借問山中人雲今在何處其二雲從無心來還向無心去無心無處尋莫覓無心處禪歌莫道無心便為道無心猶隔一重闗又大智發於心心於何處尋擬寒山拾得二十首牛若不穿鼻豈肯推人磨馬若不絡頭隨宜而起卧乾地終不涴平地終不墮擾擾受輪迴秪縁疑這箇荘子秋水北海若曰牛馬四足是謂天絡馬首穿牛鼻是謂人乾地平地說境不涴不墮說自心也又心經疏云本圓自住體同太虚垢本何依淨從何立寒山詩不省這箇意其二我曾為牛馬見草豆歡喜又曾為女人歡喜見男子我若真是我秪合長如此若好惡不定應知為物使堂堂大丈夫莫認物為已此言結習易染雖宿命所好今生猶戀着也小人役於物為物使也故楞嚴云若能轉物即同如來圓覺經譬如有人認賊為子其家財寶終不成就其三凡夫當夢時眼見種種色此非作故有亦非求故獲不知今是夢道我能蓄積貪求復守護嘗怕水火賊既覺方自悟本空無所得死生如覺夢此理甚明白圓覺經善男子此無明者非實有體如夢中人夢時非無及至於醒了無所得圓覺經生死湼槃猶如昨夢善男子如昨夢故當知生死及與湼槃無起無滅俗人夢覺始知其空而不知世間諸縁亦皆夢也其四風吹瓦墮屋正打破我頭瓦亦自破碎豈但我血流莊子逹生篇復讎者不折鏌干雖有忮心者不怨飄瓦注由瓦無情故我終不嗔渠此瓦不自由衆生造衆惡亦有一機抽渠不知此機故自認愆尤此但可哀憐勸令真正脩豈可自迷悶與渠作寃讎楞嚴經雖見諸根動要以一機抽寶積經煩惱性是佛境界觀煩惱性空是正修行迷悶謂不識自心也僧問慶諸禪師西來意師曰空中一片石㑹麽曰不㑹師曰賴汝不㑹㑹即打破你頭其五若言夢是空覺後應無記若言夢非空應有真實事燔燒陽自招沉溺隂自致念汝嘗驚魘豈知安穩睡列子陰氣壯則夢涉大水而恐懼陽氣壮則夢渉大火而燔焫又浮虛為疾者則夢揚沉實為疾者則夢溺然詩意非列子所指也遺教經云黒蛇藏汝室睡當以持戒之鈎早併除之即可安眠其六人人有這箇這箇没量大馬祖語亮坐主有曰從生從死只是這箇南泉語黄蘖運曰長老身才没量大笠子大小生坐也坐不定走也跳不過鋸也觧不斷鎚也打不破作馬便搭鞍作牛便推磨若問無眼人這箇是什麽便遭伊纒繞鬼窟裏忍餓僧問南泉只如亡僧遷化向甚麽處去荅云東家作牛西家作馬又問意㫖如何荅云遇騎即騎遇下即下其七我讀萬巻書識盡天下理智者渠自知愚者誰信爾竒哉閒道人跳出三句裏獨悟自根本不從他處起禪宗論雲門有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所到其三為函葢乾坤句謂泯然皆契無間可伺其深淺以是為序云其八幸身無事時種種妄思量張三袴口窄李四㡌簷長失脚落地獄將身投鑊湯誰知受熱惱却不解思凉言人不能破妄歸真滅去衆念死受諸苦皆由此也是猶執熱而不以濯也其九有一即有二有三即有四一二三四五有亦何妨事如火能燒手要須方便智若未解傳薪何須學鑽燧白雲端禪師云一二三四五剩得大多六七八九十却少些子作麽生向定盤星上秤得恰好去大衆到頭霜夜月任運落前溪荘子指窮於為薪火傳也不知其盡也其十昨日見張三嫌他不守巳歸來自悔責分别亦非理今日見張三分别心復起若除此惡習佛法無多子其十一傀儡秪一機種種没根㘽被我入棚中昨日親看來方知棚外人擾擾一場獃終日受伊謾更被索錢財樂府雜録傀儡起漢平城之圍心役於五根亦猶傀儡為人牽掣僧問如何是第三句臨濟師曰看取棚頭㺯傀儡抽牽全藉裏邊人其十二李生坦蕩蕩所見實竒哉問渠前世事荅我燒炭來炭成能然火火過却成灰灰成即是土隨意立根栽李生指士雲也圎覺經譬如鑽火兩木相因火出木盡灰飛煙滅以幻修幻亦復如是又偈云如木中生火木盡火還滅覺即無漸次方便亦如是其十三衆生若有我我何能度脫衆生若無我巳死應不活衆生不了此便聼佛與奪我無我不二四天王獻鉢維摩經加旃延問疾維摩云於我無我而不二是無我義注小乘以封我為累故尊於無我無我既尊則於我為二大乘是非齊㫖二者不殊為無我義也四天王各獻一鉢於佛佛以手疊鉢曰一即四四即一又諸經要集云佛将成道無食器四天王各獻一鉢即石鉢佛總受之以表平等佛以四鉢按之為一四鉢仍現比丘不許用此恐與佛等石鉢帝青寳鉢也其十四莫嫌張三惡莫愛李四好既徃念即晚未來思又早見之亦何有歘然如電掃惡既是磨滅好亦難長保若令好與惡可積如財寶自始而至今有幾許煩惱其十五失志難作福得勢易造罪苦即念快樂樂即生貪愛無苦亦無樂無明亦無昧不屬三界中亦非三界外佛書言世間凡富貴人及諸天龍鬼神具大威力者脩無上道難造種種業易所發菩提心旋發旋忘如飽滿人厭棄飲食所作福業舉意便成如一滴水流入世間即為江河是故佛說此等深可畏怖志公歌任縱横沒忌諱長在人間不居世運用不離聲色中歴劫何曽暫抛棄其十六打賊賊恐怖看客客喜歡亦有客是賊切莫受伊謾樂哉貧兒家無事役心肝既無賊可打豈有客須看古宿語客來則接賊來則打瑞岩常自呼主人翁惺惺着莫受人謾賊不打貧兒家祗林和尚語其十七有一種貧兒不能自營生若不作客走即須隨賊行復有一種貧常時腹彭亨若有亦不畜若無亦不營寒巖子詩世有一種人不惡又不善不識主人翁隨客處處轉因循過時光渾是癡肉臠雖有一靈臺何殊客作漢漳州羅漢和尚歌袒膞當胷打一拳直至如今常快活只聞肚裏飽彭亨更不東西去持鉢其十八汝無名髙者以見利貪叨汝無行實者以取著名髙行實尚非實利名豈堅牢一朝投土窟魂魄散逃逃汝見利貪叨故無名髙汝取著名髙故無行實其十九勇有孟施舎能無懼而已若人學佛法勇亦當如此休來講下坐莫入禪門裏但能一切捨管取佛歡喜圎覺經一切衆生能捨諸欲及除憎愛永斷輪廽勤求如來圎覺境界於清浄心便得開悟其二十利瞋汝刀山濁愛汝灰河汝癡分别心即汝琰魔羅圎成但一性一切法依他徧了一切法不如且頭陀心不離癡即是魔境琰羅即閻羅之類也見地蔵十輪經瞋譬則刀山也愛譬則灰河也佛經三性圓成實性依他起性徧計性選李善注頭陀斗藪也言斗藪煩惱也自遣閉户欲推愁愁終不肯去厎事春風來留愁愁不住庾信集攻許愁城終不破盪許愁城終不開閉户欲推愁愁終不肯去深蔵欲避愁愁巳知人處自喻岸凉竹娟娟水浄菱帖帖鰕摇浮游鬚魚鼓嬉戲鬛釋杖聊一愒褰裳如可涉自喻適志歟翻然夢中蝶古意采芝天門山寒露浄毛骨帝青九萬里空洞無一物華嚴經帝青珠帝釋所寶玩此言天九萬里盡為青帝色也周顗傳指腹謂王導曰此中空洞無物足容君軰數百人傾河畧西南晶射河鼓没晶精光也牽牛之北為河鼓蓬萊眼中見人世歎超忽麻姑云接待以來巳見東海三為桑田向到蓬萊水又淺於徃者當時棄桃核聞巳撐月窟且當呼阿環乘興㺯溟渤王母傳命侍女取桃以玉盤盛七枚四與武帝食母自食三帝欲收核種之母曰此桃三千嵗一實中土地薄種之不生王母降漢宫遣侍女與上元夫人書云云客主對坐悒悒不樂夫人可暫來否若能屈駕當停相須一時頃侍女回上元荅云阿環再拜上問起居逺隔絳河擾以官事遂替顔色近五千年世多指阿環為王母今㨿此則上元夫人亦名阿環也吾心吾心童稚時不見一物好意言有妙理獨恨知不早初聞守善死頗復吝肝腦中稍歴艱危悟身非所保猶然謂俗學有指當窮討晩知童稚心自足可忘老詩意若悟萬法本空形骸肝腦非所吝也荘子宋榮子猶然笑之無營無營固無尤多與亦多悔物隨擾擾集道與翛然㑹墨翟真自苦莊周吾所愛萬物莫足歸此言猶有在病起稚金敷新涼老火灺殘濁桃枝煗淟涊散髪晞曉捉煩痾脫然醒浄若遺身覺移榻欹獨眠欣佳恐難數淟涊穢濁也晞乾也孫休詔諸卿尚書可共咨度務取便佳公所用欣佳亦類此獨歸鍾山獨歸雨微㝠稻畦夾岡半黄青陂農心知水未足看雲倚木車不停悲哉作勞亦巳乆暮歌如哭難為聽而我官閒幸無事北窗枕簟風泠泠於時荷花擁翠葢細浪嬲雪千娉婷誰能欹眠共此樂秋港雖淺可揚舲前人固以荷花比婦人矣但不若公語之清婉也獨卧有懐午鳩鳴春隂獨卧林壑静微雲過一雨淅瀝生晩聽紅緑紛在眼流芳與時競有懐無與言佇立鍾山暝無動無動行善行無明流有流種種生住滅念念聞思修終不與法縛亦不著僧裘華嚴經起信抄中善行非福行不動行无明流煩惱流欲有流又四相生住滅首楞嚴經我於彼佛發菩提心彼佛教我從聞思修入三摩地圓覺經不與法縳不求法脫夢知世如夢無所求無所求心普空寂還似夢中隨夢境成就河沙夢功徳車載板二首鬼車不祥鳥也一名車載板荒哉我中園珍果所不産朝暮惟有鳥自呼車載板楚人聞此聲莫不笑而莞而我更歌呼與之相往返視遇若搏黍好音而睍睆攘攘生死夢久知無可揀物弊則歸土吾歸其不晚歸歟汝隨我可相蒿里挽法雲秀公云平生生死夢三者无可揀然要推知先後崔豹古今注薤露蒿里並䘮歌出田横門人横自殺門人傷之悲歌言人命如薤上之露易晞滅亦謂人死魂精歸于蒿里薤露送王公貴人蒿里送士大夫庻人使挽柩者歌之其二鳥有車載板朝暮嘗一至世傳鵩似鴞而此與鴞似唯能預人死以此有名字疑即賈長沙當時所遭值洛陽多少年擾擾經世意粗聞方外語便釋形骸累吾衰久捐書放浪無復事尚自不見我安知汝為異憐汝好毛羽言音亦清麗胡為大多知不黙而見忌楚人既憎汝彈射將汝利且長隨我游吾不汝羮胾賈誼傳有鵩飛入誼舎鵩似鴞不祥鳥也荀子今夫猩猩亦二足而毛也然而君子啜其羮食其胾捐書出莊子跋黄魯直畫江南黄䳺飛滿野徐熈畫此何為者百年幅紙無所直公每玩之常在把䳺鳥含切說文䳺鶉屬也過楊德逢莊擕僧出西路日宴昧所投循河望積穀一飽覺易謀稚子舉桉出咄嗟見盤羞飯新秔有香煮菜㫖且柔内則甘㫖柔􅉸暮從秀巖歸秣蹇得少留捧腹笑相語果然無所求史記司馬季主捧腹大笑莊子腹猶果然注飽貌也果音顆王荆公詩注卷四
