body:
  text: 王荆公詩注巻十三宋李壁撰古詩杜甫畫像苕溪漁隠曰李杜畫像古今詩人題詠多矣若杜子美其詩髙妙固不待言要當知其平生用心處則半山老人之詩得之矣吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收甫上書自稱自七嵗屬辭且四十年然衣不蓋體常寄食於人竊恐轉死溝壑惟天子哀怜之觀此其窮可知矣青衫老更斥甫至德二年自賊中亡走鳯翔謁帝拜右拾遺旋以房琯罷甫疏言罪細不宜免大臣坐是斥餓走半九州瘦妻僵前子仆後攘攘盗賊森戈矛傳稱時所在冦奪甫家寓鄜彌年囏窶孺弱至餓死因許甫自往省視為華州司功叅軍闗輔飢輙棄官去客秦州負薪採橡栗自給流落劍南結廬成都西郭從嚴武幾為所殺武卒崔旰等亂甫徃來梓䕫間大歴中出瞿唐下江陵泝沅湘吟哦當此時不廢朝廷憂常願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼飀傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之游公不喜李白詩而推敬少陵如此特以其一飯不忘君而志常在民也吳長文新得顔公壊碑魯公之書既絶倫嵗久更爲時所珍荒壇壊塚朽崖屋剥落風雨埋煨塵斷碑數尺誰所得㸃畫入紙完如新延陵公子好事者拓取持寄情相親歐公集古録敘好之已篤則力雖不足猶能致之故上自周宣下更史漢隋唐五代外至四海九州窮崖絶谷荒林破塚神仙鬼物詭怪所傳莫不皆有延陵謂長文也六書篆籀數變改訓詁後世多失真六書即周官保氏教國子以六書注象形象事象意象聲轉注假借造字之本所謂字有六義者是也周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書至秦焚燒先典古文遂絶李斯趙髙皆取史籀大篆或頗省改所謂小篆者或曰程邈造又曰邈所定乃𨽻字也盖秦厭篆字難成即令𨽻人佐書曰𨽻字又上谷王次仲始作楷法所稱妄鑿者後來蕭衍評書三十六種之類亦是也大扺自秦改小篆作𨽻書人益趍簡便古法既變字義浸譌許叔重患其若此集倉雅之學研六書之㫖作說文解字十五篇篆籀之體由是粗可考然得其真者寡矣誰初妄鑿妍與醜坐使學士勞骸筋梁鵠相魏以勤書自効張伯英臨池學書池水盡黑皆勞骸筋者李端伯記二程語云子弟凡玩好皆奪志至於書札於儒者事最近然一向好著亦自䘮志如王虞顔栁軰誠為好人則有之曾見有善書者知道否平生精力一用於此非惟徒廢時日於道便有妨處足知䘮志堂堂魯公勇且仁出遇世難親經綸揮毫卓犖又驚俗豈亦以此誇常民但疑技巧有天得不必勉强方通神杜詩書貴瘦硬方通神詩歌甘棠美召伯愛惜蔽芾由思人時危忠誼常恨少寶此勿復令埋堙鄭駟歂殺鄧析君子謂子然不忠詩曰蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹況用其道不恤其人乎歐公言使顔公書雖不佳後世見者未必不寳也又云古人豈皆能書獨其賢者傳遂遠答揚州劉原甫原甫知揚州在嘉祐元年二年三年國史傳敞字仲原父袁州臨江人慶歴中舉進士廷試第一編排官王堯臣以親嫌自列乃以爲第二召入朝判考功言夏竦諡文正不應去張貴妃追號温成皇后有請立忌者敞言太祖以來后廟四室陛下之妣也猶不立忌豈可以私昵之愛而變古越禮乎嘉祐四年祫饗薦羣臣上尊號敞言自寳元以來不受徽號今二十年奈何一旦増虛名而損實美仁宗從之禮官建白請以孝章皇后以下四主饗於别廟不升合食敞奏九經所載祫祭制度最明備者莫如春秋公羊傳自漢以下皆引以爲證所謂未毁廟者豈有帝后之限哉國朝循守行之且百年今羣臣不務推原春秋之義而獨引後儒疑近之說不務講求本朝之故而專倡異代難通之制不務將順主上廣孝之心而輕議宗廟久行之儀欲擯隔四后不得合食於先帝臣竊恨之昔貢禹議罷原廟丞相衡議遷郊兆羣臣和之者非一自以謂周公孔子復生不可得變元帝信之然而通人未以爲當既而皆悔之則无及矣敞爲人明白俊偉善論說當時學者未知崇尚經術獨敞能傅經引義自六經諸子百氏至傳記小說无不通貫而文章尤敏贍在西掖一日追封皇子公主九人敞將下直爲之立馬却坐食頃九制數千言巳就遇事多所建明以好譏議為執政所忌故知制誥積七年不遷卒年五十據此則公詩所稱髙世才真不虚美矣少食苦不足一官聊自謀爲生晩更拙懐禄尚遲留黽勉詎有補詩黽勉從事强顔包衆羞易否包羞位不當也謂我古人風知君以相優公自注云來詩有因君古人風更欲投吾簪之句君實髙世才主恩正繆綢哿矣哀此民華簪寧易投北山移文昔聞投簪逸海岸寄鄂州張使君昔人寧飲建業水共道不食武昌魚公來建業每自如亦復不厭武昌居孫權黄武八年童謡云寧飲建業水不食武昌魚寧就建業死不就武昌居武昌山川今可想緑水逶迤煙莽蒼白鷗晴飛随兩槳岸薺茸茸映魚網投老留連陌上塵思君一語何由徃送元厚之待制知福州名絳工於文詞爲流軰所推神宗遇絳甚厚其卒也詔其家集平生之文章上之絳在中書蕃夷書詔多出其手居外所至有威名然傷急暴絳自鹽鐡副使出知福州擢天章閣待制始班侍從故詩云改新步海隅山谷間人物最多處平旦息相吹莊子生物以息相吹也連城黕如霧閩王舊宫室五代史王審知封閩王丹漆美無度今爲大帥府千里來赴愬元侯文章翁更以吏能著峩峩中天閣鳴玉改新歩銜詔出梨嶺方為遠人慕梨嶺閩之最髙山旌旗滿流水冠蓋東門駐四坐共咨嗟疑侯不當去張仲稱孝友樊侯正求助詩侯誰在矣張仲孝友樊侯公自指也本傳稱絳諂事公父子云名城雖云樂行矣未宜遽厚之到閩有詩謝京師故人曰丹荔黄甘北苑茶勞君誘我向天涯爭如太液樓邉看池北池南總是花傷杜醇杜生四五十孝友稱鄉里隠約不外求詩意謂有道者无所假於外而樂耕桑有妻子漢楊惲答孫㑹宗書率妻子戮力耕桑藜杖牧雞豚筠筒釣魴鯉鮑明遠東武吟倚杖牧雞㹠豚㹠同郭景純江賦筒灑連鋒罾䍣比船注筒灑罾䍣取魚器也嵗時沽酒歸亦不乏甘㫖天涯一桮飯夙昔相逢喜談辭足詩書篇詠又清泚都城問越客安否常在耳日月未渠央如何棄予死古風久凋零好學少爲已悲哉四明山此事一作士今已矣公爲鄞縣常有書請醇入縣學及在朝又數從越人問其安否公厚醇如此其退之所稱董召南之流乎讀公詩可想見其人哭梅聖俞歐公亦有哭聖俞詩同此韻王文康初見聖俞文歎曰二百年无此作矣近臣薦公經明行修願得留與國子諸生講論道德作爲雅頌以歌詠聖化詩行於世先春秋國風變衰始柏舟文辭感激多所憂律吕尚可諧鳴球先王澤竭士已偷紛紛作者始可羞其聲與節急以浮真人當天施再流篤生梅公應時求頌歌文武功業優經竒緯麗散九州衆皆少鋭老則不公獨辛苦不能休惜無采者人名遒遒人宣令之官正義訓遒為聚聚人而令故以為名貴人憐公青兩眸阮籍傳籍能爲青白眼見禮俗之士以白眼對之嵇康來乃見青眼吹噓可使髙岑樓坐令隠約不見收岑樓山之鋭嶺者貴人謂歐公軰徒能資之而不能薦也歐公歸田録云梅聖俞以詩知名三十年終不得一館職晩年與修唐書語其妻刁氏曰吾之修書可謂猢孫入布袋矣刁氏對曰君於仕宦亦何異鮎魚上竹竿耶聞者皆以爲善對空能乞錢助饙餾疑此有物司諸幽爾雅饙餾稔也釋曰稔熟也孫炎曰蒸之曰饙均之曰餾說文云饙一蒸米也餾飯氣流也大雅泂酌云可以餴饎其義同韓集南山詩或如火熺煙或若氣饎餾公所以得為國子監直講者以近臣趙槩等薦然未足究其藴猶不薦也檀弓北靣求諸幽此借用棲棲孔孟葬魯鄒後始卓犖稱軻丘聖賢與命相楯矛勢欲强逹誠無由詩人況又多窮愁李杜亦不爲公侯公窺窮阨以身投坎軻坐老當誰尤吁嗟豈即非善謀虎豹雖死皮終留豹死留皮人死留名梁王彦章語飄然載䘮下隂溝粉書幅軸懸無旒公嘉祐五年死於京師年五十九其孤増載其柩歸宣州官小者於制無旒髙堂萬里哀白頭東望使我商聲謳母仙遊縣太君束氏清河縣太君張氏聖俞死張氏猶在商聲屬秋而悲寗戚扣牛角而商歌謂作商聲也遊章義寺章義寺本齊集善寺唐改今名又改爲法雲院在蔣山寺西九日章義寺倦遊因解鑣拂榻寄午夢起尋北山椒山椒山陵也岑蔚鳥絶迹悲鳴惟一蜩歡言與僧期於此共簞瓢斬松八九根窗壁具一朝伏檻何所見蒼蒼圍寂寥巖谷寒更静水泉清不摇安得有車馬尚無漁與樵神茂真觀復道家云神住則氣住氣住則形住世人多苦神氣散亂真觀何從而復公所謂真觀者即元神非識神也心明衆塵消隂嶺有佳客儻來不須招飰祈澤寺按建康志祈澤寺在府城東驛路之北去城二十五里宋少帝建駕言東南還午飰投僧館山白梅蘂長林黄栁芽短笭箵沙際來元結傳帶笭箵而盡船獨聱齖而揮車笭力丁切箵息拯切取魚籠也畧彴桑間斷武帝紀初㩁酒酤注㩁者歩渉橋爾雅謂之石矼今之畧彴是也彴音酌春映一川明雪消千壑漫魚随竹影浮鳥誤人聲散翫物豈能留干時吾自懶答瑞新十遠瑞新死心禪師公集有書瑞新道人壁必此人也今附於此始瑞新道人治其衆於天童之景德予知鄞縣愛其材能數與之遊後新主此山之四年予自淮南來視蘇州之積水卒事訪焉則新既死於京師聞其死者知與不知莫不愴焉而予與之又久以深宜其悲也夫新之材信竒矣然自放於世外而悼惜之如此彼公卿大夫操治民之勢而能以利澤加焉則其生也榮其死也哀不亦宜乎皇祐五年六月十五日臨川王某謹題遠水悠悠碧遠山天際蒼中有山水人寄我十遠章我時在髙樓徙倚觀八荒亦復有遠意千載不相忘送文學士倅卭州文同與可也上世自巴徙梓之永泰登皇祐元年髙第嘉祐四年任館職以親老請通判卭州誌稱與可資廉方居家不問資産所至尤恤民事有不便如巳納之阱中必爲出之而後巳退而齊居一室書史圖畫羅列左右彈琴著文寒暑不廢事親孝未嘗違去晨暮恬於遠宦以便甘㫖者十有餘年不趣時好不避權仇修其在巳而不求其在人者安義與命盖超然自得平居以言誨諸子而自踐之者其大㫖如此故凡與之游皆名節文行之士顯用於今者而公獨不與焉命也夫司馬温公嘗遺書曰與可襟韻瀟灑如晴雲秋月塵埃不到光心服者非特辭翰而已文翁出治蜀蜀士始文章按文翁景帝末為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士數嵗蜀生皆成就還歸文翁以爲右職用次察舉官有至郡守刺史者又修起學校於成都市中招下縣子弟以為學官弟子爲除更徭髙者以補郡縣吏次爲孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云文翁終於蜀吏民為立祠堂嵗時祭祀不絶至今巴蜀好文雅文翁之化也司馬唱成都嗣音得王揚犖犖漢守孫千秋起相望據與可誌銘范子功作云其先文翁廬江人為蜀守子孫因家焉操筆賦上林脫身選爲郎司馬相如上林賦奏天子以爲郎擁書天禄閣竒字校偏旁劉棻嘗從雄學作竒字忽乘駟馬車牛酒過故鄉時平無諭檄相如既拜中郎將建節乘傳徃賂西南夷至蜀太守以下郊迎卓王孫臨卭諸公皆因門下獻牛酒以交驩相如為郎㑹唐䝉發吏民千人轉漕萬餘人通夜郎僰中巴蜀大驚恐於是遣相如責䝉因以檄諭告蜀民以非上意不訪碧雞祥水經越嶲有同山其山神有金馬碧雞光景倐忽民多見之漢遣王褒徃祭欲致其雞馬道病卒褒碧雞頌曰敬移金精神馬縹碧之雞問君行何為關隴正繁霜中和助宣布循吏綴前芳豈特爲親榮區區誇一方漢宣帝時益州刺史王襄欲宣風化於衆庶召王褒使作中和樂職宣布詩送宋中道通判洺州中道參政綬之季子漳水不灌鄴不知幾何時後世有史起乃能爲我爲魏史起引漳水溉鄴漳濁漳也按水經出上黨長子縣西又東出山過鄴縣西漢志曰魏文侯時西門豹爲鄴令有令名至文侯曽孫襄王時與羣臣飲酒王爲羣臣祝曰令吾臣皆如西門豹之爲人臣也史起進曰魏氏行田也以百頃鄴獨二百畝是田惡也漳水在其傍西門豹不知用於是以史起爲鄴令遂引漳水溉鄴以富魏之河内民歌之余嘗憐洺民舄鹵半不治舄鹵鹹地也許氏説文鹵鹽地也東方謂之斥西方謂之鹵又貨殖傳太公封於營丘地舄鹵注鹹地也頗覺漳可引但爲談者嗤介甫既相遣程助治漳水一方大騷竟無成功髙議不同俗功成人始思夫子到官日勿忘吾此詩送張公儀宰安豐縣屬夀州楚客來時雁為伴歸期祗待春氷泮雁飛南北三兩回回首湖山空夢亂秘書一官聊自慰安豐百里誰復歎揚鞭去去及芳時夀酒千觴花爛漫送陳諤有司昔者患不公糊名謄書今故密論才相若子獨棄外物有命真難必鄉閭孝友莫如子我願卜鄰非一日朱門奕奕行多慚歸矣無爲惡蓬蓽孫長倩歸輝州溪澗得雨潦奔逸不可航江湖收百川浩浩誰能量溪澗之日短江海之日長願生畜道德江海以自方送喬秀才歸髙郵薄飯午不羮空爐夜無炭寥寥日避席烈烈風欺幔謂予勿惡此何爲向子歎長年客塵沙無婦助親爨寒暄慰白首我弟纔將冠邅迴嵗又晩想見淮湖漫古人一日養不以三公換田園在戮力且欲歸鋤灌行矣子誠然光隂未宜翫負米力有餘能無讀書伴雲山詩送正之雲山參差碧相圍溪水詰曲帶城陴韓詩綿綿相糾結狀似環城陴又詰曲思曽繞溪窮壤斷至者誰予獨與子相諧熙韓祭李氏文出從於人既相諧嬉山城之西鼔吹悲水風蕭蕭不滿旗李義山聖女祠詩一春夢雨常飄瓦盡日靈風不滿旗子今去此來何時予有不可誰予規正之謂孫侔公之畏友誰予規之語足見公始未嘗不樂聞忠告也王荆公詩注巻十三
