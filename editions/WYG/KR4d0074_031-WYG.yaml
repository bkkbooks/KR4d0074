body:
  text: 王荆公詩注巻三十一宋李壁撰律詩和文淑湓浦見寄文淑公女弟張劒州之妻亦能文多難漂零歲月賖空餘文墨舊生涯相看楚越常千里不及朱陳似一家髪為感傷無翠葆眼從瞻望有𤣥花惟詩與我寛愁病報爾何妨賦棣華孟浩然送從弟邕千里在俄傾三江坐超忽向來共歡娯日夕成楚越徐州古豐縣有村曰朱陳去縣百餘里一村唯朱陳兩姓世為婚姻白樂天作朱陳村詩子虛賦建翠乗之旗師古注云以翠羽為旗上葆也光武紀益州傳送公孫述葆車輿輦注葆車謂上建羽葆也合聚五采羽名為葆又廣陵王謀反上賜璽書云當此之時頭如篷葆注頭久不理如蓬茸羽葆韓渥詩心為感恩長慘戚鬢縁多病早蒼浪韓愈詩𤣥花著兩眼視物隔縰褵次韻呉季野再見寄衣裘南北弊風塵志格卑汚已累親流俗尚疑身察察交游方笑黨頻頻逺同魚樂思濠上老使鷗驚恥海濵邂逅得君還恨晚能明吾意久無人蘇秦家貧親老觸塵埃䝉霜露越漳河以見李兊抵掌而談李兊遺以黒貂之裘黄金百鎰秦迺西入於秦書十上而說不行黒貂之裘弊資用乏絶去秦而歸羸縢履蹻負書擔囊形容枯槁面目黧黒狀有愧色至家妻不下袵嫂不為炊父母不與言秦嘆曰云云皆秦之罪也屈平安能以身之察察受物之汶汶者乎揚子頻頻之黨甚於鸒斯莊子與惠子遊於濠梁之上莊子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我之不知魚之樂列子海上之人有好漚鳥者每旦之海上從漚鳥游漚鳥之至者百住而不止注曰住當作數其父曰吾聞漚鳥皆從汝游汝取來吾玩之明日之海上漚鳥舞而不下次韻平甫贈三靈程惟象家山松菊半荒蕪杖策窮年信所如占見地靈非卜筮算知人貴自陶漁久諳郭璞言多驗老比顔含意更疎秪欲勒成方士傳借君名姓在新書李羣玉詩舊館苔蘚合幽齋松菊荒司馬遷書居則忽忽若有所忘出則不知所如往師古曰如亦往也洛誥我又卜瀍水東亦惟洛食此以卜筮占見地靈也今言非卜筮其術猶髙矣公孫丑稱舜自耕稼陶漁以至為帝無非取於人者此以惟象擬璞久諳云者謂熟聞其術之驗按璞傳庾翼幼時嘗令璞筮公家及身卦成曰立始之末丘山傾長順之初子凋零及康帝即位始改元為建元或謂庾氷曰忘郭生之言乎立始建元也丘山土名也此號不宜用氷撫心歎恨帝崩何充改元為永和庾翼歎曰天道精㣲乃當如此長順者永和也吾庸得免乎璞之占驗之占類撰前後筮驗六十餘事名曰洞林璞嘗欲為顧含筮含曰年在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜方士傳史記謂之龜筴日者續漢書謂之方術三國志謂之方伎晉及北史謂之藝術新舊唐書並謂之方伎皆醫卜之流也嵇康傳撰上古以來髙士為之傳賛次韻和甫詠雪奔走風雲四面來坐看山隴玉崔嵬平治險穢非無徳潤澤焦枯是有才勢合便疑包地盡功成終欲放春回寒鄉不念豐年瑞只憶青天萬里開退之詠雪松篁遭挫折糞壤獲饒培髙駢雪詩逡巡好上髙樓看蓋盡人間惡路岐亦平治之意韓詩隱匿疵瑕盡包羅委𤨏該又翕翕凌厚載末言久雪願晴次韻張氏女弟詠雪天上空多地上稀初寒風力故應㣲那能鎮壓黄塵起强欲侵凌白日飛邑犬横來矜意氣窟蟾偷出助光輝都城只有袁安憊我亦年年幸賜衣唐人詩枝上空多地上稠詩北風其涼雨雪其雱退之詠雪助留風作黨晉童謡不見馬上郎但見黄塵起又獻裴尚書雪詩照曜凌初日又欺梅併壓枝又詠雪贈張籍日輪埋欲側坤軸壓將頽射訓狐詩意欲唐突羲和鳥楚詞邑犬羣吠吠所怪也兼用柳子厚吠雪事窟蟾謂月中蟇也謝惠連雪賦月承幌而通輝退之春雪詩莫愁隂景促夜色自相饒公又有閶闔與風生意氣姮娥教月借光輝之句次韻徐仲元詠梅二首溪杏山桃欲占新亭梅放蘂尚嬌春額黄映日明飛燕肌粉含風冷太真玉笛淒涼吹易徹氷紈生澁畫難親爭妍喜有君詩在老我翛然敢效顰江淹别賦羅與綺兮嬌上春李義山詠蝶詩壽陽公主嫁時粧八字宫眉捧額黄又早梅詩何處拂胷資蝶粉幾時塗額藉蜂黄雖言飛燕借用壽陽公主事宋武帝女壽陽公主人日卧於含章簷下梅花落公主額上成五出之花拂之不去後留之自是有梅粧後人多效之李白詩黄鶴樓中吹玉笛江城五月落梅花曹松詩初開偏稱雕梁畫未落先愁玉笛吹古樂府有落梅曲江總落梅詩横笛短簫吹復咽誰知柏梁聲不絶漢書地理志齊俗織作氷紈綺繡純麗之物師古曰紈素也氷謂布帛之細其色鮮㓗如氷莊子天運篇西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走注通俗文蹙額曰矉其二舊挽青條冉冉新花遲亦度柳前春肌氷綽約如姑射膚雪參差是太真摇落㑹應傷歲晚攀翻䞉欲寄情親終無驛使傳消息寂寞知誰笑與顰選詩青條若葱蒨姑射事公屢用樂天長恨歌雪膚花貎參差是謂楊妃也又詩霜降水反壑風落木歸根苒苒歲將晏物皆復本原謝靈運詩桂技徒攀翻注云桂樹貞芳可以翫游今友人不還故徒為攀援誰與共之翻援也孟浩然詩云茱萸正好佩折取寄情親次韻酬陸彦囘經之子也中郎筆墨妙他年晚與君游喜象賢欵欵故情初未愸飄飄新句總堪傳英才但未遭文舉明主寜當棄浩然投贈臨分加組麗小詩能不强雕鐫江文通賦雖淵雲之墨妙皆嚴樂之筆精又君房言語妙天下經歐公朋友有文名書㣲子之命惟稽古崇徳象賢文公十二年兩軍之士皆未愸也注愸缺也孔北海薦禰衡淑質貞亮英才卓躒摭言載孟浩然入翰苑訪王維適明皇駕至浩然蒼黄伏匿維不敢隱而奏知明皇曰吾聞此人久矣召使進所業浩然誦不才明主棄多病故人疎明皇曰吾未嘗棄卿何誣之甚也放歸襄陽揚子霧縠之組麗曰女工之蠧也留題曲親盆山公自注云和州曲叙巧與天成未覺殊國工施手豈須㬰根連滄海蓬萊闊勢壓黄河砥柱孤坐上煙嵐生紫翠影中樓閣見青朱為山觀水皆良喻誰向君家識所趍巧謂假人為也考工記國工注國之名工鍾離權詩自言住處連滄海别是蓬萊第一峯砥柱山名在虢城東北大陽城東酈道元水經注云昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過見水中若柱故曰砥柱三穿既决水流疎分指狀表白亦謂之三門杜堂上不合生楓樹又假山詩幽處欲生雲不到大初兄所居遂巳十年以詩攀寄一水衣巾剪翠綃九峯環珮刻青瑶生才故有山川氣卜築兼無市井囂三葉素風門閥在十年陳迹履綦銷歸榮早晚重携手莫負幽人久見招杜詩安得并州快剪刀剪取呉松半江水杜牧池州詩弄水亭前溪颭灧翠綃舞韓詩其字重青瑶鐫前漢書地理志云凡民函五常之性而剛柔緩急音聲不同繫水土之風氣又楊憚傳西河魏土文侯所興有叚干木田子方之遺風漂然皆有節㮣知去就之分安定山谷之間昆戎舊壤子弟貪鄙此皆謂人才係山川之風氣左氏晏子之宅近市湫隘囂塵不可以居思𤣥賦逮三葉而遘武班媫妤詞思君兮履綦携手同歸陸士衡招隱詩躑躅欲安之幽人在浚谷偶成二首懐抱難開醉易醒曉歌悲壯動秋城年光斷送朱顔老世事栽培白髪生三畝未成幽處宅一身還逐衆人行可憐蝸角能多少獨與區區觸事爭杜五更鼔角聲悲壯李白詩歌酣易水動又髙歌振林木王康琚詩凝霜凋朱顔李白詩昨來朱顔子今日白髪催韓集九品之位其可望一畝之宅其可懐王維詩五湖三畝宅萬里獨歸人杜詩愁窺髙鳥過老逐衆人行莊子則陽篇戴晉人曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返又通逵之中有魏於魏中有梁於梁中有王王與蠻氏有辨乎樂天相爭兩蝸角所得一牛毛又蝸牛角上爭何事石火光中寄此身皎然細言詩蚊眉自可託蝸角豈勞爭欲効絲毫力誰知螻蟻誠雨過偶書霈然甘澤洗塵寰南畝東郊共慰顔地望歲功還物外天將生意與人間霽分星斗風雷靜涼入軒窗枕簟閒誰似浮雲知進退纔成霖雨便歸山昭公三十二年閔閔焉如農夫之望歲董仲舒策天使陽出布施於上而主歲功周茂叔不去牕草要見造物生意杜收詩牕虛枕簞涼寢倦憶瀟湘許渾詩前山雨過池塘滿小院秋歸枕簟閒韓詩新凉入郊墟易知進退存亡而不失其正者曹子建詩朝雲不歸山霖雨成川澤許渾詩塵意迷今古雲情識巻舒亦知進退之意季春上旬苑中即事輦路行看斗柄東簾垂殿閣轉東風樹林隱翳燈含霧河漢欹斜月墜空新蘂謾知紅蔌蔌舊山常夢直叢叢賞心樂事須年少老去應無日再中北斗七星在紫宫南其杓所建周於十二辰之舍以定十二月斟酌元氣運乎四時李白歌天之何為令北斗而知春兮回指於東方虞羽客詩龍城舍曉霧瀚海隔遥天唐人鬼詩河漢巳欹斜神魂欲超忽元稹連昌宫詞又有墻頭千葉桃風動落花紅蔌蔌沈括詩不見連昌桃無言紅蔌蔌樂天詩水蓼冷花紅蔌蔌江籬濕葉碧萋萋姚鵠詩舊山嘗夢到流水送愁餘退之詩楚山直叢叢淮之水舒舒謝靈運云天下良辰美景賞心樂事四者難并左太冲賦將轉西日而再中齊既往之精神白詩百川未有回流水一老終無却少人謝惠連詩頽魄不再圓傾義無兩旦向注云魄月義日也言月既缺一月之中無再復圓日既傾一日之中無更朝喻人老不可更少唐人詩云事逐時偕往恩無日再中上西垣舍人共說才髙世所珍諸賢誰敢望光塵討論潤色今為美學問文章老更醇賦擬相如真復似詩看子建的應親仍聞悟主言多直許史家兒往往嗔揚雄作賦擬相如為式後客有薦雄丈似相如者此言真復似蓋取諸此杜詩詩看子建親雄傳有談范蔡之說於金張許史之間則狂矣班固稱許史不敢縱恣是以能全然害蕭大傅蓋司𨽻皆許史也故公云許史家兒往往嗔此得之矣退朝門外鳴騶送響頻披衣强起赴雞人火城夜闇雲藏闕玉座朝寒雪被宸邂逅欲成雙白鬢蕭條難得兩朱輪猶憐退食親朋在相與吟哦未厭貧雞人見上注每歲正旦曉漏以前宰相三司使大金吾皆以樺燭百炬擁馬方布象城謂之火城仍雜以衣綉鳴珂焜耀街陌如逢宰相即諸司火城悉皆撲滅唐皇甫冉詩雲藏神女廟李端詩囘合雲藏日霏㣲雨帯風被宸見上注此詩作於嘉祐初時為羣牧判官提㸃府界諸縣鎮公事以貧屢乞郡而未得詩退食自公與㣲之同賦梅花得香字三首漢宫嬌額半塗黄粉色凌寒透薄粧好借月魂來映燭恐隨春夢去飛揚風亭把盞酬孤艷雪徑囘輿認暗香不為調羮應結子直須留此占年芳幽怪録云巴卭人霜後園中有兩大橘如三斗盎剖開各有二叟相對象戲相與更決賭一叟曰君輸我海龍王女髲髮十兩智瓊額黄十二枚云云言訖不見庾信武媚娘詩云眉心濃黛直㸃額角輕黄細安李義山蝶詩壽陽公主嫁時妝八字宫眉捧額黄壽陽事見前注山謙之丹陽記曰皇后正殿曰顯陽東曰含章西曰徽音皆後漢洛陽宫舊名公雖用宋事而仍曰漢宫月魂移言月魄韓詩若不妬清妍却成相映燭晏元獻詩冷艷風中凝濃香雪後多林逋詩暗香浮動月黄昏李羣玉詩雪壓溪梅狼籍香調羮句亦兆公相業也杜卑枝低結子白公石楠詩見說上林無此樹秪教桃李占年芳其二結子非貪鼎鼐嘗偶先紅杏占年芳從教臘雪埋藏得却怕春風漏洩香不御鉛華知國色秪裁雲縷想仙裝少陵為爾牽詩興可是無心賦海棠王建詩自是桃花貪結子梅聖俞詩已先羣木得春色不與杏花為比紅黎錞希聲詩雪徑清寒蝶未知暗香誰遣好風吹野橋漏洩春光處正為横斜一兩枝本公此意也李義山柳詩為有橋邊拂面香何曾自敢占年芳又巳遭江映柳更值雪蔵梅洛神賦芳澤無加鉛華不御李正封牡丹詩國色朝含酒杜詩自嫌脂粉汚顔色淡掃蛾眉朝至尊太白宫詞雲想衣裳花想容詩話云子美母名海棠故集中無海棠詩然曉看紅濕處花重錦官城非海棠不能當也子美詩東閣官梅動詩興鄭谷詩云浣花溪上堪惆悵子美無情為發揚其三淺池塘短短墻年年為爾惜流芳向人自有無言意傾國天教抵死香䰅裊一作撚黄金危欲墮蔕團紅蠟巧能裝嬋娟一種如氷雪依倚春風笑野棠崔魯梅詩含情含態一枝枝斜壓漁家短短籬韓詩凌晨擬作紅粧面對客偏含不語情若教解語應傾國任是無情也動人李義山桃花詩脈脈無言度幾春用息媯事漢文詔此細民之無知抵死師古注曰抵觸也亦至也李夫人傳一顧傾人城再顧傾人國梅聖俞詩豈辭盡醉對顔色頻嗅競粘䰅蕊黄魏野詩蘂訝粉綃裁太碎葉疑紅蠟綴初乾白詩紅蠟粘枝杏欲開遯齋閒覽云凡詠梅多詠白而荆公詩獨云䰅撚黄金蔕團紅蠟不惟造語巧麗可謂能道人不能到處和晚菊不得黄花九日吹空看野葉翠葳㽔淵明酩酊知何處子美蕭條向此時委翳似甘終草莽栽培空欲傍藩籬可憐蜂蝶飄零後始有閒人把一枝庾肩吾玉醴吹花菊銀床落井桐張說詩菊花吹御酒蘭葉捧天詞歐公言家菊性涼野菊性熱家菊則甘菊是也此必指野菊故下有委翳草莽之句杜牧詩直須酩酊酬佳節淵明不見酩酊事獨李羣玉詩有借問陶淵明何物號忘憂無因一酩酊髙枕萬情休少陵詩九日蕭條醉盡醒殘花爛漫開何益杜詩云來把菊花枝景福殿前柏殿在禁中梅聖俞亦有景福殿後荼䕷花及景福殿水詩香葉由來耐歲寒幾經真賞駐鳴鑾根通御水龍應蟄枝觸宫雲鶴更盤怪石誤䝉三品號老松先得大夫官知君勁節無榮慕寵辱紛紛一等看子美老柏行香葉曾經宿鸞鳳韓渥柳詩澗松亦有凌雲分爭似盤根太液池張祐詩夜半深廊人語定一枝松動鶴來聲杜詩宫雲去殿低餘見三品石詩注秦始皇封太山遇雨避於松下封松為五大夫唐盧承慶典選校百官考有坐漕舟溺者承慶以失所載考中下以示其人無愠色復曰非力所及考中中亦不喜承慶嘉之曰寵辱不驚考中上孫僅縣种放詩處士星孤輕世俗大夫松好賤官班四月果一春强半勒花風幾日園林幾樹紅汲汲追攀常恨晚紛紛吹洗忽成空行看果下蒼苔色已作人間白髮翁豈惜解鞍留夜飲此身醒醉與誰同歐公詩餘寒尚勒花文選詩經始東山廬果下自成榛唐張仲素闔怨閒花落徧蒼苔地盡日無人誰得知杜牧之詩云别後東籬數枝菊不知閒醉與誰同墻西樹墻西髙樹結隂稠步屧窮年向此留白日屢移催我老清風一至使人愁紛紛瞑鳥驚還合渺𣺌涼蟬咽欲休囘首舊林歸未得相看知復幾春秋杜詩爾曹催我老小杜詩野竹疎還合巖泉咽復流李頎詩空山百鳥散還合萬里浮雲咽復流度麾嶺寄莘老區區隨傳換冬春夜半懸崖託此身豈慕王尊能許國直縁毛義欲私親施為已壊平生學夢想猶歸寂寞濵風月一歌勞者事能明吾意可無人隨傳即乗傳也師古注漢書曰傳若今之驛古者以車謂之傳車其後又改置馬謂之驛騎傳張戀反王尊叱馭見送復之赴成都注廬江毛義捧府檄而喜張奉心賤之及母死徴辟一無所就奉歎曰賢者固不可測往日之喜乃為親屈也詩言本非有意於用世為親而仕耳韓詩外傳曰飢者歌其食勞者歌其事狄梁公陶淵明俱為彭澤令至今有廟在焉刁景純作詩見示繼以一篇公自注云嘉祐中江東提刑時作梁公壯節就䕫魖陶令清身託酒徒政在房陵成底事年稱甲子亦何須江山彭澤空遺像歲月柴桑失故區末俗此風猶不競詩翁歎息未應無䕫魖謂武氏也揚雄甘泉賦屬堪輿以壁壘兮稍䕫魖而抶獝狂下注水石之怪曰䕫耗鬼曰魖音虛髙陽酒徒見酈生傳又魏典略曰時苗謁蔣濟會其醉不能見苗恚恨刻木為人書曰酒徒蔣濟旦夕射之言雖復中宗而可正後亦昏亂也故言成厎事宋初授命陶潛自以祖侃晉世宰輔恥復屈身異姓所著書自義熙以前題晉年號永初以後但稱甲子而已周景式廬山記柴桑彭澤人郊古三苗國舊屬廬江地太平寰宇記云柴桑山在徳化縣近栗里原在廬山南當澗有陶公醉石則天長壽元年來俊臣誣狄仁傑反后召見親問之卿承反何也對曰不承則死於考掠矣后曰何為作謝死表曰無之出表示之乃知其詐仁傑貶彭澤令寄沈鄱陽公自注云時為江東提刑離家當日尚炎風叱馭歸時九月窮朝渡藤溪霜落後夜過麾嶺月明中山川道路良多阻風俗謡言苦未通惟有鄱君人共愛流傳名譽滿江東信州弋陽縣有葛溪按江東地志無藤溪豈誤以葛為藤乎麾嶺在徽州績溪縣西北十里圖經麾作徽太平州寜國縣亦有徽嶺未知孰是禮記王制篇廣谷大川異制民生其間者異俗又云五方之民言語不通嗜欲不同呉芮秦時為鄱陽令號鄱君席上賦得然字送裴如晦宰呉江按如晦名煜與歐公聖俞原甫軰為交友嘗與永叔書論集古録西漢字并歐公跋附於此觀此可見其人與諸賢以文義相從游非一日又因以見其始末也煜頃嘗謂周秦東漢往往有銘傳於世間獨西漢無有王原叔言華州片瓦有元光字急使人購得之乃好事者所為非漢字也侍坐語及公亦謂家集所闕西漢字耳煜守丹陽日蘇氏者出古物有銅雁足鐙制作精巧因辨其刻則黄龍元年所造其言榮宫二史間未始概見遂摹之欲寄左右以為集古録之一事㑹悲苦不果昨偶開篋見之謹以上獻亦聞原甫於秦中得西漢數器不知文字與此類不煜再拜治平元年十二月十四日後三年余出守亳社而裴如晦以疾卒於京師明年原甫卒於南都二人皆年壯氣盛相次以殁而余巋然而存也青髮朱顔各少年幅巾談笑兩歡然柴桑别後餘三徑天禄歸來盡一㕓邂逅都門誰載酒蕭條江縣去鳴弦猶疑甫里英靈在到日憑君為艤船古庶人服巾士則冠傅子曰漢末王公多委王服以幅巾為雅素則幅巾古賤者服也鮑永趙咨符融韋彪傳俱載幅巾注謂以一幅巾為首飾不加冠冕靈帝時詔書就家拜韋著為東海相逼切不得已解巾之郡注巾幅巾也既服冠冕故解之柴桑天禄謂淵明子雲然子雲未嘗歸也鳴弦宓子賤事陸龜䝉居於甫里自號甫里先生烏江亭長艤船以待如淳注曰南方人謂整船向岸曰檥服䖍曰檥音蟻次韻樂道送花沁水名園好物華露盤分送子雲家新粧欲應何人面彩筆知書幾葉花曾和郢中歌白雪亦陪天上飲流霞春風已得同心賞更擬􅂝詩載酒誇李義甫詩平陽館外有仙家沁水園中有物華漢志沁水屬河内郡千浸反漢竇憲傳憲恃宫掖聲勢遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園隂喝不得對後發覺帝大怒切責憲今貴主尚見侵奪况小人哉使以田還主注沁水公主明帝女也韓集惠康公主挽詩從今沁園草無復更芳菲杜詩截成金露盤漢郊祀志武帝作承露仙人掌注云仙人以手掌擎盤承露退之牡丹詩凌晨併作新粧面李白夢筆生花唐制五花判事韓湘曽為吏部染後堂之前白牡丹一叢斸其根下置藥而後栽培之明年花開每一葉花中有楷書十四字曰雲埋秦嶺家何在雪擁藍闗馬不前出仙傳拾遺後山詩欲知誰稱面偏插一枝看抱朴子項曼都修道山中得遊紫府上帝飲以流霞一杯郢人歌己見上注籌思亭公自注云在江東轉運司南㕔昔人何計亦何思許國憂民適此時寓興中原為逺趣託名華榜有新詩數株碧柳蒼苔地一丈紅蕖渌水池坐聴楚謡知歲美想銜杯酒問花期杜牧之詩鑿破蒼苔地偷他一片天曹子建洛神賦灼若芙蕖出渌波南史庾杲之左丞王儉用為衛將軍長史安陸侯蕭緬書與儉曰盛府元僚寔難其選庾景行汛渌水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之爾雅云荷芙蕖釋曰芙蕖其總名也别名芙蓉今江東人呼荷華為芙蓉一丈字見别注唐詩江鄉宜晚霽楚老話豐年愁臺未詳何地恐是愁崗唐莊宗置酒處頽垣斷壍有平沙老木荒榛八九家河勢東南吹地坼天形西北倚城斜傾壺語罷還登眺岸幘詩成却嘆嗟萬事因循今白髮一年容易即黄花杜詩錦里煙塵外江村八九家杜詩大聲吹地轉又呉楚東南坼晉志天形如倚蓋列子天傾西北日月星辰就焉地缺東南百川水潦歸焉王建叢臺詩零落故宫無入路東西澗水遶城斜杜牧之詩故人容易去白髪等閒生和正叔懐其兄草堂茅堂竹樹水之濵耕稼逍遥似子真小吏一身今倦宦先生三畝獨安貧欲抛縣印辭黄綬來伴山冠帯白綸秪恐明時收士急不容家有兩閒人谷口鄭子真耕於巖石之下司馬相如傳長卿故倦游唐人詩五湖三畝宅萬里一歸人陶詩安貧守賤者自古有黔婁朱博傳欲言縣丞尉者刺史不察黄綬各自詣郡謝萬傳簡文帝作相召萬為從事中郎萬著白綸巾鶴氅裘履版而前與帝共談移日武攸暨傳山陂葛巾杜詩白帽仍兼似管寜又管寜紗帽淨皆隱者之服古不以白為諱也歐公詩清風明月兩閒人鄭子憲新起西齋謾搆軒窗意亦深滔滔浮俗倦登臨詩書千載經綸志松竹四時瀟洒心曉枕不容春夢到夜燈惟許月華侵行看富貴酬勤苦車馬重來拾翠隂陸龜䝉詩溪山自是清涼國松竹合封瀟洒侯言用志之專性情治也春猶言紛華杜詩富貴必從勤苦得寄題思軒按臨川志軒在撫州通判㕔至和元年通判林慥所立曽子固作詩序見本集詩所謂名郎指慥之祖水部也水部當太宗時嘗通判此州下云良孫則指慥名郎此地昔徘徊天誘良孫接踵來萬屋尚歌餘澤在一軒還向舊堂開右軍筆墨空殘沼内史文章秪廢臺邑子從今誇勝事豈論王謝世稱才成公十三年天誘其衷右軍故宅有墨池在州學康樂有翻經臺在郡寳應寺宋書靈運為臨川内史於此翻大湼槃經邑子字見朱買臣傳上聨用王謝事故以此終之王荆公詩注巻三十一
