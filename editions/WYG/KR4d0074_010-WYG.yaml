body:
  text: 王荆公詩注巻十宋李壁撰古詩和王勝之雪霽借馬入省泥水填馬不受轍瓦雪得火猶藏溝宿霧紛紛度城闕朔氣凛凛吹衣裘窮閻閉門無一客剝啄驚我有前騶强隨傳呼出屋去鼻息凍合髭繆繆投韁馬鬛任欹側欲出操箠手還抽史記張耳陳餘杖馬箠下趙數十城投韁不操箠謂畏寒縮手也欹側言身兀兀然行思江南悲故事溪谷冬暖花常流前年臘歸三見白西人語要宜麥見三白霽色嶺上班班留杖藜此時将邑子登眺置酒身優游豈如都城今日事秪恐一蹶為親憂因知田里駕欵叚馬援言吾弟少游嘗哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御欵叚馬為郡掾吏守墳墓鄉里稱善人斯可矣昔人豈即非良謀君家洛陽名實大談笑枯槁回春柔平生意氣故應在白髪未敢相尋求從容退食想佳節豈無歌舞相獻酬奈何亦作苦寒調歎息朝夕無驊騮超然遂有江湖意滿紙為我書窮愁相如正應居客右相如末至居客之右惠連雪賦子路且莫乘桴浮和呉沖卿鵶樹石屏此詩歐公蘇子美亦同作歐詩吾嗟人愚不見天地造物之初難乃云天地生自然豈知鎬鑱刻畫醜與妍千状萬態不可殫神愁鬼泣日夜不得閒不然安得巧工妙手憊精竭思不可到若無若有縹緲生雲煙鬼神功成天地惜蔵在虢山深處石乃知人為天地賊天公有物蔵不得蘇子美云物有無情自相感不間幽微與髙邈老蚌向月月降胎海犀望星星入角子美詩意與公雖異而皆佳作寒林昏鵶相與還下有跂石蒼孱顔曾於古圗見髣髴巳怪筆力非人間君家石屏誰為寫古圗所傳無似者鵶飛歴亂止且鳴林葉慘慘風煙生髙齋日午坐中見意似落日空山行君詩雄盛付君手云此非人乃天巧嗟哉渾沌死乾坤生造作萬物醜妍巨細各有理問此誰主何其精恢竒譎詭多可喜人於其間乃復雕鑱刻畫出智力欲與造化追相傾拙者婆娑尚欲奮工者固巳窮夸矜吾觀鬼神獨與人意異雖有智一作至巧無所争所以虢山間埋没此寶千萬嵗不為見者驚吾又以此知妙偉之作不在百世後造始乃與元氣并畫工粉墨非不好嵗久剥爛空留名能從太古到今日獨此不朽由天成世人尚竒輕貨力山珍海怪採掇今欲索此屏後出為君得胡賈欲著價不識伏波類西域賈胡吾知金帛不足論當與君詩兩相直送李宣叔倅漳州閩山到漳窮地與南越錯漳故閩越王地山川鬱霧毒瘴癘春冬作荒茅篁竹間蔽虧有城郭子虚賦日月蔽虧注壅蔽虧缺也居人特鮮少市井宜蕭索野花開無時蠻酒持可酌窮年不值客誰與分杯杓朝廷尚賢俊磊砢充臺閣世說人磊砢而英多君能喜節行文藝又該博超然萬里去識者為不樂予聞君子居自可救民瘼苟能禦外物得地無美惡似聞最南方北客今勿藥林麓換風氣獸蛇凋毒蠚音壑毒也如漳猶近州氣冷又銷鑠珍足海物味其厚不為薄章舉馬甲柱退之初南食詩章舉馬甲柱鬬以怪自呈章舉有八脚亦曰章魚馬甲柱今江瑶柱固巳輕羊酪蕉黄荔子丹又勝樝棃酢爾雅樝以梨而酢澁縫衣比多士縫衣逢掖之衣列子汝縫衣之徒往往在丘壑從容與笑語豈不慰寂寞太守好觴詠嘉賔應在幕想即有新詩流傳至京洛三都賦成競相傳冩洛陽紙貴送裴如晦宰吴江震澤與天杳古文以為震澤是吴南太湖名傳云自彭蠡江分為三入震澤遂為北江而入海旁臨無地形他時散髪處最愛垂虹亭亭在吴江縣飄然平生游捨我戴吴星欲往獨不得都門看揚舲楚詞乘舲船余上沅兮注舲船牕牖或曰舲船名也到縣問疾苦為予求所經當知種牧地往往茭蒲青三江斷其二浲水何由寧不可解疑是八州水未盡入太湖故云與後送洺倅說引章可見素志微子好古者此歌尚誰聽送裴如晦即席分題三首以黯然銷魂惟别而已為韻擬而惟字韻作飄然五湖長桓𤣥傳父為九州伯兒為五湖長昨日國子師緑髪約畧白青衫欲成緇牽舟推河氷去與山水期春風垂虹亭一盃湖上持傲兀河濱客兩忘我與而荘子大宗師不如兩忘而化其道能復記此飲詩成酒淋漓其二十月潁水氷問君行何為行不顧斗米自與五湖期平生湖上游幽事畧能知此後君最樂窮年得游嬉彩鯨抗波濤風作鱗之而周禮考工記梓人為筍簴小首而長摶身而鴻若是者謂之鱗屬以為筍凡攫閷援簭之類必深其爪出其目作其鱗之而鄭氏云謂筍虡之獸也深猶蔵也作起也之而頰􅝋也後人讀書不多妄以意改前輩之作如此者不少可歎也鳴鼓上洞庭笑看紅橘垂漠漠大梁下黄沙吹酒旗應憐故人意回首一相思其三邂逅君子堂一杯相與持便應取酩酊萬事不足惟平明蔡河風回首成差池獨我漫浪者尚得行相追磨刀鱠嚴冬宿昔少陵詩子美贈姜少府詩姜侯設鱠當嚴冬又洗魚磨刀魚眼紅還當捕鱸魚載酒與我期甫里松菊盛陸龜䝉居于甫里自號甫里先生集有把菊賦洞庭柑橘垂洞庭在太湖心韋詩書後欲題三百顆洞庭須待滿林霜文章為我唱不數陸與皮皮日休有松陵唱和集謂陸龜䝉也又日休為吴從事日龜䝉以其業造焉韓持國從富并州辟韓維字持國潁昌人篤志問學嘗以進士薦禮部父億任執政不就廷試乃以父任守将作監主簿丁外艱服除闔門不仕仁宗患搢紳奔競諭近臣曰恬退守道者旌擢則躁求者自當知耻於是宰相文彦博宋庠等言維好古嗜學安於静退乞加甄録以厚風俗召試學士院不赴除國子監主簿富弼安撫河東辟維管勾機宜文字按持國猶辭館閣今乃為富公始起家至和二年春也韓侯氷玉人衛玠玉人樂廣氷清不可塵土雜官雖衆俊後名字久訇磕子虚賦砰磅訇磕皆水流鼔怒之聲并州天下望撫士威愛匝千金棄不惜賔客常滿閤遥聞餘風髙為子置一榻陳蕃為髙士置一榻去則懸之親交西門餞百馬驕雜遝子材宜用世談者為嗚唈師古曰於邑短氣皃於音烏邑一合反矧今名主人氣力足呼㪉班固東都賦㪉野􅀈山注㪉啜也推賢為時輔勢若朽易拉㑹當薦還朝立子在閶闔惜哉秣騏驥賦以升龠合退之雜說馬之千里者一食或盡粟一石嗟予栖栖者氣象巳摧塌他年佐方州說将尚不納第五倫傳等軰笑之曰爾說将尚不下安能動萬乘乎况於聲勢尊豈易取酬答有如持寸莛未足撼鞺鞳淮南子兵畧訓若鞺之與鞳注鞳鼓鞞聲顧於山水間意願多所合羌廬與韶石羌字本作􅋌以避諱改􅋌廬二山相連韶石見别注公嘗侍楚公為韶州故云少小巳嘗蹋風游㑹稽春雪宿天柱臘天柱在舒州淮湖江海上慣食鰕蟹蛤西南窮岷嶓東北盡濟漯身雖未嘗歴魂夢已稠沓荆溪最所愛荆溪在常州映燭多廟塔溪果㸃丹漆溪花團繡罨扁舟信所過行不廢樽榼一從捨之去霜雪行滿頜思之不能寐蹙若蚊蚋噆莊子蚊虻噆膚方将築其濵畢景謝噂􅊱畢景落日也安能孤此意顛倒就衰颯惟子予所嚮嗜好比鶼鰈爾雅釋地東方有比目魚一眼兩片相合兩目相比乃得行其名為鰈又南方有比翼鳥狀如鳬名曰鶼一翼一目相得乃飛色青赤不比不能飛何時歸相過游屐尚可蠟阮孚好著蠟屐寄吴沖卿沖卿謂吴公充按充為吴王宫教授他官多與宗室狎無誨導之誼充獨以嚴見憚為館職時歐公知同州充上言脩以忠直䝉奨擢不宜用讒棄知太常禮院張貴妃薨大臣希旨欲隆其禮王洙為院長吏以印紙行文書而寮屬不知充即移開封城治吏罪觀此則充之清明可知矣國史稱充神彩秀徹辭氣温厚内行脩飭仕孤立無與然余毎怪晦叔将召試終謙避不進所業朝廷知其意不復索徑令試而充乃自獻所為文除集賢校理然當時獻文得試者例皆然不足害充之賢也物變極萬殊心通纔一曲讀書謂已多撫事知不足與君語承華承華太子門名念此非不夙恨無數頃田歸講使成熟當官拙自計易用忤流俗窮年走區區得謗大如屋歸來汚省舎又繼故人躅相逢秪數歩吏案當填目切磋非無朋阻闊嗟何速孤危失所助把巻常恨獨虛名終自誤繆恩何見蹙清明有沖卿奥美如晦叔晦叔謂吕公著皆公生平之交據晦叔家傳公自單州歸益研精講學無進趍之意嘗與王介甫相對而歎曰今天下雖小康然堯舜之道知不可復行以故求閒局将以遂其志公初列館閣與安石友善安石博辯有文同舎莫敢與之抗獨公以精識約言服之安石出守常州求贈言公告以四言曰莊重靖宻安石至郡寓書於公曰備官京師二年疵吝積於心每不自勝一詣長者即廢然而反夫所謂徳人之容使人之意也消吾於晦叔見之矣又謂人晦叔為相吾軰可以言仕矣時謂當選升屈指尚五六揆才最不稱饕寵寧無恧殷勤故人書紙尾又見朂君雖好德言我自望忠告易稱動不括繫辭動而不括傳論大明服傳僖二十三年周書有之乃大明服進為非成材罪恐不容贖嵗殘東風生陜樹塵翳麴顧況詩白沙江草麴塵絲何緣一杯酒談笑相追逐韓持國見訪余生非匏𤓰於世不無求弱力憚耕稼衣食當周流起家始二十南北今白頭愁傷意巳敗罷病恐難瘳江湖把一節屢乞東南州治民豈吾能閒僻庻可偷公上富公書與詩語畧同今掇附於此書云某切自度守一州尚不足以勝任任有大於一州者固知其不勝也自被使江東夙夜震恐思得脫去非獨為私計凡以此也三司判官尤朝廷所選擇出則被使漕運而金榖之事某生平所不習此所以䝉恩反側而不敢冒也誠望閤下哀其至誠裁賜一小州幽閒之區寂寞之濵其於治民非敢謂能也庻幾地閒事少夙夜悉心力易以塞責而免於官謗也謬恩當徂冬黽勉始今秋豈敢事髙蹇茫然乖本謀撫心私自憐仰屋竊歎愀寒朗傳及其歸舎口雖不言而仰屋竊歎强騎黄飢馬欲語将誰投頼此城下宅數䝉故人留攬衣坐中庭仰視白雲浮白雲御西風一一向滄洲安得兩黄鵠跨之與雲遊白雲終歸滄洲言巳不能如雲猶眷禄仕也故前有豈敢事髙蹇之句思王逢原諱令廣陵人卒於嘉祐四年年居二十八娶吴氏有賢行一姊孀自吾失逢原觸事輙愁思豈獨為故人撫心良自悲我善孰相我孰知我瑕疵我思誰能謀我語聽者誰朝出一馬驅暮歸一馬馳馳驅不自得談笑强追隨仰屋卧太息起行涕淋漓念子冢上土草茅巳紛披婉婉婦且少煢煢一兄嫠髙義動閭里尚聞致財資嗟我衣冠朝畧能具饘糜𦵏祭無所助時公為羣牧判官奉使畿縣将乞常州又歐公云羣牧司領内外坊監判官比他司俸入最優豈不能畧助𦵏祭耶衰合作哀顔亦何施聞婦欲北返跂予常望之寒汴巳閉口此行又參差又說當産子産子知何時賢者宜有後固當夢熊羆天方不可恃據公作逢原誌夫人方娠也未知其子之男女然逢原之後卒亦無聞焉天其真不可恃乎我願適在兹我疲學更誤與世不相宜宿昔心已許同岡結茅茨此事今巳矣巳矣尚誰知𣺌渺江與潭茫茫山與陂安能久竊食終負故人期謝宣逺詩量巳畏友朋勇退不敢進皆指當時而言今竊食之詩作於逢原既亡之後尤見公篤於友義不忘平生切磨之言登景徳塔放身千仞髙北望太行山邑屋如螘冢蔽虧塵霧間鸛鳴于垤注螘冢也此即邑屋蔽虧塵霧之意念此屋中人當復幾人閒雞鳴起四散日暮相與還唐人詩身得幾時活眼開終日忙亦此意也物物各自我誰為賢與頑賤氣即易凌貴氣即難攀愧予心未齊俛首一破顔和貢父燕集之作馮京韓維吴充沈遘皆同席馮侯天馬壯不羈韓侯白鷺下清池劉侯羽翰秋欲擊呉侯葩蕚春争披沈侯玉雪照人潔瀟灑巳見江湖姿唯予貌醜駭公等自鏡亦正如䝉倛荀子仲尼之状面如䝉倛注倛音欺方相也其首䝉茸忘形論交喜有得杯酒邂逅今良時心親不復異新舊便脫巾屨相諧嬉空堂無塵小雨定濃緑翳水浮秋曦髙談四座掃炎熱木末更送涼風吹此歡不盡忽分散明月照屋空參差平明餘清在心耳洗我重得劉侯詩劉侯未見聞巳熟吾友稱誦多文辭才髙意大方用世自有豪俊相攀追咨予後㑹恐不數魂夢久向東南馳何時扁舟却顧我還欲迎子游山陂寄王逢原北風吹雲埋九垓草木零落空池臺六龍避逃不敢出地上獨有寒崔嵬披衣起行愁不愜歸坐把巻闔且開永懐古人今已矣感此近世何為哉莊一作申韓百家爇火起孔子大道寒於灰儒衣紛紛欲滿地無復氣熖空煤炲力排異端誰助我憶見夫子真竒材楩楠豫章槩白日秪要匠石聊穿裁我方官拘不得往子有餘暇宜能來晤言相與入聖處一洗萬古光芒迴思古古之士方窮材行巳云貴身雖窮阨未遇不害其材行之可貴大臣公聽采左右不得蔽或從蒿藜間入據廊廟勢小夫不敢望云我非其彚朝游觀者羞暮出逢者避所以後世愚人人願髙位言始之貧賤游於途而人羞與之為伍暮而忽貴逢者避之言其進猝暴非有其素所以啟浮躁之風而使三尺童子皆斐然有公卿之心也寄孫正之正之名侔字少述吴興人文甚竒古内行孤峻少許可非其所善雖鄰不與通也慶歴皇祐中與王安石曽鞏游名聞江淮屢舉進士不中母病革因嗚咽自誓終身不求仕客居吴門吴興丹陽揚子問士大夫敬畏之知揚州劉敞薦之曰侔之為人求之朝廷吕公著王安石之流也授校書郎揚州州學教授王陶韓維等薦侔可備侍從朝廷除官並不赴安石少與侔友善兄事侔及安石為宰相道過真州侔待之如布衣時然侔晚年性卞急至於罵坐怒鄰論者以為年耆而德衰初王回常秩王令與侔皆有盛名令行能尤異諸公稱述之令最早死回亦不夀秩仕差顯惟侔以不仕終始少時已感韓子詩東西南北俱欲往退之感春詩東西南北皆欲往千江隔兮萬山阻新年尤覺此語悲恨無羽翼超惚恍肺肝欲絶形骸外涕洟自落衣巾上此憂難與世共知憶子論心更惆悵惜日白日照四方當在中天留春風地上行當欲時周遊和氣所披拂槁乾却濕柔愛欲傳萬物勢難停一州棲棲孔子者惜日此之由不能使此邦利澤施諸侯豈若駕以行使我遇者稠當時三千人孔子世家云孔子以詩書禮樂教弟子葢三千焉身通六藝者七十有二人齊宋楚陳周小者傳吾粗大者傳奥幽道散學堙聖衆源乃常流吾初如匏𤓰彼亦孰知丘惟士欲自逹窮通非外求豈必相天子天一作夫乃能經九疇行雖耻强勉閉户非良謀王荆公詩注巻十
