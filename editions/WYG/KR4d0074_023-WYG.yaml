body:
  text: 王荆公詩注卷二十三宋李壁撰律詩與寶覺宿僧舍擾擾復翩翩秋床燭屢昏真為説萬物豈止挾三言莊子恵施徧為萬物説説而不休又庚桑楚南榮趎蹵然正坐曰若趎之年巳長矣將惡乎託業以及此言耶庚桑子曰全汝形抱汝生無使汝思慮營營南榮趎贏糧七日七夜南見老子老子曰子自楚之所來乎趎曰唯老子曰子何與人偕來之衆也注云挾三言而來故云問義曹谿室捐書闕里門若知同二妄目擊道逾存曹谿乃六祖慧能大師所居山其門人因以為號此言問義曹谿室亦泛言之耳不専指一人葢公與寶覺同宿僧舍上句言寶覺下句以自況魯縣孔子廟南十里有二石闕曰闕里里門也楞嚴經云妄顯諸真妄真同二妄莊子目擊而道存杜牧鴉詩擾擾復翩翩黄昏颺冷煙借以言燭中書偶成忽忽余年往茫茫不自知殷勤照清淺邂逅見衰遲輔世無賢業容身有聖時歸歟今可矣何以長人為忽忽茫茫言嵗月之去不覺也鑑水而知衰白易君子體仁足以長人華藏寺㑹故人得泉字建康志寺偽吳武義二年建在斗門西街北初為報先寺國朝改今額百憂成阻濶一笑得留連城郭西風裏園林落照前共知官似夢莫負酒如泉興罷重攜手江湖即𣺌然夢棺得官又言作官如夢邯鄲之類是也漢有酒泉郡杜詩東宫賜酒如流泉求全求全傷徳義欲速累功名玉要藏而待苗非揠故生未妨徐出晝何苦急墮成此道今亡矣嗟誰可與明左氏定公十二年仲由為季氏宰墮三都公斂處父謂孟孫曰墮成齊人必至北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮公圍成不克秋風揫斂一何饕天機亦自勞牆隈小翻動屋角盛呼號漠漠驚沙宻紛紛斷栁髙江湖豈在眼昨夜夢波濤秋之氣揫斂故字從秋揫聚也納也饕者謂納之多也天機言風也隈角猶隧之類得風最多次韻朱昌叔嵗莫城雲漏日晚樹凍裹春深槮宻魚雖暖巢危鸖更隂横風髙彍弩殘溜細鳴琴嵗換兒童喜還傷老大心深字在裹上起義槮所感反類篇云積柴水中以取魚曰槮次韻酬昌叔羇旅之作君方困逆旅予亦誤朝簪自索東方米誰多季子金髙門萬馬散窮巷一燈深客主竟何事蕭條梁父吟東方朔傳無令但索長安米蘇秦傳見季子位髙金多梁父吟葬歌也次韻唐公三首東陽道中山蔽吳天宻江蟠楚地深浮雲堆白玉落日瀉黄金𣺌𣺌隨行旅紛紛換嵗隂强將詩詠物收拾濟時心江行材非當世用轂有故人推使節春冬換征帆日夜開南游取干越東望得州來試盡風波惡生涯亦可哀史記鄭當時傳其推轂士又荆王世家今吕氏雉故推轂髙帝就天下漢書貨殖傳譬猶戎狄之與干越不相入矣韋昭注今餘干縣越之别名也古謂越餘地曰餘干縣有干越亭左成公七年吳入州來注淮南下蔡縣也至昭公十三年吳始滅州來而襄公三十一年趙文子已稱延州來季子其果立乎竊疑有兩州來也又季子始封延又増州來若指下蔡言之二邑相去亦不應許逺更攷旅思此身南北老愁見問征途地大蟠三楚天低入五湖看雲心共逺步月影同孤慷慨秋風起悲歌不為鱸史記貨殖傳自淮北沛陳汝南南郡此西楚也彭城以東東海吳廣陵此東楚也衡山九江江南豫章長沙是南楚也又孟康注漢書曰舊名江陵為南楚吳為東楚彭城為西楚阮嗣宗詩曰南楚多秀士李昭翰注曰三楚謂楚文王都郢昭王都鄂考烈王都夀春盧綸詩青草湖將天暗合白頭浪與雪相和河渠書於吳則通三江五湖貨殖傳云吳有三江五湖之利太史公叙傳登姑蘇望五湖葢五湖皆在姑蘇也又五湖者菱湖游湖莫湖貢湖咠湖皆太湖東岸五彎為五湖而非太湖也古時應别今並相連唐子西語錄云荆公地蟠三楚大天入五湖低得子美句法言自有所感非為鱸魚然張季鷹見機而逝豈真為鱸魚耶亦寓言耳烏塘臨川志載公此詩地僻居人少山稠伏獸多怒狸朝搏鴈嚵虎夜窺騾籬落生孫竹門庭上女蘿公羊仇牧注乳犬攫虎伏雞搏貍精神之至也韓文僕來告言虎入廏處無敢驚逐以我􅐒去孫竹見招約之職方注女蘿絲松蘿也未應悲寂寞六載一經過欲歸水漾青天暖沙吹白日隂塞垣春錯莫行路老侵尋綠稍還幽草紅應動故林留連一盃酒滿眼欲歸心發館陶館陶屬北京大名府促轡數殘更似聞雞一鳴春風馬上夢沙路月中行笳鼓逺多思衣裘寒始輕稍知田父隠燈火閉柴荆山谷詩春風馬上夢樽酒故人持暗與公合度淮過河南皆沙行韋應物詩夏衣始輕體游步愛僧居介父此句時雖不同而意皆妙隠一作穏王村晻靄王村路春風北使旗塵催輕騎走寒咽短簫吹攬轡聨貂帽投鞭各酒巵紛紛小兒女何事倚牆窺長垣北畿甸長垣在京師東北一百五里攬轡長垣北貂寒不自持霜風急鼓吹煙月暗旌旗騎火流星㸃牆桑亞㦸枝柴荆掩春夢誰見我行時退之詩騎火萬星攅急就章注㦸岐刃之矛也冬日擾擾今非昔漫漫夜復晨風沙不貸客雲日欲迷人散髮愁邊老開顔醉後春轉思江海上一洗白綸巾韓詩今既不如昔後當不如今壬辰寒食客思似楊栁春風千萬條更傾寒食淚欲漲冶城潮巾髮雪争出鏡顔朱早凋未知軒冕樂但欲老漁樵後漢紀千條萬端言客思如栁條之多冶城見上注城岸江故云冶城潮雨中尚疑櫻欲吐已怪菊成漂紫莧凌風怯青苔挾雨驕長閒故有味多難自無聊牢落柴荆晚生涯付一瓢莧葉柔得風如怯苔以雨潤生益蕃故稱驕猶言張王也乗日乗日寒垣入御風塘路歸胡皆躍馬去鴈却背人飛煙水吾鄉似家書驛使稀怱怱照顔色恨不洗征衣莊子徐無鬼若乗日之車而遊於襄城之野御風見别注塘路塘深也下云煙水吾鄉似此詩作於北使回日此言北敵送使人及境復歸其國宿雨綠攪寒蕪出紅争暖樹歸魚吹塘水動鴈拂塞垣飛宿雨驚沙静晴雲晝漏稀却驚春夢短燈火著征衣秋露日月跳河急荒庭露送秋初疑宿雨泫稍怪曉霜稠曠野將馳獵華堂已御裘空令半夜鶴抱此一端愁元微之荅胡靈之詩序日月跳丸爾雅春獵為蒐夏曰苖秋曰獮冬曰狩此四時皆有獵禮記孟冬之月天子始裘周官仲秋獻良裘春秋繁露曰鶴知夜半注云鶴水鳥也夜半水位感其生氣則益鳴而喜周處風土記曰白鶴性警至八月白露降流於草葉上滴滴有聲即鳴也還自河北應客媿客問謠俗舊傳今自如材難知冀馬味美賽河魚塞水移民乆川防動衆初北人雖異論時議或非疎貨殖傳其謠俗猶有趙之風也左氏冀之北土馬之所生塞水謂溏濼也川防謂調夫役運茭草塞河將次洺州憩漳上漠漠春風裏茸茸綠未齊平田鵶散啄深樹馬迎嘶地入河流曲天隨日去低髙城巳在眼聊復解輕齎田之平衍鴉乃散啄馬喜嘉䕃望樹而嘶二句妙甚可畫爾雅河百里一小曲千里一曲一直冇底曰囊無底曰槖言其物質輕而價重可入囊槖以齎行也和仲庶夜過新開湖憶沖之仲涂共泛水逺浮秋色河空洗夜氛行隨一明月坐失兩孤雲露髮此時濕風顔何處醺淹留各有趣不比漢三君李白詩月行却與人相隨杜詩作夜月同行興元南有路通巴州路絶險一上三日而達於山頂故諺云孤雲兩角去天一握白樂天有兩處或孤雲之句三君謂後漢大將軍竇武太傅陳蕃侍中劉淑見黨錮傳序送契丹使還次韻荅浄因長老老欲求吾志時方摭我華強將愁出塞空得病還家日轉山河暖風含草木葩勝遊思一往不敢問三車公多有使北詩而本傳及年譜皆不載嘗出疆獨温公朔記云云揚子孟子疾過我門而不入我室或曰亦有疾乎曰摭我華而不食我實公此意似謂世之知我但以其文而未盡吾藴也説文云葩華也從廾從皅羊鹿牛車見法華經李白詩真僧法號號僧伽有詩與我論三車送吳叔開南征摻袂不勝情犀舟擊汰行倦游無萬里惜别有千名謂舟春草淒淒綠江楓湛湛清金陵多麗景此去屬蘭成屈平九章乗舲船余上沅兮齊吳榜以擊汰注汰波也江淹别賦故别雖一緒事有萬族疑千名亦類此更須攷陸機詩陸産尚千名退之詩春醪又千名楚詞王孫游兮不歸芳草生兮萋萋又湛湛江水兮上有楓張説題庾信宅蘭成追宋玉舊宅偶詞人太平寰宇記蘭成江州舊治朔記云嘉祐五年九月錢象先閻詢陳經王安石使契丹此詩題又稱送契丹使還當考遊栖霞菴約平甫至因寄栖霞菴或是西菴疑不可考𣺌𣺌林間路蕭蕭物外僧髙隂涼易入閒貌老難増官事真傷錦君恩更飲氷求田此山下終欲忤陳登上句言林間䕃樾髙茂易致風涼下句言僧皆繳首聨之意也李白詩意清浄貌稜稜亦不減亦不増襄公三十一年子皮欲使尹何為邑子産曰今子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎又公表文亦使敗財傷錦宜有衆多之譏莊子今吾朝受命而夕飲氷末言元龍鄙求田者今不復恤其忤也和栖霞寂照菴僧雲𣺌平甫同作蕭然一世外所樂有誰同宴坐能忘老齋蔬不過中無心為佛事有客問家風笑謂西來意雖空亦不空維摩經云舍利佛告世尊我昔曽於林中宴坐樹下維摩謂我言不必是坐為宴坐也夫宴坐也者不於三界現身意是為宴坐不起滅定而現諸威儀是為宴坐不捨道法而現凡夫事是為宴坐而不在内亦不在外是為宴坐於諸見不動而修行三十七品是為宴坐不斷煩惱而入湼槃是為宴坐按四分律比丘非時受食者為破律非時者謂自日中至亥為鬼神食誌公語已見上注又丹霞云佛之一字永不喜聞須自看取即此意也梵志語亦云梵志不轉經不持課家風禪門多有此語如何是黄龍家風翠巖家風雲巖問圓智師師兄家風作麽生師曰教汝指㸃着堪作什麽荅曰無遮個多多少時也師曰牙根猶帶生澁在藥山又問圓智如何是和尚家風師下禪床作女人拜曰謝子逺來都無祗待僧問牛頭微禪師如何是和尚家風師曰山畬粟米飯野莱淡黄虀僧曰忽遇上客來又作麽生師曰喫即從君喫不喫任東西雖空不空此真際實相也般若經知空不空又傳燈錄真覺第二出其觀體者只知一念即空不空非空非不空宜春苑漢有宜春苑地屬下杜有曰宜春宫者即下杜苑中宫皆秦剏也又子嬰葬二世杜南宜春苑中本朝自都大梁特借秦漢舊名亦猶昆明池之類宜春舊臺沼日暮一登臨解帶行蒼蘚移䩳坐綠隂樹疎啼鳥逺水静落花深無復増修事君王惜費金沈休文詩解帶臨清風王維詩松風吹解帶䩳速侯切説文軟皮也諸本皆作鞍誤韓文坐茂樹以終日宋之問髙樹隂疎鳥不留張祜詩斷橋荒蘚澁空院落花深楊文公詩風定落花深一寸日遲啼鳥度千聲瓊林苑金明池宜春苑玉津園謂之四園苑宜春苑本秦悼王園俗但稱庶人園荒廢殆不復治故公詩有無復増修之語漢文帝嘗欲作露臺召匠計之費百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為春日冉冉春行暮菲菲物競華鶯猶求舊友燕不背貧家室有賢人酒門無長者車醉眠聊自適歸夢到天涯詩伐木鸎其鳴矣求其友聲武瓘詩花開蝶滿枝花謝蝶還稀惟有舊巢燕主人貧亦歸文中子子之室酒不絶賢人用徐邈事陳平傳以席為門然多長者車轍杜詩坐對賢人酒門聴長者車淵明語客我醉欲眠君且去王荆公詩注巻二十三
