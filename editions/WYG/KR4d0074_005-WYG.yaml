body:
  text: 王荆公詩注巻五宋李壁撰古詩秋熱余在臨川得此詩石本一僧跋云元豐末公居金陵秦淮小宅甚熱中折松枝架欄禦暑因有此作按元豐末公以前宰相奉祠居處之陋乃至此今之崇飾第宅者視此得無愧乎火騰為虐不可摧屋窄無所逃吾骸織蘆編竹繼櫩宇架以松櫟之條枚豈惟賔至得清坐因有餘地蘇陪臺左昭公七年若從有司是無所執逃臣也逃而舎之是無陪臺也愆陽陵秋更暴横焮我欲作昆明灰金流玉熠何足怪月蝕詩金鑠水銀流玉熠丹砂焦鳥焚魚爛為可哀憶我少年亦值此翛然但以書自埋張祐詩萬巻書中死便埋老衰奄奄氣易奪撫巻豈復能低回西風忽送中夜濕六合一氣窰新開簾窗幕户便防冷且恐霰雪相隨來盧仝詩憶昔堯為天十日燒九州六合烘為窰焮注炙也秋早暮尋蔡墩西按建康志載境内有蔡伯喈讀書臺公所稱蔡墩恐即是蔡讀書臺也獨覺秋尚早山路葩卉繁野田風日好禪林烏未泊經屋塵未掃蠻藤五花簟復足休吾老同沈道原遊八功徳水寒雲静如癡寒月慘如戚解鞍寒山中共坐寒水側新甘出短綆一酌煩可滌仰攀青青枝木醴何所直建康志陳後主時覆舟山蔣山松柏林冬月常出木醴後主以為甘露之瑞俗呼為雀餳今功德水亦在蔣山此言新甘可貴木醴不足道也望鍾山佇立望鍾山陽春更蕭瑟暮尋北郭歸故遶東岡出思北山北山即鍾山周顒隠處孔稚圭作北山移文日日思北山而今北山去寄語白蓮菴迎我青松路建康宋熙寺西百餘步有白蓮菴䇿禪師所居上南岡暮塢屋荒涼寒陂水清淺捐書息微倦委轡隨小蹇偶攀黄黄栁却望青青巘幽尋復有興未覺西林緬謝公墩墩在公所捨宅報寜禪寺後余嘗至其處特一土骨堆耳走馬白下門投鞭謝公墩昔人不可見故物尚或存問樵樵不知問牧牧不言摩挲蒼苔石㸃檢屐齒痕想此絓長檣左氏縿絓於木而止想此倚短轅想此玩雲月狼藉盤與樽井逕亦巳没漫然禾黍村摧藏羊曇骨羊曇太山人知名士謝安甥也特為安所愛重放浪李白魂亦巳同山丘緬懐蒔蘭蓀小草戲陳迹甘棠詠遺恩安至新城築埭於城北後人追思之名為召伯埭萬事付鬼籙恥榮何足論天機自開闔人理孰畔援公色無喜懼儻知禍福根涕淚對桓伊暮年無乃昏桓温陳兵新亭将移晉祚呼安及王坦之欲害之坦之甚懼安神色不變帝嘗召伊飲安侍坐帝命伊吹笛伊又撫筝歌怨詩曰忠信事不顯乃有見疑患為安發也安泣下沾衿越席就之捋其鬚曰使君於此不凡帝有愧色詩言安不懾於元桓而垂涕於讒者似未能一視禍福也秋夜泛舟池塹秋水浄扁舟遡涼飈的皪荷上珠俯映疎星摇深尋畏魚淰中路且回橈㝠㝠菰蒲中乃復有驚跳禮運龍以為畜故魚鮪不淰注淰之言閃也魚鮪從龍者龍既來為人之畜故其屬見人不淰然驚走也回橈不欲魚之驚也乃自有跳於菰蒲者書一時之適和耿天隲同遊定林寺道人深閉門二客來不速攝衣負朝暄一笑皆捧腹逍遥煙中䇿放浪塵外躅晤言或世間誰謂非絶俗次韻約之謝惠詩魚跳桑栁隂鳥落蒲葦側已無谿姑祠何有江令宅谿姑對江令公於古詩亦求工如此按輿地志言青谿岸側有神祠世謂青谿姑南朝時有靈異舊傳隋平陳張麗華孔貴嬪死於此今祠像有三婦人葢谿姑與二妃也建康志遂指谿姑為麗華誤矣江令宅見招約之職方注故人耽田里老脫尚方舄王喬傳自縣詣臺朝輙有雙鳬從南飛來帝令舉羅張之但得一雙舄焉乃詔尚方識視則四年中所賜尚書官屬履也開亭捐百金於此掃塵迹地偏人罕至心逺境常寂陶詩心逺地自偏公析而用之似為之疏解也我行西州旋稅駕候顔色相隨望南山水際因一息公時指岸木謂此可尋尺伐之營中沚持用自怡懌懽言俟其成邀我堂上食百憂每多違一諾還自惕春風櫩楹新坐久膝前席翛然忘故約北郭疑有適長謡舒永懐佇想對以臆摛辭甚有理竊比書石鷁僖公十五年隕石於宋五六鷁退飛過宋都傳曰隕石于宋五隕星也六鷁退飛過宋都風也知公不我欺把玩果心惻嘉肴既夙設麗藻仍虚擲左車公自迎右券吾敢責信陵君遺侯生不受乃置酒大㑹公子從車騎虚左迎侯生侯生坐於公子上不讓欲以觀公子公子執轡愈㳟史記平原君傳亊成操右劵以責聞說芼羮臛說文臛肉羮芬香出鄰壁婦休機杼事兒失刀槧職師古曰削者以刀削簡牘揚子古之槧人也何膠膠擾擾而紛紛籍籍擕持欲一往繼此方如織元龍但髙卧司馬勿親滌元龍卧見次韻郭子儀注相如傳與傭保雜作滌器於市中㡬能孩童舊握手皆鬢白有興即扳聨東阡與南陌扳聫一作聨鑣次韻舎弟江上岸紅歸欲稠渚緑合猶晚晴沙上屐輕暖水隨帆逺吹波戲魚動掠葉飛禽返著意覓幽蹊桃花悮劉阮搜神記劉晨阮肇入天台迷不得返經十三日飢甚遥望山上有桃熟遂躋險援葛至其下噉數枚飢止體充下山取水見一杯流下有胡麻焉乃相謂此近人矣遂度山見一大溪溪邊有二女子色甚美見二人持杯便笑曰劉阮二郎投向杯來劉阮驚二女欣然曰來何晚耶因邀還家至十日求還苦留半年女遂相送指示還路鄉邑零落已七世矣㨿事止是桃實非桃花酬王濬賢良松泉二詩此即萬宗泉也公嘗作記云僧道光得泉之三年直嵗善端治屋龍井之西北發土得汍泉二萬宗命溝井而合焉東為二池池各有溝注于南池而東南其餘水以溉山麓之田既甃善端請名余為名其泉曰萬宗云熙寜十年十二月十二日臨川王某記時公以㑹靈觀使家居世傳壽可三松倒下元夫人語封陟能使君壽倒三松見太平廣記此語難為常人道人能百嵗自古稀松得千年未為老我移兩松苦不早豈望見渠身合抱但怜衆木總漂揺顔色青青終自保絲伏苓㑹當有邂逅食之能壽考不知篝火定何人且看森垂覆荒草史記龜筴傳伏苓者在絲之下状如飛鳥之形新雨已天清靜無風以夜捎絲去之即以篝火燭此地火滅即記其處以新布四丈環置之明即掘取之入地四尺至七尺得矣君詩愛我亦古意秀眉昔比南山栲復謂留侯不及我人或笑君無白皂求僊辟榖彼誠悮未見赤松飢已槁張良傳願棄人間事欲從赤松子游耳乃學道欲輕舉辟榖事見史記本傳豈如强飯適志游封植蒼官䕃華皓赤松復自無特操荘子何其無特操歟上下隨煙何慅慅慅音草劉向列仙傳赤松子嘗止西王母石室中隨風雨上下詩言煙必别有出處蒼官受命與舜同樊宗師絳州園林記松名蒼官真可從之忘髪縞詩雖祝我以再黒積雪巳多安可掃試問蒼官值嵗寒戴白孰與蒼然好其二宋興古刹今長干宋興寺名長干見次韻酹朱昌叔注靈曜臺殿荒檀欒左思吴都賦檀欒嬗娟二泉相望棄不渫西泉尚累三石槃其流散漫為沮洳稍集小礫生微瀾東泉土梗久蔽塞穿治乃見甃甓完道人慈哀波汲逺溝蕩取土合兩山山前灌輸各自足轆轤轉罷井口閒取遥比甘覺近美與舊争冽知新寒爞爞夏秋百源乾抱甕復道愁蹣跚疾傾横逗勢未足嗟此善利何時殫慮長易脆有大檀大檀謂施者伐堅匡廬窟孱顔金多匠手肯出巧風水千里焉知難没羽之虎行林間韓詩外傳楚熊渠子夜行見寝石以為伏虎彎弓而射之没金飲羽下眎知其石也因復射之矢摧無迹籜龍失職因藏跧籜龍意亦取竹杖投葛陂化龍事循除静投悲瑟瑟映瓦微見清潺潺三年營之一日就有口共以成為懽論功信可侈後觀何似當年萬竹蟠杜詩白帝城西萬竹蟠接筒引水喉不乾補注溝蕩周禮地官稻人以溝蕩水荅俞秀老諸偶縁安有實相非相偶雖神如季咸終亦失而走莊子鄭有神巫曰季咸知人之死生禍福期以嵗月旬日若神鄭人見之皆棄而走清涼寺送王彦魯空懐誰與論夢境偶相值莫将漱流齒欲挂功名事晉孫楚與同郡王濟友善楚少時欲隠居謂濟曰常欲枕石漱流誤云潄石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒送惠思上人黄鶴撫四海翩然落中州一聽笙與鏞低回如有求飛鳴阿閣上好與鳳凰游顧憐魯東門無事反悲愁文公二年臧文仲祀爰居不智也注海鳥曰爰居集於魯東門外文仲以為神命國人祀之嵗晏忽驚矯問胡不少留因知網羅外猶有稲粱謀老景老景春可惜無花可留得繞屋禇先生蕭蕭何所直每嫌栁渾青追恨李太白多謝安石榴向人紅蘂折景春戰國時人宗正劉徳漢人禇先生武帝時人蕭何漢相栁渾唐人李白字太白唐人謝安字安石晉人劉向連前句榴字石林詩話云荆公有老景春可惜詩以古人姓名蔵句中葢以文為戲或謂前无此體自公始見之余讀權德輿集其一篇云藩宣秉戎寄衡石崇勢位年紀信不留弛張良自愧樵蘇則為惬瓜李斯可畏不顧榮宦尊每陳農畝利家林類岩巘浮郭躬歛積忌滿寵生嫌養䝉恬勝利疎鍾皓月曉晚景丹霞異澗谷永不變山梁兾无累論自王符肇學得展禽志從此直不疑支離疎世事則權徳輿巳嘗為此體乃知古今文章之變殆無遺藴徳輿在唐不以詩名然詞亦雅暢此篇雖主意在别立體然不失為佳製也雜詠八首萬物余一體九州余一家秋豪不為小莊子知北游篇秋豪為小待之成體徼外不為遐漢鄧通傳人有告通盜出徼外鑄錢師古曰徼猶塞也東北謂之塞西南謂之徼張揖曰徼謂以木石水為界者不識壽與夭不知貧與奢忘心乃得道道不去紛華近迹以觀之堯舜亦泥沙莊周謂如此而世以為夸其二神龍豢可致古有豢龍氏昭公七年猛虎擾亦留周禮服不氏掌猛獸而敎擾之注猛獸虎豹之屬擾馴也變生父子間上聖不能謀常情在欲得義養或成仇變生父子如瞽叟欲得舜牛羊倉廩類唐末五代諸将皆以異姓為養子號曰義兒他人恩更輕患禍信難周其三古風知遜悌班白見尊優薄俗謬為㳟獨在勢權尤伏波迷俯仰愛禮坐成仇馬援傳援有疾梁松來候之獨拜床下援不荅松去後諸子問曰梁伯孫帝壻貴重朝廷公卿巳下莫不憚之大人奈何獨不為禮援曰我乃松父友也松由是恨之梁松父名統齗齗洙泗間豈是老者羞魯道衰洙泗之間齗齗如也史記其四羔豚窘虎豹鳩雀窮鷹鸇戰國䇿如虎豹之摶羔豚必無幸矣左傳文公十八年見無禮於其君者如鷹鸇之逐鳥雀也巧者具機弋鷙猛還拘攣論功莫如神論大莫如天悲哉區區人乃欲逃其間逃其間者謂不有神與天者也其五黄雀死彈丸厥罪在啄粟荘子謂楚王夫雀俯啄白粒仰栖茂樹鼔翅奮翼自以為無患不知公子王孫左挾彈右挾丸以加其頸也翠鵠不近人何為亦窮辱范雎傳且夫翠鵠犀象其處勢非不逺死也而所以死者惑於餌也材為世所利髙下同僵仆能逃天地間蠛蠓無不足其六闗雎后之淑棫樸王之明罝尚好徳况乃公與卿所以彼行葦敦然遂其生誰能絃且歌為我發古聲其七召公方伯尊材亦聖人亞農時憚煩民聽訟甘棠下嗟今千室長已恥問耕稼彈琴髙堂上欲以世為化韓詩外傳云宓子賤治單父彈鳴琴不下堂而單父治公嘗作撫州倅㕔見山閣記乃云此殆非召公之實事詩人之本㫖特墨子之餘言贅行吝細褊迫者之所好則記又與詩意異矣其八任公蹲海濵一釣飽千里用力已云多鈎緡亦難理巨魚暖更逃壯士飢欲死遊儵不可數空滿滄浪水莊子外物篇任公子為大鈎巨緇五十犗以為餌蹲乎㑹稽投竿東海旦旦而釣期年不得魚巳而大魚食之牽巨鈎䤾沒而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自淛河以東蒼梧以北莫不厭若魚者已而後世輇才諷說之徒皆驚而相告也夫掲竿累趍灌瀆守鯢鮒其於得大魚難矣飾小說以干縣令其於大逹亦逺矣是以未嘗聞任氏之風俗其不可與經於世亦逺矣東方朔傳臣朔飢欲死莊子儵魚出遊張良留侯美好如婦人漢贊聞張良之智謀以為其貌魁梧竒偉反若婦人女子五世相韓韓入秦良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王從昭侯至悼惠王凡五君傾家為主合壯士博浪沙中擊秦帝脫身下邳世不知舉世大索何能為秦滅韓良年少未宦家僮三百人弟死不𦵏悉以家財求客刺秦王為韓報仇良嘗東見滄海君得力士為鐵錐重百二十斤秦皇帝東游至博浪沙中良與客狙擊秦皇帝誤中副車秦皇帝大怒大索天下求賊急甚良乃更名姓亡匿下邳素書一巻天與之榖城黄石非吾師良傳圯上有一老父出一編書謂良曰讀是則為王者師後十三年見我濟北穀城山下黄石即我已遂去不見固陵解鞍聊出口捕取項羽如嬰兒漢五年冬漢王追楚至陽夏南戰不利壁固陵諸侯期不至良說漢王用其計諸侯皆至卒以滅羽秦誓不啻如自其口出從來四皓招不得為我立棄商山芝髙帝欲棄太子吕后使建成侯吕澤刼良為我畫計良曰此難以口舌争也上有所不能致者四人四人年老矣皆以上嫚侮士故逃匿山中義不為漢臣然上髙此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士固請為客從入朝令上見之則一助也四人果至客建成所洛陽賈誼才能薄擾擾空令絳灌疑賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毁誼於是天子亦疎之以誼為長沙王太傅司馬遷孔鸞負文章不忍留枳棘司馬相如子虚賦鵷雛孔鸞後漢王渙謂仇覧曰枳棘非鸞鳳所栖百里豈大賢之路耶嗟子刀鋸間悠然止而食遷荅任安書夫中才之人事闗於宦豎莫不傷氣况忼慨之士乎如今朝廷雖乏人奈何令刀鋸之餘薦天下賢俊哉詩言遷之髙才顧低回於中令尊寵任職也成書與後世憤悱聊自釋太史公論六家之㫖要遷自序協六經異傳齊百家雜語領畧非一家髙辭殆天得雖微樊父明不失孟子直樊父仲山父也既明且哲譏遷被刑昧於明哲之道也孟子謂寺人孟子遷為官者令故亦以寺人比之馮參贊伯竒放流孟子宫刑孟子不直則道不見或指此謂遷白李陵事也彼欺以自私豈啻相十百世人竊自汙之迹以屈其身如馬遷者亦有之而求其實如遷者葢鮮也諸葛武侯漢日落西南中原一星黄魏武帝紀桓帝時有黄星見於楚宋之分殷馗言後五十載當有真人起於梁沛之間其鋒不可當至建安五年恰五十而曹公破紹天下無敵矣公用一星黄甚妙羣盜伺昏黒聨翩各飛揚武侯當此時龍卧獨摧藏邂逅得所從幅巾起南陽本傳亮躬耕隴畝好為梁父吟身長八尺每自比於管樂時人莫之許也魏畧曰亮在潁川石廣元徐元直汝南孟公威等俱游學三人務於精熟而亮獨觀其大畧每晨夜從容嘗抱膝長嘯而謂三人曰卿三人仕進可至郡守刺史也三人問其所志亮但笑而不荅﨑嶇巴漢間屢以弱攻彊暉暉若長庚孤出照一方長庚太白也夜将既其光始著以喻孔明之於漢云勢欲起六龍東迴出扶桑惜哉淪中路怨者為悲傷武侯卒年五十四怨者為李平廖立皆以罪為亮所廢亮薨立泣曰吾終為左袵矣平亦發病死平嘗冀亮當自補復䇿後人不能故以激憤也習鑿齒言水鏡之所以能窮物而無怨者以其至平無私也法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎諸葛亮可謂能用刑矣自秦漢以來未之有也豎子祖餘策猶能走强梁死諸葛走生仲逹王荆公詩注巻五
