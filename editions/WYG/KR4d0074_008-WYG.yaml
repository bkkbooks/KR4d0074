body:
  text: 王荆公詩注卷八宋李壁撰古詩送李屯田守桂陽二首泊舩香爐峯孟浩然詩泊舟潯陽郭始見香爐峯始與子相識寄書邗江上寰宇志揚州合瀆渠本吴掘邗溝以通江淮之水路昔吴王夫差将伐齊比霸中國自廣陵城東南築邗城下掘深溝謂之邗江亦曰䢴溝詒我峯下石縁以湘水竹攜持與南北永懐故人歡不願百金易竹枯歸樵蘇石爛棄沙礫夷門忽邂逅緑髪皆半白追思少時事俛仰如一夕老矣無所為空知念疇昔常思一杯酒要子相解釋出門事紛紛歸卧意還􅤕子虛賦與其窮極倦􅤕警憚讋伏􅤕音劇倦也聞當上湓水持詔出一作守嶺阨方為萬里别執手先慘戚兹游信浩蕩山水多所得為我謝香爐風塵每相憶其二倉黄離家問南北中路思歸歸不得風濤何處不驚人雨雪前村更欺客舊交旌斾此盤桓見我即令兒觧鞍荒山樂官歌舞拙提壺沽酒聊一歡行藏欲話眉不展互歎别離心繾綣行年半百勞如此南畝催耕未宜晩黄離思歸淘河子鵁鶄䳭鴒山樂官提壺畫眉伯勞催耕皆鳥名詩逐句蔵鳥名亦是藥名體和仲庻出守潭吴公治河南名出漢廷右賈生傳文帝初立聞河南守吴公治平為天下第一髙才有公孫相望千載後平明省門開吏接堂上肘仲庻自三司户部副使以天章待制知潭三司事劇吏猥衆故曰接肘指撝談笑間静若在林藪連墻畫山水隠几詩千首浩然江湖思果得東南守傳鼓上清湘旌旗蔽牛斗方今河南治復在荆人口自古楚有材襄公二十六年雖楚有材晉實用之酃淥多美酒酃淥見和微之登髙齋不知尊前客更得賈生否誼先為河南吴公客後謫長沙今公言尊前客又施之吴姓用事精切如此即事六首我起影亦起我留影逡巡我意不在影影長隨我身莊子齊物論罔兩問景曰曩子行今子止曩子坐今子起何其無特操歟交游義相好骨肉情相親如何有乖睽不得同苦辛杜詩哀哉兩決絶不復同苦辛其二昬昬白日卧皎皎終夜愁明月入枕席涼風動衾幬蛬蟬相鳴悲上下無時休徒能感我耳顧爾安知秋其三梁王自墮馬賈傅至死悲古人事一職豈敢苟然為梁王勝墜馬死賈誼自傷為傅無状常哭泣後嵗餘亦死賈生之死年三十三王自墮馬死豈必生之過而生自尅責如此言古人不苟其官也韋處厚為近臣當敬宗初每入見即自陳有罪願前死以謝帝曰何哉對曰臣昔為諌官不能死争使先帝因畋與色而至不夀於法應誅然所以不死者陛下在春宫十有五矣今皇子方襁褓臣不敢避死亡之誅以處厚之事觀之誼之責巳不為過也哭死非為生吾心良不欺滔滔聲利間絳灌亦何知余嘗愛王逢原一詩與古荆公詩意類今錄於此人重非道飢不苟豆羮有為非其心或不脫冕行如何後世人以官業其生鄙哉樂欺人猶以學自名其四先生善鼓瑟齊國好吹竽操瑟入齊人雅鄭亦復􅀈介父真跡鼓􅀈二字與俗書不同盖鼓字本合如此寫世俗從支從皮皆非也􅀈字亦然退之答陳商書齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律吕客罵之曰王好竽而子敱瑟瑟雖工如王不好何豈不得祿賜歸卧自欷歔寥寥朱絲絃老矣誰與娱其五商陽殺三人每輙不忍視檀弓下工尹商陽與陳棄疾追吴師及之棄疾謂商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人揜其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉亦均食君食章茂憲侍郎所藏真跡乃作亦云食君實報禮當如此波瀾吹九州金石安得止永懐南山阿慷慨中夜起其六日月隨天旋疾遲與天侔晉書天文志天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西沒譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不随磨而左廻寒暑自有常不顧萬物求蜉蝣蔽朝夕詩蜉蝣之羽衣裳楚楚注渠畧也朝生夕死蟪姑疑春秋莊子蟪蛄不知春秋眇眇萬古歴回環今幾周送鄭叔熊歸閩鄭子喜論兵魁然萬人敵嘗持一尺箠荘子天下篇一尺之棰日取其半跨馬河南北方今邊利害口手能講畫疑師榖城翁張良傳榖城山下黄石即我也方略巳自得天兵巻甲老壯士不肉食低回向詩書文字銳鐫刻科名又齟齬棄置非人力黄塵彫罽裘小杜詩贈以蜀馬箠副以胡罽裘罽賔裘日本裘皆以外國得名逆旅同偪仄秋風吹殘汴霰雪巳驚客浩歌随東舟别我無慘惻閩生今好游往往老妻息南陔子所慕天命豈終塞寄二弟時往臨川蕭條冬風髙吹我冠上霜我行嵗已寒悲汝道路長持此犬馬心千里不能一作得将使汝身百憂辛勤冒川梁青燈照詩書仰屋涕數行不有親戚思詎知逺逰傷李氏沅江書堂沅江水有梁與罾沅田桑樹可蠶耕君於其間耻射利獨岸清泚留朱甍詩書當前日開闔冠帶滿坐相逢迎勉求髙論出施設無以私智為公卿休假大佛寺罷憊得休假衣冠倦趨翔挾書聊自娱觧帶寺東廊六龍髙徘徊光景在我裳冬屋稍暄暖病身更强梁强梁者必遇其敵金人三緘銘從我有不思捨我有不忘王令詩求即令我煩去即我不思不若公詩之婉問誰可與言攜手此徜徉婉婉吾所愛新居乃鄰墻寄聲能來遊維用寫愁傷别謝師宰閶闔城西地如水雞鳴黄塵波浪起塵頭之髙如波浪掀湧盛言車馬奔馳之盛窮年一馬望扶桑東得省門身輙止簿書期㑹老紛紛賈誼傳以簿書不報期㑹為大故邂逅論心喜有君數日未多還捨我相看愁思亂於雲解使事泊棠隂時三弟皆在京師二首始吾泊棠隂三子不在舟今當捨之去三子還逺逰茫然千里水今見荻花洲俛仰換春冬紛紛空百憂介父嘉祐三年二月自常州移提㸃江東刑獄此言換春冬去官時當是四年自是入為三司判官獻萬言書深言當世之故所謂百憂皆書中所論者懐哉山川異往矣雪霰稠登髙一涕泗寄此寒江流其二泊舩棠隂下灘水清且淺回首望孤城浮雲一何􅃡久留非吾意欲去猶繾綣馳心故人側一望三四反蕭蕭東堂竹異日留息偃無恩被南國疑此行當翦驊騮龍徳不可係變化誰能謀驊騮亦俊物卓犖地上遊怒行追疾風忽忽跨九州轍跡古所到山川畧能周鴻濛無人梯沆漭遶天浮巉巖抜青㝠仙聖所止留列子渤海之東有大壑焉中有五山曰蓬萊蓬萊所居之人皆仙聖之種欲往輙不能視龍乃知羞寄朱氏妹朱明之也昔來髙郵居我始得朱子從容談笑間已足見竒偉行尋城隂田坐釣渠下沚歸來同食眠左右皆圗史入視爾諸幼歡言亦多祉當時獨張倩張奎也逺在廬山趾沈君未言昬沈君季長也名已習吾耳安知十年來乖隔非願始相逢輙念逺悲吒多於喜今兹豈人力所念皆聚此諸甥昔未有滿眼秀而美低回吾親側亦足慰勞止嗟予迫時恩一傳日千里史記田光曰騏驥盛壯之時一日而馳千里據一傳日千里之句公時為江東提刑爾舟亦已戒五兩翻然起郭璞江賦爾乃雰䘲於晴旭覘五兩之動静注五兩鳥毛為之置檣竿之上以候風也蕭蕭東南縣望爾何時巳空知夢為魚逆上西江水贈陳君景初景初本末注見别篇吾嘗竒華佗腸胃真割剖神膏既傅之頃刻活殘朽列子湯問篇扁鵲飲魯公扈趙齊嬰二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初注言恢誕乃書記少有魏華佗傳若病結積在内鍼藥所不及當須刳剖者飲以麻沸散須臾如醉死無所知因破取病若在腸中便斷腸湔洗縫腹膏摩四五日差人亦不自寤一月之間即平復矣昔聞今則信絶技世常有堂堂潁川士謂陳君也察脉極淵藪珍丸起病瘠鱠蟲隨泄嘔佗傳陳登病懣佗曰使君胃中有蟲數升欲成内疽食腥物所為飲以藥吐出三升許蟲半身是生魚鱠攣足四五年下針使之走一言儻不合萬金莫可誘又復能賦詩往往吹瓊玖巻紙誇速成語怪若神授名聲動京洛蹤跡晦莨莠相逢但長笑一作嘯遇飲輙掩口獨醒意何如無乃寡俗偶顧非避世翁疑是壁中叟廣記神仙孫博傳博遇山間石壁地上盤石博入其中漸見背及兩耳良久都沒又能吞刀劍十數枚及壁中出入如孔穴也安得斯人術付之經國手贈張康昔在歴陽時歴陽今和州得子初江津手中紫團參一飲寛吾親介甫嘗云平生不服紫團參亦活到今日卒辭餽者今此取於醫為親故也捨舟城南居杖屨日相因百口代起伏呻吟聒比鄰叩門或夜半屢費藥物珍欲報恨不得腸胃盤車輪今逢又坎坷令子馳風塵顛倒車馬間起先氷雪晨嗟我十五年得禄尚辭貧所讀漫累車豈能蘇一人言讀書雖多無補於時曾不如醫之猶能活人此公謙言無求愧子義有施慙子仁逝将收桑榆馮異傳光武璽書報異曰可謂失之東隅收之桑榆邀子寂寞濵退之答崔立之書釣於寂寞之濵送程公闢之豫章公闢先為䕫州路提㸃刑獄夷數犯渝州邊公闢自䕫乞徙治渝州大賑民饑旋徙節河東路入為三司判官刑部郎中出知洪州時嘉祐七年五月畫船揷幟摇秋光鳴鐃伐鼓水洋洋豫章太守吴郡郎師孟字公闢本傳吴郡人故稱吴郡郎行指斗牛先過鄉鄉人出郭航酒漿炰鼈膾魚炊稻粱芡頭肥大菱腰長釂醻喧呼坐滿床怪君三年滯瞿塘又驅傳馬登太行纓旄脫盡歸大梁蘇武仗漢節卧起操持節旄盡落飜然出走天南疆九江左投貢與章貢章二水名今在䖍州揚瀾吹漂浩無旁老蛟戲水風助狂盤渦忽折千丈强韓文聽潁師琴失勢一落千丈强君聞此語悲慨慷迎吏乃前持一觴鄙州歴選多俊良鎮撫時有諸侯王諸侯王謂滕王本朝太宗第六子元偓亦等使嘗為鎮南節度洪州管内觀察處置拂天髙閣朱鳥翔西山蟠繞鱗鬛蒼子厚馬退山茅亭記是山崒然起於莾蒼之中亘數百里尾蟠荒陬首注大溪亦言鱗鬛之類下視城塹真金湯蒯通傳皆為金城湯池洪州州城之西為大江大江之外為西山西山特髙雖隔江下視州城如金湯雄樓傑屋鬱相望杜牧鍾陵詩垂樓萬幕青雲合可見其盛中户尚有千金藏漂田種秔出穰穰沉檀珠犀雜萬商大舟如山起牙檣牙檣埤蒼云颿柱也今之掛帆木輸瀉交廣流荆揚輕裾利屣列名倡貨殖傳趙女鄭姬揄長袖躡利屣春風踏謡能斷腸踏謡踏歌也平湖灣塢煙𣺌茫樹石珍怪花草香幽處往往聞笙簧地靈人傑古所臧勝兵可使酒可嘗晉人語北府酒可飲兵可用十州將吏隨低昂談笑指揮回雨暘非君才髙力方剛豈得跨有此一方無為聽客欲霑裳使君謝吏趣治裝我行樂兮未渠央鳳凰山二首驅馬信所適落日望九州青山滿天地何往為吾丘貧賤身祗辱富貴道足羞涉世諒如此惜哉去無由其二歡樂欲與少年期人生百年常苦遲白頭富貴何所用氣力但為憂勤衰願為五陵輕薄兒生在正觀開元時鬬雞走犬過一生天地安危兩不知袁盎傳與閭里浮沉相隨行鬬雞走狗夢中作青門道北雲為屋長安城東第一門曰青城門或曰青門大壚貯酒千萬斛燭當是獨字龍注雨如車軸華嚴經龍王於彼大海中雨滴如車軸不畏不售畏不續彭蠡茫茫彭蠡春無地春無地者言春漲渺然皆水白浪春風濕天際東西捩柂萬舟回千載老蛟時出戲少年輕事鎮南來鎮南謂豫章水怒如山帆正開中流蜿蜒見脊尾觀者膽堕余方咍觀此詩公必嘗見彭蠡龍衣冠今日龍山路廟下沽酒山前住老矣安能學佽飛吕氏春秋荆有佽飛者得寳劍涉江中流有蛟繞其船佽飛抜劍赴江刺蛟殺之舟中之人皆活楚王聞之位以執圭漢宣紀應募佽飛射士注引楚人事因以名勇力之官許愼云佽便也許說與如淳異買田欲棄江湖去牛渚宣城舊志牛渚山突出江中歴陽之南有牛渚一風微吹萬舟阻華戎蠻蜀支百川合為大江神所躔山盤水怒不得泄到此乃有無窮淵朱衣乘車作官府操制生殺非無權隂靈秘怪不欲露退之詩凝湛閟隂嘼燬犀得禍却偶然温嶠自都徙于武昌至牛渚磯水深不可測世云其下多怪物遂燬犀角照之湏臾見水族覆火竒形異狀或乘馬車著赤衣者其夜夢人謂巳曰與君幽明道别何意相照意甚惡之尋卒東門東門白下亭摧甓蔓寒葩淺沙􅍻素舸一水宛秋蛇漁商數十室門巷隠桑麻翰林謫仙人往嵗酒姥家翰林謂太白白嘗有白下亭詩魏灝作白集序載白擕金陵之妓裴敬作白碑載白嘗游上元蒋山讃誌公則白下公嘗所游歴處酒姥家借用王方平事調笑此水上能歌楊白花古樂府楊白花風吹渡江水坐令宫樹無顔色摇蕩春光千萬里楊花飛白雪枝裊緑煙斜舞袖巻煙雪綺裘明紫霞風流翳蓬顆賈山傳蓬顆蔽冢師古曰顆謂土塊也蓬顆言土上生蓬故地使人嗟迢迢陌頭青謂柳空復可藏鴉王荆公詩注巻八
