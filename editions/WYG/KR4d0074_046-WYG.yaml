body:
  text: 王荆公詩注卷四十六宋李壁撰律詩次韻杏花三首只愁風雨劫春回怕見枝頭爛漫開東坡梅詩君知早落坐先開忍著新詩句句催皆深致惜花之意野鳥不知人意緒杜詩野鴉無意緒啄教零亂㸃蒼苔其二心憐紅蘂與移栽不惜年年糞壤培風雨無時誰㑹得欲教零亂強催開末句意即前篇首句意歐公詞云東風本是開花信及至花時風更𦂳吹開吹謝苦怱怱春意到頭無處問其三看時髙豔先驚眼折處幽香易滿懐野女強篸看亦醜少教憔悴逐荆釵唐房千里文西子不花嫫姆錦縠是不能易其美惡言野女雖篸花不能掩其醜也列女傳梁鴻妻孟光荆釵布帬杏園即事蟠桃移種杏園初紅抺臙脂嫰臉蘇聞道飄零落人世清香得似舊時無宋城道中都城花木久知春北路餘寒尚中人宋城属南京應天府此詩所指恐非此宋城也葢詩云都城花木次以北路餘寒則是巳過汴京踰河而北矣楚詞薄寒中人言塞上寒苦得春晩也宿草連雲青未得東風無頼只驚塵言春風不能青連雲之草但驚塵耳王維詩黄雲斷春色對客窗壁風回午枕涼清談相對一胡床心知帝力同天地能使人間白日長此亦王符化國之日舒以長之意愍儒坑智力區區不為身欲將何物助強秦只應埋没千秋後更足詩書發冢人言詩書發冢亦無異坑儒莊子外物篇儒以詩禮發冢衞宏詔定古文官書序曰秦既焚書患苦天下不從所改更而諸生到者拜為郎前後七百人乃密令種𤓰於驪山阬谷中温處𤓰實詔博士說之人人不同乃令就視為伏機諸生賢儒皆至焉方相難不決因發機從上填之以土皆壓之終乃無聲今新豐縣温湯處號愍儒鄉湯西有馬谷西岸有阬古老相傳以為秦阬儒處遇雪定知花發是歸期不奈歸心日日歸風雪豈知行客恨向人更作落花飛退之詩白雪却嫌春色晚故穿庭樹作花飛懐舊吹破春冰水放光山花澗草百般香身閑處處堪行樂何事低回兩鬢霜公又有春入一詩略同此訪隱者童子穿雲晚未歸誰收松下著殘棋先生醉卧落花裏春去人間總不知鄭毅夫集亦有此作未知果是誰作劉言史詩採芝却到蓬萊上花裏猶殘碧玉鍾韋應物詩林下器未收何人適煮茗牧之詩云誰家无事少年子滿面落花猶醉眠海棠花綠嬌隱約眉輕掃紅嫰妖嬈臉薄粧巧筆寫傳功未盡清才吟詠興何長南部煙花記云殿脚女呉絳仙善畫長蛾帝憐之由是争為長蛾司宫吏日供螺子黛五斤號蛾緑螺杜詩紅入桃花嫩宋玉賦施朱則太赤證聖寺杏接梅花未開建康志云寺在今行宫北即舊木平寺接花巳見四十二卷注紅蘂曾游此地來青青今見數枝梅只應尚有嬌春意不肯凌寒取次開嬌春見獨卧注雜詠六首勲業無成照水羞黄塵入眼見山愁劉先主云日月若馳老將至矣而功業不建是以悲耳又以世故塵土見山不得歸而愁耳煙中漠漠江南岸更與人家一少留白詩日入意未盡將歸復少留唐馬載詩坐看涼月上為子一淹留其二白頭重到太寧宫大中祥符四年春詔以奉祗宫為太寧宫増葺殿室設后土聖母像據金坡遺事翰林每歲作望祭文宫在慶成軍令狐楚詩不厯晋祠三十年白頭重到一淒然玉佩瓊琚在眼中韓公祭栁子厚玉佩瓊琚大放厥辭恐謂宫中碑記歌舞可憐人暗换花開花落幾春風謂升歌舞綴祠祭所用非世間所謂歌舞也少陵謁先主廟閭閻兒女换歌舞歲時新李紳詩不如開落有春風退之詩歌舞知誰在賓僚逐使非歐公詩風日無情人暗换舊㳺如夢空腸斷其三朝陽映屋擁書眠夢想鍾山一慨然投老安能長忍垢㑹當歸此濯寒泉莊子譲王篇湯問務光曰伊尹何如曰強力忍垢吾不知其他也太史公叙傳言范雎能忍訽於魏齊而信威於強秦訽音逅其四烏石岡頭躑躅紅東江栁色漲春風漲字屢見上注坡詩亦云柔桑漲眼麥齊腰物華人意曾相值永日留連草莽中李郢鵝兒詩有時散亂随青草永日淹留在野田其五小雨蕭蕭潤水亭花風颭颭破浮萍退之詩天階小雨潤如酥又風約半池萍林處士詩浮萍破處見山影看花聽竹心無事風竹聲中作醉醒其六百年禮樂逢休運叔孫通傳魯兩生曰禮樂所由起百年積徳而後可興也千里江山極勝逰那似鮑昭空寫恨不為王粲祗消憂鮑明逺有恨賦王粲登樓賦聊暇日以消憂公閑居詩大率類此怨懟譏刺者視之有愧矣書陳祈兄弟屋壁按公皇祐二年自舒州通判將告歸臨川訪鄉人作此詩千里歸來倦宦身欲尋田宅豫求隣能將孝友傳家世鄉邑如君更幾人予於撫州得此詩石本乃新授將仕郎守惠州河原縣主簿陳祈立石郊行柔桑採盡緑隂稀蘆箔蠶成密蠒肥太白詩荆湖麥熟蠒成蛾繰絲憶君頭緒多樂天詩由來蠶老後方是蠒成時聊向村家問風俗如何勤苦尚㓙飢唐明宗嘗問馮道今歲雖豊百姓贍足否道曰農家歲凶則死於流殍歲豊則傷於榖賤豐凶皆病者惟農家為然臣記進士聶夷中詩云二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉語雖鄙俚曲盡田家之情狀農於四民之中最為勤苦人主不可不知也上恱乃命左右録其詩嘗諷誦之破冢二首埋沒殘碑草自春旋風時出地中塵俗言旋風鬼所為也後漢王忳傳主人云被随旋風與馬俱亡卿何隂徳而致此二物忳自念有𦵏書生事因說之墦間夜半分珠玉猶是當時乞祭人分珠玉用發冢事詳見驪山詩篇乞祭人見孟子其二殘椁穿來欲幾春蕭蕭長草沒麒麟杜詩草邉高冢卧麒麟墦間或有樵蘇客未必他年醉飽人題景德寺試院壁公自注云至和三年八月十日屋東𤓰蔓巳扶疎小石藍花破蕚初從此到寒能幾日風沙還見一年除小杜詩春丰年巳除其餘強為有即此醉殘花便同嘗臘酒公詩略似此意沈文通景徳寺考試院壁和介甫韻石藍開盡紅着地𤓰蔓半枯黄倒垂坐看一年芳意歇風霜即是早寒時蕭后語太宗隋主淫侈每二除夜殿前諸院設火山數十盡沉香也注至及歲夜為二除見廣記金陵報恩大師西堂方丈二首簷花映日午風薫杜詩燈前細雨簷花落時有黄鸝隔竹聞香灺一爐春睡足上方車馬正紛紛說文灺燭燼也囚夜切廣記道術門燭灺更深疲於毫硯今以言香香亦有燼也其二蕭蕭出屋千竿玉靄靄當窓一炷雲謂對竹燒香也心力長年人事外種花移石尚殷勤劉長卿僧院詩晨香永日在夜磬滿山聞亦佳句題正覺院籜龍軒二首撫州有正覺寺在水東下又有律詩可考此軒名字經平子愛此吾能為賦詩王澄傳有經澄所題目者衍不復有言輒云巳經平子矣山雨江風一披拂籜龍還自有吟時杜詩風雨時時龍一吟此借用莊子言風起北方一西一東孰居无事而披拂是其二仙事茫茫不可知籜龍空此見孫枝王元之筍詩昨夜春雷迸蘚根亂披煙籜出柴門穉川龍過應迴首認得青青㡬代孫韓偓詩知余絶粒窺仙事許到名山看藥爐孫枝見烏塘詩註壺中若有閑天地何苦歸來問葛陂李義山詩壷中若是有天地人向壷中傷别離後漢費長房汝南人從壺公學道不成思家辭歸壷公與一竹杖曰騎此任所之則至矣既至可以杖投葛陂中顧視之乃龍也今在蔡州相州古瓦硯吹盡西陵歌舞塵當時屋瓦始稱珍甄陶往往成今手尚託聲名動世人鄴中故事銅雀臺三臺相去各六十步上以複道相通中央懸絶鑄一大銅雀高一丈五尺置之樓頂臺上又起樓五重去地三百七十七尺今里人因掘土往往得屋瓦多斷折瓦色頗青其内平瑩不類今瓦有布紋甚厚有及寸者多印工人姓名皆八分𨽻書也劉商銅雀妓詩髙臺無晝夜歌舞竟未足西陵謂曹公𦵏處也曹云吾媫妤伎人皆著銅雀臺月朔十五日輒向帳作伎此故云歌舞塵瓦特以古貴硯譜乃居下言今人偽為託名古瓦以求售也如子厚鐡鑪步記之意望夫石雲鬟煙鬢與誰期一去天邊更不歸武昌山北有望夫石云昔有婦人與夫從役逺赴國難婦携弱子餞送此山立望夫而死化為立石因名之李白詩一上玉闗道天涯去不歸又古詩少年莫逺行逺行多不歸還似九疑山上女千秋長望舜裳衣九疑山在蒼梧馮乗縣其山九峯形勢相似故曰九疑山父老相傳舜嘗登此山或云舜崩𦵏於此山下有舜祠檀弓曰舜葬於蒼梧之野葢二妃未之従也此言九疑山上女未詳然秦博士對始皇云湘君者帝堯之二女舜妃者也又劉向列女傳帝堯二女長曰娥皇次曰女英堯以妻舜舜為天子娥皇為后女英為妃舜死於蒼梧二妃死於江湘之間俗謂之湘君據秦博士及劉向列女傳則二妃乃為湘水之神及死於江湘間則公稱九疑山女或以此葢湘距九疑不逺云舜垂衣裳而天下治余嘗愛張文潜斑竹詩云重瞳陟方時二妃葢老人安肯泣路傍洒淚流叢筠意殊雅正今公賦望夫石詩而引舜妃其亦幾於褻矣餘見燕侍郎山水圗注山前山前溪水漲潺潺山後雲埋不見山不趂雨來耕水際即穿雲去卧山間李羣玉詩頽雲晦廬嶽微鼔辨湓城劉長卿詩夕陽臨水釣春雨向田耕許渾詩雨中耕白水雲外劚青山江雨冥冥江雨濕黄昏天入滄洲漫不分杜詩冥冥江雨熟楊梅又去馬來牛漫不分又李白詩彭蠡將天合北澗欲通南澗水南山正遶北山雲樂天詩東澗水流西澗水南山雲遶北山雲獨卧二首誰有鋤耰不自操可憐園地滿蓬蒿莊子將妄鑿垣墻而殖蓬蒿也欲尋春物無蹊徑獨卧南床白日高呉融詩春物競相妬杏花應最饒其二茅簷午影轉悠悠門閉青苔水亂流百囀黄鸝看不見海棠無數出墻頭張繼詩竹色侵官道花枝出苑牆賈至詩千條弱栁垂青𤨏百囀流鶯遶建章王夢周題故白巖禅師院花樹不随人寂寞數枝猶自出墻頭孟子沉魄浮魂不可招遺編一讀想風標何妨舉世嫌迂濶故有斯人慰寂寥李商隐祭令狐相公文聖有夫子亷有伯夷浮魂沉魄公其尚之神宗嘗謂吕晦叔曰司馬光方直其如迂闊何吕曰孔子上聖子路猶謂之迂孟子大賢時人亦謂之迂况光豈免此名大扺慮事深逺則近於迂矣願更察之商鞅自古驅民在信誠一言為重百金輕前漢得黄金百鎰不如季布一諾今人未可非商鞅商鞅能令政必行商鞅傳令既具未布恐民之不信巳乃立三丈之木於國都市南門募民有能徙置北門者予十金民怪之莫敢徙復曰能徙者予五十金有一人徙之輒予五十金以明不欺卒下令范彛叟讀此詩云古人政事本教化而躬率使人從之政事要必行豈是好事蘇秦已分將身死勢權韓詩已分將身著地飛劉向傳夫乘權藉勢之人子弟鱗集於朝羽翼隂附者衆賈誼鵩賦夸者死權惡名磨滅幾何年桓温曰既不能流芳百世不足遺臭萬年耶想君魂魄千秋後却悔初無二頃田秦為從約長并相六國過雒陽周王使人郊勞昆弟妻嫂側目不敢仰視秦喟然歎曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有雒陽負郭田二頃吾豈能佩六國相印乎方秦盛時巳悔不待千秋後也范雎范雎相秦傾九州一言立斷魏齊頭世間禍福不可忽簣中死屍能報讐范雎傳守者乃請出棄簣中死人魏齊醉曰可矣餘見别注杜牧之詩秦因逐客令柄歸丞相斯安知魏齊頭見斷簣中屍張良漢業存亡俯仰中留侯於一作當此每從容固陵始議韓彭地複道方圗雍齒封唐詩張良未遇韓信貧劉項存亡在兩臣張良本傳五年冬漢王追楚至陽夏南戰不利壁固陵諸侯不至良說漢王漢王用其計諸侯皆至固陵後改為固始属淮陽國本名寢丘楚時孫叔敖所封地又上已封大功臣二十餘人其餘日夜争功不决上居雒陽南宫從複道望見諸將數人偶語欲謀反良曰上平生所憎羣臣所共知誰為最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封雍齒以示羣臣羣臣見齒先封則人人自堅矣曹參束髪山河百戰功白頭富貴亦成空華堂不著新歌舞却要區區一老翁李廣傳且臣結髮而與匈奴戰師古注曰言始勝冠即在戰陳又司馬遷傳耕牧於河山之陽老翁謂葢公本傳参戰鬬功最多又為齊相盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊参未知所定聞膠西有葢公善治黄老言使人厚幣請之葢公為言治道貴清浄而民自定推此類具言之参於是避正堂舍葢公焉楊公時中立言後世如曹参可謂能克巳者觀参本武人攻堅陷陣是其所長至其治國為天下乃以清浄无為為事氣質都變了韓信貧賤侵凌富貴驕功名無復在芻蕘將軍北面師降虜此事人間久寂寥韓信既斬成安君禽趙王歇乃令軍中毋斬廣武君有生得之縳而至戲下者信解其縛東鄉坐而西鄉對而師事之廣武君辭曰亡國之大夫不可以圖存敗軍之將不可以語勇按周勃傳勃不好文學每召諸生說士東鄉坐責之趣為我語注勃自東向不以賓主之禮禮士也觀此信賢於勃逺矣史記魏世家子擊問子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳諸侯驕人則失其國大夫驕人則失其家貧賤者行不合言不用則去之楚越若脫躧然奈何其同之哉山谷詩功成千金募降虜東面置坐師廣武雖云晚計大疎畧此事亦足垂千古語意大相類伯牙千載朱絃無此悲欲彈孤絶鬼神疑故人舍我歸黄壤流水髙山心自知歸一作閉髙山流水見次韻張徳甫注范増二首中原秦鹿待新覊力戰紛紛此一時有道弔民天即助不知何用牧羊兒牧羊兒謂義帝也陳王死鄛人范増年七十素居家好奇計往說項梁曰陳勝敗固當夫秦滅六國楚最无罪自懐王入秦不反楚人怜之至今今君起江東楚蠭起之將皆争附君者以君世世楚將為能復立楚之後也於是項梁然其言乃求楚懐王孫心民間為人牧羊立以為楚懐王公詩意不與懐王之立也其二鄛人七十謾多奇為漢敺民了不知誰合軍中稱亞父直湏推讓外黄兒離婁下為湯武敺民者桀與紂也項羽傳羽擊陳留外黄不下數日降欲阬之外黄令舍人兒年十三往說羽羽然其言乃赦外黄當阬者而更至睢陽諸城聞之皆爭下臣瓉云稱兒者以其幼弱故係之父周太祖幸河北至内黄顧李珽曰何謂内黄珽曰河南有外黄下黄故此名内黄太祖曰外黄下黄何在珽曰秦有外黄都尉在今雍丘下黄為北齊所廢在今陳留太祖平生不愛儒者聞珽語大喜賈生一時謀議畧施行誰道君王薄賈生爵位自高言盡廢古來何啻萬公卿本傳賛誼之所陳略施行矣又曰誼亦天年早終雖不公卿未為不遇也自古爵位高而其言不見於用者豈直一賈生哉兩生兩生才器亦超羣黑白何勞強自分好與騎奴同一處此時俱事衛將軍任安免三百石長為衛將軍舍人與田仁㑹俱為舍人居門下同心相愛此二人貧无錢以事将軍家監家監使飬惡囓馬兩人同牀卧仁竊言曰不知人哉家監也任安曰將軍尚不知人何乃家監也衛將軍從此兩人過平陽主主家令兩人與騎奴同席而食此二子㧞刀裂斷席別坐主家皆怪而惡之莫敢呵其後有詔募擇將軍舍人以為郎㑹趙禹來過悉召舍人百餘人以次問之得田仁任安曰獨此兩人可耳餘无可用者據史記旡兩生字特兩人耳謝安謝公才業自超羣誤長清談助世紛秦晉區區等亡國可能王衍勝商君安嘗與王羲之登冶城悠然遐想有髙世之志羲之謂安曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自効而虚談費務浮文妨要恐非當今所宜安曰秦任商鞅二世而亡豈清談致患耶世上范蠡五湖收逺迹管寧滄海寄餘生可憐世上風波惡最有仁賢不敢行史記貨殖傳范蠡既雪㑹稽之恥乃乘扁舟浮於江湖變名易姓適齊為䲭夷子皮之陶為朱公管幼安漢末大亂至遼東公孫度虛館以待之寜既見度乃廬於山谷時避難者多居郡南而寜居北示不遷志中國少安客人皆還惟寜晏然若將終焉居遼東積三十有七年察淵將亂乃就徴時黄初四年也讀後漢書黨錮紛紛果是非當時高士見精微可憐竇武陳蕃軰欲與天争漢鼎歸後漢申屠蟠傳先是京師㳺士汝南范滂等非訐朝政自公卿以下皆折節下之太學生争慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲前驅卒有坑儒焚書之禍今之謂矣乃絶迹於梁碭之間居二年滂等果罹黨錮或死或刑者數百人蟠確然免於疑論太史公云天方令秦兼天下魏雖得阿衡之佐曷益乎亦此意漢自桓靈以來閹人用事天下嫉之陳蕃與竇太后父竇武同心輔政蕃自以既從人望而有徳於太后必謂其志可伸乃露章乞誅中官太后不納事泄曹節等矯詔誅蕃武等范曄謂其智不足而權有餘功雖不就然其信義足以携持民心漢世亂而不亾百餘年間數公之力也斯言信哉杜牧之詩黨錮豈能留漢鼎清談空解識胡兒詩實採此意讀蜀志千載紛爭共一毛可憐身世兩徒勞無人語與劉𤣥徳問舍求田意最高亦蠻觸之義魏志張邈傳蜀主謂許汜曰今天下大亂望君憂國忘家有救世之意而君求田問舍言无可採公此詩於理似未安興復之義天意人心之所同不可以紛争言也讀唐書志士無時亦少成中才隨世就功名晁錯傳故各當其世而立功徳焉司馬遷序傳扶義俶儻不令已失時立功名於天下作七十列傳并汾諸子何為者坐與文皇立太平諸子謂房魏輩皆王通門人通講道扵河汾之上房魏嘗北面後佐太宗定天下讀開成事姦㒺紛紛不為明有心天下共無成空令執筆螭頭者日記君臣口舌争言文宗優柔不斷知姦而不能去知善而不能任雖有求治之意均於旡成而巳日記君臣口舌争者與鄭覃陳夷行輩論說皆是杜詩金爐香動螭頭暗唐百官志門下省起居郎二人從六品上掌錄天子起居法度天子御正殿則郎居左舍人居右有命俯陛以聽退而書之季終以授史官貞觀初以給諫兼知起居注或知起居事毎仗下議事郎一人執筆記録于前史官随之其後復置舍人分侍左右秉筆随宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即㘭處時號螭頭及許敬宗李義府為相奏請多畏人知命郎舍人對仗承㫖仗下與百官偕出開元初復詔修史官非供奉者皆随仗入位於郎舍人之次李林甫專權又廢太和九年詔入閣日郎舍人具紙筆立螭頭下復貞觀故事太和文宗初元之號次年即改為開成云寄和甫和甫調池掾未赴唐公介為并州辟為總管司管勾機宜文字詩言并州九月寒當是在幕府時水村悲喜坼書看杜牧詩此信的應中路得亂山何處坼書看聞道并州九月寒韓偓詩戍旂青草接榆闗雨裏并州四月寒憶得此時花更好舉家憐汝不同盤王摩詰九日憶山東兄弟詩遥知兄弟登高處遍挿茱萸少一人公詩即此意别和父赴南徐都城落日馬蕭蕭雨壓春風暗栁條盧綸詩垂楊不動雨紛紛錦帳胡缾争送軍垂楊不動即雨壓春風之意天際歸艎那可望只將心寄海門潮謝朓牋雅侍清江可望候歸艎於春渚寄茶與和甫和甫紹聖二年以資殿自雍移并介父亡久矣此詩所寄亦其在幕府時綵絳縫囊海上舟月團蒼潤紫煙浮貢茶自閩來京師故云海上舟歐公云景祐以後雙井漸盛囊以紅紗然不過一二兩以常茶十數斤養之用避暑濕之氣逺出日注上此言草茶非今賜茶也盧仝茶歌手閱月團三百片坡詩獨携天上小團月集英殿裏春風晚分到并門想麥秋月令孟夏麥秋至寄茶與平父碧月團團墮九天封題寄與洛中仙碧或作壁義尤長楊嗣復謝人寄新茶詩石上生芽二月中䝉山顧渚莫争雄封題寄與楊司馬應為前銜是相公石城試水宜頻啜金谷看花莫漫煎石城言石頭城下水在建康事見上注對花啜茶見戲蒋頴叔注戲長安嶺石附巘憑崖豈易躋無心應合與雲齊横身勢欲填滄海肯為行人惜馬蹄隋人虞茂石詩徒然抱貞介填海意誰知精衛以石填海言精誠之至張謂詩共許尋雞足誰能惜馬蹄又杜詩平生為幽興未惜馬蹄遥代荅破車傷馬亦天成所託雖高豈自營四海不無容足地行人何事此中行李白詩馬足蹶側石車輪摧高岡公詩旨亦如張忠定自賛􅆾則違衆崖不利物云此詩殆亦自况可見公之自與素高不䘏浮言之意促織金屏翠幔與秋宜得此年年醉不知韓詩雲窗霧閣事恍惚重重翠幔深金屛古詩長安醉眠客豈知秋鴈來即此意秖向貧家促機杼㡬家能有一鈎絲唐張喬詩念爾無機自有情迎寒辛苦弄梭聲椒房金屋何曽識偏向貧家壁下鳴王建詩草蟲促促機下啼兩日催成一匹半臘享明星惨澹月參差萬竅含風各自悲李義山詩芭蕉不展丁香結同向春風各自愁人散廟門燈火盡却尋殘夢獨多時曹松詩望山吟過日伴鶴立多時又崔櫓詩向人如訴雨多時王荆公詩注卷四十六
