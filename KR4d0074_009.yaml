body:
  text: 王荆公詩注卷九宋李壁撰古詩和王微之登髙齋二首按胡公宿集康定辛巳為葉公清臣作髙齋記云南唐李氏因城作臺望月下臨濬濠正靣覆舟山南對長平西望冶城立齋其上而絶境難摸了不可得今採謝宣城宴坐之意直題曰髙齋云寒雲沈屯白日埋河漢蕩坼天如篩衡門兼旬限泥潦卧聽窽木鳴相挨莊子大木百圍之窽穴蕭晨忽掃纎翳盡蕭晨秋晨蕭索也北嶺初出青崔嵬微之新詩動我目爛若火齊金盤堆韓詩磊落火齊金盤堆想擕諸彥眺平野髙論歷詆秦以來􅘑船淋浪始快意忽憶歸雲恐是去字胡為哉念君少壯輟遊衍發揮春秋名玉杯董仲舒傳説春秋事得失玉杯繁露清明竹林之屬數十篇顔師古注皆其所注書名今繁露中有玉杯竹林二篇繁露之名按逸周書王會解天子南靣立絻紞繁露注云繁露冕之所垂也有聨貫之象春秋屬辭比事仲舒立名或取諸此然玉杯之名亦必有此義也書成不得斷國論谷永薦薛宣經術大雅足以謀王體斷國論但比一作此空語傳八垓登臨興罷因感觸更欲逺引追宗雷東林蓮社十八人中宗炳雷次宗君知富貴亦何有諂譽未足償譏排風豪雨橫費調燮坐使髮背為黃台留賔往往夜參半雖有樽俎無由開江南佳麗非一日況乃故國名池臺能招過客飲文字山水又足供歡咍剩留官屋貯酒母説文酴酒母也廣記女仙傳有酒母事然非此取醉不竭當如淮左傳有酒如淮其二干戈六代戰血埋雙闕尚指山崔嵬梁書何胤曰世傳晉室欲立雙闕王丞相指牛頭山云此天闕也是則未明立闕之意闕者謂之象魏縣治象於其上挾日而收之象者法也魏者當塗而髙大貌當時君臣但兒戲把酒空勸長星杯晉武帝云長星勸爾一杯酒臨春美女閉黃壤陳後主至德二年於光昭殿前為三閣後主自居臨春閣張麗華居結綺閣龔孔二貴妃居望仙閣此言臨春美女統之於主公玉枝白蘂繁如堆後庭新聲變樵牧後主每引狎客江總等同後宫遊宴賦詩相贈答采其尤艷麗者被以新聲習而歌之如玉樹後庭花等大抵皆美張孔之姿色興廢倐忽何其哀咸陽龍移九州坼謂唐末造朱全忠迫遷昭宗於雒陽遺種變化呼風雷唐主李忭欲祖吳王恪或曰恪誅死不若祖鄭王元懿唐主命有司考三王苖裔以吳王孫禕有功禕子峴為宰相遂祖吳王吳越史又言李忭本徐氏湖州安吉人為安吉令先是其家有梨樹結一實大如升其父異之將獻郡守有謂其父曰此果非常年所有即上獻來年是徴安知復有此物不如勿獻其父然之因會鄰里將共食即席割之有赤蛇在實中割者大驚投刃於地俄而赤蛇走其母榻下尋之了無所見未幾其母遂孕知誥疑公所謂遺種者或指赤蛇也又據九國志天祐中金陵有狂僧每在衢路中自言求飛龍天子及忭來為刺史僧乃不復言又童謡云東海鯉魚飛上天蓋忭養於徐氏之應蕭條中原碭無水莊子庚桑楚篇吞舟之魚碭而失水碭簿也崛強又欲慿江淮廣陵衣冠掃地去唐王初欲都江都以水淺漕運不給復還金陵史稱李升始相偽吳居廣陵大和元年出鎮金陵後遂僣竊以揚州為東都穿鑿一作築隴畝為池臺吳儂傾家助經始尺土不借秦人篩篩音師又山皆反賈山傳篩土築阿房之官師古曰篩以竹篩為之珠犀磊落萬艘入金璧照曜千門開建隆天飛跨兩海南發交廣東溫台中間嶪嶪地無幾欲久割據誠難哉方曹彬伐江南太祖謂曰但只要他歸服謹勿殺是他無罪過自是自家著他不得卿切會取曹曰謹奉詔旨不敢違越丁晉公曰今國家享無疆之休良由是耳靈旗指麾盡貔虎談笑力可南山排樓船蔽川莫敢動扶伏但有謀臣來開寶八年煜命盧絳引所部舟師救京口而劉澄巳降始遣周維簡徐鉉越闕乞緩兵鉉自以江南謀臣欲以口舌馳説存其國既至升殿詞纍數百上曰爾謂父子為兩家可乎百年滄洲自潮汐事往不與波爭回黃雲荒城失苑路白草廢畤空壇垓史記三垓注垓重也三重壇也使君新篇韻險絶登眺感悼隨嘲咍嗟豫愁憊氣已竭對壘每欲相劘挨揮毫更想能一戰數窘乃見詩人才和微之登髙齋六朝人物隨煙埃金輿玉几安在哉鍾山石城巳寂寞秪見江水雲端來百年故老有存者尚憶世宗初伐淮周顯德二年十一月世宗始命李榖王彥超督韓令坤十二將伐唐為浮梁自正陽濟淮三年春下詔親征魏王兵馬接踵出據符彥卿在周世宗時巳封魏王然按傳止是立功北方不曽遣征江南又世宗七子其一為恭帝餘六人曰吳王誠韓王諴曹王熙讓紀王熙謹蘄王熙誨越王誼皆幼且無封魏王者旗纛千里相搪挨當時謀臣非不衆上國拔取多陪臺昭七年是無陪臺也龍飛九天跨四海一水欲阻真堪一作為可咍周世宗謂鍾謨曰朕止隔一水未嘗遣一介修好降王北歸樓殿拆棄屋尚鎖黃一作殘金臺李煜平後賈黃中知升州案行府廨見一室扃鐍甚固命發鑰視之得金寶數十簣價值數萬萬乃李氏宫閣中遺物未著於籍者即表上之上曰非黃中廉恪則亡國之寶幾汚法而害人矣賜錢二十萬所言殘金必指此神靈變化自真主將帥何力求公台始曹彬伐江南上許以使相為賞及還語彬曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶更為我取太原止賜錢五十萬彬怏怏山川清明草木靜天地不復屯雲雷使君登髙一訪古傷此陳迹聊持杯因留佳客坐披寫醽醁笑語傾如篩盛𢎞之荆州記淥水出豫章康樂縣其間酃烏程鄉有酒官取水為酒極香美與湘東湖酒侔獻之世稱酃淥酒酒酣重惜功業晚老矣萬卷徒兼該攢峯列壑動歸興憂端落筆何崔嵬餘年無歡易感激亦愧莊叟能安排青燈明滅照不寐但把君詩闔且開西清詩話王師弔伐江左城將破或夢丱角女子行空中以巨篩篩物散落如豆著地皆成人問其故曰此當死于難者後見一貴人盛冠服繼墮於地云此徐舍人也既寤聞徐鍇死圍城中王文公兄弟在金陵和王微之晳登髙齋詩押篩字韻平甫云當時徐氏擅筆墨夜圍夢墮空中篩此事竒譎而盤屈就強韻可謂工矣和董伯懿詠裴晉公平淮西將佐題名元和伐蔡何危哉朝廷百口無一諧盜傷中丞偶不死利劒白日投天街度傳度為御史中丞王承宗李師道謀緩蔡師乃伏盜京師刺用事大臣巳害宰相武元衡又擊度刃三進斷鞾刜分勿切背裂中單又傷首度冒氊得不死裹瘡入朝議軍國度傳度病瘡一再旬分衛兵護第存存候踵路詔無須宣政衙即對延英國火一再更檀槐冬取槐檀之火上前慷慨語發涕誓出按撫除睽乖度傳度請身督戰帝獨目度曰果為朕行乎度俯伏流涕曰臣誓不與賊偕存即拜門下侍郎平章事彰義軍節度使淮西宣慰招討處置使入對延英曰主憂臣辱義在必死賊未授首臣無還期帝壯之指麾光顔戰洄曲李訴傳李光顔戰數勝元濟悉鋭卒屯洄曲以抗光顔闞如怒虎摶虺豺訴能捕虜取肝膈護送密乞完形骸李訴傳吳秀琳為訴䇿曰必破賊非李祐無與成功者祐健將也守興橋柵其戰常易官軍訴遣史用誠以壯騎三百伏其旁見羸卒祐果輕出用誠禽以還諸將素苦祐請殺之訴不聽以為客軍中多諌此人不可近將吏雜然不解訴力不能獨完乃持以泣曰天不欲平蔡乎何見奪者衆也乃械而送之朝表言必殺祐無與共誅蔡者詔釋還訴署六院兵馬使箝兵夜半投死地雪濕不敢燃薪秸箝兵猶銜枚之義漢異姓諸王表箝口燒書師古曰箝其口不聼妄言箝兵亦此義韓信傳投之死地然後生切韻秸麻稈音皆字書秸禾藁亦作秸李訴傳元和十一年十月巳卯師夜起祐以突將三千為先鋒李忠義副之訴率中軍三千田進誠以下軍殿會大雨雪天晦􅏮風偃旗裂膚馬皆縮栗士抱戈凍死于道十一二張柴之東陂澤阻奧衆未嘗蹈也皆謂投不測然業巳從訴人人不敢自為計行七十里夜半至懸瓠城雪甚城旁皆鵝鶩池訴令擊之以亂軍聲祐等坎墉先登衆從之黎明雪止訴入駐元濟外宅蔡吏驚曰城陷矣元濟率左右登牙城田進誠兵薄之火南門元濟請罪梯而下檻送京師申光諸屯尚二萬衆皆降訴不戮一人空城堅守一作豎子巳可縛中使尚作兒號一作啼兒哇退之道此尤俊偉當鏤玉版東燔柴欲編詩書播後嗣筆墨雖巧終類俳退之潮州謝表臣於當時之文亦未有過人者至於論述陛下功德與詩書相表裏作為歌詩薦之郊廟紀泰山之封鏤白玉之牒鋪張對天之宏休揚厲無前之偉績編之乎詩書之䇿而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓云云余嘗以淮西碑誠所謂編之詩書之册而無愧類俳之説殆非至公豈公别有説耶唐從天寶運中圯廊廟往往非忠佳諸侯縱橫代割據疆土豈得無離􅏠周禮夏官形方氏正其封疆無有華離之地鄭玄謂華讀為􅏠哨之􅏠􅏠苦哇反謂正之使不􅏠邪離絶耳德宗末年懲戰禍一矢不試塵蒙靫德宗自經朱泚李懷光之變姑息藩鎮太甚每節度使死先遣中使諸軍觀軍心之嚮背者因而立之朝廷不敢一自除授字書鞴靫箭室釋名曰步叉人所帶以箭義其中馬上曰鞬義亦作靫音叉憲皇初起衆未信意欲立掃除昏霾追還清明救薄蝕屢勑主府拘窮蛙退之詩弊蛙拘送主府官帝箸下腹嘗其皤王師傷夷征賦窘千里亦忌毫釐差小夫偷安徒自計長者逺慮或可懷桓桓晉公忠且壯時命適與功名偕樂記事與時並名與功偕樂之器也是非末世主成敗烜赫今古誰譏排賢哉韋純議北赦倉卒兩伐尤難皆韋貫之傳本名純避憲宗諱以字行為中書侍郎誅吳元濟也貫之請釋鎮州専力淮西且言陛下豈不知建中之事乎始於蔡急而魏應之也齊趙同起德宗引天下兵誅之物力殫屈故朱泚乘以為亂此非他速於撲滅也今陛下獨不能少忍俟蔡平而誅鎮耶時帝業巳討鎮不從終之蔡平鎮乃服重華聲明彌萬國服苖干羽舞兩階宣王側身內修政常德立武能平淮昔人經綸初若緩欲棄此道非吾儕千秋事往蹤迹在嶽石欵記如湘崖浯溪碑元結所作中興頌文嚴字麗皆可喜黃埃蔽沒蒼蘚埋當時將佐盡豪傑想此兵禱陪祠齋唐雜史裴晉公赴敵淮西題名華嶽廟之散門大順中户部侍郎司空圗以一絶紀之曰嶽前大隊赴淮西從此中原息戰鼙石闕莫教苔蘚上分明認取晉公碑韋應物石鼓歌今人濡紙脫其文既擊既掃白黑分元和十二年八月丞相奉詔平淮右八日使過淮隂禮于嶽廟訴等八人實備將佐以從君曾西遷為拓本濡麝割蜜親劘揩新篇波瀾特浩蕩把卷熟讀迷津涯褒賢樂善自為美當挂廟壁為詩牌用王微之韻和酬即事書懷秦惜逝者耋秦詩車鄰逝者其耋晉嘉良士休晉詩蟋蟀良士休休古人皆好樂哀此嵗月遒嗟我抱愁毒殘年自羈囚但為得蹄易略例猶蹄者所以在得而忘蹄非復天上鷗雖知林塘美欲往輒回輈名園一散䇿笑語隨觥籌探題繞梅花髙詠接應劉應劉在建安七子之數宿雨洗荒塹寒蛟沈老湫沿洄信畫舸順水曰沿逆水曰洄歸路子城幽冬風不改緑忽見新陽浮歡事去如夢嘉時念難留明發得君句謂將續前遊語我飲倡樂不如詩獻酬倡酬比之賢於醉紅裙者逺矣淮洲奏鍾鼛雅刺德不猶鼓鍾伐鼛淮有三洲憂心且妯淑人君子其德不猶文墨有真趣荒淫何足收來篇若淑女窈窕衆所求兹理儻可詣華簪為君抽和吳仲庶刀筆漫無營圗書紛不御平生擕手人邂逅賞心處名卿卲朱邑揚子淵騫篇或問近世名卿云云朱邑守北海以治行第一入為大司農傳稱邑身為列卿居處節儉性公正不可干以私又雖古之膚使其猶劣諸膚使超嚴助嚴助舉賢良獨擢為中大夫閩越舉兵圍東甌乃遣助以節發兵會稽浮海救東甌後三嵗閩越復興兵擊南越漢兵遂出踰嶺會閩越王弟殺王以降後令助諭意風指於南越南越遣太子隨助入侍助還歸奏上大恱都官富篇章博士熟經據豈特好微言又多知大慮從容故天幸倜儻盡人譽千艘來交荆萬舸去揚豫良無此嘉客式燕吾所庶出鞏縣昭陵落月煙霧昏昭陵仁宗陵也按林希朝陵記自滎陽過洪溝食武牢關憩任村鋪始見洛水入黃河循洛而行過鞏五里入昭陵路即下視昭厚二陵宫闕森然不覺想慕行人指昭陵以相告曰此四十一年官家陵也涕泗潸然篝火度谷行山根投鞭委轡涉數村寤出鞏縣城東門向來宫闕不可見但有洛水流渾渾向來恐謂漢唐時也晏丞相嘗有題鞏縣西門周襄王廟詩云人來人去市朝變山後山前煙霧凝縈帶二川河洛水寂寥千古帝王陵書任村馬鋪兒童繫馬黃河曲近岸河流如可掬任村炊米朝食魚日暮滎陽驛中宿滎陽屬鄭州投老經過身獨在當時洲渚今平陸秫黍冥冥十數家仰視荒蹊但喬木栁詩黃葉覆溪橋荒村惟古木氷盤鱠美客自知起看白水還東馳爾來百口皆年少歸與何人共此悲葛藴作巫山髙愛其飄逸因亦作兩篇巫山髙十二峯上有往來飄忽之猿猱下有出沒瀺灂之蛟龍髙唐賦巨石溺溺之瀺灂兮瀺灂以言水石今用之蛟龍尤宜中有倚薄縹眇之神宫神人處子氷雪容吸風飲露虛無中千嵗寂寞無人逢邂逅乃與襄王通丹崖碧嶂深重重白月如日明房櫳月指珠也杜詩大珠脫玷翳白月當虛空象牀玉几來自從岱宗石室中上下懸絶中有金牀玉几今言來自從者神女擕以俱也錦屏翠縵金芙蓉陽臺美人多楚語爭吹鳳管鳴鼉鼓那知襄王夢時事但見朝朝暮暮長雲雨言楚王細腰纎麗之多不知王又自夢神女雲華夫人傳禹嘗詣之於崇巘之巔顧盼之際化而為石或倐然飛騰散為輕雲油然而止聚為夕雨千態萬狀不可親也禹疑其狡獪怪誕非真仙也問諸童律律曰凝氣成真與道合體隱見變化蓋其常也大包造化細入毫髮在人為人在物為物豈止於雲雨哉據此所稱雲雨蓋事涉道真理該造化後世乃以喻情欲之事其褻瀆甚矣髙唐賦妾在巫山之陽髙丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下其二巫山髙偃薄江水之淹淹水於天下實至險山亦起伏為波濤其巔冥冥不可見崖岸斗絶悲猿猱赤楓青櫟生滿谷山鬼白日樵人遭窈窕陽臺彼神女朝朝暮暮能雲雨以雲為衣月為褚乘光服暗無留阻崑崙曾城道可取方丈蓬萊多伴侣塊獨守此嗟何求况乃低回夢中語廣記神女王母女名瑶姬嘗遊東海還過江上有巫山焉峯巖挺拔林壑幽麗巨石如壇留連久之兼夫人所領雲華玉宫理在玉映之臺崑崙蓬萊蓋不足道今公所云第本宋玉之説楚詞塊獨守此無澤兮仰浮雲而永歎髙唐賦昔者先王嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也為髙唐之客間君遊髙唐願薦枕席王因幸之王建詩美人别來無處所巫山明月湘江雨千回相見不分明井底看星夢中語公此詩體制類歐公廬山髙皆一代之傑作西風少年不知秋喜聞西風生言少年氣盛時不知秋之可悲老大多感傷畏此蟋蟀鳴况乃捨親友抱病獨逺行中夜卧不周惻惻感我情起視天正黑弱雲亂縱橫杜集江雨有懷鄭典設弱雲狼籍不禁風似有霰雪飄不復星斗明時令忽如此重令壯心驚諒無同憂人樽酒安可傾言同志者少無與為樂久雨煤炲著天無寸空玉川子月蝕詩摧環破璧眼前盡當空一搭如煤炲白沫上岸吹魚龍羲和推車出不得河伯欲取山為宫羲和日官河伯姓馮名夷華陽潼鄉人漢武帝為我謂河伯兮何不仁泛濫不正兮愁吾人取山為宫懷山是也城門晝閉眠百賈魯直對酒歌南陽城門雪三日城門晝閉眠賈客疑用公語飢孫得糟夜餔翁歐公有食糟民詩言艱食也老人慣事少所怪看屋箕倨歌南風歌南風欲晴也程伊川云風從東北來則雨自南自西則不雨何者自東自北皆屬陽坎卦本陽陽唱而隂和故雨自西自南隂也隂唱則陽不和故不雨王荆公詩注卷九
