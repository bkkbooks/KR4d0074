body:
  text: 王荆公詩注卷十五宋李壁撰古詩寓言十五首不得君子居而與小人游疵瑕不相摩況乃禍釁稠髙語不敢出鄙辭强顔酬始云避世患自覺日已偷如傅一齊人以萬楚人咻云復學齊言定復不可求仁義多在野欲從苦淹留不悲道難行所悲纍身修其二周公歌七月耕稼乃王術宣王追祖宗考牧與宫室小雅無羊宣王考牧也注厲王之時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數斯干宣王考室也注謂築宫廟羣寢既成而釁之甘棠能聽訟召伯聖人匹後生論常髙於世復何實詩言此三者世以為迂緩不切而不知致治必出於此且傷後生忽近務遠好髙論而卒無其實所以民被其害其三婚喪孰不供貸錢免爾縈耕收孰不給傾粟助之生物嬴我收之物窘出使營後世不務此區區挫兼并余嘗見楊龜山志談績墓云公雅不喜王氏或問其故曰說多而屢變無不易之論也世之為奸者借其一說可以自解伏節死誼之士始鮮矣始余以績言為過今觀此詩不能無疑周禮泉府凡賖者祭祀無過旬日喪紀不過三月凡民之貸者與其有司辨而授之荆公此句乃後日青苗張本也平昔所論如此一旦得位自宜舉而措之當時獨公是先生劉貢父素與公善一書爭之最為切至周禮司市以泉府同貨而斂賖注云同共也謂民貨不售則為斂而買之民無貨則賖貰而豫之孰有婚喪而不能贍者官當貸之孰有耕稼而不能贍者官當助之此公所以為新法公詩嘗云俗儒不知變兼并可無摧而此詩乃復以挫兼并為非其四父母子所養子肥父母充欲富𣙜其子惜哉術之窮揚子為人父而𣙜其子縱利如子何霸者擅一方窘彼足自豐四海皆吾家奈何不知農霸謂各私其國如齊用管仲之類管仲但設輕重魚鹽之利苟一時爾務農重榖乃王政也賈誼云方今之務莫若使民務農而已其五詵詵古之士出必見禮樂羣游與衆飲仁義得揚榷心疲歌舞荒耳聒米鹽濁所以後世賢絶俗乃為學古所謂禮樂者莫非形見於歌舞之際仁義亦不出乎日用飲食之間後世岐而為二荒於歌舞而不識禮樂聒於米鹽而烏知仁義其號為賢者必絶俗而後為學豈知道無精粗之間哉其六小夫謹利害不講義與仁讀書疑夷齊古豈有此人其才一莛芒所欲勢萬鈞求多卒自困餘禍及生民夷齊不食周粟謂其以臣而伐君此所謂求仁也俗薄乃妄意古無此事莛芒公一再用之其七瞢瞢俗所共察察與世違違世有百善一疵惡皆歸就求無所得猶以好名譏彼哉負且乘能使正日微違世特立之士為俗所惡苟有一眚併百善而掩之矣賢者無可指之過小人多以好名疵之其八始就詩賦科雕鐫久才成一朝復弃之刀筆事刑名中材蔽末學斯道苦難名忽貴不自期何施就升平史記申子之學本於黃老而主刑名韓非者喜刑名法術之學言士之學既陋一日為公卿探其中無有也何術而能致升平哉以其本非在上之物故也忽貴不自期如唐鄭五朱朴之類其九貞觀業萬世經營豈非艱其子一搖之宗廟靈幾殫開元始聰明一眚奔岷山功髙後毁易德薄人存難髙宗不君武后專國後改唐為周故言宗社之威靈幾盡明皇始勵精致治晚荒惑播遷於蜀如周家八百以德不以功以功則易隳上德薄則不能庇民易以致亂故云人存難其十明者好自蔽況乃知我匹每行悔其然所見定萬一不求攻爾短欲議世之失耘而舍其田辛苦亦何實謂不自知而欲知它人其十一言失於須臾百世不可除行失几席間惡名滿八區百年養不足一日毁有餘諒彼恥不仁戒哉惟厥初劉璋傳桓公一矜其功叛者九國曹操暫自驕伐天下三分皆勤之於數十年之內而棄之於俯仰之頃豈不惜乎此即詩百年一日之意也其十二鐘鼓非樂本本末猶相因仁聲入人深孟子言之醇如何貞觀君從古同隋陳風俗不粹美惜哉世無臣陽貨篇樂云樂云鐘鼓云乎哉詩意言移風易俗之本猶託器以傳孟子仁聲入人深也禮樂志既欲從古又同隋陳言房魏之徒不足以興禮樂其十三好樂世所共欲禁安能捨孰能開其淫要在習以雅歐人必如巳墨子見何寡惜哉後世音至美不如野其十四遊鯨厭海濁出戲清江湄風濤助翻騰網罟不敢窺失身洲渚間螻蟻乘其機物大苦易窮一窮無所歸李白枯魚過河泣詩作書報鯨鮡勿恃風濤勢濤落歸泥沙翻遭螻蟻噬公詩意同此斷章尤佳其十五猛虎卧草間羣烏從噪之萬物忌强梁寧獨以其私虎終機械得烏亦彈丸隨山雞不忤物默與鳯凰期物情共惡不必緣私憾而始然也烏噪虎者惡其强梁也然烏猶有不平之心若山雞之默則超然與物無忤矣舟中讀書冉冉木葉下蕭蕭山水秋浮雲帶田野落日抱汀洲歸卧無與語出門何所求未能忘感慨聊以古人謀讀進士試卷文章始隋唐進取歸一律安知鴻都事竟用程人物漢靈帝光和元年始置鴻都門學生注鴻都門名也於內置學其中諸生皆勑州郡三公舉召能為尺牘詞賦及工書鳥篆者相課試至於千人焉言鴻都漢末之亂制始以詞賦等取人而隋唐因之不革如進士書判等科是也變今嗟未能於巳空自咄流波亦已漫髙論常見屈故今俶儻士往往棄堙鬱臯陶敘九德固有知人術聖世欲爾為徐觀異人出咄歎也詩意言既未能變俗自爾不免由科舉而進自訟孔子見南子子路為不怡欲從公山氏勃鬱見色辭道如天之蒼萬物不能緇弟子尚不信況余乏才資明知古人仁語默各有時苟出不自慎果為聽者疑白圭尚可磨駟馬猶能追一言成不知雖悔欲何為子貢曰君子一言以為知一言以為不知言不可不慎也借此以明子路之不知聖人彼狂上古杳默無人聲日月不忒山川平人與鳥獸相隨行祖孫一死十百生萬物不給乃相兵言爭起於生育漸衆而不給伏犧畫法作後程漁蟲獵獸寬羣爭勢不得已當經營非以示世為聰明方分類别物有名夸賢尚功列恥榮蠱僞日巧雕元精至言一出衆輒驚上智閉匿不敢成夸賢三語似莊老然詩末又罪諸子之著書者所稱至言何所指乎因時就俗救刖黥惜哉彼狂以文鳴强取色樂要聾盲詩意言不能反刓以朴剗僞以真惟隨時救之而巳刖黥屢見别注老子五色令人目盲五音令人耳聾震蕩沉濁終無清恢詭徒亂聖人氓豈若泯默死蠶耕恢詭謂異端皆有絶人之才能持其說以惑人心曾不若泯然與衆出作入息而死於蠶耕之為愈也寄題郢州白雪樓折楊黃華笑者多陽春白雪和者少知音四海無幾人況乃區區郢中小莊子聞折楊黃華則嗑然而笑之楚詞黃作皇宋玉對問曰客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者不過數十人是其曲彌髙而和彌寡也千載相傳始欲慕一時獨唱誰能曉古心以此分冥𡨕俚耳至今徒擾擾朱樓碧瓦何年有榱桷連空欲驚矯郢人爛漫醉浮雲郢女參差躡飛鳥丘墟餘響難再得欄檻兹名復誰表我來欲歌聲更吞石城寒江暮空繞郢邉漢江上即石城也莫愁所生處聖俞為狄梁公孫作詩要豫同作虎豹不食子鴟梟不乘雄人惡甚鳥獸吾能與成功傳燈録云惡虎不食子莊子天運篇虎狼仁也曰何謂也曰父子相親何為不仁上句指中宗下句指髙宗兩句皆指武后言其殺子乘夫也愛有以計留去有勢不容計留恐指相王去謂廬陵王吾謀適合意幾亦齒奸鋒梁公曾被來俊臣羅織下獄幾死後置帛書於禇衣中傳至其家其子光遠上變則天召見得免死武承嗣霍獻可皆請誅之后不從貶彭澤令又后嘗欲以武三思為太子仁傑曰姑姪與母子孰親陛下立廬陵王則常饗宗廟三思立廟不祔姑后感悟即日迎中宗於房州時恩淪九泉褒取異代忠堂堂社稷臣近世孰如公空使苖裔孫稱揚得詩翁謂聖俞一讀亦使我慨然想餘風蒙亭取易䝉卦義隱者安所逢在物無不足山林與城市語道歸一轂安一作委體道者喧靜兩遺何必偏於隱哉蓋遠迹林藪者恐見紛華而動耳孰知至人遺物耳目不能為之纍老子三十幅共一轂詩人論巨細此指尚局束頗知區區者自屏忍所欲孰識古之人超然遺耳目豈於喧與靜趣舍有偏獨命亭今何為似乃畏驚俗至意不標揭閣名聊自屬夏風簷楹寒冬雪窗户燠春樊亂梅栁樊籓也秋徑深松菊壺觴日笑傲裙屐相追逐此樂已難言持琴作新曲後魏邢巒謂梁蕭深藻是裾屐少年和王樂道烘蝨秋暑汗流如炙輠史記荀卿傳炙轂過髠劉向别録云過字作輠輠者車之盛膏器也炙之雖盡猶有餘流言淳于髠智不盡如炙輠也敝衣濕蒸塵垢涴施施衆蝨當此時澤肉甘於虎狼餓咀嚙侵膚未云巳爬搔次骨終無那栁文每一爬搔塵垢滿爪嵇叔夜與山巨源書性復多蝨爬搔無巳杜周傳內深次骨李竒注曰其用法深刻至骨也時時對客輒自捫王猛捫蝨而談世事十百所除才幾箇皮毛得氣强復活爪甲流丹真暫破未能湯沐取一空淮南子云湯沐具而蟣蝨相弔大厦成而燕雀相賀且以火攻令少挫虞翻為蚤蝨所咋悉以赴火周顗傳曰阿奴火攻固出下策踞爐熾炭巳不暇對竈張衣誠未過飄零乍若蛾赴燈驚擾端如蟻旋磨欲毆百惡死焦灼肯貸一凶生棄播巳觀細黠無所容未放老奸終不墮然臍郿塢患溢世董卓築塢於郿號曰萬嵗塢卓既誅乃尸卓於市天時始熱卓素充肥脂流於地守尸然火置卓臍中光明逹曙如是積日焚寶鹿臺身易貨史記殷紀紂兵敗紂走入鹿臺衣其寶玉衣赴火而死冡中燎入化秦尸劉向封事秦始皇葬於驪山之阿下錮三泉上崇山墳其後牧兒亡羊羊入其鑿牧者照火求羊遺火焚其藏槨池上焮隨遷莽坐昭公十八年子産使司馬司冦行火所焮注焮炙也漢兵攻莽火及掖庭承明莽避火宣室前殿火輒隨之天文郎按拭於前莽旋席隨斗柄而坐又就車之漸臺欲阻池水猶抱持符命威斗拭占時日之書彼皆勢極就煙埃況汝命輕侔涕唾逃藏敗絮尚欲索阮籍傳獨不見羣蝨之處褌中乎逃乎深縫匿乎壞絮自以為吉宅也埋沒死灰誰復課熏心得禍爾莫悔爛額收功吾可賀爛額見澶州注猶殘衆蟣恨未除自計寧能久安卧抱朴子蚤蝨羣攻卧不獲安和農具詩十五首田廬田父結田廬聊容一身息呼兒取茅竹不借鄉人力起行廬旁朝歸卧廬下夕悠悠各有願勿笑田廬窄即今覷榖寮也僅可容身而宿轉移無常所小雅信南山中田有廬箋云中田田中也梅宛陵集亦有農具詩十五首蠶具詩十五首題與公所賦同但韻不同耳梅云和孫端叟意必同時作揚扇精良止如留疏惡去如擯如擯非爾憎如留豈吾吝無心以擇物誰喜亦誰愠翁乎勤簸揚可使糠粃盡此如朝廷之賞罰黜陟因其功罪賢否而施之初非出於好惡喜愠之私耳孫綽嘗與習鑿齒同行綽在前鑿齒曰簸之揚之糠粃在前樓種富家種論石貧家種論斗富貧同一時傾瀉應心手行看萬壟空坐使千箱有利物博如此何慙在牛後樵斧百金聚一冶所賦以所遭此豈異鏌鎁奈何獨當樵朝出在人手暮歸在人腰用捨各有時此心兩無邀耒耜耒耜見於易聖人取風雷不有仁智兼利端誰與開神農后稷死般爾相尋來山林盡百巧揉斫無良材詩意言農稷致天下之大利若般爾則異此矣幾於導淫侈之原也易繫辭神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益象曰風雷益錢鎛錢子踐切錢銚古田器也鎛耨耘田也於易見耒耜於詩聞錢鎛百工聖人為此最功不薄欲收禾黍善先去蒿萊惡願因觀器悟更使臣工作考工記百工之事皆聖人之作也耰鋤煆金以為曲揉木以為直直曲相後先心手始兩得莊子天道篇輪扁曰不徐不疾得之於手應之於心秦人望屋食以此當金革君勿易耰鉏耰鉏勝鋒鏑漢吾丘夀王傳民以耰鉏箠梃相撻擊犯法滋衆過秦論曰陳涉以戍卒不用弓㦸之兵鉏耰白梃望屋而食橫行天下鉏耰棘矜不敵於鉤㦸長鎩言陳勝起時但持此攻戰收天下之兵聚之咸陽銷鋒匙注匙與鏑同即箭鏃二注皆過秦論襏襫蓑薜也采采霜露下披披煙雨中茅蒲以為友短褐相與同勿妬市門人綺紈被奴僮當慙邊城戍擐甲徂春冬齊語時雨既至挾槍刈耨鎛以從事於田野脫衣就功首戴茅蒲身衣襏襫霑體塗足暴其髮膚盡其四支之敏以從事田野茅蒲簦笠也史記刺繡紋不如倚市門左傳文公躬擐甲胄臺笠耕有春雨濡耘有秋陽暴二物應時須九州同我服孰為生少慕得此自云足君思周伯陽所願豈華轂詩彼都人士臺笠緇撮鄭氏曰臺夫須也以臺皮為笠陸璣草木疏云舊說夫須莎草也可以為蓑笠孔氏曰笠可禦雨因可以禦暑史記老子字伯陽本傳云君子得其時則駕不得其時則蓬纍而行又素隱謂蓬纍笠也耕牛朝耕草茫茫暮耕水潏潏朝耕及露下暮耕連月出身無一毛利主有千箱實皖彼天上星空名豈余匹司馬相如上林賦潏潏淈淈潏音決詩小雅大東皖彼牽牛不以服箱水車取車當要津膏潤及遠野與天常斡旋如雨自潨㵼置心亦何有在物偶相假此理乃可言安得圓機者天文志天體左旋圓機謂車形圓也漢隂老人抱甕而灌子貢曰鑿木為機後重前輕挈水若抽其名桔橰老人曰聞有機事必有機心吾非不知羞不為也公詩意取子貢而與老人異文中子曰安得圓機之士與之共論九流哉田漏東坡遠景樓記四月初吉榖稚而草壯耘者畢出立表下漏鳴鼓以致衆擇其徒為衆所畏信者二人一人掌鼓一人掌漏進退作止惟二人之聽七月既望榖艾而草衰則仆鼓決漏買羊豕酒醴以祀田祖觀此詩則田之有漏江西蜀中皆然占星昏曉中寒暑已不疑田家更置漏寸晷亦欲知占星昏曉中事見月令汗與水俱滴身隨隂屢移誰當哀此勞往往奪其時唐李紳詩藝禾日當午汗滴禾下土誰知盤中餐粒粒皆辛苦耘鼓逢逢戲場聲壤壤戰時伍日落未云休田家亦良苦問兒今隴上聽此何莽鹵昨日應官繇州前看歌舞莊子曰豫昔為禾耕而鹵莽之則實亦鹵莽而報豫東坡詩嬴得兒童語音好一年强半在城中蓋病新法之擾也今觀公應官繇之語豈知後人乃亦以此譏公乎牧笛緑草無端倪牛羊在平地莊子不知端倪芊綿杳靄間落日一橫吹橫吹軍中之樂此特指笛耳超遙送逸響誕漫寫真意豈比賣餳人吹簫販童稚詩簫管備舉注簫編小竹管今賣餳者所吹牛衣百獸冬自暖獨牛非氄毛無衣與卒嵗坐恐得空牢主人覆護恩豈啻一綈袍問爾何以報離離滿東臯牛衣詳見律舒王章注莊子逹生篇祝宗人𤣥端以臨牢策坐恐得空牢慮牛寒而仆也范雎傳雎微行弊衣以見須賈賈意哀之曰范叔一寒如此哉因取一綈袍以賜之王荆公詩注卷十五
