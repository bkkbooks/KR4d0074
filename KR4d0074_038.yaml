body:
  text: 王荆公詩注卷三十八宋李壁撰律詩鍾山西菴白蓮亭白蓮見上注亭今廢山亭新破一方苔白帝留花滿四隈野艷輕明非傅粉秋光清淺不憑杯小杜詩鑿破青苔地鄭壁白菊詩白艷輕明帶露痕傅粉何晏事諸本杯作材全無義理退之詩曲江汀瑩水平杯憑只是平字鄉窮自作幽人伴嵗晚誰為靜女媒弼詩靜女其姝靜真也可笑逺公池上客却因松菊賦歸來逺公有白蓮池客指陶公謂不應棄白蓮而思松菊贈長寧僧首秀骨厖眉倦往還自然清譽落人間間中用意歸詩筆靜外安身比太山欲倩野雲朝送客更邀江月夜臨關杜詩不夜月臨關嗟豫蹤迹飄塵土一對孤峯幾厚顔次韻舍弟賞心亭即事二首建康志賞心亭在下水門之城上下臨秦淮盡觀覽之勝丁晉公建嘗以家藏周昉畫卧雪圖張於其屏後太守輒易去故王琪密學有昔人巳化遼天鶴舊畫難存卧雪圖之句檻折簷傾野水傍臺城佳氣巳消亡佳氣用舂陵事猶言王氣陳後主言王氣在此難披榛莽尋千古獨倚青冥望八荒白詩眇默思千古蒼茫想八區杜詩倚劍望八荒坐覺塵沙昏逺眼忽看風雨破驕陽扁舟此日東南興欲盡江流萬里長太白詩請君試問東流水别意與之誰短長其二霸氣消磨不復存杜詩霸氣西南歇舊朝臺殿秪空村孤城倚薄青天近細雨侵凌白日昏稍覺野雲乘晚霽却疑山月是朝暾此時江海無窮興醒客忘言醉客喧陶詩此中有真趣欲辨巳忘言次韻陳繹學士小園即事牆屋雖無好鳥鳴池塘亦未有蛙聲樹含宿雨紅初入草倚朝陽緑更生萬物天機何得喪百年心事不將迎莊子應帝王篇至人之用心若鏡不將不迎應而不藏與君杖策聊觀化搔首東風眼尚明繹時為金陵嘗過公第又公同年故厚之也東坡西齋詩杖藜觀物化亦以觀我生寄友人飄然羇旅尚無涯一望西南百歎嗟江擁涕洟流入海風吹魂夢去還家元微之寄樂天相憶淚詩除非入海無由往縱使逢灘未便休平生積慘應銷骨今日殊鄉又見花安得此身如草樹根株相守盡年華劉琨詩序排終身之積慘求數刻之暫歡中山靖王勝傳衆口鑠金積毁銷骨登大茅山頂建康志茅山初名勾曲山像其形也茅君得道更名茅山在縣東南四十五里周回一百五十里三十六洞天第八曰金壇華陽之天即此山也山記云漢時有三茅君來居山上故因名大茅中茅小茅三峰舊記云在崇禧觀北獨髙處一峰髙出衆山顛疑隔塵沙道里千貨殖傳牛角蹄千僮手指千即此法俯視雲煙來不極仰攀蘿蔦去無前人間巳換嘉平帝地下誰通勾曲天陳迹是非今草莽紛紛流俗尚師仙始皇二十七年自會稽還埋白璧此山又登勾曲山北垂歎曰巡狩之樂莫過於山海自今以往良為常也乃改勾容北垂為良常山三十一年十二月更名臘曰嘉平注云太原真人芽盈內紀曰始皇三十一年九月庚子盈曾祖父濛乃於華山之中乘雲駕龍白日升天先下是其邑謡歌曰神仙得者茅初成駕龍上升入太清時玄圃戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謡歌而問其故父老具對此仙人之謡歌勸帝求長生之術於是始皇欣然而有尋仙之志因改臘曰嘉平風俗通云按禮傳夏曰嘉平殷曰清祀周曰大蠟秦漢曰臘至始皇更名臘曰嘉平然則嘉平乃夏之舊非始於秦也茅君內傳勾曲秦時為華陽之天三茅君居之因以為名外有金壇山因壇為號周時名其源澤為勾曲之穴按山形曲折後人名焉真誥云金陵句容之勾曲為第八洞天又曰勾曲地肺土良水清謂之華陽洞天可以度世許邁别傳曰金陵之茅山是洞庭西門潛通五嶽陶先生記云東通王屋西逹峨眉南接羅浮北連岱澤內傳既稱源澤又為穴故詩亦云地下也真誥大茅君盈南治勾曲之山又王母諸仙行詣天治霍山過勾曲之金壇宴大無真人茅叔申於華陽洞天茅君名盈二弟茅固茅衷真誥又稱漢宣帝時得道李白詩靈迹成蔓草徒悲千載魂揚子聖人不師仙厥術異也登中茅山建康志中茅山在積金山北其側有泉赤而有味真誥云飲之延年山下之人盡皆眉夀而寡疾山下舊有石案石香爐存焉翛然杖屨出塵囂雞犬無聲到泬寥欲見五芝莖葉老尚攀三鶴羽翰遙宋玉泬寥兮天髙而氣清天台山賦五芝含笑而晨敷又茅君傳金闕帝君遣使者賜盈以四節燕胎流明神芝且告盈曰食四節隱芝者位為真卿食金闕玉芝者位為司命食流明金英者位為司祿食長曜雙飛者位為真伯食夜光洞革者總主左右御史之任今子盡食之矣茅君內傳茅盈留勾曲山告二弟曰吾去有局任不復得相往來父老歌曰茅山連金陵江湖據下流三神乘白鶴各在一山頭佳雨灌旱稻使我無百憂白鶴翔金穴何時復來遊又陶先生茅山記漢元帝時茅盈茅固茅衷並在此山得道三人嘗乘白鶴各據一嶺容溪路轉迷橫彴仙几風來得墮樵興罷日斜歸亦懶更磨碑蘚認前朝九域志句容縣有茅山容溪建康志云仙几山在句容縣東南四十里茅山之側周回三里一百步髙八尺連仙姑山恐别一山非中峰之名又案志云上容溪水元出中茅過蘆江橋經赤山湖入秦淮盧同詩松顚有樵墮石上無禾生賈島詩古木落薪乾橫彴即略彴今獨木橋也杜牧詩自將磨蘚認前朝登小茅峰建康志小茅山在中茅山背新室地皇三年七月遣使者賫黃金百鎰後漢光武建武七年三月遣使者賫黃金五十斤獻於三君並埋在小茅山上獨髙處捫蘿路到半天窮下視淮洲杳靄中物外真遊來几席人間榮願付苓通次聨言山髙去天近易與仙接也馬矢為通豬矢為苓本草有白馬通狶苓即豬苓也莊子豕槖藥也司馬彪注豕槖一名苓根似豕脂治渴又本草脂苓一名猳脂矢詩言既登絶境視世之浮榮如糞土也小説山谷云賈天錫宣事作香甚有貴氣嘗以見惠張仲謀以騏驥院馬通薪二百見貺因以香二十餅答之或曰公以詩易香而以香易此何耶公曰詩或能作祟不若此薪可與鈐下為挾纊之溫耳白雲生處龍池杳明月歸時鶴馭空回首三君誰更似子房家世有髙風建康志雷平山有玉晨觀舊傳髙辛時展上公及周時郭真人故宅觀前有郭真人養龍池又楊真人三許真人嘗降於此三君指三茅君也子房漢張良也送張仲容赴杭州孫公辟孫公孫沔也萬屋相誇漆與丹笑歌長在綺紈間綵船春戲坊邊水畫燭秋尋寺外山笑歌言杭俗之侈李白詩朝尋霞外寺暮宿池上島憶我屢隨遊客入喜君今赴辟書還遙知曼倩威行久赤筆應從到日間辟書見送西京簽判王著作注雋不疑為京兆尹吏民敬其威信每行縣録囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為之飲食言語異於他時或亡所出母怒為不食故不疑為吏嚴而不殘漢制尚書郎主作文書起草月賜赤管大筆一雙又會稽典録盛吉為廷尉每冬月至斷囚持丹筆垂泣則皆丹彤其管以别常用之筆白詩勤操丹筆念黃沙莫使飢寒囚滯獄赤筆即丹筆言孫公威行民自無敢犯也贈李士寧道人士寧蜀之蓬州人也季主逡巡居卜肆彌明邂逅作詩翁曾令宋賈歎車上更使劉侯驚坐中史記日者傳司馬季主楚人也卜於長安東市禇先生曰季主者楚賢大夫也軒轅彌明唐人衡山道士也見韓退之石鼎聨句序季主彌明皆以比士寧蓬山仙傳稱士寧目不知書善吟詩不學隂陽能推休咎季主傳宋忠賈誼同輿之市遊於卜肆聞季主之辭忽然自失出市門僅能自上車居三日二人於殿門外相引屏語歎曰道髙益安勢髙益危歎乃在殿門外亦可言車上彌明石鼎聨句劉侯謂侯喜劉師服邂逅者謂喜視之若無人又不知其有文而語出輒竒二子始慚駭也韓序云二子驚駭若有失者杳杳人傳多異事冥冥誰識此髙風行歌過我非無謂惟恨貧家酒盞空士寧先得塗氏所藏軒轅小鏡洞見逺近蔡君謨學士以道自任聞先生之名望風惡之君謨一夕夢為虎所逼有一人救之虎既去與之坐曰公貴人也但頭骨不正乃以手為按之曰頭骨巳正矣夢覺頭尚痛翌日先生謁君謨謂曰夜夢頗驚惶否君謨愕然視其狀乃夢中逐虎正骨者遂異之後出守閩中先生經由竭君謨君謨因告先生久患目疾不愈昨夜夢龍樹菩薩先生即於袖中出畫本視之一如夢中所見先生於是瞪目視君謨須臾兩目豁然明快參政張公方平兩制時先生出入門下極相善時論以為公且大拜先生以詩别公其落句云異時復與公相見正是江南二月天其後久無爰立耗忽除知江寧先生自茅山來謁即仲春也誰識此髙風言至人難識也歐陽文忠公嘗有歌贈先生曰蜀狂士寧者不邪亦不正混世使人疑詭譎非一行平生不把筆對酒時歌詠初如不著意語出多竒徑傾財解人難去不道名姓金錢買酒醉髙樓明月滿床猶不醒一身四海即為家獨行萬里聊乘興既不採藥買城市又不點石化黃金進不干公卿退不隱山林與之遊者但愛其人而莫識其術安知其心吾聞有道之士逍遙太虛動與道俱故能入火不熱入水不濡常聞其語而未見其人豈斯人之徒歟不然則言不純師行不純表滑稽傲世其東方朔之流乎次韻春日即事人間尚有薄寒侵和氣先薰草樹心丹白自分齊破蕾青黃相向欲交隂杜甫北征詩或紅如丹砂或黑如點漆雨露之所濡甘苦齊結實潺潺嫩水生幽谷漠漠輕煙動逺林病得一官隨太守班春無助愧周任後漢崔駰強起班春注郡國嘗以春行縣勸人農桑振救乏絶班布春令也語季氏周任有言曰陳力就列不能者止馬融注曰周任古之良史也任音壬次韻答陳正叔二首青衫憔悴北歸來髮有霜根面有埃羣吠我方驚猘子一鳴誰更識龍媒霜根謂髮白也楚辭邑犬羣吠吠所怪也魏志猘兒難與爭鋒韓集惟東有猘惟西有虺猘居例切狂犬也龍媒馬也功名落落難求值日月沄沄去不回勝事與身何等近酒尊詩卷數須開功名謂不可求而致也邂逅為之所謂功業見乎變其二田宅荒涼去復來詩書顔髮兩塵埃忘機自許鷗相狎得禍誰期鶴見媒列子海上之人每旦從漚鳥遊詳見别注唐殷敬順釋文曰漚音鷗水梟也今江湖畔形色似白鴿而羣飛陸龜蒙集有鶴媒歌屈平離騷云吾令鴆為媒兮鴆告豫以不好栁子厚鷓鴣詞徇媒得養不復慮機械潛起罹罝罦觀此不獨鶴有媒也此道未行身有待古人不見首空回何當水石他年住更把韋編靜處開儒行篇愛其死以有待也養其身以有為也南史張融常歎曰不恨我不見古人所恨古人不見我孔子世家讀易韋編三絶曰假我數年若是我於易則彬彬矣送崔左藏之廣東怪石巉巉上泬寥昔人於此奏簫韶韶石見貴州使君訪及道舊注水清但見嘉魚出風暖何曾毒草搖何曾毒草搖言廣東非舊日瘴癘之比今日淹留君按節當時嬉戲我垂髫因尋舊政詢遺老為作新詩變俚謡子虛賦案節未舒師古曰言未盡意驅馳也公嘗從楚公守韶州年尚幼故云垂髫末句暗用劉禹錫事苦雨靈場奔走尚無功去馬來車道不通風助亂雲隂更密水爭髙岸氣尤雄禱晴無應揚子靈場之威其夜矣乎水逢髙岸而激射狀如爭也平時溝洫今多廢下户京囷久巳空肉食自嗟何所報古人憂國願年豐觀溝洫多廢之句乃後來興水利張本然公意亦豈不在民詩甫田如京如坻莊公十年肉食者鄙未能逺謀江上村落家家有濁醪青旗招客解袛裯春風似補林塘破野水遙連草樹髙後漢羊續傳其資藏惟有布衾敝祗裯麥數斛而巳注云説文曰祗裯短衣也廣雅云即襜褕也祗丁奚反裯丁勞反三代世表旗亭市樓也立旗於此故以取名宋之問詩林缺見嵩丘浮雲補斷山杜詩聞道洪河坼遙連滄海髙寄食舟車隨處弊行歌天地此身勞遲回自負平生意豈是明時惜一毛公意謂身自不能逺引以遂宿心非朝廷之有惜也一毛言九牛之一毛午枕此詩必訪一處弔古而有作題乃云午枕未詳百年春夢去悠悠不復吹簫向此留野草自花還自落鳴鳩相乳亦相酬公絶句又有野草自花還自落落時還有惜花人之句舊蹊埋沒開新徑朱户欹斜見畫樓欲把一杯無伴侣眼看興廢使人愁寄石鼓陳伯庸寰宇記明州郡國志云靈山有石鼓臨澗若鳴則野雉翔撫州臨川縣亦有石鼓但四明却有天門山耳天門山在明州鯨海無風白日間天門當面險難攀塵埃掉臂離長陌琴酒和雲入舊山黃庭經入山何難顧躊躇人間紛紛臭如帑仁義未饒軒冕貴功名誰一作莫信鬼神慳郭東一點英雄氣時伴君心夜斗間孟子彼以其富我以吾仁彼以其爵我以吾義揚雄言炎炎者滅隆隆者絶髙明之居鬼瞰其室陳希夷語种放曰名者天地之美器造物之所深忌天地間無全名子名將起必有物敗之即鬼神慳之意張華要豫章人雷煥屛人夜觀天文煥曰僕察之久矣惟牛斗之間頗有異華曰是何祥也煥曰雷劍之精上徹於天耳此言英雄氣或是借用耳送熊伯通伯通乃熊本也鄱陽人傳稱本有文詞少為范公希文所知所至為吏不苟神宗時以邊功擢侍從嵗暮欣逢蓋共傾川塗南北豈忘情孔子遇程子於塗傾蓋而語事經宦路心應折地入家山眼更明據傳本嘗為池州建德縣池饒接壤故云地近家山此詩必送本知建德蓋英宗末年公未趍召時也韓詩知有歸日眉方開江上月華空自照梅邊春信恰相迎髙蟾詩明日霸陵新霽後馬頭煙樹緑相迎關河不鎖真消息野客猶能聽治聲盧同詩關門不鎖寒溪水一夜潺湲送客愁前漢循吏傳王成為膠東相治甚有聲送王覃分走人間十五年塵沙吹鬢各蒼然山林渺渺長回首兒女紛紛忽滿前言身居俗而心未嘗不在山林謝師厚詩倒著衣裳迎户外盡呼兒女拜燈前知子有才思奮發嗟豫無地與回旋前漢長沙王發傳臣國小地狹不足回旋相看一作秦吳别身世何時兩息肩送明州王大卿大厯才臣有此州昆雲今駕鹿轓遊謝承後漢書曰鄭𢎞遷淮隂太守行春天旱隨車致雨白鹿方道夾轂而行𢎞怪問主簿黃國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相從來所至邦人喜真復能分聖主憂千里封疆何足治一時名迹故應留屬城舊吏須疲懶尚可揮毫敵李舟九域志唐明州刺史王密德政碑李舟文顔真卿書介父嘗為鄞縣故云屬城舊吏姑胥郭誤褫雲巾别故山抵吳由越兩間關千家漁火秋風市一葉歸舟暮雨灣易終朝三褫之王肅注云解也北山移文解蘭縳塵纓歐公詩西風酒旗市細雨菊花天旅病愔愔如困酒鄉愁脈脈似連環情知帶眼從前緩更覺顛毛自此斑石勒云大雅愔愔殊不類將家子東坡詩下第味如中酒味莊子載惠子之辨曰連環可解選詩盈盈一水間脈脈不得語連環言不斷也梁沈約書曰百日數旬革帶嘗應移孔古詩衣帶日以緩嚴陵祠堂漢庭來見一羊裘默默俄歸舊釣舟迹似磻溪應有待世無西伯可能留嚴光傳披羊裘釣澤中史記齊世家吕尚蓋嘗窮困年老矣以漁釣干周西伯西伯將出獵卜之曰所獲非龍非驪非虎非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽與語大悅曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號太公望載與俱歸立以為師又吕氏春秋曰太公釣於慈泉遇文王酈道元水經曰磻溪中有泉謂之慈泉積水成淵即太公釣處今謂凡谷有石壁深髙幽邃人迹罕到東南隅有石室蓋太公所居水次盤石釣處即太公垂釣之所其投竿跽餌兩膝遺迹猶存是磻溪之稱也﨑嶇馮衍才終廢索寞桓談道不謀勺水果非鱣鮪地放身滄海亦何求馮衍盡節故朝忿田邑背約後審知更始巳沒乃罷兵幅巾降於河內帝怨衍不時至黜不用後坐與隂就交得罪歸故郡閉門自得不敢與親故通顯宗時卒桓談極言讖之非經帝大怒曰談非聖無法將下斬之叩頭流血良久乃解出為六安郡丞忽忽不樂道病卒賈誼賦彼尋常之溝瀆兮豈容吞舟之魚中庸水一勺之多觀此詩其不足於光武甚矣藏春塢詩獻刁十四丈學士刁謂景純名約丹徒人蘇子美祠神會中客也天聖初始來京師應進士舉與宋公歐陽永叔謝希深富彥國齊名踐歷館閣踰四十年寵利之際泊如也於荆公為前輩下故公呼之以丈詩則言獻時刁巳致仕矣故云萊氏隱蒜山東渡得林丘邂逅籃輿亦少留蒜山在潤州丹徒縣西三里山生澤蒜因以為名宋武帝嘗大破孫恩於此今日更知萊氏隱暮年長憶武陵遊老萊子耕於蒙山之陽楚王駕至其門曰守國之孤願變先生老萊子云云靈運詩漆園有傲吏萊氏有逸妻欲營垣屋隨穿斸蕭何傳為家不治垣屋韓詩惟當待責免耕斸隨溝塍尚歎塵沙隔獻酬遙約勾吳亭下路春風深駐五湖舟史記吳世家太伯之奔荆蠻自號勾吳小杜潤州詩勾吳亭東千里秋放歌曾作昔年遊則勾吳亭之名舊矣太湖恬亭檻臨溪上緑隂圍溪岸髙低入翠微日落斷橋人獨立水涵幽樹鳥相依清遊始覺心無纍靜處誰知世有機更待夜深同徙倚秋風斜月釣舟歸言宅心事外與世相忘杜牧之詩南去北來人自老夕陽長送釣舟歸王荆公詩注卷三十八
