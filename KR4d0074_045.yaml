body:
  text: 王荆公詩注卷四十五宋李壁撰律詩題張司業詩蘇州司業詩名老樂府皆言妙入神看似尋常最奇崛成如容易却艱辛籍字文昌和州人樂天讀籍詩集云張公何為者業文三十春尤工樂府詞舉代少其倫姚合讀籍詩妙絶江南曲淒涼怨女詩古風無敵手新語是人知同陳和叔北山遊春風蕩屋雨填溝東閣翛然擁罽裘罽賓國有毯可以為裘鄰壁黃粱炊未熟喚回殘夢有鳴騶韓文水之無聲風蕩之鳴次吳氏女子韻二首吳氏女子即蓬萊君詩云西風不入小窗紗秋氣應憐我憶家極目江南千里恨依然和淚看黃花孫陵西曲岸烏紗公自注云南朝九日臺在孫陵曲街旁去吾園只數百步知汝淒涼正憶家人世豈能無聚散亦逢佳節且吹花其二秋燈一㸃映籠紗好讀楞嚴莫念家能了諸緣如夢事世間唯有妙蓮花楞嚴第五卷不取無非幻非幻尚不生幻法云何立是名妙蓮花俗言妙法蓮經非也即席曲沼溶溶泮盡澌杜牧之詩溶溶漾漾白鷗飛張文昌詩曲沼春流滿楚詞與汝游兮河之渚流澌紛兮將來下注澌解氷也暖烟籠瓦碧參差人情共恨春猶淺不問寒梅有幾枝唐人牡丹詩章臺街裏芳菲伴且問宫腰損幾枝東坡玉盤盂詩吾家豈與花相厚更問殘芳有幾枝或云此平甫詩遊城南即事二首神姦變化久難知禹鼎由來更不疑魑魅合謀非一日太丘真復社亡遲禹鑄鼎象物以示人故人入川澤山林不逢不若魑魅魍魎莫能逢之此言魑魅不便於鼎圗巳之形狀故合謀欲毁鼎此鬼輩惡其害已規去其籍也史記封禪書宋太丘社亡而鼎沒於泗水彭城下注云爾雅曰古陵泰丘又按社主用石即其石主亡也其二泰壇東路繞重營獨背朝陽信馬行漫道城南天尺五荒林時見一柴荆唐書城南韋杜去天尺五謂韋曲杜鄠近長安也寄沈道原城郭千家一彈丸蜀岡擁腫作蛇蟠眼前不道無蒼翠偷得鍾山隔水看髙適傳奈何以一彈丸地而困全蜀之人哉按寰宇志蜀岡屬揚州江都縣舊為禪智寺即隋之故宫今屬儀真與金陵相對故云隔水看生日次韻南郭子二首救黥醫劓世無方息黥補劓見圗書注斷簡陳編付藥房祝我壽齡君好語毗耶一夜滿城香維摩經飯香普熏毗耶離城其二寒逼清枝故有梅草堂先對白頭開殘骸巳若雞年夢猶見騷人幾度來謝安夢白雞公酉生屢用此事八公山淮山但有八公名事見太平廣記劉安初好道有八公詣門門吏嫌其老皆變為童子安跣足迎拜乃復為老人後以八公名山鴻寶燒金竟不成劉向更生父德武帝時治淮南獄得鴻寶苑祕書更生幼而讀誦以為奇獻之言黃金可成上令典尚方鑄作事費甚多方不驗上乃下更生吏吏劾更生鑄僞黃金繫當死更生兄陽成侯安民入國户半贖更生罪上亦奇其才得踰冬減死論身與仙人守都厠可能雞犬得長生安别傳云既上天過諸仙伯安少習尊貴稀為卑下之禮坐起不恭或誤稱寡人仙伯主者奏安不敬應斥八公為謝過乃赦之謫守都厠三年後為散仙人不得處職但不死而巳傳又載安臨去時餘藥器置在中庭雞犬䑛之盡升雲中此言安尚守都厠安得有雞犬皆仙之說也過徐城七年五過徐城縣按九域志云徐城屬泗州建隆三年省為鎮入臨淮縣元和郡國志云本徐子國也今有徐君墓在縣北三十二里季札所挂劒處自笑皇皇此世間安得身如倉庾氏一官能到子孫閒王嘉傳孝文時吏居官者或長子孫以官為氏倉氏庾氏則倉庾吏之後送丁廓秀才歸汝隂二首好去翩然丁令威昔人且在不應非淮雲豈與遼天闊想復留情故一歸續搜神記云遼東城門華表柱忽有白鶴飛來集人或欲射之鶴歌曰有鳥有鳥丁令威去家千年今始歸城郭猶故人民非何不學仙冢纍纍其二西州行路日蕭條西州路丹陽記云揚州廨乃王敦所創有東南西三門俗謂之西州又㑹稽王道子領揚州第在州東故時人號為東府而號府廨曰西州執手傷懷不自聊游子故鄉終念返豈能無意冶城潮冶城見仲明甫至宿處和僧惠岑遊醴泉觀邂逅相逢一日閒或緣香火住一作共靈山夕陽興罷黃埃陌直似蓬萊墮世間言一見亦必有宿緣公詩又有特起蓬萊陸海中之句和惠思聞蟬此必在京師作懷金陵也白下長干何可見風塵愁殺庾蘭成庾信在北方常思江南有哀江南賦蘭成射䇿之年公以信自比去年今日青松路憶似聞蟬第一聲憶似别本作一似又作亦自切意亦自為是樂天詩微月初三夜新蟬第一聲小杜詩槿墮初開艷蟬聞第一聲送王介學士赴湖州字中甫東吳太守美如何栁惲詩才未足多遙想郡人迎下擔寰宇志建業有迎擔湖昔永嘉中帝遷衣冠過江客主相迎湖側遂以迎擔為名今此云迎下擔者借用以說太守白蘋洲渚正滄波白蘋洲在霅溪之東南去州一里洲上有魯公顔真卿芳亭內有梁太守栁惲詩曰汀洲採白蘋日晚江南春因以名洲東軒筆録王介性輕率語言無倫荆公作此詩送之其意以水值風即起波也介諭其意遂和十篇盛氣而誦於荆公其一曰吳興太守美如何太守從來惡祝鮀生若不為上柱國死時猶合代閻羅荆公笑曰閻羅見闕請即赴任懷鍾山投老歸來供奉班塵埃無復見鍾山何須更待黃粱熟始覺人間是夢間韓詩莫憂世事兼身事須著人間比夢間此詩當是再召入為學士時江寧夾口三首茅屋滄洲一酒旗午烟孤起隔林炊江清日暖蘆花轉恰似春風栁絮時晉人以雪比栁絮介父以蘆花比栁絮江清日暖尤其似者轉字妙甚或誤以轉為白非李白云楊花滿江來疑是龍山雪廣記元載為相時正晝有書生詣焉既見拜語曰聞公髙義好士輒獻詩一篇曰城南路長無宿處荻花紛紛如栁絮海燕銜泥欲作窠空屋無人却飛去載亦不曉其意既出門而沒後嵗餘載敗據此詩則唐人亦嘗以蘆荻花比栁絮矣詩話王介素與荆公不相能荆公題江寧道中驛舍一聨云茅屋滄洲一酒旗午烟孤起隔林炊介鄙之書其末曰金陵村裏王夫子可是能吟富貴詩公見之亦不屑意乃續之云江清日暖蘆花轉恰似春風栁絮時竊疑詩話所載多妄說介雖褊衷何至操鄙語如此其二月墮浮雲水捲空滄洲夜泝五更風李義山詩九秋霜月五更風北山草木何由見夢盡青燈展轉中詩澤陂寤寐無為輾轉伏枕注本又作展其三落帆江口月黃昏小店無燈欲閉門唐陳羽詩都門雨歇愁分處山店燈殘夢到時半出岸沙楓欲死繫船猶有去年痕真跡作側出岸沙楓半死尤佳李羣玉詩不如半死樹猶吐一枝花寄碧巖道光法師去馬來車擾擾塵自難長寄水雲身碧巖後主今為客何況開山說法人言車馬塵中非髙人所可久寓省中二首萬事悠悠心自知强顔於世轉參差移床獨向秋風裏卧看蜘蛛結網絲唐來鵠詩寂寞間階草亂生簟涼風動若為情不知獨坐間多少看得蜘蛛結網成韓子蒼詩移床獨向西南角卧看琅璫動晚風其二大梁春雪滿城泥一馬常瞻落日歸身世自知還自笑悠悠三十九年非公登第慶厯初皇祐試館職嘉祐四年六月除直集賢院五年四月修注纍辭六年知制誥三十九嵗為度支判官祠部貟外郎崇政殿後春晴即事悠悠獨夢水西軒僧皎然詩相思路渺渺獨夢水悠悠百舌枝頭語更繁山鳥不應知地禁亦逢春暖即啾喧朝野僉載百舌春囀夏止唯食蚯蚓正月後凍開蚓出而來十月後蚓藏而往蓋物之相感也省中沈文通㕔事竹上秋風吹網絲角門常閉吏人稀蕭蕭一榻卷書坐直到日斜騎馬歸韓詩平明出門暮歸舍酩酊上馬知為誰吳任道說應舉時事縣瓠城南陂水深地志汝南郡謂之縣瓠城水經曰汝水周城形如懸瓠故取名焉今詩言縣瓠城不知是此否春泥滿眼路嶇嶔獨騎瘦馬衝殘雨前伴茫茫不可尋趙嘏詩獨自下樓騎瘦馬搖鞭重入亂蟬聲送河中通判朱郎中迎母東歸壽昌父巽守雍出其母劉氏嫁民間母子不相知者五十年熙寧初棄官入秦與家人訣誓不見母不復還行次同州得之劉氏時年七十餘矣雍守錢明逸以事聞由是天下皆知其孝壽昌再為郡守至是以母故通判河東府迎其母同弟妹以歸又一說載朱壽昌者少不知母所在棄官走天下求之刺血書佛經志甚苦熙寧初見於同州迎以歸朝士多以詩美之蘇內翰子瞻詩云感君離合我酸辛此事今無古或聞王荆公薦李定為臺官定嘗不持母服臺諫給舍皆論其不孝不可用內翰因壽昌作詩貶定曰此事今無古或聞綵衣東笑上歸船萊氏歡娛在晚年嗟我白頭生意盡看君今日更悽然目見夀昌得母而自歎有弗洎之悲寄題修廣明碧軒杭州明慶院明碧軒南竹數叢别來江外幾秋風别來江外或是舒州作道人無復人間世嗟我今為白髮翁莊子人間世篇悼幽明之永隔也坡詩故人巳為土衰鬢亦驚秋皆妙夜直金爐香盡漏聲殘剪剪輕風陳陳寒春色惱人眠不得月移花影上䦨干溫庭筠詩風揚檀烟消篆印日移松影過禪床又唐姚合詩月移花影橫幽砌風揭松聲上半天韓偓詩惻惻輕寒剪剪風杏花飛雪小桃紅人間人間投老事紛紛唐人詩只言漸老應無事及至中年事轉多才薄何能强致君一馬黃塵南陌路眼中惟見北山雲樂天詩一為趨走吏塵土不開顔辜負平生眼今朝始見山皇甫冉詩歸舟明日毗陵道回首姑蘇是白雲後殿牡丹未開紅襆未開知婉娩紫囊猶結想芳菲樂天詩山榴花似結紅巾容艷新妍占斷春此詩則言牡丹猶包而未展也此花似欲留人住山鳥無端勸我歸權德輿詩晝漏沈沈倦瑣闈西垣東觀閲芳菲繁花滿樹似留客應為主人休浣歸春日柴門照水見青苔言苔影見於水中春繞花枝漫漫開路逺遊人行不到日長啼鳥去還來杜詩日長惟鳥雀又自去自來堂上燕寄韓持國渌水環宫一作渌繞宫城漫漫流鵝黃小蝶弄春柔問知公子朝陵去歸得花時却自愁朝陵當是持國為禮官時漢制時節朝陵見後漢禮儀志答韓持國知公尚憶洛城中醉裏穿花滿袖風花亦有知還有恨今為紅藥主人翁持國治平三年自司諫知制誥故用紅藥事贈詩必在此時謝𤣥暉直中書省詩云紅藥當階翻蒼苔依砌上兹言翔鳳池鳴佩多清響出城慣作野人多野興欲為時用少時材歐公嘗薦介甫德行文學為衆所推末又云安石久更吏事兼有時材疑此語非公所樂故於詩屢見此意出城偶與沙塵背轉覺溪山入眼來涿州涿州沙上望桑乾桑乾縣名屬代郡北魏居之號為索干之都曹彰北征入涿郡界乘勝逐北至于桑乾賈島詩客舍并州巳十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉鞍馬春風特地寒萬里如今持漢節漢蘇武留胸奴中十九年卧起持漢節節旄盡落却尋此路使呼韓呼韓丐奴單于稽侯㹪之號也五單于分立宣帝當輔立呼韓邪為北單于出塞涿州沙上飲盤桓看舞春風小契丹塞雨巧催燕淚落濛濛吹濕漢衣冠古樂府有出塞入塞曲杜子美亦有前後出塞唐王昌齡詩云出塞入塞雲處處黃蘆草楊巨源詩細雨濛濛濕芰荷杜詩不愁巴蜀道吹濕漢旌旗入塞荒雲涼雨水悠悠鞍馬東西鼓吹休尚有燕人數行淚回身却望塞南流唐陳黯代河湟父老奏巳見前注燕人豈亦類此耶詩言燕人思中國也王昌齡詩云更遣黃頭戍唯當哭塞雲又云白花垣上望京師黃河水流無盡時窮秋曠野行人絶馬首東來知是誰又雍陶詩大渡河邉蠻亦愁行人將渡盡回頭此中遙寄思鄉淚南去應無水北流書汜水關寺壁汜水按漢書在成臯者音丸又音似即汜縣之汜水也在濟隂者敷劒反髙帝即位於汜水陽者是也髙祖四年漢數與楚挑戰大司馬咎渡兵汜水張晏注云在濟隂界如淳又引左傳曰鄙在鄭地汜臣瓉云髙祖攻曹咎於成臯咎渡汜水而戰今成臯城東汜水是也師古曰此水不在濟隂瓉說得之括地志云汜水源出洛州汜水縣東南三十三里方山山海經云浮戲之山汜水出焉汜水鴻溝楚漢間跳兵走馬百重山髙祖紀漢王跳注超過為跳如何咫尺商於地便有園公綺季間秦使張儀說楚王獻商於之地六百里四皓隱於商山在商州上洛縣之南皇甫謐髙士傳四皓皆河內軹人秦政方虐四士避世於商山以待天下定今墓存焉題北山隱居王間叟壁荒村日午未開門邵康節詩盡日客不來至夜門猶閉雨後餘花滿地存唐人詩細雨濕衣看不見間花滿地落無聲舉世但知旌隱節誰人知道是王孫言貴胄而有隱節尤足髙也和惠思嵗二日二絶懶讀書來巳數年從人嘲我腹便便便便見身間注為嫌歸舍兒童聒故就僧房借榻眠其二沙礫藏春未放來荒庭終日守陳荄文選懷舊賦陳荄被于堂除舊圃化而為薪栁詩回風日夕至零落委陳荄遙憐草色裙腰緑湖寺西南一徑開劉長卿春草詩猶帶羅裙色青青向楚人赴召道中海氣冥冥漲楚氛汀洲回薄水橫分盧綸詩映竹水橫分當山起鴈羣青松十里鍾山路祗隔西南一片雲江東召歸自江東提刑召入時嘉祐三年十月也昨日君恩誤賜環歸腸一夜繞鍾山韓集聨句腸胃繞萬象精神驅五兵雖然眷戀明時祿羞見琅琊有邴丹琅琊有邴漢兄子曼容儒林傳施讎以田王孫易授琅琊魯伯魯伯授太山毛莫如少路琅琊邴丹曼容著清名莫如至常山守此其知名者也杜牧詩九原可作吾誰與師友琅琊邴曼容公詩屢及之蘇魏公頌家訓嘗云漢邴曼容戒子孫仕不過六百石六百石郎官謁者不為顯吾尚以為過汝等但能守家法傳家學貧不免仕宦財循資格於吏部注擬差遣可也雖管庫亦可以無愧矣平甫如通州寄之北山搖落水崢嶸想見揚帆出廣陵曹松詩汲水疑山動揚帆覺岸行王維詩揚帆截海行水言崢嶸豈謂風鼓浪波洶湧如山乎平世自無憂國士求田應不忤陳登用劉𤣥德本語寄顯道舟約刀頭止嵗前刀頭見前注故人專使手書傳出門江上問消息極目寒沙空渺然三品石建康志臺城千福院前醜石四各髙丈餘云陳朝三品石政和中取歸京師置於延福宫草沒苔侵棄道周唐人連昌宫詞草沒苔封疊翠斜墜紅千葉擁殘霞誤恩三品竟何酬國亡今日頑無恥似為當年不豫謀牛奇章公太湖石詩嫓人當綺皓視秩即公卿自注云南朝有司空石蓋以定石之品流司空疑即此或别一石也公詩意固佳陳克子髙亦有一篇其意與公相反皆佳作子髙詩云臨春結綺今何在屹立巉巉終不改可憐江令負君恩白頭仍作北朝臣子髙又云庚辰三月十日與關聖淵陳明信集太平寺明信誦介甫三品石句以為介甫善論古今國亡今日頑無恥似謂當年不預謀後之詩人不復措詞矣聖淵云介甫但是融化石笋行舊詩且陳亡江總輩皆北面仇讎豈如此石之耐久邪聖淵及余詩以反介甫明信終守巳說爭論紛然日暮罷去詩竟不就後十四年當癸巳寒食重尋昔遊羣石巉然固在聖淵明信死巳久矣上注引牛詩司空石然司空不止三品更當考和崔公度家風琴八首屋山終日信飄飄屋山見上注信猶任也似與幽人破寂寥為有機心須强聒直教懸解始聲消莊子大宗師篇得者時也失者順也安時而處順哀樂不能入也此古之所謂懸解也而不能自解者物有結之注懸解無所係也此言懸解者不假於聲猶淵明無絃素琴之類是也又列子天瑞篇聲之所聲者聞矣而聲聲者未嘗發章八元詩萬籟自生聽太虛常寂寥還從靜中起却向靜中消其二簾幕無風起泬寥誰悲精鐵任飄飄隨商應角知無意不待歌成韻巳消髙駢題風箏詩曰夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又被移將別調中此詩近似駢作言别調中有意於宫商或不待曲終而止其三萬物能鳴為不平世間歌哭兩營營君知此物心何欲自信天機自有聲退之送東野序大凡物不得其平則鳴云云人之於言亦然其歌也有思其哭也有懷詩意風琴無不平之心其鳴也天機自動耳莊子秋水篇今豫動吾天機而不知其所以然其四風鐵相敲固可驚朔兵行夜響行營秋聲賦其觸於物也鏦鏦錚錚金鐵皆鳴又如赴敵之兵銜枚疾走不聞號令但聞人馬之行聲如何清世容髙卧翻作幽窗枕上聲其五南風屋角響蕭蕭白日簾垂坐寂寥愛此宫商有真意與君傾耳盡今朝東坡九成臺銘云使耳聞天籟則凡有聲有形者皆吾羽旄管磬匏絃又云非有度數而均節自成非韶之大全乎此即宫商有真意之義其六風來風去豈嘗要隨分鏗鏘與寂寥不似人間古鐘磬從來文飾到今朝言風來則鏗鏘風去則寂寥初無心也又世之鐘磬多以黃金及彩色塗澤不若此之自然其七繫身髙處本無心萬竅鳴時有玉音欲作鏌鎁為物使知君能笑不祥金萬竅鳴謂風作時則琴音如玉也琴亦鐵為之故云笑鏌鎁不祥金見前其八疏鐵簷間挂作琴清風才到遽成音伊人欲問無真意向道從來不博金無真恐是無聲琴譜有不博金不換玉二操太宗酷愛其聲韻優古以名頗俗改換金為楚澤涵秋博玉為塞門積雪送陳靖中舍歸武陵知君欲上武陵溪水自東流人自西到日桃花應巳謝想君應不為花迷淵明桃源詩記云武陵人捕魚為業緣溪行忘路之逺近忽逢桃花林夾岸繽紛太守即遣人隨漁人往尋向所志遂迷不復得路王維詩聞說桃源好迷客不如髙卧盼庭柯北山刳木為舟數丈餘卧看風月映芙蕖清香一陳渾無暑時有驚桹躍出魚易繫辭下刳木為舟任濤詩露團沙鶴起人卧釣船流東坡詩春江緑未波人卧船自流適意一燈相伴十餘年舊事陳言知幾編到了不如無纍後困來顛倒枕書眠左氏至於煩乃捨也巳不但施於音樂讀書亦然公此詩頗有捐書絶學之意班固賓戲徒樂枕經籍書辱井辱井詳見次韵登微之髙齊注結綺臨春草一丘尚殘宫井戒千秋奢淫自是前王恥不到龍沈亦可羞李白詩撫劒髙吟空咄嗟梁陳之國亂如麻天子龍沈景陽井誰歌玉樹後庭花龍沈字實取此歐公集古録云煬帝躬自滅陳目見叔寶事又嘗自銘以為戒如此及身為淫亂則又過之豈所謂下愚不移者哉題金沙杜詩有徑金沙軟海棠開後數金沙髙架層層吐絳葩韓詩直須添架引龍鬚咫尺西城無力到不知誰賞魏家花謂魏紫本出魏仁浦丞相家故得名夜聞流水千丈崩奔落石崎秋聲散入夜雲悲州橋月下聞流水不忘鍾山獨宿時詠月三首寒光乍洗山川瑩清影遙分草樹纎萬里更無雲物動中天祗有兔隨蟾月賦柔祇雪凝圎靈水鏡杜詩罔雨移深樹言光所照徹細大不逃也五經通議曰月中有兔與蟾蜍何月隂也蟾蜍陽也而與兔並明隂係於陽也李賀詩老兔寒蟾泣秋色其二江海清明上下兼碧天遙見一毫纎此時只欲浮雲盡窟穴何妨有兔蟾謝莊賦氣霽地表雲斂天末洞庭始波木葉微脫即上下兼也杜詩上方重閣晚百里見秋毫此見公包容小人之意不知卒為已害謂吕蔡之徒其三一片清光萬里兼幾回圎極又纎纎君看出沒非無意豈為辛勤飬玉蟾韓詩樓頭皎月不共宿其奈就缺行纎纎鮑明逺詩始出西南樓纎纎如玉鈎未映東北墀娟娟似蛾眉三五二八時千里與君同注謂從微至明也公詩意乃言從明至微羅隱詩隂雲薄暮上空虛此夕清光巳破除只恐異時開霽後玉輪依舊飬蟾蜍公末句與隱詩雖異而皆有深意王荆公詩注卷四十五
