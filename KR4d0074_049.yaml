body:
  text: 王荆公詩注卷四十九宋李壁撰律詩仁宗皇帝挽詞四首去序三朝聖三朝謂太祖太宗真宗杜子美玄元皇帝廟詩云九聖聨龍衮行崩萬國天列子天瑞篇杞國之人憂天地崩隕身無所寄廢寢食者憂勤無曠古言勤勞無逸過於商宗曠古所未有治洽最長年書道洽政治澤潤生民仁育齊高厚哀思罄幅貟詩長發幅隕既長注幅廣也隕均也箋云隕當作貟貟謂周也公詩用鄭箋史稱遺制之下雖深山窮谷莫不奔走悲號而不絶豈非德澤涵養之至廟號曰仁不亦宜乎欲知千載美道德冠遺編仁宗御集一百卷如欹器後述政化述寶訓要言序觀文鑒古圖序皆列之卷首其二慿几微言絶書顧命相被冕服慿玉几前漢藝文志仲尼沒而微言絶羣臣涕泗揮哀號三級陛長安記含元殿前玉階三級第一級可高二丈許第二級第三級各髙五尺間以螭頭東西鱗次又賈誼傳故陛九級上廉逺地則堂髙注級等也廉側隅也縞素九重圍又作闈禁闈之義天子有九門謂關門逺郊門近郊門城門臯門庫門雉門應門路門也九辨云豈不鬱陶而思君兮君之門以九重據楚詞則九重謂九門也退之詩豈識天子居九重鬱沉沉天上仙遊逺宮中御座非最悲帷幄侍不復未明衣漢昭未明求衣其三厭代人間世收神天上遊遽然虛玉座不復望珠旒莊子天地篇千歲厭世去而上仙乘彼白雲至于帝鄉選詩玉座猶寂寞桞子厚詩忽疑朝玉皇天冕垂前旒待旦移巾幘饔人改膳羞待旦對饔人恐兩句上必有一誤周禮內饔注饔割烹煎和之稱內臣昭信掌內饔十五年上嘗面戒曰動活之物不得擅烹深惡於殺也尋常飛白几寂寞暗塵浮魏公作哀册文堊帚之掃千竒萬巧謂飛白也歐公云仁宗萬機之暇無所玩好唯親翰墨而飛白尤為神妙凡飛白以點畫象物形而點最難工至和中有書待詔李唐卿撰飛白三百點以進自謂窮盡物象上亦頗佳之乃特為清淨二字以賜之其六點尤為竒絶又出三百點外梁武帝謂蕭子雲曰蔡雍飛而不白羲之白而不飛飛白之間在卿斟酌耳事見廣記其四同軌羣方至隱公元年天子七月而葬同軌畢至注云同軌以別四夷之國因山七月催文帝遺詔灞陵山川因其故無有所改因山為藏不復起墳山下川流不絶就其水名為陵號永違天日表李密見太宗曰龍鳳之姿天日之表空有肺肝摧杜詩塌然摧肺肝帳殿流蘇卷李賀詩桂帳流蘇暖鈴歌薤露哀後漢禮儀志大行載車著白系參繆紼長三十丈大七寸為挽六行行五十人公卿以下子弟凡三百人校尉三人候司馬丞為行首皆銜枚羽林孤兒巴俞棹歌者六十人為列鐸司馬八人執鐸先言挽者振鐸而歌其聲哀也薤露歌見車載板注宮中垂曉軔西去不更回離騷經朝發軔乎蒼梧兮夕余至于縣圃言宮車曉而發軔遂歸藏也英宗皇帝挽詞二首御氣方尊極莊子御六氣之辨氣疑為御宇緣下已有乘雲又白樂天開成皇帝挽歌御宇恢皇化傳家叶至公乘雲已泬寥乘彼白雲見前篇衣冠萬國會陵寢百神朝王維詩萬國衣冠拜紫宸又退之太后挽詩追攀萬國來警衛百神陪夏鼎傳歸啓鼎謂禹鑄九鼎史記帝禹東巡狩至子會稽而崩以天下授益三年之喪畢益讓帝禹之子啓而辟居箕山之陽禹子啓賢天下屬意焉及禹崩雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君帝禹之子也於是啓遂即天子之位此言嗣聖厯數所歸如啓也虞羮想見堯後漢李固傳舜坐見堯於墻食見堯於羮言聖情追慕之切如舜之於堯也誰當授椽筆論德在瓊瑶其二玉册上鴻名猶殘警蹕聲按治平四年正月庚戌朔宰臣韓琦等上尊號曰體乾膺厯文武聖孝皇帝至初八日上仙故名猶殘警蹕聲蓋紀事實也忽辭千歲祝祝聖人壽詳見上注虛卜五年征左氏襄公十三年石㲋言於子囊曰先王卜征五年而歲習其祥注謂巡守征行孫奭諫書陛下始畢東封更議西幸殆非先王卜征五年謹重之意羽衛悲哀送退之豐陵行羽衛煌煌一百里曉出都門葬天子山陵指顧成謳歌歸聖子世孝在持盈陜西之民供厚陵之役不比嘉祐十分之一韓子華曰非上旨丁寧不能如是歐陽文忠公曰上云朕成先帝之志天下必不以朕為不孝漢文紀注顧成廟應劭注言制度卑狹若顧望而成猶靈臺不日成之故曰顧成公雖有持盈之句而素論乃主變法神宗皇帝挽詞二首元豐八年乙丑神宗升遐明年元祐改元公亦薨進此詩時公為集禧觀使蓋自熙寧十年至是里居適九年矣將聖由天縱語子罕天縱之將聖成能與鬼謀易天地設位聖人成能人謀鬼謀百姓與能聰明初四逹雋乂盡旁求舜典逹四聰書序旁求儒雅説命旁招俊乂列于庶位又聿求元聖與之戮力言神考初御極勵精為治欲追三代之時也公亦以自與一變前無古三登歲有秋謳歌歸子啓欽念禹功修語魯一變至於道此言神考之變法髙出百王也前漢食貨志民三年耕則餘一年之蓄餘三年食進業曰登再登曰平餘六年食三登曰太平二十七歲餘九年食然後至德流洽禮樂成焉故曰如有王者必世而後仁繇此道也盤庚若農服田力穡乃亦有秋末句啓後來紹述之張本其二城闕宮車轉山林隧路歸言自城闕而歸山林亦古詩華屋山丘之意左氏重耳請隧襄王曰王章也注闕地通路曰隧蒼梧雲未逺姑射露先晞舜葬於蒼梧之野雲則乘彼白雲之意蒼梧姑射皆指陵闕也杜詩回首叫虞舜蒼梧雲正愁玉暗蛟龍蟄金寒鴈鶩飛西京雜記曰漢帝及諸侯王葬皆珠襦玉匣形如鎧甲連以金縷匣上皆鏤為蛟龍鸞鳳龜鱗之象時謂蛟龍玉匣玉暗亦言歲久玉色故暗也易龍蛇之蟄以存身也又杜詩蛟龍欲蟄寒沙水昭公四年金寒玦離拾遺録曰南之南有淫泉時有鳬鴈色如金玉羣飛戲於沙瀨羅者得之乃真金鳬也昔破酈山之墳行野者見金鳬向南而飛至寶鼎元年張善為日南太守郡民有見金鳬以貢善善博識多通考其年月即是秦皇墓金鳬也劉向傳諫厚葬疏水銀為江海黃金為鳬鴈老臣他日淚湖海想遺衣遺衣如黃帝升天遺弓劍之類太皇太后挽詞二首慈聖光獻仁宗曹后也元豐三年庚申十月二十日上仙明年三月山陵成詔百官各進挽詩二首公時奉祠里居於此國賴薑任盛門歸馬鄧高詩厥初生民時維薑嫄后稷母也大明詩太任有身生此文王後漢明帝明德馬后和熹鄧后后祖父贈唐王彬父玘尚書虞部員外郎故云門高關雎求窈窕卷耳念勤勞關雎窈窕淑女寤寐求之郭氏既退上聘后入宫詔平章事李迪參知政事王隨持節授册立為皇后妙選而入故云求也卷耳知臣下之勤勞內有進賢之志公詩義云卷耳言后妃之志后妃不得預闈外之事而其所以輔佐君子思相與濟大業者乃其志也惟有是心則其於險詖私謁敗德亂政之事逺矣公意蓋謂可以有其志不可有其事也是時臣僚如吳丞相沖卿從臣元絳王存鄧潤父何洵直皆進詞傳於中外或謂公關雎卷耳之句固美矣然止后妃事而已此可謂繆論詩固當總論平生之美何嫌言后妃事耶况後篇又用啓母文母事聖淑才難擬休明運繼遭岡原今獻卜維扆正攀號聖淑休明謂定儲嘉祐復辟治平又神廟御製詞亦云燕翼功參九安榮世厯三也時高太后向太后皆侍國史稱后才高慮深至和嘉祐中仁宗數得疾或至危殆不知人天下憂恐賴后扶持卒無事治平熙寧時隂功隱德著於天下升遐之日四海想慕老臣宿將尤哀不自勝英宗感疾后垂簾聽政二府每於前殿奏事罷詣小殿奏太后后意有疑其未盡者則曰公等更議之再奏盡善乃可未嘗自出己意事涉曹氏及內臣者無絲毫優假中外章奏下二府者日不減五十通二府考會擬議近者數日逺者旬月然後進呈后一一記舉大意無所忘失富弼時為樞密使退謂副使吳奎曰君名強記能如是乎奎曰奎於經史誦之五十過則終身不忘至於公文叢委一覽而記之非所及也后博覽經史往往成誦每議政事多引以為證觀此可見后之才東坡所謂高出古人之右信矣其二塗山女德茂京室母才難塗山啓母也漢外戚傳自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助焉周頌思齊思媚周薑京室之婦注京室王室也語才難不其然乎唐虞之際於斯為盛有婦人焉九人而巳注謂文母后待裕陵慈愛天至上御朝退稍晚后必自至屏扆候之或自持飲食以食上始終十餘年外廷不盡知在仁宗時英宗方四歲仁宗命后鞠養後雖出外邸問賜不絶宣仁聖烈皇后后之甥也亦四歲與英宗同時鞠於后所后深愛之仁宗謂后他日必以歸英宗后許諾仁宗晚年春秋高繼嗣未立天下寒心后居中佐決大䇿遂以英宗為子入居慶寧宫后待之恩意尤密嘉祐中仁宗中夜暴得疾崩后令左右毋得輒動斂諸門鑰悉置於前乃發喪授衛士甲宿衛畢召皇子入左右請帝即位后曰不可須宰相至乃召韓琦等及明宰臣等方入琦至慟哭不敢發言后曰皇子先帝所立於是琦奉英宗即位尊后為皇太后具美多前志餘光永後觀韓文孰云具美而不永年又善并美具神廟御製軒輝雖掩北風教自存南遺衣遷館御祖載出宫菆蔡雍傳恆思皇后祖載之時東郡有盜人妻者亡在孝子中陸士衡詩死生各異論祖載當有時注祖始也謂移柩車為引之始終始神孫孝長留萬國歡孝經明王以孝治天下故得萬國之歡心神宗即位易后宮名曰慶壽上事后致極誠孝所以娛悅后無不至在宮中從后行必扶掖視膳定省唯謹元豐元年正月望夜后以齒疾不御樓觀燈閏月望夜上於禁中為后再張燈靈臺妓樂俱入后嘗幸金明池上豫為百寶酒船其日馳以上壽嘗得水疾御醫不能愈會樞密院檢詳官薛昌朝以病水得老兵王舉者治之愈上訪知之即召入治后亦愈上大喜除舉翰林醫官賜金紫服賞賚甚厚故事外家男子未嘗得入謁后既高年多疾佾亦老上常為后言宜數召見以自慰懌后輒不許請遷佾官亦不許一日佾因侍上從容上固為之請得入謁后乃許之上自與佾同至后閣坐少頃上先起令佾得伸親親意后遽謂佾曰此非若所當留也輒隨上出上既除后喪每朝謁景靈哀慟左右間召佾子評誘至神御前行家人禮六年正月當朝謁諫官趙彥若言竊見聖情思慕猶如前時公卿侍臣無不惻楚慶壽變除歲月漸逺而少陽用事生氣尚微若孝思發中或復感動慮於時令有所未順欲望抑忍聖意奉承天時上雖嘉其言及朝享哀慕如初右國史並載可見裕陵始終孝愛之盡范忠宣作光獻挽詞亦云聖主孝思形四海千秋萬歲詠蒸哉吳正肅公挽詞三首公名育嘗舉賢良終河南守葬鄭介甫舉進士時公知舉昔繼吳公治今從子産遊漢河南守吳公治平為天下第一昭公二十年子産卒仲尼聞之出涕曰古之遺愛也里門無舊客鄉國有新丘歐公作吳墓志云吳氏世為建安人自曽髙以來皆葬建州之浦城至公始葬其皇考于新鄭公從葬焉若言鄉國當謂建州今顧指新鄭蓋正肅已葬親於鄭矣謀讓禆諶逺文歸賈誼優此時辜怨寵西望涕空流襄公三十年禆諶能謀謀於野則獲謀於邑則否公天聖中試禮部為第一遂中甲科時年尚少怨寵事未詳其二從容邊塞議慷慨廟堂爭元昊初叛公獨言夷狄不識禮義宜勿與校許其所求彼得無詞以動然後飭邊備以待之時方鋭意攻討不以為然卒如公䇿公嘗與賈丞相爭事上前殿中人皆失色公論辨不已既而曰臣所爭者職也顧力不能勝願得罷去時為參知政事公在政府又嘗論駁魚周詢乞因災異方試賢良事曲突非無驗方穿有不行霍光傳今論功而請賞曲突徙薪亡恩澤焦頭爛額為上客史記淳于髠曰稀膏棘軸所以為滑也而不能運方穿朝廷一作搢紳終倚賴賻襚極哀榮公始自樞府出連典數州後卒召還判都省除宣徽使帥鄜延改河中豈愧一作慕公孫相平生慕一作學董生轅固言公孫子務正學以言無曲學以阿世此言公以直道辛不至宰相其三應世文章手宜民政事才公為政簡嚴所至民樂其不擾去雖久愈思之知襄城縣宗室宦官往來上冢不敢犯治開封尤先豪猾曰吾何有以及斯人去其為害者而已朝多側目忌士有拊心哀仁宗嘗語輔臣吳育剛正可用但嫉惡太過耳觀此宜為小人所忌也汲黯傳令天下側目而視矣古詩苦哉逺征人拊心悲如何書蠧平生簡香寒後夜灰悠悠國西路空得葬車回吳葬鄭州賈魏公挽詞二首昌朝字子明諡文元功名烜赫在三朝經術從容輔漢條文元天禧元年以文章召試賜同進士出身以經術大顯於仁宗時卒於英宗治平二年七月故云三朝儒服早紆丞相紱文元慶厯五年自樞密使拜集賢相兩月升昭文相戎冠再插侍中貂戎冠謂帶節鉞也文元皇祐元年以檢校太師兼侍中判鄭州嘉祐元年判大名時又進封許國公兼侍中方避未聽而以樞密使召卒罷侍中乃帶平章事兼樞密使三年以鎮安節右僕射檢校太師兼侍中充景靈宫使至治平元年求還侍中至六七不許今云再插蓋一次除而不拜也又呂晦叔奏疏云臣伏見正侍中自國朝以來罕曾除授如賈昌朝文彥博輩喈以節度使樞密使兼領至於真拜則自范質趙普後惟丁謂馮拯韓琦以受遺宰相故有殊命今來富弼已噹大任欲乞因其固辭與免兼侍中遂其謙守開倉六塔流民復出甲甘陵叛黨銷六塔河名也公為大名河決商胡出倉廩與被水百姓舍其流棄接以醫藥所活九十餘萬口甘陵貝州也公安撫河北王則反貝州亟命部將王信孟元郝質持兵操攻具往且請自出摶賊不許終賊所以破功居多東第秪今空畫像當時於此識風標司馬相如傳居列東第師古曰東第甲宅也居帝城之東故曰東第其二銘旌蕭颯九秋風薤露悲歌落月中華屋幾人思謝傅華屋用羊曇事佳城今日閉滕公西京雜記滕公得石槨銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室名垂竹帛書勳在神寄丹青審象同天上貂蟬曾夢賜歸魂應侍紫陽宮吳曽漫録賈文元公母史夫人方妊娠父注夢使者持大笥奉貂蟬紫綬玉簡揖令受賜既寤告史曰若生子必為宋輔翌日生文元公命名昌朝子由作張樂全挽詩聞道騎箕尾還應事玉宸皆言死而復為仙也張賁詩酒後只留滄海客香前惟見紫陽君又李涉黃葵詩好逐秋風天上去紫陽宫女要頭冠晏元獻公挽詞三首殊字同叔文章晉康樂經術漢公孫比之謝靈運公孫𢎞與曽子固作公類要序皆有微意舊秩凝丞貴前功保傅尊公薨時階已儀同三司先雖遷尚書左丞恐非指此蓋前丞後凝在古皆宰相也前功必謂公在仁宗為儲副時居保傅之任也初公任館職真宗嘗諭大臣近聞館閣臣僚無不嬉遊宴賞惟殊杜門與兄弟讀書如此謹厚正可為東宫官後卒相仁宗實基於此傳呼猶在耳會哭已填門蕭瑟城南路鳴笳上九原栁子厚書排門填户九原出檀弓公葬陽翟其二終賈年方妙蕭曹地已親杜詩扈聖登黃閣明公獨妙年蕭曹言故人也終賈謂公以童子被遇為宮官優遊太平日密勿老成人抗論辭多祕賡歌迹已陳功名千載下不負漢廷臣公既左右東宫真宗所咨訪多以方寸小紙細書問之由是參預機密凡所對必以其藁進示不泄其後悉閲真宗閣中遺書得公所進藁類為八十卷藏之禁中人莫之見也賈誼傳漢廷臣無出其右者其三感會真竒遇飛揚獨妙齡他年西餞日此夜上騎星書寅餞納日平秩西成騎星謂送真廟山陵也傅説事見莊子楚詞亦云竒傅説之託星辰兮美韓衆之得一宿惠留藩屏餘忠在禁廷音容無處所髣佛寄丹青公嘗為應天府潁陳許州知永興軍徙河南府皆有惠政公喜薦士其得人最多范忠文挽公詞亦云平生欲報國所得是知人而公詩乃不及此韓忠獻挽詞二首琦字稚圭心期自與衆人殊骨相知非淺丈夫南史向桞傳桞與顔峻友善及峻貴栁猶以素情自許不推先之范璩戒栁曰名位不同禮亦異數卿何得作曩時意耶栁曰我與士遜心期久矣豈可一旦以勢利處之及栁涉義宣事繫獄峻竟不助之栁遂伏法獨斡斗杓環帝座親扶日轂上天衢公為相十年雖有同相者而大事多公專之故云獨斡也仁宗春秋高繼嗣未立公乞立皇子是為英宗英廟屢疾公又乞早定國本以安衆心乃立頴王為皇太子時治平三年十二月也神宗旋即尊位鋤耰萬里山無盜商君傳山無盜賊衮繡三朝國有儒三朝謂相仁宗英宗神宗爽氣忽隨秋露盡謾慿陳迹在龜趺唐葬令五品以上墓表為龜趺螭首高九尺七品為碣力趺圓首其高四尺也其二兩朝身與國安危典䇿哀榮此一時公與魏公啓云英宗以哀疚荒迷慈聖以謙沖退託內揆百官之衆外當萬事之微國無危疑人以靜一周勃霍光之於漢能定䇿而終以致疑姚崇宋璟之於唐善致理而未嘗遭變記在舊史號為元功未有獨運廟堂再安社稷弼亮三世敉寧四方崛然在諸公之先煥乎如今日之懿木稼曾聞逹官怕山頽果見哲人萎舊唐書讓皇帝傳云開元二十九年京城寒甚嚴霜封樹時學者以為春秋雨木冰即此是亦名樹介言其象介胄也憲見而嘆曰此俗所謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨元豐初雨木冰又華山崩故以為公薨之應介父最不喜劉向諸儒洪範傳傅會災異之説獨此推之於事云檀弓哲人其萎乎英姿爽氣歸圖畫茂德元勳在鼎彞幕府少年今白髮傷心無路送靈輀范忠宣作富公挽詞亦云英氣不隨鐘漏盡高名長與日星垂幕府少年事見入瓜步望揚州注陸士衡詩舍爵兩楹位啓殯進靈輀王莽造華蓋車百官竊言此似輀車非仙物也禇彥回傳先是庶姓三公未有定格王儉議官品第一皆加幢絡自彥回始王禹玉作公挽詩云淮南別乘人空老猶憶當時醉吐茵故相吳正憲公挽詞丙魏雖遭漢道昌豈如公出值虞唐秀鍾舊國山河氣榮附中天日月光更化事功參虎變贊元時序得金穰傷心鼓吹城南陌回首新阡柏一行公名充參政育之弟建安人蓋閩産也或言秀鍾舊國之語意若譏吳深中吳變法時大用故云參虎變介父於吳最厚介父罷吳始相隂欲有所變更稍進介父所斥逐之人韓維吕公著等介父此語似言其初未嘗不同也易革卦大人虎變未占有孚取更革之義金穰見天官書又貨殖傳故歲在金穰水毁木飢火旱旱則資舟水則資車物之理也袁子正書歲在申酉乞漿得酒申酉屬金亦謂金穰王荆公詩注卷四十九
