body:
  text: 王荆公詩注巻二十九宋李壁撰律詩和楊樂道韻六首後殿朝次偶題百年文物士優游萬物今方似綴旒發策東當招俊乂囘輿北苑罷倡優忽隨諸彦登龍尾尚憶當年應鵠頭獨望清光無補報更慙虛食大官羞嘉祐六年御試進士明經諸科舉人王者通天地人賦天徳清明詩水幾於道論時奏名試作樂薦上帝詩謹用五事以明天道論㸃檢官孫洙王廣淵初考經學官王惟熙祝諮夏漳覆考經學官王彭張兊朱從道詳定官賈夀呉中復封彌官傅求王陶㸃檢官孫坦鄭穆進士初考官沈遘司馬光裴煜陸經進士覆考官祖无擇鄭獬李綖王瓘詳定楊畋何郯王安石對讀胡稷臣傅堯俞蘇衮宋廸張次立周孟陽編排趙抃賈黯范師道介甫以初覆考所定第一人皆未允當欲於行間别取一人為狀首樂道守舊法以為不可或解之曰謡言王俊民作榜首久矣可無爭也及拆號果然按趙閱道手記二月二十六日辛巳宣赴崇政殿後水閣充編排官二十七日御殿引試駕幸後苑往來迎駕二十八日三月一日駕兩幸考校所二日至五日駕四幸覆考所六日七日駕兩幸詳定所八日駕幸編排所九日奏乞送焨字號巻重詳定十日癸巳放進士一百八十三人諸科一百二人特奏名四十三人日賜酒食菓子惟二十六日三月六日兩日無賜二十九日隂旬休月一日㣲寒風四日㣲雨春寒五日六日隂寒九日清明雨餘日皆晴今公所次樂道韻六首皆紀當時事所謂焨字號巻即是所爭狀首也或云公花底裌衣朝宿衛詩亦此時所賦當考國朝御試因舉人徐士亷訴知舉李昉取捨不當開寳二年藝祖始親覆試於殿庭時所御殿多在講武雍熙二年始移御崇政考官幕次則分處殿之東西閣及後廡大中祥符元年史官書帝徧至幕次論李宗諤等各務精詳勿遺賢俊四年又書帝徧至考官幕次天禧三年又書帝幸考校官幕次出七言詩賜晁迥等至於仁宗恪守孫謀觀閱道所記則又加詳焉祖宗留意科選徳意深矣信非前代所及也詩中事畧見於趙記故附此長發詩受小球大球為下國綴旒注結定其心如旌旗之旒縿着焉晉郄詵試東堂得第自言猶桂林一枝晉之正殿也丹陽記云東堂西堂亦魏制周之小寢也郄詵遷雍州刺史武帝於東堂㑹送可見東堂乃臨幸延見臣下之處杜集哀蘇源明詩射君東堂策宗匠集精選又北部初髙選東堂早見招東方朔傳云願陛下從中掖庭囘輿枉路臨幸山林樂天詩螭頭階下立龍尾道前行又安禄山傳禄山計天下可取逆謀日熾每過朝堂龍尾道南北睥睨久乃去又含元殿側龍尾道自平階至地凡詰曲七轉由丹鳳門北望宛如龍尾垂於地幽明録曰王文度鎮廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官云尊作平北將軍徐兖二州刺史王曰我已作此官何故復召耶鬼云此人間耳今所作乃天上官也桂陽先賢畫賛曰胡滕部南陽從事遇大駕南廵求索總猥滕表曰天子無外乗輿所幸即為京師臣請荆州刺史北司棣臣北都官從事帝竒其才悉許之大將軍西曹椽亡馬召滕因作都官鵠頭板召百官敬服法書苑云鶴頭蚊脚皆漢詔版所用各象形通典云陳依梁制凡補用以黄帋録名八座通署奏可乃出以付於典名典名書其名帖鶴頭版送所授之家鵠與鶴同鼂錯傳羣臣不足望陛下之清光百官表大官屬少府主膳食御溝𣺌渺金河漲欲平數支分緑報清明常縈輦路漂花去更引流盃送酒行靜見金輿穿樹影清含玉漏過墻聲衰顔一照自多感囘首江南春水生九域志汴京祥符縣有金水河歐公詩溝上水聲來不斷花隨水去不囘流蘭亭記引以為流觴曲水李義山笻竹杖詩靜怜穿樹逺唐人詩綵毫應染爐煙細清珮仍含玉漏垂又王建詩宫中笑語隔墻聞孫權遺曹操書曰春水方生公宜連去幕次憶漢上舊居漢水泱泱繞鳳林峴山南路白雲深如何憂國忘家日尚有求田問舍心直以文章供潤色未應風月負登臨超然便欲遺榮去却恐元龍㑹見侵按楊畋麟州新秦人後因仕東南必有居在漢上非公自憶也詩小雅瞻彼洛矣維水泱泱注泱泱深廣之貎襄州有望楚山宋孝武為刺史龍飛時改山名為鳳嶺疑即鳳林九域志襄陽有鳳林鎮耆舊傳樊澤於鳳林山自撰文刻石封孟浩然墓朱朴議遷都夫襄鄧之西夷漫數百里其東漢輿鳳林為之闗南菊潭環曲而流屬於漢柳詩直以疎慵招物議宋玉九辯登山臨水送將歸康樂詩彭薛裁知耻貢公未遺榮元龍陳登名終上句求田問舍之意後苑詳定書懐文墨由來妙禁中家傳豈獨賦河東平生聴想名聲早數日追隨笑語同御水新如鴨頭緑宫花更有鶴翎紅看花弄水聊為樂不晚朝廷相弱翁杜詩揚雄更有河東賦唯待吹噓送上天事見本傳御水見前注白詩鴨頭新緑水鴈齒小紅橋杜牧之詩御水初消凍宫花尚怯寒歐陽公牡丹記花名有鶴翎紅丙吉予魏相書曰朝廷已深知弱翁治行方且大用矣上已聞苑中樂聲苑中誰得從春遊想見漸臺瓦欲流御水曲隨花影轉宫雲低繞樂聲留年華未破清明節日暮初囘祓禊舟更覺至尊思慮逺不應全為拙倡優史記漸臺立於中央漢王根作漸臺未央宫有漸臺文帝夢鄧通即此處郊祀志建章北有大池漸臺髙二十丈名太液水經未央漸臺在滄池中建章漸臺在太液池中李義山詩茂苑城如畫閶門瓦欲流杜詩宫雲去殿低詩人多稱歌遏行雲此倒言之尤妙韓詩晴雲到晚留秦昭王謂范雎夫劒利則士勇倡優拙則思慮逺夫以逺思慮而御勇士吾恐楚之圖秦也東坡詩君王恭儉倡優拙自是豐年有笑聲用樂道舍人韻書十日事呈樂道舍人聖從待制按何郯字聖從東門人物亂如麻想見新韀照路華午鼔巳傳三刻漏從官初賜一杯茶匆匆殿下催分首擾擾宫中聴賣花歸去莫言天上事但知呼客飲流霞漢天文志死人亂如麻韓詩殿前羣公賜食罷驊騮踏路驕且閒徐騎省詩銅壺銀箭漏初傳李義山詩侍臣最有相如渴不賜金莖露一杯賣花襜上看桃李拍酒樓前聴管絃京師舊詩不言温木之意杜詩老翁須地坐細細酌流霞李義山詩空記大羅天上事衆仙同日詠霓裳元稹連昌宫詞歸來如夢復如癡何暇備言宫裏事詳定幕次呈聖從樂道殿閣掄材覆等差從臣今日擅文華揚雄識字無人敵何遜能詩有世家舊徳醉心如美酒新篇清目勝真茶一觴一詠相從樂傳說猶堪異日誇再第其髙下故言覆謂詳定也皆用楊何二姓事文中子心若醉六經目若營四海呉志與周公瑾交如飲醇酎杜詩躋險不自喧出郊已清目髙適宿開善寺讀書不讀經飲酒勝飲茶崇政殿詳定幕次偶題嬌雲漠漠䕶層軒嫰水濺濺不見源禁柳萬條金細撚宫花一段錦新翻身閒始更知春樂地廣還同避世喧不恨玉盤冰未賜清談終日自蠲煩沈休文詩歸海流漫漫出浦水濺濺小杜詩嬌雲光占岫健水鳴分溪嫰水見至開元僧含注小杜詩曲渚飄成錦一張公詩又有復撚黄金作柳條實用香山語見雪乾注若汩汩塵俗者安知春之可樂禁中名廣内如東方生避世金馬門之類王岐公詩禁幕天風日正亭侍臣初賜玉壺冰故事從臣伏日賜冰此乃春時豈亦有賜耶唐楊綰清談終日口不言榮利賀知章傳陸象先嘗曰季真清談風流吾一日不見則鄙吝生矣詳定試巻二首簾垂咫尺斷經過把巻空聞笑語多論衆勢難專可否法嚴人更謹誰何文章直使看無纇勲業安能保不磨疑有髙鴻在寥廓未應囘首顧張羅李義山詩嚴城清夜斷經過即與樂道爭議狀首事賈生過秦論陳利兵而誰何注師古曰問之為誰又云何人其義一也劉孝標辨素論明月之珠不能無纇韓集古今號文章為難足下知其所以難乎非謂鑽礪之不工頗纇之不除也得之為難知之愈難耳揚子問明篇鴻飛冥冥弋人何簒焉注簒取也司馬相如傳猶焦朋己翔乎寥廓而羅者猶視乎藪澤詩言竒傑之士不必盡由科舉進宜廣求才之路也無纇猶言無病也其二童子常誇作賦工暮年羞悔有揚雄當時賜帛倡優等今日論才將相中細甚客卿因筆墨卑於爾雅注魚蟲漢家故事真當改新詠知君勝弱翁揚子吾子篇或問吾子少而好賦曰然童子彫蟲篆刻俄而曰壯夫不為也後此八年熙寜三年始試舉人以策公素論也相如揚雄傳皆無賜帛事然王褒傳上數從褒等放獵所幸宫館輒為歌頌第其髙下以差賜帛議者多以淫靡不急上曰辭賦尚有仁義風諭鳥獸草木多聞之觀賢於倡優博奕逺矣又東方朔傳以射覆連中輒賜帛時有幸倡郭舍人滑稽不窮曰朔狂幸中爾願令復射朔中之臣榜百不能中臣賜帛又枚臯不通經術談笑類俳倡為賦頌好嫚戲以故得媟瀆貴幸比東方朔郭舍人等而不得比嚴助等為尊官臯自言為賦不如相如又言為賦乃俳見眎如倡自悔類倡也唐人謂進士為將相科雄上長楊賦聊因筆墨之成文章故藉翰林以為主人子墨為客卿以諷韓詩爾雅蟲魚注定非磊落人魏相傳伏觀先帝聖徳臣相不能悉陳昧死奏故事詔書二十三事公以詩賦取士為不然欲變科舉法故不取魏相故事之奏及熙寜初專政遂建議試舉人以策奉酬楊樂道邂逅聨裾殿閣春却愁容易即離羣相知不必因相識所得如今過所聞近代聲名出盧駱前朝筆墨數淵雲與公家世由來事愧我初無百一分離羣見檀弓音去聲此作平聲使言試事將畢不復同處退之答楊子書故不待相見相信己熟既相見不要約已相親又贈元十八詩吾友柳子厚其人藝且賢吾未識子時已覽贈子篇寤寐想風采於今己三年南部新書楊敬之贈項斯詩幾度見詩詩總好及親標格過於詩世說許𤣥度送母始出都人問劉尹𤣥度定稱所聞不劉曰才情過於所聞杜詩王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流淵雲謂王褒揚雄公與樂道自言家世由淵雲百一分猶言萬分一也白樂天潯陽行相逢何必曾相識奉酬聖從待制班行想望歲空多知有龍門未敢過和近聖人師展季勇為君子盜荆軻三刀舊協庭闈夢五袴今傳里巷歌復道諫書嘗滿篋不惟詩句似隂何後漢李膺獨持風裁以聲名自髙士有被其容接者名為登龍門柳下惠魯公族大夫姓展名禽字季柳下是其號也孟子曰柳下惠聖之和者也子路問君子尚勇乎揚子或問勇曰軻也曰何軻也曰軻也者謂孟軻也若荆軻君子盜諸王濬夜夢懸三刀於其卧屋梁上須臾又益一刀意甚惡之主簿李賊毅賀曰三刀為州字又益一刀者明府其臨益州乎及張𢎞殺益州刺史皇甫晏果遷濬為益州亷范遷蜀郡太守百姓歌之曰亷叔度來何暮不禁火民安堵平生無襦今五袴滿篋字借用樂羊事聖從為諫官擊權近最力故此云不特詩好而己杜詩李侯有佳句往往似隂鏗何謂何遜也次韻呉仲庶省中畫壁仲庶中復也畫史雖非顧虎頭還能滿壁寫滄洲九衢京洛風沙地一片江湖草樹秋行數鯈魚賔共樂卧看鷗鳥吏方休知君定有扁舟意却為丹青肯少留官制行内兩省諸㕔照壁自僕射而下皆郭熙畫樹石外尚書諸㕔照壁自令僕而下皆待詔書周官杜詩何年顧虎頭滿壁寫滄洲顧愷之傳尤善丹青圖寫特妙謝安深重之以為自蒼生以來未之有也世說顧愷之為虎頭將軍故號虎頭莊子鯈魚出游從容是魚樂也史記范蠡雪會稽之恥乃歎曰計然之策七越用其五而得意既巳施於國吾將用之家乃乗扁舟浮於江湖末聨言為愛壁間畫而少緩求外遷之意夜讀試巻呈君實待制景仁内翰篝燈時見語驚人更覺揮毫㨗有神學問比來多可喜文章非特巧爭新蕉中得鹿初疑夢牖下窺龍稍眩真邂逅兩賢時所服坐令孤朽得相因杜詩語不驚人死不休介甫常嫉舉人學術之陋屢見於文字今稍與之杜詩下筆如有神蕉鹿見列子窺龍用葉公事具寄蔡天啟注末謂馬范也頼二賢而䝉成答張奉議五馬渡江開國處一牛鳴地作菴人結蟠茅竹纔方丈穿築溝園未過旬我久欲忘言語道君今來見句文身思量何物堪酬對棒喝如今總不親晉元帝五馬渡江一馬化龍言金陵也一牛鳴地見招吕望之使君注王維詩囘看雙鳳闕相去一牛鳴佛書尼車河側去人間五里一牛鳴地退之羅池碑虵蛟結蟠傳燈録言語道斷心行處滅又三祖信心銘言語道斷非去來今句文見㣲隱鈔有僧問洛普禪師云從上來一人行棒一人行喝阿那个親對曰總不親師曰親處作麽生普便喝師乃打見傳燈録乂徳山入門便棒臨濟入門便喝和仲庶池州齊山畫圖公知制誥時作省中何忽有崔嵬六幅生綃坐上開指㸃便知巖穴處登臨新作使君來雅懐重向丹青得勝勢兼隨翰墨囘更想杜郎詩在眼一江春雪下離堆生綃見上注詩巻耳陟彼崔嵬注崔嵬土山之戴石者言身嘗到故見圖即知其處也仲庶為御史彈宰相梁適出通判䖍州未至改池州復還臺職杜牧池州貴池亭詩蜀江雪浪西江滿强半春寒去却來許渾詩湘潭雲盡暮山出巴蜀雪消春水來杜詩江發蠻夷漲山添雨雪流史記河渠書蜀守氷鑿離堆除沫水之害和祖擇之登紫㣲閣二首漠漠秋隂䕶掖垣青雲只在兩楹間宫樓唱罷雞人逺門闕朝歸虎士閒華蓋北瞻天帝座蓬萊東想道家山却慙久此隨諸彦文采初無豹一斑洛陽宫門銘曰洛陽宫有東掖門西掖門垣墻也應劭漢官儀曰左右曹受尚書事前世文人以中書在右因謂中書為右曹又稱西掖劉楨贈徐幹詩曰隔此西掖垣檀弓夢坐奠於兩楹之間說文云楹柱也從木盈聲杜諸天只在藤蘿外周禮雞人掌大祭祀夜呼旦以嘂百官則所起亦逺矣晉太康地記曰後漢固始鮦陽公安細陽四縣衛士習曲於闕下歌之今雞鳴歌是也劉禹錫詩彩仗神旗獵曉風雞人一唱鼔鼕鼕李賀雞人唱罷曉瓏璁鴉啼金井下疎桐周禮虎賁氏虎士八百人舍則掌王門王在國則守王宫天官書云華蓋所以蔽覆天帝之坐後漢竇章學者稱東觀為老氏藏室道家蓬萊山晉王獻之傳獻之數歲觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹時見一斑其二掖門相對敞銅鐶䡾䡾飛甍在兩間潤色平生知地禁登臨此日愧身閒浮雲倒影移牕隙落木囘飇動屋山忽憶初來秋尚早紫薇花㸃緑苔斑漢書朱虛侯從太尉勃入未央宫掖門注非正門而在兩旁若人之臂掖也凡宫省皆有之不獨未央温公詩宫門銅鐶雙獸面魏都賦四門䡾䡾注髙也䡾語偃切劉公幹贈徐幹詩曰均限清切禁注云史記曰景帝居禁中禁中者門户有禁非侍衛不得入韓集職親而地禁江淹雜體詩稚子候簷隙注隙門隙也貨殖傳秦文孝繆居雍隙注隙間孔也漢魏豹傳如白駒過隙注隙壁際退之詩每騎屋山下窺瞰陶雍詩錦文苔㸃㸃錢様菊斑斑唐𤣥宗紀開元元年改中書省為紫㣲省中書令曰紫㣲令樂天詩坐到黄昏誰是伴紫薇花對紫薇郎送沈興宗察院出湖南諫書平日皁囊中朝路爭看一馬驄漢節飽曾衝海霧楚帆聊復借湖風皇華命使今為重直道酬君逺亦同投老承明無補助得為湘守即隨公皁囊見别注後漢桓典為侍御史執正無所囘避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史杜詩使君五馬一馬驄蘇武仗漢節牧羊李文饒詩愁衝毒霧逢蛇草畏落沙蟲避燕泥柳子厚詩海霧多蓊鬰欒巴傳廬山廟有神能令官亭湖中分風船行者舉帆相迎言使指所寄不輕苟以直道報君初無逺近内外之間沈傳師詩承明年老輒自論乞得湘守東南奔春風一馬春風北首燕却疑身得舊山川陽浮樹外滄江水塵漲原頭野火煙日借嫰黄初著柳雨催新緑稍歸田囘頭不見辛夷樹始覺看花是去年韓信傳北首燕路經理燕山之意巳見於此句退之詩靄靄野浮陽暉暉水披凍野火字出晉書范晷傳退之石鼔歌雨淋日炙野火燒又夜次襄城詩塵漲雪猶乾李長吉詩上樓迎春新春歸暗黄著柳宫漏遲辛夷已見上注意北方無辛夷因憶去年之看花韓詩元日新詩已去年永濟道中寄諸弟燈火怱怱出館陶囘看永濟日初髙似聞空舍烏鳶樂更覺荒陂人馬勞客路光隂真棄置春風邊塞秪蕭騷辛夷樹下烏塘尾把手何時得汝曹館陶永濟皆魏郡屬邑今大名府北京左氏鳥烏之聲齊師其遁杜詩知子厯險人馬勞李白詩城濠失往路馬首迷荒陂魏文帝詩棄置勿復陳客子常畏人烏塘在撫州道逢文通北使歸文通沈遘也朱顔使者錦貂裘笑語春風入貝州欲報京師近消息傳聲車馬少淹留行人盡道還家樂騎士能吹出塞愁囘首此時空羡慕驚塵一段向南流使燕時年甚少故云朱顔使者貝州屬河北李白詩錦城雖云樂不如早還家古有出塞入塞之曲小杜詩月明更想桓伊在一笛聞吹出塞愁向南流謂入京師沈和云風沙弊盡舊狐裘走馬歸來過冀州聞報故人當邂逅便臨近館為遲留不容傾蓋論時事空寄新詩寫客愁却志後車塵已合簫聲清斷去如流故事使人相遇不許相見將次相州青山如浪入漳州銅雀臺西八九丘螻蟻往還空壟畝騏驎埋没幾春秋功名蓋世知誰是氣力迴天到此休何必地中餘故物魏公諸子分衣裘杜詩青山意不盡余使燕過相州道邊髙塚纍纍云是曹操疑塚也操謂諸子汝等時時登銅雀臺望吾西陵墓田莊子列禦冦莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也杜詩道邊卧騏驎項羽歌力㧞山兮氣蓋世陸士衡弔魏武文曰夫以迴天倒日之力而不能振形骸之内濟世夷難之智而受困魏闕之下又云智惠不能去其惡威力不能全其愛公詩畧取此意又曹公云吾餘衣裘可别為一藏不能者兄弟可共分之既而竟分焉次韻平甫喜唐公自契丹歸公自注云予辭北使而唐公代往留犁撓酒得戎心繡袷通歡歲月深奉使由來須陸賈離親何必强曾參燕人候望空甌脫塞馬追隨出蹛林萬里春風歸正好亦逢佳客想揮金漢匈奴傳漢使與單于刑白馬單于以徑路刀金留犁撓酒應劭曰徑路匈奴寶刀也金契金也金留犁飯匕也撓和也契金著酒中撓攪飲之師古曰契刻也撓攪也使者言單于甚苦軍事服繡袷綺衣繡袷長𥜗錦袷袍各一遺單于注服天子所自服也袷者衣無絮也繡袷綺衣以繡為表以綺為裏陸賈楚人以客從髙祖定天下名有口辯居左右嘗使諸侯孝文即位詔丞相平舉可使越者平言賈先帝時使越上召賈為大中大夫往使尉陀去黄屋稱制令比諸侯皆如意指蘇秦傳孝如曾参義不離其親一宿於外王乂安能使之少行千里事弱燕之危主哉匈奴傳東胡王愈驕西侵與匈奴中間有棄地莫居千里餘各居其邊為甌脫服䖍曰甌脫作土室以伺也師古曰境上候望之處匈奴歳正月諸長少會單于庭祠五月大㑹龍城祭其先天地鬼神秋馬肥大㑹蹛林課校人畜計服䖍曰蹛音帶匈奴秋社八月中皆㑹祭處師古曰蹛者繞林木而祭也鮮卑之俗自古相傳秋天之祭無林木者尚立柳枝衆騎馳遶三周乃止此其遺法疏廣父子既歸鄉里日令家設酒食請族人故舊賔客數問其家賜金餘尚幾斤趣賣以供具張景陽詠史詩揮金樂當年歲暮不留儲注云揮散也景陽詩正指二疏事尹村道中滿眼霜吹宿草根漫知新歲不逢春却疑青嶂非人世更覺黄雲是塞塵萬里張侯能奉使百年曾子肯辭親自憐許國終無用何事紛紛客此身杜詩霜霧在草根坡詩碧波青嶂非人間王涯詩雲黄知塞近草白見邊秋張侯博望侯騫也末謂雖以身許國而自謂才實無用惟當退處此公謙言也次韻王勝之詠雪萬户千門車馬稀行人却返鳥休飛玲瓏剪水空中墮的皪裝春樹上歸素髪聨華驚老大玉顔爭好羡輕肥朝來己賀豐年瑞更問田家果是非漢孝武起建章宫為千門萬户柳詩千山鳥飛絶唐顧況詩天人寜底巧煎水作花飛僧無可詩片片下玲瓏許敬宗詩白雪裝梅樹李白詩春風柳上歸潘安仁賦素髪颯以垂領古詩燕趙多佳人美者顔如玉李白詩春風玉顔畏銷歇樂天詩素壁聨題分韻句謝惠連雪賦盈尺則呈瑞於豐年韓雪詩平生未曾見何暇議是非或云豐年祥飽食可庻幾次韻酬府推仲通學士雪中見寄朝來看雪詠君詩想見朱衣在赤墀為問火城將策試何如雲屋聴牕知曲墻稍覺吹來宻窮巷終憐掃去遲欲訪故人非興盡自縁無路得傳巵梅福傳涉赤墀之塗應劭曰以丹淹泥塗殿上火城見退朝注退之詩喜深將策試驚宻仰簷窺又氣嚴當酒暖洒急聴窗知班媫妤傳仰視兮雲屋雙涕兮横流注言其黮䨴狀若雲也掃雪事見上注靈運擬鄴中詩終歲非一日傳巵弄新聲王子猷雪夜因詠招隱詩忽憶戴安道時在剡乗興棹舟經宿方至造門而返曰乗興而來興盡而返何必見安道次韻次道憶太平州宅早梅次道宋敏求也參知政事綬之子嘗為太平州歐公諸人皆有送行詩大梁春費寳刀催不似湖隂有早梅今日盤中看剪綵當時花下就傳杯紛紛自向江城落杳杳難隨驛使來知憶舊游還想見西南枝上月徘徊宋之問立春日侍宴賦剪綵花詩今年春色早應為剪刀催王敦舉兵至湖隂晉明帝㣲行眎其營壘由是樂府有湖隂曲即今太平州是也韓偓詩中宵忽見動葭灰料得南枝有早梅梁簡文梅詩定須還剪綵學作兩三枝周宗懔詩剪綵作新梅杜詩傳杯不放杯曹子建詩明月照髙樓流光正徘徊白詩西園飛蓋處依舊月徘徊次韻曾子翊赴舒州官見貽子翊名宰予居撫州訪遺文於其孫極止得其寄公詩云官居隱几望灊山不似茅簷舊日閒顧我塵沙添白髪憐君道路失朱顔江涵秋老鱸魚美岸入春風荻笋斑此味縱佳吾不樂惟思一馬返鄉闗皖城終歲靜如山官府應從到日閒一水碧羅裁繚繞萬峯蒼玉刻孱顔舊游筆墨苔今老浪走塵沙鬢已斑攬轡羡君橋北路春風枝上鳥闗闗言官無事如山林之靜元和郡國志舒州本春秋時皖國咎繇之後在漢時為皖縣屬廬江郡三國初屬魏後孫權征皖克之獲喬公二女即其地韓詩江作青羅帶山為碧玉簪公嘗為舒倅舊題最多李白詩緑字錦苔生范滂登車攬轡慨然有澄清天下之志詩闗闗雎鳩注闗闗和聲送劉和甫奉使江南和甫名敔慶厯二年及第原父之弟劉郎今日擁旌麾傳到江南喜可知上冢還須擊羊豕下車應不問狐狸無人敢勸公榮酒為我聊尋逸少池亦見嶺頭花爛漫更將春色寄相思建武二年春詔馮異歸家上冡使大中大夫齎牛酒令二百里内太守都尉以下及宗族㑹焉又宋彭南還津鄉有詔過家上冡又鮑永為司𨽻行縣西至扶風椎牛上苟諫冡諫蓋永為功曹時所事太守漢張綱奉使之部獨埋其車輪於洛陽都亭云豺狼當道安問狐狸遂劾大將軍梁冀等劉公榮與人飲酒雜穢非類人或譏之答曰勝公榮者不可不與飲不如公榮者亦不可不與飲是公榮輩者又不可不與飲故終日共飲而醉此言劉君風采之俊人不敢䙝近右軍墨池在臨川學宫公鄉里故云為我次韻張子野竹林寺二首澗水横斜石路深水源窮處有叢林青鴛幾世開蘭若黄鶴當年瑞卯金敗壁數峯連粉墨涼煙一穗起檀沉十年親友半零落囘首舊游成古今水窮見王維詩日蔵經青鴛蘭若在須彌山下青鴛或謂瓦也魏文帝問周宣吾夢殿壁兩瓦隋地化為鴛鴦寰宇志潤州劉裕㣲時常游竹林寺每息於此山常有黄鶴飛舞後改為鶴林寺故云瑞卯金傳燈録祖摩挐羅至西印土焚香而月氐國王忽睹異香成穟字書檖亦作穗杜詩素交盡零落其二京峴城南隱映深兩牛鳴地得禪林風泉隔屋撞哀玉竹月縁階貼碎金藻井仰窺塵漠漠青燈對宿夜沉沉扁舟過客十年事一夢北山愁至今一牛鳴見答張奉議注杜詩大邑燒甆輕且堅扣如哀玉錦城傳晉書此是安石碎金退之詩竹影金瑣碎泉聲玉琮琤風俗通殿堂象東井形刻作荷菱水物所以厭水石晉張允避郭威兵匿於佛殿藻井之上登者浸多板壊而墜送呉龍圖知江寜呉中復也才髙明主睠方深屬郡聞風自革心閭里不須多按治山川從此數登臨茆簷坐隔雲千里柏壟初抽翠一尋東望泫然知有寄但疑公豈久分襟魏相為揚州刺史按治郡國守相多所貶退丙吉與書朝廷深知弱翁願少謹事自重蔵器於身不顯其能也荆公居第及先壠皆在江寜故云泫然知有寄末句又言其不久於外行召歸也劉禹錫贈陳長史一自分襟多歲月相逢滿眼是淒涼選詩分袂澄湖隂分襟猶分袂王荆公詩注巻二十九
