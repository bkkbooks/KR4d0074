body:
  text: 王荆公詩注卷五十宋李壁撰律詩孫威敏公挽詞沔字元規功名一世事興廢豈人謀言士之立功名休戚關於天下非一身之計其興廢成敗非人力所能為也嘉祐間參政王堯臣死帝欲召公而未果樞密使田况病帝又屬意公言者遂力攻公守杭及并所為多不法卒由此謫重為蒼生起終隨逝水流淒涼歸部曲零落掩山丘許國言猶在姦諛可使羞沔三知慶州邊人服其能後又安撫廣南助狄青平儂冦英宗初數與執政議守邊者難其人歐陽公言慶厯罷兵以來當時更事舊人惟孫沔在雖中以罪廢然棄瑕使過正是用人之術乃以資政觀文再起帥西陲旋卒鮑昭詩將軍既下世部曲亦罕存曹子建詩零落歸山丘沔㑹稽人景祐初為御史坐言事連斥旋擢諫官益有直名後為陜西轉運使上書斥呂夷簡多忌不用正人先出鎮許昌乃薦王隨陳堯佐代已専引不若已者為自固之計欲使陛下知輔相之位非已不可兾復思巳而見用也今其求罷若復不救前過是張禹不獨生於漢李林甫復見於今帝不之罪議者以為蹇切崇禧給事馬兄挽詞二首給事名中甫廬江人晚知通進銀臺司提舉江寧府崇禧觀銀臺主封駁後改為給事中馬與公同年卒于元豐三年冬慶厯公偕起元豐我獨傷兩楹終昔夢五鼎繼前喪檀弓夢坐奠於兩楹之間孟子之後喪踰前喪前以三鼎而後以五鼎歟士祭三鼎大夫祭五鼎薰歇曽攀桂甘留所憩棠樂天賀座主拜太常詩共仰曽攀處年深桂尚薰詩甘棠蔽芾甘棠勿翦勿敗召伯所憩馬為登封縣募民鑿轘轅為通塗將漕淮南言瀕江諸州民有米而無官糴若移糴瀕江則穀售不至傷農而真揚以北無踴貴之患徙江淮發運使自洪澤鑿渠六十里以避長淮漕運之險凡此皆惠政也素風知不墜能世有諸郎君之子玗瑊璯瑺瑧皆未聞顯者瑊仕差遂其二藏室亡三篋得之公最多漢張安世傳上行幸河東嘗亡書三篋詔問莫能知惟安世識之具列其事按馬未常為館閣然父亮事仁英朝為名臣意中甫必諳知朝章國典故用安世事以比之露晞當晚景川逝作前波惠寄輿人誦悲傳挽者歌竹西攜手處漬灑一作漬淚邈山河輿人誦用子産事見左傳襄公二十九年酉陽雜俎云田橫死從者不敢哭為歌以寄哀摯虞新禮議挽歌出於漢武帝役人勞苦歌聲哀切遂以送終非古制也工部郎中嚴厚本云挽歌其來尚矣據左傳公㑹吳子伐齊將戰公孫夏卿命其徒歌虞殯示必死也馬嘗一再知揚州公必嘗與相㑹故云竹西也杜牧詩斜陽竹西路歌吹是揚州漬灑邈山河疑作漬酒謝承書言徐稚為諸公所辟雖不就有死喪負笈赴弔常於冡豫炙雞一隻以一兩綿絮漬酒中暴乾以襄雞徑到所起冢隧外以水漬綿使有酒氣斗米飰白茅為藉以雞置前醊酒畢留謁而去不見喪主公此詩意蓋言道逺不能往弔也陳動之祕丞挽詞二首年高漢賈誼官過楚荀卿望古君無憾論今我未平賈生沒時年三十三荀卿趙人仕齊三為祭酒仕楚為蘭陵令卒葬蘭陵故係之楚比君荀賈亦可無憾耳若視世之庸庸躐居顯重以君之才顧僅止此則不能不使人之不平也有風吹畫翣無日照佳城空復文章在流傳世上名其二人間三十六追逐孔鸞飛似欲來為瑞如何去不歸三十六謂動之所得之年以前篇年高漢賈誼之句考之即可見唐書人瑞有鄭仁表琴樽已寂寞筆墨尚光輝空復平生友西華豈易依劉峻見任昉諸子西華兄弟等流離不振平生舊友莫有收恤西華冬月著葛帔練裙路逢峻峻泫然矜之乃廣朱公叔絶交論劉溉見其論扺几於地終身恨之公用此事必有所指贈尚書工部侍郎鄭公挽詞苕溪胡仔云鄭兵部仲賢工部文寶不知其果一人耶果二人耶趙清父云按國史鄭文寶字仲賢此當是指文寶也地蟠江漢久知靈通德門中見老成左太沖蜀都賦近則江漢炳靈世載其英鄭康成通德門南去伏波推將略北來光祿擅詩名馬援為伏波將軍小杜寄宣州鄭諫議詩五言寧謝顔光祿百歲須齊衛武公嚴武詩可似步兵偏愛酒也知光祿最能詩光祿謂謝莊顔延年皆為光祿密章贈襚連三組畫翣喪車載一旌劉禹錫為杜司徒謝追贈表紫書忽降於九重密印加榮於厚夜印即章權載之渾瑊墓銘亦曰襚印易名以尊以飾又王定神道碑銘云密印金貂襚于墓門王崇術神道碑銘云沒代流慶密章下賁李國真神道碑銘曰煌煌密章肅肅絲言杜牧上周相公書楊僕三組垂腰蘇秦六印在手楊僕傳懷銀黃垂三組師古曰銀銀印也黃金印也僕為主爵都尉又為樓船將軍并封梁侯故云三組翣者車飾也檀弓下曰周人牆置翣董勛答問曰翣似屏風人持隨車前後左右也檀弓上曰銘明旌也以死者為不可別故以其旌識之隂德故應多後福可能生子但升卿後漢虞詡上疏薦議郎左雄曰今公卿類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福虞詡祖父經曰吾決獄六十年矣雖不及于公其庶幾乎子孫何必不為九卿故詡字升卿致仕虞部曲江談君挽詞同時獻賦久無人握手悲歡迹巳陳李端贈康洽詩同時獻賦人皆盡共壁題詩君獨存蘭亭序俯仰之間巳為陳迹他日白衣霄漢志暮年朱紱水雲身杜詩空餘棟梁具無復霄漢志杜牧詩水雲蹤跡去悠悠虛容劍几今長夜小隱山林秖舊春豈惜埋辭追往事齒衰才盡獨傷神宋鮑昭蒿里歌虛容遺劍佩美貌戢衣巾退之王適銘鑽石埋辭以列幽墟才盡用江淹事馬玘大夫挽詞冠蓋青門道知君自少時漢長安有青門取以為比從容他日喜奄忽暮年悲江月明丹旐湖風冷繐帷音容雖可想才力竟何施小杜祭韓公文想像音容思惟恩紀公有祭玘文稱其剸劇撥煩為時能吏蘇才翁挽詞二首空餘一丹旐無復兩朱輪寂寞蒜山渡陂陀京口原音容歸繪畫才業付兒孫尚有故人淚滄江相與翻按才翁名舜元祖易簡參知政事父耆終工部郎中直史館娶王文正公之女生三子皆有才名而才翁最長七歲能為歌詩文正公愛且竒之奏授同學究出身時詔復唐進士科而新令門選者不得與焉君乞還所有官應詔不得報乃上所著文章召學士院試賜進士出身後浸顯以弟舜欽謫死湖州求江吳一郡平居談辨唐數百年間喜稱魏鄭公諫諍裴晉公德業李臨淮將兵衛公處邊事劉忠州通流財利韓退之文章類此數人而巳其議當世人物亦以之為標的於人少所稱許至有同班列偕出入漫不省記以是豫者益少然涖官當事定慮果決所至制束强黠敦尚風儀其為文不迹故陳自為高古雖所不與者亦不能掩也退之祭嫂文水浮陸走丹旐翩然韓詩云慷慨為悲咤淚如九河翻其二翰墨隨談笑風流在弟兄浮名同逆旅壯志負平生使節何年去喪車故老迎悠悠京口外落日照銘旌張耒明道雜志稱才翁之詩與翰墨皆過子美而世人不盡知也范公希文嘗為才翁作黃素小楷伯夷頌書尾云書禮亦要切磋未是處無惜見教時皇祐三年才翁以度支郎中為京西轉運使范公為青社才翁又有詩謝范公及潞公題跋云台文競耀高逾麗化筆交揮老更閒王中甫學士挽詞王介衢州人嘉祐六年與二蘇同中制科同學金陵最少年奏書曽用牘三千盛名非復居人後壯歲如何棄我先齊東昏侯明帝子帝嘗戒曰作事不可在人後賈充謂庾純君行常居人前今何以在後三千牘見史記東方朔傳中甫仁宗時以制策登科故詩有牘三千盛名之句東坡亦嘗為作挽詩遺其子沇之種橘園林無舊業採蘋洲渚有新篇蒜山東路春風緑埋沒誰知太守阡種橘用李衡劉長卿送李中丞詩罷歸無舊業老去戀明時據諸公多言介心疾故公前詩戲以白蘋洲渚正滄波之句今又及蘋洲事疑猶前意劉貢父在試院因爭畜字與介忤後與歐公書云某愚戅孤蹇前在試院不幸與小人共事論議之間為所詬辱既素知其心病狂易都與包含隱忍未嘗酬對據此則介之心疾似有之矣王逢原挽詞逢原名令廣陵人纍見前注公嘗銘其墓蒿里竟何在死生從此分謾傳仙掌籍誰有鬼修文神仙傳拾遺木公亦云東王父亦云東王公亦號玉皇君真僚仙官巨億萬計各有所職皆稟其命而朝奉翼衛故男子得道者名籍𨽻焉白樂天詩但恐長生須有籍仙臺試為檢名看鬼修文真誥卜商等為地下修文郎蔡琰能傳業侯芭為起墳傷心北風路吹淚濕江雲韓詩中郎有女能傳業伯道無兒可保家中郎謂蔡雍琰其女也言逢原無子僅有女揚雄傳雄天鳳五年卒侯芭為起墳喪之三年令葬常州武進縣葛興祖挽詞興祖名良嗣年四十餘始以進士出仕州縣餘十年窮於無所遇以死公嘗銘其墓云憶隨諸彥附青雲場屋聲名看出羣興祖當天聖嘉祐間兄弟皆以文有聲赫然屢試進士角出其上孫寶暮年猶主簿卜商今日更修文孫寶傳御史大夫張忠署寶主簿徙舍祭竈請比鄰忠使所親問今兩府高士俗不為主簿子既為之徙舍甚說何前後不相副也興祖卒於許州長社簿山川凜凜平生氣草木蕭蕭數尺墳欲寫此哀終不盡但令千載少知君介甫志興祖墓追悼甚切王子直挽詞多才自合至公卿豈料青衫困一生劉貢父作子直哀詞亦云神峻清而骨單吾固亦以君為疑然則王之不為公卿亦自其骨相屯耳太史有書能敘事子雲於世不徼名曽子固序吾友王氏兄弟曰回深父曰向子直曰冏容季皆善屬文長於敘事深父尤深而子直容季皆能稱其兄也司馬遷傳自劉向揚雄博極羣書皆稱遷有良史才服其善敘事理辨而不華質而不俚揚雄不汲汲於富貴不戚戚於貧賤不修亷隅以徼名當世丘墳慘淡箕山緑門巷蕭條潁水清握手笑言如昨日白頭東望一傷情孫適挽詞曽南豐嘗為適書墓見本集喪車上新壟哀挽轉空山名與碑長在魂隨帛暫還檀弓重主道也注始死未作主以重主其人也今人始死結帛為之謂之魂帛亦主道也無兒漫黃卷有母亦朱顔俯仰平生事相看一夢間處士葛君挽詞楚人黃歇地晉代葛洪家獨一作特擅山川秀相承黻冕華猗君有清尚於世不雄誇令子能傳業流光未可涯據春申君所都乃故吳國即無錫惠山上有春申君廟疑此地近之或言黃州十五里許有永安城圖經以為春申君故城非也晉書葛洪丹陽句容人丹陽與無錫接近據此則黃州圖經之誤甚明據洪祖係吳大鴻臚父偉晉邵陵太守洪位散騎常侍領大著作追傷河中使君修撰陸公三首名經字子履文采機雲後知名實妙年銀鈎工壯麗金薤富清妍韓詩臨風一揮手金薤垂琳琅謂文彩也非字畫之謂批鳳多新貴憑熊數外遷空令猗氏監遺愛有良田中書謂之鳳池未見批字出處李藩為給事中制有不便就敕尾批却之給事屬門下省不應言批鳳也據齊高帝使江夏王學鳳尾一字便工帝以玉麒麟賜之蓋諸侯牒奏皆批曰諾諾字有尾若鳳焉漢制公列侯安車倚鹿較伏熊軾又杜牧詩曽經觸蠆尾猶得憑熊軒九域志河中府猗氏以猗頓所居因為猗氏其二皖城初得故人詩歎息龍媒踠壯時言得詩未久陸巳亡儲光羲詩君門峻且深踠足空夷猶太史滯留終不偶中郎制作遂無施太史公留滯周南不得與從事中郎制作謂蔡雍也雍為漢史以被誅竟不就二千石祿今何有四十車書昔謾知劉夢得詩謾讀圖書四十車年年為郡老天涯又醉酒一千日儲書四十車又張華徙居書三十車海曲冷雲埋拱木延州空掛暮年悲僖公三十二年爾何知中壽爾墓之木拱矣注云合手曰拱言其過老不可用李白詩獨掛延陵劍千秋在古墳又云悲來欲脫劍掛向何枝好其三前旌一幅粉書銘行路知君亦涕零遂失詞人空甫里謾留悲鶴老華亭甫里謂龜䝉也華亭士衡也皆陸氏事主張壽祿無三甲收拾文章有六丁管輅言吾額上無生骨眼中無守精鼻無梁柱腳無天根背無三甲腹無三壬皆不壽之驗樂天哭皇甫七詩多才非福祿薄命是聰明亦此意退之詩平生千萬篇金薤垂琳琅仙宮敕六丁雷電下取將異人記上元中道士王逺知善易知人死生禍福作易總十五卷於是一日雷雨風霧中一老人叱曰所泄者何在上帝命吾攝六丁雷電追取逺知惶懼據地旁有六丁人青衣巳捧書去矣詩話云嘉祐初王文公陸子履同在書林日者王生一日見兩公言自此十五年出將入相顧學士無背仕宦齟齬多難且壽不滿六十官不至侍從皆如其言子履死家人夢云帝命同宋次道修官制凡吾平生所著職官書可盡焚之未幾朝廷果修官制焉歸處仙龕應不逺新墳東見海山青白公詩近有人從海上回海山深處見樓臺中有仙龕虛一室多傳此待樂天來悼慧休休公遂不起難料復難忘玉骨隨薪盡空留一分香古詩易知復難忘觀音經一分奉多寶佛塔永壽縣太君周氏挽詞二首周氏鄧忠臣母也永壽開新邑長沙返舊塋金葩冷鈿軸粉字暗銘旌薤久露難濕蘭餘風尚清慶鍾知有在令子合升卿其二子引金閨籍身開石窖封選詩繆通金閨籍成二年辟司徒之妻齊侯與之石窖靈輴悲吉路象服儼虛容詩君子偕老云象服是宜箋云象服謂揄翟闕翟也楚挽雖多相萊衣不更縫誰知逝川砥劍自喜相從萊衣老萊子戲綵之服退之集挽歌云鳳飛終不返劍化㑹相從淵師示寂公自題云殊勝淵師八十餘因見訪問之近來如何答曰隨緣而巳至示寂作是詩寄託荒山鬼與鄰一生黃卷不離身杜牧之詩竄逐空山與死同參同契委時去害依託丘山循游寥廓與鬼為鄰化形而仙淪寂無聲黃卷謂經卷百年薪盡隨緣去莫學緇郎更誤人薪盡巳見上注唐書崔𦙍𫝊𦙍父愼由晚無子遇浮圖以術求乃生𦙍字緇郎及為相其季父濬唶曰吾父兄刻苦以持門户終為緇郎壞之弔王先生致處士生涯水一瓢行年七十更蕭條老妻稻下收遺秉稚子松間拾墮樵詩小雅大田彼有遺秉此有滯穗注秉把也雖有聲名高後世且無饘粥永今朝窮魂散漫知何處甬水東西不可招史記越王夫差於甬東賈逵注甬東越東鄙甬江東也韋昭曰勾章縣東夾口外洲也據此則王君必越州人劉得仁弔人詩云君苦為詩身到此氷魂雪魄巳難招哭張唐公堂一作棠邑山林久寂寥屬車前日駐雞翹𡨕𡨕獨鳳隨雲霧一作知何處南陌空聞引葬簫以下注闕宋中道挽詞文史傳家學聲名動帝除蘭堂空作賦金匱不讐書勝事悲疇昔清談想緒餘吹簫索上去歸國有魂車葛郎中挽詞二首卷卷繐帷輕空堂晝哭聲衣冠遺故物杯案若平生白馬有悲送赤車非古行低徊九原日光景在銘旌其二蠻荆長往地湖海獨歸時旅櫬蛟龍護銘旌雁鶩隨此生要有盡何物告無期一片幽堂石公知我不欺王荆公詩注卷五十
