body:
  text: 王荆公詩注卷十四宋李壁撰古詩和甫如京師微之置酒王晳字微之時知江寧季子將北征貂裘解亭臯蘇秦黑貂之裘弊使君擁鳴騶出餞載酒醪作詩寵行色坐客多賢豪信知大夫才能賦在登髙涉屺憂未已强歌反哀號詩陟彼屺兮瞻望母兮長歌之哀過於慟哭時介父新免母喪餘哀未忘問言歸何時逮此冬風叨川塗良阻修箠轡慎所操黃屋初啓聖黃屋謂英廟即位初也萬靈歸一陶詢謀及疏賤拔取皆時髦往矣果有合可辭州縣勞漢梁竦州縣之職徒勞人耳别孫莘老莘老名覺髙郵人胡安定之髙弟是王令一輩人與公素厚神宗欲革積弊覺言弊不可不革革而當其悔乃亡上謂左右曰孫覺頗知理據此詩之作必在公未變法之前莘老嘗為宣州太平縣令疑此是合肥簿滿秩入都注令時介甫後自羣牧出憲江東莘老時猶在太平公集有與莘老一書論朋友切磨及鹽稱子事亦可見二公情分始未嘗不同後卒以論新法故異耳逢原未熟我已與子相知自吾得逢原知子更不疑把手湖上舟望子欲歸時茫然乃分散獨背東南馳寥寥西城居邂逅與子期雞鳴人省門朱墨來紛披含意不自得强顔聊爾為㑹合常在夜青燈照書詩往往並衾語至明不言疲匆匆捨我去使我當從誰送子不出門我身方羈縻我心得自如今與子相隨隨子至湖上逢原所嘗嬉想見荷葉盡北風卷寒漪巳懷今日愁更念昔日悲相逢亦何有但有鏡中絲寄丁中允丁寶臣字元珍晉陵人以太子中允知剡縣今詩題故稱中允也元珍以文行稱東南多學者而湖杭尤盛多元珍所成就云人生九州間泛泛水中木漂浮隨風波邂逅得相觸始我與夫子得官同一州相逢皆偶然情義乃綢繆我於人事疏而子久已修磨礲以成我德大不可酬乖離今六年念子未嘗休豈不道相逢但得頃刻留歡喜不滿顔長年抱離憂古人有所思千里駕車牛嵇康傳東平吕安服康髙致每一相思輒千里命駕如何咫尺間介甫為鄞縣元珍在剡故云咫尺而不與子遊顧惜五斗米淵明事無辜自拘囚念彼磊落者心顔兩慙羞剡山碧榛榛剡水日夜流山行苦無巇水淺亦可舟使君子所善來檄自可求何時有來意待子南山頭歐公元珍墓表言君治州縣聽决精明賦役有法民畏信而便安之始治剡如此後治諸暨以才行召用久在館閣示平甫弟汴渠西受崑崙水崑崙水黃河也五月奔湍射蒿矢蒿矢猛矢也髙淮夜入忽倒流崎岸相看欲生觜司馬相如宜春宫賦臨曲江之隑州隑即崎字萬檣如山矻不動嗟我仲子行亦止自聞留連且一月每得問訊猶千里老工取河天上落老工水工也存中筆談自汴流堙澱水皆髙出隄外伏礫邅沙卷無底土橋立馬望城東數日知有相逢喜牆隅返照媚槐榖榖楮也池面過雨蘇篁葦欣然把酒相與閒所願此時無一詭豈無他憂能老我付與天地從今始付與天地語所造至是益髙他人不足與及此故以語平父晦翁在史院酒半嘗為余誦此二句意氣甚偉閉門為謝載酒人外慕紛紛吾已矣載酒揚雄事見前憶蔣山送勝上人蒼藤翠木江南山激激流水兩山間山髙水深魚鳥樂車馬迹絶人長閒退之詩水聲激激風生衣雲埋樵聲隔葱蒨月弄釣影臨潺湲黃塵滿眼衣可濯夢寐惆悵何時還相國寺啓同天道場行香院觀戲者侏儒戲場中一貴復一賤心知本自同所以無欣怨優人宣言人將官職只好作奉使借官看人之處世亦何異戲者哉只作侏儒看又何欣怨之有馬上轉韻此詩疑不類介甫作三月楊花迷眼白四月栁條空老碧年光如水儘東流風物看看又到秋人世百年能幾許何須戚戚長辛苦富貴功名自有時簞瓢捽茹亦山雌揚子修身篇山雌之肥其意得乎回之簞瓢癯如之何曰明明在上百官牛羊亦山雌也暗暗在上簞瓢捽茹亦山雌也何其癯詩意言雖處隱約貧困而泰然自足乙巳九月登冶城作冶城即謝安王羲之所登處見上注欲望鍾山岑因知冶城路躋攀隱木杪稍記曾遊處紅沉渚上日蒼起榛中霧即事有哀傷山川自如故過劉貢甫貢父名攽敞弟也同中進士科治平末趙槩薦攽可備文館中丞王綯御史蘇宷共排之既試入優等當除直館時攽為屯田員外郎例不為校勘而執政止擬校勘以人言故也神宗手詔推求太祖諸孫屬近行髙者為王以奉太祖後攽時為禮官曰禮諸侯不得祖天子太祖傳天下於太宗猶商及王大統所在繼體之君皆太祖子孫不當别更置後謂宜德昭德芳世世勿降爵從祀宗廟從之講官建言願得坐講下或以為可從攽執常禮謂不當坐且云人主命之坐與人主不命而請之逆順分矣卒如攽言熙寧十年召為國史編修官御史言攽昔在館擲帽為戲不可任史職宰相為辨之持其奏不下攽亦辭换開封府判官元祐初召為中書舍人卒年六十七初司馬光奏攽與劉恕同修資治通鑑至是書成而恕巳亡攽請於朝為官其一子歐陽公始在政府首薦攽辭學優贍履行清謹記問該博可以備朝廷詢訪曾鞏掌外制舉攽自代云竊以謂引拔衆材彌綸世務至於博學之士固宜用在朝廷況今聖學髙明究極今古凡在左右備顧問之臣尤須多識前載然後能稱其職如攽所長實允兹選蘇軾乞留攽奏云按攽名聞一時身兼數器文章爾雅博學强記政事之美如古循吏流離困躓守道不回此自朝廷之所知不待臣區區誦說但以人才之難古今所病舊臣日以衰老新進長育未成如攽成材反在外服此有志之士所宜為朝廷惜也張耒祭公文有云有問於子歸如得師直貫旁穿水决矢飛一時書林衆俊並馳滿堂賢豪視子麈揮逸足竒毛不受絏羈擯守列郡吏畏民思又云誰與子仇敗子百方雖然今日竟何有亡去年約子遊山陂公嘗和貢父詩云何時扁舟却顧我還欲與子遊山陂今者仍為大梁客天旋日月不少留稱意人間寧易得天明徑欲相就語雪霰填城萬家白冬風吹鬛馬更驕一出何由問行迹能言竒字世巳少終欲追攀豈辭劇劇言勞劇之劇枕中鴻寶舊所傳劉向傳上復興神仙方術之事而淮南有枕中鴻寶苑祕書更生父德武帝時治淮南獄得其書更生幼而讀誦以為竒飲我寧辭酒或索索盡也吾願與子同醉醒顔狀雖殊心不隔故知今有可憐人回首紛紛斗筲窄左傳子産曰人心不同如其面然今反用謂貌異心同也可憐人指貢父估玉潼關西上古藍田太平寰宇志藍田縣屬雍州周禮職方氏曰玉之美者曰珠其次曰藍蓋以縣出美玉故名藍田又有藍田山有氣鬱鬱髙拄天雄虹雌霓相結纒晝夜不散非雲煙春秋元命苞雄曰虹雌曰霓至寶所在其上必有光氣新垣平言臣望東北汾隂有金寶氣意周鼎其出乎秦人挾斤上其巔視氣所出深鑱鐫得物盈尺方且堅以斤試叩聲泠然持歸市上求百錢人皆疑嗟莫愛憐大梁老估聞不眠操金喜取走蹁躚深藏牢包三十年光怪鄰里驚相傳欲獻天子無由緣朝廷昨日鐘鼓縣呼工琢圭置神筵按國史皇祐二年四月禮院言季秋饗昊天上帝及五方帝於明堂當用四圭有邸青圭赤璋白琥黝璜黃琮各一并薦饗景靈宫用四圭有邸一凡七玉檢㑹慶歷七年郊制昊天上帝玉用蒼璧及詳開寶通禮明堂祀昊天上帝玉用四圭有邸今請如通禮望下三司令所屬㑹少府擇嘉玉預行修製詔禮官詳定禮神玉及燔玉制度以聞禮院又言若用景表尺即與黍尺差近恐真玉難得大者請以本院先定依聶宗義所說指尺為度製造從之公此詩當是作於皇祐初緣詩有神筵之語為明堂設也玉材細瑣不中權賈孫抱物詔使前紅羅復疊帕紫氊發視紺碧光屬聯詔問與價當幾千衆工讓口無敢先嗟我豈識厖與全考工記玉人之事天子用全上公用龍鄭司農注云全純色也龍當作厖厖雜色也信都公家白兔時歐陽公巳位侍從爵信都縣開國男水晶為宫玉為田常娥縞衣洗朱鉛宫中老兔非日浴天使潔白宜嬋娟典略白兔者明月之精莊子鵠不日浴而白抱朴子曰兔夀千五百嵗其兔白嬋娟謂嫦娥也揚鬚弭足桂樹間桂花如霜亂後前赤鴉相望窺不得空疑兩瞳射日丹東西跳梁自長久天畢橫施亦何有詩大東有救天畢載施之行注畢所以掩兔也何嘗見其可用乎憑光下視置罔繁衣褐紛紛謾回首去年驚墮滁山雲出入墟莽猶無羣竒毛難藏果亦得千里今以窮歸君空衢險幽不可返食君庭除嗟亦窘令豫得為此兔謀豐草長林且遊衍金樓子狐白之裘天子被之而坐廟堂為狐計者不若走於平澤詩稱得為此兔謀必本諸此據歐公白兔後卒逸去疑公不欲違物性而縱之託言失之耳公有思白兔雜言答梅公儀憶鶴之作今附於此君家白鶴白雪毛我家白兔白玉毫誰將贈兩翁謂此二物皎潔勝瓊瑶巳憐野性易馴擾復愛仙格何孤髙玉兔四蹄不解舞不如雙鶴能清嘷低垂兩翅趁節拍婆娑弄影誇嬌嬈兩翁念此二物者久不見之心甚勞京師少年殊好尚意氣橫出爭雄豪清樽美酒不輒飲千金爭買紅顔韶莫令少年聞我語笑我乖僻遭譏嘲或被偷開兩家籠縱此二物令逍遙兔奔滄海却入明月窟鶴飛玉山千仞直上青松巢索然兩衰翁何以慰無憀纎腰緑鬢既非老者事玉山滄海一去何由招車螯二首沈存中云車螯即魁蛤也紹聖三年始詔福唐與明州嵗貢車螯肉柱五十斤俗謂之紅密丁東坡所稱江瑶柱是也車螯是大蛤一名蜃能吐氣為樓臺海中春夏間依約島溆常有此氣車螯肉甚美由美得烹燔殼以無味弃弃之能久存豫嘗憐其肉柔弱甘咀吞又嘗怪其殼有功不見論醉客快一噉散投牆壁根寧能為收拾持用謁醫門本草云殼能治瘡癤腫毒其二車螯肉之弱恃殼保厥身自非身有求不敢微啓唇尚恐擉者得莊子公閲休冬則擉鱉於江泥沙常埋湮往往湯火間身盡殼空存維海錯萬物口牙工咀吞爾無如彼何可畏寧獨人言海之百怪亦善吞噬不獨人能捕爾也無為久自苦含匿不暴陳豁然縱所如游蕩四海滣言畏禍太甚徒自苦耳不如蕩然肆志未必逢患也此言蓋有所託清波濯其汙白日曬其昏死生或有在豈遽得烹燔詩意似有所譏與平甫同賦槐冰雪泊楚岸萬株同飄零春風都城居初見葉青青嵗行如車輪䕃翳忽滿庭秋子今在眼何時動江舲言槐已實而未能歸此詩八句而該四時全不促迫而優游有餘其妙如此甘棠梨甘棠詩所歌自足誇衆果蔽芾甘棠勿翦勿伐注甘棠杜也又小雅有枤之杜有睆其實則實者梨是也又山海經崑崙有木焉其狀如棠而黃葉赤實其味如李而無核名曰沙棠梨食之令人不溺亦甘棠梨之類愛其凌秋霜萬玉懸磊珂園夫盛採摘市賈爭包裹車輸動盈箱舟載輒連柁朝分不知數暮在知幾顆但使甘有餘何傷小而橢圓而長曰橢爾雅􅜽小而橢注謂狹而長也主人捐千金飣餖留四坐柑椑與橙栗在口亦云可都城紛華地內熱易生火問客當此時蠲煩孰如我獨山梅花獨山在宣州溧水縣距建康屬耳又有獨水獨山梅花何所似半開半謝荆棘中美人零落依草木志士憔悴守蒿蓬亭亭孤艷帶寒日漠漠遠香隨野風移栽不得根欲老回首上林顔色空空者如空羣之空言上林花皆不足進同昌叔賦雁奴雁宿於江湖之岸沙渚之中動計千百大者居其中令雁奴圍而警察南人有採捕者俟其天色隂暗或無月時於瓦罐中藏燭持棒者數人屏氣潛行將欲及之則略舉燭便藏之雁奴驚叫大者亦驚頃之復定又如前舉燭雁奴又驚如是數四大者怒啄雁奴秉燭者徐徐逼之更舉燭則雁奴懼啄不復動矣乃髙舉其燭持棒者齊入羣中亂擊之所獲甚多昔有淮南人張凝評事話之此人親曽採捕出玉堂閒話蔡寬夫詩話云雁有小而善鳴者謂之雁奴每羣宿輒往來巡視不瞑蓋亦物之能愛其類者江湖間捕雁必先以計殺雁奴然後羣雁可得宋景文公嘗著其說云鴻雁無定棲隨陽以南北嗟哉此為奴至性能􅈤惻人將伺其殆奴輒告之亟舉羣寤而飛機巧無所得夜或以火取奴鳴火因匿頻驚莫我捕顧謂奴不直嗷嗷身百憂泯泯衆一息相隨入矰繳豈不聽者惑偷安與受紿自古有亡國君看雁奴篇禍福甚明白此猶忠臣為國家計繩昏警惰衆既不喜又共嫉之詩哀鳴嗷嗷此言雁奴身懷百憂而衆雁安眠也相隨言既不用事敗相隨俱死如吳張悌唐王彥章類是也老樹去年北風吹瓦裂牆頭老樹凍欲折蒼葉蔽屋忽扶疏野禽從此相與居禽鳴無時不可數雌雄各自應律吕我牀撥書當午眠能驚我眠聒我語古詩鳥鳴山更幽我念不若鳴聲收但憂此物一朝去狂風還來欺老樹此詩託意甚深當是更張後作屋一作屈梁王藉僧祐之子也嘗游若邪溪賦詩其略曰蟬噪林逾靜鳥鳴山更幽當時以為文外獨絶公詩又有云茅簷相對坐終日一鳥不鳴山更幽賦棗得燭字種桃昔所傳種棗豫所欲在實為美果論材又良木餘甘入鄰家尚得饞婦逐王吉傳東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦況余秋盤中快噉取饜足風包墮朱繒日顆皺紅玉贄享古巳然豳詩自宜録左氏女贄不過榛栗棗修以告䖍詩豳風八月剝棗緬懷青齊間萬樹䕃平陸誰云食之昏匿知乃成俗范蔚宗香譜棗膏昏鈍廣庭觴聖夀以此參肴蔌願此赤心投皇明儻豫燭梁蕭琛嘗侍宴醉伏上以棗投琛琛乃取栗擲上中面中丞在席帝動色曰此中有人不得如此豈有說也琛曰陛下投臣以赤心臣敢報之以戰栗飛雁奉使時作飛雁冥冥時下泊稻粱雖少江湖樂人生何必慕輕肥辛苦將身到沙漠漢時蘇武與張騫萬里生還但偶然丈夫許國當如此男子辭親亦可憐沙漠中賦飛雁不怨自非怨又難為語言至淺淺許有反覆無窮之味王荆公詩注卷十四
