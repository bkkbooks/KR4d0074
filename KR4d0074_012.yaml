body:
  text: 王荆公詩注卷十二宋李壁撰古詩孔子聖人道大能亦博史記顔子曰夫子之道至大故天下莫能容學者所得皆秋毫雖傳古未有孔子蠛蠓豈足知天髙公孫丑子貢曰自生民以來未有夫子者也如公言則子貢為蠛蠓耶莊子丘之於道也其猶醯雞與注醯雞者甕中之蠛蠓桓魋武叔不量力欲撓一草搖蟠桃桓魋欲殺孔子叔孫武叔毁仲尼猶蚍蜉而撼大樹顔回已自不可測至死鑽仰忘身勞言顔回所造已深於夫子猶有髙堅之歎揚雄三首孔孟如日月委蛇在蒼旻光明所照耀萬物成冬春揚子出其後仰攀忘賤貧衣冠眇塵土文字爛星辰嵗晚天祿閣強顔為劇秦雄劇秦美新見於文選注云雄仕莽朝見莽數害正直之臣恐已見危故著此文以秦酷暴之甚以新室為美將悅莽意求免於禍非本情也趨捨迹少邇邇字恐是遠字或苟字又謂迹若淺近然行藏意終鄰壤壤外逐物貨殖傳天下壤壤皆為利往紛紛輕用身往者或可返吾將與斯人其二子雲遊天祿華藻鋭初學法言今之學者非特為之華藻也覃思晚有得晦顯無適莫雄始好詞賦擬相如以為式晚以為賦勸而不止頗似俳優非法度所存於是輟不復為而大覃思渾天倣周易作太玄象論語作法言泛然而仕不以顯晦纍心故三世不徙官寥寥鄒魯後於此歸先覺豈嘗知符命何苦自投閣莽既以符命自立劉歆子棻獻之莽投棻四裔辭所連及便收不請時雄校書天祿閣使者來欲收雄雄從閣上自投下幾死莽聞之曰雄素不與事何故在此故曰豈嘗知長安諸愚儒操行自為薄謗嘲出異已傳載固疏略言此事出於愚儒以已度雄又有嫉雄而造謗者史官不察因遂實之而雄焉有是孟子勸伐燕伊尹干説亳扣馬觸兵鋒食牛要祿爵小知羞不為況彼皆卓犖史官蔽多聞自古喜穿鑿武王伐紂伯夷叔齊扣馬而諌左右欲兵之太公曰此義人也扶而去之扣馬之諌恐不應與食牛負鼎同指為不可信萬章上或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦繆公曾子固言前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆斷以為非伊尹孔子之事蓋以理考之知其不然也觀雄之所樹立故介甫以謂世傳其投閣者妄也豈不猶孟子之意哉其三子雲平生人不一作莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無幾聖賢樹立自有師人知不知無以為俗人賤今常貴古子雲今存誰汝數漢文帝輕刑死人衆文帝十三年詔夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也其除肉刑有以易之是後外有輕刑之名內實殺之喪短生者偷孟子齊宣王欲短喪漢文遺詔云朕既不德亡以佐百姓今崩又使重服以離寒暑之數然則前此民間皆服三年喪也堯崩三載四海遏密八音禮大功九月小功五月緦三月遺詔云其令天下吏民令到出臨三日皆釋服又云服大紅十五日小紅十四日纖七日是教人以偷薄仁孝自此薄哀哉不能謀露臺惜百金周人之金以鎰計漢人之金以斤計斤方寸而重一斤也惠帝初即位賜將軍四十斤鄭氏計四十金四十斤也孝文言百金中人十家之産然則一金非今一兩之謂灞陵無髙丘七年初置南陵即灞陵也灞陵因山為藏不復起墳在長安南故王粲詩云南登灞陵岸回首望長安淺恩施一時長患被九州秦始皇天方獵中原狐兔在所憎傷哉六孱王張耳傳貫髙曰吾王孱王也當此鷙鳥膺始皇紀注鷙鳥鶻膺突向前其性悍勇摶取已掃地翰飛尚憑凌逝將跨蓬萊以海為丘陵始皇二十八年齊人徐市等上書言海中有三神山名曰蓬萊方丈瀛洲仙人居之請得齋戒與童男女求之於是遣徐市發童男女數千入海求仙人勒石頌功德羣臣助驕矜始皇作琅琊臺立石刻頌功德末云羣臣相與誦皇帝功德刻千金石以為表經舉世不讀易但以刑名稱蚩蚩彼少子何用辨堅冰秦焚書既專事刑名獨易以卜筮之書雖免於焚而不讀矣胡亥始皇之少子韓信韓信寄食常歉然邂逅漂母能哀憐信傳家貧無行常從人寄食至城下釣有一漂母哀之飯信當時噲等何由伍但有淮隂惡少年信出門笑曰生乃與噲等為伍又信微時淮隂少年侮信令出跨下信王齊召以為中尉曰此壯士也觀此則少年亦信之徒非噲等敢望誰道蕭曹刀筆吏從容一語知人意信數與蕭何語竒之信亡何不及以聞追之班固贊曰蕭何曹參皆起秦刀筆吏壇上平明大將旗舉軍盡驚王不疑王召信拜為大將何曰王素嫚無禮此乃信所以去也王必欲拜之擇日齋戒設壇場具禮乃可王許之諸將皆喜人人各自以得大將至拜乃韓信也一軍盡驚摶兵擊楚濉半涉一作救兵半楚濰半涉從初龍且聞信怯龍且救齊與信夾濉水陳信乃夜令人為萬餘囊滿沙壅水上流引軍半渡擊且佯不勝還走且果喜曰固知信怯也遂追信渡水信使人決壅囊水大至且軍大半不得渡即急擊殺且鴻溝天下巳橫分談笑重來卷楚氛羽自知少助食盡信又進兵擊楚羽患之乃與漢約中分天下割鴻溝以西為漢以東為楚漢王欲歸張良陳平諌乃徴信引兵會垓下遂滅楚襄二十七年趙孟曰楚氛甚惡懼難但以怯名終得羽誰為張費兩將軍少年侮信雖長大好帶劍怯耳信熟視俯出其跨下一市皆笑信以為怯然則信自微時巳有怯名矣漢五年信將三十萬垓下自當羽孔將軍居左費將軍居右髙帝在其後絳侯柴武在髙帝後此言兩將軍猶腹背之毛其實當羽者信也觀史記乃孔將軍諸本作張字誤叔孫通先生秦博士秦禮頗能熟通秦時以文學徴待詔博士後以對羣盜特鼠竊二世説拜為博士言但知秦禮而已不足以知三代之禮樂也量主欲有為兩生皆不欲始漢儀務為簡易羣臣醉至拔劍擊柱通知上益厭之説上曰禮因時世人情為之節文臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之此云量主欲有為者為是也方通徴魯諸生有兩生不肯行曰吾不忍為公所為公所為不合古吾不行公往矣無汚我草具一王儀草具謂綿蕝也漢贊叔孫通舍枹鼓而立一王之儀羣豪果知肅漢七年長樂宫成諸侯朝十月始用所制儀自諸侯王以下莫不震恐肅敬黃金既遍賜通為朝儀竟賜金五百斤既出皆以賜諸生短衣亦已續儒術自此凋何為反初服通始降漢儒服漢王憎之乃變其服短衣楚製至是始易其衣不復為短衣楚辭退將復修吾初服意言通既自貶以從時雖返儒服何益東方朔平原狂先生隱翳世上塵禇先生續滑稽傳云朔上書用三千奏牘詔拜為郎數賜縑帛擔揭而去人主左右諸郎半呼之為狂人朔嘗行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者也古之人乃避世於深山中時坐席中酒酣據地歌曰陸沉於俗避世金馬門宫殿中可以全身何必深山之中蒿蘆之下材多不可數上知朔多端召問朔何恐侏儒為材多不可數亦多端之意射覆亦絶倫朔稍得親近上嘗使諸數家射覆不能中朔得之連中輒賜帛談辭最詼怪發口如有神朔雖談笑然觀察顔色直言切諌陳軫曰軫可發口言乎以此得親幸賜豫頗不貧滑稽傳云建章宫後閣有物出焉其狀如麋朔曰所謂騶牙者也遠方當來歸義後混邪王來降漢乃復賜東方生錢財甚多金玉本光瑩泥沙豈能堙時時一悟主驚動漢庭臣舍人所問朔應聲輒對變詐鋒出莫能窮者左右大驚上以朔為常侍郎遂得愛幸朔斥董偃不得侍酒宣室且言偃以人臣私侍公主敗化亂禮傷王制乃國家之大賊人主之大蜮罪當斬又言淫亂之漸其變為篡上為更置酒北宫又諌廢苑囿陳孝文時事以諷時時一悟主謂此也不肯下兒童本傳自公卿在位朔皆傲弄無所為屈故言不肯下兒童敢言詆平津上嘗問朔方今公孫丞相兒大夫董仲舒夏侯始昌司馬相如汲黯膠倉終軍司馬遷之倫皆辨智閎逹溢於文辭先生自視何與比朔對臣觀其插齒牙樹頰頦吐唇吻擢項頤結股腳連脽尻遺蛇其迹行步偊旅臣朔雖不肖尚兼此數人者詆平津殆謂此何知夷與惠空復忤時人揚子或問東方朔名過實者何也曰應諧不窮正諌穢德又曰非夷齊而是栁下惠戒其子以尚容首陽為拙柱下為工飽食安坐以仕易農依隱玩世詭時不逢其滑稽之雄乎注云朔非夷曠而尚取容依約玩弄於世何所比哉何知夷與惠謂朔雖時直言有補然其實不足以知夷惠也陳無已亦云東方生和而近汚然不同也為栁下氏而過之者乎孔子謂學栁下惠未有如魯之男子者也楊劉人各有是非犯時為患害唯詩以譎諫言者得無悔厲一作汾王昔監謗變雅今尚載監謗事見國語然召穆公凡伯衛武公芮伯皆作詩刺之今民勞板蕩抑桑柔等篇尚載於大雅末世忌諱繁此理寧復在南山詠種豆議法過四罪楊惲傳與孫會宗書其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時注蕪穢言漢庭之荒亂也帝見書惡之廷尉當惲大逆無道要斬故云過四罪玄都戲桃花母子受顛沛劉禹錫召還宰相欲任以兩省郎而禹錫作玄都觀看花君子詩語譏忿當路者不喜出為播州刺史中丞裴度為言播極遠猿狖所宅禹錫母八十餘不能往當與其子死訣恐傷陛下孝治乃易連州詩言顛沛指此也後自和州入為主客復作玄都桃花詩疑似巳如此況欲諄諄誨事變固不同楊劉可為戒臧倉位在萬乘師孟子猶不遇揚子雲解嘲孟子雖連蹇猶為萬乘師孟子臧氏之子焉能使豫不遇哉豈云貧與賤世道非吾趣意行天下福事忤油然去命也固有在臧倉汝何與田單湣王萬乘齊走死區區燕湣王走莒淖齒殺之言以大國而困於弱燕自取之也田單一即墨即墨大夫戰死城中相與推田單拒燕掃敵如風旋舞鳥怪不測單令城中人食必祭先祖於庭飛鳥悉翔舞而下食燕人怪之單因宣言曰神來下教我取一卒東向坐師事之每出約束必稱神師騰牛怒無前燕軍益懈單乃收城中得千餘牛為絳繒衣畫以五綵龍文束兵刃於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍大駭敗走七十餘城皆復為齊飄飄樂毅去磊砢功名傳掘葬與劓降論乃愧儒先單宣言曰吾懼燕軍劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊卒降者盡劓皆怒堅守惟恐見得單又縱反間曰吾懼燕人掘吾城中冢墓僇先人可為寒心燕軍果盡掘壟墓齊人望見皆涕泣其欲出戰怒自十倍此言愧儒先以其用譎詐勝也深誠可奮士王蠋豈非賢王蠋曰忠臣不事二君貞女不更二夫齊王不聽吾諌故退而耕於野國既破亡吾不能存今又劫之以兵為君將是助桀為虐也遂經其頸於樹枝自奮絶脰而死齊士大夫聞之曰王蠋布衣也義不北面於燕況在位食祿者乎乃相聚如莒求諸子立為襄王此謂單之功不及蠋也戴不勝昔在宋王所皆非薛居州區區一不勝辛苦亦何求懷祿詎有恥言既懷祿則為竊位亷隅毁矣知命乃無憂比士自可憐能復識此不陸忠州虞人以士招御者與射比當時尚羞為況乃天下士孟子萬章敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌又滕文公御者且羞與射者比比而得禽獸雖若丘陵弗為也英英陸忠州學問輔明智低回得坎坷勳業終不遂嘗謂宣公雖以忠諌名然使德宗呼之為陸九不敬孰甚焉是必已有以致之低回之語殆指此類開元行君不聞開元盛天子糾合雋傑披姦倡韋后弒中宗矯詔稱制玄宗以臨淄王與劉幽求鍾紹京等定䇿討亂或請先啓相王玄宗曰請而從是王與危事不從則吾計失矣夜率萬騎入北軍誅韋氏安樂公主韋巨源武延秀等相王即皇帝位王為皇太子又三年有天下幾年辛苦補四海始得完好無疽瘡玄宗覽鏡云吾雖瘠天下肥矣此補完之意一朝寄託誰家子威福顛倒誰復理寄託謂李林甫楊國忠那知赤子遍愁毒秪見狂胡倉卒起茫茫孤行西萬里天寶十四載祿山反次年幸蜀逼仄歸來竟憂死子孫險不失故物上自蜀還居於興慶宫上元元年為李輔國逼遷西內悒悒以終漢成趙后傳云我危殺之注危險也春秋傳祀夏配天不失故物社稷陵夷從此始由來犬羊著冠坐廟堂安得四鄙無豺狼漢書龔遂曰言在側者盡冠狗也師古曰言左右侍側之人不識禮義若狗而著冠者耳又沐猴而冠皆同此義張綱傳豺狼當道相送行效張籍一車南一車北身世匆匆俱有役憶昔論心兩綢繆那知相送不得留但聞馬嘶覺巳遠欲望應須上前坂秋風忽起吹沙塵雙目空回不見人晉王導傳西風塵起舉扇自蔽詩燕燕篇瞻望弗及佇立以泣即此意隂漫漫行愁雲怒風相追逐青山滅沒滄江覆少留燈火就空床更聽波濤圍野屋李白詩北風三日吹倒江倒即覆也憶昨踏雪度長安夜宿木瘤還苦寒木瘤地名在舒州魏武有苦寒行誰云當春便妍暖十日八九隂漫漫杜詩元日到人日未有不隂時寧戚飯牛歌長夜漫漫何時旦一日歸行賤貧奔走食與衣百日奔走一日歸平生歡意苦不盡正欲老大相因依空房蕭瑟施繐帷魏武遺令曰於臺堂上施八尺牀張繐帳青燈半夜哭聲稀音容想像今何處地下相逢果是非周勃傳君不欲反地上即欲反地下耳漢武為李夫人作歌曰是邪非邪立而望之偏何姍姍其來遲樂天哭夢得夜臺暮齒期非遠但問前頭得見無亦此意上三詩相送行恐謂司馬公及韓持國吕晦叔輩隂漫漫恐指吕惠卿輩也一日歸行恐是元豐末年時作汴流汴水無情日夜流不肯為我少淹留相逢故人昨夜去不知今日到何州言逝水無頃刻之駐猶故人行不已也州州人物不相似處處蟬聲令客愁可憐南北志未一作意不就二十起家今白頭揚雄傳丁董用事諸附離者或起家至二千石隂山畫虎圖隂山健兒鞭鞚一作控急走勢能追北風及逶迤一虎出馬前白羽橫穿更人立盧綸擒豹歌捨鞍解甲疾如風人忽虎蹲獸人立白羽箭也回旗倒戟四邊動抽矢當前放蹄入放蹄入謂馬蹄爪牙蹭蹬不得施磧上流丹看來濕李白胡馬歌白刃灑赤血流沙為之丹胡天朔漠殺氣髙煙雲萬里埋弓刀唐人詩大雪埋弓刀穹廬無工可貌此漢使自解丹青包言外國不能畫漢使自摹寫也杜詩粉黛亦解包堂上絹素開欲裂一見猶能動毛髮杜甫曹將軍畫馬歌縞素漠漠開風沙又丹青引詔謂將軍拂絹素低回使我思古人此地摶兵走戎羯田敬仲世家馮因摶三國之兵吳漢等贊戎羯喪其精膽注羯本胸奴别種又史記其民羯羠不均皆健羊名言性健悍而不均禽逃獸遁亦蕭然豈若封疆今宴眠契丹弋獵漢耕作飛將自老南山邊還能射虎隨少年李廣傳廣在郡胸奴號曰漢飛將軍又廣傳吏當廣贖為庶人數嵗與潁隂侯屛居藍田南山中射獵少陵詩杜曲幸有桑麻田欲將移住南山邊短衣匹馬隨李廣看射猛虎終殘年王荆公詩注卷十二
