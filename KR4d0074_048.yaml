body:
  text: 王荆公詩注卷四十八宋李壁撰律詩送僧惠思歸錢塘淥淨堂前湖水淥歸時正復有荷花花前亦有餘杭姥為道仙人憶酒家公有古詩翰林謫仙人往嵗酒姥家方干送僧歸桐廬詩聞師却到鄉中去為我殷勤謝酒家列仙傳王方平以千錢與餘杭姥相聞沽酒姥送酒答云恐地上酒不中尊飲耳松江即吳江也來時還似去時天欲道來時巳惘然秪有松江橋下水無情長送去來一作時船唐韋氷詩來時歡笑去時哀家國迢迢逈越臺松江橋即長橋秋日莫言秋早一作草木未知秋今日風雲巳自愁獨傍黃塵騎一馬行看蕭索聽颼飀中秋夕寄平甫諸弟浮雲吹盡數秋毫李羣玉詩浮雲卷盡為朣朧直出滄溟上碧空杜詩上方重閣晚百里見秋毫爚爚金波滿滿醪說文曰爚音弋灼反火飛也一曰爇聲漢郊祀志月穆穆以金波師古曰月光穆穆若金之波流也白詩酒盞酌來須滿滿花枝看即落紛紛千里得君詩挑戰漢髙帝紀與漢王挑戰李奇音徒了反臣瓚曰挑戰擲嬈敵求戰也古謂之致師夜壇誰敢將風騷杜牧之詩今代風騷將誰登李杜壇靈山按圗經在信州上饒縣西北九十五里亦名靈鷲山周回百餘里舊經云上有龍池多珍木奇卉兼出水晶靈山寧與世為仇斤斧侵凌自不休水玉比來聞長價市人無數起相讎斤斧侵凌言伐山取水玉也司馬相如傳水玉磊砢注水精也謝靈運詩凌波採水玉荷花亭亭風露擁川坻任彥升詩涿令行春返冠蓋溢川坻注坻岸也詩宛在水中坻天放嬌饒豈自知唐人詩名髙自不知一舸超然他日事故應將爾當西施小杜詩西子下姑蘇一舸逐鴟夷樂天詩萍泛同遊子蓮開當麗人又緑桂為佳客紅蕉當美人殘菊黃昏風雨打園林殘菊飄零滿地金折得一枝還好在一作猶好在可憐公子惜花心歐陽文忠公嘉祐中見荆公此詩笑曰百花盡落獨菊枝上枯耳因戲曰秋英不比春花落為報詩人子細看世傳誤謂王君玉有此句蓋詩意有相類耳文公聞之曰是定不知楚辭云夕飱秋菊之落英歐陽九不學之過也據落英乃是桑之未落華落色衰之落非必言花委於地也歐王二巨公豈不曉此竊疑小說皆謬不可信蔡絛西清詩話又云落始也竹窗竹窗紅莧兩三根易夬卦莧陸夬夬宋衷注云莧莧菜山色遙供水際門只我近知墻下路能將屐齒記苔痕白詩徑滑苔粘屐潭深水沒篙出定力院作建康二志無定力院豈定林乎江上悠悠不見人十年塵垢夢中身殷勤未一作為解丁香結放出枝間自在春李郢詩丁香正堪結留步小庭隈寄育王大覺禪師山木悲鳴水怒流百蟲專夜思髙秋道人方丈應無夢想復長吟擬慧休退之詩夜深靜卧百蟲絶此言百蟲專夜皆佳又樂天長恨歌春從春游夜專夜又明妃曲只得當年備宫掖何曽專夜奉幃屏江淹擬休上人詩日暮碧雲合佳人殊未來送僧游天台天台一萬八千丈真誥桐柏山髙一萬八千丈今天台亦然太白云四萬字誤太白詩云天姥連天向天橫勢拔五嶽掩赤城天台四萬八千丈對此欲倒西南傾嵗宴老僧攜錫歸前程好景解吟否密雪亂雲緘翠微鄭谷詩天淡滄浪曉風悲蘭杜秋前程吟此景為子上髙樓次韻張仲通水軒池雨含烟暝不收草根長見水交流愛君古錦囊中句解道今秋似去秋李白詩解道澄江淨如練令人長憶謝𤣥暉李賀詩獨睡南窗月今秋似去秋錦囊句亦是賀事送陳令長溪流水碧潺潺古木蒼藤暗兩山把臂道人今在否長官白首尚人間杜詩壯心久零落白首尚人間無錫寄孫正之健席髙檣送病身亂山荒隴障歸津應須一曲千回首西去論心更幾人杜詩我行入東川十步一回首李義山哭劉蕡詩一叫千回首天髙不為聞王摩詰詩勸君更盡一杯酒西出陽關無故人觀末句公厚侔如此漫成清時無路取封侯病卧牛衣巳數秋日月不膠時易失感今懷昔使人愁不膠言常去而不留也但封侯一句疑公不作此語初晴一抹明霞黯淡紅紅而稱黯淡言色之淺瓦溝巳見雪花融前山未放曉寒散猶鎖白雲三兩峰秦少游詩斷霞一抹海天低唐人詩沈雲隱喬樹細雨滅層巒釣者釣國平生豈有心解甘身與世浮沈應知渭水車中老自是君王著意深文王載吕尚與俱歸雖無車字然載即車也事見嚴陵祠堂注張樂全亦有太公詩今附於此默坐磻溪素髮垂商周於此繫興衰機深正似忘機者應被沙鷗靜處窺樂全之語與公意别恐非所以議聖賢也又嘗記唐人一詩不知誰作詩云青山長在境長新寂寞持竿一水濱及得王師身巳老不知辛苦為何人莊子亦有釣臧事將次鎮南豫章江面朔風驚浩蕩帆船破浪行宋宗慤年尚少叔父少文問其所志慤答曰願乘長風破萬里浪目送家山無幾許千年空想蟪蛄聲莊子逍遙遊篇朝菌不知晦朔蟪蛄不知春秋此小年也出金陵白石岡頭草木深建康志白土岡在城東見示耿天隲注又江寧縣城南一十五里有石子岡一名石子墩吳孫峻害諸葛恪投之於此岡即韓擒虎受陳將任忠出降之所又溧水縣北二十里有白石山三處名皆不同不知此所指何地又世說孫興公為庾公參軍共游白石山疑即白石岡也春風相與散衣襟浮雲映郭留佳氣飛鳥隨人作好音漢光武紀望氣蘇伯阿見舂陵唶曰氣佳哉鬱鬱葱葱然此謂金陵嘗為帝王都易小過飛鳥遺之音詩睍睆黃鳥載好其音酬王微之一雨回飈助蓐收月令孟秋之月其帝少皥其神蓐收言金火方戰風雨助秋意也炎曦不復畏金流莊子逍遙遊篇大旱金石流土木焦而不熱君家咫尺堪乘興想岸烏巾對奕秋題玉光亭傳聞天玉此埋堙千古誰分僞與真每向小庭風月夜却疑山水有精神按信州圗經玉光亭在玉山縣㕔之東不知所自章郇公及荆公詩碑在焉郇公詩曰千層懷玉對軒窗池上新亭號玉光秪此便堪為吏隱神仙官職水雲鄉蜀人青陽楷詩云鳴琴賢宰有三長吟得新詞敵夜光好是斷章旡以和神仙官職水雲鄉和郇公韻也或言玉光恐在楚州珤應縣今附唐尼真如事於此開元中有李氏者嫁於賀若氏賀若氏卒乃捨俗為尼號曰真如家於鞏縣孝義橋天寶元年七夕真如於盥濯之間忽見五色雲氣中引手不見其形徐以囊授真如曰寶之謹勿言也真如謹守不敢失墜天寶末中原鼎沸真如展轉流寓於楚州安宜縣肅宗元年建子月真如忽見二人衣皂衣引真如東南而行值樓觀嚴飾兵衛鮮肅皂衣者指之曰化城也城有復殿一人衣碧戴寶冠號為天帝復有二十餘人衣冠亦如之呼為諸天諸天命真如進既而諸天相謂曰下界喪亂時久殺戮過多腥穢之氣達於諸天不知何以救之一天曰莫若以神寶壓之一天曰常用第三寶今沴氣方盛第三寶不足以勝之須以第二寶授之則兵可息亂世可清也天帝曰然因出寶授真如曰汝往令刺史崔侁進達於天子時肅宗寢疾方甚視寶促召代宗謂曰汝自楚王為皇太子今上賜寶獲於楚州天祚汝也冝寶愛之代宗再拜受賜得寶之故即日改為寶應元年上既監國乃升楚州為上州縣為望縣改縣名安宜寶應焉楚州刺史鄭輅作記韓詩世俗誰知僞與真荀子玉在山而木潤淵生珠而崖不枯牛奇章詩珠玉㑹應成咳唾山川尤覺露精神贈僧紛紛擾擾十年間世事何嘗不强顔亦欲心如秋水靜應須身似嶺雲閒張樂全寄郭思誠詩心同秋水靜身共野雲閒思誠太華隱者嘲叔孫通馬上功成不喜文叔孫綿蕝共經綸諸君可笑貪君賜便許當時一作先生作聖人本傳上患朝儀不肅通采古禮與秦儀雜就之與諸生為綿蕝野外習之月餘通曰上可試觀拜通為奉常賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之髙帝悉以為郎通出皆以五百金賜諸生乃喜曰叔孫生聖人知當世務綿蕞如淳曰謂以茒剪樹地為纂位尊卑之次春秋傳曰置茅蕝師古曰蕞與蕝同或云此詩宋景文作共經綸作强經綸王逢原集亦有詠叔孫詩大抵同此意云弟子由來迹未純異時得失亦頻頻一官所買知多少便議先生作聖人和淨因有作朝紅一片墮窗塵禪客蕭然感此辰參同契論外丹形體為灰土狀若明窗塵後山詩僧奩手汙空留迹佛几堆紅拂委花更覺城中芳意少不如山野早知春東坡詩曲欄幽榭終寒窘一看郊原浩蕩春張工部廟未詳何人使節紛紛下禁中幾人曽到此城東獨君遺像今如在廟食真須德與功寄伯兄身留海上去何時只看春鴻北向飛安得先生同一飯一作飽蕨芽香嫩䱥魚肥䱥音制楚公七子安仁為長此詩所指伯兄是也和張仲通見寄三絶句髙山流水意無窮三尺空弦膝上桐默默此時誰㑹得坐憑江閣看飛鴻劉長卿詩古調雖自愛今人多不彈詩誰㑹得亦此意也杜詩注目寒江倚髙閣晉顧愷之恆云手揮五弦易目送孤鴻難其二收拾乾坤付一壺世間無物直錙銖醉鄉舊業拋來久更欲因君稍問塗唐王績有醉鄉記其三欹枕狂歌擊唾壺直將軒冕等錙銖醉鄉岐路君知否不似人間足畏塗令狐楚詩閒齊夜擊唾壺歌試望夷門奈逺何晉王處仲每醉後輒詠魏武樂府歌曰老驥伏櫪志在千里以如意打唾壺為節壺邊盡缺莊子畏塗者十殺一人父子兄弟相戒也宣州府君喪過金陵百年難盡此身悲眼入春風秪涕洟花發鳥啼皆有思忍尋常棣脊令詩公兄安仁為宣州司户脊令雍渠水鳥而在原失其常處則飛則鳴求其類天性也猶兄弟之於急難觀王氏雪圗崔嵬相映雪重重茅屋柴門在半峰想有幽人遺世事獨臨青峭倚長松韓子紛紛易盡百年身選詩爭先萬里塗易盡百年身舉世何人識道真莊子道之真以治身土苴以治天下劉歆傳黨同門妒道真力去陳言誇末俗可憐無補費精神觀公此詩尚謂退之未識道真也余在臨川聞之曽氏子弟載南豐語云介甫非前人盡獨黃帝孔子未見非耳譏其非人太多也如此詩可見陳無已云荆公詩力去陳言誇末俗可憐無補費精神而公平生文體數變莫年詩益工用意益苦故言不可不謹也韓詩可憐無益費精神有似黃金擲虛牝公譏韓子而用其語但易一字耳宰嚭謀臣本自繫安危賤妾何能作禍基但願君王誅宰嚭不愁宫裏有西施說苑桓公問於管仲吾欲使爵腐於酒肉腐於豆得無害霸乎對曰無害於霸也惟不知賢害霸信賢而復使小人參之害霸詩意殆本此程氏云李覲謂若教管仲身長在宫裏何妨更六人此語不然管仲時桓公之心特未蠹也若巳蠹雖管仲可奈何未有心蠹尚能用管仲之理公語亦李意當以程說為允郭解藉交雖有不資恩漢法歸成棄市論平日五陵多任俠可能推刃報王孫言藉交雖於人有恩漢法不許也本傳以軀藉友報仇師古曰藉謂借助也公孫𢎞議解罪當大逆亡道遂族解不止棄市也解誅後俠者極衆而無足數者按郭解以匹夫而奪人主死生之權且聖人之作五刑固有輕重今一言不中意而立殺之此何理也考其唱此悖亂之風解實為之魁故𢎞之言解布衣為俠行權以睚眦殺人解雖不知此罪甚於解知劉器之以𢎞此一事為得大臣之體古寺寥寥蕭寺半遺基蕭寺見上注遊客經年斷履綦漢班婕妤詩俯視兮丹墀思君兮履綦綦履之飾也猶有齊梁舊時殿塵昏金像雨昏碑溫庭筠詩猶有南朝舊碑在敢將興廢問漁翁杜詩惟有古殿存世尊亦塵埃如聞龍象泣足令信者哀越人以幕養花游其下二首幕天無日地無塵百紫千紅占得春野草自花還自落落時還有惜花人越人養花亦如洛中劉伶傳幕天席地言野花雖無幕護值其落時亦有惜之者其二尚有殘紅巳可悲更憂回首秪空枝莫嗟身世渾無事睡過春風作惡時古詩花開堪折直須折莫待無花空折枝白集爭忍開時不同醉明朝後日即空枝黃臺瓜詞三摘尚云可四摘抱蔓歸公詩亦類此魚兒繞岸車鳴水欲乾魚兒相逐尚相歡無人挈入滄江去汝死那知世界寬喻禍至而不知由溺於燕安古靈師在窗下看經蜂子投窗紙求出師曰世界如許濶不肯出鑽他故紙做甚麼離鄞至菁江東望村落蕭條夜氣生側身東望一傷情丹樓碧閣無處所只有溪山相照明丹樓碧閣言變滅無餘矣信州回車館中作二首太白山根秋夜靜太白山在剡縣公之舊游也亂泉深水繞床鳴鄭谷詩向蜀還秦計未成寒蛩一夜繞床鳴病來空館聞風雨恰似當年枕上聲當年指太白也其二山木漂搖卧弋陽因思太白夜淋浪芭蕉一枕西窗雨一作西窗一榻芭蕉雨復似當時水繞床弋陽信州縣名張祜題弋陽館詩不知即是此館否其詩云一葉飄然下弋陽殘霞昏日樹蒼蒼吳溪漫淬干將劍却是猿聲斷客腸天童山溪上以公經游記考之山在鄞縣溪水清漣樹老蒼行穿溪樹踏春陽段成式記鬼詩長安女兒踏春陽旡處春陽不斷腸溪深樹密無人處唯有幽花度水香鄞縣西亭收功無路去無田韓詩臨分不女誑有路即歸田竊食窮城度兩年更作世間兒女態亂栽花竹養風烟退之詩無為兒女態憔悴悲賤貧别鄞女行年三十巳衰翁滿眼憂傷只自攻今夜扁舟來訣汝死生從此各西東禮曰五十始衰三十而言衰翁亦太早矣杜詩明朝牽世務揮淚各西東真州馬上作身隨飢馬日中行眼入風沙困欲盲心氣巳勞形亦弊自憐於世欲何營太史遷傳神太用則竭形太勞則弊登飛來峰飛來山上千尋塔興化軍仙遊縣有大飛山臨安錢塘縣靈隱寺有飛來山介甫未嘗入閩若又以靈隱飛來峰則初無塔兼所見亦不至甚逺恐别指一處也聞說雞鳴見日升後漢志太山日觀雞一鳴時見日始欲出長三丈所太山記東南巖名曰日觀言雞初鳴時見日出又有秦觀吳觀望見長安㑹稽孟浩然天台詩雞鳴見日出常與仙人㑹不畏浮雲遮望眼自緣身在最髙層杜牧詩明朝楚山上莫上最髙層若以詩䜟言此亦可見公被遇神考始終人不能間也陸賈新語邪臣蔽賢猫浮雲之障白日也李白詩盡道浮雲能蔽日讀漢功臣表漢家分土建忠良周書武成分土惟三賈誼傳衆建諸侯而少其力鐵劵丹書信誓長漢髙帝紀與功臣剖符作誓丹書鐵契金匱石室藏之宗廟注金匱猶金縢也契亦劵之異名本待山河如帶礪何緣葅醢賜侯王漢封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔於是申以丹書之信重以白馬之盟注帶衣帶也礪砥石也黥布傳漢誅梁王彭越盛其醢以遍賜諸侯刑法志所謂葅其骨肉是也詠月追隨落日盡還生㸃綴浮雲暗又明江有蛟龍山虎豹清光雖在不堪行揚子五百篇月未望則載魄于西既望則終魄于東其遡於日乎注遡迎也向也不如浮雲㸃綴謝景重語見上注莊子秋水篇水行不避蛟龍者漁父之勇也陸行不避虎兕者獵夫之勇也韓公將歸操涉其淺兮石齧我足乘其深兮龍入我舟亦此意金山怪祕隂靈與護持重丹復碧煥參差滄江見底應無日萬丈孤根世不知杜荀鶴詩海枯終見底人死不知心杜詩灧澦既沒孤根深疊翠亭烟籠逺浦迷芳草日照澄湖浸碧峰韓子蒼詩未肯分流下山去為君純浸紫霄峰幸有清樽堪酩酊忍陪良友不從容默默默默長年有所思世間談笑謾追隨蒼髯欲茁朱顔去更覺求田問舍遲勉酬俗也韓文蘭茁其芽山谷詩笋茁不避道寓言三首大虛無實可追尋葉落松枝漫古今張安道和趙叔平詩視身無實元泡幻觀世皆空漫古今若見桃花生聖解不疑還自有疑心楊傑語拈花示衆微笑者巳墮迷坑立雪齊腰勤求者自殺疑竇靈雲詩自從一見桃花後直到如今更不疑其二本來無物使人疑六祖云本來無一物却為參禪買得癡聞道無情能說法面墻終日妄尋思傳燈録良玠師問溈山頃聞忠國師有無情說法良玠未究其微溈山云云玠又問雲岩曰無情說法什麼人得聞雲岩曰我若聞汝即不得聞吾說法也曰若恁麼即良玠不聞和尚說法也雲岩云云師乃述偈呈雲曰也大奇也大奇無情說法不思議若將耳聽聲不現眼處聞聲方自知其三未能達本且歸根信心銘歸根得㫖隨照失宗真照無知豈待言臨濟云㳂流不止問如何真照無邊說似他枯木巖前猶失路那堪春入武陵源安禪師𤣥談枯木岩前叉路多行人到此莫蹉跎杜詩悲秋宋玉宅失路武陵源偶書穰侯老擅關中事長恐諸侯客子來我亦暮年專一壑每逢車馬便驚猜穰侯謂王稽謁君得無與諸侯客子俱來乎無益徒亂人國耳張文潛詩穰侯擅關中頗畏諸侯客搜車計巳遲終困范公䇿庸夫吝富貴百計私自惜勢移禍敗至智巧竟何益莊子秋水篇且夫擅一壑之水而跨跱坎井之樂此亦至矣揚子三首儒者陵夷此道窮千秋止有一揚雄當時薦口終虛語賦擬相如却未工本傳蜀有司馬相如作賦甚𢎞麗溫雅雄心壯之每作賦常擬之以為式又孝成帝時有薦雄文似相如者召雄待詔承明之庭言薦雄者止稱其詞賦蓋知道者未應以詞賦稱之兼實未及相如之工也公古詩亦云知者乃得稱其詞其二九流沈溺道真渾一本作道真沈溺九流渾獨泝頽波討得源陸機文賦㳂波而討源歲晚强顔天祿閣强其兩反秪將奇字與人言司馬遷遺任安書及巳至此言不辱者所謂强顔耳詩言雄仕於莽時實包羞故猥託於奇字耳其三千古雄文造聖真眇然幽思入無倫他年未免投天祿虛為新都著劇秦雄解嘲顧而作太𤣥五千文大者含元氣纎者入無倫雄雖投閣莽言其素不與事或猶以美新故爾讀維摩經有感身如泡沫亦如風刀割香塗共一空宴坐世間觀此理維摩雖病有神通華嚴經云以白旃檀塗身能除一切熱惱得清涼也刀割歌利王事法華經云或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞前輩謂此言性也楞嚴經云觀世音令衆生於我身心獲十四種無畏功德五者熏聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動蓋割水吹光而水火之性不動搖猶如遇害而吾性湛然此乃得觀音無畏之力所謂刀尋段段壞者正謂是耳𤣥覺襌師第三語其相應者心與空相應則譏毁讃譽何憂何喜身與空相應則刀割香塗何苦何樂春日即事池北池南春水生桃花深處好閒行細思擾擾夢中事何用悠悠身後名孫權語曹操春水方生公宜速去王建詩池北池南草緑張季鷹使我有身後名不如生前一杯酒贈安太師獨龍岡北第三峰逋客歸來老更慵逋客見北山移文敗屋數椽青繚繞冷雲深處不聞鐘唐人詩重雲晦廬嶽微鼓辨湓城此言隂晦之夕鼓聲才倣佛耳亦猶鐘聲為冷雲所隔而不之聞也送李生白華巖修道白華巖主是金仙假作山僧學道一作坐禪珍重此行吾不及為傳消息結因緣白華巖在金溪即仙巖也巖主是為寶月禪師熙豐間人居巖之絶頂持戒誦經猛獸馴伏客至則遣去又能以慧眼知人善惡事李生名無咎慕師之風棄儒從之介甫在金陵嘗遣人致師而不出邑人朱幹叔之子日嚴日邁為余言如此寄道光大師秋雨漫漫夜復朝可嗟蔀屋望重霄豐上六豐其屋蔀其家遙知宴坐無餘念萬事都從劫火燒劫火見寄國清處謙注示報寧長老白下亭東鳴一牛山林陂港浮髙秋新營棗域我檀越曽悟布毛誰比丘牛一鳴事出西域記域一作棫字書棫木名佛書云印度國造寺檀越名為寺主公嘗乞以所居園屋為僧寺乞賜額札子云臣幸遭興運超拔等夷知奬眷憐逮兼父子戴天負地感涕難勝顧迫衰殘縻捐何補不勝螻蟻微願以臣今所居江寧府上元縣園屋為僧寺一所永逺祝延聖壽如䝉矜許特賜名額庶昭希曠榮遇一時仰慿威神誓報無巳公既捨宅為寺故云我檀越㑹通問烏窠如何是和尚佛法即於身上拈起布毛吹之遂悟時謂布毛比丘紅梨紅梨無葉庇花身陸魯望詩幾度木蘭舟上望不知元是此花身黃菊分香委路塵嵗晚蒼官才自保日髙青女尚橫陳蒼官青女並見上注復齊謾録云荆公詩日髙青女尚橫陳橫陳事見相如賦及楞嚴經青女者主霜雪之神也事見淮南子公以青女為霜於理未當如杜子美秋野詩云飛霜任青女乃為當理梁昭明博山香爐賦云青女司寒紅花繄景亦皆指為雪霜神矣復齊之說姑存之鴟依倚秋風氣象豪似欺黃雀在蓬蒿不知羽翼青冥上腐鼠相隨勢亦髙退之病鴟詩晴日占光景髙風送追隨遂凌紫鳳髙肯顧鴻鵠卑莊子蝍蛆甘帶鴟鴉嗜鼠鹽鐵論曰泰山之鴟啄腐鼠於窮澤非有害人也今有司盜主財而食之焉得若泰山之鴟乎淮南子亦有飛鳶墮腐鼠事詩意謂鴟以喻小人不足道而又有附之以顯者猶腐鼠之於鴟也驢二首力侔龍象或難堪維摩經云譬如龍象蹴踏非驢所堪是名住不可思議解脫方便之門唇比仙人亦未慙大集經有驢唇仙人臨路長鳴有真意盤山弟子久同參鎮州普化和尚承嗣盤山嘗振一鐸行化城市暮入臨濟院喫生菜臨濟曰遮漢大似一頭驢師便作驢鳴臨濟乃休普化曰臨濟小厮兒亦具一隻眼其二雖得康莊亦好還栁子厚牛賦不如羸驢服逐駑馬曲意隨勢不擇處所不耕不駕藿菽自與騰踏康莊出入輕舉又答問云且夫白羲騄耳之得康莊也逐奔星先飄風而跛驢不出泥涬言於得意處不戀亦知斂退也康莊大路每逢溝塹便知難謂無乘險徼幸之心由來此物非他物莫道何曽似仰山大集經大梅法常禪師一日謂其徒曰來莫可抑往莫可追從容復聞鼯鼠聲師曰即此物非他物汝善護持吾今逝矣僧問仰山和尚何似一頭驢晚春春殘葉密花枝少睡起茶多酒盞疏斜倚屏風搔首坐滿簮華髮一床書刺客傳八尺屏風可超而越王昌齡詩妻子歡同數株栁雲山老對一床書陳去非詩八尺屏風遮宴坐一簾細雨獨題詩疑倣公作也藝苑雌黃云僧惠洪冷齊夜話載介甫詩睡起茶多酒盞疏多字當作親字世俗傳寫之誤洪意蓋欲以少對密疏對親也豫作荆南教官與江朝宗滙者同僚偶論及此江云惠洪多妄誕殊不曉古人詩格此一聨以密字對疏多字對少正交股用之所謂蹉對法也樓上望潮樓上人腸渴欲枯樓前終日望平湖無舟得入滄浪去為問漁人得意無杜詩肺枯渴太甚飄泊公孫城寄李道人即李士寧蓬州人曽慥集仙傳誤云資州人李生富漢亦貧兒人不知渠只我知跳過六輪中耍峭養成三界外愚癡六輪三界皆佛氏語憶江南城南城北萬株花池面氷消水見沙韓詩江空水見沙回首江南春更好夢為蝴蝶亦還家令狐楚詩縱有還家夢猶聞出塞聲來鵬詩分明記得還家夢徐孺宅前湖水東對碁呈道原北風吹人不可出清坐且可與君碁明朝投局亦未晚從此亦不復吟詩投博局見戲贈葉致逺注言碁與詩之妨學也謝微之見過王晢字微之此身巳是一枯株公詩纍有枯木之語蓋晚而師瞿曇者也所記交朋八九無唯有微之來訪舊天寒幾夕擁山爐惜春滿城風雨滿城塵蓋紫藏紅漫惜春春去自應無覓處可憐多少惜花人唐崔櫓詩春意自知無主惜小杜詩莫怪杏園憔悴去滿城多少惜花人寄北山詳大師一作和平甫寄道光禪師欲見道人非一朝杖藜無路到青霄千巖萬壑排風雨想對銅爐柏子燒晉顧愷之還荆州人問以㑹稽山川之狀愷之云千岩競秀萬壑爭流草木䝉籠若雲興霞蔚東坡詩銅爐燒柏子子貢一來齊境助奸臣去誤驕王亦苦辛魯國存亡冝有命區區翻覆亦何人奸臣謂齊田常也子貢雖說令無伐魯而其詞云臣聞憂在外者攻弱今君憂在內故曰不如伐吳如此是助奸也為吳之計莫急於破越子貢乃謂夫差王者不絶世伯者無强敵宜置越而伐齊又為吳東見越王令出師以從子貢去而之魯吳王果大破齊師於艾陵以兵臨晉敗於黃池越遂乘間滅吳故詩稱誤也言國之廢興存亡自有天命乃飾詐設辭如儀秦之為雖能存宗國不足道也王荆公詩注卷四十八
