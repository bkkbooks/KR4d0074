body:
  text: 王荆公詩注巻二十六宋李壁撰律詩嵗晚懐古先生嵗晩事田園魯叟遺書廢討論問訊桑麻憐巳長按行松菊喜猶存農人調笑追尋壑稚子歡呼出候門遙謝載醪祛惑者吾今欲辯已忘言時方作二經義此篇全用淵明事段約之園亭愛公池館得忘機初日留連至落暉菱暖紫鱗跳復没栁隂黄鳥囀還飛徑無凡草唯生竹盤有嘉蔬不采薇勝事閬州雖或有終非吾土豈如歸曲禮稻曰嘉蔬言有粟而不必效伯夷也杜詩閬州勝事可腸斷閬州城南天下稀王仲宣賦雖信美而非吾土兮曽不足以少留段氏園亭欹眠隨水轉東垣一㸃炊煙映水昏漫漫芙蕖難覔路翛翛楊栁獨知門青山呈露新如染白鳥嬉游静不煩朱雀航邊今有此可能搖蕩武陵源晉咸康三年更作朱雀門新立朱雀浮航在縣城東南四里對朱雀門南渡淮水亦名雀橋回撓柴荆散策静涼飇隠几扁舟白下潮紫磨月輪升靄靄帝青雲幕巻寥寥數家雞犬如相識一塢山林特見招尚憶木𤓰園最好興殘中路且回橈白下門見題半山寺壁注孔融論金之優者名紫磨猶人之有聖也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金蓆藉之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王某國王女白其父願以水上泡為頭華鬘王告不可令匠取泡女見隨手破壊又曰水泡虚偽不可乆停願王為我作紫磨金鬘崔豹古今注月重輪帝青見古意注酴醿金沙二花合發相扶照水弄春柔發似矜夸斂似羞碧合晚雲霞上起紅争朝日雪邊流言紅白合也我無丹白知如夢人有朱鉛見即愁疑此冶容詩所忌故將樛木比綢繆真誥第三巻夫真者都無情欲之感男女之想也若丹白存於胷中則真感不應真靈不降矣故知真道不可對求要言不可偶聽也詩意言丹白不存於中故眎花如夢也言婦人之艷飾者見花而愁自以不及也樛木之詩取木枝下垂之故故葛也藟也得纍而附之以比后妃不忌衆妾使得進御而下皆悦附也冶容正指酴醿金沙言二花競發盛其容飾若争妍者詩人所忌在此而猶愛其綢繆不相嫉故以樛木終之美反正也輒次公闢韻書公戲語申之以祝助發一笑公闢名師孟公集有荅公闢書正及此詩今附於此某啟比承故人逺屈殊以不獲從容為恨更煩專使貺以好音豈勝感悵隂晴不常寒暄屢變尤喜跋涉動止安豫平字韻詩不敢違指聊供一笑集古句亦勉副來喻不足傳示也尚此阻濶惓惓可知千萬自愛以副情禱也不宣故人辭祿未忘情語我猶能作扞城身自不遭如貢薛兒應堪教比韋平老羆豈得長髙卧雛鳯仍聞已間生把酒祝公公莫拒緇衣心為好賢傾薛廣徳貢禹皆為御史大夫列三公廣徳晚嵗甫遂懸車之請禹求退不能竟卒於位今云不遭似言公闢之身不如貢薛之遭遇也平當傳漢興惟韋平父子至宰相謂韋賢𤣥成平當晏也王羆守洛陽魏將侵之羆曰老羆當道卧貘子安得過此言公闢之賢可令守邊不當令閒焦贛易林鳯生五雛長于南郭龎統傳此間自有伏龍鳯雛詩引緇衣及韋平雛鳯事似并及其子然公闢之後無聞傳亦不著子某某次韻致逺木人洲二首建康志迷子洲在城西南四十里周圍三十里迷子山前漲一洲木人圖志失編收年多但有栁生肘地僻獨無茅葢頭河側鮑焦乾尚立江邊屈子槁將投未妨他日稱居士能使君疑福可求栁生肘見東皋注傳燈錄溈山問衆還識遮阿師子也無謂徳山宣鑒也衆曰不識溈曰是伊將來有把茅葢頭罵佛罵祖去鮑焦周之介士也衣弊膚見潔畚將蔬子貢遇之曰吾子何以至此也焦曰天下之遺徳教者衆矣吾何以不至於此也子貢曰吾聞之非其世者不生其利汚其君者不踐其土今吾子汚其君而踐其土非其世而將其蔬此誰之有哉鮑焦曰嗚呼賢者重進而輕退㢘者易醜而輕死乃棄其蔬而立槁死於洛水之上事見新序莊子盜跖篇鮑子立乾申子不自理㢘之害也屈原至於江濵形容枯槁乃作懐沙之賦遂自投汨羅而死立與投皆本出處用字工且嚴如此韓詩偶然題作木居士便有鼇無窮祈福人余見湖南一知舊云木居士在耒陽縣北口寺元豐間縣令禱雨弗應析而薪之今所存乃後人更為者其二杌爾何年客此洲飄流誰棄止誰收無心使口肝使目有幹作身根作頭暴露神靈難寄託禱祠村落幾依投紛紛剪紙真虛負立槁安知富可求孟嘗君將入秦蘇秦謂之曰臣過淄水有土偶人與木偶人相語土偶謂木偶曰子東國之桃梗也刻削子以為人降雨下淄水至流子而去則子漂漂者未知所止息也列子偃師事王試廢其心則口不能言廢其肝則目不能視韓詩根為頭面幹為身鬼神必依深柏茂樹今木既槁故云難寄託韓詩外傳曰鮑焦棄其蔬而立槁於洛水之上君子曰㢘夫剛哉次韻酬龔深甫二首據國史深甫名原處州人嘉祐八年進士哲廟時徽廟初嘗為兵部工部侍郎給事中原學於王安石安石改學校法引原以自助原亦為盡力元祐初司馬光召原與語詆王氏原反覆辯論終不為變光曰王氏氣習尚爾耶據此可見原不隨時觀望背其師法又原在紹興元符間時有正論言徽廟當為哲宗服三年喪坐此斥後又坐與陳瓘善得罪恩容衰老䕶松楸復得一龔隨我游講肆劇談兼祖謝舞雩髙蹈異求由陶詩周生述孔業祖謝響然臻馬隊非講肆校書亦已厪祖企謝景夷也北尋五柞故未憗東挽三楊仍有樛陟巘降原從此始但無瑤玉與君舟漢有五柞宫在盩厔初疑公何忽用此後按輿地志鍾山少林最髙峯北有五願樹乃柞木也然後知公詩所稱北尋蓋謂此文公十二年秦行人夜戒晉師曰兩君之士皆未憗也注憗缺也李白驛庭三楊樹正當白下門白下竊近鍾山詩公劉陟則在巘復降在原何以舟之惟玉及瑤鞞琫容刀注舟帶也謂佩刀之類其二握手東崗雪滿篸後期惆悵老吾蠶芳晨一笑真難值暮齒相思豈乆堪他日杜詩傳渭北幾時周宅對漳南百年邂逅能多少且可勤來共草菴杜詩渭北春天樹宋劉繪張融周顒一時勝士居皆連牆故朝野為之語曰三人共宅夾清漳張南周北劉中央以渭北對漳南所謂無一字無來處次韻葉致逺知君聊占水中洲去即東浮逐聖丘憂國無時須問舍得坻有興即乗流由來要路當先據誰謂窮鄉可乆留他日五湖尋范蠡想能重此駐前騶韓詩聨句懐糈愧賢屈乗桴追聖丘憂國問舍見續蜀志賈生賦乗流則逝兮得坻則止注木之浮水行止隨流選詩何不策髙足先據要路津梁制尚書令僕中丞各給威儀十人其六人武冠絳韝即所謂騶也此詩一本作生涯聊占水中州豈即乗桴逐聖丘身與鳬飛乃鴈集心能茅靡亦波流由來杞梓當先伐誰謂菰蒲可乆留乗興吾廬知未厭故移修竹擬延騶次韻酬朱昌叔五首㸃也自殊由與求既成春服更何憂拙於人合且天合静與道謀非食謀未愛京師傳谷口但知鄉里勝壺頭嗟予老矣無一事復得此君相與游莊子堯為天之合舜為人之合韓集合於天而乖於人何害況又時有兼得者耶揚子谷口鄭子真耕於巖石之下名震於京師馬援云吾從弟少游嘗言士生一世云云鄉里稱善人斯可矣此以鄉里對京師本此壺頭見本傳山名在辰州沅陵東其二去年音問隔淮州百謫難知亦我憂前日杯盤共江渚一歡相屬豈人謀山蟠直瀆輸淮口水抱長干轉石頭乗興舟輿無不可春風從此與公游陳遵傳故事有百適者斥注適讀曰謫前四句名蹉對格孫盛晉陽秋云秦淮是始皇所鑿王尊令郭璞筮即此淮也又稱未至方山有直瀆行三十餘里以地論之淮發源詰曲不類人功則始皇所掘即此瀆也丹陽記建康有淮源出華山流入江在丹陽姑孰之界西北流經建康秣陵二縣之間縈紆京邑之内至于石頭入江綿亘三百許里長干秣陵縣東里巷名有大長干小長干東長干皆地名其三烏榜登臨興未休共言何許更消憂聨裾蕭寺尋真覺方駕孫陵弔仲謀語罷每開歡笑口詩來仍掉苦吟頭已知軒冕真吾累且可追隨馬少游上林賦榜人歌聲流喝注榜人船長也榜音謗又方孟反梁武帝造寺令蕭子雲飛白大書一蕭字又大中祥符四年詔於龍圖閣取舒州所獲誌公石以示輔臣乃加諡誌公真覺遣知制誥陳堯咨詣蔣山致告後又謚道林真覺令公私無得斥誌公名左太沖魏都賦方駕比輪按吳大帝陵在蔣山南八里丹陽記蔣陵因為名輿地志臺當孫陵曲折之旁故曰蔣陵亭亦名孫陵亭少游見和王勝之借馬注其四白下門東春水流相看一噱散千憂穿梅入栁曽莫逆度嶺緣岡初不謀世事但知吹劒首官身難即問刀頭長臨鍜竈真自苦有興復來從我游噱笑也嵇康琴賦嗢噱終日杜詩一酌散千憂莊子則陽篇恵子曰夫吹管也猶有嗃也吹劒首者吷而巳矣堯舜人之所譽也道堯舜於戴晉人之前譬猶一吷也古樂府藁砧今何在山上更安山何當大刀頭破鏡飛上天注刀頭有環問何時還嵇康傳性絶巧而好鍜宅中有一栁樹甚茂乃激水圜之毎夏月居其下以鍜其五樂世閒身豈易求巖居川觀更何憂放懐自遂如初服買宅相招亦本謀名譽子真矜谷口事功新息困壺頭知君於此皆無累長約追隨壙埌游蔡澤説范雎君何不以此時歸相印讓賢者而授之退而巖居川觀必有伯夷之㢘屈平離騷進不入以離尤兮退將復脩吾初服馬援封新息侯莊子予方將與造物者為人厭則又乗夫莽眇之鳥以出六極之外而游無何之鄉以處壙埌之野崔注云猶曠蕩也次韻送程給事知越州旌節一作千騎東方占上頭如何誤到北山游清明若覩蘭亭月暖熱因忘蕙帳秋投老更一作始知歡可惜通宵先一作豫以别為憂歸來若一作西歸定有詩千首想肯重來賁一丘公闢熈寧十年五月守越樂府東方千餘騎夫壻居上頭元微之苦樂相倚曲猶得半年相煖熱樂天對酒詩賴有詩仙能煖熱本傳稱公闢喜為詩千首非徒説易賁卦賁于丘園次韻酬徐仲元投老逍遙屺與堂天刑真已脱桁楊有紀與堂注紀一作屺莊子無趾曰天刑之安可解桁楊見遊土山注縁源静翳魚無淰渡谷深追鳥有䲳魚淰見秋夜泛舟注甘泉賦魚頡而鳥䲳毎苦交游尋五栁最嫌尸祝擾庚桑相看不厭唯夫子風味真如顧建康歸去來辭請息交以絶游莊子庚桑楚畏壘之人言曰子胡不相與尸而祝之社而稷之乎石林詩話云嘗有人面稱公喜五栁庚桑之句以為的對公笑曰君但知栁對桑為的然庚亦是數葢以十干數之顧憲之為建康令甚得人和故都下飲酒醇㫖輒號為顧建康謂其清且美送許覺之奉使東川三秋不見每惓惓握手山林復悵然後㑹敢期黄耇日相看且度白雞年畏途石棧王尊馭榮路金門祖逖鞭一代官儀新藻拂得瞻宸宇一作扆想留連白雞見遊土山注謂酉年也行葦詩黄耇台背以引以翼師丹傳為國黄耇注稱黄謂白髮落而生黄耇老人色不浄如垢也據此則黄耇是二誼王尊馭見送復之赴成都注晉書劉琨傳常恐祖生先吾著鞭元豐三年初改官制至五年始行之公時奉祠家居故云握手山林唐徳宗賜馬遂宸扆台衡二銘次韻覺之乆知乗𫝊入西州雞黍從容本不謀户外驚塵尺書至眼中白浪片帆收山林病骨煩三顧湖海離腸欲萬周尚有光華賁岑寂篋中佳句得長留漢髙帝紀乗傳詣雒陽師古曰傳者若今之驛馬西州門見遊土山注三顧借用草廬事韓詩别腸車輪轉一日一萬周杜詩詩巻長留天地間元次山編時人好詩名篋中集送程公闢得謝還姑蘇公闢吳郡人姑蘇即吳郡東歸行路歎賢哉碧落新除寵上才白傅林塘傳畫去吳王花草入詩來唱酬自有微之在談笑應容逸少陪除此兩翁相見外不知三徑為誰開二疏之歸道路觀者皆曰賢哉二大夫或太息為之泣下公闢自知青州告老以正議大夫致仕時元豐四年公在金陵正議視六曹侍郎故用碧落字葛洪神仙沈羲傳忽有白鹿青龍車羽衣持節以青玉界丹版拜羲為碧落侍郎樂天嘗守蘇吳王闔閭築吳城郡都之今蘇州城是也李白詩吳時花草埋幽逕按舊本公自注云少保元絳謝事居姑蘇又王中甫善歌詞與相唱酬燕集中甫王介也逸少微之皆取古人以比今之同姓者送項判官斷蘆洲渚落楓橋渡口沙長過午潮山鳥自鳴泥滑滑行人相對馬蕭蕭泥滑滑竹雞也亦名雞頭鶻十年長自青衿識千里來非白璧招握手祝君能強飯華簪常得從雞翹記十年以長則兄事之史記虞卿賜白璧一雙漢書衛皇后傳平陽主拊子夫背曰行矣強飯勉之李義山詩内苑只知含鳯髓屬車無復插雞翹後漢輿服志曰皮軒鸞旗皆大夫載鸞旗者編羽髦列繫幢旁民或謂之雞翹車非也次韻張徳甫奉議張奉議必從公談禪學佛者知君非我載醪人終日相隨免汙茵賞盡髙山見流水唱殘白雪值陽春中分香積如來鉢對現毗耶長者身誰拂定林幽處壁與君圖冩繼吾真陶詩時賴好事人載醪祛所惑汚丞相車茵丙吉傳公自用丞相事列子伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登髙山鍾子期曰善哉峩峩兮若泰山志在流水鍾子期曰善哉洋洋兮若江河陽春白雪見前注言微言妙誼蟬聨不絶香積見懐古注維摩經爾時毗耶離大城中有長者名維摩詰已曽供養無量諸佛深植善根得無忍難為白衣奉持沙門清浄行雖處居家不著三界若在長者長者中尊若在居士居士中尊其以方便現身有疾以其疾故國王大臣長者居士婆羅門等及諸王子并餘官屬無數千人皆往問疾維摩詰因以身疾廣為説法北山三詠寶公塔寶公名寶誌南史有傳按建康志塔在蔣山梁武帝天監十三年以定林寺前岡獨龍阜葬誌公永定公主以湯沐之資造浮圖五級於其上十四年即塔前建開善寺今寺乃其地也紹興間賜塔名感順道林真骨葬青霄窣堵千秋未寂寥寶勢旁連大江起尊形獨受衆山朝雲泉别寺分三徑香火幽人秪一瓢我亦鷲峯同聽法嵗時歌唄豈辭遙道林見酬朱昌叔五首注杜詩赤霄有真骨誌公天監十三年謂人曰菩薩將去矣未及旬日無疾而終屍骸香軟形貌熈悦臨亡然一燭以付後閤舍人吳慶慶即啟聞梁武歎曰大師不復留矣燭者將以後事屬我乎因厚加殯送葬于鍾山獨龍之阜仍於墓所立開善寺敕陸倕製銘於塜内王筠勒碑文寺門傳其遺像處處存焉王逸魯靈光殿賦據坤靈之寶勢張銑注云寶奇也言授地靈之竒勢杜子美望岳詩西岳崚嶒竦處尊諸峯羅列似兒孫佛坐禪於耆闍崛山波旬化作鵰鷲住崛前以恐阿難鳥跡今猶在故名鵰鷲崛山宣宗曰裴休真儒者然嗜浮圖法居常不御酒肉講事其説演繹附著㑹數萬言習歌唄以為樂覺海方丈往來城府住山林諸法翛然但一音不與物違真道廣每隨縁起自禪深舌根已浄誰能壊足迹如空我得尋嵗晚北牎聊寄傲蒲萄零落半床隂寶積經佛以一音演説法華嚴經佛以一音演説衆生隨類各得解道明禪師謂洞山多學佛法廣作利益洞山云多學佛法即不問如何是廣作利益師云一物莫違即是祖師言六根涉境心不隨緣名定詩意若反是其實則謂隨緣應之初不染著始為至也法華經皆得深妙禪定法華經是人舌根浄終不受惡味華嚴第二地法門菩薩得無量神通力能動天地以一身為多身多身為一身或隠或顯石壁山嶂所往無礙猶如虛空於虚空中跏趺而去同於飛鳥天地如水履水如地洪州雙嶺𤣥真禪師初問道吾無神通菩薩為什麽足迹難尋道吾曰同道者方知師曰和尚還知否曰不知師曰何故不知曰去不識我語道光泉建康志道光泉在蔣山之西梁靈曜寺之前熈寧八年僧道光披榛莽得之其深五尺穴竹引注寺中由嶺至寺凡三百步有舒王手植二松於其傍其後道光又得二泉合為一派主寺者作屋覆其上名曰蒙泉以此泉得之道光故名道光泉王平甫作記籜龍將雨遶山行注逺投深静有聲雲涌浴槽朝自暖虹垂齋鑊午還晴銅缾各滿幽人意玉甃因髙正士名神力可嗟妨智巧桔槔零落便苔生首句謂以竹為筒而引泉禪寺浴槽引水如流杯池也雲涌言水熱其氣蒸上如雲虹垂言水㵼入鑊之勢虹見則雨此言其似故云晴唯識論云梵語菩提薩埵唐言好略此云菩薩謂節去二字亦云開士真童儒童真人正士王荆公詩注巻二十六
