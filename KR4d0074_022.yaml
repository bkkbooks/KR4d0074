body:
  text: 王荆公詩注巻二十二宋李壁撰律詩欣㑹亭數家鄰水竹一塢共雲林晩食静適巳晚食見寄吳氏女注獨謠欣㑹心韓詩無人坐獨謠移床隨漫與操筴取幽尋未愛神錐汝猶憐妙斵今今一作琴晉祖納謂梅陶鍾雅君汝潁之士利如錐我幽冀之士鈍如椎持我鈍椎捶君利錐皆當摧矣陶雅並稱有神錐不可槌納曰既有神錐必有神槌東皋起伏晴雲徑縱横暖水陂草長流翠碧花逺沒黄鸝草長謂草色彌望而長惟用長字故覺流字工亦猶用逺字方見沒字妙翠碧黄鸝借言顔色也少游亦嘗用楚製從人笑吳吟得自怡東皋興不淺游走及芳時叔孫通傳短衣楚製吳吟如吳趍行之類陸機吳趍行曰四坐並清聽聽我歌吳趍崔豹古今注曰吳趍曲吳人以歌其地或云以歌其風土也嵗晚月映林塘澹天涵當作風含笑語涼俯窺憐綠浄小立佇幽香攜幼尋新菂扶衰坐野航爾雅注菂蓮實也延緣乆未巳嵗晩惜流光莊子延緣葦間漫叟詩話云荆公定林後詩精深華妙非少作之比嘗作嵗晩詩自以比謝靈運議者以為然王立之詩話云山谷小立近幽香與荆公小立佇幽香韻聨頗相同當是暗合耳半山春晩即事春晚取花去酬一作遺我以清隂翳翳陂路静交交園屋深翳翳交交皆言清隂也床敷每小息杖屨亦一作或幽尋惟有北山鳥經過遺好音寶積經亦不為求天玉女及諸衣食牀敷事欹眠翠幙巻東岡欹眠月半牀松聲悲永夜荷氣馥初涼清話非無寄幽期故不忘扁舟亦在眼終自懶衣裳杜詩地僻嬾衣裳言雖有江湖之興而深居不出尤髙也露坐露坐看溝月飄然風度荷珠跳散作㸃金湧合成波芳嵗老易晚良宵閒獨多秋風不成寐吾樂豈絃歌一作老失芳嵗易静知良夜多陵秋乆不寐山行出寫潺湲一作清淺景歸穿蒼翠隂平頭均楚製長耳嗣吳吟古樂府平頭奴子提筐箱言皆楚製主僕無辨平頭既斥奴長耳則驢也長耳字見宋袁淑驢山公九錫文王濟好作驢鳴恐取此意暮嶺巳佳色寒泉仍好音誰同此真意倦鳥亦幽尋題雱祠堂公自注云在寶公塔院斯文實有寄天豈偶生才一日鳯鳥去千秋梁木摧煙留衰草恨風造暮林哀莊子恐其愛巳而造哀也豈謂登臨處飄然獨往來臨川李子經謂此詩屬王逢原恐非按公父子皆以經術進當時頌美者多以為周孔或曰孔孟范鏜為太學正獻詩云文章雙孔子術業兩周公公大喜曰此人知我父子元澤卒公辭相位歸金陵楊元素當制亦云俄屬伯魚之逝遽興王導之悲觀此所述公既處之不疑以鳳鳥梁木擬元澤無怪也又雱嘗作公真賛云列聖垂教參差不齊集厥大成光于仲尼定林院潄甘涼病齒坐曠息煩襟因脱水邊屨就敷牀上衾但留雲對宿仍值月相尋真樂非無寄悲蟲亦好音送張甥赴青州幕益公長女適工部侍郎張奎此即奎子人情每期費期費出莊子巳見别注之子適予心老餞城東陌悲分嵗暮襟少留班露草遂往隔雲林未覺青丘逺因風嗣好音送張宣義之官越幕二首㑹稽游宦鄉海物錯句章顔師古注漢書云㑹稽山名本茅山禹於此㑹諸侯之計因名㑹稽書海物惟錯漢地理志㑹稽郡有句章縣土潤箭萌美水甘茶串香爾雅曰東南之美有㑹稽之竹箭焉箭萌者箭竹之笋也陸贄傳張鎰餉錢百萬止受茶一串君今肯一作今君誠暫屈他日恐難忘唯有西興渡靈胥或怒張西興在越州吳越春秋曰吳賜子胥劍而死乃投之江中子胥因揚波成濤隨潮往來其二誰謂貴公子乃如寒士家真宜舉敦樸巳自勝浮華洲荻藏迷子溪篁擁若耶相望只在眼音問莫言賖迷子洲屬昇州見七言律詩注此公自言若耶溪屬越州見絶句注此以言張故末句云相望只在眼耶以對子又見公詩律之精也送賛善張君西歸名軒民柴荆雀有羅此必公罷相家居時也故言柴荆雀羅見上注公子數經過邂逅相逢晩逢一作知從容所得多百憂生暮齒一笑隔滄波早晩西州路遙聽下坂坷坷從車葬也庾信竹杖賦别有九棘龎眉三槐暮齒送鄧監簿南歸名鑄公之故人自臨川至金陵省公留踰月公作此詩送之又錄雜詩一巻與鄧時元豐六年秋也不見驪塘路茫然四十春鄧臨川人驪塘在撫州鄧家有刻石茫作芒字觀四十春之語則公去其鄉甚早長為異鄉客毎憶故時人水閱公三世雲浮我一身濠梁送歸處握手但悲辛世尊問波斯匿王云汝今年幾荅云八十世尊云此恒河水汝是幾年見荅云二十佛又云汝今八十與二十嵗所見是同是異荅云一同佛云汝之見性亦復如是維摩經是身如浮雲須㬰變滅秋夜二首客卧書顛倒蟲鳴坐寂寥殘燈生暗暈重露集寒條真樂閒尤見深禪静更超此懐無與晤擁被一作鼻一長謠其二幔逗長風細窗留半月斜浮煙暝綠草泫露冷黄花獨曳緣雲策重光殿賦緣雲上征仍尋度水槎歸時夜參半鄰犬静中譁登樓賦夜參半而不寐徑暖徑暖草如積山晴花更繁縱横一川水髙下數家村静憇雞一作鳩鳴午荒尋犬吠昏歸來向人説疑是武陵源復齋漫錄云荆公詩静憩鳩鳴午學者謂公取唐詩一鴈鳴午寂雙燕話春愁之句余嘗見東坡手寫此詩乃是静憩雞鳴午讀者疑之葢不知取唐人詩楓林社日鼔茅屋午時雞詩話云公自言武陵源不甚好韻中别無韻也晝寢公自注云甲子四月十七日午時作據甲子為元豐七年公是年屬疾奏乞以宅為寺疾愈僦居城中井逕從蕪漫青蔾亦倦扶百年惟有且萬事總無如詩匪且有且注且此也梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶如也昔人非昔人也棄置蕉中鹿驅除屋上烏列子穆王篇鄭人有薪於野者遇駭鹿擊而斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉此掃除外累也劉向説苑愛其人者兼屋上之烏獨眠窗日午往往夢華胥莊子黄帝篇帝退而閒居天庭之館齋心服形三月不親政事晝寐而夢游於華胥氏之國泝栰一作過故居泝栰開新屋扶輿遶故園事遺心獨寄獨寄謂此心如寄雖應物而未嘗留也路翳目空存野果寒林寂蠻花午簟温難忘舊時處欲宿愧桑門言不能無累於物浮屠不三宿桑下又後漢書楚王英傳以助伊蒲塞桑門之饌注桑門沙門也鴈北去還為客南來豈是歸倦投空渚泊飢帖冷雲飛唐崔塗鴈詩渚雲低暗度闗月冷相隨垣栅雞長暖溝池鶩自肥憐渠不知此更墮野雲機此諭世僥倖之徒平居享安富之樂賢也者則嘗履艱厄又不幸往往困於機穽與道原遊西菴遂至草堂寶乗寺二首公自注云元豐四年十月二十四日按建康志云寶乗寺本齊草堂寺周顒隠居之所在城北十一里西菴疑即白雲菴桑楊已零落楊一作麻藻荇亦一作復銷沈蠶月條桑取彼斧斨以伐逺楊注楊條也此對藻荇疑是二物園宅在人境嵗時傷我心強穿西一作南埭路共望北山岑欲與道人語跨鞍聊一尋其二親朋㑹合少時序感傷多勝踐聊為樂清談可當歌微風澹水竹静日暖煙蘿興極猶難盡當如薄暮何送陶氏婦兼寄純甫純甫長女適宣徳郎陶寔此言陶氏婦公之姪女也雲結川原暗風連草木萎遙瞻季行役正對女傷悲皆鍾情語夢事中一作終千變生涯老百罹更慙無道力臨路涕交頥寄西菴禪師行詳公後惡行詳逐之見古詩注意衰難自力扶路便思還強逐蕭騷水遙看慘淡山白傅詩池殘寥落水窗下悠颺風唐人多有此句法行尋香草遍歸漾晩雲閒西崦分明見幽人不可攀贈上元宰梁之儀承議白下有賢宰能詩如紫芝元紫芝也民欺自不忍縣治本無為風月誰同賞江山我亦思粉牆侵醉墨怊悵綠苔滋公自注云梁多留詩在江寧僧舍上言侵醉墨下言綠苔滋葢以苔滋而侵墨上句起意而下句乃成其誼此文章之妙贈殊勝院簡師早悟耆山善佛住耆闍崛山今為洛社豪洛社豪者豈如歐公所指秘演惟儼輩乎有生長寂寞所得是風騷露夕吟逾苦雲秋思共髙此懐差自適千社一牛毛昭公釋魯而以千社為臣周禮二十五家為里里立一社一萬五千家漢書司馬遷傳若九牛亡一毛懐吳顯道公之妻兄南郭紅亭冷西山白道曛韓詩紅亭枕湘江漢書月立秋秋分行西方白道曰西陸江光凌翠氣洲色亂黄雲嵗暮誰邀客情親故憶君天涯獨惆悵歸鳥黒紛紛言見歸翼而重為客之感静照堂任公蹲㑹稽任公釣見雜詠注㑹稽在東方海上得招提謝靈運山居賦建招提於幽峯冀振錫之息肩又魏立精藍為招提之號浄觀堂新構觀音普門品廣大清浄觀幽尋客屢攜飛簷出風雨灑翰落虹蜺投老黄塵陌東看路恐迷重游草堂寺次韻三首屋垣荒葛藟野殿冷檀沈鶴有思顒意鷹無變遁心周顒鶴事見别注支遁好養鷹馬而不乗放人或譏之遁曰貧道愛其神駿耳禪房閉深竹常建破山寺詩一逕通幽處禪房花竹深齋鉢度遙岑寂寞黄塵裏金身倚一尋唐詩遙岑出寸碧八尺為一尋以金身言之才丈六之半栁子厚尊勝幢賛礱石六觚其長半尋其二僧殘尚食少杜詩野寺殘僧少佛古但泥多泥多佛大俚語寒守三衣法飢傳一鉢歌四分律中有三衣謂九條衣七條衣五條衣一鉢歌杯渡作見傳燈錄三十巻寛閒每迸竹危朽漫牽蘿怊悵庭前樹西來意若何僧問趙州祖師西來意州云庭前柏樹子其三野寺真蘭若緗素雜記嘗論招提以謂官賜額者為寺私造者為招提蘭若或謂此論未然葢招提蘭若之號自漢明帝以來天下之寺皆曰招提蘭若無别名也山僧老病多疎鐘挾谷響悲梵入樵歌水映茅篁竹雲埋蔦女蘿拂塵書所見因得擬隂何韓文送區册序夾江荒茅篁竹之間小吏十餘家詩蔦與女蘿隂鏗何遜題齊安寺山亭北山無躑躅故國有楊梅本草躑躅樹生髙三四尺花似桃花葉似山石榴故國謂撫州臨汝志云舊經載果實四楊梅其一也悵望心常折殷勤手自栽此詩建康作懐舊鄉之意深矣公故國為臨川皆有躑躅楊梅而此地無之故手自㘽培以寄土思耳有無二字互相備之詞暮年逢火改晴日對花開萬里烏塘路春風自往來烏塘在撫州與公先墓相近自白門歸望定林有寄建康志云即臺城宣陽門也宋明帝時或謂宣陽為白門為不祥甚諱之右丞江謐誤犯帝變色曰白汝家門通典孝武時侍中何偃南郊陪乘鸞輅過白門閫偃將匐帝反手接之曰朕反陪卿也今宣城門疑是其處蹇驢愁石路余亦倦躋攀傳燈錄馬祖問僧云石頭路滑踏倒汝麽僧云若踏倒則不來此公在閒只騎驢往來北山不見道人乆忽然芳嵗殘朝隨雲暫出暮與鳥争還杳杳青松壁知公在兩間宿定林示寶覺寶覺即無外名務周天女穿林至維摩經有天女散花事又京房易占山見白燕其君宜得貴女注云今俗名燕為天女未知孰是嫦娥度隴來欲歸今晼晚相值且徘徊誰謂我忘老如聞蟲造哀造哀見上注鄰衾亦不寐共盡白雲杯李義山詩陛下好生千萬夀玉樓長御白雲杯然此詩白雲謂茶也宿北山示行詳上人都城羇旅日獨許上人賢誰為孤峯下還來宴坐邊詳住京師公為朝士與之熟晩居北山詳亦在焉故云還來宴坐邊是身猶夢幻何物可攀縁坐對青燈落松風咽夜泉維摩經是身如夢為虛妄起是身如夢為虚妄見楞嚴經塵既不緣根無所偶又華嚴經了知諸法無依止本性寂滅同虛空即詩意也獨飯窗明兩不借榻浄一籧篨爾雅釋名草履曰厞不借言賤易有宜各自畜不假借也史游急就章曰裳韋不借為牧人顔師古注云不借小屨也以麻為之甚賤易得人人各自有不須假借因而為言籧篨竹席史游急就云竹器登笠簟籧篨注云織葦而麄文者曰籧篨栩栩幽人夢栩栩見别注夭夭老者居安能問香積誰可告華胥獨飯牆隂轉看雲坐乆如維摩經上方界分過四十二恒河沙佛有國名衆香佛號香積如來以衆香鉢盛滿香飯與化菩薩列子華胥氏之國在弇州之西台州之北不知斯齊國幾千萬里葢非舟車足力之所及神游而巳張湛注斯涯也齊中也維摩經文殊師利言居士是疾何所因起其生乆如當云何滅後秦釋肇注云是病何因而起起來乆近云何得而滅乎舍利佛言來止此室其已乆如草堂草堂乃齊周顒隠居之所後顒出仕孔稚圭作北山移文假草堂之靈以譏之草堂今寂寞往事翳山椒蕙帳今一作空留鶴蘿衣終換貂蕙帳空兮夜鶴怨貂謂貂冠言顒隠節不終猶慕世榮也生皆墮天袠隠或寄公朝疊穎何勞怒東風汝自搖莊子知北遊篇巳化而生又化而死生物哀之人類悲之解其天弢墮其天袠紛乎宛乎王康琚詩大隠隠朝市北山移文叢條瞋膽疊穎怒魄示耿天隲挾策能傷性捐書可盡年莊子挾䇿讀書殘生傷性均也又可以養生可以盡年弦歌無舊習香火有新緣公晚師瞿曇故云有新緣白土長岡路朱湖小洞天望公時顧我於此暢幽悁白土岡在建康城東髙十丈南至秦淮北連鍾山其土白色金陵有赤山湖又名絳巖湖又名朱湖在上元句容兩縣之間茅山記大元真人内傳曰江水之東金陵之北有小澤澤東有勾曲之山是也陶隠居云小澤即謂今赤山湖也勾曲既名洞天詩所謂朱湖當指此韓詩傾壺暢幽悁光宅寺今知光宅寺牛首正當門牛首山在建康城南三十里一名天闕即此山也自朱雀門㳂御道至山下宋大明中嘗立郊壇於此臺殿金碧毁丘墟桑竹繁蕭蕭新犢卧冉冉暮鴉翻回首千嵗夢雨花何足言示無外支頥横口語椎髻曲肱眠列子黄帝篇九年之後横心之所念横口之所言亦不知我之是非利害歟亦不知彼之是非利害歟莊子横口而語前漢南越王魋髻箕踞服䖍曰魋音椎師古曰椎髻者一撮之髻也其形如椎莫問誰賔主安知汝輩年鄰雞生午寂幽草弄秋妍却憶東窗簟蠻藤故宛然僧問長慶和尚有問有荅賔主歴然無問無荅時如何長慶云相逢盡道休官去林下何曽見一人晉書年輩在臣先北山暮歸示道人千山復萬山行路有無間花發蜂遞繞果垂猿對攀獨尋寒水度欲趁夕陽還天黑月未上兒童初掩闗懐古二首日宻畏前境淵明欣故園日宻古尊宿也龎藴極目觀前境寂寥無一人仙者嘗語歐陽公云公屋宅已壊但明了前境猶庶幾耳那知飯不儩所喜菊猶存維摩經化菩薩往衆香國得滿鉢香飯回至維摩詰舍時維摩詰語舍利佛等可食如來甘露味飯大悲所熏無以限意食之使不消也有異聲聞念是飯少而此大衆人人當食化菩薩曰四海有竭此飯無盡所以者何功徳具足者所食之餘終不可盡於是鉢飯悉飽衆㑹猶故不儩音賜亦有牀坐好但無車馬喧維摩經舍利佛見此室中無有牀坐作念諸菩薩大弟子衆當於何坐居士謂舍利佛言仁者為法來耶求牀坐耶舍利曰我為法來非為牀坐誰為吾侍者稚子候柴門文殊師利言居士此室何以室無侍者維摩詰言一切衆魔及諸外道皆吾侍者其二長者一牀室先生三徑園文殊師利承佛聖㫖詣維摩問疾是時長者維摩詰心念今文殊師利與大衆俱來即以神力空其室内除去所有及諸侍者唯置一牀以疾而卧非無飯滿鉢亦有酒盈樽維摩經香積品云香積如來以衆香鉢盛滿香飯與菩薩時化菩薩既受鉢飯須㬰之間至維摩詰舍以滿鉢香飯與維摩詰又弟子品云須菩提言念我昔入其舍從乞食時維摩取我鉢盛滿飯謂我言須菩提若能於食等者諸法亦等不起華邊坐常開栁際門維摩經見阿閦佛品云佛告維摩詰言善男子為此衆㑹現妙喜國無動如來衆皆欲見於是維摩詰心念吾當不起于座接妙喜國又梵網經云我今盧舍即方生蓮華座謾知談實相欲辯巳忘言維摩詰謂摩訶迦旃延云無以生滅心行説實相法又佛告文殊師利汝行詣維摩詰問疾文殊師利白佛言彼上人者深達實相善説法要楞嚴經佛與文殊諸法王子談實相時世尊亦言心不在内亦不在外此詩逐句對用維摩淵明事上篇亦同王荆公詩注巻二十二
