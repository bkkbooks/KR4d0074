body:
  text: 王荆公詩注巻三十九宋李壁撰律詩蒙城清燕堂九域圖志䝉城𨽻亳州在州南百六十里清燕新詩得自䝉行吟如到此堂中吏無田甲當時氣民有莊周後世風韓安國坐法抵罪蒙師古曰䝉梁國之縣也獄吏田甲辱安國安國曰死灰獨不復然乎曰然即溺之居無㡬漢使使者拜安國為梁内史起徒中二千石田甲亡安國曰甲不就國我滅而宗甲肉袒謝安國笑曰公等足與治乎莊子䝉人名周周嘗為䝉漆園吏與梁惠王齊宣王同時其言洸洋自恣以適巳庭下早知閑木索坐間遥想御絲桐飄然一往何時得俛仰塵沙欲作翁杜牧華清詩北扉閑木索南面富循良吕氏春秋曰宓子賤治單父彈琴身不下堂而治騶忌曰若夫治國而弭人民又何用乎絲桐之間次韻呉彦珍見寄二首君作新詩故起予一吟聊復報雙魚杖藜髙徑誰來往散帙空堂自巻舒古詩客從逺方來贈我雙鯉魚杜詩相與成二老來往亦風流謝靈運酬從弟詩散帙問所知韓詩簡編可巻舒樹外鳥啼催晚種花間人語趂朝墟春風處處堪携手何事臨池苦學書杜詩布榖處處催春種栁詩緑荷包飯趂墟人張芝臨池學草書水盡黑彦珍時為撫州教授學有右軍墨池其二篁竹荒茅五畞餘生涯山蕨與泉魚荒茅篁竹見重遊草堂次韻注退之詩採蕨于山緡魚于泉家貧殖貨羞端木鄉里傳書比仲舒家貧或是家資不然則里字恐誤先進篇賜不受命而貨殖焉言不如安貧而樂道也仲舒下帷講誦弟子傳以久次相授業傳書或指此白日憶君聊望逺青林嗟我似逃虛春風渺渺烏塘尾謾得東來一紙書莊子逃虛空者聞足音而喜李義山詩嵩雲秦樹久離居雙鯉迢迢一紙書自金陵至丹陽道中有感數百年來王氣消難將往事問漁樵温庭筠過呉景帝陵詩王氣消來水淼茫苑方秦地皆蕪没山借揚州更寂寥荒埭暗雞催月曉空埸老雉挾春驕豪華只有諸陵在往往黄金出市朝李白詩苑方秦地少山比洛陽多劉長卿詩金陵巳蕪沒建康圗經雞鳴埭在青溪西南潮溝上過溝有埭名雞鳴齊武帝早遊鍾山射雉至此雞始鳴義山詩春場鋪艾帳下馬雉媒驕禇炫從宋明帝射雉帝至日中無所得甚猜羞召問侍臣曰吾旦來如臯遂空行可笑坐者莫荅炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未驚但得神駕猶豫羣情便可載懽帝意解乃於雉場置酒藝苑雌黄云予與鄉人翁行可同舟泝汴因談及詩行可云介父善下字如空場老雉挾春驕下得挾字最好挾即孟子挾貴挾長之挾予謂介父又有紫莧凌風怯蒼苔挾雨驕後山有寒氣挾霜侵敗絮賔鴻將子度微明其用挾字亦與前一聨同末聨言陵墓遭發金玉出於人間矣初去臨川一作馬頭西去百霑襟一望親庭更苦心巳覺省煩非仲叔安能養志似曽參憂傷遇事紛紛出疾病乗虛亹亹侵手把詩篇卧空屋欲歌商頌不成音撫州金峯有公題字云皇祐庚寅自臨川如錢塘過宿此嘉祐戊辰自畨陽歸臨川再宿金峯詩云十年再宿金峯下身世飄然豈自知山谷有靈應笑我紛紛南北欲何為此詩非庚寅嵗作即戊辰年也集中無此詩東浮溪水渡長林上坂回頭一拊心巳覺省煩非仲叔安能養志似曾參後漢閔貢字仲叔太原人世稱節士雖周黨之潔清自以弗及也黨見其食菽飲水遺以生蒜受而不食黨與仲叔同郡亦貞士也見逸民傳皇甫謐髙士傳曰黨見仲叔食無菜遺之生蒜仲叔曰我欲省煩耳今更作煩邪受而不食孟子若曾子則可謂養志也事親若曾子者可也據此詩公母夫人尚留臨川故有養志之句憂傷遇事紛紛出疾病乗虚亹亹侵未有半分求自贖恐填溝壑更霑襟謝安弱冠詣王濛濛子修曰向客何如大人濛曰此客亹亹為來逼人汲黯傳臣自以填溝壑不復見陛下不意陛下復收之詩言未有以報君親之恩恐先朝露而悲耳讀史自古功名亦苦辛行藏終欲付何人功名雖出於邂逅然殫慮竭精而為之者多矣公自言欲效古之何人當時黯黮猶承誤末俗紛紜更亂真韓集葢覆黯黮不以真情白露左右糟粕所傳非粹美丹青難寫是精神區區豈盡髙賢意獨守千秋紙上塵莊子外篇十四輪扁告齊桓公古之人與其不可傳者死矣然則君之所讀者古之糟粕耳顧凱之傳每畫人或數年不㸃目睛曰四體妍蚩本無關於妙處傳神冩照正在阿堵中劉歆責太常云猶欲得殘守缺挾恐見破之私意而無從善服義之心唐人詩向來竒特幾張紙千古風流一窖塵讀詔書去秋東出汴河梁巳見中州旱勢强日射地穿千里赤風吹沙度滿城黄慶厯七年八月錢彦逺奏前嵗地震雄霸滄登旁及荆湖幅員千里今復大旱人心嗷嗷此詩言去秋正彦逺輩論奏時可見旱勢之盛穿地者盛言日色之熾朝野僉載春甲子雨赤地千里杜詩明朝在沃野苦見沙塵黄近聞急詔收羣策頗説新年又亢陽賤術縱工難自獻心憂天下獨君王慶厯七年三月詔曰自冬訖春旱暵未巳五種不入農失作業朕惟灾變之來應不虚發殆不敏不明以干上帝之怒咎自朕致民實何辜與其降疾於人不若移灾於朕自今中外臣僚其指當世切務實封條上上每命學士草詔未嘗有所増損至是楊察當筆以為未盡罪已之意令更為此詔據降詔在三月則此時當在春時作也故云新年又亢陽按國史言是時方閔雨賈昌朝引漢灾異策免三公故事上表乞罷與參政呉育皆去位宰臣陳執中等並降秩然仁宗聖徳旋禱太一宫雨即降正却葢不御時事也公慶厯二年登第皇祐三年召試館職固辭此詩猶在未作鄞縣前韓詩致君豈無術自獻良獨難杜恕奏疏魏明乞與羣臣議論政事使人得自盡今每有軍事詔書常曰誰憂此者耶吾當自憂耳每見王太丞邑事甚冗而剸劇之暇猶能過訪山館兼出佳篇為贈仰嘆才力因成小詩我看繁訟頻搔首君富才明見亦常尚有閒襟尋水石更留佳句似池塘池塘生春草謝靈運句松苖地合分髙下鳬鶴天教有短長徐上青雲猶未晚可無音問及滄浪選詩欎欎澗底松離離山上苖莊子駢拇篇鳬脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也漁父歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足王浮梁太丞之聽訟軒有水禽三巢于竹林之上恬而自得邑人作詩以美之因次元韻九域志浮梁縣属饒州水邊舟動多驚散何事林間近絶疑言水邊為舟所驚至此近人而馴詩不言水禽直叙其事格致甚新野意肯從賢令至舊巢猶有主人知公自注云見王太丞詩東坡手記野老言鳥雀去人太逺則其子有蛇䑕狐狸鴟鳶之患人既不殺則自近人者欲以免此害也由此觀之異時鳥雀巢不敢近人者以人為甚於蛇鼠之類也不關飲啄春江暖自在飛鳴夏日遲覽徳豈無丹穴鳯到時應讓向南枝莊子野雉五步一鳴十步一啄賈誼傳鳯凰翔于千仞兮覽徳輝而下之山海經丹穴之山有鳥曰鳯寄虞氏兄弟一身兼抱百憂虞忽忽如狂久廢書疇昔心期俱喪勇此來腰疾更乗虛智勇俱喪項羽咄嗟叱咤千人俱廢久聞陽羨安家好自度淵明與世疎亦有未歸溝壑日㑹應相近置田廬公詩又有久聞陽羨溪山好頗與淵明性分宜之句除夜寄舍弟一樽聊有天涯憶百感翻然醉裏眠酒醒燈前猶是客夢回江北巳經年佳時流落真堪惜一作何得勝事蹉跎只可怜惟有到家寒食在春風同泛澦溪船方干詩紅燈短燼方燒臘畫角殘聲又報春明日便為經嵗客昨朝猶是少年人觀公此作則覺干語為繁矣荅熊本推官金陵寄酒鬱金香是蘭陵酒枉入詩人賦詠來李白詩蘭陵美酒鬱金香玉椀盛來琥珀光庭下北風吹急雪坐間南客送寒醅淵明未得歸三徑叔夜猶同把一杯吟罷想君醒醉處鍾山相向白崔嵬此詩必作扵在朝之日因得金陵酒而懐舊居和錢學士喜雪手把詩翁憶雪詩坐愁窮海瘴煙霏退之詩出入髙下窮煙霏誰令天上蒼茫合蒼茫謂雲也忽作一作見空中散漫飛閶闔與風生氣勢嫦娥交月借光輝許慎説文閶闔天門也又春秋考異郵曰四十五日閶闔風至閶闔者咸收養也注秋分之候也四十五日廣莫風至廣莫者精大滿也注冬至之候也山鴉瑟縮相依立邑犬跳梁未肯歸韓詩喙雪寒鴉趂始飛瑟縮凍貌也栁宗元荅韋中立書僕來南二年冬幸大雪數州之犬皆倉黄吠噬狂走者累日至無雪乃巳㸃綴丘園榮樹木埋藏溝塹亂封圻畢命申畫郊圻愼固封守髙歌業巳傳都市逸興何當叩隱扉髙歌借用陽春白雪歌及子猷訪戴事見别注頗欲携尊邀使騎㡬忘温席薦親闈唐王元寳掃雪迎賔為宴樂之㑹晉西河人王延事親色養夏則扇枕冬則以身温被公今早晩班春去强勸澇田補嵗饑據説文澇有平去兩聲又云水名出扶風鄠縣北入渭今公所指必謂旱澇之澇魏志鄭渾遷沛郡太守郡界下濕患水澇百姓饑乏渾興陂堨開稻田人皆以為不便渾曰地勢汚下宜灌溉終須為稻之利遂躬率吏民興立比年大收民賴其利送江寧彭給事赴闕彭思永自右諫議大夫知瀛州以病請便郡徙知江寧府召為御史中丞論斥濮議最力公時在江寧作此詩送之西江望士衆長兼卓犖傳家在一男思永本京兆人其先徙廬陵故云西江望士壯志異時開史牒妙齡終日對書龕桂堂發策收科選櫻苑頒詩預宴酣晉郄詵傳武帝於東堂問詵云云猶桂林之一枝崑山之片玉仁宗賜進士詩仙籍乍標崑玉貴宴杯猶及苑櫻期拾遺録漢明帝於月夜宴賜羣臣櫻桃盛以赤瑛盤羣臣視之月下以為空盤又唐書文宗即位因内園進櫻桃以奉三宫太后又景龍文館記上與侍臣於樹下摘櫻桃恣其食末後大陳宴席奏宫樂至暝人賜朱櫻兩籠大邑援琴聊試可小州懷綬果才堪援琴宓子賤事書試可乃巳彭嘗為南海分寧二邑又守潮州常州皆有政績懷綬字借用朱買臣事分臺拜職榮先入抗疏辭恩恥横覃思永自常州召入為侍御史皇祐中將祀明堂有傳赦語百官皆遷官思永上疏力止濫恩故云勁操比松寒不撓忠言如藥苦非甘龍鱗直為當官觸虎穴寧關射利探張良傳且忠言逆耳利於行毒藥苦口利於病龍鱗見次韻鄧子儀注呉吕䝉年十五六竊隨姊夫鄧當擊賊當大驚呵叱不能止歸告䝉母母虎欲罰之䝉曰貧賤那可居脱誤有功富貴可致且不入穴安得虎子母哀而許之朱轂獸頭終協夢粉闈雞舌更須含揚雄解嘲子徒欲朱丹其轂晉鄧攸父殷為淮南太守夢行水邊見一女子猛獸自其後斷其鞶帶囊占者以為水邊有女汝字也斷鞶帶者新獸頭代故獸頭也不作汝隂當作汝南也果遷汝隂太守通典尚書省中以胡粉圖畫古賢烈士漢制尚書郎含雞舌香奏事思永罷御史以司封外郎知宣州故有獸頭雞舌之句均輸北轉荆門鷁勸課西臨蜀市蠶思永自宣擢湖北轉運使故云荆門鷁思永任益州路轉運使成都闕守領守事故云勸課西臨蜀市蠶蜀之先有蠶叢市又髙辛時蜀有蠶女期信有兒迎郭伋食貧無地乞羊曇郭伋再為并州牧行部到西河美稷有兒童數百各騎竹馬道左迎拜問伋何日當還伋令從事計日告之既還先期一日伋為違信於諸兒遂止於野亭須期乃入謝安棊負以墅乞羊曇此言公清貧無地可乞人也乞當作气音氣與人物也槖垂鈴棧駝鳴􅕫節擁棠郊虎視耽退之征蜀聨句椎肥牛呼牟載實駝鳴􅕫音乙轄反廣韻十五轄有􅕫字注駱駝鳴也易頤卦虎視耽耽其欲逐逐注虎下視貌歸見廣墀瞻斧藻對揚初服改朱藍文選江淹雜體詩序譬猶藍朱成采錯雜之變無窮斧藻謂天子之服東坡雪詩如誇剪刻工故上朱藍袂進班華省財方阜出按窮邊虜稍戡帝命賈琮當冀北民歌姬奭次周南自益州入為兵部郎中三司户部副使故云財方阜旋擢天章閣待制陜西都轉運使故云按窮邊靈帝時詔書沙汰二千石更選清能吏乃以賈琮為冀州刺史命御者褰赤帷裳百城震悚公自陜起漕改知瀛州故云當冀北召公姬姓名奭周南詩什名次周南者指召南也投壺饗客魚無乙伐鼓蒐兵馬有驔祭遵傳遵為將軍取士皆用儒術對酒設樂必雅歌投壺禮記内則魚去乙注乙魚體中害人者名也東海鰫魚有骨名乙在目傍狀如篆乙食之鯁人不可出爾雅曰魚枕謂之丁魚腸謂之乙魚尾謂之丙注云此皆似篆書字因以名焉韋莊豈慮其烹魚去乙或致傷鱗傳言公仕既顯自奉不改其常詩有駰有騢有驔有魚鱗鬛掀紅旗杳杳虬髯吒黒纛鬖鬖崔豹古今注曰鯨海魚也大者長數千里小者數千尺鼓浪成雷濆沫成雨水族驚畏之皆逃匿莫敢當其雌曰鯢大者亦長千里眼睛為明月珠鬛魚脊上鰭嶺表録異曰海鰌魚即海上最偉者也其小者亦千餘尺每嵗廣州常發􅔓船過南安貿易路經海心深闊處忽見十餘山忽出忽沒篙工曰非山島海鰌魚背也目閃鰭鬛若簸朱旗日中忽雨霢霂舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳漸近魚即鼓船而譟倐爾而沒金樓子曰鯨鯢一名海鰌穴居海底鯨入穴則水溢為潮鯨既出入有節故潮水有期白詩槍森赤豹尾纛吒黒龍髥威加諸部風霜肅惠浸連營雨露涵大斗時時能劇飲輕裘往往秪清談乾龍巳應天飛五晉馬徐觀晝接三道在君臣方自合徳侔卿長更誰慙輕裘見賦擬峴臺注乾龍謂英廟初御極也晉康侯用錫馬蕃庶晝日三接謂彭自江寜入覲卿長陳寔事便蕃肯較平生寵放曠惟知雅性妉委佩去辭廷殖殖揚舲來得府潭潭一尊客路從容盡千里人情委曲諳豈但搢紳稱召杜故多扶杖祝彭聃殖殖其廷殖殖言平正也前漢召信臣遷南陽太守吏民親愛號曰召父又後漢杜詩守南陽政治清平時人方於信臣故南陽為之語曰前有召父後有杜母言思永所至有惠愛民比之召杜而祝其長年使如彭聃耳幕中俊乂閑刀筆帳下驍雄冷劒鐔楚地恠須留汲黯蕭規疑欲付曹參俊乂思永幕客也閑刀筆亦幕府省文書之義帳下驍雄言部曲也三國將兵將軍有帳下督劍鐔劍口也莊子説劍天子之劍以晉魏為脊周宋為鐔注音淫又徒南反謂劍鐔也汲黯傳㑹更立五銖錢民多盜鑄錢者楚地尤甚上以淮陽楚地之郊召黯為淮陽太守揚子雲解嘲蕭規曹隨從來貴勢公何慕自是賢名上所貪未信逸身今以老且當憂國每如惔論心邂逅膠投漆搔首低回雪滿篸周武帝嘗令楊素草詔下筆立成帝嘉之曰善自勉勿憂不富貴素應聲曰但恐富貴來逼臣臣無心圗富貴公何慕政用此意詩憂心如惔膠投漆以喻其固雪滿篸言髪白如雪鎮撫未驚移嵗月追攀曾許賞煙嵐餘歡遽隔新亭餞宿惠難忘舊館驂巻曲尚誰知散櫟崢嶸空此詠枯楠王導傳有燕新亭事但改燕為餞為是送彭也禮記孔子之衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之樗散是不材之木也其大本擁腫而不中䋲墨其小枝巻曲而不中規矩無所可用杜詩梗楠枯崢嶸鄉黨皆不記又云空餘棟梁具無復霄漢志王荆公詩注巻三十九
