body:
  text: 王荆公詩注補遺古今體詩五首車螯俗本在次韻遊山門寺望文脊山後海於天地間萬物無不容車螯亦其一埋沒沙水中獨取常苦易衛生乏明聰機緘誰使然含蓄略相同坐欲腸胃得要令湯火攻置之先生盤噉客為一空蠻夏怪四坐不論殼之功狼籍堆左右棄置任兒童何當強收拾持問大醫工信陵坊有籠山樂官俗本在次韻和中甫兄春日有感後萬里山林姿羽毛何璀璀鳴聲應律呂惟有知者愛都門市井兒誰玩汝文采應須鎖樊籠勿受丸矰害致仕邵少卿挽詞二首俗本在永夀縣太君周氏挽詞二首後謝朓城中守梁鴻基下歸素車馳吉路丹旐卷寒輝撫几虛容在瞻圖實貌非無因置一酹空此歎長違其二杯酒𨝍溝上紛紛巳十年音容常想見風迹每流傳老去元卿位新開太守阡慶門當更大子弟固多賢偶成漸老偏諳世上情巳知吾事獨難行脫身負米將求志勠力求田豈為名高論頗隨衰俗廢壯懷難值故人傾相逢始覺寬愁病搔首還添白髮生王荆公詩注補遺
