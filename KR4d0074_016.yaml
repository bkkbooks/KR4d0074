body:
  text: 王荆公詩注卷十六宋李壁撰古詩次韻酬微之贈池紙并詩微之出守秋浦時椎氷看搗萬榖皮晉書贊謂蕭子雲書窮萬榖之皮波工龜手咤今樣莊子不龜手之藥魚網肯數荆州池盛𢎞之荆州記曰棗陽縣蔡倫宅其中其存傍有池名蔡子池倫漢順帝時人始以魚網造紙縣人今猶多能作紙蓋倫之遺業霜紈奪色價不售虹玉喪氣山無輝方船穩載獻天子酈食其傳方船而下師古曰方併也善價徐取供吾私十年零落尚百一持以贈我隨清詩君寧久寄金榖地方執賜筆磨坳螭唐志天子御正殿二史分左右立有命則俯陛以聽退而書之若仗在內閣則分立第二螭首和墨濡筆皆即坳處當留此物朝上國日侍帝側書新儀不然名山副史本褒拔元凱誅窮竒司馬遷傳藏之名山副在京師左氏八元八凱窮竒檮杌咨豫文章非世用畫鏤空爾靡氷脂楊次公鹽鐡論內無其質而外學其文若鏤氷畫脂費日損功揮毫才足記姓字項羽傳籍少時學書不成去梁怒之籍曰書足記姓名而巳不足學竊學又恥從師宜衛恆傳上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最每書輒削而焚其柎遂以書名此言竊學謂鵠也又晉書右軍贊師宜懸帳之竒罕有遺迹又按師宜官南陽人時天下工書者皆聚於鴻都門至數百人稱宜官為首大則一字徑丈小則方寸千言今詩止稱師宜去官字蓋祖晉帖也匆匆㸃汙亦何忍嘉貺但覺難為辭篇終有意責趙璧窮國恐誤連城歸秦以虛詞欲取趙璧實無豫城意故云恐誤史記趙惠王得和氏璧秦昭王聞之使人遺趙王書願以十五城易璧藺相如奉璧奏秦秦王無意償城相如乃使其從者衣褐懷璧從間道亡歸璧於趙傾囊倒篋聊一報安敢坐以秦為雌孟嘗君傳馮歡謂秦王曰天下之士入秦者莫不欲强秦而弱齊入齊者莫不欲强齊而弱秦此雌雄之國也勢不兩立秦王曰何以使秦無為雌而可酬沖卿月晦夜有感夜雲不見天況乃星與月蕭蕭暗塵定坎坎寒更發樓歌客尚飲酩酊不畏雪巷哭復有人南州人聞羊祜喪罷市哭聲相接鄰風送幽咽紛然各所遇悲喜孰優劣君方感莊周浩蕩擺羈絏歸來亦置酒玉指調絃撥獨我坐無為青燈對明滅絃撥二物也鵾絃鐵撥琵琶以鵾雞筋為絃鐵為撥送子思兄參惠州軍沄沄曲江水天借九秋色樓臺飛半空秀色盤韶石韶石見别注載酒填里閭吹花换朝夕笙簫震河漢錦繡爛冠幘地靈瘴癘絶人物傾南極馬援鑄銅柱以標南極之處先朝有名臣介甫父楚公嘗為韶州此言名臣謂楚公卧理訟隨息稍稍延諸生談笑顧賓客子來適妙年謁入交履舄寂寥九齡後此獨望一國曲江公韶州人言子思可繼之虞翻禮丁覽虞翻傳初山隂丁覽太末徐陵或在縣吏之中或衆所未識翻一見之便與友善終成顯名韓愈俟趙德韓趙見别注孤岸鎮頺波俗流未易識我方文葆中趙世家小兒被曰文葆旋逐旌旗蹟去思今豈忘耳目熟遺跡吏含殷勤言俯仰問乖隔當時府中兒侵尋鬢邉白下帷雖著書不救寒餓迫董仲舒下帷講道謂宜門䦨士官路久烜赫奈何猶差池更捧丞掾檄捧檄見涓涓乳下子注驥摧千里蹄鵬墮九霄翮人生無巧愚天運有通塞試觀馳騁人意氣宇宙窄榮華去路塵謗辱與山積優游祿仕間較計誰得失送君强成歌陟岵翻感激韓詩歡華不滿眼咎責塞兩儀公詩類此送董伯懿歸吉州我來以喪歸君至以謫徙蒼黃憂患中邂逅遇於此去年服初除聽赦相助喜看君數歸月但屈兩三指嘉祐八年八月公丁母憂時為知制誥觀詩意董由遷謫來金陵嘗從公游此詩送其歸鄉蓋赦後一年乃得歸茫然冬更秋一笑非願始籃輿楊栁下明月芙蕖水僮飢屢窺門客罷方隱几是非評衆詩成敗斷前史時時對奕石漫浪爭生死送迎皆幅巾設食但陳米亦曾戲篇章揮翰疾蒿矢莊子在宥篇焉知桀跖之不為嚆矢也注嚆矢之猛者崔本作蒿君豪才有餘我老憊先止東城景陽陌南望長干紫景陽宫在臺城內長干是秣陵縣東里巷名江東謂山隴之間曰干金陵五里有山岡其間平地民庶雜居有大長干小長干東長干並是地名欲斸三畝蔬於焉寄殘齒經過許後日唱和猶在耳新恩忽捨我欣悵生彼巳江湖北風帆捩柂即千里相逢知何時莫惜縑與紙八月十九日試院夢沖卿空庭得秋長漫漫寒露入幕愁衣單喧喧人語已成市白日未到扶桑間十洲記云扶桑地方萬里多生林木其葉如桑長者數千丈兩兩同根偶生故名扶桑永懷所好却成夢玉色髣佛開心顔逆知後應不復隔談笑明月相與閒平甫歸飲在館中時作無田士相弔亦以廢燕樂我官雖在朝得飲乃不數詩書向墻戶賓至無杯杓空取上古言酬之等糟粕有如揚子雲嵗晚天祿閣但無載酒人識字真未博公自言識字不多載醪而問者少此近於戲也然識字亦豈易哉漢之諸儒比肩立而揚子雲獨以識字稱韓公以道德文學伏一世而自謂凡為文辭宜略識字推此可知其非易也介甫登科為淮揚簽判時韓魏公作鎮喜介甫文學不以吏事許之介甫每引古義爭事公一裁以法律往往不從介甫官滿既去有人獻公書書中多用古字公不能識持示羣寮亦不識公曰王廷評在必能識此人多識難字介甫聞之怒以為輕巳疑此句有激而云也又眺景迂晚年嘗語人云曰課識十五字景迂博學多識未見其比晚年衰病尚勤如此可以為法也叔兮歸自東一笑堂上酌緒餘不及客兒女聊相酢髙談非世歡自慰亦不惡寄言繁華子此趣由來各鄭谷詩一年流淚同萬里相思各答陳正叔天馬志萬里駕鹽不如閒壯士困局束不如棄之完前漢禮樂志渥窪馬歌太乙況天馬下志俶儻精權竒體容與巡萬里又戰國策夫驥服鹽車上太行中坂遷延負轅不能上伯樂下車哭之者也退之讀皇甫湜公安園池詩觀之亂我意不如不觀完用之不盡不如不用利行有厄轍勢涉無恬瀾明明千年羞促促一日歡陸士衡豫章行促促薄暮景注促促短貌孰肯避此世引身取平寬超然子有意為我歌考槃豫方慕孔氏委吏久盤桓得失未云殊聊各趨所安過食新城藕他年過食新城藕枕藉船中載親友劉伶酒德頌枕麴藉糟今年却到經行處獨坐昏煙對舞栁甘酸向口無所適牢落盤飱與樽酒氷房玉節謾自好穆天子傳西王母獻素蓮一房欲御還休涕垂手曽參宦學居常近家語曽參齊嘗聘欲與為卿而不就曰吾父母在食人之祿則憂人之事故吾不忍遠親而為人役也陽城離别初不久陽城為國子祭酒引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城歸養者二十輩不歸者斥之公蓋以此教人詩所引恐此事人間此願兩未能西風落日空回首明州錢君倚衆樂亭君倚名公輔仁宗時自三司户部判官出知明州有善政自明召入為修注公嘗舉以自代使君幕府開東部名髙海曲人知慕艤船談笑政即成洗滌山川作佳趣平泉浩蕩銀河注想見明星弄機杼載沙築成天上路唐世拜相禮絶班行府縣載沙填路自禁城至其第名沙隄投虹為橋取孤嶼掃除荆棘水中央碧瓦朱甍隨指顧春風滿城金版舫來看置酒新亭上百女吹笙綵鳯悲一夫伐鼓靈鼉壯安期羡門相與遊方丈蓬萊不更求酒酣忽跨鯨魚去陳迹空令此地留列仙傳安期生琅琊人賣藥東海邉時人皆言千嵗漢郊祀志李少君言臣嘗游海上見安期生食巨棗大如瓜安期仙者通蓬萊中合則見不合則隱後欒大亦言臣常往來海中見安期羡門之屬顧以臣為賤不信臣羡門碣石山上仙人名子髙也愛日使北時作揚子孝子愛日雁生隂沙春冬息陽海澨冥冥取南北豈以食為纍咨豫愁病軀鄙朴人所戲無才治時難量力當自棄豈知塞上霜飄然亦何事髙堂已白髮愛日負明義怨風吹平原怨風當作悲風秣馬聊一愒含懷孰與語仰屋思嘆喟孟母知身從萊妻恥人制一肉儻易謀萬鍾非得計孟母事見列女傳萊妻事詳見别注顔曾之養何必萬鍾答裴煜道中見寄煜慶歷六年省元係賈黯榜君遊苦數歸苦晚一驛險有千里遠知君陟降旦暮間馬力不徑厭長坂雨腳墜地花枝低風頭入溪蒲葉偃此處登臨不奈愁瓊樹森森遮疊巘餘寒餘寒駕春風入我征衣裳捫鬢秪得凍蔽靣尚疑創士耳恐猶墮馬毛欲吹僵漢書上聞韓王信降胸奴上將擊之連城乘勝逐北至樓煩㑹大寒士卒墮指者十二三傅𤣥詩嚴風截人耳素雪隨地凝西京雜記漢元封二年大雪深一丈野中鳥獸皆死牛馬踡縮如蝟牢持有失箸疾飲無留湯先主方食不覺失匕箸言方寒手凍至不能執捉曈曈扶桑日出有萬里光可憐當此時不濕地上霜言日薄不能使霜消詩雨雪瀌瀌見晛曰消冥冥鴻雁飛前望去成行誰言有百鳥此鳥知隂陽豈時有必至前識聖所臧前識謂先見把酒謝髙翰我知思故鄉憶鄞縣東吳太白山水亦名孤城孤城回首一作望詎幾何憶得好處長經過最思東山春樹靄更憶南湖秋水波三年飄忽一作百年顛倒如夢寐萬事感激一作乖隔徒悲歌應須飲酒不復道今夜江頭明月多韓詩一年月明今宵多又有酒不飲爭奈明何和微之藥名勸酒此湊藥名為詩陳亞嘗有藥名詩云風月前湖近軒窗半夏涼棊為臘寒呵子下衣嫌春瘦縮紗裁世傳以為起於亞非也自梁以來如簡文帝元帝皆有藥名詩庾肩吾沈約亦各有一百首至唐張籍為離合詩有云江臯嵗暮相逢地黃葉生前半下枝子夜吟詩問松桂心中萬事喜君知以此觀之則藥名詩初不始於亞矣赤車使者錦帳郎從容珂馬留閒坊赤車使者從容見既别羊王二君注珂大如鰒皮黃黑而骨白以為馬飾生南海紫芝眉宇傾一坐笑語但聞雞舌香紫芝生髙夏山谷六芝皆無毒雞舌香按三省故事尚書郎口含雞舌香以其奏事答對使氣芬芳母丁香亦名雞舌香藥名勸酒詩實好陟釐為我書數行陟釐乃水中苔今取以為紙名苔紙見本草草部真珠的皪鳴槽牀金罌琥珀正可嘗真珠出亷州邉海中有洲島島上有大池謂之珠池每嵗刺史親往監珠户入池採老蚌割取珠以充貢史君子細看流光史君子形如梔子稜瓣深而兩頭尖亦似訶梨初始因潘州郭使君療小兒多是獨用因號為史君子莫惜覓醉衣淋浪獨醒至死誠可傷獨醒草名歡華易盡悲酸早人間沒藥能醫老寄言歌管衆少年趂取烏頭未白前酸棗生河東川澤樹犬如火棗實無常形味酸者是沒藥生波斯國似安息香黑色貫衆生𤣥山山谷苖似狗脊狀如雉尾烏頭葉厚莖方中空葉四四相當與蒿相似白前苖似細辛而大色白易折生洲渚沙磧之上金櫻子今之刺榆子松脂千年為茯苓又千年為琥珀客至當飲酒二首結屋在牆隂閉門讀詩書懷我平生友山水異秦吳杖藜出柴荆豈無馬與車窮通適異趣談笑不相愈愈悅也謂語不相投也寧復求古人浩蕩與之俱客至當飲酒日月無根株張籍青天蕩蕩髙且虛上有白日無根株流光暫出還入地使我少年不須臾其二天提兩輪光環我屋角走自從紅顔時照我至白首列子一兒曰日初出大如車輪及中才如盤蓋此不為日初出去人近日中時去人逺乎杜詩云日月雙車轂纍纍地上土往往平生友纍纍謂冢少年所種樹磊砢行復朽古人有真意獨在無好醜冥冥誰與論客至當飲酒楊王孫傳歸者得至化者得變是物各反其真也反真冥冥亡形亡聲詩意言人任運而生乘化而盡無獨存之理乙未冬婦子病至春不已乙未為至和二年公時為羣牧判官被使畿內後二年卒求常州以出天旋無窮走日月爾雅二十八宿及諸星皆循天左行一日一夜一周天日月五星則右行日行一日一周天月行一月一周天青髮能禁幾回首兒呻婦嘆冬復春强欲笑歌難發口黃卷幽尋非貴嗜藜牀穩卧雖貧有二物長乖亦可憐一生所得猶多苟黃卷藜牀非謂無此二物也不能盡其樂耳南史江斆讓婚表至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖强起寒堂耿不寐轆轆聞車聲不知誰家兒先我霜上行歎息夜未央呼燈置前楹推枕欲强起問知星正明昧旦聖所勉齊詩有雞鳴嗟豫以竊食更覺負平生詩女曰雞鳴士曰昧旦子興視夜明星有爛飲裴侯家此必是裴煜作郡江淮時語意可知也裴侯飲我日向中四坐賓客顔皆紅掃除髙館邀我入自出糶麥憐民窮天邉眼力破萬里桑麻冥冥山四起野心探尋殊未已更欲湔衣北城水忽見碧樹櫻桃懸下馬恣食不論錢赤星磊落入我眼恐是半醉遊青天裴侯方坐塵沙裏役身救物當如此我曹偶脫簿領間同忍愛惜一日閒且歸拂席飽眠睡明日更看滁南山送謝師宰赴任楚州二首師宰陽夏公絳之子陽夏四子景初景溫景平景回此景平也珠玉不自貴故為人所憐賢愚亦如此好惡有自然聞子欲東南使我抱憂一作幽悁炎風沙土中甘與子留連大梁非無客跪起廢食眠相看獨不厭以此知子賢衰氣已難强壯心方少年才髙豈易得朂子在雕鐫其二昆崙一支流向東謂汴水也流入淮故言東七月八月船如風愛君少壯此行樂恨我留連成老翁魏文帝與吳質書曰志意何時復類昔日已成老翁但未白頭耳神頭兩岸水無窮伏檻荷花滿眼紅神頭屬楚州地名當時不得君擕手今日山川在眼中次韻遊山門寺望文脊山文脊山一名曷山在寧國縣西三十里宣城百山間文脊尤竒峯拔出飛鳥上圖畫難為容聞昔有幽人捫蘿追赤松赤松古仙人也遺形此古室孤坐鹿裘重人去邈不反洞壑空藏龍按晉書隱逸傳瞿硎先生者不得姓名亦不知何許人也太和末嘗居宣城郡界文脊山中山有瞿硎因以名焉大司馬桓溫嘗造之既至見先生被鹿裘坐於石室神無忤色溫及僚佐數十人皆莫測之乃命伏滔為之贊竟卒於山中側行蒼崖煙俯仰求靈蹤遊者如可得甘棄萬户封安能久塵土傾倒相迎逢疥昭公二十年齊侯疥遂痁梁元云疥音痎兩日一發之瘧杜預注云案傳例因事曰遂若痎已是瘧何為復言遂痁乎說文曰疥瘙也周禮天官疾醫曰夏時有癢疥病禮記月令民多疥癘浮陽燥欲出隂濕與之戰燥濕相留連蟲生乃投間搔膚血至股解衣燎爐炭方其愜心時更自無可患呼醫急治之莫惜千金散有樂即有苦愜心非所願莊子樂未畢也哀又繼之王荆公詩注卷十六
