front:
  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0074_WYG_000-1a, image: WYG1106/WYG1106-0001a.png}
body:
  text: 王荆公詩註别集類二宋提要臣䓁謹案王荆公詩註宋李壁撰考宋史及諸刋本壁或從玉作璧然壁為李燾第三子其兄曰垕曰塾其弟曰􅌫名皆從土則作璧悮也壁字季章號雁湖居士初以䕃入官後登進士寜宗朝累遷禮部尚書叅知政事兼同知樞宻院事諡文懿事蹟具宋史本傳是書乃其謪居臨川時所作劉克荘後村詩話甞譏其注歸腸一夜繞鍾山句引韓詩不引吴志註世論安以蟲疑冰句引荘子不引盧鴻一唐彦謙語指為疎漏然大致捃摭蒐采具有根據疑則闕之非穿鑿附㑹者比原本流傳絶少故近代藏書家俱不著録海鹽張宗松得元人槧本始為校刋集中古今體詩以世行臨川集較之増多七十二首其所佚者附録巻末考葉紹翁四朝聞見録稱開禧初韓平原欲興兵遣張嗣古覘敵張還大拂韓㫖復遣壁壁還與張異詞階是進政府云云是壁附和權姦以致喪師辱國實墮其家聲其人殊不足重箋釋之功足禆後學固與安石之詩均不以人廢云乾隆四十四年七月恭校總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三王荆公詩注目録别集類二宋巻一古詩巻二古詩巻三古詩巻四古詩巻五古詩巻六古詩巻七古詩巻八古詩巻九古詩巻十古詩巻十一古詩巻十二古詩巻十三古詩巻十四古詩巻十五古詩巻十六古詩巻十七古詩巻十八古詩巻十九古詩巻二十古詩巻二十一古詩巻二十二律詩巻二十三律詩巻二十四律詩巻二十五律詩巻二十六律詩巻二十七律詩巻二十八律詩巻二十九律詩巻三十律詩巻三十一律詩巻三十二律詩巻三十三律詩巻三十四律詩巻三十五律詩巻三十六律詩巻三十七律詩巻三十八律詩巻三十九律詩巻四十律詩巻四十一律詩巻四十二律詩巻四十三律詩巻四十四律詩巻四十五律詩巻四十六律詩巻四十七律詩巻四十八律詩巻四十九律詩巻五十律詩王荆公詩注題辭王荆公詩五十巻鴈湖先生李壁季章箋注予十年前購得華山馬氏所藏元刻本間取通行臨川集勘之篇目既多寡不同題字亦增損互異乃歎是書之善不獨援据該洽可號王氏功臣也史稱季章嗜學如飢渴羣經百氏搜抉靡遺今鴈湖集既不存其他著録亦盡逸惟是書見稱藝林而流布絶少因重鋟之以廣其傳俾嗜古者得窺先生之藴涵識臨川之意匠而并可正俗本之紕繆殆如景星鳯凰争先覩之為快已乾隆辛酉上已後五日武原張宗松題於清綺齋畧例荆公詩註五十巻見晁氏讀書志與是書巻帙相符馬氏通考稱十五巻盖傳冩者偶倒其文耳陳氏云參政眉山李壁季章譔謫居臨川時所作助之者曾極景建魏鶴山作序王逸注騷李善注選皆分疏於句下未有譏其横隔者後人注杜始變其例并注於全詩之後是書體例不一或分注或總注或用圈隔之或牽連書之悉遵其舊不敢妄為攙易注家多穿鑿附㑹之病又有稠叠蔓引之病李氏捃摭蒐采務求來歴或字義稍有異同則云公别有所本或云未詳出處豈有改竄舊文偽造故事以疑悞後學者乎至於彼此複出李氏亦或不免然一經刪削便失昔人面目不若仍之為愈改壯月為牡丹疑木刋為水利勘書所以貴闕疑也然元刋不逮宋槧也是翁屢言之是書間有顯然訛脱處悉取四庫書校正惟釋典道藏揷架所無未敢增易一字薛夢符之補注杜集黃學臯之補注蘇集類皆自為一書是書補注或綴巻末或附詩後今悉仍其舊惟低一字以别之原本尚有劉須溪評㸃品藻甲乙容有未當且雜亂注中觀者目眩今並芟之使李注孤行更覺心目開朗詩集之前例有年譜杜韓蘇諸家皆然荆公獨無或以為請予曰李氏于題下或標年月或引時事姓名必著官爵必書其于公生平出處兄弟朋友親屬過從離合之迹亦畧可考焉予聞見淺尠未敢為續貂之舉止彷杜韓蘇三家例附宋史本傳于巻首知人論世請竢後賢詩中先後序次與世俗所行臨川集本亦無大異但俗本遺漏甚多古詩如八巻中鳯凰山第二首十二巻中揚雄第一首十五巻中寓言第四首第六首第七首第八首第十首第十三首二十巻中澶州一首寄平甫弟衢州道中一首二十一巻寄慎伯筠以下十三首河北民以下二首律詩如二十五巻中次韻張子野秋中乆雨晚晴以下五首三十六巻中次韻王禹玉平戎慶捷一首三十七巻得孫正之詩因寄呈曾子固至末凡三十首四十巻中春怨一首宫詞一首四十六巻中雜詠第六首四十八巻中晩春以下七首子貢一首通計古今體詩七十二首皆此本所有而俗本所無也惟五古中車螯一首及信陵坊有籠山樂官一首五律中致仕邵少卿挽詞二首則俗本載之而此本反缺因彷草堂詩箋逸詩拾遺之例附録于末又七律中偶成二首李氏逸去其一而附注于寄曾子固詩下或疑中四句重用之故然題下及目録内仍作二首豈李氏原未嘗刪而刋書者誤去之與不敢妄增亦列之于補遺中通行臨川集本詩題毎有增損字句亦多異同或如魯魚亥豕亟當改正或如别風淮雨無嫌並存遽數之不能終也意欲倣朱子之于韓文别為考異一巻卒卒未暇姑俟諸異日云李氏之注王詩猶施氏之注蘇詩任氏之注黃陳二家詩也山谷後山詩注尚有前明雕板東坡詩注則宋漫堂先生獲宋槧本刋行于吳中今遂家有其書矣獨是書絶無僅有近代儲藏之家若絳雲若傳是俱不列其目華山馬氏至晩嵗始得之故道古樓書目亦未之載衎齋沒後復隨雲烟飄蕩流轉數姓歸予插架因念吾鄉姚叔祥有言藏書家但知秘惜為藏不知傳布為藏遂繕冩雕印公諸同好覽者勿易視之宋漫堂先生所得宋槧施注原闕一十二巻其存者又多殘脱雖經時賢補綴究非昔人完書識者不無憾焉是書首尾完好不為蟫蝕䑕齧殆有神物䕶持惟巻端失去魏鶴山序一篇第三十巻第五十巻失去兩末頁訪求數年無從鈔録與昔之刻山谷詩注者失去鄱陽許尹一序又失去題下注脚二頁髣髴同符亦一異也俟訪得之當即補入開雕於庚申臘月蕆事於辛酉夏五縱臾剞劂鳩工而飭材者倪子東銘大成也往來商𣙜析疑而辯譌者許子初筠昂霄也至於讐校之勞余獨任之而某書某篇代余檢覓則塾師朱子學顔以發暨誾諤兩兒與有力焉例得附書
