front:
  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0074_WYG_000-1a, image: WYG1106/WYG1106-0001a.png}
body:
  text: 王荆公詩注别集類二宋提要臣等謹案王荆公詩注宋李壁撰考宋史及諸刋本壁或從玉作璧然壁為李燾第三子其兄曰垕曰孰其弟曰􅌫名皆從土則作璧悮也壁字季章號雁湖居士初以蔭入官後登進士寧宗朝纍遷禮部尚書參知政事兼同知樞密院事諡文懿事迹具宋史本傳是書乃其謪居臨川時所作劉克莊後村詩話嘗譏其注歸腸一夜繞鍾山句引韓詩不引吳志注世論安以蟲疑冰句引莊子不引盧鴻一唐彥謙語指為疏漏然大致捃托搜采具有根據疑則闕之非穿鑿附會者比原本流傳絶少故近代藏書家俱不著録海鹽張宗松得元人槧本始為校刋集中古今體詩以世行臨川集較之增多七十二首其所佚者附録卷末考葉紹翁四朝聞見録稱開禧初韓平原欲興兵遣張嗣古覘敵張還大拂韓旨復遣壁壁還與張異詞階是進政府云云是壁附和權姦以致喪師辱國實墮其家聲其人殊不足重箋釋之功足禆後學固與安石之詩均不以人廢云乾隆四十四年七月恭校總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三王荆公詩注目録别集類二宋卷一古詩卷二古詩卷三古詩卷四古詩卷五古詩卷六古詩卷七古詩卷八古詩卷九古詩卷十古詩卷十一古詩卷十二古詩卷十三古詩卷十四古詩卷十五古詩卷十六古詩卷十七古詩卷十八古詩卷十九古詩卷二十古詩卷二十一古詩卷二十二律詩卷二十三律詩卷二十四律詩卷二十五律詩卷二十六律詩卷二十七律詩卷二十八律詩卷二十九律詩卷三十律詩卷三十一律詩卷三十二律詩卷三十三律詩卷三十四律詩卷三十五律詩卷三十六律詩卷三十七律詩卷三十八律詩卷三十九律詩卷四十律詩卷四十一律詩卷四十二律詩卷四十三律詩卷四十四律詩卷四十五律詩卷四十六律詩卷四十七律詩卷四十八律詩卷四十九律詩卷五十律詩王荆公詩注題辭王荆公詩五十卷鴈湖先生李壁季章箋注豫十年前購得華山馬氏所藏元刻本間取通行臨川集勘之篇目既多寡不同題字亦增損互異乃歎是書之善不獨援據該洽可號王氏功臣也史稱季章嗜學如飢渴羣經百氏搜抉靡遺今鴈湖集既不存其他著録亦盡逸惟是書見稱藝林而流布絶少因重鋟之以廣其傳俾嗜古者得窺先生之藴涵識臨川之意匠而并可正俗本之紕繆殆如景星鳯凰爭先覩之為快已乾隆辛酉上已後五日武原張宗松題於清綺齋略例荆公詩注五十卷見朝氏讀書志與是書卷帙相符馬氏通考稱十五卷蓋傳寫者偶倒其文耳陳氏云參政眉山李壁季章撰謫居臨川時所作助之者曾極景建魏鶴山作序王逸注騷李善注選皆分疏於句下未有譏其橫隔者後人注杜始變其例并注於全詩之後是書體例不一或分注或總注或用圈隔之或牽連書之悉遵其舊不敢妄為攙易注家多穿鑿附會之病又有稠疊蔓引之病李氏捃托搜采務求來歷或字義稍有異同則云公别有所本或云未詳出處豈有改竄舊文偽造故事以疑誤後學者乎至於彼此復出李氏亦或不免然一經刪削便失昔人面目不若仍之為愈改壯月為牡丹疑木刋為水利勘書所以貴闕疑也然元刋不逮宋槧也是翁屢言之是書間有顯然訛脫處悉取四庫書校正惟釋典道藏插架所無未敢增易一字薛夢符之補注杜集黃學臯之補注蘇集類皆自為一書是書補注或綴卷末或附詩後今悉仍其舊惟低一字以别之原本尚有劉須溪評點品藻甲乙容有未當且雜亂注中觀者目眩今並芟之使李注孤行更覺心目開朗詩集之前例有年譜杜韓蘇諸家皆然荆公獨無或以為請豫曰李氏于題下或標年月或引時事姓名必著官爵必書其于公生平出處兄弟朋友親屬過從離合之迹亦略可考焉豫聞見淺鮮未敢為續貂之舉止倣杜韓蘇三家例附宋史本傳于卷首知人論世請俟後賢詩中先後序次與世俗所行臨川集本亦無大異但俗本遺漏甚多古詩如八卷中鳯凰山第二首十二卷中揚雄第一首十五卷中寓言第四首第六首第七首第八首第十首第十三首二十卷中澶州一首寄平甫弟衢州道中一首二十一卷寄慎伯筠以下十三首河北民以下二首律詩如二十五卷中次韻張子野秋中久雨晚晴以下五首三十六卷中次韻王禹玉平戎慶捷一首三十七卷得孫正之詩因寄呈曾子固至末凡三十首四十卷中春怨一首宫詞一首四十六卷中雜詠第六首四十八卷中晚春以下七首子貢一首通計古今體詩七十二首皆此本所有而俗本所無也惟五古中車螯一首及信陵坊有籠山樂官一首五律中致仕邵少卿挽詞二首則俗本載之而此本反缺因倣草堂詩箋逸詩拾遺之例附録于末又七律中偶成二首李氏逸去其一而附注于寄曾子固詩下或疑中四句重用之故然題下及目録內仍作二首豈李氏原未嘗刪而刋書者誤去之與不敢妄增亦列之于補遺中通行臨川集本詩題每有增損字句亦多異同或如魯魚亥豕亟當改正或如别風淮雨無嫌並存遽數之不能終也意欲倣朱子之于韓文别為考異一卷卒卒未暇姑俟諸異日云李氏之注王詩猶施氏之注蘇詩任氏之注黃陳二家詩也山谷後山詩注尚有前明雕板東坡詩注則宋漫堂先生獲宋槧本刋行于吳中今遂家有其書矣獨是書絶無僅有近代儲藏之家若絳雲若傳是俱不列其目華山馬氏至晚嵗始得之故道古樓書目亦未之載衎齋沒後復隨雲煙飄蕩流轉數姓歸豫插架因念吾鄉姚叔祥有言藏書家但知祕惜為藏不知傳布為藏遂繕寫雕印公諸同好覽者勿易視之宋漫堂先生所得宋槧施注原闕一十二卷其存者又多殘脫雖經時賢補綴究非昔人完書識者不無憾焉是書首尾完好不為蟫蝕鼠齧殆有神物護持惟卷端失去魏鶴山序一篇第三十卷第五十卷失去兩末頁訪求數年無從鈔録與昔之刻山谷詩注者失去鄱陽許尹一序又失去題下注腳二頁髣佛同符亦一異也俟訪得之當即補入開雕於庚申臘月蕆事於辛酉夏五縱臾剞劂鳩工而飭材者倪子東銘大成也往來商𣙜析疑而辨訛者許子初筠昂霄也至於讐校之勞余獨任之而某書某篇代余檢覓則孰師朱子學顔以發暨誾諤兩兒與有力焉例得附書
