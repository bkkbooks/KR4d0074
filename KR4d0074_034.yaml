body:
  text: 王荆公詩注巻三十四宋李壁撰律詩欲往淨因寄涇州韓持國紫荆山下物華新只與都城共一春令節想君携緑酒故情憐我踏黄塵泔魚巳悔它年事搏虎方收末路身欲寄微言書不盡試尋僧閣望西人涇州即漢安定郡彰化節度或言介父寄持國此詩所稱泔魚巳悔它年事搏虎方收末路身謂其行新法後晚悟其非而有此語也然持國以議陳執中謚不合意自太常禮院通判涇州乃嘉祐五年二月是時介父為從官安得有新法事地理書涇州無紫荆山按禹貢導汧及岐至於荆山正在涇隴之間或指此余使燕見虜中一文人集有登涇州紫荆山詩荀子曰曾子食魚有餘曰泔之門人曰泔之傷人不如奥之曾子泣曰有異心乎哉傷其聞之晚也公與劉原父書河役之罷以轉運賦功本狹與雨滛不止督役者皆以病告故止耳昔梁王墮馬賈生悲哀泔魚傷人曾子涕泣今勞人費財於前而利不遂於後此某所以愧恨無窮也鄒陽傳至其晚節末路涇州属秦鳯路故云望西人送别韓虞部客舍街南初著巾與君兄弟即相親當年豈意兩家子今日更為同社人桓温令司馬著帽進著巾猶著帽漢盧綰傳里中兩家親相愛生子同日古詩愿為同社人雞豚燕春秋京洛風塵嗟阻闊江湖杯酒惜逡巡惜别也秦紀九國之師逡巡逃遁而不敢進歸帆嶺北茫茫水把手何時寂寞濵懷舒州山水呈昌叔山下飛鳴黄栗留溪邊飲啄白符鳩詩黄鳥于飛陸機疏云黄離留也或謂之黄栗留晉樂志楊𢎞云自到江南見白符舞或言白鳬鳩舞云有此來數十年矣似苦孫皓虐政思属晉也不知此地從君處亦有他人繼我不塵土生涯休盪滌風波時事只飄浮相看髮秃無歸計一夢東南即自羞呈栁子玉同年三年不上鄴王臺鴻鴈歸時又北來水底舊波吹嵗換栁梢新葉巻春回杜詩青歸栁葉新塵沙漠漠凋雙鬢簫鼔怱怱把一杯勞事欲歌無與和衰顔思見故人開選詩悟彼蟋蟀唱信此勞者歌次韻陸定逺以謫往來求詩牢落何由共一樽相望空復歎芝焚陸機歎逝賦信松茂而柏悦嗟芝焚而蕙歎濟時尚負平生學慰我空一作應多别後文可但風流追甫白由來家世出機雲韓詩逺追甫白感至誠行吟强欲偷新格自笑安能到萬分屈原既放行吟澤畔白詩苦被老元偷格律谷永傳不能褒揚萬分師古曰言萬分之一李璋下第浩蕩宫門白日開君王髙拱試羣材學如吾子何憂失命屬天公不可猜言其學足以得科第无如命何意氣未宜輕感慨文章猶忌數悲哀男兒獨患無名爾將相誰云有種哉世多言韓栁東坡因遷謫後文益竒杜詩文章憎命達歐陽亦言非詩能窮人殆窮者而後工今公所稱又别一説耳陳勝傳且壯士不死即巳死即舉大名耳王侯將相寧有種乎送楊驥秀才歸鄱陽客舍風塵弊綵衣悲吟重見鴈南飛荆山和氏方三獻太學何生且一歸卞和事見别注韓文蕃淮南人也父母具全初入太學嵗率一歸父母止之其後間一二嵗乃一歸曠野巳寒諳獨宿長年多難惜分違唐皇甫冉詩夜涼宜共醉時難惜相違巾箱所得皆幽懿亦見鄉人為發揮南史王淮之曾祖彪之博聞多識練達朝儀自是家世相傳並諳江左故事緘之青箱謂之王氏青箱學齊衡陽玉鈞細書五經置巾箱平山堂平山堂在揚州城西北五里大明寺側慶厯八年二月歐陽公以起居舍人知制誥來牧是邦暇日將僚属賔客過大明佛寺登古城遂撤廢屋為堂於寺庭之坤隅江南諸山拱列簷下若可攀取因目之曰平山堂城北横崗走翠虬蜀岡也在維揚之北一堂髙視兩三州謂揚州潤州真州也余乙丑年以使事嘗至堂上時雨新霽三州之勝盡在目前山石草木邑屋皆可數云淮岑日對朱欄出江岫雲齊碧瓦浮滕王閣詩畫棟朝飛南浦雲朱簾暮捲西山雨即此句法墟落耕桑公愷悌杯觴談笑客風流不知峴首登臨處壯觀當時有此不王琪君玉平山堂詩云大厦主人金鼎重依依楊栁漫揺風王自注云今大參歐陽公始建是堂公又作歌云手種堂前楊栁别來幾度春風示徳逢先生貧敝古人風緬想柴桑在眼中憐愍雞豚非孟子勤勞禾黍信周公孟子謂雞豚狗彘之畜无失其時七十者可以食肉矣徳逢必持不殺之戒者故以孟子言食肉為非周公七月詩十月納禾稼黍稷重穋深藏組麗三千牘静占寛閑五百弓處世但令心自可相知何藉一劉龔東方朔傳朔公車上書凡三千奏牘公車令兩人共持舉其書僅能勝之儀禮鄉射記侯道五十弓注云弓者侯之所取數宜於射器也又云物長如笴其間容弓者上下肘相去六尺西域記云一踰繕那四十里為八拘盧舍拘盧舍者謂大牛鳴聲所極為拘盧舍分一拘盧舍為五百弓分一弓為四肘分一肘為二十四指又云鼓者所聞有逺近有大小大則二千弓弓長五肘計十里小則五百弓弓長四肘計六百步為二里龔後漢人陶詩云仲蔚愛窮居遶宅生蒿蓬翳然絶交遊賦詩頗能工舉世无知者只有一劉龔示四妹孟光求壻得梁鴻廡下相隨不諱窮梁鴻同縣孟氏有女狀肥黑而醜力舉石臼年三十不嫁父母問其故曰欲得賢如梁伯鸞者云云隨鴻至呉依大家臯伯通居廡下為人賃舂每歸妻為具食舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之於家卓犖才名今日事蕭條門巷古人風世説門庭蕭寂居然有名士風流五噫尚與時多忤一笑兼忘我屢空六月塵沙不相貸泫然搔首又西東梁鴻同妻隱霸陵山中因東出關過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之求鴻不得一笑恐是用如臯射雉事語回也其庶乎屢空注空匱也空苦縱切今作平聲用陶詩屢空嘗晏如寄酬曹伯玉因以招之寒鴉對立西風樹幽草環生白露庭清坐苦無公事擾髙談時有故人經韓詩歴歴余所經思君異日投朱紱過我何時載緑醽易困卦朱紱方來韋賢詩云黼衣朱紱師古曰朱紱為朱裳畫為亞文亞古弗字也故因謂之紱字又作黻曹子建責躬詩要我朱紱劉良注曰朱紱諸侯之儀服酃渌見和王微之登髙齋注但酃渌合作兩字用今以對朱紱必别有所本左思賦云飛輕觴而酌􅬕渌或取此及此江湖氣蕭爽最宜相值倒吾瓶韓詩所嗟旡可召不得倒吾瓶奉酬李質夫逸少池邊有舊山幾年征淚染衣斑言不得歸舊山均客寄耳故稱征淚駑駘自飽方爭路騕褭長飢不在閑言絶足不收於帝閑而駑馬充斥競進雪漲江南歸浩蕩煙埋河朔去間關勞歌一聽皆愁思況我心非木石頑李歸江南公往河朔疑奉使時作故下有勞歌之句寄袁州曹伯玉使君宜春城郭繞樓臺想見登臨把一杯韓詩莫以宜春逺江山多勝遊濕濕嶺雲生竹箘㝠㝠江雨熟楊梅政成定入邦人詠詩就還隨驛使來錯莫風沙愁病眼不知何日為君開詩爾牛來思其耳濕濕此借用宜春竹絶佳故山谷送人詩歸到宜春問春事班班笋竿蕨破拳邢太保有鶴折翼以詩傷之客有記翎經㝠三韻而忘其詩者因作四韻不為摧傷改性靈静中猶見舊儀刑退之詩嬌癡婢子无性靈言鶴被傷毁恬然不改其度每怜今日長垂翅却悔當年悞剪翎垂翅字見光武賜馮異詔杜詩青㝠却垂翅韓詩剪翎送籠中此疑用支遁剪翎事醫得舊創猶有法相知多難豈無經稻粱且向人間覓莫羡摶風起北㝠白樂天病鶴詩右翅低垂左股傷可怜風皃甚昂藏亦知白日青天好未要髙飛且養創相鶴經古仙人浮丘公所撰鮑昭云相鶴經亦名幽經昭舞鶴賦云散幽經以騐物偉胎化之仙禽即是公集有熙寧中所修相鶴經莊子逍遥遊北㝠有魚其名為鯤化而為鳥其名為鵬鵬之徙於南㝠也摶扶揺而上者九萬里注云風名寄致政呉虞部白鷗生意在滄波不為風塵有網羅年秪馮唐初未半才方疏廣豈能多言白鷗本是江湖之物不為風塵羅網而始愛滄浪馮唐傳武帝求賢良舉唐唐時年九十餘不能為官迺以子遂為郎呉虞部是時年止四十餘耳疏廣傳賢而多財則損其志愚而多財則益其過才字恐是此財字孤清楚國知誰寄遺愛郴人相共歌嗟我欲歸真未晚雪舟乗興㑹相過張曲江詩幽林歸獨卧滯念洗孤清昭公二十年子産卒仲尼間之出涕曰子産古之遺愛也雪舟事屢使再至京口寄漕使曹郎中漂流曾落此江邊憶與詩翁賦浩然鄉國去身猶萬里驛亭分首巳三年梅宛陵有蘇州曹琰虞部浩然堂詩蘇子美作堂記北城紅出髙枝靚南浦青回老樹圓還似昔時風露好只疑談笑在君前杜詩岩排石樹圓次韻平甫金山㑹宿寄親友天末海門横北固煙中沙岸似西興北固即今鎮江府梁武帝幸北固改為北顧十道志潤州北固山三面臨水北望海口西興属越州巳無船舫猶聞笛逺有樓臺秪見燈山月入松金破碎江風吹水雪崩騰飄然欲作乗桴計一到扶桑恨未能揚蟠金山詩天末樓臺横北固夜深燈火是揚州王平甫以為是宅牙人語扶桑日所拂木也淮南子曰日出暘谷浴于咸池拂于挾桑爰始將行是謂朏明遯齋閑覽云唐人題西山寺云終古碍新月半江無夕陽人謂冠絶古今以其盡得西山之景趣也金山寺留題者亦多而絶少佳句惟寺影中流見鐘聲兩岸聞又天多剰得月地少不生塵最為人傳誦要亦未為至工若用之於落星寺有何不可熙寧中荆公有北固西興之句始為中的送何聖從龍圖名郯射策曾稱蜀郡雄朝廷重得漢司空何武蜀郡郫縣人武帝時為大司空聖從成都人故用武事景祐元年甲科及第應留賜席丹塗地誤責飛芻紫塞功梅福傳涉赤墀之塗注以丹掩泥塗殿上杜詩閣道通丹地郯為御史言宰相陳執中无學術參知政事丁度輕脫樞密使夏竦回邪皆不協人望後判銀臺言龍昌期異端之學非毁周公不宜崇長詔追所賜緋及絹文彦博少從昌期學深惡郯言徙判吏部流内銓又改龍學河東都轉運使此言公不應去朝廷職將輸也三徑欲歸無舊業百城先至有清風潞山直與天為黨回首孫髙想見公劉長卿詩罷歸无舊業唐人詩舊業巳隨征戰盡此言何欲歸蜀而未有田園郯論事鯁切風節素髙到郡劾前宰相太原帥梁適疾病廢職不能退又劾都鈐轄押班蘇安静怙寵不法真不負清風之言也適乃郯同年第三甲潞州属河東為上黨郡有上黨關皆大山號天下險絶處送趙學士陜西提刑遥知彼俗經兵後應望名公走馬來陛下柬求今日始胷中包蓄此時開山西豪傑歸囊牘渭北風光入酒盃堪笑陋儒昏鄙甚略無謀術賛行臺此詩不類公作姑存丙申八月作秋風摧剥利如刀漠漠昏煙玩日髙眼看南山露崖窽心隨東水轉波濤退之遊青龍寺詩南山逼冬轉清瘦刻畫圭角出崖窽歸期正自憑蓍蔡生理應須問酒醪還有詩書能慰我不多霜雪上顛毛登西樓樓影侵雲百尺斜行人數上憶天涯情多自悔登髙數目極應驚悵望賒栁詩登髙欲自紓彌使逺念來亦自悔之意一曲平蕪連古樹半分殘日帶明霞潘郎何用悲秋色秪使傷春髮巳華杜詩青山猶含半邊日潘安仁有秋興賦多感慨之詞故云悲也又有悼亡詩傷春必指此唐人鸛雀樓詩逺目非春亦自傷即事淮流南苑岸西斜風有晶光露有華門栁故人元亮宅井桐前日總持家楚詞光風轉蕙杜詩清切露華新陶公五栁先生傳先生不知何許人也亦不詳其姓字宅邊五栁因以為號下句説江揔詳見招約之職方注佳招欲覆杯中渌麗唱仍添錦上花便作武陵樽俎客川原應未少紅霞杜詩共指西日不相貸喧呼且覆杯中渌錦上添花俚語公未必本此盧氏雜記肅宗時宫錦坊不收舊錦工曰如今花樣與前不同酬呉仲庶小園之句舊年臺榭掃流塵職閉朱門嵗又新花影隙中看裊裊車音墻外聽一作去轔轔韓詩馬啼无入朱門迹縱有春歸可得知魏豹傳人生一世間如白駒過隙師古曰隙壁際相逢豈少佳公子一醉何妨薄主人秪向東風邀載酒定知無奈帝城春史記平原君翩翩濁世佳公子魏曹爽傳李勝出為荆州刺史往辭司馬懿懿陽為昏謬錯亂其詞因欲自力設薄主人生死共别載酒見上陳咸傳即䝉子公力得入帝城死不恨始與韓玉汝相近居遂相與逰今日復相近而兩家子唱和詩相屬因有此作羇旅兒童得近鄰相知邂逅即情親當時豈意兩家子此地更為同社人事同見送别韓虞部注勲業彈冠知白首文章投筆讓青春萬金雖愧若多産比我淵明亦未貧漢書王陽結綬貢禹彈冠後漢班超傳嘗輟耕投筆司空圖詩樂地留髙趣權門讓後生韓詩指渠相賀言此是萬金産此似喻玉汝之諸子淵明五男兒故云亦未貧公止有雱而雱又清狂不慧何以云此若以財利言恐非春寒春風滿地月如霜拂曉鐘聲到景陽花底裌衣朝宿衛栁邊新火起嚴粧李益詩受降城下月如霜令狐楚詩紫禁香如霧青天月似霜王維詩髙樓月似霜南史齊武帝置鐘於景陽樓上應五鼓及三鼔宫人聞之早起粧飾潘安仁秋興賦御袷衣祫裌同衣無絮裌古洽切杜詩退朝花底散歸院栁邊迷又朝來新火起新煙韓詩唯將新賜火向曉着朝衣氷殘玉甃泉初動水澁銅瓶漏更長從此暄妍知幾日便應鵜鴂損年芳離騷經恐鵜鴂之先鳴兮使夫百草為之不芳揚雄傳注鵜鴂一名子規一名杜䳌音題决次韻再遊城西李園京師花木類多竒常恨春歸人未歸車馬喧喧走塵土園林處處鎖芳菲古詩帝城春欲暮喧喧車馬度唐人詩多少朱門鎖空屋主人到老不曾歸殘紅已落香猶在羇客多傷涕自揮我亦悠悠無事者約君聨騎訪郊圻宋景文落花詩將飛更作回風舞已落猶成半面粧畢命申畫郊圻予求守江隂未得酬昌叔憶江隂見及之作按江隂本縣属常州偽唐昇元年中建為軍宋朝因之寰宇志云本漢曲阿縣之地黄田港北水如天萬里風檣看賈船按江隂邊海有黄田蔡涇二閘潮汐之所往來又漕河過常州别為一港曰五卸港自晉陵至江隂由港北入江海外珠犀常入市人間魚蟹不論錢髙亭笑語如昨日末路塵沙非少年强乞一官終未得秪君同病肯相憐伍子胥曰嚭與吾同怨子不聞河上之歌者乎同病者相憐劉孝標廣絶交論同病相憐綴河上之悲曲樂天贈劉夢得詩顧我獨狂多自哂與君同病最相憐送蘇屯田廣西轉運屯田名安世字夢得開封人嘗白歐公之寃被貶者為廣漕在慶厯末間置將從來欲善師百城蹉跌起毫釐孫子善師者不陣善陣者不戰漢髙帝紀髙祖曰天下方擾諸侯並起置將不善一敗塗地趙充國傳失此二䇿羗人故敢為逆失之毫釐差以千里是既然矣驅除久費兵符出按撫紛煩使節移譏属任不專遣使紛紜恩澤易行窮苦後功名常見急難時功業見乎變言常在艱危之際孺文此日風流在直筆他年豈愧辭後漢蘇章字孺文酬淮南提刑邵不疑學士曾詠常州送主人豈知身得兩朱輪言常作送人赴常州詩自亦為此郡朱兩輪見上注田疇汎濫川方壅廚傳蕭條市亦貧言水利不修川不軌道而為農田害漢書飾廚傳此言公私皆困以我薄材思拊傴賴君餘教得因循謂撫民也莊子人間世昔者桀殺關龍逢紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也注傴拊謂憐愛之猶嘔呴謂養也詢求故有風謡在不獨鑱詩尚未泯公自注云來詩及予送沈常州之詩而卒有西壁鑱詩尚未泯之句酬王太祝一馬常隨世事馳豈論江徼與河湄言江南與京師巳成白髮潘常侍更似青衫杜拾遺潘岳秋興賦序云晉十有四年余春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直于散騎之省注云髮始有二白毛拾遺謂少陵勲業儻來知有命文章聊欲兩字誤見無期喜君材俊能從我力學何妨和子思出城訪無黨因宿齋館關外尋君信馬蹄謾成詩句任天倪韓詩只知閑信馬不覺誤隨車莊子寓言篇卮言日出和以天倪花枝到眼春相映一作照山色侵衣晚自迷杜詩藥裹關心詩㧾廢花枝到眼句還成唐人詩山路元无雨空翠濕人衣今日笑談還喜共經年勞逸固難齊生涯零落歸心懶多謝慇懃杜宇啼觀公末句巳有不歸臨川之意葢臨川生理亦薄寄張氏女弟楚公二女長適工部侍郎張奎奎時巳亡詩中多悼張之詞十年江海别常輕豈料今隨寡嫂行心折向誰論宿昔魂來空復夢平生杜子美詩心折此時無一寸又歸心折大刀又心折大刀頭宋玉招魂章句魂兮歸來去君之恒幹音容想像猶如昨嵗月蕭條忽巳更知汝此悲還似我欲為西望涕先横漢中山靖王勝曰今臣心結日久每聞幼眇之聲不知涕泣之横集也奉寄子思以代别南北蹉跎成兩翁魏文帝與呉質書曰巳成老翁但未頭白耳悲歡邂逅笑言同全家欲出嶺雲外匹馬肯尋山雨中趨府折腰嗟踽踽聽泉分手惜怱怱白傅詩冉冉趨府吏折腰用淵明事孟子踽踽涼涼寄聲但有加餐飯才業如君豈久窮文選古詩弃捐勿復道努力加餐飯次韻劉著作過茆山今平甫往遊因寄華陽仙伯有茆卿官府今傳在赤城大茅君盈傳食四節隱芝者位為真卿又盈拜東岳上卿司命真君故此言茅卿也赤城在海上近蓬萊濛傳云神仙得道者茅初成駕龍上昇入太清時下𤣥圃戲赤城繼世而往在我盈濛字初成即盈之髙祖言盈自華陽洞天徙治赤城韓詩上界真人足官府三鶴不歸猶地勝二君能到亦心清三鶴事見茅山詩注言鶴駕雖不返地故竒勝也詩中慷慨悲陳迹篇末慇懃奬後生遥想青雲知可附坐看閭巷得名聲世説王長史登茅山大慟曰瑯琊王伯輿終當為情死伯夷傳閭巷之人欲砥行立名者非附青雲之惡能施於後世哉次韻十四叔賜詩留别窮冬追路出西津西津在撫州之西去城五里得侍茫然兩見春發策久嗟淹國士起家初命慰鄉人揚子學行篇或人啞耳而笑曰須以發策決科劉歆傳以病免官起家復為安定属國都尉田蚡傳當是時丞相入奏事語移日所言皆聽薦人或起家至二千石權移主上行辭北闕樓臺麗歸佐南州縣邑新班草數行衣上淚何時杖屨却相親杜牧詩北極樓臺長挂夢西江波浪逺吞空班草見張甥赴青州幕注次韻耿天隲大風雲埋月缺暈寒灰飇發齊如巨象豗淮南子畫隨灰而月暈缺注以蘆灰環月缺其一面則月暈亦缺杜詩不得淮王術風吹暈巳生韓詩陵如巨象豗縱勇萬川氷柱立紛披千障土囊開劉义有氷柱詩杜賦四海之水皆立宋玉風賦盛怒於土囊口杜詩曾宫憑風回岌業土囊口魯門朱怪爰居至鄭圃何妨禦冦來國語爰居止於魯東門之外展禽曰今兹海鳥有灾乎夫廣川鳥獸恒知避其灾也海多大風杜詩魯門鵎鶋亦蹭蹬聞道如今猶避風列子鄭人鄭圃子列子居四十年人无識者御風而行屢見上終夜不眠誰與共坐忘唯有一顔回莊子大宗師仲尼蹵然曰何謂坐忘顔回曰墮肢軆黜聰明離形去知同於大通此謂坐忘王荆公詩注巻三十四
