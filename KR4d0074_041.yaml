body:
  text: 王荆公詩注卷四十一宋李壁撰律詩歌元豐五首水滿陂塘榖滿篝漫移蔬果亦多收神林處處傳簫鼓共賽元豐第一秋夢得詩楓林社日鼓茅屋午時雞淳于髠傳甌窶滿篝注篝籠也其二露積山禾一作成山百種收漁梁亦自富蝦鰌無羊說夢非真事豈見元豐第二秋楚茨我庾維億毛氏曰露積曰庾語云野有庾積又退之韓許公神道碑公私充塞至於露積不垣又齊民要術百種非上聲詩維鵜在梁即魚梁也無羊之詩曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家臻臻注衆魚則為豐年應旐旟則為盛多之象其三湖海元豐嵗又登旅生猶足暗溝塍家家露積如山壠黃髮咨嗟見未曽光武紀建武二年野蠶成繭野穀旅生注云不因播種而生故曰旅一作稆古字通用又東坡云地久不生穀氣無所耗藴畜自發而為野蠶旅穀也吾以是知五穀耗地氣為甚其四放歌扶杖出前林遙和豐年擊壤音曽侍玉階知帝力曲中時有譽堯心栁詩出門呼所親扶杖登西林髙歌足自快商頌有遺音趙后傳砌皆銅沓冒黃金白玉階莊子與其譽堯而非桀不若兩忘而化其道一本作土階韓非子土階三尺謂堯也其五豚柵雞塒暗靄間暮林搖落獻南山豐年處處人家好隨意飄然得往還莊子達生篇為彘謀曰不如食以糟糠而錯之牢策之中注策木欄也詩君子于役雞棲于塒日之夕矣吳融詩鵝湖山下稻粱肥㹠穽雞栖對掩扉棊莫將戲事擾真情且可隨緣道我嬴戰罷兩奩收黑白一枰何處有虧成舒王在鍾山與道士棊道士曰彼亦不敢先此亦不敢先惟其不敢先是以無所爭故能入於不死不生公笑曰此特棊謎也莊子齊物篇有成與虧故昭氏之鼓琴也韋耀博奕論然其所志不出一枰之上吳志題扇玉斧修成寶月團月邊仍有女乘鸞青冥風露非人世鬢亂叉橫特地寒酉陽雜俎鄭仁本與其中表遊山迷路見一人枕山襆物而坐因問之云君知月七寶合成乎常有八萬二千户修之我其一也因開襆示之有斤斧數事玉屑飯兩裹分遺鄭曰食此可無疾劉夢得詩雲衢不要吹簫伴只擬乘鸞獨自飛江淹雜擬紈扇如團月出自機中素畫作秦王女乘鸞向煙霧韓詩春半邉城特地寒夢黃糧欲熟且留連漫道春歸莫悵然胡蝶豈能知夢事蘧蘧飛墮晚花前雖言春去而無戀繆之意均知為夢耳趙昌言極有才思嘗下第作詩落句云唯有夜來胡蝶夢翩翩飛入刺桐天清明東城酒散夕陽遲南陌秋千寂寞垂人與長瓶卧芳草風將急管度青陂古今藝術曰秋千北方戎戲以習輕趫者觀遲字乃見晚唐詩夕陽無限好只是近黃昏太迫促也歐公詞緑楊隄外出秋千張文昌詩詩成添舊卷酒盡卧空瓶東岡東岡嵗晚一登臨共望長河映逺林萬竅怒號風喪我千波競踴水無心莊子齊物論是惟不作作則萬竅怒號又今者吾喪我春郊青秧漫漫出初齊雞犬遙聞路却迷但見山花流出水那知不是武陵溪秧稚穀苗也杜詩六月青稻多千畦碧泉亂插秧適云巳引溜加灌溉韓致光詩山頭水從雲外落水面花自山中來杜牧詩此花不逐溪流出晉客無因入洞來元日爆竹聲中一嵗除春風送暖入屠蘇千門萬户曈曈日總把新桃換舊符爆竹嵗旦爆竹于庭世傳庭燎之禮非也神異記云西方山中有人長丈餘人見之即病寒熱名曰山臊以火著竹中熚烞有聲則驚遁逺去熚音畢烞音朴四時纂要屠蘇孫思邈所居庵名一云以其能辟魅故云屠割也蘇腐也今醫方集衆藥為之除夕以浸酒懸于井中元日取之自少至長東面而飲取其滓以絳囊盛挂于門桁之上主辟瘟疫陳陶朝元引云萬宇靈祥擁帝居東華元老薦屠蘇漢禮儀志門户代以所尚周人木德以桃為更言氣相更也以桃符板為新桃舊桃蓋北方語九日九日無歡可得追飄然隨意厯山陂蔣陵西曲風煙淡也有黃花一兩枝張濵詩白首成何事無歡可替悲長孫鑄落日去關外悠悠隔山陂建康有九日臺齊武帝時立商飇館於孫陵岡世呼為九日臺又十道志云武帝九日燕羣臣孫陵岡即吳大帝蔣陵今在城西南俗呼為招陵岡去城十五里初晴幅巾慵整露蒼華度隴深尋一徑斜小雨初晴好天氣晚花殘照野人家黃庭經至道章髮神蒼華字太𤣥注白與黑謂之蒼太白詩新雪滿前山初晴好天氣羅虬詩宿雨初晴春日長入簾花氣靜難忘南蕩南蕩東陂水漸多陌頭車馬斷經過鍾山未放朝雲散奈爾黃梅細雨何戴叔倫詩陌頭車馬共營營杜詩四月熟黃梅冥冥細雨來芙蕖芙蕖耐夏復宜秋一種今年巳滿溝南蕩東陂無此物但隨深淺見游鯈溝西溝西直下看芙蕖葉底三三兩兩魚若比濠梁應更樂近人渾不畏舂鉏此言魚樂近人而忘其所可畏其意深矣新序虎豹厭間而近人故得魚鱉厭深而之淺故得爾雅鷺舂鉏皮日休詩數㸃舂鉏烟雨微東臯東臯攬結知新嵗西崦攀翻憶去年肘上栁生渾不管眼前花發即欣然攬結見别注謝靈運詩洞庭空波瀾桂枝徒攀翻莊子至樂篇支離叔與滑介叔觀於冥伯之丘崑崙之區黃帝之所休俄而栁生其左肘支離叔曰子惡之乎滑介叔曰生者假借也假之而生生者塵垢也死生為晝夜且吾與子觀化而化及我又何惡焉眼前花出四十二章經結尾一段樂天詩花發眼中猶足怪栁生肘上亦須休一陂一陂焰水蔣陵西含風却轉與城齊周遭碧銅磨作港逼塞緑錦剪成畦蔣陵即孫仲謀葬處後聨即退之青羅碧玉之體園蔬園蔬小摘嫩還抽畦稻新舂滑欲流枕簟不移隨處有飽餐甘寢更無求陶詩摘我園中蔬杜詩自鋤稀菜甲小摘為情親退之聨句野蔬拾新柔賈山傳離宫三百鐘鼓帷帳不移而具蕭然蕭蕭三月閉柴荆緑葉隂隂忽滿城自是老來游興少春風何處不堪行宗楚客詩今朝上林樹無處不堪攀唐人詩春來何處不堪行白詩惟有間行猶得在心情未到不如人與公意雖異而皆佳杖藜杖藜隨水轉東岡興罷還來赴一牀堯桀是非猶一作昨入夢因知餘習未全忘蕭望之傳堯桀之分在於義利而巳蔡寬夫詩話云荆公居鍾山一日晝寢夢有古衣冠相過者貌偉甚曰我桀也與公論治道反覆百餘語不相下公既覺猶汗流被體因笑語客曰吾習氣尚若是乎乃作小詩識之即此詩也圗書圗書老矣尚紛披神劓天黥以有知茅竹結蟠聊一愒却尋三界外愚癡莊子大宗師篇許由謂意而子曰夫堯既巳黥汝以仁義而劓汝以是非矣汝將何以游夫遙蕩恣睢轉徙之塗乎意而子曰雖然吾願游於其藩許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黃黼黻之觀意而子曰夫無莊之失其美據梁之失其力黃帝之亡其智皆在罏錘之間耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生耶詩意言欲補其黥劓而返之初也老嫌老嫌智巧纍形軀欲就田翁學破除百嵗用癡能幾許救吾黥劓可無餘薛能贈老僧詩曰觀師莫羡人間有幸自元無免破除移栁移栁當門何啻五穿松作徑適成三臨流遇興還能賦自比淵明或未慙誰將誰將石黛染春潮復撚黃金作栁條西崦東溝從此好筍輿追我莫辭遙黃金栁條見下篇文公十五年公羊注笋者竹箯一名編輿雪乾雪乾雲淨見遙岑南陌芳菲復可尋換得千顰為一笑春風吹栁萬黃金顰言眉謂栁梅方舒易顰而為笑樂天一樹春風千萬枝嫩如金色軟於絲南浦南浦東岡二月時物華撩我有新詩含風鴨緑粼粼起弄日鵝黃裊裊垂公每自哦鴨緑鵝黃之句云此幾凌轢春物冷齊夜話云用事琢句妙在言其用而不言其名此法惟荆公東坡山谷三老知之荆公鴨緑鵝黃之句此本言水栁之名竹裏竹裏編茅倚石門一作石根竹莖踈處見前村閒眠盡日無人到自有春風為掃門蘇仙公傳先生省母處有桂竹二枝無風自掃其地恆淨公詞云茅屋數間窗窈窕塵不到時時自有春風掃賀方回嘗作一絶題于定林寺云破氷泉脉潄籬根壞衲猶疑挂樹猿蠟屐舊痕尋不見東風先為我開門公見之大相稱賞緣此知名此詩頗亦似之隨意隨意柴荆手自開沿岡度塹復登臺小橋風露扁舟月迷鳥羇雌競往來競真本作覺字枚叔七發朝則鸝黃鳱鴡鳴焉暮則羇雌迷鳥宿焉歐陽公梅詞可惜溪橋月明風細長是在人歸後余嘗哦之以為佳今味公語浩然月露中惟宿鳥獨覺其來去耳杜詩無人覺來往疏懶意何長俗本改作競字便無意思秋雲秋雲放雨靜山林萬壑崩湍共一音欲記荒寒無善畫賴傳悲壯有能琴張正甫僧碑㑹一音吹萬有黃詩貝宫荒寒弄明月春風春風過栁緑如繅晴日蒸紅出小桃池暖水香魚出處一環清浪湧亭臯韓桃源圖川原逺近蒸紅霞王建詩青帝少女染桃花露粧初出紅猶濕樂天開元東池詩池水暖溫暾水清波瀲灧杜玉蓮開蕊暖泉香周穆王時西戎獻玉杯光照一室置杯中庭明日水滿杯香而甘美出十洲記陂麥陂麥連雲慘淡黃緑隂門巷不多涼更無一片桃花在借問春歸有砥忙木末木末北山煙冉冉草根南澗水泠泠繅成白雪桑重緑割盡黃雲稻正青木末猶木之顛也杜詩我僕猶木末進字說正名百物自軒轅野老何知强討論但可與人漫醬瓿豈能令鬼哭黃昏禮記祭法黃帝正名百物公有進字說表揚雄傳劉歆謂太𤣥吾恐後人用覆醬瓿也淮南子昔倉頡作書而天雨粟鬼夜哭注鬼或作兔兔恐取其毫製筆言及之故哭成字說後鼎湖龍去字書存開闢神機有聖孫湖海老臣無四目漫將糟粕汚修門謂黃帝鼎成乘龍仙去所作書契與字之六誼故存倉頡四目與沮誦皆黃帝之史睹鳥迹遂制字公自言不敢望倉頡止得古人之糟粕也聖孫言神考公意謂本朝黃帝之後耳然趙氏實祖顓帝而顓帝不出於黃帝更當考楚詞招魂曰魂兮歸來入修門王逸注郢城門也栁子厚詩重入修門自有期後人皆以京師門為修門矣窺園杖䇿窺園日數巡攀花弄草興常新董生只被公羊惑肯信捐書一語真仲舒少治春秋三年不窺園其精如此本傳槩言治春秋儒林胡母生傳始言與仲舒同業公羊唐劉史彤放螢怨且逍遙還酩酊仲舒漫不窺園井蔡寬夫詩話云荆公嘗言詩家病使事太多蓋皆取其與題合者類之如此乃是編事雖工何益若能自出巳意借事以相發明變態錯出則用事雖多亦何所妨故公詩如董生只被公羊惑肯信捐書一語真桔橰俯仰何妨事抱甕區區老此身之類皆意與本處不類此真所謂使事也嘲白髮久應飄轉作蓬飛眷惜冠巾未忍違種種春風吹不長星星明月照還稀左思白髮賦昔臨玉顔今從飛蓬髮膚至昵尚不克終左昭公三年余髮種種如此余奚能為髙蟾詩人生莫遣頭如雪雖得春風亦不消南史陸展青青不解久星星行復出代白髮答從衰得白自天機未怪長青與願違看取春條隨日長㑹須秋葉向人稀飬生論從衰得白從白得老白傅詩嵗課年功頭髮知從霜成雪君看取外廚遺火二絶竈鬼何為便赫然似嫌刀機苦無羶圗書得免同煨燼却賴廚人凊不眠李白詩廚竈無青煙刀機生緑蘚莊子上無欲凊之人戰國䇿張儀引廚人劉楨賦廚人進瓜其二青煙散入夜雲流赤焰侵尋上瓦溝門巷便疑能炙手比鄰何苦却焦頭唐崔鉉傳鄭楊段薛炙手可熱焦頭事見上注初夏即事石梁茅屋有彎崎流水濺濺度兩陂晴日暖風生麥氣緑隂幽草勝花時韓詩暖風抽宿麥清雨卷歸旗唐人詩散盡平生眼中客暖風晴日閉門居趙師民詩麥天晨氣潤槐夏午隂清千蹊千蹊百隧散林丘圗畫風煙一色秋但有興來隨處好楊朱何苦涕橫流淮南子楊朱見岐路而哭之謂其可以南可以北傷其本同而末異也和陳輔秀才金陵即事南郭先生比鷾鴯年年過我未愆期休論王謝當時事大抵烏衣祗舊時莊子山木篇鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走注避禍速也晉南渡王謝諸名族居秦淮之南烏衣巷王僧䖍拜中丞曰此自烏衣諸郎坐處我亦試為之今建康城南長干寺有小巷曰烏衣去朱雀橋不逺劉禹錫詩朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家而詩話多言王謝至烏衣國妄也和耿天騭以竹冠見贈四首竹根殊勝竹皮冠欲著先須短髮乾要使山林人共見不持方帽禦風寒漢髙祖為亭長以竹皮為冠應劭注以竹始生皮作冠今鵲尾冠也禮記玉藻髮晞用象櫛注晞乾也方帽今之暖帽其二無物堪持比此冠竹皮柔脆榖皮乾故人戀戀綈袍意豈為哀憐范叔寒穀皮禇木皮也今人取以為冠上有斑㸃可愛范雎傳須賈曰今叔何事雎曰臣為人庸賃須賈意哀之留與坐飲食曰范叔一寒如此哉乃取其一綈袍以賜之又曰公之所以得無死者以綈袍戀戀有故人意故釋公其三玉潤金明信好冠錯刀剜出蘚紋乾不忘君惠常加首要使歡盟未可寒張衡四愁詩云美人贈我金錯刀注古者諸王佩刀以金錯鏤其環又王莽造錯刀以金錯其文謝承後漢書云詔賜應奉金錯把刀項斯謝山友贈蘚花冠詩塵汙出山髮慙君青蘚冠王績詩一間松葉屋數片蘚花冠石鼎聨句外苞乾蘚紋中有暗浪驚穀梁傳辨冠雖敝必加於首其四冠工新意斫檀欒霧卷雲蒸色未乾遺我山林真自稱何須貂暖配金寒應劭漢官儀曰侍中金蟬左貂金取剛百鍊不耗蟬髙居飲潔目在腋下貂內徑而外溫左閔公一年金寒玦離此言貂暖金寒亦大工矣檀欒竹也和郭功甫且欲相邀卧看山扁舟自可送君還留連城郭今如此知復何時伴我閒梅宛陵以功甫為李白後身嘗有采石月詩贈功甫云采石月下聞謫仙夜披錦袍坐釣船云云在昔熟識汾陽王納官貰死義難忘今觀郭裔奇俊郎眉目真似攻文章死生往復猶康莊樹穴探環知姓羊此譏功甫久留城市不從看山之約且言苟能過我豈不辦一舟送君歸乎次韻葉致逺置洲田以詩言志四首吟歎君詩久掉頭知君興不負滄洲土山欲為羊曇賭且可專心學奕秋謝安傳秦師次淮淝遂命駕出山墅親朋畢集方與𤣥圍棊賭别墅安常棋劣於𤣥是日𤣥懼便為敵手而又不勝安遂顧謂其甥羊曇曰以墅乞汝土山見遊土山示蔡天啓注其二若將有限計無涯自困真同算海沙隨順世緣聊戲劇莫言河渚是吾家傳燈録鑒宗語洪諲佛祖正法直截亡詮汝算海沙於理何益傳燈録唐張拙秀才悟道頌光明寂照偏河沙凡聖含靈共一家一念不生全體現六根才動被雲遮破除煩惱重增妄趣向真如反是邪隨順世緣無挂礙涅槃生死等空花其三菴成有興亦尋春風暖荒萊步始勻若遇好花須一笑豈妨迦葉杜多身頭陀行有十二件頭陀亦名杜多皆梵語也華云抖擻世尊舉花迦葉微笑謂眼花今云好花亦借用耳其四明時君尚富春秋豈比衰翁逺自投智略未應施畎畝上前他日望吾丘髙五王傳皇帝春秋富師古曰言年幼也比之於財方未匱竭故謂之富又曹參傳悼惠王富於春秋後漢樂恢傳陛下富於春秋注春秋謂年也言年少春秋尚多故稱富吾丘壽王傳子在上前之時智略輻奏注言其無方而至若車輪之歸於轂次韻朱昌叔寄公無國寄鍾山垣屋青松暗靄間長以聲音為佛事野風蕭颯水潺湲本朝郡國之封止為名耳未嘗實君其土也公在鍾山故云寄禮記郊特牲諸侯不臣寓公注寄公也又喪大記君之喪未小斂為寄公國賓出文中子關朗篇垣屋什物必堅朴曰無苟費也維摩經有以聲音為佛事次張唐公韻公與唐公在仁宗時皆知制誥憶昨同追八馬蹄約公投老此山棲公乘白鳳今何處我適新年值白雞王子年拾遺記曰周穆王即位巡行天下御八龍之駿名曰絶地翻羽奔霄越影踰輝超光騰霧挾翼李義山九成宫詩風逐周王八馬蹄又穆王廟詩八馬空追落日行後漢崔駰達㫖云或盥耳而山棲又唐王績傳夫鳳不憎山棲龍不羞泥蟠君子不苟潔以罹患不避穢而飬精也唐詩不知今夜游何處從者皆騎白鳳凰此謂從仁宗也次俞秀老韻解我葱珩脫孟勞暮年甘與子同袍新詩比舊增奇峭若許追攀莫太髙青玉為葱穀梁傳曰孟勞魯之寶刀酬宋廷評請序經解未曽相識每相憐香火靈山或一作亦有緣訓釋雖工君尚少不應急務世人傳廷評名保國即莒公之姪景文公之第十一子公集有答宋保國書書中論經解疑即廷評也今録於此某啓使人三至示以經解副之佳句勤勤如此豈敢鹵莽以虛來㫖所示極好尚有少疑相營從者久淹於符離兾異時肯顧我可盡所懷未爾為時自愛不宣每一作巳急一作忽北史陸法和曰但從空王佛所與主上有香火因緣自注陸法和云與梁元帝於空王寺佛前有香火因緣下聨言著書當務精研以求進益未宜輕出所謂傳不習乎者急於傳也送耿天隲至渡口雪雲江上語依依不比尋常恨有違四十餘年心莫逆故人如我與君稀莊子相視而笑莫逆於心東坡詞算詩人相得如我與君稀送道原還儀真作詩要之沈季長也嵗暮青條巳見梅餘花次第想爭開淮南無此山林勝作意春風更一來送方劭祕校南浦柔條拂面垂攀翻聊寄我西悲武昌官柳年年好他日春風憶此時攀翻見東臯注陶侃傳都尉夏施盜官柳植之於巳門侃後見問之曰此武昌西門前官柳何因盜來此種施惶怖謝罪答韓持國芙蓉堂二首按建康志在舊府治今行宫猶有舊基投老歸來一幅巾尚私榮祿一作君恩猶許備藩臣芙蓉堂下疏秋水且與龜魚作主人趙王彭祖傳中山王不佐天子撫循百姓何以稱為藩臣其二乞得膠膠擾擾身五湖煙水替風塵祗將鳬鴈同為侣不與龜魚作主人古詩月沒教星替白詩豈有文章替左司李羣玉詩云十年侣魚鱉垂頭在沅湘長干釋普濟坐化一本作哭慈照大師投老唯公最故人相尋長恨隔城闉百年俯仰隨薪盡畫手空傳淨戒身公時巳僦宅城中居王荆公詩注卷四十一
