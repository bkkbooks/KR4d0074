body:
  text: 王荆公詩注巻二十一宋李壁撰古詩寄慎伯筠或云王逢原作世網掛士如蛛絲大不及取小綴之吕氏春秋湯祝網曰蛛蝥作網今人效之李白詩獵家張罝不能掛龍虎所以青雲人髙歌在岩户即公此意也宜乎倜儻不低斂醉脚踏倒青天低吕居仁詩未須極軒昻且須就低斂前日才能始誰播一口驚張萬誇和雷公訴帝喘欲吹咸恐聲名塞天破退之陸渾山火詩夢通上帝血面論又云雷公擘山海水翻又寄崔立之詩喘如竹筒吹文章喜以怪自娱不肯裁縮要有餘多為峭句不姿媚天骨老硬無皮膚魏志方技管輅傳去良樂百八十里不得騁天骨起風塵袁宏三國名臣賛天骨秀朗人傳書染莫對當破卵驚出鸞鳳翔人間下筆不肯屈鐵索急纒蛟龍僵退之石鼓歌金繩鐵索鎖紐壯杜詩鬱鬱三千字岌嶪蛟龍纒少年意氣強不羈虎脇插翼白日飛欲將獨立誇萬世笑誚李白為癡兒韓詩外傳曰周書云為虎傅翼將飛入邑擇人肉而食大兒孔文舉小兒楊徳祖禰衡語四天無壁才可家司馬相如傳家徒四壁立退之文洞庭汗漫粘天無壁醉膽憤痒遣酒拏欲偷北斗酌竭酒力拔太華鑣鯨牙項羽歌力拔山兮氣葢世退之調張籍詩刺手拔鯨牙舉瓢酌天漿又瞻相北斗柄兩手自相挼世儒口軟聲似蠅好於壯士為忌憎我獨乆仰願一見浩歌不敢兒女聲石鼎聨句時於蚯蚓竅微作蒼蠅聲韓文彼婉孌者實憚吾曹望皖山馬上作亘天青鬱鬱千峯互崷崪放馬倚長崖煙雲争吐没逺疑嵩華低近豈潛衡匹奚為鮮眺覽過者輒倉卒吾將凌其巔震蕩睨溟渤旁行告予言世孰於此忽䆳深不可俯儲藏盡妖物踴躍狼虎羣蜿蜒蛇虺窟惜哉危絶山嵗乆沈汩没誰將除茀塗萬里遊人出此詩疑非荆公作汝癭和王仲儀梅宛陵集亦載此詩未知誰作按汝水出河南梁縣勉鄉西天息山酈道元注今汝水西出魯陽縣之大猛山黄柏谷岩嶂深髙山岫䆳宻石徑﨑嶇人跡裁交西即盧氏界也汝水出山險汝民多病癭嵇叔夜養生論頸處險而癭齒居晉而黄或如鳥粻滿或若猿嗛並大宛傳鳥嗛音銜爾雅亢鳥嚨其粻嗉釋曰亢者鳥喉嚨也其受粻處名嗉寓䑕曰嗛釋曰寓木之獸謂獼猴之類及鼠皆曰嗛郭云頰裏貯食處也又王延夀王孫賦口嗛呥以齡猛女慙髙掩襟男大闊裁領東坡詩闊領先裁葢癭衣飲水疑注壺吐詞侔有梗樗里既巳聞杜預亦不幸秦人號智囊吳瓠掛狗頸樗里疾滑稽多智秦人號曰智囊疾所居里有樗樹又滑稽之形如瓠宜亦取癭也晉杜預傳初攻江陵吳人知預病癭憚其智計以瓠繫狗頸示之每大樹似癭即斫使白題曰杜預及城平盡捕殺之􅀈􅀈常柱頥説苑田單攻翟三月不克謠曰大冠如箕長劍柱頰彾㣔安及脛秪欲仰問天無由俯窺井挾帶嵗月深冒犯風霜冷厭惡雖自知剖割且誰肯魏畧曰賈逵因與校尉争不得理乃發憤生癭欲割之魏太祖教曰十人割癭九人死南史朱齡石傳舅蔣氏頭有大瘤齡石同眼宻割之即死不惟羞把鏡仍亦愁弔影内療煩羊靨外砭廢針穎本草療氣癭方羊靨一具去脂含汁盡去之便差在木曰楠榴刳之可曰皿吳張紘傳見楠榴枕愛其文為作賦公有宿木瘤僧舍詩疑榴字或是瘤左太沖吳都賦楠榴之木相思之樹注云楠榴木之盤結者其盤節文尤可以作器建安所出最長大也榴音留陸龜䝉夜坐詩云癭木杯杉贅楠瘤刳得來皿説文食飲之用器也金樓子曰西域有癭藤可以酌酒自有文章映徹可愛其大如杯楠瘤之皿亦此類也此誠無所用既有何能屏膨脝厠元首臃腫異顱頂豕腹脹膨脝石鼎聨句莊子擁腫之與居難將面目施可與胞胎逞賢者臨汝守世徳調金鼎仲儀之父文正公旦相仁宗珉俗雖醜乖教令日脩整風土恐隨改晨昏憂屢省儻欲覲慈顔名城不難請三月十日韓子華招飲歸城清明曉赴韓侯家自買白杏丁香花唐詩枝頭白杏花雀眼塗金銀篾籠杜詩赤墀櫻桃枝隠映銀絲籠貯在當庭呼舞娃舞娃聊捧笑向客不顧插壊新烏紗朝來我舍報生子賀勸太白浮紅霞班固敘傳引滿舉白左思吳都賦飛觴舉白注太白盃名酒狂有持梧桐板暴謔一似漁陽撾袒裼擊鼓禰處士當時偶脱猛虎牙褊衷不容又何益鸚鵡洲上空蒹葭左思吳都賦暴謔中酒而作注鄱陽郡人性多躁急酒半酣之時好為暴惡之戲後漢曹操欲見禰衡衡稱病不往操懐忿而以其才名不欲殺之乃召為鼓吏文士傳載魏武帝八月朝㑹大閱試鼔節鼔吏度者皆當脱故衣著岑牟單絞及小㡓衡既度不肯易吏呵之衡便止當武帝前先脱㡓次脱餘衣裸立徐徐著岑牟次著單絞後著㡓顔色無怍乃擊鼓作漁陽摻撾聲甚悲壯操笑曰本欲辱衡衡反辱孤衡本傳云孔融愛衡才數稱述於曹操令衡求自謝衡許往乃手持三尺梲杖坐大營門以杖箠地大罵操怒曰此人素有虛名逺近將謂孤不能容之於是遣人送之劉表莊子幾不免虎口衡復侮慢劉表表恥不能容以江夏太守黄祖性急故送衡與之祖善待之嘗持其手曰處士祖長子射為章陵太守時大㑹賔客有獻鸚鵡者射舉酒於衡請衡賦之衡攬筆而作文無加㸃辭采甚麗後祖大㑹賔客衡言不遜祖恚遂殺之鄂州志鸚鵡洲在江夏縣黄祖殺禰衡於洲上後人以衡嘗賦鸚鵡因為洲名余嘗謂衡豈狂病者哉見操勢日張宗國將覆恨力劣不能為漢誅賊耳漁陽摻撾聲節悲壯葢隂寓其意有諸中必形諸外者也操多所通解宜必識之史又稱聴者莫不慷慨此尤操所深惡笑言衡反辱孤姑許之裸身等耳又懼衆覺必笑而言奸雄情狀千載可見所謂嘻笑之怒甚於裂眦衡欲免得乎正平身劘虎牙豈不知操終必殺巳惟其忠於王室而力不逮寧嬰㐫怒以洩其憤誼之所激雖死不顧風烈嶤然實黨錮人物之餘世第以文人目之豈知衡哉勿去草或云是楊次公詩勿去草草無惡若比世俗俗浮薄君不見長安公卿家公卿盛時客如麻文選死人如亂麻公卿去後門無車鄭當時與汲黯列為九卿兩人中廢賔客益落又下邳翟公為廷尉賔客亦填門及廢門外可設爵羅後復為廷尉賔欲往翟公大署其門曰一死一生迺知交情一貧一富迺知交態一貴一賤交情迺見惟有芳草年年佳又不見千里萬里江湖濵觸目悽悽無故人惟有芳草隨車輪一日還舊居門前草先鋤蜀志先主殺張裕曰芳蘭當門不得不鋤齊江斆聞江夏王鋒死亦曰芳蘭當門不得不鋤草於主人實無負主人於草宜何如勿去草草無惡若比世俗俗浮薄此詩言客負主人主人亦時負客皆以譏道喪俗薄上下胥失也葢自公罷相凡昔之門生故吏舍之而去者多矣又從而下石焉如吕恵卿者葢其尤也公之卒也張芸叟為詩以弔之曰今日江南從學者人人諱道是門生及紹聖後崇尚新學以公配享先聖前日舍之而去者至是復還故無名子嘲之曰今日江南從學者人人争道是門生觀公此詩葢有所激而云也士固可罪然知人亦難矣東城昔予出東城初見壟上耕陳勝傳輟耕之壟上注謂田中之髙處忽忽日北至嵗月良可驚雖云一草死萬物尚華榮誰能當此時歎息微隂生孟夏之月靡草死注薺葶藶之屬四月純陽之月此言北至則指仲夏連言之也五月一隂生言見微知著睹盛知衰者難得也此詩當作於仁英之時哀賢亭黄鳥哀子車強埋非天為馬融傳死國埋名詩黄鳥秦穆公以三良從死子車三良之一也殉葬故云強埋詩天實為之天奪不待老還能使人悲宣公十五年劉康公曰不及十年原叔必有大咎天奪之魄矣馬侯東南秀鞭䇿要路馳歸骨萬里州乃當強壯時馬侯馬遵也死時四十八饒州樂平人景祐元年及第嘗漕福建又知開封以御史為江淮六路發運判官後還臺彈奏宰相梁適出知宣州復召為司諌旋卒成公三年知罃謂楚王曰纍臣得歸骨于晉墓門閉空原白日無履綦陳風有墓門之詩漢滕公石槨銘曰佳城鬱鬱三千年見白日張景陽詩庭無貢公綦蒼蒼柏與松浩浩山風吹我初羞夷吾鮑叔亦我知終欲往一慟詠言慰孤嫠我初羞夷吾如羞道桓文之羞也揚雄解嘲五尺童子羞比晏嬰與夷吾史記管仲少日與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔叔終善遇之仲曰生我者父母知我者鮑子也梁王吹臺梁孝王廣睢陽七十里大治宫室為複道自宫連屬于平臺三十餘里注平臺在大梁東北離宫所在也師古曰今城東北角有鼔臺基其處寛博故俗云平臺大抵吹臺平臺繁臺名雖異而其實一也輿地記繁臺本漢梁王鼓吹臺梁太祖嘗閱武於此因改為講武臺其後有繁氏居其側又號繁臺寰宇記云吹臺在縣南五里陳留風俗傳縣有蒼頡師曠城其城上有列仙吹臺梁武王亦増築焉梁開平元年改繁臺為講武臺此即吹臺也其後有繁氏居其側里人乃以呼之繁臺繁姓人埋滅為蒿蓬況乃漢驕子魂遊誰肯逢緬思當盛時警蹕在虛空梁王傳得賜天子旌旗從千乘萬騎出稱警入言䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也蛾眉倚髙寒環珮吹玲瓏大梁千萬家回首雲濛濛仰不見王處雲間指青紅杜詩不知二聖處空立百嵗翁賔客有司馬鄒枚避其鋒灑筆飛鳥上為王賦雌雄相如為郎㑹景帝不解辭賦孝王來朝從齊人鄒陽淮隂枚乘之徒相如見而悦之因病免客游梁居數嵗乃著子虛之賦宋玉風賦此大王之雄風惜今此不傳楚辭擅無窮空餘一丘土千載播悲風楚詞有淮南王安招隠等篇孝王好文與一時賔客詞人之盛皆不減安而獨無傳焉故公云耳髙適詩梁王昔全盛賔客復多才悠悠一千年陳迹惟髙臺寂寞向秋草悲風千里來靈山寺張芸叟南征錄靈山在太平州繁昌縣東二十里寺踞山頂殿閣重複土俗云靈山寺又杜牧之有題靈山寺行堅師院詩靈山名誰自波濤截孤峯何年佛子住四面憑危空折椽與裂瓦委棄填西東庫廊行抑首居者莽誰容叔孫通傳皆伏抑首吾舟維其側落日生秋風瞰崖聊寄目萬物極纎穠震蕩江海思洗滌堙鬱中胡為嬉遊人過此無留蹤景豈龍遊殊龍遊即金山寺名盛衰浩無窮吾聞世所好樓殿浮青紅杜詩紅逺結飛樓退之題衡嶽門樓詩粉牆丹柱動光彩鬼物圖畫填青紅那知山水樂豈在豪華宫世好幻變爾感激難為工公詩意謂靈山之景不讓金山而彼特盛如此且言世但知樓觀之勝而不知山水之趣白鷗吕獻可首彈公後來劉莘老諸人力排變法最後唐坰廷斥公尤切恐詩意指此江鷗好羽毛玉雪無塵垢滅没波浪間生涯亦何有杜詩白鷗波浩蕩雄雌屢驚矯機弋常紛糾宋莒公詩蝸頭狼藉争鋒地鴻影裴徊避弋天顧我獨無心相隨如得友飄然紛華地此物乖隔乆白髮望東南春江綠如酒韓詩採蘭起幽念眇然望東南歐詩南浦波紋如酒綠坡詩春江綠漲蒲萄醅詠風風從北海起至此南海上莊子蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也問風來何事去復欲何向誰遣汝而號誰應汝而唱莊子大塊噫氣其名為風是惟無作作則萬竅怒呺又前者唱于而隨者唱喁汝於何時息汝作無乃妄風初無一言試以問雲將莊子外篇在宥雲將東遊過扶搖之枝而適遭鴻濛曰朕欲有問也又曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育之為之奈何注扶搖風也此詩似指當時争論者白雲英英白雲浮在天下無根蔕旁無連根蔕一作根著晁錯傳根著之徒無不載也詩白華英英白雲露彼菅茅退之聴琴浮雲栁絮無根蒂列子五山之根無所連著公自況拔起於江南自為天子所知也西風來吹欲消散落日起望心悠然願回羲和借光景常使秀色當簷邊左思賦魯陽操戈而髙麾回曜靈於太清李白詩願借羲和景為人照覆盆西風來吹亦似謂羣言交攻羲和言日借以喻神考時來不道能為雨直以無心最可憐江鄰幾邀觀三館書畫按鄰幾名休復開封陳留人歐公銘其墓嘗獻其所著書召試充集賢校理判尚書刑部當慶厯時小人不便大臣執政者欲累以事去之君友蘇子美杜丞相壻也以祠神㑹飲得罪一時知名士皆被逐君坐落職監蔡州稅後得通判廬州復校理集賢判吏部南曹為羣牧判官公時同在館中葢鄰幾再召時也五月祕府始曝書一日江君來約予世間雖有古畫筆可往共觀臨石渠我時冒熱跨馬去開㕑發匣鳴鏁魚芝田錄門鑰必以魚者取其不瞑目守夜之義羲獻墨跡十一巻水玉作軸排疏疏山海經常庭山有水玉注水玉今水晶也司馬相如子虚賦水玉磊砢最竒小楷樂毅論永和題尾付官奴林子中記樂毅論後有异僧權二人名題云永和四年十二月二十四日書賜官奴官奴王子敬小字前輩稱字莫難於小雖王氏亦止有樂毅論一篇又有四山絶品畫戴嵩吳牛望青蕪李成寒林樹半枯黄筌工妙白圖唐畫錄戴嵩嘗畫山澤水牛之狀窮其野性筋骨之妙在妙品下滿奮謂晉武帝曰臣猶吳牛見月而喘注云今之水牛多生江淮間故謂之吳牛也按李成字咸熙本唐宗室開寶間貴人馳書延請成多不荅自娱而巳唐畫錄畫山水唯營丘李成長安關同華原范寛智妙入神才髙出類三家鼎峙百代標程又云氣象蕭疎烟林清曠毫鋒穎脱墨法精微者營丘之製也林子中言館中黄筌白圖一軸最妙李昊賛筌畫獻蜀主孟昶生日昶夘生也不知名姓皃人物二公對奕旁觀俱黄金錯鏤為投壺粉幛復畫一病夫後有女子執巾裾床前紅毯平火爐床上二姝展氍毹遶床屛風山有無堂上列畫三重鋪此幅巧甚意思殊孰真孰假丹青摹世事若此還可吁退之不得畫師來皃取岑參葢將軍歌軍中無事但歡娛暖屋繡簾紅地爐織成壁衣花氍毹燈前侍婢瀉玉壺氍毹毛褥也退之桃源圖詩世俗寧知偽與真最後所稱乃白公所賦重屏圖也按此詩梅宛陵集亦有未知果誰作竊疑詞氣近類聖俞也衆人反復此詩意必是舉朝争新法時所作衆人紛紛何足競是非吾喜非吾病頌聲交作莽豈賢四國流言旦猶聖漢平帝賛政自莽出休徴嘉應頌聲並作至乎變見民怨莽亦不能文也小雅狼跋周公攝政逺則四國流言近則王不知周大夫美其不失其聖也唯聖人能輕重人不能銖兩為千鈞乃知輕重不在彼要知一作之美惡由吾身不能銖兩為千鈞不逃一實不在彼謂聖賢不恤毁譽惟自修而已後漢書仁義豈有常蹈之則為君子背之則為小人河北民河北民生近二邊長苦辛選詩坎坷長苦辛二邊謂遼人西夏家家養子學耕織輸與官家事餽鄰國今年大旱千里赤州縣仍催給河役河役言官役不以旱而弛也老小相攜來就南南人豐年自無食河北人過河南逐熟疑富公在青州時東坡表云積欠十年豐㐫皆病農民固有以豐年為苦者為誅取匄乞之多何但無食也悲愁白日天地昏路傍過者無顔色汝生不及貞觀中斗粟數錢無兵戎唐太宗貞觀四年天下大治蠻夷君長帶刀宿衛天下大稔米斗三四錢行旅不齎糧少陵夏日歎眇然貞觀初難與數子偕君難託槿花朝開暮還墜妾身與花寧獨異莊子朝菌不知晦朔注菌一名舜英一云木槿也憶昔相逢俱少年兩情未許誰最先感君綢繆逐君去成君家計良辛苦人事反復那能知讒言入耳須㬰離嫁時羅衣羞更著如今始悟君難託君難託妾亦不忘舊時約古詩君心雖淡薄妾意正悽託或言此詩恐作於神考眷遇稍衰時詞意殆不類平日所為兼神考遇公終始不替況大臣宜知事君之義必不為此怨尤也王荆公詩注巻二十一
