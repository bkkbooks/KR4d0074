body:
  text: 王荆公詩注卷一宋李壁撰古詩元豐行示德逢德逢姓楊與公鄰曲按王直方雜記德逢號湖隂先生丹陽陳輔浙西佳士也每嵗清明過金陵上塜事畢則至蔣山過湖隂先生之居清談終日嵗率以為常元豐辛酉癸亥頻嵗訪之不遇題一絶於門云北山松粉未飄花白下風輕麥腳斜身似舊時王謝燕一年一度到君家湖隂歸見其詩吟賞久之曾稱於舒王聞之笑曰此正戲君為尋常百姓耳湖隂亦大笑四山翛翛映赤日田背坼如龜兆出詩豫尾翛翛此借用退之詩或如龜坼兆湖隂先生坐草室看踏溝車望秋實雷蟠電掣雲滔滔夜半載雨輸亭臯旱禾秀發埋牛凥子虛賦云亭臯千里師古曰為亭候於臯隰之地埋牛凥言久旱得雨禾皆怒長其髙可沒牛凥也豆死更蘇肥莢毛倒持龍骨掛屋敖月令孟夏之月靡草死龍骨所以車水既得雨則無用故掛之屋敖買酒澆客追前勞三年五穀賤如水今見西成復如此元豐聖人與天通千秋萬嵗與此同先生在野固不窮擊壤至老歌元豐論衡曰堯時百姓無事有五十之民擊壤於塗觀者曰大哉堯之德也擊壤者曰吾日出而作日入而息鑿井而飲耕田而食堯何力於我也後元豐行介甫熙寧七年罷政作此歌正居鍾山時或謂公欲以徹神考之聽冀復相此繆論也歌元豐十日五日一雨風鹽鐵論周公之時風不鳴條雨不破塊五日一風十日一雨麥行千里不見土連山沒雲皆種黍水秧綿綿復多稌龍骨長乾掛梁梠秧禾秧也載芟綿綿其麃爾雅釋宫楣謂之梁檐謂之摘注屋梠也說文云楣齊謂之擔楚謂之梠樀丁狄反梠音吕鰣魚出網蔽洲渚荻筍肥甘勝牛乳百錢可得酒斗許雖非社日長聞鼓吳兒踏歌女起舞張說劉禹錫皆有踏歌行神仙藍采和常醉踏歌云云但道快樂無所苦老翁塹水西南流楊桞中間杙小舟乘興欹眠過白下逢人歡笑得無愁爾雅云樴謂之􅍻注云橛也說文樴之弋反弋也從木戠聲杙逸即反從木弋聲橛巨月反弋也從木厥聲漢地志云牂柯繫船杙也華陽國志云楚頃襄王時遣莊蹻伐夜郎軍至且闌㭬船於岸而步戰既滅夜郎以且闌有㭬船牂柯處乃改其名為牂柯杙音弋白下見題半山寺壁注夜夢與和甫别如赴北京時和甫作詩覺而有作因寄純甫和甫名安禮行第三十六純甫最幼名安上行第三十七水菽中嵗樂鼎茵暮年悲檀弓孔子曰啜菽飲水盡其歡斯謂之孝莊子寓言曾子再仕而心再化曰吾及親三釡而心樂後仕三千鍾不洎吾心悲同胞苦零落㑹合尚凄其況乃夢乖濶傷懷而賦詩詩言道路寒乃似北征時叔兮今安否季也來何遲中夜遂不眠展轉涕流離禮記文王世子今日安否何如老我孤主恩結草以為期沈括筆談歐公有奉使回寄劉原甫云老我倦鞍馬誰能事吟嘲王荆公贈弟和父詩云老我孤主恩結草以為期言老我則語有情上下句皆惜老之意若作我老與老我雖同而語無情詩意遂頽惰此文章佳語獨可心喻宣公十五年魏顆敗秦師于輔氏見老人結草以亢杜回杜回躓而顛冀叔善事國有知無不為左氏荀息曰公家之利知無不為忠也千里永相望昧昧我思之幸唯季優游嵗晚相擕持於焉可晤語水木有茅茨畹蘭佇歸憩繞屋正華滋純甫晚以管勾江寧府集禧觀家居水木湛清華今人以古語採椽土階對茅茨遂以茨為屋其實茨亦草也又按韋忠傳吾茨簷賤士本無宦情然太史遷傳茅茨不翦注則云屋蓋曰茅茨茨以茅覆屋據此則茨又為屋蓋也兩存之白詩清和四月初樹木正華滋純甫出僧惠崇畫要豫作詩純甫公季弟也惠崇建陽人工畫鵝鴈鷺鷥尤工小景善為寒汀煙渚瀟灑虛曠之象人所難到也畫史紛紛何足數畫史見虎圖注惠崇晚出吾最許崇非特善畫又工詩今十僧詩集崇其一也旱雲六月漲林莽移我翛然墮洲渚黃蘆低摧雪翳土鳬鴈靜立將儔侣往時所歷今在眼沙平水淡西江浦暮氣沉舟暗魚罟李義山詩湖光不受月暮氣欲沉山欹眠嘔軋如鳴一作聞櫓頗疑道人三昧力異域山川能斷取維摩經舍利弗住不可思議解脫菩薩斷取三千大千世界如陶家輪著右掌中擲過恆河世界之外其中衆生不覺不知方諸承水調幻藥灑落生綃變寒暑周禮司烜氏以鑒取明水於月注鑒鏡屬也世謂之方諸又淮南子方諸見月則津而為水髙誘注方諸隂燧大蛤也熟摩拭令熱以向月則水生也許慎注諸珠也方石也楞嚴經第三卷諸大幻師求太隂精用和幻藥是諸師等手執方諸承月中水金坡巨然山數堵粉墨空多真漫與江南中主時建業僧巨然祖述董源筆法尤工秋嵐遠景不為竒峭源及巨然畫筆皆宜遠觀其筆甚草草近視之幾不類物象遠觀則景物粲然幽情遠思如覿異境金坡遺事玉堂後北壁兩堵董羽畫水正北一壁吳僧巨然畫山水皆有遠思一時絶筆也有二小壁畫松亦竒妙據畫譜言巨然用筆甚草草此可見其真趣不應有粉墨空多之譏反覆詩意本謂巨然畫格最髙而拙工事彩繪者乃為世俗所與也按唐制翰林院在右銀臺門內開元時又置學士院在翰林院之南始改供奉為學士至德後隨上所在而遷駕在大內則明福門置院駕在興慶宫則金明門內置院德宗時又移院於金鑾坡上今詩云金坡本此濠梁崔白亦善畫曾見桃花靜初吐崔白字子西濠梁人工畫花竹翎毛體製清贍雖以敗荷鳬鴈得名然於鬼神人獸尤精熙寧初與文宣丁貺葛昌畫垂拱殿御扆竹鶴各一扇白為首出弟慤畫亦佳酒酣弄筆起春風便恐漂零作紅雨流鶯探枝婉欲語蜜蜂掇蘂隨翅股一時二子皆絶藝裘馬穿羸久羇旅華堂直惜萬黃金苦道今人不如古題徐熙花黃筌父子畫花妙在賦色江南徐熙以墨筆畫之殊草草略施丹粉而已神氣逈出别有生意筌惡其軋巳言其畫粗俗不入格罷之熙之子乃效黃格更不用墨筆直以彩色圖之謂之沒骨圖筌等不復能疵瑕遂得齒院品然其氣韻皆不及熙逺甚徐熙丹青蓋江左杏枝偃蹇花婀娜一見真為值芳時安知有人槃礴裸槃礴羸見虎圖注同朝衆史共俳娼同朝謂黃筌輩也三蒼解詁丈夫妒為娼亦欲學之無自可錦囊深貯幾春風借問此木何時果說文在木曰果在草曰蓏又逹摩偈云一花開五葉結果自然成題燕侍郎山水圖燕名肅以禮部侍郎致仕青州人冦凖客嘗以工部郎中直昭文館為燕王府記室參軍往時濯足瀟湘浦獨上九疑尋二女李白逺别離古有黃英之女乃在洞庭之南瀟湘之浦湘中記九疑山在營道北九山相似行者疑惑故曰九疑又山海經蒼梧之川其中有九疑山漢武巡狩祀舜於此蒼梧之野煙漠漠斷隴連岡散平楚暮年傷心波浪阻不意畫中能更覩燕公侍書燕王府王求一筆終不與奏論讞死誤當赦全活至今何可數仁人義士埋黃土秖有粉墨歸囊褚國史燕公判刑部奏天聖三年天下斷大辟二千四百三十六豈無法可疑情可憫者而州郡無所奏讞蓋畏罪也請自今奏而不應奏者不科以罪自是奏讞者嵗踰千人無不貸免自始至今所活無慮幾千萬人矣陶縝菜示德逢江南種菜漫阡陌紫芥緑菘何所直陶生畫此共言好一幅往往黃金百北山老圃不外慕一作慕此但守荒畦斸荆棘陶生養目渠養腹各以所長為物役老子是以聖人為腹不為目故棄彼取此注為腹者以為物養已為目者以為物役已已未耿天隲著作自烏江來豫逆沈氏妹于白鷺洲遇雪作此詩寄天隲公自注云辛酉冬天隲復來誦此遂書于壁請天隲書所酬於右朔風積夜雪明發洲渚淨開門望鍾山松石皓相映故人過我宿未盡躋攀興而我方渺然長波一歸艇欵假庶可策欵假見和王勝之借馬注柴荆當未暝與子出東岡墻西掃新徑招約之職方并示正甫書記約之姓假亦家金陵與公居止接近往時江總宅近在青溪曲井滅非故桐臺傾尚餘竹江總陳人也仕至尚書令陳亡入隋為上開府開皇中卒劉禹鍚詩池臺竹樹三畝餘至今人道江家宅青溪實連秦淮按建康志江總宅在青溪大橋北與孫瑒宅對夾青溪又金陵故事南朝鼎族多夾青溪江令宅尤占勝地至國朝為假約之宅王荆公詩有昔時江令宅今日假侯家假氏有割青亭公詩又有割我鍾山一半青是也今上元縣丞㕔南青溪上有割青亭舊基尚存江令尋宅詩見桐猶識井看栁尚知門池塘三四月菱蔓芙蕖馥蒲栁亦競時冥冥一川緑方坁最所愛意謂可穿築梁昭明太子性愛山水於𤣥圃穿築更立亭館又阮孝緒性沉靜恆以穿池築山為樂欲往無舟梁長年寄心目故人晚得此心事付草木消搖櫩宇新攬結蹊隧熟檀弓負手曵杖消搖於門晉書五行志草生可攬結女兒可攬擷更能適我願中水開茅屋鬼營誅荒梗人境掃喧黷濠魚淨留連海鳥暖追逐豈無方外客於此停髙躅憶初桑落時要我豈非夙蠶眠忽欲老一介未言速左傳亦不使一介行李告於寡君當緣東門水尚澀南浦舳吾廬雖隱翳賞眺還自足橫陂受後澗直塹輸前瀆跳鱗出重錦舞羽墜軟一作暖玉天寶中異國獻軟玉鞭屈之首尾相就舒之則徑直如繩乃以聨蟬繡為袋碧蠶絲為鞘碧筒遞舒卷紫角聨出縮千枝孫嶧陽萬本母淇澳魏慤守濟南以大蓮葉酌酒以簮剝其心令與柄通屈柄飲之名碧筒杯紫角菱也退之城南聨句云菱翻紫角利又云蔓涎角出縮書嶧陽孤桐言千枝孫嶧陽則桐可知也詩瞻彼淇澳緑竹猗猗萬本母淇奧謂竹也滿門陶令株彌岸韓侯䔩韓奕詩其蔌維何維筍及蒲爾雅䔩菜之總名尚復有野物與公新聽矚金鈿擁蕪菁翠被敷苜蓿蝦蟇能作技科斗似可讀韓詩黃黃蕪菁花花黃故比金鈿公以翠被形容苜蓿之青苜蓿草也本草附菜部以其可食故也又西京雜記苜蓿一名懷風或謂光風在其間嘗肅然照其光彩故曰苜蓿懷風爾雅科斗蝦蟇子也一名活東頭圖尖而尾細古文似之櫺軒俯北渚花氣時度谷耕鋤一作耘鋤聊效顰締構行可續荒乘儻不倦一晝敢辭卜雖無北海酒乃有平津肉翛翛仙李枝城市久煩促寄聲與俱來䕃我臺上榖韓詩荒乘不知疲孔融字文舉仕為北海太守故世號為孔北海嘗歎曰坐上客常滿尊中酒不空吾無憂矣公孫𢎞身食一肉脫粟飯張茂先答何劭詩云恬曠苦不足煩促每有餘同王濬賢良賦龜得升字世傳一尾龜百齡此龜逮見隋唐興雖然天幸免焦灼想見縮頸愁嚴凝龜百嵗一尾千嵗則十尾龜策傳縮頸而却欲亟去也退之月蝕詩烏龜怯姦怕寒縮頸以殼自遮前年赴海不量力欲替鼇負三崚嶒列子湯問帝命禺彊使巨鼇十五舉首而戴之注云大荒經曰地極之神名禺彊靈龜為之使番禺使君邂逅見知困簸蕩因嗟矜疾呼豫且設網取以組系首䶲穿繩北歸與俱度大庾兩夫贔屭苦不勝番禺廣州也豫且龜策傳莊子作余且䶲或作􅀈而三切龜甲邊也左太沖吳都賦巨鼇贔屭首冠蓬山注贔屭用力之兒艤舟秦淮擔送我云此一可當十朋易損卦十朋之龜弗克違馬鄭解謂一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜昔人寶龜謂神物奉事枯骨尤競競殘民滅國遞爭奪有此乃敢司靈蒸一作黎蒸於時覩甲别貴賤太卜藏法傳昆仍靈蒸猶言黎蒸謂生靈也爾雅前弇果謂甲前長後弇獵謂甲後長周禮春官有太卜元孫之子為昆孫昆孫之子為仍孫此言太卜世職豈知元君須見夢初如歡喜得未曾自從九江罷納錫衆漁賤棄秋不登卜人官廢亦已久果獵誰復知殊稱莊子外物篇宋元君夜半夢人被髮窺阿門曰豫自宰路之淵豫為清江使河伯之所漁者余且得豫元君覺使人占之曰此神龜也君問余且漁何得對曰得白龜焉其圓五尺龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽無遺策仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽無遺策不能避刳腸之患知有所困神有所不及也龜人凡取龜用秋時攻龜用春時注秋取龜及萬物成也食貨志工商能登龜取貝者如淳注曰登進也龜有靈故言登春官龜人東龜曰果南龜曰獵注前弇果後弇獵是其體也今君寶此世莫識我亦坐視心瞢瞢搘床才堪比瓦礫當粟豈肯捐斗升糝頭腥臊何足嗜曵尾汚穢適可憎搘床出龜策傳燕文貞公女嫁盧氏嘗為舅盧公求官候公下朝問焉公但指搘床龜視之女拜而歸室告其夫曰舅得詹事矣當粟謂典當之當其事未詳禮記內則和糝不蓼注米屑之糝博物志東南之人食水産龜蛤螺蚌以為珍味不覺其腥臊莊子此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎盛溲除聾豈必驗蹈背出險安敢慿刳腸以占幸無事卷殼而食病未能北夢瑣言南人採龜溺以其性妒而與蛇交或雌蛇至有相趂鬬噬力小致斃者採時取雄龜置瓷碗及小盤中於龜後以照鏡之既見鏡中龜即淫發而失溺又以紙炷火上令熱㸃其尻亦致失溺然不及鏡照也得於道士陳釗專以入藥治聾尤妙本草山龜之大者人立背上可負而行續搜神記黃赭入山迷道見大龜祝之曰汝是靈物今騎汝背示吾路毛寶行於江見漁人釣得一白龜寶贖放江中寶十餘年守鎮邾城與石虎將軍交戰戰敗投江腳如踏一石上視之乃先所放白龜長六七尺許送至東岸遂得免淮南子道應訓盧敖游於北海至䝉榖之上見一士焉深目而𤣥鬢淚注而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂遁逃乎碑匿於碑隂盧敖就而視之方倦楚人謂倨為倦龜殼而食蛤蜊如聞翕息可視效往乃有墮崖千層仰窺朝陽俯引氣亦得難老如岡陵諒能學此真壽類世論妄以蟲疑氷抱朴子郗儉行獵墮空塜中見大龜張口吞氣或俯或仰乃試隨龜所為遂不復飢博物志人有出行墜深泉澗者見龜蛇甚多朝暮引頸向東方人因伏地學之不飢莊子秋水夏蟲不可以語於氷嗟余老矣倦呼吸起晏光景難瞻承楚詞潄正陽而飱朝霞注陽陵子明經朝霞日始出之氣令起晏不及呼吸之矣但知故人所玩惜每戒異物相侵陵惟憂盜賊今好卜夜半劫請無威懲復恐饞夫負之走并竊老木為薪蒸淺樊荒圃不可保守視且寄鍾山僧春秋盜竊寶玉大弓公羊傳曰寶者何龜青純昭公二十五年臧昭伯如晉臧㑹竊其寶龜僂句以卜為信與僣莊子大宗師藏舟於壑藏山於澤謂之固矣夜半有力者負之而走昧者不知也盜跖篇內則疑劫請之賊劫許業反異苑孫權時有人入山遇一大龜即束之歸龜便言曰游不良時為君所得人甚怪之載出欲上吳王夜泊越里纜船於大桑樹宵中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹􅌜雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相告令求如我之徒計將安出龜曰子明無多詞禍將及汝樹寂而止既至權命煮之焚柴萬車語猶如故諸葛恪曰然以老桑乃熟獻者仍說龜樹共言權登使伐樹煮龜立爛今烹龜猶用桑樹野人故呼龜為元緒示元度蔡卞字元度興化軍仙游人熙寧三年進士甲科為常州江隂縣主簿公以女妻之參知政事張璪薦其才由是浸用元符中為尚書左丞卞託繼述之說迷誤主聽紹聖以來竄斥善類皆卞密進劄子請哲宗親批付外章惇雖凶暴而暗在卞術內而不自知一切奉行卞使蹇序辰建看詳訴理之議惇猶未豫應即以相公二心之言迫之惇懼亟差官置局惇元祐初與司馬光爭役法其疏及保馬之害卞每以此劫惇故每為所制伏范祖禹劉安世元祐中嘗論禁中求乳母卞指以為宣仁后有廢立意乞廢為庶人哲宗不從紹聖二年掖庭厭勝事作哲宗召大臣謀之惇請召禮官法官共議卞曰既犯法何用禮官乞掖庭置獄差宦者推治遂廢元祐皇后鄒浩以諌冊元符皇后忤㫖卞即奏呂公著嘗薦浩浩以此詆譏朝廷哲宗愈怒浩遂編管嶺南卞雖以紹述為名而實訕薄神宗推尊安石薦常秩之子立上殿立以父秩行肰上史院有云秩與安石既去生民如坐塗炭識者知政事必敗等語哲宗指塗炭必敗四字曰尊戴安石至此則以神考為何如主乎即竄立遠方卞懼取神宗奬諭京東漕臣吳居厚詔榜朝堂外示贊美元豐之政而隂欲彰居厚橫斂以符其歸過之誣其嶮巇至此今年鍾山南隨分作園囿鑿池溝吾廬碧水寒可潄溝西雇丁壯擔土為培塿華陽國志武都有一丈夫化為女子蜀王納為妃旡幾物故王哀之遣五丁之武都擔土為妃作冢襄公二十四年子太叔曰部婁無松柏注部婁小阜部扶苟反婁或作塿謝安為土山亦公意扶疏三百株蒔棟最髙茂不求鵷雛實但取易成就莊子南方有鳥其名鵷雛注鸞鳯之類鳯凰非梧桐不棲非竹實不食鵷雛實言梧桐竹之類中空一丈地斬木令結構五楸東都來斸以繞簷溜退之詩重遭五楸牽老來厭世語深卧塞門竇贖魚與之游餧鳥見如舊獨當邀之子商略終宇宙更待春日長黃鸝哢清晝張明甫至宿明日遂行初登張公門張公恐是唐公公子始冠幘於今見公子與我皆鬢白山林坐笑語宛然在公側一作宛我豈惟貌如之侃侃有公德憶公營瀨鄉袁彥伯為謝安安南司馬都下諸人送至瀨鄉將别既自悽惘歎曰江山遼落居然有萬里之勢别本瀨作懶初疑如康節安樂􅌪之類後乃知瀨鄉乃金陵地名距公所居不逺故末章復有裹飯冶城之約許我歸作客我歸公既逝惆悵難再得得子如得公交懷我欣戚漂搖將安往稅駕止一昔哀公四年為一昔之期注夜結期也寤言且勿寐庶以永今夕何時復能還裹飯冶城宅冶城本異冶鑄之所今建康天慶觀即其地按寰宇記晉元帝太興初以王導疾久方士戴洋云君本命在申而申地有冶金火相鑠不利遂移冶城於石頭城東以其地為西園晉成帝幸司徒府游觀西園徐廣謂之冶城園是也又按建康實録晉孝武太元十五年於城中立寺以冶城為名至安帝元興三年以寺為苑廣起樓榭飛閣復道延屬宫城謝安每與王羲之登冶城悠然遐想有髙世志又按金陵故事導疾遷冶於縣東七里六朝有東西冶每遇警急出二冶囚徒又有東冶亭晉太元七年立在縣東八里為士夫餞别之所疑導疾時以古冶遷東為二故公詩又云欲望鍾山岑因知冶城路此謂東冶城也金陵故事又有南冶六所少府一司徒二揚州二鎮軍府一杏花石梁度空曠茅屋臨清炯俯窺嬌饒杏未覺身勝影言花影倒水中尤佳嫣如景陽妃含笑墮宫井陳後主避隋軍同張麗華孔貴嬪入景陽宫井中故此稱景陽妃怊悵有微波殘妝壞難整末句言水波而花影亂錢起詩惆悵曉鶯啼孤雲還絶巘奉酬約之見招君家假干木為義畏人侵馮軾信厚禮踰垣終褊心史記魏文侯客假干木過其閭未嘗不軾也溪山一作川坻寧有此園屋諒非今雨過梅桞淨潮來蒲稗深種芳彌近渚伐翳取遙岑清節亦難尚曠懷差易尋子猷憐水竹逸少愜山林王子猷好種竹曰不可一日無此君王逸少既去㑹稽與東土人士盡山水之遊以弋釣為娛况復能招我親題漢上襟唐假成式與溫庭筠等唱和并往來書目之為漢上題襟大抵多閨闥中情昵事公用主人同姓事疑必出妾御佐酒寄吳氏女子介父二女長適吳安持寶文閣待制伯姬不見我乃今始七齡家書無虛月豈異常歸寧汝夫綴卿官汝兒亦搢綎兒已受師學出藍而更青諸本皆作搢珽非也玉藻天子搢珽非人臣所當用據蔡雍傳云多士搢綎公蓋本此說文綎系綬也綎他丁反荀子學不可以已青出於藍而青於藍氷水為之而寒於水女復知女功婉嬺有典刑平帝王后傳為人婉瘱師古曰婉順也瘱靜也烏計反自吾捨汝東中父繼在廷小父數往來吉音汝每聆中父謂和父也小父當是純父既嫁所願懷孰如汝所丁而吾與汝母湯尉幸小停丘園祿一品扁鵲傳毒尉注以毒藥尉搭病處此公自言舊疾稍平瘳公以左僕射大觀文食㑹靈觀使祿故云一品吏卒給使令膏粱以晚食安步而輜軿願得晚食以當肉安步以當車無罪以當貴清淨以自娛戰國䇿顔斶楚王英傳使伎人奴婢鼓吹悉從得乘輜軿注軿猶屏也自隱蔽之車山泉臯壤間適志多所經汝何思而憂書每說涕零吾廬所封殖嵗久愈華菁豈特茂松竹梧楸亦冥冥芰荷美花實瀰漫爭溝涇諸孫肯來游誰謂川無舲姑示汝我詩知嘉此林埛末有擬寒山覺汝耳目熒因之授汝季季也亦淑靈莊子外篇山林與臯壤與使我欣欣然而樂與樂未畢也哀又繼之公有擬寒山詩晚嵗作深造佛理齊物論是黃帝之所聽熒也注聽熒疑惑也又人間世篇而目將熒之注其言辨捷使人眼眩公次女適蔡卞今所稱季是也班婕妤賦承祖考之遺德兮何性命之淑靈王荆公詩注卷一
