body:
  text: 王荆公詩注卷二十宋李壁撰古詩杭州修廣師法喜堂浮屠之法與世殊洗滌萬事求空虛師心以此不挂物龎藴語于頔但可空諸所有不可實諸所無即洗滌之意也魯直嘗言荆公學佛所謂吾以為龍又無角吾以為蛇又無足者也余嘗熟觀其風度其視富貴如浮雲不溺於財利酒色一世之偉人也永安和尚云一絲不挂一堂收身自有餘堂隂置石雙嵽嵲杜詩御榻在嵽嵲石腳立竹青扶疏白詩樓臺紅照曜松竹青扶疏一來已覺心膽豁況乃宴坐窮朝晡憶初救時勇自許壯大看俗尤﨑嶇豐車肥馬載豪傑少得志願多憂虞始知進退各一一作有理造次未可分賢愚韓詩人心未嘗同不可一理驅宜各從所好未用相賢愚會將築室反耕釣相與此處吟山湖復至曹娥堰寄剡縣丁元珍曹娥堰在會稽縣東南七十二里曹娥鄉在東北四十五里曹娥江路南來自上虞縣界經會稽界四十里北入海可容五百石舟今詩云來自北又云無艇子與圖經異溪水渾渾來自北千山抱水清相射山深水急無艇子欲從故人安可得故人昔日此水上樽酒扁舟慰行役津亭把手坐一笑我喜滿懷君動色論新講舊惜未足論新講舊皆指學問事落日低回已催客離心自醉不復飲秋果寒花空滿席今年却坐相逢處怊悵難求别時迹可憐溪水自南流安得溪船問消息答曾子固南豐道中所寄吾子命世豪術學窮無間直意慕聖人不問閔與顔彼昏何為者誣構來㘖㘖栁子厚詩秉心方的的騰口任㘖㘖韓子其鬭㘖㘖曽子固集有之南豐道上寄介甫詩應逮冒煩暑驅馳山水間不知何所坐也又云跋履雖云倦桑梓得暫還林僧授館舍田客扳鞍鐶吾心本皎皎彼詬徒㘖㘖方投定鑑照即使征馬班應逮犯秋陽動為人所歎不恤我躬瘁乃嗟天澤慳令人念公卿煜煜趨王班泊無憫世意狙猿而珮環莊子天運今取猿狙而衣以周公之服愛子所守卓憂豫不能攀永矢從子遊合如扉上鐶願言借餘力迎浦疏潺潺晉語夫教者因體能質而利之者也若川然有原以卬浦而後大注卬迎也若川有原因開利迎之以浦然後大也亦有衣上塵可攀禆泰山謝承後漢書楊喬曰猶塵附泰山露集滄海雖無補益款誠至情猶不敢默默也大江秋正清島漵相縈彎四盼浩無主日暮煙霞斑水竹密以徑霜楓衰更殷謝靈運詩曉霜楓葉丹左傳左輪朱殷注朱血色血色久則殷於間反賞託亦云健行矣非間關相期東北遊致館淮之灣無為襲寧嬴悠矣及溫還文公五年晉陽處父聘于衛反過寧舍于逆旅寧嬴氏嬴謂其妻吾求君子久矣乃今得之舉而從之陽子遂與之語及山而還注山河內溫山寄贈胡先生公自序云孔孟去世逺矣信其聖且賢者質諸詩書焉爾翼之先生與豫並時非若孔孟之逺也聞薦紳先生所稱述又詳於書不待見而後知其人也歎慕之不足故作是詩胡瑗字翼之泰州海陵人先生天下豪傑魁余嘗見公題王昭素易論要纂後云豫嘗苦王先生易論晦而難讀徐徽生刪取其略以示豫又取其義可傳及雖不足傳而猶可論者存之按公初於前輩宿儒猶有尊事之意故如昭素與安定皆以先生呼之其後詆排諸老略不少假此意無復存矣胸臆廣博天所開文章事業望孔孟不復睥睨蔡與崔劉夢得栁文序云雄深雅健似司馬子長崔蔡不足多也十年留滯東南州飽足藜藿安蒿萊飽足者非求飽也以藜藿為足而無慕乎其外也獨鳴道德驚此民韓集孟軻荀卿以道鳴者民之聞者源源來髙冠大帶滿門下奮如百蟄乘春雷惡人沮伏善者起昔時盜蹻今騫回神宗嘗問劉􅉓從學何人對曰臣少從學於安定先生胡瑗上曰其人文章與王安石孰優彞曰瑗以道德仁義教東南諸生時王安石方在埸屋修進士業又云國朝取士尚聲律文詞臣師當寶元康定之間首明體用之學以授學者出其門者無慮二千餘人歐公墓表師道廢久矣自明道景祐以來學者有師唯先生與泰山孫明復徂徠石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經學轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學歐公詩亦云吳興先生富道德詵詵弟子皆賢才墓表云先生為人師言行而身化之使誠明者達昏愚者勵而頑傲者革先生不試乃能爾誠令得志如何哉吾願聖帝營太平補葺廊廟枝傾頺披旒發纊廣耳目照徹山谷多遺材先收先生作梁柱以次構架桷與榱羣臣面向帝深拱仰戴堂陛方崔嵬公詩期先生以廊廟而官止中允侍講而巳得子固書因寄始吾居揚日居揚公作僉判時時子固未仕在臨川重問每見及云將自親側萬里同講習子行何舒舒吾望已汲汲窮年夢東南顔色不可挹仁賢豈欺我正恐事維縶詩縶之維之嚴親抱憂衰生理賴以給不然航江外天寒北風急無乃山路惡僕弱馬行澀孤懷未肯開嵗物忽如蟄朅來髙郵住巷屋頗卑濕蓬蒿稍芟除茅竹隨補葺苟云禦風氣尚恐憂雨汁賈誼傳長沙卑濕月令孟冬之月行秋令則天時雨汁注雨汁者氷雪雜下故人莫在眼屢獨開巾笈忠信蓋未見吾敢誣兹邑語十室之邑必有忠信出門誰與語念子百憂集眺聽聊自放日暮城頭立徐歸坐當户使者操書入檀弓孔子當户而坐曲禮獻田宅者操書致注操持也時開識子意如渴得美湆曲禮殽之序遍祭之注云公食大夫禮魚臘湆醬不祭湆音泣驪駒日就道玉手行可執舊學待鐫磨新文得刪拾重登城頭望喜氣滿原隰驪駒逸詩大戴禮客欲去歌之其辭云驪駒在門僕夫具存驪駒在路僕夫整駕詩執子之手兮寄虔州江隂二妹貢水日夜下下與章水期我行二水間無日不爾思地理志章水出贛縣西南而北入江蓋控引衆流總成一川雖稱謂有殊言歸一水也故字從章從貢飄若越鳥北心常在南枝選詩胡馬依北風越鳥巢南枝注云皆思舊又如岐首蛇南北兩欲馳退之赴江陵途中詩有蛇類兩首又嶺表録異記兩頭蛇嶺外多有此有如小指大者長尺餘腹下鱗紅背錦文一頭有口眼一頭似頭而無口眼爾雅北方有比肩民焉迭食而迭望中有枳首蛇焉此四方中國之異氣也注枳岐也逝者日巳逺百憂詎能追生存苦乖隔邂逅亦何時女子歸有道善懷見於詩庶云留汝車慰我堂上慈古詩我行日已逺謂二妹之所從也韓詩死者已渺茫生者困乖隔載馳女子善懷亦各有行潘安仁賦太夫人在堂讀此詩知公於友愛最隆也登越州城樓越山長青水長白越人長家山水國可憐客子無定宅一夢三年今復北林和靖詩吳山青越山青浮雲縹眇抱城流東望不見空回頭人間未有歸耕處早晚重來此地遊作鄞邑滿秩而歸公眷眷於鄞猶愛桐鄉之意憶昨詩示諸外弟憶昨此地相逢時春入窮谷多芳菲短垣囷囷冠翠嶺襄二十七年盧蒲嫳攻崔氏崔氏堞其宫而守之注堞短垣也躑躅萬樹紅相圍幽花媚草錯雜出黃蜂白蝶參差飛此時少壯自負恃意氣與日爭光輝退之送李願序妒寵而負恃退之少年意真狂有意與春競乘間弄筆戲春色脫落不省旁人譏坐欲持此博軒冕肯言孔孟猶寒飢丙子從親走京國浮塵坌並緇人衣公生天禧五年辛酉至景祐三年丙子年十六左太沖吳都賦儇佻坌並注坌步寸切疾走貌相如弔二世曰坌入曽宫之嵳峩坌即並也明年親作建昌吏四月挽船江上磯説文石激水曰磯端居感慨忽自寤青天閃爍無停暉男兒少壯不樹立挾此窮老將安歸吟哦圖書謝慶弔坐室寂寞生伊威材疏命賤不自揣欲與稷契遐相希史記蘇秦見齊王仰而慶俯而弔齊王曰是何慶弔相隨之速也東山詩伊威在室揚雄傳惟寂寞自投閣後漢孔融傳融材疏意廣迄無成功杜詩許身一何愚竊比稷與禼希如希顏之希昊天一朝畀以禍先子泯沒豫誰依精神流離肝肺絶眥血被面無時晞母兄􅈱􅈱泣相守三載厭食鍾山薇屬聞降詔起羣彥遂自下國趨王畿刻章琢句獻天子釣取薄祿歡庭闈楚公寶元二年薨唐張巡傳尹子竒曰聞公督戰輒眥裂血面嚼齒皆碎晞乾也書益稷啓􅈱􅈱而泣杜詩不厭北山薇楚公通判江寧卒官諸子遂家焉晉束晢補亡詩眷戀庭闈心不遑安李善注云庭闈親之所居也身著青衫手持版奔走卒嵗官淮沂晉王坦之見桓溫倒持手版公慶厯二年楊置榜進士甲科授揚州僉判淮沂無山四封庫獨有廟塔尤峩巍時時憑髙一悵望想見江南多翠微歸心動蕩不可抑霍若猛吹翻旌旗爾雅山中絶曰陘未及上曰翠微又一説山葉青縹色曰翠微白詩自言拜别主人後離心蕩揚風前旗騰書漕府私自列仁者惻隱從其祈暮春三月亂江水梁丘遲與陳伯之書暮春三月江南草長詩公劉涉渭為亂注絶流曰亂徑櫓健帆如轉機還家上堂拜祖母奉手出涕縱橫揮退之董生行上堂問起居曲禮長者與之提攜則兩手奉長者之手公登第入官後始以漕檄自維揚泝江至撫州時公祖母燕國夫人謝氏尚無恙楚公名用之妻也出門信馬向何許城郭宛然相識稀退之詩只知間信馬丁令威城郭雖是人民非永懷前事不自適却指舅館排山扉當時髫兒戲我側于今冠佩何頎頎楚公先娶徐再娶吳氏所指舅館吳氏也介甫吳出離騷云髙余冠之岌岌兮長余佩之陸離詩碩人頎頎況復丘樊滿秋色蜂蝶摧藏花草腓繳前句也詩秋日凄凄百卉具腓髙適詩大漠窮秋草木腓令人感嗟千萬緒不忍倉卒回驂騑留當開樽強自慰邀子劇飲毋豫違禮天子六馬左右驂三公九卿駟馬右騑漢制九卿則中二千石亦右騑曹子建責躬詩騑驂倦路載寢載興採訪使韓宗約孟浩然偕至京師欲薦諸朝會故人至劇飲歡甚或曰君與韓公有期浩然曰業巳飲遑恤他卒不赴澶州澶淵之役曹利用自天雄赴敵寨共議和事敵乃遣左飛龍使韓杞持書與利用俱還其書以關南故地為請杞入對行官之前殿上謂輔臣曰所言歸地事極無名必若邀求朕當決戰儻嵗以金帛濟其不足朝廷之體固亦無傷杞即日入辭與利用同往既至敵寨復以關南地為言利用固爭之謂曰若北朝恣其邀求地固不可得兵亦未易息也其國主意稍怠但欲嵗取金帛利用許遺絹二十萬匹銀一十萬兩議始定初利用再使虜也面請嵗賂金帛之數上曰必不得巳雖百萬亦可利用辭去冦凖召至幄次語曰雖有勑旨汝往所許不得過三十萬過三十萬將斬汝利用果以三十萬成約而還公有澶州兩詩此詩似少貶和議雖託野老之言其實公意也津津河北流嶭嶭兩城峙澶州黃河在其南王莽河在其北樊城在其南戚城在其北故公前詩云河流中間兩城峙又云南城草草不受兵北流樓櫓如邊城今云北河流兩城峙亦謂此春秋諸侯會澶淵乃其地襄公三十年晉人齊人宋人云云會于澶淵宋災故注未有言其事此言宋災故以惡宋人不克巳自責而出會求財書留後世法豈獨譏當世野老豈知此為豫談近事邊關一失守北望皆邉騎黃屋親乘城穹廬矢如蝟景德元年閏九月契丹與其母舉國入冦自定州駐陽城淀遂緣葫蘆河踰關南攻瀛州又乘虛抵貝冀天雄軍攻天雄不下進陷清德軍益南侵直犯澶州大陳黃屋見上注漢髙祖紀堅守乘城乘登也胸奴傳胸奴父子同穹廬而卧師古曰穹廬旃帳也其形穹隆故曰穹廬車駕駐蹕澶州南城冦凖固請幸北城曰陛下不過河則人心危懼敵氣未懾非所以取威決勝也既至登北城門樓張黃龍旗諸軍皆呼萬嵗聲聞數十里氣勢百倍敵自是震駭請和不復交鋒矣詩云穹廬矢如蝟蓋指射殺撻覽時事然撻覽死實在前非乘城以後事也紛紜擅將相誰為開長利開長利言將相雖多無能為中國建長利者此意似不以和為然焦頭收末功尚足誇一是霍光傳初霍氏奢侈茂陵徐生上書三上輒報聞後霍氏誅人為徐生上書有曰曲突徙薪無恩澤焦頭爛額為上客上乃以福為郎尚足誇一是此言萊公之功亦救之末流然此意蓋甚正非如譛者孤注之比蓋公前詩巳有不足於萊公之意謂人主越都邑而謀逺以萬乘之尊當不測之敵先所稱功第一者與此語雖異而意實同莊子齊物論此亦一是非彼亦一是非歡盟自此數日月行人至行人使者也周官有大行人掌大賔之禮及大客之儀馳迎傳馬單走送牛車弊征求事供給厮養猶珍麗漢昭帝紀補邊郡三輔傳馬張晏曰驛馬也厮養字見史記蘇秦傳又前漢張耳傳有厮養卒蘇林曰厮取薪者也養養人者也師古曰厮音斯戈甲久巳銷澶人益憔悴澶人益憔悴此言敵雖巳和而中國益困弊能將大事小自合文王意語翁無歎嗟小雅今不廢孟子惟仁者為能以大事小是故湯事葛文王事昆夷詩小雅盡廢則四夷交侵中國危矣萊公之功管仲之功也以後世論之不可謂不大故詩有一是之語然揆以聖人規模則不然必也以天保以上治內采薇以下治外雖有玁狁安得遽至中原乎如小雅盡廢則政事所以自治者俱亡四夷安得而不交侵中國安得而不微弱縱能救之於已亂雖使中國之人不至被髮左衽特賢乎列國之諸侯耳格以聖人之法何足道哉詩有焦頭及小雅之説大抵意出於是寄平甫弟衢州道中淺一作泄非溪受日光炯碎野林參天隂翳長幽鳥不見但聞語小梅欲空猶有香長年無可自娛戲逺遊雖好更悲傷安得冬風一吹汝手把詩書來我傍杜集百丈潭詩清見光炯碎唐韓渥詩每日在南亭南亭似僧院人語靜先聞鳥啼深不見王荆公詩注卷二十
