body:
  text: 王荆公詩注巻三十七宋李壁撰律詩得孫正之詩因寄呈曽子固一嵗巳闌人意倦出門風物更蕭然水揺疎樹荒城路日帶浮雲欲雪天荒城對欲雪比平時詩似少工而意則甚精而如畫也未有詩書論進退謾期身世託林泉公似言學未充而不輕於進故接以林泉之句因思漠北離羣久此日窮居賴見賢和金陵懷古懷鄉訪古事悠悠獨上江城滿目秋一鳥帶煙來别渚數帆和雨下歸舟劉長卿詩晚景千峯亂晴江一鳥遲蕭蕭暮吹驚紅葉慘慘寒雲壓舊樓故國淒涼誰與問人心無復更風流豫章道中次韻荅曾子固離别何言邂逅同今知相逐似雲龍蒼煙白霧千山合緑樹青天一水容韓詩吾身願為雲東野化為龍四方上下逐東野巳謝道塗多自放將歸田里更誰從言不復事道路之役思自適也龎公有意安巢穴肯問簞瓢與萬鍾劉表就候龎公謂曰夫保全一身孰若保全天下乎龎公笑曰鴻鵠巢於髙林之上暮而得所栖黿鼉穴於深淵之下夕而得所宿夫趍舍行止亦人之巢穴也亦各得其栖宿而巳天下非所保也離北山寄平甫日月沄沄與水爭披襟照見髮華驚少年憂患傷豪氣老去經綸誤半生休向朝廷論一鶚一鶚公自謂也只知田里守三荆清溪㡬曲春風好巳約歸時載酒行史記趙簡子曰􅋧鳥累百不如一鶚孔北海薦禰衡表亦用此語詩意似勉平父不必急於進然平父後卒為諸公所薦賜進士及第得館職公有表謝云如臣同産為世畸人少遭閔凶自奮寒苦雖强學力行粗有時名而寡偶少徒幾絶榮望豈期聖聽俯洎幽潛陸士衡豫章行云三荆歡同株四鳥悲異林劉良註曰昔有田廣田真田慶兄弟三人將欲分異庭有荆樹經宿萎黄乃相謂曰荆樹尚然况我兄弟乎遂不分荆復茂悦荅孫正之無才處處是窮塗兩地誰傳萬里書節物崢嶸催嵗暮溪山蕭洒入吾廬杜詩年年非故物處處是窮塗南歸猶喜尋同志北去還聞困索居南歸謂江南正之吳興人多寓居吳門丹陽揚子儀真之間子夏曰吾離羣而索居亦巳久矣佳句不須論舊約相隨陽羨有籃輿陽羡常州寄程給事憶昔都門手一携春禽初向苧羅啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八今曲六么有花十八酒酣金盞照東西東西酒器名也今猶有玉東西何時得遂扁舟去邂逅從君訪剡溪此詩恐非公作越中有苧羅山此但言時物耳寄勝之運使勝之必是王益柔字勝之治平三年自浙漕徙京東及徙京西觀湖山之句恐是浙漕時下有杭州呈勝之詩必浙漕無疑蕭然生事委江臯壯志何嘗似釣鼇釣鼇見雜詠注賈山至言江臯湖頻雖有惡種無不猥大注云臯水邊淤地也千里得書來見約一朝乗興去忘勞巳將流景休一作供談笑聊為知音破鬱陶鬰陶注憂思也正是東風將欲發湖山春色助揮毫寄國清處謙續髙僧傳智者弟子灌頂禪師晉王令揚州揔管王弘造其地曇光白道猷之故迹其寺丹青之飾亂若朝霞松竹之嶺掩同被錦寔海西之壯觀有十里之松逕三江風浪隔天台想見當時賦詠才近有髙僧飛錫去更無餘事出山來天台賦應真飛錫以躡虛猿猱歴歴窺香火日月紛紛付劫灰曹毗志怪云昆明池極深悉是灰墨外國胡人曰此是劫灰也經云天地大劫將盡則劫燒此劫燒之餘我欲相期談實相東林何必謝劉雷金剛經是實相即是非相是故如來説名實相寳積云一之為妙在佛曰實相在道曰𤣥牡公嘗云妙法蓮華經説實相法然其所説亦行而巳廬山記慧逺法師居東林寺於是絶塵之侣四方而至彭城劉遺民豫章雷次宗鴈門周續之南陽宗炳張野等百有二十二人與師同修淨土之社乃令遺民著發願文將至丹陽寄表民曉馬駸駸路阻脩春風漠漠上衣裘三年銜恤空餘息一日忘形願少留小雅蓼蕭出則銜恤箋云恤憂也末路悲歡隨俯仰此生身世信沉浮寄聲徳操家人道炊黍吾今且暫休司馬徳操炊黍見題晏使君望雲亭注據事則當言徳公家人此言徳操未詳宿土坊驛寄孔世長燒夜郊原百草荒弊裘朝去犯嚴霜殘年意象偏多感回首風煙更異鄉往返自非名利役辛勤應見友朋傷章江猶得同游處最愛梅花蘸水香退之陸渾山火詩嶻然髙周燒四垣神焦鬼爛无逃門寄孫正之南游忽忽與誰言共笑謀生識最昏萬事百年能自信一簞五鼎不須論主父偃生不五鼎食言旣自信之篤窮通非所問友中惟子長招隱世上何人可一作肯避喧千里秋風相望處皖公溪上正開樽左太沖作招隱詩謂爵服旡常玩好惡有屈伸結綬生纒牽彈冠去埃塵王康琚作反招隱詩乃欲招隱者使之出觀公與正之平日議論葢取太沖所作云沈休文詩云從官非宦侣避世非避喧道中寄吉父白霧青煙入馬蹄朝寒瑟瑟樹聲悲平山斷壠回環失鳴鳥游魚上下隨杜詩角鷹歌崑崙虞泉入馬啼孟東野詩云回環失東西廟筭未聞收策士瘴鄉誰與擇軍麾太史公曰甘羅年少然出一竒計聲稱後世雖非篤行之君子然非戰國之策士也漢髙紀諸侯罷戲下各就國師古曰戲謂軍之旌麾也漢書通以戲為麾憂時自欲尋君語行路何妨更有詩送孫立之赴廣西十年一别兩相過前想悲歡慷慨歌窮去始知風俗薄靜來猶厭事機多相期鼻目傾肝膽誰伴溪山避網羅萬里辛勤君舊識重江應亦畏風波猶言手足之捍頭目勢必相須杜牧之文君子猶鼻目並列言雖逺矰繳之患而重江亦有風濤之恐送福建張比部畫船簫鼓出都時萬里驚鷗去不追却望塵沙應駐節㑹逢山水即吟詩長魚俎上通三印新茗齋中試一旗只恐逺方難久滯莫愁風物不相宜王得臣少卿塵史閩中鮮食最珍者子魚長七八寸闊三二寸剖之子滿腹冬月正其佳時莆田迎仙鎮乃其出處予按部過之驛左有祠謂之通應侯祠有水曰通應溪潮汐上下土人以鹹淡水不相入處魚最美俗乃誤傳通應為通印荆公博學多聞詩言三印豈自有所稽耶唐人茶詩槍旗不染匈奴血留與人間戰睡魔茶有一槍兩旗之號茶芽初出為槍展則為旗送致政朱郎中東歸平生不省問田園白首忘懷道更尊巳上印書通北闕稍留冠葢餞東門二疏傳公卿大夫故人邑子設祖道供帳東都門外注長安東郭門外馮唐老有為郎戀疏廣終無任子恩今日榮歸人所羨兩兒腰綬擁髙軒馮唐以孝著為郎中署長史事文帝輦過問唐曰父老何自為郎家安在師古曰言年巳老矣何自乃為郎也廣受乞骸上以篤老皆許之上加賜黄金二十斤太子贈以五十斤不聞任子若孫也龔勝邴漢致仕詔書令上子若孫若同産子一人為郎二疏顧无此别雷國輔侍郎憂國最賢勞雷徳驤閏州人嘗斥宰相趙普不法事得謫太宗時普再入相徳驤乞歸田里以避仇怨上召見慰安之遷工部侍郎賜白金二千兩終保全之詩稱侍郎即此人也太尉西州第一豪雷有終徳驤子也父任為萊蕪尉太宗聞其名召為大理丞累加工部侍郎王均亂除廬州觀察使知益州賊平為保信軍留後契丹入冦有終赴援威聲甚振契丹修好命還屯所尋召拜宣徽北院檢校太保景徳二年卒景祐二年贈侍中疑太尉字當為太保家廟比來聞澤厚公孫今果見才髙蔡邕見王粲驚曰此王公孫有異才吾不如也暢嘗為司空明時尚使龍蛇蟄壯志空𫝊虎豹韜易龍蛇之蟄以存身也六韜有虎韜豹韜皆篇名也莫厭皖山窮絶處不妨雲水助風騷皖山即舒州皖公山垂虹亭在呉江長橋之上坐覺塵襟一夕空人間似得羽翰通暮天窈窈山銜日爽氣駸駸客御風蘇子美洞庭山水月禪院記平生病悶欎塞至此嚗然破散无復餘矣返復身世惘然莫知但如蛻解俗骨傅之羽翰飛出乎八荒之外吁其快哉沈休文詩都令人徑絶惟使雲路通草木韻沉髙下外星河影落有無中萬籟皆寂水天如一不復知髙下有无之辨也飄然更待乗桴伴一到扶桑興未窮題正覺相上人籜龍軒撫州有正覺寺在水東風玉蕭蕭數畞秋籜龍名為道人留小杜詩風玉尚敲秋不須乞米供髙士韓公寄盧仝詩至今隣僧乞米送顔魯公有乞米帖但與開軒作勝游此地七賢誰笑傲何時六逸自賡酬嵇康傳所與神交者惟陳留阮籍河内山濤預其流者河内向秀沛國劉伶籍兄子咸琅琊王戎遂為竹林之遊世所謂竹林七賢李白與孔巢父韓凖裴政張叔明陶沔居徂徠山日沉飲號竹溪六逸侵尋衰境心無著公自注云上人請予命名不見主人即無著也尚有家風似子猷羅鄴傳籬外清隂接藥欄晩風交戞碧琅玕子猷沒後知音少粉節霜筠謾嵗寒題友人壁茆簷前後欠松蘿百里乗閑向此過澗水遶田山影轉野林留日鳥聲和唐人詩山明鳥聲樂日氣生岩壑蕭條雞犬逢人少想象乾坤發興多世事不如閑靜處知君出處意如何韓詩商顔暮雪逢人少鄧鄙春泥見驛賒杜詩發興自江天邵堯夫先生年益老徳益邵玩心髙明觀於天地之運化隂陽之消長以通乎萬物之變此公詩意也清明輦下懷金陵春隂天氣草如煙時有飛花舞道邊唐薛宜僚詩阿母桃花方似錦王孫草色正如煙又杜牧詩暖雲如粉草如茵院落日長人寂寂池塘風慢鳥翩翩杜詩小院回廊春寂寂王維詩栁塘春水慢故園回首三千里新火傷心六七年青葢皁衫無復禁可能乗興酒家眠書無逸或五六年或四三年因懷故園而傷新火不得展先墓也子美飲中八仙歌長安市上酒家眠杭州呈勝之公嘗從王勝之招見上注游觀須知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙簫吹落日畫樓燈燭映殘霞如君援筆宜摹冩寄與塵埃北客誇聞和甫補池掾和甫嘉祐六年登第為萃縣簿魏國喪除調池州司户㕘軍遭時何必問功名自古難將力命爭萬户侯多歸世胄五車書獨負家聲南史人仕宦非惟須才能亦還須命力命力字見列子李廣傳惜廣不逢時使當髙帝時萬户侯豈足道哉左太沖詠史詩世胄躡髙位英俊沉下僚才華汝尚為丞掾馬援傳諸曹時白外事援輒曰此丞掾之任何足相煩老懶吾今合釣耕外物悠悠無得喪春郊終日待相迎寳應二三進士見送乞詩少喜功名盡坦途那知干世最﨑嶇草廬有客歌梁甫狗監無人薦子虛司馬相如傳蜀人楊得意為狗監侍上上讀子虛賦而美之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如對曰有是請為天子㳺獵之賦解玩山川消積憤靜忘嵗月賴羣書慚君枉葢如平昔不笑謀生萬事疎紀唐夫送温庭筠詩且飲醁􅌬消積憤莫辭黄綬拂行塵江揔詩聊以著書情暫遣他鄉日謝郟亶祕校見訪於鍾山之廬誤有聲名只自慙煩君跋馬過茅簷跋馬見金明池注巳知原憲貧非病張登詩道在貧非病時來醜亦妍更許莊周知養恬莊周繕性篇古之治道者以恬養知注恬靜而後知不蕩知不蕩而性不失又生而無以知為也以知養恬知與恬交相養而和理出其性世事何時逢坦蕩人情隨分值猜嫌誰能胷臆無塵滓使我相從久未厭末句言俗人多城府不足近思得豁達之士與遊也同長安君鍾山望長安君公之女弟也解裝相值得留連一望江南萬里天殘雪離披山韞玉新陽杳靄草含煙文賦云石韞玉以山輝水懷珠而川媚餘生不足償多病樂事應須委少年杜詩可惜歡娯地都非少壯時惟有愛詩心未巳東歸與續棣華篇棠棣之華言兄弟也奉招吉甫經綸無地委蓬蒿􅏮􅏮胷懷且自韜誰奮長謀平嶺海猶將餘力寄風騷前有道中寄黄吉甫詩云廟筭未聞收策士此又云誰奮長謀平嶺海當是廣南儂冦作時所賦吉甫必知兵有筭略而未見用於時者名慙隨俗貧中役恨未收身物外髙永夜西堂霜月冷邀君相伴有松醪老杜寄杜員外詩松醪酒熟傍看醉閒居遣興慘慘秋隂緑樹昏荒城髙處閉柴門此必未去臨川時作公年尚少也公故居在一城之最髙處與余峩峯書堂相近愁消日月忘身世靜對溪山憶酒樽南去干戈何日解撫當閩廣衝時用師南方東來馹騎此時奔誰將天下安危事一把詩書子細論此足見公所存早便規模三代意非不美公嘗為人作誌銘謂蠻夷率服乃在於難壬人到家五年羈旅倦風埃舊里依然似夢回猿鳥不須懷悵望溪山應亦笑歸來身閑自覺貧無累命在誰論進有材言道勝不以貧為累且言財之能為人累也唐詩喟余獨興嘆才命不同謀秋晚吾廬更瀟洒沙邊煙樹緑洄洄西帥吾君英睿超光武良將西征捍隗囂隗囂事見本傳誓斬郅支聊出塞生禽頡利始歸朝陳湯斬郅支唐太宗生擒頡利一丸豈慮封圅谷千騎無由飲渭橋好立功名標竹素莫教空説霍嫖姚息夫躬傳如使狂夫嘄謼於東崖匈奴飲馬於渭水此詩恐謂王韶可見公意切於開邊也豈慮者言帥之威畧必不使如王元之徒欲以一丸泥封圅谷關也按北史韋孝寛賛東人怙恃其衆將欲飲馬清渭而新唐史突厥賛亦言虜薄渭橋騎􅙟䝉京師然一丸泥既是後漢書全文則亦疑千騎或别有出處公方以為對秦漢唐架渭橋者凡三橋在咸陽西十里者名便橋武帝造在咸陽東二十里為中渭橋始皇造在萬年東四十里為東渭橋不知始於何世唐書太宗出𤣥武門以萬騎徑詣渭水上隔水與頡利語時虜進至渭水便橋之北或云此是王元之詩杜子美後出塞詩借問大將誰恐是霍嫖姚陪桓中丞觀宴將士詩漢朝頻選將應拜霍票姚按漢史霍去病再從大將軍受詔予壯士為票姚校尉服䖍音飄揺師古曰票頻妙反揺羊召反票姚勁疾之貎荀悦漢紀作票鷂字去病後為票騎將軍尚取票姚之字耳子美以平聲用葢從服䖍音公亦以平聲用必承襲子美松江宛宛虹霓墮半空銀河直與此相通五更縹緲千山月萬里淒涼一笛風杜詩三年笛裏關山月萬國兵前草木風介父用此句法歐公詩夜涼吹笛千山月又唐詩落日樓臺一笛風鷗鷺稍回青靄外汀洲時起緑蕪中騷人自欲留佳句忽憶君詩思巳窮王荆公詩注巻三十七
