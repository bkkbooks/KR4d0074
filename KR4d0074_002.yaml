body:
  text: 王荆公詩注巻二宋李壁撰古詩贈約之君胷寒而痞我齒熱以摇無方可捄藥相值乆無憀欲尋秦越人秦越人扁鵲也魂逝莫能招楚宋玉作九辯招魂且當觀此身不實如芭蕉維摩經是身如芭蕉中無有堅寄楊徳逢山樊老憚暑莊子則陽公夏則休于山樊獨寤無所適湖陰宛在眼湖隂見元豐行注曠若千里隔遥聞青秧㡳復作龜兆坼陳後山謂公詩似聞青秧㡳復作龜兆坼乃前人所未道然退之南山詩已有或如龜坼兆之句占嵗以知子將勤而後食穿溝取西港此計當未獲翛翛兩龍骨豈得長挂壁晤言乆不嗣作苦何時息楊惲傳田家作苦炎天不可觸悵望新舂白次前韵寄徳逢一雨洗炎蒸曠然心志適如輸浮幢海華嚴經浮幢王香水海即花藏海也又楞嚴經月光童子修習水觀見自身中與世界外浮幢王刹諸香水海等無差别滅火十八隔佛書有十八鬲子地獄鬲音歴釜也又佛告阿難阿鼻地獄七重鐵城七層鐵網下十八鬲周匝七重皆有刀林七重城内復有劍林鬲八萬四千里於其四角有四大銅狗眼如掣電一切身毛皆出猛火其烟臭惡世有臭物無以為比如是流火燒阿鼻城令阿鼻城赤如融銅俯觀風水湧仰視電雲坼知公開霽後過我言不食書湯誓朕不食言翻愁陂路長泥淖困臧獲左傳成公十五年有淖於前注淖泥也風俗通古制無奴婢即犯事者也臧者贓罪沒入官獲者逃亡獲得皆為奴婢者也明朝吾有懷如日照東壁湼槃經佛心在迦葉如初日之照東壁暮逢田父歸倚杖問消息渠來那得度南蕩今已白公有南蕩絶句示張祕校名軒民字仲明父月出映潭底煙升隱墟落寒魚占窟聚瞑鳥投枝泊亭臯閉晩市隴首歸新穫佇子終不來青燈耿林壑與吕望之上東嶺望之嘉問也市易諸法悉其建明誤公多矣而公終厚之不替也靖節愛吾廬猗玗樂吾耳元結傳天下兵起逃入猗玗之洞始自稱猗玗子洞在商餘山西南八十里又元次山集有心規云元子病游世歸于商餘山中以酒自肆有醉歌里夫公聞之􅀈音多元子之酒請歌之歌曰元子樂矣我鼻我目我口我耳歌已矣夫公曰自樂山林可也自樂耳目何哉人誰無此元子引酒當夫曰勸君此杯酒緩飲之適野無市喧吾今亦如此紛紛舊可厭俗子今掃軌使君氣相求眷顧未云已追隨上東嶺俯仰多可喜後漢杜密傳同郡劉勝亦自蜀告歸鄉里閉門掃軌无所干及注云軌車迹也言絶人事方公盛時俗子紛沓而至徒使人厭之今居閒自無一迹公更以為愜也何以況清明朝陽麗秋水㣲雲㑹消散豈乆汚塵滓所懷在分襟藉草淚如洗據嘉問熙寧十年十月知江寧府元豐元年秋改知潤州二年四月罷旋落職衝替免勒停此云㣲雲後云黯黮必是自京口過金陵見公時也次年正月即起知臨江意公尚能為之力耶是時公雖居閒而朝廷故多門下士也杜詩憂來藉草坐浩歌淚盈把與望之至八功徳水鍾山之東有八功徳水在悟真菴後梅摯記云梁天監中有胡僧寓錫于此山中乏水時有厖難眉叟相謂曰予山龍也知師渴飲措之無俄而一沼沸出後西域僧繼至云本域八池巳失其一即此是也念方與子違戃恍夜不眠曹植秋思賦遥思惝恍兮若有道起視明星髙整駕出東阡聊為山水游以冩我心悁知子不餔糟相與酌雲泉詩泉水駕言出游以冩我憂澤陂中心悁悁鄭注悁悁猶悒悒也屈原傳衆人皆醉何不餔其糟而啜其醨邀望之過我廬念子且行矣邀子過我廬汲我山下泉煮我園中蔬知子有仁心不忍鈎我魚鈎一作釣我池在仁一作人境不與獱獺居揚雄甘泉賦蹈獱獺注獱獺小獺也亦復無蟲蛆出沒争腐餘食罷往游觀鱍鱍藻與蒲波清映白日擺尾揚其鬚豈魚有此樂而我與子無擊壤謡聖時自得以為娛莊子秋水惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂君子無入而不自得所以自娛何必同世俗之樂聞望之解舟子來我樂只子去悲如何謂言少淹留大舸已凌波黯黮雖莫測楚詞彼日月之昭明兮尚黯黮而有瑕注黯烏感切黮徒感切皇明邁羲娥脩門歸有期京水非汨羅韓詩掎摭星宿遺羲娥言天子之明過於日月也宋玉招魂章曰魂兮歸來入脩門些注脩門郢城門也宋玉設呼屈原之魂歸楚都入郢欲以感激懷王使還之也法雲建康志法雲寺舊在城外東北十里圖經云本齊集善寺齊世祖時為豫章文獻王造也唐初因輔公祐之亂毁廢後復置為章義院又改為法雲院建炎兵火後寺廢今徙置城内上元縣北法雲但見脊細路埋桑麻扶輿度燄水窈窕一川花一川花好泉亦好初晴漲緑濃於草汲泉養之花不老花㡳幽人自衰槁誌公十二時頌陽燄空花不肯抛作意脩行轉辛苦古宿語渴鹿奔陽燄盖誤以為水也後山云扶輿度陽燄窈窕一川花雖前人未易道然學三謝失於巧耳大安禪師云怱怱如渴鹿趂陽燄何時得相應去岑參詩溪水碧於草元㣲之詩年年祇見人空老嵗嵗何曽花不開亦此意也然花以泉養而不老人可不思所以自養哉彎碕殘暑安所逃彎碕北窻北吳都賦左稱彎碕右號臨硎閽闥名也正在建康南山之南北山之北蜀志法真傳伐翳作清曠培芳衛岑寂投衣挂青枝敷簟取一息涼風過碧水俯見游魚食永懷少陵詩菱葉浄如拭少陵渼陂行菱葉荷花浄如拭雖當共新甘紫角方可摘步月二首山泉墮清陂陂月臨浄路惜哉此佳景獨賞無與晤埭口哆陂陰玉篇哆處紙尺冩二切張口也要予水西去呼童擁草垡復使東南注韓詩謝病老耕垡其二蹋月看流水水明蕩摇月草木已華滋山川復清發古詩庭前有竒樹緑葉發華滋褰裳伏檻處緑浄數毛髪誰能挽姮娥俯濯凌波韈姮娥羿妻洛神賦凌波㣲步羅襪生塵李白詩盈盈漢水若可越可惜凌波步羅韈劉禹錫馬嵬詩不見嵓畔人空見凌波襪兩山間自予營北渚數至兩山間臨路愛山好出山愁路難愁路難言世路之難不若山中之樂也古樂府有行路難盧仝詩岀山忘掩山門路山花如水浄山鳥與雲閒我欲抛山去山仍勸我還秖應身後塜便是眼中山且復依山住歸鞍未可攀題晏使君望雲亭南康父老傳使君疾呼急索初不聞未曾遣汲谷簾水谷簾在康王谷有水簾飛泉被岩而下者二三十派其深不可計其廣七十餘尺陸鴻漸茶經第其水為天下第一三載秖望香爐雲廬山記香爐峯山南山北皆有之其形圖聳常出雲氣故名香爐雲徐無心澹無滓使君恬静亦如此歘然一去掃遺陰便覺煩歊漲千里漲一作悵歸田負載一作戴子與妻圃蔬園果西山西出門亭臯百頃緑望雲纔喜雨一犂我知新亭望雲好欲斸比鄰成二老杜詩與子成二老來往亦風流莫嫌鷄黍數往來為報襄陽徳公嫂語殺鷄為黍襄陽記司馬徳操嘗詣龎徳翁值其上冢徑入其室呼徳翁妻子使速作黍須臾徳翁還直入相就不知何者是客也洊亭金陵志洊亭在蔣山廢乆矣余嘗過之公詩又云西崦水泠泠㳂岡有洊亭朝尋東郭來西路歴洊亭衆山若怨思慘澹長眉青迸水泣幽咽復如語丁寧豈予乆忘之而欲我小停歇鞍松栢閒坐起俯軒櫺秋日幸未暮柰何雨㝠㝠光宅寺按建康志光宅寺本梁武故宅天監六年捨宅作寺昔雲光法師講法華經于光宅毎有華如飛雪滿空而下講訖即升空而去翛然光宅淮之陰秦淮之陰扶輿獨來坐一作止中林千秋鐘梵已變響十畝桑竹空成陰子虚賦飛􅗒垂髾扶輿倚靡注言美人等被麗服扶楚王之輿也昔人倨堂有妙理髙座翳遶天花深髙座寺亦載雲光講法華天花散落今講經臺遺迹尚存紅葵紫莧復滿眼往事無跡難追尋春日晩行門前楊栁二三月枝條緑煙花白雪呼童羈我果下騮霍光傳皇太后御小馬車張晏曰漢廐有果下馬髙三尺以駕果樹下乗之故號果下馬欲尋南岡一散愁縁岡初日溝港浄與我門前緑相映隔淮仍見裊裊垂佇立怊悵去年時杏花園西光宅路草暖沙晴正好渡興盡無人檝迎我却隨倦鴉歸薄暮歐陽永叔詩緑隂深處聞啼鳥猶得追閒果下騮古樂府王獻之但度無所苦我自檝迎汝新花老年無一作少忻豫況復病在床汲水置新花取慰以流芳流芳不一作祇須臾吾亦豈乆長新花與故吾已矣可兩忘田畫承君云頃為金陵酒官有荆公處老兵時來沽酒必問公之動止兵云相公毎日只在書院中讀書時時以手撫床而歎人莫測其意也莊子田子方篇雖忘乎故吾吾有不忘者存别本有絶筆二字注詩後兩忘之句其超然無累又欲出莊生右矣四皓二首四皓秦漢時招招莫能致紫芝可以飽粱肉非所嗜谷廣水渙渙山長雲泄泄與其貴而拘不若賤而肆園公綺里季甪里先生夏黄公鬚眉皓白謂之四皓顔師古注云爾皓髙士傳四皓歌曰莫莫髙山深谷逶迤曄曄紫芝可以療飢唐虞世逺吾將何歸駟馬髙盖其憂甚大富貴之畏人不如貧賤之肆志渙渙水盛也泄猶舒也揚子五百篇周之士也貴秦之士也賤周之士也肆秦之士也拘其二秦敺九州逃知力起經綸重利誘衆䇿頗知聚秦民頺然此四老上友千載魂采芝商山中一視漢與秦靈珠在泥沙光景不可昏道徳雖避世餘風㢠廻至尊嫡孽一朝正留侯果知言出處但有禮廢興豈所存始以避秦隱商山終以髙祖嫚士義不為之臣故云一視也始上欲易太子見四人者至大驚乃曰煩公幸卒調䕶太子太子竟不易者良本招此四人之力也故云囘至尊真人予嘗值真人能藏毒而寧莊子列禦冦篇彼所小言盡人毒也能納穢若浄能易羶使馨能解身赫赫能逆知㝠㝠日唯汝心攖而汝耳目熒廓然而無營其孰擾汝靈神竒實主汝厥通莫之令知北遊篇臭腐復化為神竒嘻予豈不知黄帝覺焦螟死心而廢形乃可少聞霆顧今親遘之於吾獨剽聆刳心事斯語自儆以書銘列子湯問篇江浦之間生麽蟲其名曰焦螟飛而集于蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形􅚞俞師曠方夜擿耳俯首而聽之弗聞其聲唯黄帝與容成子居空同之上同齋三月心死形廢徐以神見塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲莊子天地篇君子不可不刳心焉寄蔡氏女子二首西清詩話云元豐中王文公在金陵東坡自黄北遷日與公游盡論古昔文字又以近製示坡坡云若積李兮縞夜崇桃兮炫晝自屈宋沒曠千餘年無復離騷句法乃今見之公曰非子瞻見䛕自負亦如此然未嘗與俗子道也據東坡推公與公自許如此而晁无咎續楚詞乃獨取公歴山思歸賦書山石詞顧遺此不録又何也建業東郭望城西堠揚雄解嘲今大漢東南一尉西北一堠後漢和帝紀舊南海獻龍眼荔枝十里一置五里一堠千障承宇百泉遶霤五祀有中霤王莽傳繞霤之固南當荆楚師古曰谿谷之水回繞而霤也漢樂歌帝臨中壇四方承宇青遥遥兮纚屬緑宛宛兮横逗司馬相如傳輦道纚屬注纚力爾反張衡思𤣥賦亂弱水之潺湲逗華隂之湍渚注云郭璞注亂横渡也逗止也恐公合二字而用之積李兮縞夜崇桃兮炫晝蘭馥兮衆植竹娟兮常茂栁蔫綿兮含姿松偃蹇兮獻秀鳥跂兮下上魚跳兮左右顧我兮適我有斑兮伏獸感時物兮念汝遲汝歸兮携幼記貍首之斑然司馬相如傳般般之獸般音斑文貌其二我營兮北渚九歌夕弭節兮北渚有懷兮歸女石梁兮以苫盖襄十四年范宣子數戎子駒支曰乃祖吾離披苫盖蒙荆棘以來歸我先君注盖苫之别名爾雅白盖謂之苫釋曰白盖茅苫也又白茅苫也今江東呼為盖然則盖即苫也以白茅為之故曰白盖緑陰陰兮承宇仰有桂兮俯有蘭嗟汝歸兮路豈難望超然之白雲臨清流而長歎狄仁傑登太行山見白雲孤飛曰吾親舍其下瞻悵乆之雲移乃去此殆指蔡氏女之念已也夢黄吉甫夢傳失之妄晝冀見而想豈伊不可懷而使我心往山林老顛眴揚雄美新文臣嘗有顛眴疾恐一旦先犬馬眴音縣數日占黄壤舟輿來何遲北望屢戃怳西城薺花時落魄隨兩槳酈生傳落魄無衣食業魄音薄嵗晚洲渚浄水消煙𣺌莽躊蹰壁上字期我無乃迋詩揚之水無信人之言人實迋汝左氏子無我迋游土山示蔡天啟祕校王直方詩話云夏畸道言蔡天啟初見荆公荆公坐間偶言及盧仝月蝕詩人難有誦得者天啟誦之終篇遂為荆公所知土山在上元縣南三十里按丹陽記云晉太傅謝安舊隱㑹稽東山築此象之無巖石故謂土山有靈木臺觀娛游之所安就帝請朝中賢士子姪親屬㑹土山定林瞰土山近乃在眉睫誰謂秦淮廣正可藏一艓揚雄方言艓小舟音葉切韻王篇不載此字朝予欲獨往扶憊强登涉蔡侯聞之喜喜色見兩頰呼鞍追我馬亦以兩黥挾范雎傳坐須賈堂下令兩黥徒夾而馬食之斂書付衣囊裹飯隨藥笈翛翛阿蘭若阿蘭若一名法菩提場見華嚴經土木老山脅鼓鐘卧空曠簨簴雕捷業檀弓有鐘磬而無簨簴詩有瞽注捷業如鋸齒所以飾栒為縣也升堂廓無主考擊誰敢輙坡陀謝公冢藏椁乆穿劫陳始興王叔陵傳晉世王公貴人多葬梅嶺及叔陵所生母彭氏卒啟求梅嶺乃發故太傅謝安舊墓弃去安柩以葬其母藏椁見烘蝨注百金置酒地野老今行饁謝安傳土山游集肴饌亦屢費百金􅒺懷起東山勝踐此一作比稠疊安傳髙崧戲安曰卿髙卧東山諸人相與言安石不出其如蒼生何蒼生今亦將如卿何於時國累卵楚夏血常喋安傳時苻堅强盛疆場多虞諸將敗退相繼安遣弟石及兄子𤣥等應機征討所在尅捷又云時强敵冦境邊書續至梁益不守樊鄧䧟沒安毎鎮以和靖御以長算文武用命威懷外著人皆比之王導謂文雅過之庾翼病表子爰之行荆州刺史委以後任何充曰荆楚國之西門地勢險阻得人則中原可定失人則社稷可憂豈可以白面少年當之哉桓温英畧過人有文武器幹西夏之任無出桓温者觀此則西夏即荆州之地漢文紀云今已誅諸吕新喋血京師師古注本當作蹀謂殺人流血履涉之耳外實備艱梗中仍費調爕公能覺如夢自喻一蝴蝶費調爕謂桓温逆節漸著莊子齊物論云莊周夢蝶栩栩然蝴蝶也自喻適志歟桓溫適自斃苻堅方天厭且可緩九錫寧當快一捷彼哉斗筲人得喪易矜怯妄言屐齒折温病篤風朝廷加九錫使袁宏具草安見輙改之歴旬不就㑹温死遂已左氏隱十一年天而既厭周徳矣又語予所否者天厭之注於琰切今公作入聲使謝𤣥破苻堅捷書至安了無喜色棊如故既罷還内過户限心喜甚不覺屐齒之折吾欲刋史牒傷心新城埭歸意終難愜漂摇五城舟尚想浮河檝千秋隴東月長照西州堞安傳㑹稽王道子專權而奸謟頗相煽構安出鎮廣陵之步丘築壘曰新城以避之盡室而行造泛海之裝欲經畧粗定自江道還東雅意未就遂遇疾篤上疏請量宜旋斾云云入西州門自以本志不遂深自慨失又安先築埭於新城外後人追思之名曰召伯埭傷心新城埭歸意終難愜指上所陳事也杜塞蘆子詩五城何迢迢迢迢隔河水筆談云延州今有五城説者以為舊有東西二城夾河對立髙方典郡始展南北東三闗城即詩以觀則知天寶中已有五城矣而唐徳宗時浙江觀察使韓滉亦於石頭築五城不知公詩所指謂延州五城耶抑石頭五城耶細考上下文意疑是荆公觀石頭舟師遐想劉牢之渡河之擑而云耳五城即石頭城冶城臺城苑城新城隴東謂漢三輔隴西謂天水諸郡隴者所以限東西也今特指隴東者言公志在掃清闗輔困於䜛詖逺圖未就而死所稱月照西州堞其㫖深其詞悲矣亦猶杜詩江流石不轉遺恨失吞吳之意也豈無華屋處亦捉蒲葵箑碎金諒可惜零落隨秋葉好事所傳玩空殘法書帖清談𦕈不嗣陳接怳如接羊曇追思安誦曹子建詩生存華屋處零落歸山丘因慟哭而去安鄉人有罷中宿縣者還詣安安問其歸貲荅曰有蒲葵扇五萬安廼取其中者捉之價增數倍安作簡文謚冊桓温以示坐人曰此是安石碎金也廣記安學正書於右軍右軍云卿是解書者又王僧䖍云安正書入能品𨽻行草並入妙品安傳善行書閣帖中亦有公尺牘安謂王羲之秦任商鞅二世而亡豈清談致患耶東陽故侯孫少小同鼓篋一官初嶺海仰視飛鳶跕窮歸放欵叚髙卧停逺蹀牽襟肘即見著帽耳纔擪馬援傳仰眎飛鳶跕跕墮水中欵叚馬援事莊子讓王曾子緼袍无表捉襟而肘見唐代宗時禁民皂衫擪耳帽以異官健數椽危敗屋為我炊陳浥雖無膏汚鼎尚有羮濡筴縱言及平生相視開笑靨曲禮羮之有菜者用挾注云挾箸也字林作筴杜牧詩笑靨遝須待我開邯鄲枕上事且飲且田獵異聞集開元中道人吕公常往來邯鄲有書生姓盧同止逆旅主人方煮黄粱共待其熟盧生不覺長嗟吕問之具言生世之困吕取嚢中枕以授盧曰枕此當榮適如願生俯首即夢入枕穴中遂見其家未㡬登第歴臺閣出入將相五十年子孫皆顯仕忽欠伸而寤黄粱猶未熟謝曰先生以此窒吾欲耳自此不復求仕莊子夢飲酒者旦而哭泣夢哭泣者旦而田獵或昏眠委翳或妄走超躐或呌號而寤或哭泣而魘幸哉同聖時田里老安帖易牛以寶劍擊壤勝彈鋏龔遂傳賣劍買牛賣刀買犢彈鋏歸來兮食無魚馮驩事追憐衰晉末此土方岌嶪强偷須臾樂撫事終愁惵予雖天戮民有械無接摺莊子是天之戮民也注意其知進而不知止則性命喪矣所以為戮在宥篇吾未知聖智之不為桁楊接摺也翁今貧而浄内熱非復葉予衰極今嵗儻與鷄夢協委蜕亦何恨吾兒已長鬛翁雖齒長我未見白可鑷莊子葉公子髙朝受命而夕飲氷我其内熱也歟謝安夢乘桓温輿行六十里見一白鷄而止列子天瑞篇孫子非汝有是天地之委蜕也齊書髙祖恒令左右㧞白髮隆昌王髙祖之孫年五嵗戲於床前帝曰兒言我是誰荅曰大翁帝曰豈有為人曾祖㧞白髪乎即擲去鏡鑷祝翁尚難老生理歸善攝乆留畏年少譏我兩呫囁束火扶路還宵明狐兔懾蔡侯雄俊士心憭形亦諜異時能飛鞚快若五陵俠胡為阡陌間踠足僅相躡諒能交轡語呿予不能嗋左思吳都賦曰土壤不足以攝生注攝持也漢灌夫諜罵竇嬰今日長者為壽乃效女兒曹呫囁耳語莊子形成光注謂舉動便僻成光儀令人敬已也前漢游俠傳亡命嵗餘逢赦出郡國諸豪及長安五陵諸為氣節者皆歸慕之注五陵謂長陵安陵陽陵茂陵平陵也班固東都賦馬踠餘足士怒未洩嗋許劫反合也玉篇張口兒呿音袪開也莊子秋水篇公孫龍口呿而不合天運篇予口張而不能嗋王荆公詩注巻二
