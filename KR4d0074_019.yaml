body:
  text: 王荆公詩注卷十九宋李壁撰古詩泊舟姑蘇朝遊盤門東暮出閶門西姑蘇城門有五曰盤門閶門葑門婁門齊門四顧茫無人但見白日低荒林帶昏煙上有歸鳥啼物皆得所託而我無安棲陶詩萬族各有託孤雲獨無依崑山慧聚寺次孟郊韻寺在蘇州僧蹊蟠青蒼莓苔上秋床露翰飢更清露翰指鶴也風花遠亦香掃石出古色洗松納空光久遊不忍還迫迮冠蓋場如歸亭順風春江窈窈來無地飛帆浩浩窮天際文選飛閣流丹下臨無地然此語意乃謂江所從來遠也謝元暉詩天際識歸舟朝出吳川夕霅溪回首喬林吹岸薺顔之推家訓云羅浮山記云望平地樹如薺故戴嵩詩云長安樹如薺篙師晝卧自嘯歌戲彼挽舟行復止言順流適意笑泝者之勞也人生萬事反衍多道路後先能幾何莊子秋水篇北海若曰以道觀之何貴何賤是謂反衍注貴賤之道反復相尋垂虹亭三江五湖口地與天不隔書疏三江謂震澤之三江周禮職方揚州藪曰具區浸曰五湖五湖即震澤也按三江者在蘇州東南三十里名三江口一江西南上七十里至太湖名曰松江古笠澤江一江東南上七十里自蜆湖名曰上江亦曰東江一江東北下三百餘里入海名曰下江亦曰婁江於其分處號曰三江口日月所蔽虧東西渺然白日月蔽虧見登景德塔注漫漫浸北斗浩浩浮南極誰投此虹霓欲濟兩間厄演孔圖曰天子外苦兵威內奪臣無忠則天投霓後漢五行志靈帝光和元年有黑氣墜溫明殿庭中身五色有頭長十餘丈似龍上問蔡雍對曰所謂天投霓者也中流雜蜃氣欄楯相承翼昭元年魚鹽蜃蛤弗加於海漢天文志海旁蜃氣象樓臺初疑神所為滅沒在頃刻漢天馬歌走滅沒晨興坐其上傲兀至中昃猶憐變化功不謂因人力今君持酒漿談笑顧賓客頗誇九州物壯麗此無敵熒煌丹砂柱璀璨黃金壁退之詩洞庭九州間厥大誰與讓柱以丹砂塗之如赤石脂泥壁之類壁謂璧當相如賦華欀璧當注以玉為椽頭當即所謂璇題玉題者也中家不慮始助我皆豪殖喟豫獨感此剝爛有終極改作不可無還當采民力商君傳民不可與慮始而可與樂成言中人之家力薄不遑慮始助我者皆貨殖之徒也賈生傳豪殖而大彊注殖立也張氏靜居院動者利進為靜者樂止居物性有偏得惟賢時卷舒張侯始出仕所至多名譽老矣歸偃休買地斸荒蕪屋成為令名名實與時俱南堂棲幽真晨起瞻像圖北堂畫五禽游戲養形軀華他傳古之仙者為導引之事名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰鳥引挽要體動諸關節以求難老燕有諸賓庭學有諸子廬問侯年幾何矯矯八十餘問侯何能爾心不藏憂愈唐栁公度善攝生年八十餘尚强力常云吾初無術但未嘗以氣海暖冷物熟生物不以元氣佐喜怒耳問侯客何為弦歌飲投壺問侯兒何讀夏商及唐虞嵩山填門户洛水繞階除侯於山水間結駟有通衢我念老退者古多賢大夫留侯亦養生乃欲凌空虛閉門不飲酒豈異山中臞疏傅稍喜客揮金能自娛不聞喜教子滿屋青紫朱漢書疏廣父子俱移病乞骸骨上以其老皆許之加賜黃金二十斤皇太子贈以五十斤廣歸日令家設酒食請族人故舊賓客廣所愛信老人說廣買田宅廣曰此金者聖主所以惠飬老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人悅服廣傳曰吾既無以教化子孫不欲益其過而生怨不得云不教子疏廣之後無聞故公云爾張侯能兼取勝事古所無褒稱有樂石丞相為之書而我不自量聞風亦歌呼秦嶧山碑云刻此樂石顔師古注以泗濱浮磬作碑也丙戌五月京師作二首北風閣雨去不下驚沙蒼茫亂昏曉傳聞城外八九里雹大如拳死飛鳥慶歷六年五月甲申雨雹地震即此年也漢五行志雹者隂脅陽也地節四年五月山陽濟隂雨雹如雞子深二尺五寸殺二十人飛鳥皆死其二浮雲離披久不合太陽獨行乾萬物誰令昨夜雨滂沱北風蕭蕭寒到骨答客士常疑西伯何至羑里辱文王囚於羑里瞽鰥親父子尚脫井廪酷昏主雖聖臣飛禍安可卜致命遂其志雖窮不為戮舜之父曰瞽叟書堯典有鰥在下曰虞舜史記游俠傳虞舜窘於井廪後漢周榮嘗敕妻子若卒遇飛禍無得殯殮冀以區區腐身覺悟朝廷困卦君子以致命遂志言身雖窮困而不干刑戮次韻唐彥猷華亭十詠彥猷名詢顧林亭寥寥湖上亭不見野王居野王所居也顧野王梁大同中為黃門侍郎又仕陳為左將軍嘗撰玉篇者梅聖俞集及劉貢父集皆有華亭十韻題云和楊令此稱唐彥猷當是林亭主人也寰宇志野王建州人仕陳為光祿卿有宅在建安縣今此亦有之疑既顯遂不復歸鄉耳平林豈舊物嵗晚空扶疏自古賢聖人邑國皆丘墟易謙卦可用行師征邑國也不朽在名德千秋想其餘野王無足稱公羞言事理如此寒穴神泉冽冰霜髙穴與雲平易言山下出泉而此穴與雲平所以為神空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲吳王獵場吳王好射虎但射不操戈吳志孫權好射虎所乘馬為虎所傷投以雙㦸虎却廢常從張武擊以戈獲之據貢父詠獵場云水犀十萬士白羽橫雕戈若用水犀事則吳王為夫差非孫權也匹馬掠廣埸萬兵助遮羅沈存中觀畫馬詩四蹄雙翻掠草頭飛入平原不霑土時平事非昔此地桑麻多髙適宋中詩時清更何有禾黍遍空山猛獸亦已盡牛羊在田坡始皇馳道穆王得八駿萬事得期修昭公十二年昔穆王欲肆其心周行天下將皆必有車轍馬迹焉周穆王即位三十二年巡行天下馭八龍之駿一名絶地足不踐土二名翻羽行越飛禽三名奔宵夜行萬里四名越影逐日而行五名踰輝毛色炳耀六名超光一形十影七名騰霧乘雲而趨八名挾翼身有肉翅遞而駕焉案轡徐行以巡天下穆王神智遠謀使轍迹遍於四海故絶異之物不期自服茫茫千載間復此好遠遊遠遊謂始皇也車輪與馬跡此地亦嘗留漢書賈山傳秦為馳道於天下東窮燕齊南極吳楚江湖之上濱海之觀畢至華亭吳境宜轍跡之所歷也想當治道時勞者尸如丘言治道以備巡行死於征役者尸積如丘山甚言秦之無道也柘湖公自注云湖中有山生柘故名柘湖記云女子為湖神今有廟柘林著湖山菱葉蔓湖濱秦氏亦何事能為此湖神年年賽雞豚漁子自知津幽妖窟險阻禍福易欺人詩意言未必秦女能神乃幽妖假託耳陸瑁養魚池公自注云陸瑁仕吳為吏部尚書喜之父吳平喜仕晉為散騎常侍野人非昔人亦復水上居紛紛水中游豈是昔時魚魚謂陽橋之魚吹波浮還沒競食糟糠餘吞舟不可見守此嵗月除莊子吞舟之魚碭而失水詩今我不樂日月其除注除去也箋云今不自樂日月且過去不復暇為之華亭谷公自注云水行三百里入松江巨川非一源源亦在衆流此谷乃清淺松江能覆舟荀子云水則載舟水則覆舟言水發源處尚淺至其末派渺瀰乃能覆舟猶岷江濫觴東合百川為稽天之浸蟲魚何所知上下相沉浮徒嗟大盈北浩浩無春愁華亭水自大盈入松江而北入海陸機宅故物一巳盡嗟此嵗年深野桃自著花荒棘自生針芊芊谷水陽鬱鬱崑山隂俯仰但如昨游者不可尋機思鄉詩云倣佛谷水陽婉婉崑山隂崑山公自注云世傳陸氏家生機雲故名崑山言生玉也按吳地志云華亭水東有崑山玉人生此山山亦傳此名崖風與穴水清越有餘聲禮記聘義扣之其聲清越以長悲哉世所珍一出受欹傾不如猿與鶴棲息尚全生潘尼傳不能猗靡容悅出入﨑傾機以河橋之敗為成都王頴所殺孫惠與朱誕書曰不意二陸相擕暗朝一旦湮滅道業淪喪痛酷之深荼毒難言國喪雋望悲豈一人三女岡公自注云吳王葬三女於此自古世上雄慷慨擅功名當時豈有力能使死者生言英雄雖有蓋世之力不能使死者復活也三女死一丘此恨亦難平按寰宇志吳縣有女墳湖吳王葬女取土成湖又郡國志三女墳在郭西闔閭食䗍魚美留半賜小女女怨自殺王痛之葬於郭西文石為槨金印銀尊悉以送又吳王女墓在閶門外山川記云夫差女年十八童子韓重私悅之王怒女結恨而死葬後重往弔之以徑寸珠匣贈重據郡國志山川記皆有吳王女墳一以為闔閭一以為夫差未知孰是或二王各有女冢也音容若有作無力傾人城太白巖鄞縣時作太白巃嵸東南馳衆嶺還合青分披煙雲厚薄皆可愛樹石疏密自相宜陽春已歸鳥語樂溪水不動魚行遲生民何由得處所與兹魚鳥相諧熙日觀魚鳥之樂而感民生之艱退之祭李氏文出從於人既相諧熙秃山吏役滄海上瞻山一停舟怪此秃誰使鄉人語其由一狙山上鳴一狙從之游相匹乃生子子衆孫還稠山中草木盛根實始易求攀挽上極髙屈曲亦窮幽衆狙各豐肥山乃盡侵牟莊子吳王浮江登於狙之山衆狙見恂然棄而走栁子厚憎王孫文山之小草木必凌挫折挽使之瘁然後巳故王孫之居山常蒿然漢景帝紀侵牟萬民攘爭取一飽豈暇議藏收大狙尚自苦小狙亦已愁稍稍受咋嚙一毛不得留狙雖巧過人不善操鋤耰所嗜在果榖得之常以偷嗟此海中山四顧無所投生生未云已嵗晚將安謀似言天下生齒日衆吏為貪牟公家無儲積而上未盡教養之方也贈曾子固曽子文章衆無有水之江漢星之斗挾才乘氣不媚柔羣兒謗傷均一口韓詩不知羣兒愚那用故謗傷子固晚稍用神宗嘗語之曰以卿才學宜為人所忌也吾語羣兒勿謗傷豈有曽子終皇皇借令不幸賤且死後日猶為班與揚陳勝傳籍第令無斬服䖍云籍猶借也師古曰第但也言但令無斬也班固與揚雄也王震作子固集敘亦云先生自負要似劉向不知韓愈為何如也公平生最多謗余嘗辨之見於所為公集後序及建昌寧君書院記當摘取附此如荆公與段縫書云足下姑自重無輕議鞏之類鮑公水水在臨川未詳鮑公何人村南鮑公山山北鮑公水髙穴逗遠源泠泠落山觜玉色與飴味不可他味比竹樹四䝉密翠藤相披靡漫郎昔少年幽居得之此漫郎元次山自號也事見别注漫郎公自謂也臨窺若有遇愛歎無時已浮名未染汙求矢終焉爾奈何中棄入長安十載風塵化舊顔歡囂滿耳不可洗此水泠泠空在山晉孫楚所以枕流欲洗其耳寄李士寧先生士寧本末見七言八句律詩詳注樓臺髙聳間晴霞松檜隂森夾栁斜渴愁如箭去年華陶情滿滿傾榴花自嗟不及門前水流到先生雲外家王右軍曰年在桑榆自然至此正賴絲竹陶寫樂天詠家醖詩常嫌竹葉猶凡濁始覺榴花不正真通典扶南傳頓遜國有安石榴取汁停盆中數日成美酒又李義山詩我為傷春心自醉不勞君勸石榴花劉原甫詞桃葉新聲榴花美味僧德殊家水簾求豫詠淙淙萬音落石顛髙適還山吟石泉淙淙若風雨桂花松子常滿地皎皎一派當簷前清風髙吹鸞鶴唳白日下照蛟龍涎浮雲裝額自能卷缺月琢鉤相與懸朱門試問幽人價翡翠鮫綃不直錢東方朔大衣詩裝以浮雲緣以四海包何稱詩鉤懸新月吐衡舉衆星隨翡翠寶玉之類非謂翠羽也歐公歸田録云余家有一玉罌形製甚古而精巧始得之梅聖俞以為碧玉在穎州時嘗以示僚屬坐有兵馬鈐轄鄧保吉者真宗朝老內臣也識之曰此寶器也謂之翡翠云禁中寶物皆藏宜聖庫庫中有翡翠盞一隻所以識也北夢瑣言張建章於渤海遇水仙遺之鮫綃以進明皇以為珤又絞綃即龍紗也其價百金以為服入水不濡王荆公詩注卷十九
