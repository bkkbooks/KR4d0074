body:
  text: 王荆公詩注卷十一宋李壁撰古詩兩馬齒俱壯據此古詩二十八首雖無嵗月可考然第七首有邂逅亦專城之句當是嘉祐元年二年之間知常州時作又第十首有行觀蔡河上負土知力弱之句按嘉祐三年開京城西葛家岡新河直城南疑即指此又二十三首詠麒麟按交趾貢獸號麒麟亦是嘉祐三年事則公賦此詩二十八篇嘉祐初年作無疑矣今兩馬齒俱壯詩一以指方為時用而自喜欲前者一以指困於羈束而恨不獲騁力者是時文富並相賈文元時為樞使不知意竟屬何人哉或别有所謂也兩馬齒俱壯自驕千里材生姿何軒軒或是龍之媒一馬立長衢顧影方徘徊一馬裂銜轡奔嘶逸風雷立豈飽芻豆戀棧常思回桓範出赴曹爽蔣濟謂司馬懿曰範則智矣駑馬戀棧豆爽必不能用也奔豈欲野齕久羈羡駑駘莊子騏驥不盡其用反有羡於駑駘兩馬不同調各為世所猜問之不能言使我心悠哉春從沙磧底春從沙磧底轉上青天際杜詩春從沙際歸靄靄桑柘墟浮雲變姿媚游人出暄暖鳥語辭隂翳心知歸有日我亦無愁思所嗟獨季子尚客江湖澨萬里卜鳯凰飄飄何時至莊公二十四年初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘詩意指婚姻事當是純甫晨興望南山晨興望南山不見南山根草樹露顛頂樛枝空復繁銅瓶取井水已至尚餘溫天風一吹拂的皪成璵璠璵璠美玉君所佩也詩意悼俗學不究本根徒尋枝葉如人於井必及而後得清甘也末聨似言學能變化氣質猶水得風凝結為氷如美玉然結屋山澗曲結屋山澗曲挂瓢秋樹顛鳴不中律吕時時驚我眠吾兒亦惡聒戮力事棄捐逸士傳許由隱箕山以手捧水而飲之人遺一瓢得以取飲飲訖挂於樹上風吹歷歷作聲尚以為煩遂去之止我為爾歌不如恣其然秋風動地至萬竅各啾喧一瓢雖易除豈在有無間言瓢得風而鳴莊子作則萬竅怒號皪皪山下石泠泠手中弦臨流寫所愛坐聽以窮年朝日一曝背朝日一曝背欣然忘夜寒列子楊朱篇云昔宋國有田夫常衣緼黂僅以過冬暨春東作自曝於日不知天下之有廣厦奧室綿纊狐貉顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞樵松煮澗水樵松以松為樵既食取琴彈彈作南風歌歌罷坐長歎寤被栖栖者遺世良獨難樂記舜作五弦之琴以歌南風家語載南風之歌曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮公意在厚民不與隱者之獨善黃菊有至性團團城上日秋至少光輝積隂欲滔天況乃草木微黃菊有至性孤芳犯羣威采采霜露間亦足慰朝飢少狂喜文章少狂喜文章頗復好功名稍知古人心始欲老蠶耕低回但忘食邂逅亦專城古詩四十專城居仰慙冥冥士俯愧擾擾氓鴻飛冥冥指髙世之士俯愧言無德以與民良夜未遽央青燈數寒更撥書置左右仰屋慨平生涓涓乳下子詩中雖無此句而實言人子之事别本作三戰敗不羞三戰敗不羞左氏三敗及韓管仲曰吾嘗三戰三敗北鮑叔不以我為怯知我有老母也一官遷輒喜廬江毛義家貧以孝稱南陽人張奉往候義府檄適至以義守令義捧檄而喜奉者志尚士心賤之及義母死去官行服後舉賢良公車徴不至奉歎曰賢者固不可測往日之喜乃為親屈也古人思慰親愧辱寧在已於陵避兄食織屨仰妻子恩義有相權潔身非至理此詩似為孫侔正之輩發少年見青春少年見青春萬物皆嫵媚身雖不飲酒樂與賓客醉一從鬢上白百不見可喜心腸非故時更覺日月駛聞歡已倦往得飽還思睡春歸只如夢不復悲憔悴寄言少年子努力作春事亦勿怪衰翁衰强自然異白日不照物白日不照物浮雲在寥廓風濤吹黃昏瓦屋更紛泊行觀蔡河上負土知力弱知一作私蔡河屬開封祥符縣按蔡河始自建隆元年始命右領軍衛將軍陳承昭督丁夫導閔水自新鄭與蔡水合貫京師南歷陳潁逹夀春以通淮右舟楫相繼商賈畢至都下利之於是以西南為閔河東南為蔡河至開寶六年三月始改閔河為惠民河隋堤散萬家亂若春蠶箔言隄决倉卒居民徙避如蠶箔然仍聞决數道且用寬城郭疏河流以分水力使不嚙州縣婦子夜號呼西南漫為壑此詩疑在嘉祐初年所作按嘉祐三年正月有司言至和中大水京城罹其患請自祥符縣界葛家岡直城南好草陂北入惠民河分注魯溝以紓京城之患於是發官卒調民丁鑿河凡九月而成號為永濟河今詩且用寬城郭西南漫為壑者往往指此草端無華滋草端無華滋隂氣已盤固暄妍却如春嵗晚曾不寤一裘可以暖貧士終難豫忽忽遠枝空寒蟲已坯户一日不再飯一日不再飯飯已八九眠忽忽返照間頓羸不可遷筋骸徽纆束揚雄解嘲徽以糾纆注云徽糾纆皆繩也禮記肌膚之㑹筋骸之束也肺腑鼎鐺煎長往理不惜髙堂思所牽秋枝如殘人秋枝如殘人顔色先憔悴微寒吹已空性命一何脆寧當記疇昔葩葉相嫵媚嵗行雖使然好殺豈天意此詩言盛衰消息之理言天至秋雖肅殺而實寓生物之意青青西門槐人情甘阿諛我獨倦請謁尤於權門疏萬事亦已拙平生江湖期夢寐不可遏青青西門槐少解馬上暍淮南子武王䕃暍人於樹下此詩意雖髙而語淺露恐非公作天下不用車天下不用車人人乘馬馳王良雖善御攬轡欲從誰王良古之善御者言車既不用則王良雖以善御名亦無所施其巧矣漢武伐大宛殺人若京坻漢西域傳大宛多善馬馬汗血張騫始為武帝言之上乃遣使者持千金以請宛王愛其馬不與於是遣二師將軍李廣利將兵十餘萬人伐宛連四年殺宛王得馬三千匹孝文却走馬獨行先安之賈捐之傳孝文帝時有獻千里馬者詔曰鸞車在前屬車在後吉行日五十里師行三十里朕乘千里馬獨先安之遂還馬與道里費萬物命在天取舍各有時隂陽更用事冬暖豈所宜卞氏强獻玉兩刖亦已癡幸終遇良工巳剖得不疑新序荆人卞和得玉璞而獻之荆厲王使玉尹相之曰石也王以和為謾而斷其左足武王即位和復奉玉璞而獻之武王使玉尹相之曰石也又以為謾而斷其右足共王即位和乃奉玉璞而哭於荆山中三日三夜泣盡而繼之以血共王使人問之曰寶玉而名之曰石貞士而戮之以謾此臣所以悲也共王乃使理其璞而得寶焉故名之曰和氏之璧山田久欲坼山田久欲坼秋至尚求雨婦女喜秋涼踏車多笑語朔雲卷衆水慘淡吹平楚橫陂與直塹疑即沒洲渚霍霍反照中散絲魚幾縷木蘭行磨刀霍霍向猪羊韋應物詩昨别今已春散絲魚幾縷鴻䝉不可問且往知何許欹眠露下舸側見星月吐龍骨已嘔啞田家真作苦聖賢何常施聖賢何常施所遇有伸屈曲士守一隅欲以齊萬物聖人不凝滯於物而能與世推移曲士拘拘不足語此莊子可用於天下不足以用天下此之謂辨士一曲之人也喪非不欲富言為南宫出世無子有子誰能救其失喪謂仕而失位非死喪之喪也檀弓上南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子游之言告有子有子曰然吾固曰是非夫子之言也散髮一扁舟散髮一扁舟夜長眠屢起秋水瀉明河迢迢藕花底愛此露的皪復憐雲綺靡諒無與弦歌幽獨亦可喜許彥周詩話云荆公愛看水中影此亦性所好如秋水瀉明河迢迢藕花底又桃花詩晴溝漲春緑周遭俯視紅影移漁舠皆觀其影也道人北山來道人北山來問松我東岡舉手指屋脊云今如此長我字别本作栽此俗人誤改公在政府與沈道原書曰上聰明日躋然流俗險膚未有已時亦安能久自困苦於此北山松柏聞修雅說已極長茂一兩日令俞遜往北山因欲漸治垣屋矣開田故嵗收種果今年嘗告叟去復來耘耝尚康强死狐正首丘遊子思故鄉嗟我行老矣墳墓安可忘檀弓古人有言曰狐死正丘首仁也今日非昨日今日非昨日昨日已可思明日異今日如何能勿悲當門五六樹上有蟬鳴枝朝聽尚壯急暮聞已衰遲仰看青青葉亦復少華滋萬物同一氣固知當爾為我友南山居笑談解人頤分我秋柏實問言歸何時衣冠汚窮塵苟得猶苦飢低回嵗已晚恐負平生期楞嚴經云豈惟年變亦兼月化何直月化兼又日遷匡衡傳匡說詩解人頤注使人笑不能止秋日不可見秋日不可見林端但餘黃黃謂黃落也杖藜思平野俯仰畏無光栗栗澗谷風吹我衣與裳娟娟空山月照我冠上霜遂如哽絶人以為未盡未悟已多騏驥在霜野騏驥在霜野低回向衰草入櫪聞秋風悲鳴思長道黃金作鞭轡粲粲空外好人生貴得意不必恨枯槁悲哉孔子沒悲哉孔子沒千嵗無麒麟蚩蚩盡鉏商此物誰能珍哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之漢武得一角燔烹誣鬼神更以黃金鑄傳誇後世人嘉祐三年交趾貢異獸二其國自稱為麒麟或疑為非麟或疑為山犀或疑為豹牛及回詔但稱得異獸今詩未知指此事否味公之意疑其因以託興謂世之識真者鮮耳漢郊祀志武帝元狩元年郊雍獲一角獸若麃然有司曰陛下肅祇郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎此謂燔烹誣鬼神也本紀直作獲白麟書大始二年又詔更鑄黃金為麟趾裊蹄以協瑞秋庭午吏散秋庭午吏散豫亦歸息偃豈無佳賓客欲往心獨懶北窗古人篇一讀三四反悲哉不早計失道行晼晚秋日在梧桐秋日在梧桐轉隂如急轂冥冥蔽中庭下視今可曝日如車行之速也向苦桐隂之繁今則疏而可暴矣髙蟬不復嘒稍得寒鴉宿百繞有衰翁行歌待春緑我欲往滄海我欲往滄海客來自河源手探囊中膠救此千載渾抱朴子寸膠不能理黃河之濁我語客徒爾當還治崑崙河出崑崙此正本澄源之意謂不當徒治其末歎息謝不能相看涕翻盆客止我且往濯髮扶桑根春風吹我舟萬里空目存前日石上松前日石上松斸移沙水際青青折叉股俯映幽人砌蟠根今鬯茂落子還蒼翠三年一楮葉世事真期費列子說符篇宋人有為其君以玉為楮葉三年而成鋒殺莖柯毫芒繁澤亂之楮葉中不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧莊子劵外者志乎期費日出堂上飲日出堂上飲日西未云休主人笑而歌客子歎以愀指此堂上柱始生在巖幽雨露飽所滋凌雲亦千秋所託願永久何言值君收乃令卑濕地百蟻上窮鎪丹青空外好鎮壓已堪憂為君重去之不使一蟻留蟻力雖云小能生萬蚍蜉爾雅蚍蜉大蟻小釋曰蟻通名也其大者别名蚍蜉此詩意有所比喻而其詞甚微又能髙其礎不爾繼者稠語客且勿然百年等浮漚為客當酌酒何豫主人謀此詩主以喻君客以喻臣堂以喻君柱以喻臣堂上主人居安而忘危為客者視其蠧壞已甚將有鎮壓之憂為主人圖所以弭患此而不忘君卷卷之義更張之念疑始於此又公弟平甫有詩亦云堂上有遺羶堂下無聚蟻但知嗜欲求不必風雨至浸淫蚍蜉生穴柱從此始莊生亦知言信矣常棄智王荆公詩注卷十一
