body:
  text: 王荆公詩注卷二十八宋李壁撰律詩讀眉山集愛其雪詩能用韻復次韻一首靚粧嚴飾曜金鴉比興難工漫百車水種所傳清有骨天機能織皎非花嬋娟一色明千里綽約無心熟萬家長此賞懷甘獨卧袁安交㦸豈須義上林賦靚粧刻飾退之詩金鴉忽騰翥六合俄清新謂白也馮衍傳詞語百車水種未詳爾雅釋名雪綏也水下遇寒而凝綏綏然下也觀此則雪本水為之織女天孫也詩大東雖則七襄不成報章注云織女有織名爾天機能織殆取此義晉天文志南斗六星一曰天機謝莊月賦美人邁兮音塵絶隔千里兮共明月又柔祗雪凝圓靈水鏡即千里一色之意莊子藐姑射之山有神人居焉肌膚若氷雪綽約若處子又云其神凝使物不疵癘而年榖熟注神人者即今聖人也賈誼治安策長此安窮汝南先賢傳曰時大雪丈餘洛陽令出按行見人家皆除雪出有乞食者至袁安門無行跡謂安巳死令人除雪入户見安僵卧問何以不出安曰大雪人皆餓不宜千人令以為賢舉為孝亷後為司徒世說曰舊制三公領兵入見皆交㦸義頸而前初曹公將討張繡入覲天子時始復此制公自是不敢朝見八功德水雪山馬口出琉璃聞說諸天與護持此水遙連八功德供人真淨四威儀當時迦葉無塵染何事閿鄉有土思道力起緣非一路但知瓢飲是生疑奬法師西國傳云阿那婆答多池在香山之南大雪山之北周八百里金銀琉璃飾其岸焉大地菩薩以願力故化為龍王於中潛宅出清泠水屬贍部洲是以池東面銀牛口流出殑伽河繞池一匝入東南海池南面金象口流出信度河繞池一匝入西南海池西面琉璃馬口出縛篘河入西北海阿彌陀經極樂國土有七寶池八功德水充滿其中長阿含起世經云大海初廣八萬四千由旬有八功德水順正理論注云一甘二冷三耎四輕五清淨六不臭七飲時不損喉八飲巳不傷腹又稱讃淨土經云水有八功德一澄清二清冷三甘美四輕軟五潤澤六安和七飲時除飢渴八飲巳長養諸根四大增益種種勝喜多福有情常樂受用楞嚴經第七卷十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來㑹中推為大法王子行住坐卧佛謂之四威儀迦葉觀於法塵念念生滅無實自性惟是空寂又云盡七染分人以觀智一空塵法法塵既空妙法頓顯閿鄉屬河東安邑閿望雲切唐書曰僧萬迥閿鄉人也詼諧如狂發言屢中其兄戍邊五載母思之萬迥年幼請詣兄所策竹馬去經旬而返白母曰兄還矣請辦餅更往迎之數日持襆至母發襆乃戍子衣也尋而子至母大驚前漢西域傳公主年老有土思長安講僧問五祖云真性緣起其義云何祖默然𤣥挺禪師侍立次乃謂曰大德正興一念問時是真性中緣起僧言下大悟寄題程公闢物華樓千里名城楚上游江山多在物華樓遙知玉節臨樽俎獨卧柴門隔獻酬想有新詩傳素壁怪無餘墨到滄洲偶陪一作湡涪南望重重緑章水還能向此流史記項羽曰古之帝者地方千里必居上游知玉一作瞻旌此公闢為江西轉運時故有玉節之語物華樓在其臺治門隔一作荆阻章水即南江酬俞秀老灑掃東庵置一牀於君獨覺故情長有言未必輸摩詰無法何曾泥飲光天壤此身知共弊江湖他日要相忘猶貪半偈歸思索却恐提桓妄揣量公集有答秀老書歲盡當營理報寧菴舍以佇游愒東菴即報寧維摩經第八卷如是諸菩薩各各說已問文殊師利何等是菩薩入不二法門文殊曰如我意者於一切法無言無說無示無識無諸問答是為入不二法門於是文殊問維摩詰我等各自說已仁者當說何等是菩薩入不二法門時維摩詰默然無言文殊歎曰善哉善哉乃至無有文字語言是真入不二法門詩意蓋謂有言不必便輸摩詰之一默按伽葉為第一祖嘗於久逺劫中將金詣金師飾佛面後生中天摩竭陀國婆羅門家名曰伽葉波此云飲法光勝尊蓋以金色為號飲光付阿難偈云法法本來無法無非法何於一法中有法有不法第二祖為阿難魯仲連傳是業與三王爭流而名與天壤相弊莊子魚相忘於江湖人相忘於道術緣起經雪山童子為半偈而捨身偈云諸法從緣生緣離法即滅我師大沙門常作如是說提桓即帝釋也帝釋與佛地位自逺次韻吳冲卿聽讀詩義感事韻公自注云冲卿詩云雪銷鳷鵲御溝融燕見殊恩綴上公畫日乍驚三接寵正風獲聽二南終解頤共仰天顔喜墻面才容聖域通午漏漸長知禹惜侍臣何術補堯聰時修撰經義所初進二南有㫖資政殿進讀周南麟趾聖人風未有騶虞繫召公雅頌兼陳為四始笙歌合奏以三終討論詔使成書上休浣恩容著籍通墻面豈能知奧義延陵聽賞自為聰史記關雎為風始鹿鳴為小雅始文王為大雅始清廟為頌始鄉飲酒問歌三終合樂三終儀禮燕禮篇升歌鹿鳴下管新宫笙入三成注新宫小雅逸篇管之入三成謂三終也漢律五日一沐注漢律吏得五日一下言休息以洗沐著籍見送西京簽判王著作注延陵謂冲卿用季札觀樂事張侍郎示東府新居詩因而和酬二首熙寧中創建尚書省於內城之西特為宏壯合屋三千一百餘間團練使宋用臣董役初議建省有司具圖數不用神宗自為圖授之既成臨幸詔輒易一窗一户者坐違制之罪又建東西府以居宰執與右掖門相對每府四位俗號八位初成術者言有天子氣神宗駕幸以厭之王荆公謝入府第表親紆衡蓋周視庭除及此詩曾留上主經過迹是也得賢方慕北山萊赤白中天二府開功謝蕭規慙漢第恩從隗始詫燕臺曾留上主經過迹更費髙人賦詠才自古落成須善頌掃除東閣待公來韓詩策馬上橋朝日出樓闕赤白正崔嵬詩南山有臺北山有萊箋云山之有草木以自覆蓋成其髙大喻人君有賢臣以自尊顯揚子淵騫篇或問蕭曹曰蕭也規曹也隨又蕭何傳何買田地必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪又吳曾漫録荆公用蕭何事乃漢嘗賜蕭何等北闕大第今二府成乃切題若以蕭何功第一則次第之第非第宅之第也或又牽强云借第以對臺唐人有此格此蓋不知漢嘗賜第事故作此語耳所恨未知正出處唐李郢奉陪裴相公重陽日遊安樂池亭詩云絳霄輕靄翊三台嵇阮襟情管樂才蓮沼昔為王儉府菊籬今作孟嘉臺寧知北闕元勳在却引東山舊客來自笑吐茵還酩酊日斜空從絳衣回郢於第五句注云漢賜蕭何等北闕大第以郢猶能知之孰謂荆公捨此而反舉第一之事為對耶况荆公上曾魯公詩云且開京洛蕭何第未泛江湖范蠡船以此證之則非用第一之第明矣郭隗謂燕昭曰帝者與師處王者與友處霸者與臣處亡國與役處王誠博選國中之賢而朝其門天下之士聞王朝其賢臣必趨於燕矣昭王曰將誰朝而可郭隗曰今王誠能致士先從隗始隗且見之事况賢於隗者豈逺千里哉於是昭王為隗築宫而師樂毅自魏往鄒衍自齊往劇辛自趙往西清詩話云熙寧初張掞以二府初成作詩賀荆公公和之以示陸農師曰蕭規曹隨髙帝論功皆托故實而請從隗始初無恩字荆公笑曰子善問也韓退之闢雞聨句感恩從隗始若無據豈當對功字也復齊漫録云前輩以荆公詩燕臺為失蓋史記云為隗改築宫而師事之然太白詩云何人為築黃金臺則承襲之誤其來久矣左昭七年楚子成章華之臺願與諸侯落之檀弓下晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉云云君子謂之善頌善禱公孫𢎞起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議師古曰閣者小門也東鄉開之當庭門而引賔客以别於掾史官屬也其二榮觀流傳動草萊中官賜設上尊開鼓歌䆗篠聽疑夢肴果聨翩餽有臺斧藻故應宜舊德棟梁非復稱凡材虛堂欲踵曹參事試問齊人或肯來唐元稹有謝賜設狀推食之賜用勸勳勞置醴之恩以待賢彥禮記黃目欎氣之上尊也又漢平當傳賜上尊酒如淳曰律稻米一㪷得酒一㪷為上尊稷米一㪷得酒一㪷為中尊粟米一㪷得酒一㪷為下尊師古曰酒自有澆醇之異為上中下耳靈光賦洞房叫窱而幽邃注叫窱逺也孟子自是臺無餽也三公之服有斧藻黼若斧形藻草有文者凡才公自喻言不稱棟梁之用曹參為齊相避正堂蓋公舍蓋公齊人虛猶言避也國朝未建東西府前執政皆僦宅以居有功并眷厚者皆賜官宅熙寧中因一日急速文字不時進入詰之乃以執政居第散處四隅轉達稽留神宗始有意建東西府遣中官度闕前舊八作司地為之既成車駕因過周視命刻擇官選時日宣執政遷入借官車輦仍賜御筵致仕張侍郎掞有賀兩府入東西府詩曰五仙同日集蓬萊玉宇珠簾次第開乍向壺中窺日月猶疑海上見樓臺光生金鉉調元地榮極璿摳命世才共荷聖賢天地寵定知霖雨及時來掞亦公所厚故和其詩東西府凡八位其制度髙下大小間架皆一其後所居或東或西先拜者先占不分官序也初入借官車般遂為定制下府司差自建二府終神廟朝執政無賜第者上元從駕至集禧觀次冲卿韻介甫仁宗時以工部郎中知制誥嘉祐七年也次年仁宗升遐作此詩已拜相冲卿時為樞密使昭陵持槖從遊人更見熙寧第四春寶構中開移玉座華燈錯出映朱塵樓前時看新歌舞仗外還如舊徼巡投老逢時追往事却含愁思度天津持槖見趙充國傳杜詩苔移玉座春映朱塵一作映垂紳招魂經堂入奧朱塵筵些注承塵也蘭膏明燭華燈錯些漢百官表中尉秦官掌徼巡京師師古注徼繞也趙王彭祖傳常夜從走卒行徼謂巡察次韻陪駕觀燈繡筤含風下玉除宫商挾奏斐然殊福祥周室流為火恩澤堯樽散在衢伏枕但能知廣樂揮毫何以報明珠願留巾篋歸田日追詠公歡每自娛沈存中筆談云正衙法座香木為之加金飾四足墮角其前小偃織藤冒之每車駕出幸則使老內臣馬上抱之謂之駕頭車後曲蓋謂之筤兩扇夾之通謂之扇筤皆遍繡亦有銷金者即古之華蓋前􅗛禮樂志樂歌九歌畢奏斐然殊鳴琴竽瑟㑹軒宋史記周紀武王渡河中流白魚躍入王舟中武王俯取以祭既渡有火自上復於下至於王屋流為烏其色赤其聲魄云杜審言詩堯樽隨步輦舜樂繞行麾杜詩衢樽不重飲淮南子道出一原通九門散六衢注布散於六合之衢也鈞天廣樂用趙簡子疾七日不知人事杜詩云詩成珠玉在揮毫李令伯詩官無中人不如歸田和蔡樞密南都種山藥法公自注云蔡詩并序云䝉見索南都種山藥法并以生頭百十莖送上因成小詩青青正是中分天區種何妨試玉延即見引䰅緣夏木定知如跖薦冬筵注俗傳種時以足按之即如人足潤還御水氷霜結䕃逅堯雲雨露偏自裹自題還自愧揠苗應笑宋人然區種拋來六七年春風條蔓想宛延難追老圃莓苔徑空對珍盤玳瑁筵嘉種忽傳河右壤靈苗更長闕西偏故畦穿斸知何日南望鍾山一慨然後漢劉般傳顯宗時以郡國牛疫通使區種增耕注引泛勝之書曰上農區田法方深各六寸間去七寸一畝三千七百區丁男女種十畝至秋收區三升粟得百斛中農下農區田各有法又嵇叔夜養生論亦有區種字本草云薯蕷處處有之春生苗蔓延離披秦楚謂之玉延李白秋太原南柵餞别序幸叨玳瑁之筵敢竭麒麟之筆又元微之詩水精簾外教貴殯玳瑁筵心伴中要公此詩八句而六句懷故園所謂其於仕也有去志而無留心者耶詩生民誕降嘉種維秬維秠蔡挺嘗為平涼此言河右必平涼種隱十一年公孫獲處許西偏和蔡副樞賀平戎慶捷城郭名王據兩垂軍前一日送降旗羌兵自此無傳箭漢甲如今不解纍幕府上功連舊伐朝廷稱慶具新儀國家道泰西戎喙還見詩人詠串夷漢西域傳有城郭諸國名王謂貴種也杜欽傳三垂蠻夷無逆理之節注三垂東南西也五代霍彥威遣使獻兩箭唐明宗賜兩箭以報之夷狄之法起兵令衆以傳箭為令杜詩青海無傳箭唐劉黑闥為突厥所窘自以大箭射却之突厥得箭傳觀以為神齊國語諸侯甲不解纍兵不解翳韜無弓服無矢隱武事行文道注纍所以盛甲也李廣傳禹從洛中以劒斫絶纍師古曰纍索也馮唐傳魏尚上文功幕府一言不相應文吏以法繩之李廣傳莫府省書師古曰幕府者以軍幕為義古字通單用耳軍旅無常居止故以帳幕言之亷頗李牧軍市租皆入幕府此則非因衛青始有其號聨舊伐必指蔡在慶渭時事莊公二十八年晉二五言於獻公曰若使太子主曲沃重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐杜注伐功也綿詩昆夷駾矣維其喙矣駾突也喙困也詩皇矣篇帝遷明德串夷載路和蔡樞密孟夏旦日西府書事宫闕初晴氣象饒寶車攢轂㑹東朝重輪慶自離明發內壤隂隨解澤銷賜篚外廷紛錦繡燕庖中禁續薪樵聨翩入賀知君意咫尺威顔不隔霄蔡挺熙寧五年自滑州召拜樞密副使熙寧六年有司言日食四月朔上為徹膳避殿一夕微雨明日不見日食百官入賀是日有皇子之慶蔡詩云昨夜薰風入舜韶君王未御正衙朝陽輝已得前星助隂沴潛隨夜雨消荆公所和即此詩退之城南聨句隱伏饒氣象杜牧詩晴日登攀好危樓物象饒易離卦重明以麗乎正漢明為太子樂工作歌四章曰日重光星重輝海重潤月重輪隱公二年日有食之榖梁曰吐者外壤食者內壤易雷雨作解續薪樵取繼粟之意僖公九年天威不違顔咫尺顧況詩我欲升天天隔霄和吳相公東府偶成吳時為樞密使承華往歲幸躊躇風月清談接緒餘並轡趂朝今已老連墻得屋喜如初誅茅我夢江臯地澆薤公思洛水渠斂退故應容拙者先營環堵祭牢蔬承華太子宫門名徐勉為吏書與門人夜集虞皓求詹事五官勉正色曰今夕止可談風月不可談及公事江臯謂江寧之居公方葺園屋於鍾山下于鵠題鄰居澆薤憶同渠溝洫志嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃故惡地誠即得水可令畝十石於是為發卒萬人穿渠自徴引洛水至商顔下師古曰臨晉重泉皆馮翊之縣洛即漆沮水徴亦在馮翊冲卿建州人此稱洛水未詳然冲卿之兄育自閩徙新鄭此或指入汴之洛也元豐二年夏命宋用臣導洛通汴以代河渠謂之清汴儒行篇環堵之室韓詩斂退就新懦趍榮悼前猛又四時登牢蔬次韻元厚之慶捷朝廷今日慶成功先以招懷後即戎北地馬牛歸隴砥漢人煙火起湟中投戈更講諸儒藝免胄爭趨上將風文武佐時慚吉甫宣王征伐自膚公公自注云來詩有何人更得通天帶謀合君心只晉公之語書康誥天乃大命文王殪戎殷誕受厥命注天美文王乃大命之殺殷兵左氏招携以禮懷逺以德漢胸奴傳地居北邊隨水草畜牧而轉移其畜之多則馬牛羊地理志隴西郡應劭曰隴坻在其西師古曰隴坻謂隴阪今之隴山坁音丁計又音砥湟水名在鄯州假熲擊當煎羌於湟中大破之大觀上元御製午夜笙歌連海嶠春風燈火過湟中可謂極盛矣未幾而邊陲變作唐陳黯代河湟父老奏臣等故居河湟間世相為訓到今尚傳留漢之冠裳每歲時祭饗則必服之示不忘漢儀亦猶越翼胡蹄有巢嘶之異又唐人河湟詩牧羊驅馬雖戎服白髮丹心盡漢臣公所指漢人謂此也其後復􅙉鄯皆公之意此詩己先見之漢光武贊投戈講藝息馬論道成公十六年郤至三遇楚子之卒見楚子必下免胄而趨風注言疾如風今言趨上將風則不用注義末聨歸美神廟六月詩薄伐玁狁以奏膚公注奏為膚大公功也又文武吉甫萬邦為憲謁曾魯公曾公亮嘉祐元年冬自翰苑拜參知政事乂更英宗神宗兩朝為相故詩云翊戴三朝又熙寧三年加侍中故云冕有蟬曽既致仕上遣使存問無虛月每歲首執政就第置酒賦詩以為故事此詩云即席賦必就第置酒時也曾之子孝寬已為簽樞故用韋賢事曾時年八十故云鄰吕尚方公得政曾實隂為之助上以此益尊任公故公深德曽特推尊之而沮抑韓公等翊戴三朝冕有蟬歸榮今作地行仙且開京洛蕭何第未泛江湖范蠡船老景已鄰周吕尚慶門方似漢韋賢一觴豈足為公夀願賦長鯨吸百川楞嚴經仙人有八種一服餌堅固地行仙塗藥飛行仙金石游行仙動止堅固通行仙咒禁道行仙思念照行仙交通行仙變化絶行仙此皆有神通曾京師有賜第蕭何第見前注史記范蠡既雪㑹稽之耻乃乘扁舟浮於江湖變名適齊為鴟夷子皮之陶為朱公吕尚周太公望韋𤣥成賢之子父子仍世為宰相杜詩飲如長鯨吸百川駕自啓聖還內衣冠原廟漢家儀羽衛親來此一時天子當懷霜露感都人亦歎鼓簫悲紛紛瑞氣隨雲漢漠漠榮光上日旗塵土未驚閶闔閉緑槐空覆影參差叔孫通傳願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本師古曰原重也先已有廟今更立之故曰重也禮記祭義秋霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之注謂悽愴及怵惕皆為感時念親鼓簫之聲悲亦言其異於平日耳王維詩簫鼓悲何己江淹上建平王景素書曰方今聖厯欽明天下樂業青雲浮洛榮光塞河李善注曰尚書中候曰成王觀於洛河沉璧禮畢王退俟於日昧榮光並出幕河杜審言詩榮光晴掩代佳氣晚侵燕周禮司常掌九旗之物名日月為常釋名曰畫日月於旗端天子所建左傳三辰旗旗注云日月星也穆天子傳日月之旗七星之文王維登樓歌俯十二兮通衢緑槐參差兮車馬集禧觀池上詠野鵝野鵝疑雁類也池上野鵝無數好晴天鏡裏雪毰毸似憐暄暖鳴相逐疑戀寬閒去却回京洛塵沙工㸃汚江湖矰弋飽驚猜羽毛的的人難近嗟此謀身或有才張文昌詩曲沼春流滿新蒲映野鵝類篇云毰毸鳥羽張貌韓文猶將耕於寬閒之野陸士衡詩京洛多風塵杜詩銜泥㸃汚琴書內李白詩長逢矰繳驚相呼小杜詩君意如鴻髙的的和東㕔韓子華侍郎齊居晚興齊禁雖嚴異太常蕭然髙詠意何長煙含欲暝宫庭紫日映新秋省闥黃壯節易摧行踽踽華年相背去堂堂追攀坐歎風塵隔空聽鈞天夢帝鄉後漢周澤傳為太常清潔循行盡敬宗廟常卧齊宫其妻哀澤老病窺問所苦澤大怒以妻干犯齊禁遂收送詔獄請罪時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥張平子西京賦正紫宫於未央西京雜記成帝設雲帳雲幄雲幕於甘泉紫殿杜牧詩祥雲輝映漢宫紫王勃記煙光凝而暮山紫亦疑曛暮則宫殿之氣仰看如紫後漢輿服志曰黃闥天子門中官主之以黃塗門如青鎖之用青也壯節易摧謂壯節消􅀈不免同乎流俗踽踽凉凉如鄉原之類然公豈真爾哉唐人詩青春背我堂堂去李義山一絃一柱思華年鈞天事見次韻酬宋玘注酬和父祥源觀醮罷見寄竊祿祠官久見容每持金石薦宸衷鈞天忽忽清都夢方丈寥寥弱水風知結勝緣人意外想尋陳迹馬蹄中新詩起我超然興更感鍾山蕙帳空和甫集無此詩列子穆王篇王以為清都紫微鈞天廣樂帝之所居蓬萊隔弱水三萬里非禹貢弱水也十洲三島記云方丈洲在東海中東西南北其岸止等方丈面濶五千里上專是羣龍所聚者金玉琉璃之宫三天司命所治之處羣仙不欲升天者往來此洲受太上𤣥天籙仙家數十萬瓊田芝草課計頃畝如種稻狀亦有石泉上有九天原丈人宫主領天下水神及隂精水獸之輩子曰起豫者商也始可與言詩巳矣和御製賞花釣魚詩二首國史賜宴在嘉祐六年三月御製詩晴旭暉暉苑籞開氤氲花氣好風來游絲罥絮縈行仗墮蘂飄香入酒杯魚躍文波時撥刺鶯留深樹久徘徊青春朝野方無事故許觀游近侍陪按韓忠獻公集有和御製詩序引云奉聖㫖次韻故介甫詩云恩許賡歌蓋紀實也韓詩云花簇香亭萬朵開雕輿髙自九關來輕隂閣兩留天仗寒色凝春送夀杯仙吹徹雲終縹眇恩魚逢餌幾徘徊曽參二十年前㑹今備台司得再陪公既進詩或言於上曰韓琦譏切陛下上愕然問之對曰琦二十年而得一再侍宴正譏陛下飲宴無度也上大笑時鄭澥詩亦佳輦路鮮雲五色開一聲清蹕下天來水光翠繞九重殿花氣醲熏萬夀杯繡幕煙深紅㑹合文竿風引緑彽徊蓬山絶景無人到詔許羣仙盡日陪䕃幄晴雲拂曉開傳呼仙仗九天來披香殿上留朱輦太液池邊送玉杯宿蘂暖含風浩蕩戲鱗清映日徘徊宸章獨與春爭麗恩許賡歌豈易陪太𤣥經曰九天者一為中天二為羡天三為順天四為更天五為晬天六為廓天七為咸天八為况天九為成天廣雅及吕氏春秋各有九天與此不同杜詩仙仗離丹極披香見暮春注漢志建章北有大池名太液昭帝紀黃鵠下建章太液池是也西清詩話云仁廟嘉祐中開賞花釣魚燕介甫以知制誥預末坐帝出詩羣臣次第屬和傳至介甫日將夕矣亟欲奏御得披香殿字未有對時鄭毅夫獬接席顧介甫曰宜對太液池翌日都下盛傳王舍人竊柳詞太液波翻披香簾捲介甫頗銜之復齊漫録云余讀上官儀初春詩步輦出披香清歌臨太液乃知荆公取儀詩豈謂柳詞耶庾信春詩宜春苑中春己歸披香殿裏作春衣長安有宜春宫此又以宜春對披香矣李白詩繡户香風暖杜詩魚跳白映山蘇魏公語録中云仁宗賞花釣魚宴賜詩執政諸公洎禁從館閣皆屬和而徘徊二字無他義諸公進和篇皆押徘徊再坐教坊雜戲為數人尋訪稅第至一宅入觀之至前堂之後問所以曰徘徊又至後堂東西序亦問之皆曰徘徊也一人笑曰可則可矣徘徊太多賡歌見尚書其二靄靄祥雲輦路晴傳呼萬歲雜春聲蔽虧玉仗宫花密映燭金溝御水清珠蘂受風天下暖錦鱗吹浪日邊明從容樂飲真榮遇願賦嘉魚頌太平漢武紀元封元年詔曰朕親登嵩髙御史乘屬在廟傍吏卒咸聞呼萬歲者三王建宫詞日髙殿裏有香煙萬歲聲來動九天溫飛卿雞鳴人草草香輦出宫花後漢宦者傳云盜取御水以作魚釣注水入宫苑為御水王建宫詞御波水色春來好處處分流白玉渠杜牧之亦以宫掄對御水見下注杜詩吹面受和風易天下有山遁杜詩魚吹細浪搖歌扇詩小雅南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也王荆公詩注卷二十八
