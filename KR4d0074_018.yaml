  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0074_WYG_018-1a, image: WYG1106/WYG1106-0123a.png}
body:
  text: 王荆公詩注卷十八宋李壁撰古詩到郡與同官飲瀉碧沄沄橫帶郭浮蒼靄靄遙連閣唐詩江聲五千里瀉碧急於弦浮蒼謂山色草木猶疑夏鬱蔥風雲巳見秋蕭索荒歌野舞同醉醒水果山肴自酬酢自嫌多病少歡顔獨負佳賓此時樂自州追送朱氏女弟宿木瘤僧舍明日度長安嶺至皖口晨霜踐河梁落日憩亭臯念彼千里行惻惻我心勞攬轡上層岡下臨百仞濠寒流咽欲絶魚鱉久巳逃暮行苦邅回細路隱蓬蒿驚麏出馬前獸駭亡其曹淮南王招隱詞禽獸駭兮亡其曹投僧避夜雨古檠昏無膏山木鳴四壁疑身在波濤韓詩夜風一何喧杉檜屢磨颭猶疑在波濤怵惕夢成魘平明長安嶺飛雪忽滿袍天低浮雲深更覺所向髙招同官遊東園青青石上柏霜至亦已凋柏字誤一作蘖冉冉水中蒲爾生信無聊感此嵗云晚欲歡念誰邀嘉我二三子為回東城鑣幽菊尚可泛取魚繫榆條毋為百年憂一日以逍遙石鼓文其魚維何維鱮與鯉何以貫之維楊與栁公詩妙處在使事而不覺使事也九日隨家人遊東山暑往詎幾時涼歸亦云暫相隨東山樂及此身無憾聊回清池柂更伏荒城檻采采黃金花持杯為君泛秋懷城南平野寒多露窗壁含風秋氣度鄰桑摵摵已欲空詩桑之落矣韓公荷池詩云未諳鳴摵摵悲蟲啾啾促機杼悲蟲絡緯也絡緯鳴懶婦驚柴關半掩掃鳥迹獨抱殘編與神遇韓公既去豈能追孟子有來還不拒漢紀夢與神遇此借用韓文籍湜雖屢指教烏保其不叛去然二子初未嘗叛公又東都遇春詩既去焉能追有來猶莫聘既别羊王二君與同官會飲於城南因成一篇追寄赤車使者白頭翁當歸入見天門東赤車使者圖經云根紫如蒨根生荆州襄州山谷白頭翁葉似芍藥而大每莖一花紫色似大堇與山久别悲忩忩澤瀉半天河漢空本草蔥有數種半天河按藥性論此竹籬頭水及髙樹穴中盛天雨能殺鬼精恍惚妄語勿令知之與飲差羊王不留行薄晚酒肉從容追路遠王不留行生泰山山谷臨流黃昏席未卷玉壺倒盡黃金盞黃金盞即忍冬草也羅列當辭更繾綣預知子不空青眼嚴徐長卿誤推挽老年揮翰天子苑列當按圖經生山南巖石上如藕根徐長卿圖經生泰山山谷及隴西三月生苖葉似小桑子苑即紫苑送車陸續隨子返坐聽城雞腸宛轉續隨子圖經生蜀郡今南中多有北土差少如大戟雞腸草圖經葉似荇菜而小夏秋間生小白黃花今南中多有之蘩蔞亦名雞腸草當歸澤瀉肉蓯蓉硫黃預知子並藥名試茗泉得月字此泉在撫州之金溪翠雲院石本尚存詩序云治平丁未臨川王公自江寧召還翰林金溪吳顯道追送至撫州因語及金溪令君政事餘暇多得山水之樂近以五題求詩於人乃定韻各賦一詩獨王公為二仍使其子同賦此泉詩與躍馬泉詩是也雱所賦乃翠雲院詩亦佳此泉地何偏陸羽曽未閲坻沙光散射竇乳甘潛泄陸羽本傳但言羽嗜茶著茶經三篇而巳然茶經所論水甚詳以山水為上江次之井為下山水乳泉石池漫流者為上浮槎之水猶不録況此泉乎靈山不可見嘉草何由啜但有夢中人相隨掬明月靈山嘉草句公未嘗至泉傍故云爾躍馬泉古水縮蛟螭憎山欲隳突山祇來伐之半嶺跳齧膝言蛟螭隳山廣其穴山神禁之齧膝良馬也玉珂鳴寒空組練光照日左襄公三年注組甲漆甲成組文被練練袍崩騰赴不測一陷常萬匹神戰異人間千秋為倏忽泉旁往來客夜寄幽人室但聽鳴蕭蕭何由見神物白紵山在當塗縣東桓溫領妓遊山奏樂好為白紵歌故名白紵山白紵衆山頂江湖所縈帶浮雲卷晴明可見九州外肩輿上寒空置酒故人會峯巒張錦繡草木吹竽籟登臨信地險俯仰知天大留歡薄日晚起視飛鳥背栁子厚山水記穴臨大野飛鳥皆視其背殘年苦局束往事嗟摧壞歌舞不可求桓公井空在宋武亦嘗會羣臣此山歌白紵桓公所鑿井在南城七星硯余聞星墮地往往化為石左傳隕石於宋五隕星也石上有七星此理余莫測持來當白日光彩不為匿恍如超鴻蒙俯仰帝垣側鴻蒙自然元氣也斗居帝垣之側故云超鴻蒙當由偶然似見取參筆墨豪心蕩珍異樂以萬金得南工始為偽傅合巧無隙亦時疑世人故自有能識硯有偽為眼者九鼎本朝先儒嘗言左傳載鑄鼎事後之人得以藉口者此爾然使如丘明之説不誣亦不過象物之形百物而為之備使民知神姦而已後之人至用方士厭勝祈禳之法此何所據丘明云成王定鼎於郟鄏卜世卜年天所命也然而洛誥周公所作當時所為無不載者若鼎之為物乃社稷重器而莫之載者何也鼎鑄於夏時夏之法制莫詳於禹貢之書豈有九牧貢金成此重器欲以協上下承天休而禹貢曾無一語及之乎易六十四卦其在鼎也取象為備如丘明之説略無毫髮相類而況於後之紛紛者乎故凡事無徴者皆不可為也禹行掘山走百谷蛟龍竄藏魑魅伏心志幽妖尚覬隙以金鑄鼎空九牧宣四年昔夏之方有德也貢金九牧鑄鼎象物百物為之備使民知神姦故民入川澤山林不逢不若魑魅罔兩莫能逢之此言覬隙者恐其窺伺間隙復出為惡也冶雲赤天漲為黑鞴風餘吹山拔木漢書朱旗絳天言冶所蒸氣天盡赤又漲起而黑也鞴所鼓為風餘力可以拔木二句竒甚鼎成聚觀變怪索夜人行歌鬼晝哭功施元元後無極三姓衛守相傳屬弱周無人有宜出沉之九幽折地軸始皇區區求不得坐令神姦窺邑屋自禹鑄鼎傳至商周為三姓也周末太丘社亡鼎沒於泗水彭城下始皇二十八年過彭城齋戒禱祠欲出周鼎使千人沒水求之不得九井得盈字九井在當塗殷仲文詩有桓公南州九井沿崖涉澗三十里髙下犖確無人耕捫蘿挽蔦到巖趾仰見吹瀉何峥嶸餘聲投林欲風雨末勢捲土猶溪坑吹瀉諸本皆作征雁絶無義理餘聲二句皆狀山泉淙激奔怒之勢飛蟲凌兢走獸駭霜雪夏落雷冬鳴蟲兢獸駭言瀑流蕩潏其傍蟲獸怖恐野人往往見神物鱗甲漠漠雲隨行崔煒遊番禺墮枯井跨蛇而出去不由穴口但如於洞中行幽暗若漆蛇之鱗甲光燭兩壁時見繪畫我來立久無所得空數石上菖蒲生中官繫龍投玉册小吏磔狗澆銀觥地形偶爾藏險怪天意未必司隂晴山川在理有崩竭丘壑自古相虛盈誰能保此千秋後天柱不折泉常傾左氏山崩川竭莊子胠篋篇夫川竭而谷虛丘夷而淵實言陵谷變遷不可知也列子湯問篇共工氏與顓頊爭為帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉章子厚嘗謂客曰延安帥章質夫曰版築發地得大竹根半已變石西邊自昔無竹亦一異也客皆無語邵伯溫云天地回南作北多矣公以今日之延安為自天地以來西邊乎子厚太息曰公觀物之學也蓋子厚亦嘗學於康節云寄題衆樂亭陵陽遊觀吾所好恨不即過衆樂亭嘗聞髣佛入夢寐吟筆自欲圖丹青千峯秀出百里外忽於其上峥簷楹朝雲噓巖日暖暖夜水落澗風泠泠春花窈窕鳥爭舞夏木蔭鬱猿哀鳴潦收葉落天地爽海月影到山川明籃輿晨出誰與適坐與萬物觀虛盈令思民事不忍後田間笑語催蠶耕吏休歸舍獄訟少墟落飲酒歡秋成惟愁一日奪令去出郭老稚交逢迎彼安知此方祿仕徒喜使我寬逋征令知道義士林服遺愛豈用吾詩評書會别亭西城路居人送客西歸處年年借問去何時今日扁舟從此去春風吹花落髙枝飛來飛去不自知路上行人亦如此應有重來此處時劉希夷詩洛陽城東花飛來飛去落誰家劉長卿詩新安路人來去一首此詩頗類之題舒州山谷寺石牛洞泉穴一作留題三祖山谷寺石壁公自注云皇祐三年九月十六日自州之太湖過懷寧縣山谷乾元寺宿與道人文鋭弟安國擁火遊石牛洞見李翺習之書聽泉久之明日復遊乃刻習之後水泠泠而北出山靡靡以旁圍欲窮源而不得竟悵望以空歸據朝無咎以此篇入續楚詞朝云蓋公在江南時所書野壁辭凡二十四言世以謂具六藝羣書之遺味故與其經學典䇿之文俱傳焉髙齋詩話荆公嘗題詩云云後人鑿山刋木寖失山水之勝非公題詩時比也魯直效公題六言司命無心播物祖師有記傳衣白雲橫而不度髙鳥倦而猶飛識者云語雖竒不及荆公自然會稽土地志曰山靡靡迤而長王荆公詩注卷十八
