body:
  text: 王荆公詩注巻三十六宋李壁撰律詩送劉貢父赴秦州清水貢父名攽嘉祐末召為國子直講治平末趙槩薦攽可充文館作邑清水當在此前劉郎髙論坐噓枯幕府調胹用緒餘後漢鄭泰謂董卓曰孔公緒清談髙論噓枯吹生莊子語心之容命之以心之行以聏合驩以調海内注強以其道胹令合調令和也聏崔本作胹音而和也調也筆下能當萬人敵腹中嘗記五車書韓詩博哉羣聖文磊落載其腹聞多望士登天禄知有名臣薦子虛天禄闇藏典籍之所漢宫殿疏云天禄麟閣蕭何造以藏秘書處賢才子虛見寳應進士乞詩注且復弦歌窮塞上秪應非晩召相如送純甫如江南青溪看汝始蹁躚兄弟追隨各少年壯爾有行今納婦老吾無用亦求田撫州城下江亦名青溪詩恐指建康青溪詩女子有行箋云行道也純甫娶段氏封德安縣君初來淮北心常折却望江南眼更穿杜詩心折大刀頭退之詩眼穿長訝雙魚斷此去還知苦相憶歸時快馬亦須鞭佛書如世良馬見鞭影而行送郊社朱兄除郎東歸手持官牒出神臯迎客遥知賀酒醪照映里門非白屋欺凌春草有青袍齊文宣王行狀神臯載穆轂下以清古詩青袍似春草宦游雖晚何妨久餓顯從來不必髙孝友父兄家法在想能清白遺兒曹漢書久宦減仲之産揚子古者髙餓顯下禄隱注孟子曰伯夷隘栁下惠不恭君子不由也然則餓顯不獨髙禄隱未為下今發髙下之談葢有厲乎素餐今公云不必髙亦注意也送沈康知常州作客蘭陵迹巳陳為傳謡俗記州民溝塍半廢田疇薄廚傳相仍市井貧梁武帝改武進為蘭陵半廢言溝洫之政不修廚傳相仍言為守者徒悦過客不恤民貧也常恐勞人輕白屋忽逢佳士得朱輪漢吾丘夀注傳今三公有司或由窮巷起白屋裂地而封師古曰白屋以白芽覆屋楊惲傳惲家盛時乗朱輪華轂者十人慇懃話此還惆悵最憶荆南兩岸春寰宇記荆溪在宜興縣南二十步漢志云中江首受蕪湖東至陽羨入海即此溪安豐張令修芍陂安豐舊属夀州令為軍芍音鵲桐鄉振廩得周旋芍水修陂道路傳目想僝功追往事心知為政似當年九域志舒州有桐城縣圖經云桐城春秋時桐國也又廬江舒縣有桐鄉公每言桐鄉非但用朱邑事亦言楚實文公十六年振廩同食魴魚鱍鱍歸城市秔稻紛紛載酒船楚相祠堂仍好在勝㳺思為子留篇秔稻紛紛載酒船謂以稻易酒也芍陂孫叔敖所作叔敖嘗為楚相今有祠在陂上許渾詩海嶠獨留篇送復之屯田赴成都盤礴西南江與岷石犀金馬世稱神蜀都水灾乃刻石犀沉江浦或言益州有金馬碧雞之祥可醮祭而致又見王褒傳桑麻接軫餘無地錦繡連城别有春結綬相隨通籍久推車此去辟書新謝𤣥暉詩既通金閨籍張銑注云謂懸名於門乃通出入所謂禁門也漢元帝紀得大父母兄弟通籍應劭曰籍者為二尺竹牒記其年紀名字物色懸之宫門案省相應乃得入又魏相傳霍光夫人顯及諸女皆通籍長信宫師古曰通籍謂禁門之中皆有名籍恣出入也成公二年自始合苟有險予必下推車阮籍上蔣濟記開府之日人人自以為掾属辟書始下而下走為首知君不為山川險便忘吾家叱馭人王尊傳王尊遷益州刺史先是琅琊王陽為益州刺史行部至卭徠九折坂歎曰奉先人遺體奈何數乗此險後以病去及尊為刺史至其坂問曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣送經臣富順寺丞富順在蜀東故人為縣楚江邊海角猶聞政事傳萬井巳安如赤子一麾今去上青天應開醉眼酴醿下莫起歸心杜宇前報主代親俱有地㡬人忠孝似君全祖宗時有入逺法此必代其父入逺送張卿致仕子房籌策漢時功身退超然慕赤松餘烈尚能開後世髙材今復繼前蹤言子房之後猶能不耽溺世榮挂冠而歸由先烈之有開也執鞭始負平生願操几何知此地逢竊食一方慚未艾緒言方賴賜從容史記假令晏子而在余雖為之執鞭所欣慕焉曲禮上謀於長者必操几杖以從之漢書願賜清閒之燕送梅龍圖名摰字公儀成都新繁人天聖五年進士及第此詩當是送作滑州時子真家世子雲鄉風力才華豈易當回首古人多隱約致身今日獨輝光摰生蜀故稱子雲鄉雄仕落拓三世不徙官梅匿為市門卒故云隱約摰嘗為御史知雜省副待制等官仁宗嘗謂大臣曰梅摰言事有體據此可謂輝光矣謨明久合分三府治劇聊須試一方從此政成何所報百城無事秪耕桑漢丞相御史太尉為三府摰至和間自天章閣待制判流内銓進龍圖閣學士知滑州後又為杭江寧河中三郡送李秘校南歸四十青衫更旅人悠悠飢馬傍沙塵言四十始青衫又為旅人久留上國言空富却走南州食轉貧自作詩書能見志應知時命不關身司馬遷傳夫詩書隱約者欲遂其志之異也江湖勝事從今數肯但悲歌寂寞濱送蕭山錢著作蕭山縣属越州才髙諸彦故無嫌兄弟同時舉孝廉東觀外除方墨綬西州相見巳蒼髯漢百官表縣萬户以上為令秩千石至六百石減萬户為長秩五百石至二百石秩比六百石以上皆銅印墨綬比二百石以上者皆銅印黄綬墨綬言作邑蕭山靈胥引水清穿市神禹分山翠入簾好去弦歌聊自慰郡人誰敢慢陶潛世傳伍子胥為波神故云引水韓詩胥怒浪崔嵬司馬遷傳上㑹稽探禹穴揚雄傳注有人從禹穴入從蒼梧出淵明為鎮軍建威參軍謂親朋曰聊欲弦歌以為三徑之資可乎少陵詩他時如按縣不得慢陶潛送靈仙裴太博舒州靈仙觀太博必食祠禄者疑太博即裴煜也一官留隱太常中生事蕭然信所窮有力尚期當世用無求今見古人風後漢周澤再為太常盡敬宗廟時人為之語曰生世不諧作太常妻疑此借用韓退之詩有力未免遭驅使公詩意謂裴雖有當世之志而不苟求也邅迴舊學皆殘藁邂逅相看各老翁他日卜居何處好溪山還欲與君同送趙燮之蜀永康簿蜀山萬里一青袍石棧天梯箠轡髙多學似君寧易得小官於此亦徒勞行追西路聊班草坐憶南州欲夢刀他日寄聲能問我應從錦水至江臯班草見送張甥赴青州幕注夢刀見奉酬聖從待制注酬呉季野見寄謾披陳蠧學經綸捧檄平生秪為親韓詩豈殊蠧書蟲生死文字間捧橄用毛義事聞道不先從事早課功無狀取官頻淵明集總角聞道白首無成漢京房奏考功課吏之法無狀謂無善狀也史記故惠王之明武王之察張儀之辯甘茂事之取十官而无罪豈堪寘足青㝠上終欲回身寂寞濱王儉文𢎞以青㝠之期俯仰謬恩方自歉慙君將比洛陽人公自注云時被召來詩以賈誼見方賈誼傳綘灌馮敬之属短賈生曰洛陽之人年少初學和平甫寄陳正叔强行南仕莫辭勤聞説田園巳曠耘曠耘謂田園將蕪之意縱使一區猶有宅可能三月尚無君揚雄傳有田一㕓有宅一區世以農桑為業且同元亮傾樽酒更與靈均續舊文靈均所賦止有離騷經九歌天問九章逺逰卜居漁父凡七題二十五篇自宋王景差賈誼莊忌淮南以下皆續也此道廢興吾命在世間滕口任云云栁詩滕口任頻頻送王大卿致仕歸江陵九卿初命亞三司朝吏相傳得老師南闕便還新印綬東舟秪載舊書詩按漢之四闕南曰朱雀北曰𤣥武東曰蒼龍西曰白虎然則南闕即朱雀之闕也言王新除便致其仕還猶上還相印之還漢庭餞客無佳句越水歸裝有富貲回首千年見疏范共疑今日勝當時無佳句謂二疏之去餞者供帳東都門外以送不聞有詩富貲謂陶朱公言王之歸舟但載書又有諸人送行詩可謂優於疏廣范蠡軰矣送叔康侍御謂孫叔康也詔取名郎入憲臺此時方急濟時才聖聰應巳虛心待姦黨寧無側目猜白筆豈知權可畏皁囊還請上親開齊輿服志三臺五省官皆簪白筆言糾劾不避權勢漢官儀凡章表皆啓封其言密事得皁囊也王禹偁詩清朝曾貢皁嚢封佇聞讜論能醫國飛報頻隨驛騎來寄朱昌叔清江漫漫遶城流尚憶城邊繫小舟射虎未能隨李廣割雞空欲戲言游杜詩短衣匹馬隨李廣看射猛虎終殘年語割雞焉用牛刀雲霾塞路驚塵合霜入春風滿鬢愁雲以喻塵霜以喻鬢也此日君書苦難得謾多鴻鴈起南洲九日登東山寄昌叔昌叔公女弟之壻城上啼烏破寂寥思君何處坐岧嶤襄公十八年城上有烏唐詩啼烏破幽寂坐岧嶤言登髙也應須緑酒醻黄菊何必紅裙弄紫簫落木雲連秋水渡亂山煙入夕陽橋淵明久負東籬醉猶分低心事折腰到舒州次韻荅平甫夜别江船曉解驂秋城氣象亦潭潭山從樹外青爭出水向沙邊緑半涵資暇録云平甫歸來詩江田百頃春風種山果千株夜雨涵詩語太顯不似公下得涵字好行問嗇夫多不記坐論公瑾少能談朱邑少為桐鄉嗇夫桐鄉属舒周瑜字公瑾廬江舒人秪愁地僻無賓客舊學從誰得指南東都賦幸見指南於吾子李善注引桓譚上便宜曰管仲桓公之指南舒州七月十七日雨行看野氣來方勇卧聽秋聲落竟慳淅瀝未生羅豆水蒼茫空失皖公山九域志舒州有羅豆鎮水當在此輿地志皖公山謂周大夫皖伯之神火耕又見無遺種肉食何妨有厚顔漢武帝詔江南之地火耕水耨應劭曰燒草下水種稻草與稻並生髙七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨巫祝萬端曾不救秪疑天賜雨工閑洞庭靈姻傳吾不知子之牧羊何所用哉神祇豈宰殺乎女曰非羊也雨工也何為雨工曰雷霆之類也毅復視之則皆矯顧拏歩飲齕甚異而大小毛角則无别羊焉次韻荅端州丁元珍莫嗟荒僻又離羣且喜風謡嶺北聞檀弓上子夏曰吾離羣而索居亦巳久矣注離音利此作平聲用銅柱雖然蠻徼接竹符還是漢家分後漢馬援討林邑蠻既至林邑又南行二千餘里有西屠夷鑄二銅柱於象林南界與西屠夷分境以紀漢徳之盛其時以不能還者數十人留於銅柱之下隋宋蕃衍至三百餘家南蠻呼為馬留人杜詩送容州中丞莫教銅柱北空說馬將軍馬揔遷安南都䕶建二銅柱於漢故處鑱著唐徳以明伏波之裔漢文二年初與郡守為銅虎符竹使符師古曰與郡守為符者謂各分其半右留京師左以與之春書來逐衡陽鴈秋騎歸看隴首雲蘇武傳天子射上林中得鴈足有係帛書言武等在某澤中相見㑹知南望苦病骸今似沈休文梁沈約書與徐勉曰開年以來病增慮切當由生靈有限勞役過差緫此凋竭歸之暮年牽䇿行止努力祗事時觀傍覽尚似全人而形骸力用不相綜攝常須過自束持方可僶俛解衣一卧肢體不復相關荅劉季孫季孫字景文世家開封父平任環慶將趙元昊㓂延州以孤軍來援遂力戰罵賊而死景文以䘏典得官少篤學能詩文東坡先生守錢塘景文為左藏庫副使兩浙兵馬都監先生喜其人上章薦其練違武經講習邊政除知隰州先生嘗荅書其略云公每發言如風檣陣馬迅霆激電不意於中復有祥光異彩紆餘緻膩盎盎如陽春淑艷時花美女誠不足比其容色態度此所謂不測之謂神也又跋其詩文曰劉景文有英偉氣如陳元龍之流讀此詩可想見其人以中夀卒于隰哀哉死之日家无一錢但有書三萬軸畫數百幅爾此載曾慥皇宋百家詩選竊疑東坡書中語未必全真也偶著儒冠敢陋今自憐多負少時心儒冠公自言也季孫武爵故云敢陋今秦紀俗儒好是古而非今輊軒巳任人前後揭厲安知世淺深馬援傳居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也詩深則厲淺則揭挾筴有思悲慷慨負薪無力病侵滛挾筴莊子亡羊事愧君緑綺虛投贈更覺貧家乏報金緑綺琴名司馬相如之琴也見梁元帝纂集古詩何以報之雙南金次韻酬王太祝塵土波瀾不自期飄然身與願相違衰根要路身難植病羽長年欲退飛僖公十六年六鷁退飛過宋都髙論巳嗟能聽少力行還恨賦材微慚君俊少今知我一見心如客得歸寄呉成之呉氏介父母家時公母魏國巳亡緑髮溪山笑語中豈知飜手兩成翁辛夷屋角摶香雪躑躅岡頭挽醉紅想見舊山茅逕在追隨今日板輿空板輿見慶老堂注渭陽車馬嗟何及榮禄方當與子同詩渭陽我送舅氏曰至渭陽何以贈之路車乗黄又啜其泣矣何嗟及矣寄曾子固斗粟猶慙報禮輕敢嗟吾道獨難行漢有斗粟佐史小吏也報禮見上注脱身負米將求志勠力乘田豈為名乗田苑囿之吏也釋文作去聲公作平聲用髙論㡬為衰俗廢壯懷難值故人傾游俠傳久孤於世豈卑論儕俗荒城回首山川隔更覺秋風白髮生前詩云漸老偏諳世上情巳知吾事獨難行脱身負米將求志勠力乗田豈為名髙論頗隨衰俗廢壯懷難值故人傾相逢始欲寛愁病搔首還添白髮生至開元僧舍上方次韻舍弟一本作和平甫春日溪谷濺濺嫩水通野田髙下緑蒙茸和風滿樹笙簧雜霽雪兼山粉黛重杜詩小水細通池粉喻雪黛喻山故云兼雪霽山明始見青色故云重公詩無一字苟皆如此類萬里有家歸尚隔一㕓無地去何從傷春政欲西南望回首荒城巳暮鐘一㕓一百畆也寄王回深甫深甫福州侯官人中進士科為亳州衛真縣主簿未一嵗弃去遂終身不復仕有文集二十巻曾南豐為之序云先王之迹息六藝殘缺深甫奮然獨起因先王之遺文以求其意豈非孟子所謂名世者歟少年倐忽不再得後日歡娯能㡬何顧我面顔衰更早憐君身世病還多窗間暗淡月含霧船底飄颻風送波一寸古心俱未試相思中夜起悲歌杜詩可惜歡娯地都非少壯時退之詩孟生江海士古貎又古心又荅孟郊古心雖自鞭世路終難抝次韻荅彦珍手得封題手自開一篇美玉綴玫瑰玫瑰石也又以為珠西京雜記武帝得天馬以玫瑰石為鞍南海俗云虵珠千枚不及一玫瑰言虵珠賤也玫瑰亦珠名衆知圓媚難論報自顧窮愁敢角才君卧南陽惟畎畞我行西路亦風埃呉彦珍公舅家故詩中用羊曇事卧謂龍卧臣本布衣輟耕南陽羊曇行西州路相逢不必嗟勞事尚欲賡歌詠起哉韓詩外傳曰伐木廢朋友之道缺矣勞者歌其事皆思友之詩益稷元首起哉百工熙哉注賡歌載成也寄闕下諸父兄兼示平父兄弟父兄為學衆人知小弟文章亦自奇純父於兄弟最小不聞能文恐只指平甫家世到今宜有後士才如此豈無時曹志傳言齊王攸安有如此之才如此之親不得樹本助化久聞陽羨溪山好頗與淵明性分宜但願一門皆貴仕時將車馬過茆茨韓詩臣有膽與氣不忍死茅茨觀此公豈嘗有卜居陽羨之意乎葢嘗為其州次韻王禹玉平戎慶捷熙河形勢壓西陲不覺連營列漢旗韓信傳信所出竒兵二千騎者候趙空壁逐利即馳入趙壁皆抜趙旗幟立漢赤幟二千天子坐籌星兩兩將軍歸佩印累累漢髙帝紀運籌幃幄之中決勝千里之外吾不如子房唐鄭畋傳還相天子坐籌帷幄終能復國天官書斗魁下六星兩兩相比者名曰三能謂執政也此一句似合君臣而言之石顯傳印何累累綬若若邪稱觴别殿傳新曲銜璧名王按舊儀江漢一篇猶未美周宣方事伐淮夷新曲言獻捷燕賀奏新曲也按舊儀受羗酋降也僖六年許男面縛銜璧潘岳閑居賦髦士投紱名王懷璽注言匈奴單于奉獻來學杜牧之詩吉甫裁詩歌盛業一篇江漢美宣王王荆公詩注巻三十六
