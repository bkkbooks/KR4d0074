body:
  text: 王荆公詩注卷四十二宋李壁撰律詩送黃吉父入京題清涼寺壁薰風洲渚薺花繁看上征鞍立寺門投老難堪與公别倚岡一作江從此望回一作還轅李白詩東風春草緑江上候歸軒送和父至龍安微雨因寄吳氏女子荒煙涼雨助人悲淚染衣襟不自知除却東風沙際緑一如看汝過江時劉孝標書泫然不知涕之無從也杜詩春從沙際歸與道原步至景德寺前時偶見花如夢紅紫紛披競淺深今日重來如夢覺靜無餘馥可追尋公自注云元豐七年三月十九日傳燈録陸亘大夫見南泉南泉云老僧見一株花如夢相似陸當下有省過法雲寺按建康志寺在城外東北十里本齊集善寺齊世祖為豫章文獻王造也路過潮溝八九盤按建康實録潮溝吳大帝所開以引江潮其舊迹在天寶寺後招提雪脊隱雲端金鈿一一花總老翠被重重山更寒髙齊築三臺少帝登脊疾走殊無畏怖招提雪脊謂寺之屋稜也必加堊故云雪脊公又有招提素脊隱西阿句樂天詩亭脊大髙君莫坼東家留取當西山金鈿翠被見招約之職方注光宅寺光宅寺梁武帝宅也其北齊安寺隔淮齊武帝宅也宋興又在其北齊安今為妙靜寺在城東門外前臨官路後徙置髙壠面秦淮南唐升元中建齊安孤起宋興前光宅相仍一水邊選詩何慚宿昔意猜恨坐相仍蜂分蟻爭今不見故窠遺垤尚依然抱朴子云蟻有兼弱之智蜂有攻寡之訃又五行記云後魏顯宗時兖州有黑蟻與赤蟻交鬬長六十步廣四寸赤蟻斷頭而死東魏孝靜時鄴下有黃蟻與黑蟻鬬白傅詩蜂窠與蟻蛭隨分有君臣題勇老退居院公自注今鐵索按建康志鐵索寺名今名瑞相在城南門外本晉時尼寺至宋建業十一年有尼鐵索羅等三人至因以為號及宋朝開寶中有僧重興瑞相禪師塔又改今額道人投老寄山林偶坐翛然洗我心夢境此身能且在明年寒食更相尋易聖人以此洗心盧携詩老夫如且在不用歎屯奇白樂天詩好去今年江上春明年未死還相見與寶覺宿龍華院三絶老於塵迹倦追攀但見幽人數往還憶我小詩成悵望金山祗隔數重山公自注云某舊有詩京口瓜州一水間鍾山只隔數重山春風自緑江南岸明月何曽照我還按建康志溧陽縣南五十里亦有金山不知詩指此山或浮玉之金山也然後兩篇又言京口只是浮玉之金山其二世間投老斷攀緣忽憶東遊巳十年但有當時京口月與公隨我故依然維摩經云何斷攀緣以無所得若無所得即無攀緣按鎮江志孫權自吳徙丹徒謂之京城亦曰京口晉桓溫以京口兵徑不欲郗愔居北府故有京口酒可飲兵可用之言即指此也今尚有京口鎮去城最近與瓜洲相對土人但呼為江口鎮云劉夢得詩淮水東邊舊時月夜深還過女墻來又李白詩月行長與人相隨其三與公京口水雲間問月何時照我還邂逅我還還問月何時照我宿金山清涼寺白雲菴菴雲作頂峭無鄰水月為襟靜稱身木落岡巒因自獻水歸洲渚得橫陳杜月峽瞿塘雲作頂杜牧詩水如環佩月如襟自獻見尚書周禮掌客注有橫陳字又騷詞橫自陳兮君之前今人但取首楞嚴經於橫陳時味如嚼蠟非也自定林過西菴午雞聲不到禪林柏子煙中靜擁衾忽憶西巖道人語杖藜乘興得幽尋歸菴稻畦藏水緑秧齊松鬛初乾尚有泥縱蹇尋岡歸獨臥東菴殘夢午時雞酉陽雜俎松言五粒者粒當言鬛自有一種名鬛皮無鱗甲而結實多雪中遊北山呈廣州使君和叔同年南枝嵗晚亦花開有底堪隨驛使來看取鍾山如許雪何須持寄嶺頭梅和叔時赴廣帥用嶺頭事尤切謝公墩二首建寧志墩在半山報寧寺之後基尚存我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公詩話曰或云荆公性好與人爭在廟堂則與諸公爭新法歸山林則與謝公爭墩此亦善謔也其二謝公陳迹自難追山月淮雲祗往時一去可憐終不返暮年垂淚對桓伊事見桓伊傳巳見古詩謝公墩注一去不返似言出鎮新城以避道子繼遂卒也東陂二首東陂風雨卧黃雲賸水翻溝隔壠分舂玉取新知不晚腰鎌今日巳紛紛言水多泄之入他壠也舂謂搗剝去秕粳言將炊新米也其二荷葉初開筍漸抽東陂南蕩正堪遊無端隴上翛翛麥橫起寒風占作秋禮記孟夏麥秋至又見蔡雍月令章句云百穀各以其初生為春熟為秋故麥以孟夏為秋宋景文詩情知邉地霜風惡不肯將花剩占秋山陂山陂院落今挼種城郭樓臺巳放燈白髮逢春惟有睡睡間啼鳥亦生憎劉晏傳時大兵之後京師斗米千錢禁膳不兼味甸農挼種以輸江西方言挼種謂以足挼之又云凡打禾取穀以兩木相穿擊之至取穀為種則不然以足挼之至今謂之挼種以兩木擊之則穀多綻破種不生也此詩似謂居間時不免世俗之嫌嫉欲往鍾山以雨止北山朝氣淡髙秋欲往愁霖獨少留散䇿緣岡初見日興隨雲盡復中休詩意言欲往北山值雨作中止但詩巳及散策緣岡又云初見日當是行及半途而復返耳耿天隲惠梨次韻奉酬三首故人家果獨難忘秋實初成便得嘗直使紫花形味勝豈能終日望咸陽孔融謂楊修楊梅此是君家果家果豈謂耿梨耶蜀都賦紫梨津潤唐人李遵進梨表紫花開處擅美春林緑蒂懸時回光秋浦本草紫花梨療心熱唐武帝有此疾百醫不效青城山邢道人以此梨絞汁而進帝疾遂愈後復求之苦無此種西京雜記曰上林有紫梨芳梨青梨大谷金柯縹蒂紫條幹海青玉等梨其二淮圃新隂百畝涼分甘每得助秋嘗張公大谷雖云美誰肯苞苴出晉陽郊特牲春褅秋嘗潘嶽間居賦張公大谷之梨注洛陽有張公居大谷有夏梨海內惟此一樹據寰宇志并州舊為晉陽有大谷縣故公詩引晉陽選注乃謂在洛陽誤矣其三甘滋南北共傳誇栽接還知老圃家誰謂交梨非外奬因君澆灌巳萌芽陳了翁有接花詩色紅可使紫葉單可使重用智固巧矣天時可易歟我欲春採蘭我欲冬賞桃汝不能栽接汝巧亦徒勞五代時有內園栽接使故老云李衛公有平泉花木記百餘種爾今洛陽良工巧匠批紅判白接以他木與造化爭妙故嵗嵗益奇且廣桃李梅杏蓮菊各數千種牡丹芍藥至數百種而又逺方異卉如紫蘭茉莉瓊花山茶之儔號為難植獨植之洛陽輒與其土産無異故洛園圃花木有至千種者謝靈運擬鄴中集詩沮漳自可美客心非外奬李善注曰奬勸也李周翰曰言中心思歸非外所能留王平甫詩乘間眄物情自得忘外奬真誥第一卷王夫人語許長史玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未真正穢念盈懷恐此物輩不肯來也苟真誠未一道亦無私也又言火棗交梨之樹巳生君心但心中獨有荆棘相雜是以二樹不見不審可剪荆棘出此樹單生其實幾好也又云玉醴金漿交生神梨方丈火棗玄光靈芝我當與山中許道士不以與人間許長史也北山有懷香火因緣寄北山主恩投老更人間傷心躑躅岡頭路明日春風自往還香火謂領真祠此詩必有謂莫知當時事或賔客去歎獨遊之落寞也不然則躑躅岡指臨川蓋上云寄北山晚念松楸缺於省掃獨有春風自來去耳定林院窮谷經春不識花新松老柏自欹斜殷勤更上山頭望白下城中有幾家蘇峻我寧山頭望廷尉封舒國公三絶陳迹難尋天柱源疏封投老誤明恩國人欲識公歸處楊柳蕭蕭白下門楊龜山説王介甫先封舒後封荆詩云戎狄是膺荆舒是懲識者謂宰相不學之過漢武紀登灊天柱山灊縣名屬廬江即今舒州也介甫嘗通判舒州故云陳迹舒州懷寧縣西北二十里潛山其山有三峯一天柱山一潛山一皖山公熙寧十年以南郊恩封舒國公集有謝表云唯兹邦土之名乃昔宦遊之壤久陶聖化非復魯僖之所懲積習仁風乃嘗朱邑之見愛元豐三年九月又自舒改荆其二桐鄉山逺復川長紫翠連城碧滿隍今日桐鄉誰愛我當時我自愛桐鄉桐鄉屬桐城縣公又自有二十字此只添今日當時四字言吾無德與桐鄉之人人豈知愛我我自愛之耳何其藹然君子之言也選詩潘安仁詩云齊都無遺聲桐鄉有餘謡其三開國桐鄉巳白頭國人誰復記前遊故情但有吳塘水轉入東江向我流寰宇志舒州有吳塘陂在縣西二十里皖水所注曹公遣朱光守廬江屯皖大開農田吕蒙曰皖地肥美若一收熟彼衆必增如是數嵗操態見矣冝早除之於是權親征皖破之此吳塘即朱光所開也北陂杏花一陂春水繞花身身影妖嬈各占春縱被春風吹作雪絶勝南陌碾成塵古詩悲妾似花身韓渥詩岸上花根總倒垂水中花影幾千枝千枝一影寒山裏野水野花清露時五更青燈隔幔映悠悠小雨含煙凝不流祗聽蛩聲巳無夢五更桐葉強知秋雨為煙閣故不流此言細雨耳唐人詩窗中海月早知秋又南史髙那肱漢兒無事強知星宿與薛肇明奕棊賭梅詩輸一首肇明薛昻也杭州人沒於紹興四年臣僚嘗言其以腐儒之學黨附蔡京致位近弼當政和宣和間朝廷大事一無建明專務諂諛同惡相濟觀此詩則昻早從荆公後為京所引有自來矣華髮尋春喜見梅一株臨路雪培堆鳳城南陌他年憶杳杳難隨驛使來杜詩復愁不滿鳳凰城歐公詩鳳城緑樹知多少吳曽漫録荆公在鍾山下棋時薛門下與焉賭梅花詩一首薛敗而不善詩荆公為代作今集中所謂薛秀才者是也薛既宦達出知金陵或者嘲以詩曰好笑當年薛乞兒荆公坐上賭梅詩而今又向江東去奉勸先生莫下棋薛書名似丐字故人有乞兒之論向來多謂此詩韓子蒼作非也昻賦蔡京君臣慶會詩逢時可謂真千載拜賜應須更萬回時謂之薛萬回據此則昻不能詩可知矣荆公代作梅詩亦所以誨之也又代薛秀才一首野水荒山寂寞濱攀條弄色最關春故將明艷凌霜雪未怕青腰玉女嗔司馬相如傳排閶闔而入帝宫兮載玉女而與之歸注玉女青腰乘弋等也章子厚嘉祐中令商洛日賦梅詩極佳因附此詩云紡車山下雪成堆黃澗溪邉始見梅山吏不知春色早却言花是去年開溝上梅花亭臺背暖臨溝處脈脈含芳映雪時莫恨夜來無伴侣月明還見影參差背當作偝夏侯嬰傳漢王急馬罷虜在後常蹳兩兒棄之嬰常取載行面雍樹馳師古注云面偝也此言梅臨水則稍側向與暖相背項王傳馬童面之注面背也言影為伴也韓詩我來無伴侣把酒對南山紅梅江南嵗盡多風雪也有紅梅漏泄春顔色凌寒終慘淡不應搖落始愁人杜詩漏泄春光有栁條言方冬凝凛紅梅雖挾春意終覺慘淡不必時當搖落而後愁耿天隲許浪山千葉梅見寄聞有名花即漫栽殷勤準擬故人來故人嵗嵗相逢晚知復同看幾度開白詩準擬人看似舊時與天隲宿清涼寺故人不惜馬虺隤許我年年一度來野館蕭條無準擬與君對植浪山梅對一作封按建康志寺在石頭城去城一里偽吳順義中建號興教寺南唐升元初改為石城清涼寺至宋朝太平興國五年改今額卷耳陟彼崔嵬我馬虺隤注病也浪山梅見公他詩序浪山地名也出梅花池上看金沙花數枝過酴醿架盛開二首午隂寬占一方苔映水前年坐看栽紅蘂似嫌塵染汙青條飛上别枝開劉禹錫詩一方明月可中庭趙安民詩槐夏午隂清李義山詩莫許韓憑為蛺蝶等間飛上别枝花其二酴醿一架最先來夾水金沙次第栽濃緑扶疏雲對起醉紅撩亂雪爭開紅亦可言雪謂花可以比雪之輕盈非專指其色也道家亦有絳雪韓退之城南聨句詩醉結紅滿杏柳詩欹紅醉濃露北山北山輸緑漲橫陂直塹回塘灧灧時細數落花因坐久緩尋芳草得歸遲樂府崑崙子坐久落花多離騷經惜吾不及古人兮吾誰與玩此芳草古詩為惜緑羅裙步步憐芳草三山老人語録云歐公靜愛竹時來野寺獨尋春偶過溪橋與荆公細數落花詩聨皆狀間適而王為工堯夫詩因隨芳草行來逺為愛清波歸去遲詠菊二絶補落迦山傳得種閻浮檀水染成花光明一室真金色復似毗耶長者家補陀落迦山觀音化現處釋迦氏譜云閻浮樹也有二説或云此州南邉有又云無熱池邉此云上勝緣樹沂水水下有金因為名提檀此云州也亦因樹為名或因果立稱金中上也華嚴經譬如日出於閻浮提光照一切須彌山然後普照一切大地毗耶長者維摩詰也涅槃經云譬如日出閻浮提光明破暗悉無餘其二院落秋深菊數叢緑花錯莫兩三蜂蜜房嵗晚能多少酒盞重陽自不供唐詩餘花留暮蝶幽草戀殘陽亦公意也蜀都賦蜜房郁育被其阜楊栁楊栁杏花何處好石梁茅屋雨初乾緑垂靜路要深駐紅寫清陂得細看李義山栁下暗記詩更將黃映白擬作杏花媒亦謂楊栁杏花爾又杜牧詩深感杏花相映紅鄭谷詩杏花楊栁年年好不忍回看舊寫真緑垂説栁紅寫説杏北山道人栽松陽坡風暖雪初融繞谷遙看積翠重磊砢拂天吾所愛他生來此聽樓鐘杜詩陽坡可種瓜磊砢見送李宣叔倅漳州注李義山詩若信貝多真實語三生同聽一聲鐘此詩題僧壁山櫻山櫻抱石映松枝比並餘花發最遲賴有春風嫌寂寞吹香渡水報人知張喬詩松寒蔭井枝沈休文詩野棠開未落山櫻發欲然償薛肇明秀才榿木濯錦江邉木有榿小園封植喜華滋地偏或免桓魋伐嵗晚聊同庾信移杜詩飽聞榿木三年大與致溪南十畝隂莊子山木篇吾再逐於魯削迹於衛伐樹於宋史記孔子去曹過宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去交廣人物志云蘇頲年五嵗裴談過其父試誦庾信枯樹賦頲避談字易其韻曰昔年移栁依依漢隂今看搖落悽慘江潯樹猶如此人何以任本文云昔年種栁依依漢南今看搖落悽慘江潭樹猶如此人何以堪疑庾信移用此事庾信移或指信自江南過北方也唐詩傷心庾開府老作北朝臣馬死恩寬一老寄松筠晏卧東窗度幾春天廏賜駒龍化去謾容小蹇載間身公熙寧七年六月罷相知江寧時五十六嵗至六十五嵗猶食觀使祿居鍾山六十六嵗始薨則間居之日幾十年公嘗有謝鞍馬表云引內廏之名駒傳之錯綵此言向所賜巳亡矣栁集明皇得靈昌部異馬居帝間幾二十年帝西幸馬至咸陽西入渭水化為龍泳去不知所終小蹇驢也冷齋夜話云公食宫使居蔣山時時往來白下門西菴小堂法雲止以一黥挾蹇驢門人乘間諷筍輿宜老者公曰古之王公至不道未嘗以人代畜又張浮休南遷録癸丑往蔣山候王荆公食罷約同上蔣山堅欲居後即鞭馬先之可里餘回見荆公跨蹇驢不施繖扇行赤日中遂策馬疾馳趣寺荆公後别而之他至暮竟不至不知所之又東坡和詩有騎驢渺渺入荒陂但見先生未病時之句而建康續志亦云公晚年定字説出入百家語髙而意深嘗自謂平生精力盡於此書好事者從之請問口講手畫終席幾至千餘字金華俞紫琳清老嘗冠秃巾掃塔服抱字説逐公之驢往來法雲定林過八功德水逍遙洊亭之上龍眠李伯時曰此勝事不可以無傳也遂畫以為圗觀此則小蹇載間身殆非空言矣出郊川原一片緑交加深樹冥冥不見花風日有情無處著初回光景到桑麻杜詩種竹交加翠懷府園槐隂過雨盡新秋盆砥看雲映水流忽憶小金山下路緑蘋稀處看遊鯈言雲影行於水中可玩秋興賦玩遊鯈之淑淑小金山在江寧之府園蘇魏公頌有金陵府舍重建金山亭詩見本集中江寧夾口二首鍾山咫尺被雲埋何況南樓與北齋昨夜月明江上夢逆隨潮水到秦淮南樓北齋未詳何在北齋豈即髙齋乎秦淮附城與江通故言逆隨潮水其二日西江口落征帆却望城樓淚滿衫從此夢歸無别路破頭山北北山南傳燈録道信大師姓司馬氏世居河內後徙于蘄州之廣濟縣隋大業十三年領徒衆抵吉州唐武德甲申返蘄春住破頭山學侣雲集一日告衆曰吾武德中遊廬山登絶頂望破頭山見紫雲如蓋下有白氣橫分六道地理書不載蘄春有破頭山以此知遺落者多矣蔣山手種松青青石上嵗寒枝一寸巖前手自移聞道近來髙數尺此身蒲栁故應衰樂天小松未盈尺心愛手自移杜詩欲存老蓋千年意為覓雲根數寸栽晉書顧悅之蒲栁之姿望秋先零中年中年許國邯鄲夢晚嵗還家壙埌遊南望青山知不逺五湖春草入扁舟邯鄲夢見遊土山及示寶覺注壙埌見次韻朱昌叔注杜詩不意青草湖扁舟入吾手入一作落寄四姪旊二首數篇持往助歡咍想見封題手自開春草巳生無好句阿連空復夢中來旊平父子行第四東坡哭平父詩有云氣吞餘子無全目詩到諸郎尚絶倫旊早能文故公念之如此宋書謝靈運嘗在永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草常曰此語有神助非吾語也阿連即惠連靈運族弟其二一日東岡望百回一作上幾回迢迢雲水隔蘇臺遙知别後多新句黃犬歸時總寄來多新句一作詩無數白詩淚眼凌寒凍不流每經髙處即回頭遙知别後西樓上應憑欄干獨自愁述異記陸機少好獵在吳豪客獻快犬名曰黃耳能解人語機羈旅京師嘗作家書盛以竹筒繫之犬頸犬出驛路走向吳仍取回書馳還計人行程五旬犬往還才半月寄吳氏女子吳充子安持之妻夢想平生在一丘暮年方得此優遊江湖相望真魚樂怪汝長謡特地愁莊子魚相忘於江湖寄蔡天啓杖藜緣塹復穿橋誰與髙秋共寂寥佇立東岡一搔首冷雲衰草暮迢迢劉賓客詩人道逢秋轉寂寥我言秋日勝春朝晴空一鶚排雲上便引詩情到碧霄兩詩相似亦相角也余友楊方子直嘗哦公此詩以為奇絶句呈陳和叔二首陳繹也時為江寧守數椽牢落長莓苔一徑牆隂斸雪開王吉囊衣新徙舍杖藜從此為公一作君來牢落長一作生草覆王吉好車馬衣服其自奉極鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜餘財其二數椽庳屋生茨草三畝荒園種晚蔬永日終無一樽酒樽一作杯可能留得故人車公時巳為宰相其清約如此詩牆有茨注茨蒺藜也招葉致逺白下長干一水間竹雲新筍巳斑斑明朝若有扁舟興日落潮生尚可還建康實録云江東謂兩山之間曰干州南五里有山岡其間民庶雜居有大長干小長干皇甫冉落日臨川問音信寒潮惟帶夕陽還招楊德逢山林投老倦紛紛獨卧看雲却憶君雲尚無心能出岫不應君更懶於雲雲無心而出岫略增換陶淵明語尤佳和叔招不往按荆公舊宅在今報寧寺前臨溝港故有門前秋水之句門前秋水可揚舲有意西尋白下亭只欲往來相邂逅却嫌招喚苦丁寧詩邂逅相遇公意欲省煩耳足見其清曠和叔雪中見遇捐書去寄老山林無復追緣往事心忽值故人乘雪興玉堂前話得重尋真迹與南枝嵗晚亦花開同一處贈和叔當合於此歐公語追思玉堂如在天上唐詩各當恩寄重去寄者去所寄之官和叔亦嘗同在翰苑陳俞二君忽然不見忽去飄然遊冶盤共疑枝策在梁一作雲端禪心暫起何妨寂道骨雖清不畏寒冶盤猶狹邪之類太白詩君馬黃我馬白馬色雖不同人心本無隔共作遊冶盤雙行洛陽陌枝策見上注暫起必謂冶盤也與耿天隲會話邯鄲四十餘年夢相對黃粱欲熟時萬事盡如空鳥迹怪君強記尚能追華嚴十地法門如來大仙道微妙難可知如空中鳥迹難説難可示如是十地義心意不能了樂天觀幻詩更無尋覓處鳥迹印空中栁詩心境本同如鳥飛無遺迹王荆公詩注卷四十二
