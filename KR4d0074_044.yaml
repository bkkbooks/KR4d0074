body:
  text: 王荆公詩注卷四十四宋李壁撰律詩金陵即事三首水際柴門一半開張祜詩紅樹蕭蕭閣半開小杜詩緑樹蔭青苔柴門臨水開小橋分路入蒼一作青苔背人照影無窮栁皮日休古人名詩水邉韶景無窮栁空被江淹一半黃隔屋吹香並是梅此詩吟諷不足可入畫圗其二結綺臨春歌舞地荒蹊狹巷兩三家結綺臨春見和微之登髙齋注東風漫漫吹桃李非復當時仗外花李白姑蘇臺詩宫女如花滿春殿只今惟有鷓鴣飛即此意唐詩佳氣常薰仗外峯其三昏黑投林晚更驚背人相喚百般鳴韓集聞鶯詩誰人教解百般鳴柴門長閉春風暖事外還能見鳥情列子黃帝篇太古聖人備知萬物情態悉解異類音聲杜詩農事聞人説山光見鳥情烏塢烏塘渺渺渌平堤言水與堤平堤上行人各有攜試問春風何處好辛夷如雪柘岡西公母家吳氏居臨川三十里外地名烏石岡吳氏所居又有柘岡即詩所指本草辛夷初開如筆人呼為木筆其花最早江南地暖正月開南人呼為迎春北地寒二月開樹髙數仞葉似柿葉而狹長花似著毛小桃色白而帶紫花落後至夏初復開花輞川圗有辛夷塢王維詩況有辛夷花色與芙蓉亂柘岡萬事紛紛只偶然杜牧詩冥鴻不下非無意塞馬歸來是偶然老來容易得新年栁集長來覺日月益速公詩有一年容易即黃花柘岡西路花如雪回首春風最可憐北城青青千里亂春袍後漢五行志千里草何青青十日卜不得生杜詩堤草亂春袍唐人詩庾郎年最少堤草妬春袍宿雨催紅出小桃王維詩桃紅復含宿雨栁緑更帶春煙介甫又詩云晴日蒸紅出小桃回首北城無限思日酣川淨野雲髙金陵金陵陳迹老莓苔南北遊人自往來最憶春風石城塢家家桃杏過墻開午枕午枕花前簟欲流言簟文瑩滑如水之流日催紅影上簾鈎杜詩落日在簾鈎溪邉春事幽窺人鳥喚悠揚夢隔水山供宛轉愁孟東野詩清溪宛轉水修竹裴回風陳羽詩迎門騷屑千家竹隔水悠揚午夜風州橋州橋踏月想山椒回首哀湍故未遙今夜重聞舊嗚咽却看山月話州橋李義山詩君問歸期未有期巴山夜雨漲秋池何當共剪西窗燭却話巴山夜雨時又陳陶詩憶昔鄱陽旅遊日曽聽南家爭搗衣今夜重聞舊砧杵當時還見鴈南飛觀明州圗明州治鄞縣明州城郭畫中傳尚憶西亭一艤船投老心情一作光隂非復昔當時風月故依然九日賜宴瓊林苑作金明池一作馳道栁參天瓊林苑金明池巳見别注投老重來聽管絃飽食太官還惜日古詩志士惜日短夕陽臨水意茫然杜詩夕陽臨水釣又把酒意茫然壬子偶題公自注云熙寧五年東府庭下作盆池故作黃塵投老倦匆匆故繞盆池種水紅落日欹眠何所憶江湖秋夢櫓聲中韓詩老翁真個似童兒打水埋盆作小池又奉和錢七兄曹長盆池所植錢七兄徽也徽詩序云小庭水植率爾成詩又李白對雨詩水紅愁不起劉長卿詩暮情辭鏡水秋夢賦雲門汪遵詩秋宵睡足芭蕉雨又是江湖入夢來和張仲通憶鍾陵絶句二首鍾陵謂豫章昔之洪州今之隆興也一夢章江巳十年章貢水見前注自贛州至洪通謂之章江故人重見想皤然只應兩岸當時栁能到春來尚可憐杜牧詩夾岸垂楊三百里只應圖畫最相宜自嫌流落西歸疾不見東風二月時其二逸少池邊有一丘右軍墨池在撫州州學距公居切近西山南浦慣曽遊西山南浦指洪州見王勃滕王閣記殘年歸去終無樂聞説章江即淚流送和甫至龍安暮歸隱隱西南月一鈎春風落日淡如秋栁詩春半如秋意轉迷房櫳半掩無人語鼓角聲中始欲愁人言愁我始欲愁矣晉衛玠語鍾山即事澗水無聲繞竹流竹西花草弄春柔茅簷相對坐終日一鳥不鳴山更幽舊本注減二字再成一首澗水繞竹流花草弄春柔相對坐終日鳥鳴山更幽荆公嘗語山谷云古稱鳥鳴山更幽我謂不若不鳴山更幽故今詩如此沈存中又稱公以鳥鳴山更幽對風定花猶落為妙苕溪漁隱曰太白詩解道澄江淨如練令人還憶謝元暉至魯直則云憑誰説與謝元暉休道澄江淨如練王文海云鳥鳴山更幽王荆公則云茅簷相對坐終日一鳥不鳴山更幽皆反其意而用之蓋不欲沿襲之耳南澗樓公自注云在江寧尉司撲撲煙嵐繞四阿杜牧之詩後嶺翠撲撲前溪緑泱泱周禮明堂四阿重屋物華終恨未能多故應斗起三千丈始奈重山復嶺何張祜詩泉聲到地盡山色上樓多太白詩白髮三千丈韓詩直須臺上看始奈月明何京城三年衣上禁城塵撫事茫然愧古人漢贊彼以古人之責見繩烏能勝其任乎賢者自以不能如古人為愧明月滄波秋萬頃扁舟長寄夢中身雖明月滄波之浩渺非不超然垢紛之外亦均於夢耳隴東西二首隴東流水向東流辛氏三秦記載俗歌曰隴頭流水鳴聲嗚咽遙望秦川肝腸斷絶又隴山一名隴坻又名分水嶺故公有東流西流之句不肯相隨過隴頭王建詩一東一西隴頭水一聚一散天邉霞唐人賦歐陽詹詩忽如隴頭水坐作東西分秖有月明西海上伴人征戍替人愁漢有西海郡博物志云漢使張騫渡西海至大秦西海之濱有小崑崙其二隴西流水向西流漢書于闐之西水皆西流注西海其東水東流注鹽澤然則外域水亦有東西分者公送董傳詩又云悠悠隴頭水日夜向西流李義山詩溝水分流西復東九秋霜月五更風自古相傳到此愁添却征人無限淚怪來嗚咽巳千秋雍裕之詩思君如隴水長聞嗚咽聲斜徑斜徑偶穿南埭路數家遙對北山岑南埭北山在公園屋旁草頭蛺蝶黃花晚菱角蜻蜓翠蔓深杜詩穿花蛺蝶深深見點水蜻蜓欵欵飛近余使燕時館伴使李著能誦公黃花翠蔓之句以為妙暮春北風吹雨送殘春南澗朝來緑映人昨日杏花渾不見故應隨水到江濱杜鵬詩侵階草色連朝雨滿地梨花昨夜風意亦類此但比公語為簡耳雨晴晴明山鳥百般催不待桃花一半開雨後緑隂空繞舍總將春色付莓苔唐人詩杏香終日避風吹多在青苔少在枝長孫左輔枯樹詩應是無機承雨露却將春色寄苔痕日西日西階影轉梧桐簾捲青山簟半空武元衡詩簾捲青山巫峽曉雲凝碧岫渚宫秋杜詩卷簾惟白水隱几亦青山令狐楚詩玉箸千行落銀床一半空潘安仁悼亡詩展轉眄枕席長簟竟床空金鴨火銷沉水冷悠悠殘夢鳥聲中李賀詩深幃金鴨冷奩鏡幽鳳藏禁直翠木交隂覆兩簷夜天如水碧恬恬李賀詩夜天如玉砌張籍詩秋天如水夜未央杜牧詩天階夜色涼如水又微漣風定翠恬恬帝城風月看常好人世悲哀老自添王縉詩帝城風月好御栁御栁新黃巳迸條宫溝薄凍未全銷王涯詩二月春風變栁條晏公詩臘雪半含梅粉白春風先著栁梢黃杜詩臘日常年暖尚遙今年臘日凍全消不知人世春多少先向天邊問斗杓公為翰林時熙寧元年四十七嵗此詩一作習習春風拂栁條御溝春水巳氷消人間今日春多少祗看東方北斗杓北斗七星在紫宫南其杓所建周於十二辰之舍以定十有二月斟酌元氣運乎四時者也孟浩然詩昏見斗杓回始知星嵗改或言荆公作此詩巳未幾參大政類詩讖云祥雲氷入春風漲御溝言東風解凍氷溶而溝漲韓詩墻下春渠入禁溝上林花氣欲飛浮未央屋瓦猶殘雪却為祥雲映日流王昌齡詩慶雲從東出泱漭抱日流題中書壁夜開金鑰詔詞臣對御抽毫草帝綸吳融詩六載抽毫侍禁闈不堪多病怏然歸須信朝家重儒術一時同榜用三人老杜送顧八分詩三人並入直恩澤各不二金坡遺事云舊制學士晚得熟狀其密者多夜降出草麻五更三點進入又每恩例除改即宰相得旨後入熟狀至晚或召對或降出熟狀便草麻惟進退宰相及非時特旨除改皆夜後宣入面受處分宰相不得知也熙寧三年公與韓子華同拜相王岐公為翰林學士被召草麻既受旨後神宗因出手札示之曰巳除卿參知政事矣故此詩云一時同榜用三人公楊置榜及第岐公第二子華第三公第四置早世或云陸子履詩非也禁中春寒青煙漠漠雨紛紛謝玄暉遊東田詩生煙紛漠漠又盧綸詩垂楊不動雨紛紛水殿西廊北苑門韋執誼翰林記院在銀臺門內麟德殿重廊之後廊各設一門若在院得召即自西重廊復門而入對于麟德今言西廊者蓋宋朝翰苑亦略倣唐制韓致光玉堂間坐詩清冷侵肌水殿風巳著單衣猶禁火海棠花下怯黃昏樂天慈恩寺詩惆悵春歸留不得紫藤花下漸黃昏試院五絶少時操筆坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生公集首善自京師始賦甚精切有義味今之陳腐雕刻何足窺其藩者然公亦姑同俗耳而心卒薄之故云頗自輕下又云終用賦言不當用也意欲改之其二白髮無聊病更侵移床向竹卧秋隂朝來鴈背西風急吹折江湖萬里心溫庭筠詩蝶翎胡粉重鴉背夕陽多其三咫尺淹留可奈何東西虛共一姮娥階前棗樹應搖落此夜清光得幾多白詩華陽洞裏秋壇上今夜清光此處多其四青燈照我夢城西坐上傳觴把菊枝忽忽覺來頭更白隔墻聞語趁朝時言夢傳觴把菊既覺聞隔墻語身在試院非自趁朝止言是此時耳其五蕭蕭踈雨吹簷角噎噎暝蛩啼草根間却荒庭歸未得一燈明滅照黃昏杜詩歸翼飛栖定寒燈亦閉門學士院燕侍郎畫屛六幅生綃四五峯韓退之桃源圖詩生綃一幅垂中堂郎士元詩青山霽後雲猶在畫出西南四五峯暮雲樓閣有無中王維詩江流天地外山色有無中韓琮詩暮雲樓閣古今情去年今日長干里李白長干行同居長干里兩小無嫌猜遙望鍾山與此同玉堂有董羽畫水吳僧巨然畫山水皆有逺思一時絶筆也見金坡遺事又京師學士院有燕侍郎山水圖荆公有一絶云六幅生綃四五峯云云後張天覺有詩云相君開卷憶江東髣佛鍾山與此同今日還為一居士翛然身在畫圖中此詩話所載但學士院不聞有燕畫恐只指巨然爾道傍大松人取為明虬甲龍髯不可攀亭亭千丈蔭南山左太沖詩亭亭山上松李白詩錯落千丈松虬龍盤古根應嗟無地逃斤斧豈願爭明爝火間栁子厚詩孤松停翠蓋託根臨廣路不以險自防遂為明所誤公詩言松意尚不願見採於匠石充梁棟之用況肯與區區螢爝爭明於頃刻間乎白傅詩尚可以斤斧伐之為棟梁殺身獲其所為君搆明堂其意與公異矣見鸚鵡戲作雲木何時兩翅翻林逋詩雲木叫鈎輈玉籠金鎖柢煩寃武元衡詩粉鸞歸處玉籠開宋玉風賦勃鬱煩寃杜詩新鬼煩寃舊鬼哭直須強學人間語舉世無人解鳥言禰正平有鸚鵡賦軒轅彌明吾不解世一俗書神異經曰南方大荒中有人焉長丈其腹圍九尺知河海升斛識山石多少知天下鳥獸言語周禮夷𨽻掌役牧人飬牛馬與鳥言鄭司農云夷狄之人或曉鳥獸之言又廣記成仙公傳嘗與衆共坐聞羣雀鳴而笑之衆問其故答曰市東車翻覆米羣雀相呼往食遣視之信然觀此世固有解鳥言矣管輅能曉鳥鳴劉長仁曰夫生民之音曰言鳥獸之聲曰鳴故言者則有知之靈貴鳴者則無知之賤名何由以鳥鳴為語亂神明之所異也池鴈羽毛摧落向人愁當食哀鳴似有求萬里衡陽冬欲暖失身元為稻粱謀失侣而思其羣也杜詩孤鴈不飲啄哀鳴聲念羣又君看隨陽鴈各有稻粱謀六年六年湖海老侵尋千里歸來一寸心杜詩心折此時無一寸回望國門搔短髮陸龜蒙江湖散人歌短髮搔來蓬半垂九天宫闕五雲深此見公深追神宗之遇雖巳在田里不忘朝廷也世故世故紛紛謾白頭欲尋歸路更遲留鍾山北繞無窮水散髮何時一釣舟嵇叔夜詩散髮岩岫注謂不為冠冕所拘束也盧同詩荷蓑不是人間事歸去滄江有釣舟李白詩散髮弄扁舟此詩當作於未去相位時邵平天下紛紛未一家漢王謂陳平天下紛紛何時定乎又項羽傳天下洶洶徒以吾兩人願與王挑戰決雌雄無徒罷天下父子為也販繒屠狗尚雄誇灌嬰睢陽販繒者也師古曰繒者帛之總名樊噲沛人也以屠狗為事東陵豈是無能者獨傍青門手種瓜蕭何傳云平種瓜長安城東又霸城門民間所謂青門也又陶詩衰榮無定在彼此更共之邵生瓜田中何似東陵時寒暑有代謝人道每如斯達人解其會逝將不復疑杜詩千載商山芝往者東門瓜其人骨巳朽此道無疵瑕陶以為達人杜謂無疵瑕蓋漢興不復出此尤髙也中牟屬東京開封府在京城西七十里即古中牟故城後漢魯恭嘗為之宰頽城百雉擁髙秋驅馬臨風想聖丘韓逺遊詩乘桴想聖丘此道門人多未悟爾來千載判悠悠佛肸為中牟宰趙鞅攻范中行伐中牟佛肸畔使人召孔子子欲往子路曰由聞諸夫子親於其身為不善者君子不入也今佛肸以中牟畔子欲往如之何孔子曰有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食門人多未悟謂子路之問王章志士軒昻非自謀近臣常為國深憂區區女子無髙意追念牛衣暖即休軒昻真迹作激昻本傳章病無被卧牛衣中涕泣與妻訣妻呵曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激昻乃反涕泣何鄙也及章為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也按漢史激昻作卬音仰此乃作平聲牛衣龍具也龍具之制不知何若按食貨志貧民常衣牛馬之衣蓋編草使暖以被牛體神物神物登天擾可騎韓非説難龍之為蟲也可擾狎而騎也如何孔甲但能羈當時若更無劉纍龍意茫然豈得知昭公二十九年秋龍見絳郊魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知昔有飂叔安有裔子曰董父實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川及有夏孔甲擾于有帝帝賜之乘龍孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後獻子曰今何故無之對曰失物物有其官官修其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃抵伏鬱湮不育龍水物也水官棄矣故龍不生得蘇子容嘗記計用章郎中語曰神龍騰驤豈可羈也其豢飬於人者謂其有嗜欲故人主不宜有所好有所好則腹心肝膽皆在人矣故好戰則孫武白起之徒出而民殘於干戈矣好刑名則韓非張湯之徒出而民苦於刻核矣好聚斂則桑𢎞羊皇甫鏄之徒出而民困於掊克矣好順從則張禹胡廣之徒出而民蔽於夸大矣豈惟人主學士大夫亦宜知之文成文成五利老紛紛方丈蓬萊但可聞言方士之虛誕神仙但可聞不可見萬里出師求寶馬飄然空有意凌雲李斯傳公子髙上言中廄之寶馬臣得賜之大宛之役耗竭中國最甚公言武帝殺人之多乃徒有欲仙之意蓋譏之也神宗嘗曰漢武帝至不仁以一馬之故勞師萬里侯者七十餘人視人命如草芥此天下户口所以減半也人命至重天地之大德曰生豈可如此讀漢書京房劉向各稱忠詔獄當時迹自窮杜牧詩碧溪留我武關東一笑懷王迹自窮畢竟論心異恭顯不妨迷國略相同房向各以言災異下詔獄蓋漢儒五行傳必以某異應某事識者多非之公素不喜疑所稱迷國指此也吕晦叔王荆公同為館職當時閣下皆知名士每評論古今人物治亂衆人之論止于荆公荆公之論又為晦叔止也一日論劉向當漢末言天下事反復不休以為知忠義或以為不達時變議未決荆公來衆問之荆公卒然對曰劉向強聒人耳衆意未滿晦叔至又問之則曰同姓之卿歟衆乃服賜也賜也能言未識真悮將心許漢隂人桔橰俯仰妨何事抱甕區區老此身莊子天地篇子貢過漢隂見一丈人為圃畦鑿隧而入井抱甕而出灌用力甚多而見功寡子貢曰有機械於此一日浸百畦夫子不欲乎丈人曰奈何曰鑿木為機後重前輕挈水若抽數如沃湯其名桔橰為圃者忿然作色而笑曰有機械者必有機事有機事者必有機心道之所不載也吾非不知羞而不為也子貢暪然而慙曰始吾以夫子天下一人耳不知復有斯人也注謂此宋榮子之徒未足以為全德子貢之迷沒於此人即列子之心醉於季咸也公詩蓋取注意云又天運篇且子獨不見夫桔橰乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人公詩中使俯仰又取於此石林詩話云舊中書南廳壁間有晏元獻詠上竿伎一詩云百尺竿頭裊裊身足騰跟倒駭傍人漢隂有叟君知否抱甕區區亦未貧當時人有謂文潞公在樞府嘗一日過中書與荆公行至題下特留誦詩久之亦不能無意也荆公他日因題此篇于後重將重將白髮傍墻隂陳迹茫然不可尋花鳥總知春爛漫人間獨自有傷心劉長卿詩豈能將白髮扶杖出人間載酒載酒欲尋江上舟出門無路水交流黃昏獨倚春風立看却花飛觸地愁世説王文度與林法師講韓孫諸人在坐林理每欲小屈孫興公曰法師今日如著弊絮在荆棘中觸地挂閡王建詩忽地金輿向月陂內人接著便相隨觸地恐亦忽地之類楚天楚天如夢水悠悠花砥殘紅漫不收獨繞去年垂淚處還將牢落對滄洲言憂愁之日常多江上江北秋隂一半開晚雲含雨却低徊李義山詩户外重隂黯不開杜審言詩日氣含殘雨雲隂送晚雷青山繚繞疑無路忽見千帆隱映來秦少遊詩菰蒲深處疑無地忽有人家笑語聲疑祖此春江春江渺渺抱牆流煙草茸茸一片愁吹盡栁花人不見青旗催日下城頭青旗酒旗也唐詩柴扉日暮隨風掩落盡間花不見人公又有細草孤雲一寸愁之句或言此是方子通詩公子元澤詩雙雙燕子語簾前病客無聊盡日眠開遍杏花人不見滿庭細雨緑如煙元澤詩亦類公作余於臨川得之附此李泰伯詩山店吹英春寂寂青旗颭盡栁花風或言此詩方子通作荆公愛之書於册後人誤謂荆公作方名維姑蘇人行髙潔隱居不仕春雨城雲如雪栁僛僛真迹雪作夢詩屢舞僛僛毛氏曰僛僛舞不能自止也唐崔魯詩濕雲如夢雨如塵野水橫來強滿池髙適詩門前種栁深成巷野谷流泉添入池九十日春渾得雨故應留潤作花時初到金陵江湖歸不及花時空繞扶疏緑玉枝夜直去年看蓓蕾晝眠今日對紛披盧同詩仁風暗結珠蓓蕾説文蓓蕾花綻貌與北山道人蒔果疏泉帶淺山許景先詩蒔蔬利於鬻柴門雖設要常關歸去來辭門雖設而常關别開小徑連松路沈傳師詩别引新徑縈雲根皇甫曽詩掃雪開松徑疏泉過竹林祗與鄰僧約往還過外弟飲爾雅釋親釋曰外族母黨之屬也吳氏公母家居烏石岡距臨川三十里一日君家把酒杯秦韜玉詩青門春色一花開長到花時把酒杯六年波浪與塵埃不知烏石岡邉路至老相尋得幾回唐詩殷勤竹林寺能得幾回過若耶溪歸興若耶溪上踏莓苔郡國志若耶溪在山隂縣東南歐冶子鑄劒之所下有潭深而清興罷張帆載酒回汀草岸花渾不見青山無數逐人來李白詩天門中斷楚江開碧水東流直百回兩岸青山相對出孤帆一片日邉來烏石一作遊草堂烏石岡邉繚繞山柴荆細徑水雲間徑一作路觀此詩則金陵亦有烏石岡也拈一作吹花嚼蘂長來往只有春風似我間李義山序栁枝事云栁枝年十七塗粧綰髻未嘗竟巳復去吹華嚼蘂調絲擫竹作天風海濤之曲多幽憶怨斷之音定林定林修木老參天橫貫東南一道泉此言定林有泉豈即應潮井乎六月杖藜尋石路午隂多處弄潺湲許子禮吏部嘗云親見定林題筆不云修木云喬木不云石路云去路不云弄潺湲云聽潺湲羅鄴詩一道潺湲濺短蓑定林所居屋繞灣溪竹繞山溪山却在白雲間臨溪放杖依山坐溪鳥山花共我間即公讀書之地米元章所書昭文齋也白公詩弄石臨溪坐尋花繞竹行又盡日觀魚臨澗坐有時隨鹿上山行臺城寺側獨行春山撩亂水縱橫續建康志志此詩指景陽山山即宋文帝元嘉二十三年於華林園所築籬落荒畦草自生獨往獨來花下路筍輿看得緑隂成遊鍾山按建康志鍾山一名蔣山在城東北一十五里周回六十里髙一百五十八丈東連青龍山西接青溪南有鍾浦下入秦淮北接雉亭山漢蔣子文死事于此吳大帝祖諱鍾因改曰蔣山終日看山不厭山買山終待老山間小杜詩終日看山酒滿傾買字别本作愛字世説支道林因人就深公買印山公曰未聞巢由買山而隱又唐符載遣書乞買山錢於于頔山花落盡山長在山水空流山自間志間禪師詩間花一任風吹落留得青山在即休松間公自注云被召將行作偶向松間覓舊題野人休誦北山移丈夫出處非無意猿鶴從來自不知北山移文有鶴怨猿驚之語神宗初詔公知江寧府衆謂公必辭及詔到即赴府視事其時韓公持國在侍從嘗入奏以為人君始初踐祚慨然想見賢哲思與圗治當徑召還不必更除外郡兼謂公知道守正不為利動其於出處大節必巳素定若久病不朝見除郡即起則是偃蹇君命以求自便臣知安石必不為也韓公上此疏時不知公巳交郡事矣石林詩話云王介字中甫衢州人與荆公遊甚款然未嘗降意相下熙寧初荆公以翰林學士被召前此屢召不起至是始受命介以詩寄公云草廬三顧動春蟄蕙帳一空生曉寒蓋有所諷公得之大笑他日作詩有丈夫出處非無意之句蓋為介發也雨未止正臣欲行以詩留之紛紛應接使人愁與子從容喜問酬他日故將泥自芘今朝欲以雨相留曹公自述於譙東築精舍求低下之地欲以泥水自芘絶賓客往來之望然不能得如意芘字想當作蔽此何正臣也嘗以蔡確薦為御史又嘗與李定舒亶同劾東坡者詳見送正臣主簿注王荆公詩注卷四十四
