body:
  text: 王荆公詩注卷三十三宋李壁撰律詩酬慕容員外公自注云嘗為王宫教授以武舉入官被謫初駕王門學者師晚漂湖海衆人悲吹毛未識腰間劒刺股猶藏袖裏錐杜詩鋒先衣染血騎突劒吹毛古有吹毛之劒蘇秦夜讀書遇睡引錐刺股流血衛霍功名還有命蘇張才氣豈無時衛青霍去病蘇秦張儀也張儀言蘇君之時儀何敢言江尤亦見應須飲莫放窮愁入兩眉王𤣥謨眉頭未曾伸次韻張唐公馬上竭節初悲力不勝賜環終愧繆恩臨病來氣弱歸宜早偷取官多責恐深荀子大略篇聘人以圭問士以璧召人以瑗絶人以玦返人以環注云古者臣有罪待放於境君賜以環即返以玦即去皆所以見意荀子冬為之饘粥夏與之瓜麩以偷取少頃之譽焉非久長之道也膏澤未施空謗怒瘡痍猶在豈謳吟黃昏信馬江城路欲訪何人話此心此詩恐是神廟初自知江寧召還時作謗怒必指為郡時事宜新法之紛紛也或是再入相時和王司封㑹同年收科天陛頃同時白首相歡事亦稀追講舊遊犀麈脫交酬新唱彩箋飛晉孫盛與殷浩談論往返精苦客主無間左右進食冷而復暖者數四彼我奮擲麈尾悉脫落滿餐飯中直須傾倒樽中酒休惜淋浪座上衣日慕主翁留客轄㑹稽聊滯買臣歸韓詩淋浪身上衣顛倒筆下字陳遵傳遵嗜酒每大飲賔客滿堂輒關門取客車轄投井中雖有急終不得去嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉突入見遵母叩頭自白當對尚書有期㑹狀母乃令從後閣出去次韻酬子玉同年公自注云子玉詩云過盡金湯知帝策見求貂虎識軍儀男兒本有四方志秪在蓬瀛恐不知盛德無心漠北窺邉人亦恐勢方羸首句言天子盛德無意於開邊塞垣髙壘深溝地幕府輕裘緩帶時髙祖紀郎忠說漢王髙壘深溝勿戰輕裘見擬峴臺注趙將時皆思李牧楚音聲自感鍾儀史記李牧趙之北邊良將也胸奴以牧為怯趙王使它人代將數不利失亡多復請李牧牧杜門不出趙王乃復强起使將兵成公九年晉侯觀於軍府見鍾儀問之曰鄭人所獻楚囚也使與之琴操南音范文子曰樂操土風不忘舊也慙君許我論邊鎖俎豆平生却少知丙吉傳吉以馭吏言召東曹按邊長吏琑科條其人注琑録也欲科條其人老少及所經厯知其本以文武進也和舍弟舟上示沈道源還裝欲盡喜舟輕更喜嘉賔伴此行野飲不忘魚可釣旅羮何惜鴈能鳴烹鴈見送李璋注西山牡馬先歸牧南穴殘梟欲就烹漢郊祀志注五月五日作梟羮以賜百官以其惡鳥故食之憂國自多廊廟宰與君詩酒盡交情過山即事却過兹山已九年江湖身世只飄然曲城丘墓心空折鹽步庭闈眼欲穿曲城在建康公松楸所寄撫州鹽步門即公所居余嘗至其處今有祠堂慘慘野雲生隴底蕭蕭飢馬立風前轉多愁思摧華髮早晚輕舟上秀川秀川恐謂秀水未詳酬裴如晦名煜二年羇旅越人吟乞得東南病更侵殤子未安莊氏義夀親還慰魯侯心仲宣賦莊舄顯而越吟莊子齊物論莫夀乎殤子而彭祖為夭注殤子短命者也詩閟宫魯侯燕喜令妻壽母注燕飲也令善也僖公燕飲於內寢則善其妻壽其母謂之祝慶也鮮鮮細菊霜前蘂漠漠疏桐日下隂濁酒一杯秋滿眼可憐同意不同斟酬鄭閎中鄭穆也福州侯官人蕭條行路欲華顛回首山林尚渺然三釡只知為養急五漿非敢在人先五漿屢見上注文章滿世吾誰慕行義如君衆所傳穆本傳純厚好學動必由禮門人以千數宜有至言來助我可能空寄好詩篇漢賈山有至言寄余溫卿雲散風流不自禁王仲宣贈蔡子篤詩風流雲散一别如雨天涯無路盍朋簪空馳上國青泥信誰和南山白石音平日離愁寬帶眼訖春歸思滿琴心終思一命翩翩駕獨過嵇山煆樹隂按漢中書以武都紫泥為璽封加緑緹其上王子年拾遺記方丈山有池泥色金而味辛鍊可為金金色青照見鬼魅又一本云元封元年浮折國歲貢蘭金之泥此泥出於淵池盛夏之時水常沸湧有若湯火飛鳥不能過國人行者常見水邊有人治此金為器混混若匣及泥如紫磨之色百鑄其色變白變青常以此泥封諸函諸宫門鬼魅不敢干當漢世上將出征及使絶國多以泥為印封衛青張騫蘇武傅介子之使皆受金泥之璽封也帝上仙後乃絶又廣異記則天時一西國獻青泥珠一枚珠類拇指微青以施西明寺金剛額中後有夷人見珠目不暫捨以萬貫買之內珠腿肉中欲還西國僧尋聞奏則天敇求此夷數日得之使者問珠所在夷云巳吞入腹使者欲刳其腹夷不得已於腿中取則天召問貴價市此焉用之夷云西國有青泥泊多諸珍寶但苦泥深不可得入若以此珠投泊中泥悉成水其寶可得又東觀漢記曰鄧訓嘗將黎陽營兵屯狐奴後遷護烏桓校尉黎陽故吏最貧羸者舉國念訓嘗所服藥比州少乏又知訓好青泥封書從黎陽步推鹿車於洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如此見鄧訓傳注宋景文詩他日相思煩尺訊黎陽為辦襆書泥寧戚飯牛歌南山粲白石爛帶眼見姑胥郭注司馬相如傳卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之煆樹事屢見上寄郎侍郎公有上郎侍郎書公之先人為韶州郎為部使者與公世有恩分作詩寄焉兩朝人物歎賢豪􅏮􅏮清風晚見褒簡臨安人景德二年及第真宗嘗謂判銓呂夷簡曰簡厯官寡過無一人薦之是必恬於進者稍進其官仁宗時位益顯晚自明州以工部二卿致仕故云兩朝江漢但歸滄海闊丘陵難學太山髙揚子百川學海而至於海丘陵學山而不至於山是故惡夫畫也放懷詩酒機先息回首功名世自勞久願作公樽俎客恨無三畝斸蓬蒿傳載簡性和易喜賔客即錢塘城北治園廬自號武林居士道引服餌晚歲顔如丹送道光法師住持靈巖靈巖開闢自何年草木神竒鳥獸仙一路紫苔通䆗窱千崖青靄落潺湲山祇嘯聚荒禪室象衆低摧想法筵宋顔延年詩山祇蹕嶠路張說注山祇山神李善注管子曰登山之神有俞兒者長尺人物具焉霸王之興登山之神見且走馬前導也涅槃經聲聞緣覺及大菩薩同行佛所聞佛說一味之法然其所證各有淺深譬象馬兔三獸渡河兔渡則浮馬渡及半唯大香象徹底法筵龍象衆當觀第一義雪足莫辭重趼往東人香火有因緣莊子天道篇百舍重趼而不敢息趼古顯反司馬彪注云胝也音陟其反許慎云足指約中斷為趼奉酬永叔見贈欲傳道義心雖壯强學文章力已窮他日若能窺孟子終身何敢望韓公河東王儔尚友嘗為豫言觀介甫何敢望韓公之語是猶不願為退之且譏文忠之喜學韓也然荆公於退之之文步趍俯仰蓋升其堂入其室矣而其言若是豈好學者常慕其所未至而厭其所已得耶韓子蒼言歐陽文忠公寄荆公詩云翰林風月三千首吏部文章二百年吏部蓋為南史謝朓於宋明帝為尚書吏部郎長五言詩沈約嘗云二百年來無此詩也文忠之意直使謝朓事而荆公答之曰他日若能窺孟子終身安敢望韓公則荆公之意竟指吏部為退之矣摳衣最出諸生後倒屣常傾廣坐中秖恐虛名因此得嘉篇為貺豈宜䝉曲禮曰摳衣超隅必慎唯諾蔡雍見王粲而竒之賔客盈座聞粲在門倒屣迎之粲年既幼一坐盡驚歐公與公詩有後來誰與子爭先許之至矣送陳舜俞制科東歸嘉祐四年八月上御崇政殿試制策舉人以明州觀察推官陳舜俞入等除著作佐郎簽書夀州判官事此詩當送陳之夀州時也諸賢發策未央宫獨得淄川一老翁曲學暮年終相漢髙談平日漫周公君能一作今壯歲收科第我欲他時看事功聞說慨然真有意贈行聊以古人風公孫𢎞菑川薛人年六十以賢良徴為博士使胸奴還不合意移病免歸元光元年復徴賢良文學太常奏𢎞第居下天子擢𢎞為第一封平津侯又轅固謂𢎞曰公孫子務正學以言無曲學以阿世𢎞上疏言臣聞周公旦治天下期年而變三年而化五年而定天子以册書答曰聞𢎞稱周公之治𢎞之才能自視孰與周公賢𢎞對曰愚臣淺薄安敢比才於周公雖然愚心曉然見治道之可以然也舜俞初忤介甫晚乃翻悔青苗負此詩矣然介甫初以古人期舜俞洎舜俞極論新法乃亦不能容之送何正臣主簿何郎冰雪照青春應敵皆言筆有神魯國儒人何獨少元君畫史故應真田子方篇以魯國而儒者一人耳可謂多乎哀公云舉魯國而儒服何謂少乎元君畫史見虎圖注百年冠蓋風雲㑹萬里山川日月新陸士衡詩藹藹春風㑹佳人一何繁日月新必裕陵初可但諸公能品藻㑹須天子擢平津公孫𢎞見上注按正臣臨江人仕至侍從國史有傳先以童子舉對御講書賜出身後再登第此詩必送其赴御試時也詩中稱奬至矣公弟和甫乃詆以為奸邪小人不應酥酪問異論乃爾豈别一正臣耶然正臣治平四年登第此稱日月新者當以神廟初即位也後此數年正臣以蔡確薦入臺浸貴用時介甫已亡矣和甫詆之或如平甫之詆吕惠卿輩也華藏院此君亭一徑森然四座涼殘隂餘韻興何長人憐直節生來瘦自許髙材老更剛曾與蒿藜同雨露終隨松柏到氷霜煩君惜此根株在乞與伶倫學鳳凰漢律厯志黃帝使伶倫自大夏之西崑崙之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本柳詩秖應更使伶倫見寫盡䳄雄雙鳳鳴華藏院按建康志在斗門橋西街北僞吳武義二年建初為報先寺南唐改為報恩禪院國朝改今額晉王子猷愛竹嘗曰不可一日無此君意亦取此撫州崇仁縣亦有華藏院今按髙齊詩話曰荆公題金陵此君亭詩云誰憐直節生來瘦自許髙材老更剛賔客每對公誦此句公輒顰蹙不樂晚年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大抵少年題詩可以為戒平甫曰藏此揚子雲所以悔其少作也以此考之是金陵華上元戲呈劉貢父劉攽字貢父車馬紛紛白晝同萬家燈火暖春風别開閶闔壺天外特起蓬萊陸海中蓬萊在海中此言山棚拔起於闤闠故云陸海漢地理志秦地號稱陸海師古注云言其地髙陸而饒物産如海之無所不出盡取繁華供俠少秪分牢落與衰翁不知太一遊何處定把青藜獨照公王子年拾遺記劉向於成帝之末校書天祿閣專精覃思衣有老人著黑衣端植青藜杖扣閣而進見向閣中獨坐誦書老人乃吹杖赫然火出因以照向共說開闢以前事向因受五行洪範之文辭說繁廣向乃裂裳及紳以記其言至曉而去請問姓名云我太一之精聞卯金之姓有博覽者今我術下而教焉於是出懷中竹牒以授向子歆復從向受此次楊樂道述懷素心非不慕前修自怪因循欲白頭獵較趣時終瑣瑣畫墁營職信悠悠萬章下魯人獵較孔子亦獵較注獵者田獵相較奪禽獸得之以祭時俗所尚以為吉祥孔子不違而從之所以小同於世畫墁見答虞醇翁注濠梁最憶知魚樂牢策翻慙為彘謀濠魚屢見上莊子祝宗人臨牢策說彘曰汝奚惡死吾將三月汝十日戒三日齊藉白茅加汝肩尻於雕俎之上則汝為之乎尚有故人能慰我詩成珠玉每相投和楊樂道見寄宅帶園林五畝餘蕭條還似茂陵居茂陵居見寄友注殺青滿架書新繕生白當窗室久虛劉向戰國策序曰皆定以殺青書畫可繕寫列子釋文謂汗簡刮去青皮也應劭風俗通殺青作簡書之新竹有汗後皆蠧故作簡者於火上炙乾之莊子虛室生白吉祥攸止白詩空室閒生白髙情淡入𤣥不及公之對殺青也孤學自難窺奧密重言猶得慰空疏相思每欲投詩社秖待春蒲葉可書蒲葉見前鄧子儀注又王育有暇即折蒲學書寄吳冲卿二首平生心事略相同三歲連墻左廄中退之詩賃屋住連墻充嘗判太僕寺為羣牧判官與公同僚故有左廄之語更得繆恩分省舍又將衰鬢作鄰翁聨翩久傍宫槐緑契闊今看楚蓼紅此必吳為京西淮南漕時故有楚蓼之句不欲與君為逺别沙臺吹帽約秋風退之薦士霜風破佳菊嘉節迫吹帽晉孟嘉為征西將軍桓溫參軍九日溫燕龍山寮佐畢集有風吹嘉帽墮落嘉不之覺戰國策顔率曰魏人欲得九鼎謀於渾臺之下沙海之上其日久矣沙海屬浚儀開封屬邑疑沙臺以沙海得名詩意祝其早還京也開封安肅門外旌孝鄉有沙臺其二公自注云時兄晉州方得罪塞垣花氣欲飛浮眼底紛紛緑漸抽悠逺山川嗟我老急難兄弟想君愁詩脊令在原兄弟急難案冲卿育之弟又育二弟京方與育同時登科皆以文名此云兄晉州得罪不知指誰此詩與前首不相連必别為寄者舊知白日諸曹滿試問紅燈幾客留時節只應無意思亦如行路判春休馮奉世傳稍遷諸曹酬冲卿見别同官同齒復同科朋友昏姻分最多兩地塵沙今齟齬二年風月共婆娑樂天寄夢得詩同年同病同心事除却蘇州更是誰陶侃傳老子婆娑正坐諸君輩朝倫孰與君材似使指將如我病何升黜會應從此異願偷閒暇數經過次御河寄城北會上諸友客路花時秖攪心行逢御水半晴隂背城野色雲邊盡隔屋春聲樹外深香草已堪回步履午風聊復散衣襟韓集筍詩暫須回步履要取助盤餐憶君載酒相追處紅蕚青跗定滿林沈約詩氛氲桃李花青跗含素蕚既為風所開復為風所落詩常棣注承華者曰蕚不當作拊拊鄂足也不芳浮切拊亦作跗寄友人三首萬里書歸說我愁知君不忘北城幽一篇封禪才難學三畝蓬蒿勢易求封泰山禪梁父自二字故對蓬蒿詩言不效司馬之諛惟思退處才難學其詞微矣竇牟詩悟主一言那可學司馬相如既病免家居茂陵天子曰相如病甚可往從悉取其書若不然後失之矣所忠往而相如巳死問其妻對曰長卿未死時為一卷書曰吏來求書奏之其書札言封禪事欲與山僧論地劵願為鄰舍事田疇應須急作南征計漠北風沙不可留隋志記晉自過江凡買賣奴婢馬牛田宅有文劵率錢萬輸估四百入官賣者三百買者一百釋文曰劵契也别書之以刀刻其旁也故曰契也疇一井也據漠北字又疑友人有使北方或仕邊徼者其二水邊幽樹憶同攀曾約移居向此間欲語林塘迷舊徑却隨車馬入他山飛花著地容難冶鳴鳥窺人意轉閒易冶容誨淫唐詩簷前花覆地竹外鳥窺人物色可歌春不返相思空復慘朱顔杜詩天子初愁思都人慘别顔又丈夫貴壯健慘戚非朱顔此詩必公己卜宅江寧却懷臨川舊釣游之地其三一别三年各一方此身漂蕩只殊鄉看沙更覺蓬萊淺數日空驚霹靂忙蓬萊清淺麻姑事見古意注杜牧之詩屈指百萬世過如霹靂忙渺渺水波低赤岸濛濛雲氣淡扶桑杜詩巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍扶桑言日登臨舊興無多在但有浮槎意未忘張華博物志曰舊說天河與海通近世有人居海傍者年年八月有浮查來甚大往返不失期此人乃多賫糧乘查去忽忽不覺晝夜奄至一處有城邑居室望室中多見織婦有一丈夫牽牛渚次飲之驚問此人何由至此此人即問為何處答曰君可詣蜀問嚴君平此人還問君平君平曰某年某月有客星犯牛斗即此人到天河時也槎查通字書亦作楂寄張襄州張瓌字唐公嘗為襄州疑此即瓌也襄陽州望古來雄耆舊相傳有素風四葉表閭唐尹氏一門逃世漢龐公杜詩復憶襄陽孟浩然只今耆舊無新語素風猶言風素襄陽耆舊傳唐尹怦父嗣宗居喪踰禮正觀中特見旌辟子怦竭力南畝侍養彌篤父卒廬於墓所負土成墳蓬首單衣鹽酪不進朝夕號慟墓産紫芝子恭先孫仁恕皆有孝行俱被旌表於是一門四闕後漢龐德公携妻子登鹿門採藥不返故家遺俗應多在美景良辰定不空遙憶習池寒夜月幾人談笑伴詩翁孟子故家遺俗流風善政猶有存者謝靈運擬鄴中詩序天下良辰美景賞心樂事四者難并襄陽記云峴山南八百步西下道百步有習家魚池習郁將死勑其長子葬於池側池中故釣臺尚存按郁即鑿齒之先郁後漢人為黃門侍郎封襄陽公和昌叔懷灊樓讀書之樂志食長年不得休一巢無地拙於鳩聊為薄宦容身者能免髙人笑我不食志見答虞醇翁注詩鵲巢維鵲有巢維鳩居之注鳩不自有巢居鵲之成巢杜詩長恐死道路永為髙人嗤道德文章吾事落塵埃波浪此生浮莊子天地篇伯成子髙謂禹今子賞罰而民且不仁云云夫子闔行耶無落吾事俋俋乎耕而不顧賈誼賦其生兮若浮看君别後行藏意回顧灊樓秪自羞杜行藏獨倚樓淨因長老樓上玩月見懷有疑君魂夢在清都之句淨因以僧寶傳考之疑為道臻禪師也道人心與世無求隱几蕭然在北樓坐對髙梧傾曉月看翻清露洗新秋登臨更欲邀元亮披寫還能擬惠休邀元亮疑用逺法師約淵明入蓮社意江淹雜擬有惠休詩顧我不知天上樂虛疑昨夜夢仙游寄張諤招張安國金陵法曹我老願為臧丈人君今年少未年少未一作少壯豈長貧莊子田子方篇文王勸於臧見一丈夫釣欲舉而授之政而恐大臣父兄之弗安也欲卜之諸大夫曰先君之命王其無它又何卜焉遂迎丈人而授之政陳平傳張負曰固有美如陳平長貧者乎好須自致青冥上可且相從寂寞濵退之詩詎縱青冥靶范雎傳賈不意君能自致青雲之上賈不敢復讀天下之書不敢復預天下之事深谷黃鸝嬌引子曲崎翠碧巧藏身尋幽觸靜還成興何必區區九陌塵杜詩山禽引子哺紅果溪友得錢留白魚子虛賦激堆崎張揖曰崎曲岸頭也翠碧鳥名韓詩何事九衢塵王荆公詩注卷三十三
