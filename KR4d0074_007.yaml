  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0074_WYG_007-1a, image: WYG1106/WYG1106-0053a.png}
body:
  text: 王荆公詩注巻七宋李壁撰古詩虎圖或言公作此詩譏韓忠獻恐無此壯哉非羆亦非貙爾雅羆如熊黄白文又曰􅓔似狸今􅓔虎大於虎豹文如狸目光夾鏡當坐隅顔延年赭白馬賦䨇瞳夾鏡横行妥尾不畏逐顧盼欲去仍躊躇卒然我見心為動熟視稍稍摩其鬚固知畫者巧為此此物安肯來庭除想當槃礴欲畫時睥睨衆史如庸奴莊子畫史解衣槃礴羸神閒意定始一掃功與造化論錙銖悲風颯颯吹黄蘆上有寒雀驚相呼槎牙死樹鳴老烏向之俛噣如哺雛山牆野壁黄昬後馮婦遥看亦下車或言王介甫歐陽永叔梅聖俞與一時聞人坐上分題賦虎圖介甫先成衆服其敏妙永叔乃袖手或曰此體杜甫畫鶻行耳大抵前軰多模取古人意以紓急解紛此其一也次韻歐陽永叔端溪石枕蘄竹簟端溪琢枕緑玉色端溪髙要縣有溪人於此鑿石為硯其色正紫而微青蘄水織簟黄金紋翰林所寶此兩物笑視金玉如浮雲都城六月招客語地上赤日流黄塵燭龍中天進無力古書燭龍崑山神也又山海經赤水之北有山其神人面蛇身其瞑乃晦其視乃明是謂燭龍客主歊然各疲劇形骸直欲坐棄忘冠帶安能强修飾恃公寛貸更不疑箕踞豈復論官職曲禮坐無箕倨謂伸兩足而坐其形如箕笛材平瑩家故藏硯璞㘭清此新得掃除堂屋就隂翳公不自眠分與客知公用意每如此真能與物同其適公不自眠則客對主人眠不但箕倨而巳人言介甫嗜睡夏月常用方枕或問何意公云睡乆氣蒸枕熱則轉一方冷處此真知睡者歐公端石枕其形製疑亦方者豈比法曹空自私却願天日長炎赫退之謝鄭羣贈簟詩法曹貧賤衆所易腰腹空大何能為倒身甘寢愈百疾却願天日長炎㬢公材卓犖人所驚久矣四海流聲名天方選取欲扶世豈特使以文章鳴深探力取常不寐思以正議排縱横奈何甘心一榻上欲卧潁尾為潔清此詩歐公為翰苑時已有歸潁之意賢愚勞佚非一軌顧我病昏惟未死心於萬事久蕭然身寄一官真偶爾便當買宅歸偃休退之畫記偃休者二人白髪青山如願始看公戮力就太平却上青天跨箕尾荘子傅說乘東維騎箕尾和呉冲卿雪詩陽回力能邅隂合勢方鞏填空忽汗漫造物誰慫慂輕於擘絮紛細若吹毛氄雲連晝巳瞀風助宵仍洶憑陵雖一時變化亦千種簾深巻或避户隘關尤擁滔天有凍痕匝地無荒隴飛揚類挾富委翳等辭寵穿幽偶相重值險輙孤聳積慘㑹將舒羣輕那久重中山王勝傳羣輕折軸此句似有所譏者紛華初滿眼消釋不旋踵槁樹散飛花空簷落懸湩漢書湩乳汁也又佛書付法傳商那手出香乳懸泉流注何當困炎熱以此滌煩壅共約市南人收藏不為冗和冲卿雪并示持國地巻江海浮天吹河漢湧北風散作花巧麗世無種霾昬得照耀塵滓歸掩擁荒林無空枝幽瓦有髙壠分纔一毛輕聚或千鈞重飛揚目巳眩摧壓聽還兇漁舟平繫舷樵屩役歸踵空令物象瑩豈免川塗壅争光嫦娥妒失色羲和恐賴逢陽氣蒸轉作水波溶舞庭稱賀嚴唐韋斌宰相安石子也毎朝㑹不敢離立笑言嘗大雪在廷者皆振裾更立斌不徙足雪甚㡬至鞾亦不失恭掃路傳呼寵唐開元遺事王元寶每大雪之際令僕夫自門巷掃雪為徑路以迎賔客具宴飲之㑹為煖寒衝游謝少壯避卧甘閒冗袁安偃卧見讀眉山集雪詩注吴侯謂冲卿絶俗唱韓子謂持國當敵勇勝負觀兩豪吾衰但隂拱黥布傳隂拱而觀其孰勝師古曰斂手曰拱言不動摇坐觀成敗也送石賡歸寜虚名誤長者邂逅肯經過所操十餘篇浩蕩決江河側身朝市間樂少悲慙多文章舊所好久巳廢吟哦開編喜有得一讀瘳沉痾裹飯北城隂永懐從晤歌又欲及嵗晩空當掃絲窠韓詩絲窠掃還成稍出平生言道藝相琢磨忽隨鴈南飛當此葉辭柯去去棃嶺髙棃嶺在建州浦城縣想見青坡陀黄花一盃酒為壽樂如何微詩等瓦礫持用報隋和隋侯之珠卞和之璧皆至寶也送張拱微出都歸卧不自得出門無所投獨尋城隅水送子因逺遊荒林纒悲風慘慘吹駞裘捉手共笑語顧瞻中河舟嗟人皆行樂而我方坐愁腸胃繞鍾山形骸空此留念始讀詩書豈非亦有求一來裹青衫觸事自悔尤誤為世所容榮祿今白頭塞責以區區一毛施萬牛司馬遷荅任安書若九牛亡一毛不足助時治但為故人羞寛恩許自劾終欲東南流子今涉冬江船必泊蔡洲蔡洲非汝蔡乃在建康城西南寄聲冶城人冶城見仲明父至宿注為我問一丘漢班嗣報桓譚書曰栖遲於一丘則天下不易其樂寄題睡軒劉侯少忼慨劉侯不詳為誰天馬脫馽羈一官不得意州縣老委蛇新居當中條墻屋稍補治疏軒以睡名從我逺求詩朝廷法令具百吏但循持又況佐小邑有才安所施賦租如簿領獄訟了鞭笞翛然即髙枕於此樂可知王官有空谷隠者常棲遲司空圗隠居中條山王官谷拂榻夢其人亦足慰所思嗟予久留連竊食坐無為浩歌臨西風更欲往從之冲卿席上得昨字嗟予乏時才始願乃丘壑强走十五年朱顔巳非昨低回大梁下屢歎風沙惡所欣同舎郎同舎郎出直不疑傳誘我文義博古聲無慆淫真味有淡泊追攀風月久貌簡非心畧君恩忽推徙所望頗乖錯尚憐得經過未比參辰各揚子吾不睹參辰之相比留連惜餘景從子至日落明燈照親友環坐傾杯杓别離寛後悲笑語盡今樂論詩知不如興至亦同作塞翁行塞翁少小壟上鋤塞翁老來能捕魚魚長如人水滿眼桑柘死盡生芙蕖家家新堤廣能築謝𤣥暉詩春色良已凋秋場廣能築邊人壯馬休南牧賈誼過秦論胡人不敢南下而牧馬北風巻却波浪聲秪放田車行轣轆白溝行白溝在安肅北十五里闊纔丈餘古亦名巨馬河本朝與遼人分界處公此詩必作於使北時也竊味全篇巳微見經理之意君臣之間志迄弗遂其卒乃為政宣之禍豈非天哉余頃因使燕亦嘗過所謂白溝者河甚淺狹可涉地屬涿州白溝河邊蕃塞地送迎蕃使年年事蕃使常來射狐兎自五代來契丹嵗壓境及中國徴發即引去遣問之曰吾校獵爾以是困中國漢兵不道傳烽燧師古曰晝燔燧夜舉烽萬里鉏耰接塞垣鉏耰字出過秦論萬里鉏耰接塞垣詞不迫而意則深切矣按沈文通和王微之漁陽圗云燕山自是漢家地北望分明掌股間休作畫圖張屋壁空令壯士老朱顔沈亦公所善想當時諸賢皆有興復意如此等詩皆是不獨公云爾幽燕桑葉暗川原棘門灞上徒兒戲李牧㢘頗莫更論公賦此詩實昭陵時按當時從臣歐陽公奏疏有云兵法曰將者民之司命國家安危之主也今外以李昭亮王克基軰當契丹内以曹琮李用和等衛天子如當今之事勢而以民之司命國之安危繫此數人安得不取笑四夷為其輕侮詩所稱棘門㶚上或亦歐公之意也河間河間今屬河北瀛州防禦郡北行出河間千嵗想賢王此言諸侯王多不循理道獻王獨以賢稱所謂大雅卓爾不羣也胡麻生蓬中詰曲終自傷荀子蓬生麻中不扶而直言王性本直因武帝之忌而縱酒自晦所以為詰曲也好徳尚如此恃才宜見戕恃才指淮南王安之類乃知隂自修彼不為傾商隂自修謂周文王為諸侯時區區三世家廟冊富文章教子以空言得祚果不長武帝立三王皆冇制冊見武五子傳言武帝不以躬行化其子徒以空言勉之宜三王之後皆不長也陳橋余嘗過陳橋今改為郭橋走馬黄昏渡河水夜争歸路春風裏指㸃韋城太白髙韋城滑州屬縣太白髙将曉也投鞭日午陳橋市楊栁初回陌上塵烟脂洗出杏花勻紛紛塞路堪追惜失却新年一半春澶州九域志澶州南至東京二百五十里去都二百五十里河流中間兩城峙南城草草不受兵北城樓櫓如邊城城中老人為予語契丹此地經鈔虜黄屋親乘矢石間代馬欲踏河氷渡天發一矢敵國愁河氷亦破沙水流歡盟從此至今日丞相萊公功第一續鑑上謂輔臣曰契丹巳入寇朕當親征决勝卿等共議何時可以進發畢士安曰順動之事更望徐圗寇凖曰大兵在外進發之期不可稽緩冬車駕北廵及駐蹕韋城敵益南侵羣臣復有以王欽若南幸金陵之謀告上意稍惑凖入對曰今强寇迫近四方危心陛下惟可進尺不可退寸若回輦數步則萬衆瓦觧雖金陵亦不可得而至矣殿前都指揮使髙瓊亦奏曰冦凖言是願陛下亟幸澶州上意遂决行次衛南謂輔臣曰敵率大衆深入吾土又河氷且合戎馬可渡宜過為之防可督諸将嚴飭戎備便宜從事敵率衆抵澶州直犯大陣圍合李繼隆等整軍成列以禦之分伏勁弩控扼要害敵統率易其旗幟躬出督戰威虎軍頭張壊守床子弩弩潛發達蘭中額隕其徒數十百輩競前輿曵至寨是夜達蘭死敵大挫衂退却不敢動駕自南城幸北城敵退和議成皆寇凖之功也北客置酒紫衣操鼎置客前巾韜稻飯隨粱饘引刀取肉割啖客銀盤臂臑薧與鮮禮記少儀其禮太牢則以牛左肩臂臑折九个又臂臑謂肩脚曲禮下槀魚曰商祭鮮魚曰脡祭鄭司農云鮮謂生肉槀謂乾肉慇懃勸侑邀一飽巻牲歸舍觴更傳山蔬野果雜飴密獾脯豕腊加炮煎爾雅狼牡名獾牝名酒酣衆吏稍欲起小吏捽耳争留連為爾止飲且少安一杯相屬非偶然寄育王山長老常坦道人少賈海上游海舶破㪚身波浮抱金滿篋人所寄吹簸偶得還中州羸身歸來不受報秪取斗酒相獻酬歡娯慈母終一世脱去妻子藏巖幽蒼煙寥寥池水漫白玉菡蓞吹高秋爾雅芙蕖荷之總名其花菡蓞其實蓮其根蕅夜燃柏子煮山藥憶此東望無時休塞垣春枯積雪留沙礫盛怒黄雲愁五更疋馬隨鴈起想見鄮郭花稠稠鄮郭在明州百年夸奪終一丘楊惲傳古與今如一丘之貉退之雜詩向者夸奪子萬墳壓其巔世上滿眼真悠悠寄身萬里心綢繆莫道異趣無相求易同氣相求言不可以儒釋之異而相忘右詩公自註云奉使道中寄王荆公詩注巻七
