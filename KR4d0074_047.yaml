body:
  text: 王荆公詩注卷四十七宋李壁撰律詩杏花垂楊一逕紫苔封唐任珪戲郡守詩入門堪笑復堪憐三徑苔封一釣船包結詩積雪封苔徑多年亞石松人語蕭蕭院落中獨有杏花如唤客倚墻斜日數枝紅歐公詞鶯啼宴席似留人花出墻頭如有意城東寺菊黄花漠漠弄秋暉無數蜜蜂花上飛不忍獨醒辜爾去慇懃為折一枝歸鄭谷菊詩節去蜂愁蝶不知曉庭還繞折殘枝唐人玉蕊花詩應共羣仙鬬百草獨來偷折一枝歸又薛能詩立馬煩君折一枝拒霜花即芙蓉落盡羣花獨自芳紅英渾欲拒嚴霜開元天子千秋節戚里人家綴露囊宋景文詩繁霜不可拒謹勿愛虗名宋自注云俗名拒霜其實逢霜即悴矣坡詩唤作拒霜渾未稱細思却是最宜霜唐以前帝王生日不置節名隋文六月十三日生詔天下為武文皇帝㫁屠宰至明皇始以八月五日誕辰為千秋節開燕上夀王家戚里貢獻金鏡士庶結承露絲囊等物相遺小杜過勤政樓詩千秋佳節空名在承露絲囊世巳无燕處處定知秋後别年年常一作長向社前逢行藏似一作自欲追時節豈是人間不見容章孝標詩舊壘危巢泥巳落今年故向社前歸少皥時𤣥鳥司分者也傳咸燕賦云随時宜以行蔵似君子之出處韓詩雙雙歸蟄燕則燕之歸特蟄於土中耳沈存中論此最詳吐綬雞樊籠寄食老低摧組麗深藏肯自媒天日清明聊一吐兒童初見互驚猜韓信寄食漂母歐公鶴詩樊籠毛羽日低摧劉禹錫有吐綬鳥詩湖煙始開山日髙迎風吐綬盤花絛栁子厚荅韋中立書僕往聞庸蜀之南恒少日日出則犬吠此詩意亦類栁疑公自況終以議變法者為非崔豹古今注云吐綬鳥一名功曹酉陽雜俎魚復縣南山有鳥大如鴝鵒羽色多黑雜以黄白頭頰似雉有時吐物長數寸丹采彪炳形色類綬因名為吐綬鳥又食必蓄嗉臆前大如斗慮觸其嗉行毎逺草木故一名避株鳥倦㳺雜録云真珠雞生䕫峽山中畜之甚馴其羽毛有白圎㸃故號真珠鷄又名吐綬雞生而反哺亦名孝雉毎至春夏之交景氣和暖頷下出綬帯至尺餘紅碧鮮然頭有翠角雙立良久悉歛於嗉下披其毛不復見或有死者割其頭臆間亦無所覩苕溪漁隐曰廣右閩中亦有吐綬雞余在一處見人家多飬之不獨巴峽中有黄鸝野花吐盡竹姢娟杜甫竹詩雨洗姢姢浄又美花多映竹好鳥不歸山尚有黄鸝最可憐婭姹不知緣底事背人飛過北山前說文曰離黄倉庚也鳴即蠶生詩義疏或謂之黄栗留齊人謂之搏黍闗西謂之黄鳥子美聞鶯詩婭姹人家小女兒半啼半語隔花枝杜甫鴈詩一一背人飛又項斯詩動水花連影逢人鳥背飛蝶翅輕於粉薄於繒長被花牽不自勝張子野詩懶同胡蝶為春忙若信莊周尚非我豈能投死為韓憑荘周事巳見古詩嶺表録異云韓朋鳥者乃鳬鷖之類雌雄為雙飛泛溪浦水禽中鸂鶒鴛鴦鵁鶄嶺北皆有之唯韓朋鳥未之見也按干寳搜神記云大夫韓朋其妻美好康王奪之朋怨王囚之朋遂自殺妻乃隂腐其衣王與之登臺自投臺下左右捉衣衣不勝手遺書於帯曰願以屍還韓氏而合葬王怒令埋之兩冢相望經宿忽見有梓木生二冢之上根交於下枝連其上又有鳥如鴛鴦常棲其樹朝暮悲鳴南人謂此禽即韓朋夫婦之精魄故以韓氏名之韓朋一云韓憑李義山絶句青陵臺畔日光斜萬古真魂倚暮霞莫許韓朋為蛺蝶等閒飛上别枝花暮春無限殘紅著地飛谿頭煙樹翠相圍楊花獨得東風意相逐晴空去不歸退之落花詩已分將身著地飛又楊栁詩擺撼春風祗欲飛温庭筠詩芍藥薔薇語早梅不知誰是艷陽才今朝領得東風意不復饒君雪裏開隋煬帝侯夫人詩粧成多自恨夢好却成悲不及楊花意春來到處飛真州東園作歐公嘗為許元作記即此處十年厯遍人間事張良傳願棄人間事却遶新花認故叢杜詩藥殘他日裏花發去年叢南北此身知幾日山川長在淚痕中過皖口皖口在舒州皖城西去百重山陳迹今埋杳靄間公嘗倅舒州故言陳迹白髮行藏空自感春風江水照衰顔發粟至石陂寺驀水穿山近更賒唐李陟詩望水尋山二里餘竹林斜到地仙居三更燃火飯僧家乘田有秩難逃責從事雖勤敢嘆嗟孟子孔子嘗為乘田矣介甫時為鄞縣發粟救民故借用乗田事别皖口浮煙漠漠細沙平飛雨濺濺嫩水生嫰水見至開元僧舍注異日不知來照影更添華髪幾千莖白詩重重照水看容髮不見朱顔見白絲失却少年無覔處泥他湖水欲何為牧之詩弄溪終日到黄昏照數秋來白髪根别灊皖二山鄉壘新恩借舊朱欲辭灊皖更躊躇二山在舒州灊山即天柱山皖山即皖公山攅峯列岫爭譏我飽食頻一作窮年報禮虚杜牧之詩喜抛新錦帳榮借舊朱衣按公舒倅滿即入館後四年方為常州此云別灊皖當考北山移文列壑争譏攅峰竦誚報禮字見別注舒州被召試不赴偶書戴盆難與望天兼自笑虚名亦自嫌槁壤太牢俱有味可能蚯蚓獨清亷司馬遷書戴盆何以望天第五倫傳明帝戒外戚苦身待士不如為國戴盆望天事不兩施小杜詩如今歸不得自戴望天盆舟過長蘆長蘆属儀真木落草揺洲渚昏泊船深閉雨中門韋荘詩雨打梨花深閉門此謂船門回燈秪欲尋歸夢兒女紛紛強笑言岑参詩孤燈燃客夢寒杵𢷬鄉愁金山寺三首北檝南檣泊四垂共憐金碧爛參差孤根萬丈滄波底除却蛟龍世不知東坡松詩根到九泉無曲處世間惟有蟄龍知余少年過山間一老僧為余言韓蘄王嘗選軍中善沒者於三門下淵潭最深處遣入水視有何物沒者駭叫騰出云有一大龍抱山足而戲其二波瀾蕩沃乾坤大少陵洞庭湖詩納納乾坤大氣象包藏水石閑秪有此中宜曠望誰令天作海門山詩周頌天作高山注作生也樂天詩況有虗白亭坐見海門山李白詩剗却君山好平鋪湘水流亦此意其三天日蒼茫海氣深每來高處一登臨丹樓碧閣皆時事只有江山古到今言樓閣興壊繫於一時不同江山久存也泊姚江寰宇志餘姚江在縣五十步濶四十丈入明州山如碧浪翻江去水似青天照眼明喚取仙人來住此莫教辛苦上層城太白詩下視千萬峰峰頭如浪起栁詩洞庭春去水如天杜詩春水船如天上坐淮南子崑崙山上有層城高萬一千里㳺鍾山兩山松櫟暗朱藤雲南記曰雲南山出藤其色如朱小者以為馬䇿大者以為拄杖恐所在山谷皆有不必出雲南白樂天有朱藤杖詩一水中間勝武陵言景過於武陵之桃源午梵隔雲知有寺夕陽歸去不逢僧古詩但聞煙外鐘不見煙中寺又參寥子詩隔林彷彿聞機杼知有人家住翠微崔峒詩客尋朝磬食僧背夕陽歸杜牧之老僧詩日暮千峰裏不知何處歸龍泉寺石井二首建康志无龍泉寺而臨汝志長安鄉有龍泉院豈即此寺邪或在南康也信州亦有龍泉院在玉山縣山腰石有千年潤海眼一作石眼泉無一日乾天下蒼生待霖雨不知龍向此中蟠唐劉崇逺金華子云北海縣因發五株錢取之不盡得一石記云此是海眼以錢鎮之衆懼遽掩之杜詩古來相傳是海眼李白詩深沉百丈通海底那知不有蛟龍蟠石林詩話云荆公少以意氣自許故詩語惟其所向不復更為涵蓄如天下蒼生待霖雨不知龍向此中蟠又濃緑萬枝紅一㸃動人春色不須多乂平治險穢非无力潤澤焦枯是有才之類皆直道其胸中事後為羣牧判官從宋以道盡假唐人詩集博觀而約取晩年始盡深婉不廹之趣乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也呉曽漫錄云張文潜有二石龜晁无咎名其大者為九江小者為千歲文潜因作九江千歲龜歌贈无咎云老龍洞庭怒蕩覆堯九州謂半山老人也又云禹咄嗟水平流謂司馬君實也不知曾何所據而云若果爾是公本以龜自命後人又以龍目之然則公所以為龍者亦異矣其二人傳此井未嘗枯左宣公十二年目於眢井而拯之眢枯也滿底蒼苔亂髮麤杜牧之詩水梳苔髮直四海旱多霖雨少此中端有卧龍無退之詩居然鱗介不能容石眼環環水一鍾間說旱天求雨澤直疑科斗是蛟龍興國樓上作松篁不動翠相重杜荀鶴詩日髙花影重日射流塵四散紅公有句云日射地穿千里赤亦類此地上行人愁暍死那知高處有清風說文暍乙曷反著署熱死也淮南子曰武王䕃暍人於栁下而天下懐抱朴子曰指氷室不能起暍子之熱漢武帝紀元封四年夏大旱民多暍死如淳曰暍音謁韓詩寒泉百尺空看影正是行人暍死時別灊閣一溪清㵼百山重風物能留邴曼容曼容事見江東召歸注後夜肯思幽興極月明孤影伴寒松杭州望湖樓回馬上作呈玉汝樂道水光山氣碧浮浮落日將歸又少留從此秪應長入夢夢中還與故人逰孟郊詩月迥无隐物況復大江秋峴亭當此時故人不同遊故人在長安亦可從夢求魯直詩松風夢與故人逰同駕飛鴻跨九州和景純十四丈三絶身先諸老斡樞機再見王門闔左扉但恨東歸相值晩豈知臨别更心違景純本末見藏春塢注禮記玉藻閏月則闔門左扉立于其中謂再逢閏也其二幾年相約在林丘眼見京江更阻逰遺我珠璣何以報恨無瑶玉與公舟詩篤公劉何以舟之惟玉及瑶注舟帯也瑶言有羙德公酬龔深甫詩用瑶玉事却通前後文使此言舟豈謂酒邪唐人有航船疑此借用或舟字正是報之以瓊瑶之意其三景純之孫庠嘗云祖居藏春塢南崗陳秀心升之所居即此崗也藏春花木望中迷水複山長道阻躋詩道阻且躋注躋升也惆悵老來塵世累無因重到武陵溪東坡亦有藏春詩云年抛造化甄陶外春入先生杖屨中臨津臨津艶艷花千樹夾徑斜斜栁數行却憶金明池上路紅裙争看緑衣郎此平甫詩或誤刋於公集汀沙汀沙雪漫水溶溶睡鴨殘蘆掩靄中歸去北人多憶此家家圗畫有屏風漢許后傳設妾欲作某屛風張於某所曰故事無有李白詩湖南七郡凡幾家家家屏幛書題徧王逢原山茶花詩江南池館厭深紅零落山煙山雨中却是北人偏愛惜數枝和雪上屏風西山西山映水碧潭潭楚老長謡淚滿衫謝靈運廬陵王墓下詩延州叶心許楚老惜蘭芳李善注云徐州先賢傳曰楚老者彭城之隠人但道使君留不得那知肯更憶江南庾信既留長安雖位望通顯嘗有鄉闗之思乃作哀江南賦以致其意和文淑公自注云張氏女弟天梯雲棧蜀山岑下視嘉陵水萬尋我得一舟江上去恐君東望亦傷心田叔傳蜀口棧道近山少陵過棧閣詩目眩隕雜花頭風吹過雨百年不可料一墜那得取春入春入園林百草香池塘氷散水生光身閑是處堪携手何事低回兩鬢霜衛詩迨氷未泮注氷未散正月中以前也此詩與懐舊後一聮全同而上二句比前作尤勝疑此是後來改本暮春芙蕖的厯抽新葉的厯謂荷葉初抽時苜蓿䦨干放晚花薛令之詩苜蓿長䦨干于闐地溫和有苜蓿白下門東春巳老莫嗔楊栁可藏鴉古樂府楊栁可藏鴉烏江亭在和州百戰疲勞壯士哀中原一敗勢難廻江東子弟今雖在肯為君王卷土來項籍傳羽遂引而東欲渡烏江烏江亭長謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡羽笑曰天乃亡我何渡江為且籍與江東子弟八千人渡江而西今亡一人還縱東父兄怜而王我我何面目見之哉公詩葢取籍意杜牧之詩乃謂勝敗兵家不可期包羞忍恥是男兒江東子弟多才俊巻土重來未可知漢武壯士悲歌出塞頻中原蕭瑟半無人君王不負長陵約直欲功成賞漢臣長陵髙帝陵名漢誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之武帝欲侯貳師以其亡功非髙帝之約乃令伐大宛斬其王封海西侯故班固云武興胡越之伐將帥受爵應本約矣諸葛武侯慟哭楊顒為一言餘風今日更誰傳區區庸蜀支呉魏不是虚心豈得賢蜀楊顒字子昭襄陽人為丞相亮主簿亮自校簿書顒直入諫曰為治有區分則上下不可相侵請為明公以宷主喻之扵此使奴執耕種婢主炊㸑雞主司晨犬主吠盗牛負重載馬涉逺路私業無曠所求皆足雍容高拱飲食而已忽一旦盡身親其後不更付任勞其體力為此碎務形疲神困終无一成豈其智不如奴婢雞犬哉失為家主之法也故古人稱坐而論道謂之王公作而行之謂之士大夫邴吉不問横屍而憂牛喘陳平不肯知錢榖云自有主者彼誠達於位分之體也今明公為理親自校簿書流汗竟日不亦勞乎亮謝之後嘗為東曹属典選舉及顒死亮泣三日望越亭亂山千頃翠相圍退之詩天水漭相圍衮衮滄江去復歸杜詩不盡長江衮衮來水随天而轉往來不窮故云去復歸安得病身生羽翼長随沙鳥自由飛退之詩安得長翮大翼如雲生我身春日席上十年流落負歸期臨水登山各有思楚詞登山臨水送將歸今日樽前千萬恨不堪頻唱鷓鴣詞樂天詩從此結成千萬恨今朝果中白家詩李羣玉詩酒飛鸚鵡盞歌送鷓鴣愁李白詩客有桂陽至能吟山鷓鴣句容道中句容江寧属縣荒煙寒雨暮山重草木冥冥但有風杜詩冥冥孤高多烈風二十四年三往返一身長在百憂中晏望驛釋舟走信州病起行山山更險下窮溪谷上通天乘高欲作東南望青壁松杉滿眼前鮑昭敬亭山詩上干蔽白日下属連回谿樂天長恨歌上窮碧落下黄泉祈澤寺見許堅題詩寺在建康城東去城二十五里宋景明中建梁朝置龍堂有初法師結庵日誦法華經有一女來聴曰兒東海龍女師曰此山乏水可為我開一泉後風雷良久有泉湧出至宋朝治平中賜名為祈澤治平寺云藹藹春風入水村陶詩藹藹逺人村森森喬木映朱門杜詩朱門酒肉臭世說君自謂逰朱門貧道如逰蓬户高人遺蹟空佳句誰識旌陽後世孫旌陽謂許遜也廬山記載許堅江南得道之士今簡寂觀前有堅曬衣石堅江左人多居三茅不知其年容貌不變多談神仙事能詩如題茅山觀云嘗恨清風千載鬱洞天今得恣逰遨松楸古色玉壇静鸞鶴不來青帝髙茅氏井寒丹已化明皇碑斷夢仍勞分明有箇長生路休向紅塵歎二毛又一絶寄徐舍人鉉云幾宵煙月鎻樓臺欲寄侯門薦穪才滿面塵埃人不識謾随流水下山來送陳景初陳善毉公嘗有五言詩贈之惨淡淮山水墨秋行人不飲奈離愁藥囊直入長安市誰識柴車載伯休後漢韓康賣藥長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休那乃不二價乎桓帝備𤣥纁禮聘康不得已辭安車自乘柴車臨辰先發亭長以韓徴君過方發人牛修道及見康為田叟也奪其牛康即與之有頃使者至奪牛翁乃徴君也詩云誰識葢用奪牛事也曽極載其叔祖裘父所記云陳景初始以逺方一黄冠至京師人物秀偉見者莫能測也嘗跨驢貨藥於市携二童自随一號黄精一號枸杞作字賦詩皆不凡俄有中貴人持入禁中裕陵見之異焉旋被收遇補左街副道錄命主景靈宫事據詩所稱藥囊與曾說合矣巫峽神女音容詎可求青山回抱楚宫樓朝朝暮暮空雲雨不盡襄王萬古愁沈存中筆談云自古言楚襄王夢與神女遇以楚詞考之似未然髙唐賦序云昔者先王嘗逰髙唐怠而晝寢夢見一婦人曰妾巫山之女也為髙唐之客朝為行雲暮為行雨故為立廟號曰朝雲其曰先王嘗逰髙唐則夢神女者懐王也非襄王也徐秀才園亭按建康續志徐氏即徐鉉之後宅舊在攝山棲霞寺西今曰陶莊即其地園池甚盛茂松修竹翠紛紛正得山阿與水濆笑傲一生雖自樂有司還欲選方聞方聞見次韻酬宋玘注中茅峰石上徐鍇篆字題名百年風雨草苔昏尚有當年墨法存秪恐終隨嶧碑盡西風吹燒滿秋原江南徐鉉善小篆映日眎之畫之中心有一縷濃墨至于曲折處亦當中无有偏側處乃筆鋒直下不倒側故鋒嘗在畫中此用筆之法渡江詞臣程俱言小篆之作自嶧山真刻不傳至唐字法雖盛而篆法葢一時者惟李陽氷為首徐鉉後出筆力勁古遂出陽氷上爾雅魯國鄒縣有嶧山純石相積連属而成山嶧山立石刻秦功徳杜詩嶧山之碑野火焚韓詩雨淋日炙野火燒欲雪天上雲驕未肯同晚來雪意巳填空詩信南山上天同雲雨雪雰雰欲開㫖酒邀嘉客更待天花落坐中天花借以喻雪上元夜戲作疑此平甫所作馬頭乘興尚誰先曲巷横街一一穿盡道滿城無國艷不知朱户鎖嬋姢漢賦増嬋姢踢豸注云姿態妖蠱也石竹花春歸幽谷始成叢地面芬敷淺淺紅潘安仁西征賦華實芬敷桑麻條暢車馬不臨誰見賞可憐亦觧度春風韓詩可憐此地無車馬顛倒青苔落絳英黄花四月揚州芍藥多先時為别苦風波還家忽忽驚秋色獨見黄花出短莎黄花菊也因見菊而思維揚芍藥劉貢父芍藥花譜字云天下名花洛陽牡丹廣陵芍藥為相侔埓木芙蓉即今芙蓉也水邉無數木芙蓉露染燕脂色未濃政似美人初醉著強擡青鏡欲粧慵薛能詩記得美人初病起道家装束厭禳時杜荀鶴詩早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容風暖鳥聲碎日髙花影重年年越溪女相憶采芙蓉精衛陳了齋表云愚公老矣益堅平險之心精衛依然未捨填波之願帝子銜寃久未平區區微意欲何成情知木石無云補待見桑田㡬變更山海經炎帝之少女㳺於東海溺而不返化為精衛常取西山之木石以填東海云又任昉述異記炎帝女溺死東海化為精衛自呼其名一名誓鳥一名寃禽一名志鳥一名帝女雀退之詩口銜山石細心望海波平渺渺功難見區區命已輕言木石之微何能填海㑹見其復為平陸也其怨深矣麻姑語王方平云接待以來已見東海三為桑田李白詩思填東海強銜一木戯贈育王虗白長老白雲山頂病禅師昔日公卿各贈詩行盡四方年八十却歸荒寺有誰知遍參諸方老而歸也司空圗詩後生乞汝殘風月自作深林不語僧此豈更欲世人知乎黄河派出崑崙五色流一支黄濁貫中州吹沙走浪幾千里轉側尾一作屋閭無處求山海經有青河白河赤河黑河環其墟其水出東北陬屈曲東南流為中國河博雅曰崑崙墟赤水出其東南陬河水出其東北陬洋水出其西北陬弱水出其西南陬河水入東海三水入南海後漢書注云崑崙山今在肅州酒泉縣西南山有昆侖之體故名之二書之語似得其實水經又言崑崙去嵩高五萬里則恐不能若是之逺當曳考之羅隐詩崑崙水色九般流莊子秋水篇北海若曰天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛司馬彪釋云泄海水出外者也崔云海東川名東江東江木落水分洪洪水脈復艚也分洪則水淺矣海道深䖏謂之洋伐盡黄蘆洲渚空南澗夕陽煙自起西山漠漠有無中北望欲望淮南更白頭杖藜蕭颯倚滄洲可憐新月為誰好無數晚山相對愁杜詩不知明月為誰好早晚孤帆他夜歸驪山元和郡國志驪山在昭應縣東南二里即藍田山也秦始皇陵在焉六籍燃除士不磨驪山如此盜兵何五陵珠玉歸人世却為詩書發冢多過秦論曰廢先王之道焚百家之言以愚黔首士不磨者言秦雖焚書而義理出於人心者猶在不可得而磨也劉向諫起昌陵曰始皇帝𦵏於驪山之阿棺槨之麗宫館之盛不可勝原天下苦其役而反之驪山之作未成而周章百萬之師至其下矣五陵謂漢高帝長陵惠帝安陵景帝陽陵武帝茂陵昭帝平陵自髙惠景昭四陵在咸陽縣臚獨茂陵在興平縣莊子外物篇儒以詩禮發冢大儒傳曰東方作矣事之何若小儒曰未觧裙襦口中有珠詩固有之曰靑靑之麥生於陵陂生不布施死何含珠為接其鬢擪其類儒以全椎控其頤徐別其頰无傷口中珠注詩禮者先王之陳迹也苟非其人乃有用之為奸則迹不足恃也縣舍西亭二首鄞縣時作山根移竹水邊栽巳覺新篁破嫰苔可惜主人官便滿無因長向此徘徊小杜詩竹岡蟠小逕屈折鬬蛇來三年得歸去知遶幾千迴其二主人將去菊初栽落盡黄花去却廻到得明年官又滿不知誰見此花開唐劉希夷詩今年花落顔色改明年花開又誰在張籍詩逺客悠悠任病身誰家池上不逢春明年各自東西去此地看花是別人東坡詩太守問花花有語為君零落為君開鐵幢浦未詳何地憶昨初為海上行日斜來往看潮生蘓子美詩滿川風雨看潮生如今身是西歸客廻首山川覺有情張籍詩如今身是他州客每見青山憶故居臨吳亭臨恐是勾字補穿葺漏僅區區志義殊嗟士大夫欲致太平非一日謾勞使者報新書漢氏以來羣儒區區修補百孔千瘡詩意似言不能曠然丕變但補葺支拄而已皆不滿之意蘇州道中順風北風一夕阻東舟清曉飛㠶落虎丘虎丘地名在姑蘇運數本來無得䘮人生萬事不須謀南史宋顧凱之常執命有定分非智力所移唯應恭巳守道信天任運而闇者不逹妄意僥倖徒虧雅道无闗得䘮不須謀者不容計較也王荆公詩注巻四十七
